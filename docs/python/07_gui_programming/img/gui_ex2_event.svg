<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 16px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .btn { fill: #f38ba8; rx: 8; stroke: #cdd6f4; stroke-width: 2; cursor: pointer; }
      .func { fill: #a6e3a1; rx: 8; stroke: #cdd6f4; stroke-width: 2; }
      
      @keyframes clickAnim { 0%, 20% { transform: scale(1); filter: brightness(1); } 25%, 35% { transform: scale(0.95); filter: brightness(0.8); } 40%, 100% { transform: scale(1); filter: brightness(1); } }
      .anim-click { animation: clickAnim 3s infinite; transform-origin: 250px 140px; }
      
      @keyframes surgeAnim { 0%, 25% { stroke-dashoffset: 250; opacity: 0; } 30%, 40% { stroke-dashoffset: 0; opacity: 1; } 50%, 100% { stroke-dashoffset: 0; opacity: 0; } }
      .anim-surge { stroke-dasharray: 250; animation: surgeAnim 3s infinite; }
      
      @keyframes runAnim { 0%, 35% { transform: translateY(10px); opacity: 0; } 45%, 80% { transform: translateY(0); opacity: 1; } 90%, 100% { transform: translateY(-10px); opacity: 0; } }
      .anim-run { animation: runAnim 3s infinite; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 2: 이벤트 드리븐 (Event-Driven)의 마법</text>

  <!-- Button -->
  <g class="anim-click">
    <rect x="150" y="100" width="200" height="80" class="btn" />
    <text x="250" y="145" class="text-code" font-size="24px">마우스 클릭!</text>
  </g>
  
  <text x="250" y="210" class="text-title" fill="#bac2de" font-size="14px">command=on_click</text>

  <!-- Connect Line -->
  <path d="M 350 140 L 450 140" fill="none" stroke="#f9e2af" stroke-width="15" stroke-dasharray="10" />
  <path d="M 350 140 L 450 140" fill="none" stroke="#f38ba8" stroke-width="15" class="anim-surge" marker-end="url(#arrow)" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f38ba8" />
    </marker>
  </defs>

  <!-- Function -->
  <rect x="450" y="100" width="250" height="80" class="func" />
  <text x="575" y="130" class="text-code">def on_click():</text>
  <g class="anim-run">
    <text x="575" y="160" class="text-code" fill="#f38ba8">print("터미널 출력!")</text>
  </g>
</svg>
