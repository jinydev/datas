<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 그라데이션 및 필터 -->
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#2a2a3c" />
    </linearGradient>
    <linearGradient id="dictGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b4625b" />
      <stop offset="100%" stop-color="#e27c73" />
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="350" rx="15" fill="url(#bgGrad2)" stroke="#4c4c6d" stroke-width="2"/>

  <!-- 타이틀 -->
  <text x="400" y="40" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#f8f8f2" text-anchor="middle" filter="url(#glow2)">**kwargs : Dictionary Packing Animation</text>

  <!-- 메인 함수 캐비닛 -->
  <rect x="580" y="70" width="180" height="240" rx="10" fill="#282a36" stroke="#ff79c6" stroke-width="3" filter="url(#shadow2)"/>
  <text x="670" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff79c6" text-anchor="middle">def make(**k):</text>
  
  <!-- 딕셔너리 서랍 (kwargs) -->
  <rect x="600" y="120" width="140" height="170" rx="10" fill="url(#dictGrad)" opacity="0.9" filter="url(#shadow2)"/>
  <text x="670" y="145" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">kwargs = { }</text>

  <!-- 날아오는 키워드 인자들 그룹 -->
  <g font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#282a36" filter="url(#shadow2)">
    <!-- Keyword 1 -->
    <g transform="translate(100, 110)">
      <!-- Name Tag -->
      <rect x="-40" y="-20" width="50" height="20" rx="3" fill="#ff5555"/>
      <text x="-15" y="-5" text-anchor="middle" fill="#fff" font-size="12">color</text>
      <!-- Value Box -->
      <rect x="-40" y="0" width="80" height="30" rx="5" fill="#f8f8f2"/>
      <text x="0" y="20" text-anchor="middle">"red"</text>
      
      <animateTransform attributeName="transform" type="translate" values="100,110; 670,165" begin="0.8s" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="1; 1; 0" begin="0.8s" dur="1.5s" fill="freeze" keyTimes="0; 0.9; 1"/>
    </g>
    <!-- Keyword 2 -->
    <g transform="translate(100, 180)">
      <!-- Name Tag -->
      <rect x="-40" y="-20" width="50" height="20" rx="3" fill="#8be9fd"/>
      <text x="-15" y="-5" text-anchor="middle" fill="#282a36" font-size="12">width</text>
      <!-- Value Box -->
      <rect x="-40" y="0" width="80" height="30" rx="5" fill="#f8f8f2"/>
      <text x="0" y="20" text-anchor="middle">100</text>
      
      <animateTransform attributeName="transform" type="translate" values="100,180; 670,205" begin="1.8s" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="1; 1; 0" begin="1.8s" dur="1.5s" fill="freeze" keyTimes="0; 0.9; 1"/>
    </g>
    <!-- Keyword 3 -->
    <g transform="translate(100, 250)">
      <!-- Name Tag -->
      <rect x="-40" y="-20" width="50" height="20" rx="3" fill="#50fa7b"/>
      <text x="-15" y="-5" text-anchor="middle" fill="#282a36" font-size="12">bold</text>
      <!-- Value Box -->
      <rect x="-40" y="0" width="80" height="30" rx="5" fill="#f8f8f2"/>
      <text x="0" y="20" text-anchor="middle">True</text>
      
      <animateTransform attributeName="transform" type="translate" values="100,250; 670,245" begin="2.8s" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="opacity" values="1; 1; 0" begin="2.8s" dur="1.5s" fill="freeze" keyTimes="0; 0.9; 1"/>
    </g>
  </g>

  <!-- 서랍 안에서 채워지는 Key-Value 텍스트 -->
  <g font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#fff" text-anchor="start">
    <text x="610" y="170" opacity="0">
      'color': 'red',
      <animate attributeName="opacity" values="0; 1; 1" begin="2.1s" dur="5s" fill="freeze"/>
    </text>
    <text x="610" y="210" opacity="0">
      'width': 100,
      <animate attributeName="opacity" values="0; 1; 1" begin="3.1s" dur="5s" fill="freeze"/>
    </text>
    <text x="610" y="250" opacity="0">
      'bold': True
      <animate attributeName="opacity" values="0; 1; 1" begin="4.1s" dur="5s" fill="freeze"/>
    </text>
  </g>

  <!-- 코드 호출 예시 (좌측 고정 텍스트) -->
  <text x="40" y="80" font-family="'Courier New', monospace" font-size="16" fill="#f8f8f2">
    <tspan x="40" dy="0"># 이름표(Keyword)를 붙여서 택배 발송!</tspan>
    <tspan x="40" dy="30" fill="#f1fa8c">make(color="red", width=100, bold=True)</tspan>
  </text>
  
  <!-- 흐름선 -->
  <path d="M 250,180 C 400,180 450,180 560,180" stroke="#f8f8f2" stroke-width="2" stroke-dasharray="8,8" fill="none">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <polygon points="560,175 575,180 560,185" fill="#f8f8f2"/>

</svg>
