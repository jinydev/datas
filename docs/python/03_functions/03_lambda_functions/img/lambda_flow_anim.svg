<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 18px; font-weight: bold; fill: #cdd6f4; text-anchor: start; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .box { fill: #313244; rx: 10; stroke-width: 2; }
      .box-def { stroke: #cba6f7; }
      .box-lambda { stroke: #a6e3a1; stroke-dasharray: 5 5; } /* Dashed for ephemeral */
      
      @keyframes floatDef {
        0%, 15% { transform: translate(150px, 120px); opacity: 0; fill: #cba6f7; }
        20% { transform: translate(150px, 120px); opacity: 1; fill: #cba6f7; } /* Starts at memory */
        40% { transform: translate(350px, 120px); opacity: 1; fill: #cba6f7; } /* Moves to exec */
        50% { transform: translate(350px, 120px) scale(1.5); opacity: 1; fill: #f9e2af; } /* Processes */
        60% { transform: translate(350px, 120px) scale(1); opacity: 1; fill: #f9e2af; }
        70% { transform: translate(650px, 120px); opacity: 1; fill: #f9e2af; } /* Return */
        80% { transform: translate(650px, 120px); opacity: 0; fill: #f9e2af; }
        100% { transform: translate(650px, 120px); opacity: 0; fill: #f9e2af; }
      }
      
      @keyframes floatLambda {
        0%, 15% { transform: translate(250px, 240px) scale(0); opacity: 0; fill: #a6e3a1; }
        25% { transform: translate(250px, 240px) scale(1); opacity: 1; fill: #a6e3a1; } /* Spawns instantly in place */
        35% { transform: translate(350px, 240px); opacity: 1; fill: #a6e3a1; } /* Moves to exec */
        45% { transform: translate(350px, 240px) scale(1.5); opacity: 1; fill: #f9e2af; } /* Processes */
        55% { transform: translate(350px, 240px) scale(1); opacity: 1; fill: #f9e2af; }
        65% { transform: translate(650px, 240px); opacity: 1; fill: #f9e2af; } /* Return */
        75% { transform: translate(650px, 240px) scale(0); opacity: 0; } /* Instantly erased */
        100% { transform: translate(650px, 240px) scale(0); opacity: 0; }
      }

      .particle-def { animation: floatDef 8s ease-in-out infinite; }
      .particle-lambda { animation: floatLambda 8s ease-in-out infinite; }
      
      .arrow { fill: none; stroke: #bac2de; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 6 6; }
    </style>
    
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bac2de" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">일반 함수(def) vs 익명 함수(lambda) 생명주기</text>

  <!-- Def Function Path (Top) -->
  <rect x="50" y="80" width="700" height="80" class="box box-def" />
  <text x="70" y="105" class="text-code" fill="#cba6f7">def add(x, y):</text>
  <text x="70" y="125" class="text-code" fill="#cba6f7">    return x + y</text>
  <text x="70" y="145" class="text-desc" text-anchor="start">1. 메모리에 이름('add')을 영구 등록 (사전 정의)</text>
  
  <text x="320" y="105" class="text-code" fill="#89b4fa">실행: add(3, 4)</text>
  <path d="M 450,120 L 590,120" class="arrow" marker-end="url(#arrowhead)" />
  <text x="610" y="125" class="text-code" fill="#f9e2af">Result: 7</text>

  <circle cx="0" cy="0" r="12" class="particle-def" />

  <!-- Lambda Function Path (Bottom) -->
  <rect x="50" y="200" width="700" height="80" class="box box-lambda" />
  <text x="70" y="245" class="text-code" fill="#a6e3a1">lambda x, y: x + y</text>
  <text x="70" y="270" class="text-desc" text-anchor="start">2. 이름 없이 선언과 동시에 실행 후 자동 폐기 (일회용)</text>
  
  <text x="310" y="225" class="text-code" fill="#89b4fa">실행: (lambda...)(3, 4)</text>
  <path d="M 500,240 L 590,240" class="arrow" marker-end="url(#arrowhead)" />
  <text x="610" y="245" class="text-code" fill="#f9e2af">Result: 7</text>
  
  <circle cx="0" cy="0" r="12" class="particle-lambda" />

  <text x="400" y="320" class="text-desc" fill="#fab387">결과는 똑같지만, lambda는 무겁게 메모리에 '이름' 방을 따로 잡아두지 않고 그 자리에서 쓰고 버립니다.</text>
</svg>
