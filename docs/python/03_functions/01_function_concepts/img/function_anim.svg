<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&amp;display=swap');
            text { font-family: 'Pretendard', sans-serif; font-weight: 600; }
            
            #inputGroup { animation: slideIn 4.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
            #outputGroup { animation: slideOut 4.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
            #funcBody { animation: pulse 4.5s infinite ease-in-out; }
            #gear1 { animation: spin 4.5s infinite linear; transform-origin: 300px 92px; }
            
            @keyframes slideIn {
                0% { transform: translateX(-20px); opacity: 0; }
                10% { transform: translateX(0px); opacity: 1; }
                35% { transform: translateX(200px); opacity: 1; }
                36% { transform: translateX(200px); opacity: 0; }
                100% { transform: translateX(200px); opacity: 0; }
            }
            
            @keyframes pulse {
                0%, 34% { fill: #F0F8FF; stroke: #0d6efd; stroke-width: 2px; }
                35%, 65% { fill: #d0e5ff; stroke: #004ecc; stroke-width: 4px; }
                66%, 100% { fill: #F0F8FF; stroke: #0d6efd; stroke-width: 2px; }
            }

            @keyframes spin {
                0%, 34% { transform: rotate(0deg); }
                35%, 65% { transform: rotate(360deg); }
                66%, 100% { transform: rotate(360deg); }
            }
            
            @keyframes slideOut {
                0%, 65% { transform: translateX(0px); opacity: 0; }
                66% { transform: translateX(0px); opacity: 1; }
                90% { transform: translateX(210px); opacity: 1; }
                95% { transform: translateX(230px); opacity: 0; }
                100% { transform: translateX(230px); opacity: 0; }
            }
        </style>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
    </defs>
    
    <!-- Background -->
    <rect x="0" y="0" width="600" height="200" fill="#f8f9fa" rx="16" stroke="#e9ecef" stroke-width="2"/>
    
    <!-- Helper lines -->
    <path d="M 120 100 L 190 100" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
    <path d="M 410 100 L 480 100" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
    <text x="155" y="90" text-anchor="middle" font-size="12" fill="#adb5bd">전달(인자)</text>
    <text x="445" y="90" text-anchor="middle" font-size="12" fill="#adb5bd">반환(결과)</text>
    
    <!-- Input/Output Boxes -->
    <g id="inputGroup">
        <rect x="25" y="70" width="95" height="60" fill="#fff" stroke="#dc3545" stroke-width="2" rx="8"/>
        <text x="72.5" y="95" text-anchor="middle" font-size="14" fill="#dc3545">입력 (Input)</text>
        <text x="72.5" y="117" text-anchor="middle" font-size="13" fill="#6c757d" font-weight="normal">밀가루, 설탕</text>
    </g>
    
    <g id="outputGroup">
        <rect x="230" y="70" width="105" height="60" fill="#fff" stroke="#198754" stroke-width="2" rx="8"/>
        <text x="282.5" y="95" text-anchor="middle" font-size="14" fill="#198754">출력 (Output)</text>
        <text x="282.5" y="117" text-anchor="middle" font-size="13" fill="#6c757d" font-weight="normal">맛있는 쿠키</text>
    </g>
    
    <!-- Function Body (overlapping input and output to hide them during processing) -->
    <rect id="funcBody" x="200" y="40" width="200" height="120" rx="12"/>
    
    <text x="300" y="75" text-anchor="middle" font-size="18" fill="#0d6efd">기계 내부 (함수 몸체)</text>
    <text x="300" y="125" text-anchor="middle" font-size="13" fill="#0d6efd" font-family="'Consolas', monospace" font-weight="normal">def make_cookie():</text>
    <text x="300" y="145" text-anchor="middle" font-size="13" fill="#0d6efd" font-family="'Consolas', monospace" font-weight="normal">return cookie</text>

    <!-- Gear Icon centered around x=300, y=95 -->
    <g id="gear1" fill="#004ecc" opacity="0.6">
        <path d="M309.8 90.9l2.4-1.4c0.4-0.2 0.5-0.7 0.3-1.1l-1.6-2.8c-0.2-0.4-0.7-0.5-1.1-0.3l-2.4 1.4c-0.8-0.5-1.7-0.9-2.7-1.1v-2.8c0-0.4-0.4-0.8-0.8-0.8h-3.2c-0.4 0-0.8 0.4-0.8 0.8v2.8c-1 0.2-1.9 0.6-2.7 1.1l-2.4-1.4c-0.4-0.2-0.9-0.1-1.1 0.3l-1.6 2.8c-0.2 0.4-0.1 0.9 0.3 1.1l2.4 1.4c-0.1 0.9-0.1 1.9 0 2.8l-2.4 1.4c-0.4 0.2-0.5 0.7-0.3 1.1l1.6 2.8c0.2 0.4 0.7 0.5 1.1 0.3l2.4-1.4c0.8 0.5 1.7 0.9 2.7 1.1v2.8c0 0.4 0.4 0.8 0.8 0.8h3.2c0.4 0 0.8-0.4 0.8-0.8v-2.8c1-0.2 1.9-0.6 2.7-1.1l2.4 1.4c0.4 0.2 0.9 0.1 1.1-0.3l1.6-2.8c0.2-0.4 0.1-0.9-0.3-1.1l-2.4-1.4C309.9 92.8 309.9 91.8 309.8 90.9zM300 96c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4S302.2 96 300 96z"/>
    </g>

</svg>
