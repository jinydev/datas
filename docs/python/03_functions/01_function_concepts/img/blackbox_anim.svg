<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 20px; font-weight: bold; fill: #cdd6f4; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      /* Solid Black Box hiding implementation details */
      .box-black { fill: #11111b; stroke: #f38ba8; stroke-width: 4; rx: 10; filter: drop-shadow(0 0 15px rgba(243,139,168,0.5)); }
      .text-secret { fill: #f38ba8; font-weight: bold; font-size: 18px; text-anchor: middle; letter-spacing: 2px; }
      
      .arrow { fill: none; stroke: #bac2de; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 8 6; }
      
      @keyframes floatData {
        0% { transform: translate(150px, 180px) scale(0); opacity: 0; fill: #f5c2e7; }
        20% { transform: translate(150px, 180px) scale(1.5); opacity: 1; fill: #f5c2e7; } /* Appear Input */
        30% { transform: translate(320px, 180px) scale(1); opacity: 1; fill: #f5c2e7; } /* Enter Box */
        35% { transform: translate(400px, 180px) scale(0); opacity: 0; } /* Vanish inside box */
        
        65% { transform: translate(400px, 180px) scale(0); opacity: 0; } /* Processing silently */
        
        70% { transform: translate(480px, 180px) scale(1); opacity: 1; fill: #f9e2af; } /* Exit Box as something else */
        80% { transform: translate(650px, 180px) scale(1.5); opacity: 1; fill: #f9e2af; } /* Stop at Output */
        100% { transform: translate(650px, 180px) scale(1.5); opacity: 0; fill: #f9e2af; } /* Dissolve */
      }
      
      @keyframes spinQuestion {
        0%, 100% { transform: rotate(-10deg) scale(1); }
        50% { transform: rotate(10deg) scale(1.2); }
      }

      .particle-magic { animation: floatData 6s ease-in-out infinite; }
      .question-mark { animation: spinQuestion 2s ease-in-out infinite; transform-origin: 400px 180px; }
    </style>
    
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bac2de" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">블랙박스(Black Box) 관점: 구현 은닉(Information Hiding)</text>

  <!-- Input Side -->
  <text x="150" y="130" class="text-code" fill="#f5c2e7">Data Input</text>
  <text x="150" y="155" class="text-desc" fill="#f5c2e7">사용자가 던져주는 값</text>
  <path d="M 120,180 L 280,180" class="arrow" marker-end="url(#arrowhead)" />
  
  <!-- The Black Box -->
  <rect x="300" y="100" width="200" height="160" class="box-black" />
  <text x="400" y="80" class="text-code" fill="#f38ba8">Black Box Interface</text>
  
  <text x="400" y="150" class="text-secret" fill="#f38ba8">TOP SECRET</text>
  <text x="400" y="195" class="text-title question-mark" fill="#f38ba8" font-size="50">?</text>
  <text x="400" y="240" class="text-desc" fill="#f38ba8">"어떻게 만드는지는 묻지 마라"</text>
  
  <!-- Output Side -->
  <path d="M 520,180 L 680,180" class="arrow" marker-end="url(#arrowhead)" />
  <text x="650" y="130" class="text-code" fill="#f9e2af">Expected Output</text>
  <text x="650" y="155" class="text-desc" fill="#f9e2af">신뢰할 수 있는 결과물</text>

  <!-- Flowing Magic Particle -->
  <rect x="0" y="0" width="20" height="20" rx="4" class="particle-magic" />

  <text x="400" y="325" class="text-desc">호출하는 입장에서는 함수 속에서 무슨 복잡한 일이 벌어지는지(How) 알 필요가 없습니다. 그저 결과(What)만 받으면 됩니다.</text>
</svg>
