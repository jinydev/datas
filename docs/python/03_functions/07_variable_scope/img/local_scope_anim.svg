<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 그라데이션 및 필터 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#2a2a3c" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="350" rx="15" fill="url(#bgGrad)" stroke="#6272a4" stroke-width="2"/>

  <!-- 타이틀 -->
  <text x="400" y="35" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#f8f8f2" text-anchor="middle">Local vs Global Variable Lifespan</text>

  <!-- 바깥 세상 (Global Scope) 텍스트 영역 -->
  <text x="50" y="70" font-family="'Courier New', monospace" font-size="16" fill="#f1fa8c">
    x = 100  <tspan fill="#6272a4"># 전역 변수 (바깥세상 어딘가)</tspan>
  </text>
  <text x="50" y="290" font-family="'Courier New', monospace" font-size="16" fill="#f1fa8c">
    print(x) <tspan fill="#6272a4"># 출력: 100 (안전함!)</tspan>
  </text>
  
  <!-- 전역 변수 (Global Variable) 왕관 블록 (항상 존재함) -->
  <g transform="translate(600, 40)" filter="url(#shadow)">
    <rect x="-40" y="0" width="80" height="40" rx="8" fill="#ffb86c" stroke="#ff79c6" stroke-width="2"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#282a36" text-anchor="middle">x: 100</text>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff79c6" text-anchor="middle">👑 Global</text>
  </g>

  <!-- 함수 호출 시퀀스 박스 -->
  <rect x="50" y="100" width="700" height="150" fill="#44475a" rx="10" stroke="#f8f8f2" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="60" y="125" font-family="'Courier New', monospace" font-size="16" fill="#ff79c6">
    def secret_room():
  </text>
  <text x="100" y="155" font-family="'Courier New', monospace" font-size="16" fill="#f8f8f2">
    x = 10  <tspan fill="#6272a4"># 지역 변수 탄생 (동명이인)</tspan>
  </text>
  <text x="100" y="185" font-family="'Courier New', monospace" font-size="16" fill="#f8f8f2">
    print(x) <tspan fill="#6272a4"># 출력: 10 (내부에서만 10)</tspan>
  </text>
  <text x="60" y="235" font-family="'Courier New', monospace" font-size="16" fill="#ff79c6">
    secret_room() <tspan fill="#6272a4"># 함수 호출 및 폭파</tspan>
  </text>

  <!-- 지역 변수 (Local Variable) 텐트 블록 (애니메이션으로 생겼다 사라짐) -->
  <g transform="translate(600, 150)" filter="url(#shadow)">
    <rect x="-40" y="0" width="80" height="40" rx="8" fill="#8be9fd" stroke="#50fa7b" stroke-width="2"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#282a36" text-anchor="middle">x: 10</text>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#50fa7b" text-anchor="middle">👷 Local</text>
    
    <!-- 탄생(Popup)과 소멸(Explosion/Disappear) 애니메이션 -->
    <animate attributeName="opacity" values="0; 1; 1; 0; 0" begin="0s" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.7; 0.8; 1"/>
    <!-- 커졌다 작아지는 효과 (통통 튀는) -->
    <animateTransform attributeName="transform" type="scale" values="0; 1.1; 1; 1; 1.2; 0" begin="0s" dur="4s" repeatCount="indefinite" additive="sum" keyTimes="0; 0.1; 0.2; 0.7; 0.75; 0.8"/>
  </g>

  <!-- 애니메이션 화살표 (메모리 접근 불가 차폐막 시각화) -->
  <text x="600" y="130" font-family="'Courier New', monospace" font-size="14" fill="#ff5555" text-anchor="middle" font-weight="bold">
    <tspan x="600" dy="0">X 전혀 다름 X</tspan>
    <animate attributeName="opacity" values="0; 1; 1; 0; 0" begin="0s" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.7; 0.8; 1"/>
  </text>
  <line x1="600" y1="90" x2="600" y2="140" stroke="#ff5555" stroke-width="3" stroke-dasharray="8,4">
    <animate attributeName="opacity" values="0; 1; 1; 0; 0" begin="0s" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.7; 0.8; 1"/>
  </line>
  
  <text x="400" y="325" font-family="'Courier New', monospace" font-size="14" fill="#50fa7b" text-anchor="middle">
    함수 호출이 끝나면 밀실 안의 👷 Local x 는 흔적도 없이 파괴됩니다 (Garbage Collection).
  </text>

</svg>
