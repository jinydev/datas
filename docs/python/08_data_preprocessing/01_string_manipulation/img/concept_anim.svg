<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2f"/>
      <stop offset="100%" stop-color="#2a2a40"/>
    </linearGradient>

    <!-- Box Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Glowing Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bgGrad)" rx="15" ry="15"/>

  <!-- Title -->
  <text x="300" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    Python String Cleansing Pipeline
  </text>
  <text x="300" y="65" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">
    strip() -> replace() -> split()
  </text>

  <!-- Stage 1: Raw Data -->
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect width="140" height="80" rx="8" fill="#ff4d4d"/>
    <text x="70" y="30" font-family="monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">RAW DATA</text>
    <text x="70" y="55" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">"  $1,500\n  "</text>
    <circle cx="70" cy="90" r="10" fill="#ffff00" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow 1 (strip) -->
  <path d="M 200 140 L 240 140" stroke="#00d2ff" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="220" y="130" font-family="monospace" font-size="12" fill="#00d2ff" text-anchor="middle" font-weight="bold">.strip()</text>

  <!-- Stage 2: Stripped Data -->
  <g transform="translate(250, 100)" filter="url(#shadow)">
    <rect width="120" height="80" rx="8" fill="#ffaa00"/>
    <text x="60" y="30" font-family="monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">CLEAN EDGES</text>
    <text x="60" y="55" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">"$1,500"</text>
    <circle cx="60" cy="90" r="10" fill="#00ffcc" opacity="0.8">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow 2 (replace) -->
  <path d="M 380 140 L 440 140" stroke="#00ffcc" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="410" y="115" font-family="monospace" font-size="11" fill="#00ffcc" text-anchor="middle" font-weight="bold">.replace()</text>
  <text x="410" y="130" font-family="monospace" font-size="10" fill="#a0a0b0" text-anchor="middle">("$", "")</text>
  <text x="410" y="165" font-family="monospace" font-size="10" fill="#a0a0b0" text-anchor="middle">(",", "")</text>

  <!-- Stage 3: Final Data -->
  <g transform="translate(450, 100)" filter="url(#shadow)">
    <rect width="100" height="80" rx="8" fill="#00cc66"/>
    <text x="50" y="30" font-family="monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">PURE INT</text>
    <text x="50" y="55" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">1500</text>
    <circle cx="50" cy="90" r="10" fill="#00cc66" filter="url(#glow)">
      <animate attributeName="r" values="8;12;8" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow Def -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
  </defs>

  <!-- Pipeline code representation -->
  <rect x="50" y="240" width="500" height="40" rx="5" fill="#11111a" stroke="#4a4a6a" stroke-width="1"/>
  <text x="300" y="265" font-family="monospace" font-size="14" fill="#00ffcc" text-anchor="middle">
    clean_val = int(raw_data<tspan fill="#ff4d4d">.strip()</tspan><tspan fill="#ffaa00">.replace("$","")</tspan>.replace(",",""))
  </text>
</svg>
