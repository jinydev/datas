<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box { rx: 10; ry: 10; stroke-width: 2; fill: #313244; }
      
      .title { font-family: sans-serif; font-size: 26px; font-weight: bold; fill: #f38ba8; text-anchor: middle; }
      .subtitle { font-family: sans-serif; font-size: 16px; fill: #bac2de; text-anchor: middle; }
      
      .base-name { font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .base-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .number-text { font-family: monospace; font-size: 32px; font-weight: bold; text-anchor: middle; }
      .prefix { font-size: 20px; fill: #9399b2; }
      
      .box-10 { stroke: #f9e2af; }   /* Yellow */
      .box-2 { stroke: #cba6f7; }    /* Purple */
      .box-8 { stroke: #89b4fa; }    /* Blue */
      .box-16 { stroke: #a6e3a1; }   /* Green */
      
      /* Animation for the central connection lines */
      .line { fill: none; stroke: #585b70; stroke-width: 3; stroke-dasharray: 6,6; }
      @keyframes pulseLine {
        0% { stroke: #585b70; opacity: 0.5; }
        50% { stroke: #f38ba8; opacity: 1; }
        100% { stroke: #585b70; opacity: 0.5; }
      }
      .anim-line { animation: pulseLine 2s infinite; }
      
      .circle-center { fill: #f38ba8; }
      .center-text { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="45" class="title">파이썬의 4대 진법 (Number Bases)</text>
  <text x="400" y="70" class="subtitle">모두 똑같은 물리적 크기 '255'를 의미하지만, 그릇(진법)에 따라 모양이 바뀝니다.</text>

  <!-- Center Hub -->
  <circle cx="400" cy="270" r="40" class="circle-center" />
  <text x="400" y="265" class="center-text">물리적</text>
  <text x="400" y="285" class="center-text">크기</text>

  <!-- Connecting Lines -->
  <!-- Top: Base 10 -->
  <path d="M 400 190 L 400 230" class="line anim-line" />
  <!-- Bottom: Base 2 -->
  <path d="M 400 350 L 400 310" class="line anim-line" style="animation-delay: 0.5s;" />
  <!-- Left: Base 8 -->
  <path d="M 230 270 L 360 270" class="line anim-line" style="animation-delay: 1.0s;" />
  <!-- Right: Base 16 -->
  <path d="M 570 270 L 440 270" class="line anim-line" style="animation-delay: 1.5s;" />

  <!-- Base 10 (Decimal) - TOP -->
  <g transform="translate(275, 110)">
    <rect x="0" y="0" width="250" height="80" class="box box-10" />
    <text x="125" y="25" class="base-name" fill="#f9e2af">10진수 (Decimal)</text>
    <text x="125" y="45" class="base-desc">우리가 매일 쓰는 인간의 숫자</text>
    <text x="125" y="72" class="number-text" fill="#f8f8f2">255</text>
  </g>

  <!-- Base 2 (Binary) - BOTTOM -->
  <g transform="translate(275, 350)">
    <rect x="0" y="0" width="250" height="80" class="box box-2" />
    <text x="125" y="25" class="base-name" fill="#cba6f7">2진수 (Binary)</text>
    <text x="125" y="45" class="base-desc">컴퓨터 엔진을 위한 스위치</text>
    <text x="125" y="72" class="number-text" fill="#f8f8f2"><tspan class="prefix">0b</tspan>11111111</text>
  </g>

  <!-- Base 8 (Octal) - LEFT -->
  <g transform="translate(30, 230)">
    <rect x="0" y="0" width="200" height="80" class="box box-8" />
    <text x="100" y="25" class="base-name" fill="#89b4fa">8진수 (Octal)</text>
    <text x="100" y="45" class="base-desc">유닉스 서버 권한 관리</text>
    <text x="100" y="72" class="number-text" fill="#f8f8f2"><tspan class="prefix">0o</tspan>377</text>
  </g>

  <!-- Base 16 (Hexadecimal) - RIGHT -->
  <g transform="translate(570, 230)">
    <rect x="0" y="0" width="200" height="80" class="box box-16" />
    <text x="100" y="25" class="base-name" fill="#a6e3a1">16진수 (Hex)</text>
    <text x="100" y="45" class="base-desc">메모리 주소 / 웹 색상</text>
    <text x="100" y="72" class="number-text" fill="#f8f8f2"><tspan class="prefix">0x</tspan>FF</text>
  </g>

</svg>
