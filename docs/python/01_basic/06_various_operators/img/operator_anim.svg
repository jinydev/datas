<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <style>
      .text-label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .text-desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; fill: #666; }
      .text-code { font-family: 'Courier New', Courier, monospace; font-size: 28px; font-weight: bold; fill: #ffffff; }
      
      /* Conveyor belt animation */
      @keyframes moveBelt {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -20; }
      }
      .belt { stroke: #94a3b8; stroke-width: 4; stroke-dasharray: 10 10; animation: moveBelt 1s linear infinite; fill: none; }
      
      /* Input move animation */
      @keyframes moveInput1 {
        0%, 10% { transform: translate(50px, 150px); opacity: 1; }
        40%, 100% { transform: translate(300px, 150px); opacity: 0; }
      }
      @keyframes moveInput2 {
        0%, 10% { transform: translate(150px, 150px); opacity: 1; }
        40%, 100% { transform: translate(350px, 150px); opacity: 0; }
      }
      
      .input-block-1 { animation: moveInput1 4s ease-in infinite; }
      .input-block-2 { animation: moveInput2 4s ease-in infinite; }
      
      /* Machine Process Animation */
      @keyframes processMachine {
        0%, 40% { fill: #3b82f6; transform: scale(1); }
        45% { fill: #2563eb; transform: scale(1.05); }
        50%, 100% { fill: #3b82f6; transform: scale(1); }
      }
      .machine-body { fill: #3b82f6; rx: 15; transform-origin: 400px 150px; animation: processMachine 4s ease-in infinite; }
      
      @keyframes spinGears {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .gear { transform-origin: center; animation: spinGears 2s linear infinite; }
      
      /* Output Move Animation */
      @keyframes moveOutput {
        0%, 50% { transform: translate(500px, 150px); opacity: 0; }
        60% { transform: translate(500px, 150px); opacity: 1; }
        90%, 100% { transform: translate(700px, 150px); opacity: 1; }
      }
      .output-block { animation: moveOutput 4s ease-out infinite; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="10" />

  <!-- Titles -->
  <text x="400" y="40" class="text-label" text-anchor="middle" font-size="24">연산자 (Operator) 동작 원리</text>
  <text x="400" y="65" class="text-desc" text-anchor="middle">피연산자(재료)를 받아 연산자(기계)가 가공하여 결과값(생산품)을 만들어냅니다.</text>

  <!-- Conveyor Belts -->
  <path d="M 0,180 L 300,180" class="belt" />
  <path d="M 500,180 L 800,180" class="belt" />

  <!-- Inputs (Operands) -->
  <g class="input-block-1">
    <rect x="-30" y="-30" width="60" height="60" rx="8" fill="#f59e0b" />
    <text x="0" y="8" class="text-code" text-anchor="middle">5</text>
    <text x="0" y="50" class="text-desc" text-anchor="middle">피연산자1</text>
  </g>
  <g class="input-block-2">
    <rect x="-30" y="-30" width="60" height="60" rx="8" fill="#10b981" />
    <text x="0" y="8" class="text-code" text-anchor="middle">3</text>
    <text x="0" y="50" class="text-desc" text-anchor="middle">피연산자2</text>
  </g>

  <!-- The Machine (Operator) -->
  <g transform="translate(400, 150)">
    <rect x="-70" y="-60" width="140" height="120" class="machine-body" />
    <text x="0" y="8" class="text-code" text-anchor="middle" font-size="48">+</text>
    <text x="0" y="-75" class="text-label" text-anchor="middle">연산자 (Operator)</text>
    
    <!-- Gears inside/on machine -->
    <g transform="translate(-40, -30) scale(0.6)">
      <path d="M 0,-20 L 5,-15 L 15,-15 L 20,-5 L 20,5 L 15,15 L 5,15 L 0,20 L -5,15 L -15,15 L -20,5 L -20,-5 L -15,-15 L -5,-15 Z" fill="#cbd5e1" class="gear" />
      <circle cx="0" cy="0" r="8" fill="#3b82f6" />
    </g>
    <g transform="translate(40, 30) scale(0.6)">
      <path d="M 0,-20 L 5,-15 L 15,-15 L 20,-5 L 20,5 L 15,15 L 5,15 L 0,20 L -5,15 L -15,15 L -20,5 L -20,-5 L -15,-15 L -5,-15 Z" fill="#cbd5e1" class="gear" style="animation-direction: reverse;" />
      <circle cx="0" cy="0" r="8" fill="#3b82f6" />
    </g>
  </g>

  <!-- Output (Result) -->
  <g class="output-block">
    <rect x="-30" y="-30" width="60" height="60" rx="8" fill="#8b5cf6" />
    <text x="0" y="8" class="text-code" text-anchor="middle">8</text>
    <text x="0" y="50" class="text-desc" text-anchor="middle">결과값</text>
  </g>

  <!-- Labels under belts -->
  <text x="150" y="220" class="text-desc" text-anchor="middle" font-style="italic">입력 (Input)</text>
  <text x="650" y="220" class="text-desc" text-anchor="middle" font-style="italic">출력 (Output)</text>
  
  <rect x="70" y="270" width="660" height="50" rx="5" fill="#e2e8f0" />
  <text x="400" y="302" class="text-desc" text-anchor="middle" font-size="18">
    <tspan font-weight="bold" fill="#f59e0b">5</tspan> 
    <tspan font-weight="bold" fill="#3b82f6"> + </tspan> 
    <tspan font-weight="bold" fill="#10b981">3</tspan> = 
    <tspan font-weight="bold" fill="#8b5cf6">8</tspan>
  </text>
</svg>
