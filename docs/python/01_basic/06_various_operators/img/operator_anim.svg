<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <style>
      .box { rx: 5; ry: 5; fill: #1e1e1e; stroke: #555; stroke-width: 2; }
      .obj-box { rx: 50; ry: 50; fill: #282a36; stroke: #ffb86c; stroke-width: 3; }
      .title { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-code { font-family: 'Courier New', monospace; font-size: 24px; fill: #f8f8f2; font-weight: bold; }
      .text-result { font-family: 'Courier New', monospace; font-size: 32px; fill: #50fa7b; font-weight: bold; }
      .text-op { font-family: 'Courier New', monospace; font-size: 40px; fill: #ff79c6; font-weight: bold; }
      
      @keyframes moveOperand1 {
        0% { transform: translate(0, 0); opacity: 0; }
        10% { opacity: 1; }
        40%, 100% { transform: translate(250px, 0); opacity: 0; }
      }
      @keyframes moveOperand2 {
        0% { transform: translate(0, 0); opacity: 0; }
        10% { opacity: 1; }
        40%, 100% { transform: translate(-250px, 0); opacity: 0; }
      }
      
      @keyframes machineProcess {
        0%, 35% { transform: scale(1); fill: #44475a; }
        40% { transform: scale(1.1); fill: #ff79c6; }
        45%, 100% { transform: scale(1); fill: #44475a; }
      }
      
      @keyframes moveResult {
        0%, 45% { transform: translate(0, 0); opacity: 0; }
        46% { opacity: 1; }
        80%, 100% { transform: translate(0, 100px); opacity: 1; }
      }

      .op1 { animation: moveOperand1 4s infinite; }
      .op2 { animation: moveOperand2 4s infinite; }
      .machine { animation: machineProcess 4s infinite; }
      .result { animation: moveResult 4s infinite; }
    </style>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">Operator &amp; Operands 컨베이어 벨트</text>

  <!-- 컨베이어 벨트 라인 -->
  <line x1="100" y1="120" x2="330" y2="120" stroke="#8be9fd" stroke-width="4" stroke-dasharray="10,5" />
  <line x1="700" y1="120" x2="470" y2="120" stroke="#8be9fd" stroke-width="4" stroke-dasharray="10,5" />
  
  <line x1="400" y1="180" x2="400" y2="280" stroke="#50fa7b" stroke-width="4" stroke-dasharray="10,5" />

  <!-- 피연산자 (Operands) -->
  <g transform="translate(100, 90)">
    <g class="op1">
      <circle cx="30" cy="30" r="25" fill="#6272a4" stroke="#f1fa8c" stroke-width="3" />
      <text x="30" y="38" class="text-code" text-anchor="middle">5</text>
    </g>
    <text x="30" y="-10" font-family="sans-serif" fill="#aaa" text-anchor="middle">피연산자 (Operand)</text>
  </g>

  <g transform="translate(640, 90)">
    <g class="op2">
      <circle cx="30" cy="30" r="25" fill="#6272a4" stroke="#f1fa8c" stroke-width="3" />
      <text x="30" y="38" class="text-code" text-anchor="middle">3</text>
    </g>
    <text x="30" y="-10" font-family="sans-serif" fill="#aaa" text-anchor="middle">피연산자 (Operand)</text>
  </g>

  <!-- 연산자 기계 (Operator Machine) -->
  <g transform="translate(350, 70)">
    <rect x="0" y="0" width="100" height="100" rx="10" ry="10" fill="#44475a" stroke="#bd93f9" stroke-width="4" class="machine" />
    <text x="50" y="65" class="text-op" text-anchor="middle">+</text>
    <text x="50" y="130" font-family="sans-serif" fill="#ff79c6" font-weight="bold" text-anchor="middle">연산자 (Operator)</text>
  </g>

  <!-- 파이프 배출구 -->
  <polygon points="380,170 420,170 400,190" fill="#bd93f9" />

  <!-- 결과물 (Product) -->
  <g transform="translate(350, 70)" class="result">
    <rect x="0" y="0" width="100" height="60" rx="30" ry="30" fill="#282a36" stroke="#50fa7b" stroke-width="4" />
    <text x="50" y="40" class="text-result" text-anchor="middle">8</text>
  </g>

</svg>
