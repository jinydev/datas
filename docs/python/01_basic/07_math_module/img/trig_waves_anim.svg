<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .axis { stroke: #45475a; stroke-width: 2; }
      .grid { stroke: #313244; stroke-width: 1; stroke-dasharray: 4; }
      
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-label { font-family: monospace; font-size: 14px; fill: #a6adc8; }
      .text-math { font-family: serif; font-size: 18px; font-style: italic; fill: #cba6f7; }
      
      .sine { fill: none; stroke: #89b4fa; stroke-width: 4; opacity: 0.9; }
      .cosine { fill: none; stroke: #f9e2af; stroke-width: 4; stroke-dasharray: 8 4; opacity: 0.9; }
      
      /* Animation */
      @keyframes dashAnim {
        to { stroke-dashoffset: -1000; }
      }
      .anim-wave {
        stroke-dasharray: 1000;
        stroke-dashoffset: 0;
        animation: dashAnim 10s linear infinite;
      }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="40" class="text-title">math 모듈 삼각함수 파동 (Sine &amp; Cosine)</text>

  <g transform="translate(60, 180)">
    <!-- Grid -->
    <line x1="0" y1="-100" x2="680" y2="-100" class="grid" />
    <line x1="0" y1="100" x2="680" y2="100" class="grid" />
    
    <line x1="170" y1="-100" x2="170" y2="100" class="grid" />
    <line x1="340" y1="-100" x2="340" y2="100" class="grid" />
    <line x1="510" y1="-100" x2="510" y2="100" class="grid" />
    <line x1="680" y1="-100" x2="680" y2="100" class="grid" />

    <!-- Axes -->
    <line x1="0" y1="0" x2="700" y2="0" class="axis" marker-end="url(#arrow)" />
    <line x1="0" y1="120" x2="0" y2="-120" class="axis" marker-end="url(#arrow)" />

    <!-- Axis Labels -->
    <text x="710" y="5" class="text-label">Angle (θ)</text>
    <text x="-15" y="-130" class="text-label">Amplitude</text>
    
    <text x="-25" y="-95" class="text-label">1</text>
    <text x="-35" y="105" class="text-label">-1</text>
    
    <text x="160" y="25" class="text-label" fill="#f38ba8">90° (π/2)</text>
    <text x="330" y="25" class="text-label" fill="#f38ba8">180° (π)</text>
    <text x="495" y="25" class="text-label" fill="#f38ba8">270° (3π/2)</text>
    <text x="670" y="25" class="text-label" fill="#f38ba8">360° (2π)</text>

    <!-- Waves -->
    <!-- Sine starts at 0, goes to 1 at π/2 (170px), 0 at π(340px), -1 at 3π/2(510px), 0 at 2π(680px) -->
    <path d="M 0,0 C 65,-100 105,-100 170,-100 C 235,-100 275,0 340,0 C 405,0 445,100 510,100 C 575,100 615,0 680,0" class="sine anim-wave" />
    
    <!-- Cosine starts at 1, goes to 0 at π/2, -1 at π, 0 at 3π/2, 1 at 2π -->
    <path d="M 0,-100 C 65,-100 105,0 170,0 C 235,0 275,100 340,100 C 405,100 445,0 510,0 C 575,0 615,-100 680,-100" class="cosine anim-wave" />

  </g>

  <!-- Legend -->
  <g transform="translate(600, 30)">
    <rect x="0" y="0" width="160" height="70" class="bg" stroke="#45475a" stroke-width="1" />
    <line x1="15" y1="20" x2="45" y2="20" class="sine" />
    <text x="55" y="25" class="text-label" fill="#89b4fa">math.sin()</text>
    
    <line x1="15" y1="50" x2="45" y2="50" class="cosine" />
    <text x="55" y="55" class="text-label" fill="#f9e2af">math.cos()</text>
  </g>

  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#bac2de" />
  </marker>
</svg>
