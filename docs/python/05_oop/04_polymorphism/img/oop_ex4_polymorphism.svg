<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 16px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .box { fill: #a6e3a1; rx: 10; stroke: #cdd6f4; stroke-width: 2; }
      
      @keyframes dogBark { 0%, 20% { transform: scale(1); } 30%, 40% { transform: scale(1.1); fill: #f38ba8; } 50%, 100% { transform: scale(1); fill: #a6e3a1; } }
      .anim-bark { animation: dogBark 3s infinite; transform-origin: 250px 150px; }
      
      @keyframes catMeow { 0%, 50% { transform: scale(1); fill: #a6e3a1; } 60%, 70% { transform: scale(1.1); fill: #89b4fa; } 80%, 100% { transform: scale(1); fill: #a6e3a1; } }
      .anim-meow { animation: catMeow 3s infinite; transform-origin: 550px 150px; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 4: 다형성 (Polymorphism) - "동일한 명령, 위대한 각자의 행동"</text>
  <text x="400" y="70" class="text-title" fill="#f9e2af" font-size="16px">for animal in [dog, cat]: animal.eat()</text>

  <!-- Dog -->
  <g class="anim-bark">
    <rect x="180" y="120" width="140" height="60" class="box" />
    <text x="250" y="145" class="text-code">Dog.eat()</text>
    <text x="250" y="165" class="text-code" fill="#1e1e2e" font-size="14px">"뼈다귀를 먹음 🍖"</text>
  </g>

  <!-- Cat -->
  <g class="anim-meow">
    <rect x="480" y="120" width="140" height="60" class="box" />
    <text x="550" y="145" class="text-code">Cat.eat()</text>
    <text x="550" y="165" class="text-code" fill="#1e1e2e" font-size="14px">"생선을 먹음 🐟"</text>
  </g>

  <!-- Commands -->
  <path d="M 400 90 L 250 110" fill="none" stroke="#f9e2af" stroke-width="3" stroke-dasharray="5" />
  <path d="M 400 90 L 550 110" fill="none" stroke="#f9e2af" stroke-width="3" stroke-dasharray="5" />
</svg>
