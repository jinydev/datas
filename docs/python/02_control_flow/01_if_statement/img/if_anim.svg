<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&amp;display=swap');
            text { font-family: 'Pretendard', sans-serif; font-weight: 600; }
            
            /* The moving dot */
            #dot {
                animation: flow 6s infinite ease-in-out;
            }
            
            /* Path glows */
            #truePath { animation: trueGlow 6s infinite; }
            #falsePath { animation: falseGlow 6s infinite; }
            
            /* Action block glows */
            #trueBlock { animation: trueBlockGlow 6s infinite; }
            #falseBlock { animation: falseBlockGlow 6s infinite; }

            /* Diamond glow */
            #conditionDiamond { animation: diamondGlow 6s infinite; }

            /* 
               Animation timeline (6 seconds total):
               0-1s: Dot moves from top(300, 20) to diamond (300, 80)
               1-2s: Diamond evaluates. (True sequence)
               2-3s: Dot moves to True block (420, 130).
               3-3.01s: Dot resets to top.
               3-4s: Dot moves from top(300, 20) to diamond (300, 80)
               4-5s: Diamond evaluates. (False sequence)
               5-6s: Dot moves to False block (180, 130).
               6s: Reset
            */

            @keyframes flow {
                0% { transform: translate(300px, 10px); opacity: 0; fill: #adb5bd; }
                5% { transform: translate(300px, 10px); opacity: 1; fill: #adb5bd; }
                15% { transform: translate(300px, 70px); opacity: 1; fill: #198754; } /* Inside diamond */
                25% { transform: translate(300px, 70px); opacity: 1; fill: #198754; } /* Waiting */
                35%, 48% { transform: translate(450px, 160px); opacity: 1; fill: #198754; } /* Move to True */
                49%, 49.9% { transform: translate(450px, 160px); opacity: 0; fill: #198754; } /* Hide */
                
                50% { transform: translate(300px, 10px); opacity: 0; fill: #adb5bd; } /* Reset */
                55% { transform: translate(300px, 10px); opacity: 1; fill: #adb5bd; }
                65% { transform: translate(300px, 70px); opacity: 1; fill: #dc3545; } /* Inside diamond */
                75% { transform: translate(300px, 70px); opacity: 1; fill: #dc3545; } /* Waiting */
                85%, 98% { transform: translate(150px, 160px); opacity: 1; fill: #dc3545; } /* Move to False */
                99%, 100% { transform: translate(150px, 160px); opacity: 0; fill: #dc3545; } /* Hide */
            }

            @keyframes diamondGlow {
                0%, 15% { stroke: #0d6efd; fill: #F0F8FF; }
                15.1%, 49.9% { stroke: #198754; fill: #e8f5e9; } /* True evaluation */
                50%, 65% { stroke: #0d6efd; fill: #F0F8FF; }
                65.1%, 100% { stroke: #dc3545; fill: #ffebee; } /* False evaluation */
            }

            @keyframes trueGlow {
                0%, 25% { stroke: #adb5bd; stroke-width: 2px; }
                25.1%, 49.9% { stroke: #198754; stroke-width: 4px; }
                50%, 100% { stroke: #adb5bd; stroke-width: 2px; }
            }

            @keyframes falseGlow {
                0%, 75% { stroke: #adb5bd; stroke-width: 2px; }
                75.1%, 100% { stroke: #dc3545; stroke-width: 4px; }
            }

            @keyframes trueBlockGlow {
                0%, 30% { stroke: #198754; fill: #fff; transform: scale(1); transform-origin: 450px 160px;}
                35%, 45% { stroke: #198754; fill: #e8f5e9; transform: scale(1.05); transform-origin: 450px 160px;}
                50%, 100% { stroke: #198754; fill: #fff; transform: scale(1); transform-origin: 450px 160px;}
            }

            @keyframes falseBlockGlow {
                0%, 80% { stroke: #dc3545; fill: #fff; transform: scale(1); transform-origin: 150px 160px;}
                85%, 95% { stroke: #dc3545; fill: #ffebee; transform: scale(1.05); transform-origin: 150px 160px;}
                100% { stroke: #dc3545; fill: #fff; transform: scale(1); transform-origin: 150px 160px;}
            }
        </style>
        <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#198754" />
        </marker>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc3545" />
        </marker>
    </defs>
    
    <!-- Background -->
    <rect x="0" y="0" width="600" height="250" fill="#f8f9fa" rx="16" stroke="#e9ecef" stroke-width="2"/>
    
    <!-- Initial Line -->
    <path d="M 300 20 L 300 40" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- True Path (Right) -->
    <path id="truePath" d="M 360 80 L 450 80 L 450 120" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="405" y="70" text-anchor="middle" font-size="14" fill="#198754">참 (True)</text>

    <!-- False Path (Left) -->
    <path id="falsePath" d="M 240 80 L 150 80 L 150 120" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    <text x="195" y="70" text-anchor="middle" font-size="14" fill="#dc3545">거짓 (False)</text>
    
    <!-- True Block -->
    <g id="trueBlock">
        <rect x="390" y="130" width="120" height="60" rx="8" stroke-width="2"/>
        <text x="450" y="157" text-anchor="middle" font-size="15" fill="#198754">if 블록 실행</text>
        <text x="450" y="175" text-anchor="middle" font-size="12" fill="#6c757d" font-weight="normal">(명령 수행)</text>
    </g>

    <!-- False Block -->
    <g id="falseBlock">
        <rect x="90" y="130" width="120" height="60" rx="8" stroke-width="2"/>
        <text x="150" y="157" text-anchor="middle" font-size="15" fill="#dc3545">else 블록 실행</text>
        <text x="150" y="175" text-anchor="middle" font-size="12" fill="#6c757d" font-weight="normal">(건너뜀 / 대안)</text>
    </g>

    <!-- Condition Diamond -->
    <g>
        <polygon id="conditionDiamond" points="300,40 370,80 300,120 230,80" stroke-width="2"/>
        <text x="300" y="77" text-anchor="middle" font-size="15" fill="#0d6efd">조건식 평가</text>
        <text x="300" y="95" text-anchor="middle" font-size="12" fill="#6c757d" font-family="'Consolas', monospace" font-weight="normal">(n % 2 == 0)</text>
    </g>

    <!-- The Moving Data Dot -->
    <circle id="dot" cx="0" cy="0" r="10"/>

</svg>
