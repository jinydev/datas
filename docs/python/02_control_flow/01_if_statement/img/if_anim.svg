<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box { fill: #313244; stroke: #45475a; stroke-width: 3; rx: 10; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 20px; font-weight: bold; fill: #cdd6f4; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 16px; fill: #a6adc8; text-anchor: middle; }
      .text-bool { font-family: monospace; font-size: 22px; font-weight: bold; }
      
      .line { fill: none; stroke: #45475a; stroke-width: 6; stroke-dasharray: 10 5; }
      .line-true { fill: none; stroke: #a6e3a1; stroke-width: 6; stroke-dasharray: 10 5; }
      .line-false { fill: none; stroke: #f38ba8; stroke-width: 6; stroke-dasharray: 10 5; }
      
      .ball { fill: #89b4fa; filter: drop-shadow(0 0 10px #89b4fa); }
      
      /* Animation */
      @keyframes moveBall {
        0% { transform: translate(150px, 80px); opacity: 1; }
        25% { transform: translate(400px, 80px); opacity: 1; }
        
        /* Stop at condition gate */
        35% { transform: translate(400px, 140px); opacity: 1; }
        45% { transform: translate(400px, 140px); opacity: 1; }
        
        /* Branch True (Score 85 >= 80) */
        50% { transform: translate(200px, 300px); opacity: 1; }
        60% { transform: translate(200px, 420px); opacity: 1; }
        70% { transform: translate(200px, 500px); opacity: 0; }
        
        /* Reset and fade out False branch */
        100% { transform: translate(200px, 500px); opacity: 0; }
      }
      
      @keyframes pulseGate {
        0%, 100% { stroke: #f9e2af; stroke-width: 4; }
        50% { stroke: #f9e2af; stroke-width: 8; filter: drop-shadow(0 0 10px #f9e2af); }
      }
      
      @keyframes lightUpTrue {
        0%, 45%, 100% { fill: #313244; }
        48%, 65% { fill: rgba(166, 227, 161, 0.3); stroke: #a6e3a1; }
      }
      
      .anim-ball { animation: moveBall 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .anim-gate { animation: pulseGate 4s ease-in-out infinite; }
      .anim-box-true { animation: lightUpTrue 4s ease-in-out infinite; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#45475a" />
    </marker>
    <marker id="arrow-true" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1" />
    </marker>
    <marker id="arrow-false" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f38ba8" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">조건문 if 의 논리 흐름 (Control Flow)</text>

  <!-- Input Data Node -->
  <rect x="50" y="60" width="200" height="40" class="box" fill="#45475a"/>
  <text x="150" y="87" class="text-code" fill="#f5e0dc">Data: score = 85</text>
  <path d="M 250,80 L 400,80 L 400,120" class="line" marker-end="url(#arrow)" />

  <!-- Condition Gate (Diamond shape approximation with polygon) -->
  <polygon points="400,130 550,180 400,230 250,180" class="box anim-gate" />
  <text x="400" y="175" class="text-code">if score >= 80 :</text>
  <text x="400" y="200" class="text-desc">점수가 80 이상인가?</text>
  
  <!-- True Path -->
  <path d="M 250,180 L 200,180 L 200,270" class="line-true" marker-end="url(#arrow-true)" />
  <text x="240" y="160" class="text-bool" fill="#a6e3a1">True (참)</text>
  
  <rect x="80" y="280" width="240" height="120" class="box anim-box-true" />
  <text x="200" y="320" class="text-code">print("합격")</text>
  <text x="200" y="350" class="text-desc">(if 블록 내부 실행)</text>
  
  <path d="M 200,400 L 200,450 L 400,450" class="line-true" marker-end="url(#arrow)" />

  <!-- False Path -->
  <path d="M 550,180 L 600,180 L 600,270" class="line-false" marker-end="url(#arrow-false)" />
  <text x="560" y="160" class="text-bool" fill="#f38ba8">False (거짓)</text>
  
  <rect x="480" y="280" width="240" height="120" class="box" stroke-dasharray="5 5" />
  <text x="600" y="320" class="text-code" fill="#7f849c">print("불합격")</text>
  <text x="600" y="350" class="text-desc" fill="#7f849c">(else 블록 건너뜀)</text>
  
  <path d="M 600,400 L 600,450 L 400,450" class="line-false" />

  <!-- End Node -->
  <rect x="300" y="450" width="200" height="40" class="box" fill="#181825"/>
  <text x="400" y="477" class="text-code">다음 코드 라인 실행...</text>

  <!-- Animated Data Ball -->
  <circle cx="0" cy="0" r="12" class="ball anim-ball" />
  
</svg>
