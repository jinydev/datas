<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&amp;display=swap');
            text { font-family: 'Pretendard', sans-serif; font-weight: 600; }
            
            #doc {
                animation: sortingFlow 9s infinite cubic-bezier(0.4, 0, 0.2, 1);
            }

            /* Tracks highlight */
            #case1Path { animation: track1Glow 9s infinite; }
            #case2Path { animation: track2Glow 9s infinite; }
            #case3Path { animation: track3Glow 9s infinite; }
            
            #block1 { animation: block1Glow 9s infinite; }
            #block2 { animation: block2Glow 9s infinite; }
            #block3 { animation: block3Glow 9s infinite; }

            /* Pattern logic timeline 
               0-1s: Enter and pause at switch
               1-2s: Match Case 1 (apple)
               2-3s: Move to Case 1. Reset.
               
               3-4s: Enter and pause at switch
               4-5s: Match Case 2 (banana)
               5-6s: Move to Case 2. Reset.
               
               6-7s: Enter and pause at switch
               7-8s: Match default (_)
               8-9s: Move to Case _. Reset.
            */

            @keyframes sortingFlow {
                /* Sequence 1: Apple */
                0% { transform: translate(60px, 140px); fill: #dc3545; opacity: 0; }
                5% { transform: translate(60px, 140px); fill: #dc3545; opacity: 1; }
                11%, 18% { transform: translate(180px, 140px); fill: #dc3545; opacity: 1; }
                28%, 32% { transform: translate(400px, 60px); fill: #dc3545; opacity: 1; }
                33%, 33.3% { transform: translate(400px, 60px); fill: #dc3545; opacity: 0; }

                /* Sequence 2: Banana */
                33.4% { transform: translate(60px, 140px); fill: #ffc107; opacity: 0; }
                38% { transform: translate(60px, 140px); fill: #ffc107; opacity: 1; }
                44%, 51% { transform: translate(180px, 140px); fill: #ffc107; opacity: 1; }
                61%, 65% { transform: translate(400px, 140px); fill: #ffc107; opacity: 1; }
                66%, 66.6% { transform: translate(400px, 140px); fill: #ffc107; opacity: 0; }

                /* Sequence 3: Mango (Default) */
                66.7% { transform: translate(60px, 140px); fill: #6c757d; opacity: 0; }
                71% { transform: translate(60px, 140px); fill: #6c757d; opacity: 1; }
                77%, 84% { transform: translate(180px, 140px); fill: #6c757d; opacity: 1; }
                94%, 98% { transform: translate(400px, 220px); fill: #6c757d; opacity: 1; }
                99%, 100% { transform: translate(400px, 220px); fill: #6c757d; opacity: 0; }
            }

            @keyframes track1Glow {
                0%, 15% { stroke: #adb5bd; stroke-width: 2px; }
                15%, 33% { stroke: #dc3545; stroke-width: 4px; }
                34%, 100% { stroke: #adb5bd; stroke-width: 2px; }
            }
            @keyframes track2Glow {
                0%, 48% { stroke: #adb5bd; stroke-width: 2px; }
                48%, 66% { stroke: #ffc107; stroke-width: 4px; }
                67%, 100% { stroke: #adb5bd; stroke-width: 2px; }
            }
            @keyframes track3Glow {
                0%, 81% { stroke: #adb5bd; stroke-width: 2px; }
                81%, 99% { stroke: #6c757d; stroke-width: 4px; }
                100% { stroke: #adb5bd; stroke-width: 2px; }
            }

            @keyframes block1Glow {
                0%, 25% { stroke: #dc3545; fill: #fff; transform: scale(1); transform-origin: 400px 60px; }
                26%, 33% { stroke: #dc3545; fill: #ffebee; transform: scale(1.05); transform-origin: 400px 60px; }
                34%, 100% { stroke: #dc3545; fill: #fff; transform: scale(1); transform-origin: 400px 60px; }
            }
            @keyframes block2Glow {
                0%, 58% { stroke: #ffc107; fill: #fff; transform: scale(1); transform-origin: 400px 140px; }
                59%, 66% { stroke: #ffc107; fill: #fff8e1; transform: scale(1.05); transform-origin: 400px 140px; }
                67%, 100% { stroke: #ffc107; fill: #fff; transform: scale(1); transform-origin: 400px 140px; }
            }
            @keyframes block3Glow {
                0%, 91% { stroke: #6c757d; fill: #fff; transform: scale(1); transform-origin: 400px 220px; }
                92%, 99% { stroke: #6c757d; fill: #f8f9fa; transform: scale(1.05); transform-origin: 400px 220px; }
                100% { stroke: #6c757d; fill: #fff; transform: scale(1); transform-origin: 400px 220px; }
            }

        </style>
        <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc3545" />
        </marker>
        <marker id="arrowYellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffc107" />
        </marker>
        <marker id="arrowDarkGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c757d" />
        </marker>
    </defs>
    
    <!-- Background -->
    <rect x="0" y="0" width="600" height="280" fill="#f8f9fa" rx="16" stroke="#e9ecef" stroke-width="2"/>
    
    <!-- Entry Label -->
    <text x="60" y="100" text-anchor="middle" font-size="14" fill="#0d6efd">match 변수</text>
    <path d="M 60 110 L 60 140" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- Central Hub (Switch) -->
    <rect x="150" y="110" width="60" height="60" rx="30" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
    <text x="180" y="145" text-anchor="middle" font-size="12" fill="#6c757d">분기점</text>

    <!-- Paths to Cases -->
    <!-- Case 1: Apple -->
    <path id="case1Path" d="M 210 125 L 260 60 L 320 60" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    <text x="260" y="45" text-anchor="middle" font-size="13" fill="#dc3545" font-family="'Consolas', monospace" font-weight="normal">case 'apple':</text>

    <!-- Case 2: Banana -->
    <path id="case2Path" d="M 210 140 L 320 140" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowYellow)"/>
    <text x="260" y="130" text-anchor="middle" font-size="13" fill="#ffc107" font-family="'Consolas', monospace" font-weight="normal">case 'banana':</text>

    <!-- Case _: Default -->
    <path id="case3Path" d="M 210 155 L 260 220 L 320 220" stroke="#adb5bd" stroke-width="2" fill="none" marker-end="url(#arrowDarkGray)"/>
    <text x="260" y="240" text-anchor="middle" font-size="13" fill="#6c757d" font-family="'Consolas', monospace" font-weight="normal">case _: (나머지)</text>

    <!-- Action Blocks -->
    <g id="block1">
        <rect x="340" y="40" width="120" height="40" rx="8" stroke-width="2"/>
        <text x="400" y="65" text-anchor="middle" font-size="14" fill="#dc3545">사과 로직 실행</text>
    </g>

    <g id="block2">
        <rect x="340" y="120" width="120" height="40" rx="8" stroke-width="2"/>
        <text x="400" y="145" text-anchor="middle" font-size="14" fill="#ffc107">바나나 로직 실행</text>
    </g>

    <g id="block3">
        <rect x="340" y="200" width="120" height="40" rx="8" stroke-width="2"/>
        <text x="400" y="225" text-anchor="middle" font-size="14" fill="#6c757d">기본 로직 실행</text>
    </g>

    <!-- The Moving Data Package -->
    <rect id="doc" x="-15" y="-15" width="30" height="30" rx="6" />

</svg>
