<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 16px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .box { fill: #b4befe; rx: 10; stroke: #cdd6f4; stroke-width: 4; }
      .shield { fill: transparent; stroke: #a6e3a1; stroke-width: 6; stroke-dasharray: 10; opacity: 0.8; }
      
      @keyframes popIn { 0%, 100% { transform: scale(0); opacity: 0; } 10%, 90% { transform: scale(1); opacity: 1; } }
      @keyframes rotateShield { 100% { transform: rotate(360deg); } }
      .item1 { animation: popIn 5s infinite; transform-origin: 250px 150px; }
      .item2 { animation: popIn 5s infinite; transform-origin: 400px 150px; animation-delay: 1s; }
      .item3 { animation: popIn 5s infinite; transform-origin: 550px 150px; animation-delay: 2s; }
      .shield-rot { animation: rotateShield 10s linear infinite; transform-origin: 400px 150px; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 1: 튜플 소환 (소괄호 다이아몬드 상자)</text>
  <text x="400" y="70" class="text-title" fill="#a6e3a1">tp = (10, 20, 30)</text>

  <!-- Items -->
  <g class="item1">
    <rect x="200" y="120" width="100" height="60" class="box" />
    <text x="250" y="155" class="text-code">10</text>
  </g>
  
  <g class="item2">
    <rect x="350" y="120" width="100" height="60" class="box" />
    <text x="400" y="155" class="text-code">20</text>
  </g>

  <g class="item3">
    <rect x="500" y="120" width="100" height="60" class="box" />
    <text x="550" y="155" class="text-code">30</text>
  </g>

  <!-- Protective Energy Shield -->
  <circle cx="400" cy="150" r="140" class="shield shield-rot" />
  <text x="400" y="240" class="text-title" fill="#a6e3a1">Unbreakable Diamond Shield Active</text>
</svg>
