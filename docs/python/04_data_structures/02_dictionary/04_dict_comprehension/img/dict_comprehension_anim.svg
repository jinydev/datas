<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#313244" />
    </linearGradient>
    <style>
      .title { font-family: 'Consolas', monospace; font-size: 20px; font-weight: bold; fill: #bac2de; }
      .code { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #f38ba8; text-anchor: middle;}
      .val { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; alignment-baseline: middle;}
      
      .box-list1 { fill: #89b4fa; stroke: #cdd6f4; stroke-width: 2; rx: 4; }
      .box-list2 { fill: #a6e3a1; stroke: #cdd6f4; stroke-width: 2; rx: 4; }
      .box-dict { fill: #f9e2af; stroke: #f38ba8; stroke-width: 2; rx: 8; }
      
      .machine { fill: rgba(203, 166, 247, 0.2); stroke: #cba6f7; stroke-width: 3; stroke-dasharray: 6,4; rx: 10; }
      .arrow { fill: none; stroke: #cdd6f4; stroke-width: 3; marker-end: url(#arrowhead); }
      
      .anim-merge1 { animation: slideMerge 3s infinite ease-in-out; }
      .anim-merge2 { animation: slideMerge 3s infinite ease-in-out; animation-delay: 0.2s; }
      .anim-merge3 { animation: slideMerge 3s infinite ease-in-out; animation-delay: 0.4s; }
      
      .anim-glow { animation: pulseMachine 3s infinite ease-in-out; }

      @keyframes slideMerge {
        0%, 20% { transform: translateY(0) scale(1); opacity: 1; }
        50% { transform: translateY(80px) scale(0.8); opacity: 0; }
        51%, 80% { transform: translateY(0) scale(0); opacity: 0; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      
      @keyframes pulseMachine {
        0%, 30% { filter: drop-shadow(0 0 0 transparent); }
        50% { filter: drop-shadow(0 0 15px #cba6f7); stroke-width: 5; }
        70%, 100% { filter: drop-shadow(0 0 0 transparent); }
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cdd6f4" />
    </marker>
  </defs>

  <rect width="800" height="350" rx="15" fill="url(#bgGrad)" />

  <text x="30" y="40" class="title">딕셔너리 컴프리헨션(Comprehension) 압축 병합</text>
  
  <text x="400" y="80" class="code" fill="#f38ba8">{ key: val for key, val in zip(names, prices) }</text>

  <!-- Input Lists -->
  <g transform="translate(150, 120)">
    <!-- Names List (Keys) -->
    <text x="-50" y="25" class="title" fill="#89b4fa" font-size="16px">names (Keys)</text>
    <g class="anim-merge1">
      <rect x="50" y="0" width="80" height="40" class="box-list1" />
      <text x="90" y="22" class="val">"Apple"</text>
    </g>
    <g class="anim-merge2">
      <rect x="150" y="0" width="80" height="40" class="box-list1" />
      <text x="190" y="22" class="val">"Banana"</text>
    </g>
    <g class="anim-merge3">
      <rect x="250" y="0" width="80" height="40" class="box-list1" />
      <text x="290" y="22" class="val">"Cherry"</text>
    </g>

    <!-- Prices List (Values) -->
    <text x="-50" y="85" class="title" fill="#a6e3a1" font-size="16px">prices (Values)</text>
    <g class="anim-merge1">
      <rect x="50" y="60" width="80" height="40" class="box-list2" />
      <text x="90" y="82" class="val">1.2</text>
    </g>
    <g class="anim-merge2">
      <rect x="150" y="60" width="80" height="40" class="box-list2" />
      <text x="190" y="82" class="val">0.5</text>
    </g>
    <g class="anim-merge3">
      <rect x="250" y="60" width="80" height="40" class="box-list2" />
      <text x="290" y="82" class="val">2.5</text>
    </g>
  </g>

  <!-- The Comprehension Machine -->
  <g transform="translate(200, 250)">
    <rect x="-20" y="-30" width="320" height="70" class="machine anim-glow" />
    <text x="140" y="-5" class="title" fill="#cba6f7" text-anchor="middle">zip() &amp; Comprehension 결합기</text>
    
    <!-- Output Dictionary Results (Static base to show where they landed) -->
    <g transform="translate(0, 50)">
      <!-- Down Arrow -->
      <path d="M 140,-15 L 140, 15" class="arrow" />
      
      <!-- Final Dict Box -->
      <rect x="0" y="20" width="280" height="50" class="box-dict" />
      <text x="140" y="47" class="val">{'Apple': 1.2, 'Banana': 0.5, ...}</text>
    </g>
  </g>

</svg>
