<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 16px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .box-key { fill: #f9e2af; rx: 10; stroke: #11111b; stroke-width: 2; }
      .box-val { fill: #89b4fa; rx: 10; stroke: #11111b; stroke-width: 2; }
      
      @keyframes slideInRight { 0%, 50% { transform: translateX(200px); opacity: 0; } 60%, 100% { transform: translateX(0); opacity: 1; } }
      .new-item { animation: slideInRight 4s infinite; }
      
      @keyframes blinkCursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .cursor { animation: blinkCursor 1s infinite; fill: #a6e3a1; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 3: 새로운 데이터 추가 (새 사물함 생성)</text>
  <text x="400" y="70" class="text-title" fill="#a6e3a1">profile["job"] = "Wizard"</text>

  <!-- Existing Items -->
  <rect x="150" y="120" width="70" height="40" class="box-key" />
  <text x="185" y="145" class="text-code">"name"</text>
  <rect x="230" y="120" width="120" height="40" class="box-val" />
  <text x="290" y="145" class="text-code">"Antigravity"</text>
  
  <rect x="370" y="120" width="70" height="40" class="box-key" />
  <text x="405" y="145" class="text-code">"level"</text>
  <rect x="450" y="120" width="60" height="40" class="box-val" />
  <text x="480" y="145" class="text-code">10</text>

  <!-- New Item Sliding In -->
  <g class="new-item">
    <rect x="530" y="120" width="70" height="40" class="box-key" stroke="#a6e3a1" stroke-width="3" />
    <text x="565" y="145" class="text-code">"job"</text>
    <rect x="610" y="120" width="90" height="40" class="box-val" stroke="#a6e3a1" stroke-width="3" />
    <text x="655" y="145" class="text-code">"Wizard"</text>
    <path d="M 605 100 L 615 110 L 595 110 Z" fill="#a6e3a1" />
  </g>
</svg>
