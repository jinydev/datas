<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 16px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .box { fill: #89dceb; rx: 20; stroke: #cdd6f4; stroke-width: 2; }
      .set-pool { fill: transparent; stroke: #89dceb; stroke-width: 4; stroke-dasharray: 10; rx: 50; }
      
      @keyframes addAnim { 0%, 20% { transform: translate(-100px, -50px) scale(0.5); opacity: 0; } 30%, 50% { transform: translate(0, 0) scale(1); opacity: 1; } 80%, 100% { transform: translate(0, 0) scale(1); opacity: 1; } }
      @keyframes removeAnim { 0%, 50% { transform: translate(0, 0) scale(1); opacity: 1; } 60%, 80% { transform: translate(100px, -50px) scale(0.5); opacity: 0; } 100% { transform: translate(0, 0) scale(1); opacity: 0; } }
      
      .anim-add { animation: addAnim 6s infinite; }
      .anim-remove { animation: removeAnim 6s infinite; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 2: 원소의 빠른 추가(add)와 삭제(remove)</text>
  <text x="400" y="70" class="text-title" fill="#89dceb">basket.add("🍌") / basket.remove("🍎")</text>

  <!-- Set Pool Area -->
  <rect x="200" y="110" width="400" height="100" class="set-pool" />
  
  <g class="anim-add">
    <rect x="250" y="140" width="80" height="40" class="box" />
    <text x="290" y="165" class="text-code">"🍌"</text>
    <text x="290" y="130" class="text-title" fill="#a6e3a1" font-size="14px">+ add</text>
  </g>

  <g class="anim-remove">
    <rect x="470" y="140" width="80" height="40" class="box" />
    <text x="510" y="165" class="text-code">"🍎"</text>
    <text x="510" y="130" class="text-title" fill="#f38ba8" font-size="14px">- remove</text>
  </g>
  
  <rect x="360" y="140" width="80" height="40" class="box" />
  <text x="400" y="165" class="text-code">"🍊"</text>

</svg>
