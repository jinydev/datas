<svg width="600" height="260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: 스칼라 파티 버프 브로드캐스팅(확장)</text>
    
    <!-- Party Array (Target) -->
    <text x="300" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">파티원 5명 (크기 5 배열)</text>
    <g transform="translate(100, 85)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">전사</text>
        <rect x="80" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="110" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">궁수</text>
        <rect x="160" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="190" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">마법사</text>
        <rect x="240" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="270" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">도적</text>
        <rect x="320" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="350" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">힐러</text>
    </g>

    <!-- Buff Value (Scalar 10) -->
    <text x="130" y="170" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">단일 +10 버프</text>
    
    <g transform="translate(100, 185)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
        <text x="30" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">+10</text>
        
        <!-- Stretching ghost clones -->
        <g opacity="0">
            <rect x="80" y="0" width="60" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3" stroke-dasharray="4"/>
            <text x="110" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">+10</text>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="2s" repeatCount="indefinite"/>
        </g>
        <g opacity="0">
            <rect x="160" y="0" width="60" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3" stroke-dasharray="4"/>
            <text x="190" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">+10</text>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.4;0.8;1" dur="2s" repeatCount="indefinite"/>
        </g>
        <g opacity="0">
            <rect x="240" y="0" width="60" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3" stroke-dasharray="4"/>
            <text x="270" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">+10</text>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.6;0.8;1" dur="2s" repeatCount="indefinite"/>
        </g>
        <g opacity="0">
            <rect x="320" y="0" width="60" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3" stroke-dasharray="4"/>
            <text x="350" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">+10</text>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.8;0.9;1" dur="2s" repeatCount="indefinite"/>
        </g>
    </g>

    <!-- Upward animation -->
    <path d="M 130 175 L 130 140 M 210 175 L 210 140 M 290 175 L 290 140 M 370 175 L 370 140 M 450 175 L 450 140" stroke="#ef4444" stroke-width="4" stroke-dasharray="5" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.8;0.9;1" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.5s" repeatCount="indefinite"/>
    </path>
</svg>
