<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: 코드 동작 원리 (동일 규격 1:1 안전 덧셈)</text>
    
    <!-- Top Array 'a' -->
    <text x="120" y="75" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">배열 a (길이 3칸)</text>
    <g transform="translate(190, 50)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">3</text>
        <rect x="70" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="100" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">4</text>
        <rect x="140" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="170" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">5</text>
    </g>

    <text x="290" y="125" font-family="sans-serif" font-size="24" font-weight="bold" fill="#475569" text-anchor="middle">+</text>

    <!-- Bottom Array 'b' -->
    <text x="120" y="155" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a16207" text-anchor="middle">배열 b (길이 3칸)</text>
    <g transform="translate(190, 130)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="30" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#a16207" text-anchor="middle">8</text>
        <rect x="70" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="100" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#a16207" text-anchor="middle">7</text>
        <rect x="140" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="170" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#a16207" text-anchor="middle">6</text>
    </g>

    <!-- Matching connection lines -->
    <path d="M 220 90 L 220 130 M 290 90 L 290 130 M 360 90 L 360 130" stroke="#16a34a" stroke-width="3" stroke-dasharray="4" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.6;1" dur="2.5s" repeatCount="indefinite"/>
    </path>

    <!-- Arrow down to result -->
    <path d="M 450 110 Q 510 110 510 160" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="6" marker-end="url(#arrow_gray)"/>
    
    <text x="510" y="95" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">결과 배열 도출!</text>

    <!-- Result Array -->
    <g transform="translate(410, 175)" opacity="0">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="30" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">11</text>
        <rect x="70" y="0" width="60" height="40" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="100" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">11</text>
        <rect x="140" y="0" width="60" height="40" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="170" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">11</text>
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.6;0.9;1" dur="2.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="410,165;410,175;410,175" dur="2.5s" repeatCount="indefinite"/>
    </g>

    <defs>
        <marker id="arrow_gray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
        </marker>
    </defs>

    <text x="290" y="235" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">파이썬 코드에서 a와 b 배열의 길이가 동일하므로, 브로드캐스팅(강제 늘리기) 없이 그대로 매칭됩니다.</text>
</svg>
