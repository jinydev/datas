<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: 규격 매칭 실패로 인한 시스템 붕괴 (에러)</text>
    
    <!-- Top Array (Size 4) -->
    <text x="100" y="65" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">배열 x (길이 4칸)</text>
    <g transform="translate(180, 45)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">3</text>
        <rect x="70" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="100" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">4</text>
        <rect x="140" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="170" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">5</text>
        <rect x="210" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="240" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">7</text>
    </g>

    <!-- Bottom Array (Size 3) -->
    <text x="100" y="140" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a16207" text-anchor="middle">배열 y (길이 3칸)</text>
    <g transform="translate(180, 120)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="30" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#a16207" text-anchor="middle">8</text>
        <rect x="70" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="100" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#a16207" text-anchor="middle">7</text>
        <rect x="140" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="170" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#a16207" text-anchor="middle">6</text>
        
        <!-- Missing piece -->
        <rect x="210" y="0" width="60" height="40" rx="4" fill="none" stroke="#ef4444" stroke-dasharray="4" stroke-width="2"/>
        <text x="240" y="25" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ef4444" text-anchor="middle">?</text>
    </g>

    <!-- Trying to match arrows -->
    <!-- Safe matches -->
    <path d="M 210 90 L 210 115 M 280 90 L 280 115 M 350 90 L 350 115" stroke="#16a34a" stroke-width="3" stroke-dasharray="4"/>
    <!-- Broken match -->
    <path d="M 420 90 L 420 115" stroke="#ef4444" stroke-width="4" stroke-dasharray="4" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </path>

    <!-- Error explosion popup -->
    <g transform="translate(340, 180)" opacity="0">
        <rect x="-80" y="-20" width="280" height="45" rx="5" fill="#fecaca" stroke="#b91c1c" stroke-width="3"/>
        <text x="60" y="10" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">ValueError: System Crash! 짝이 안 맞음</text>
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.6;0.9;1" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="340,180;340,175" dur="0.1s" repeatCount="indefinite"/>
    </g>

    <text x="180" y="235" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">비대칭 1칸을 어떻게 억지로 늘릴 방법이 없어 연산 에러 발생!</text>
</svg>
