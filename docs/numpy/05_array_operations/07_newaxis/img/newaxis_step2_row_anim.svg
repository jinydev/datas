<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">2단계: x[np.newaxis, :]로 새로운 차원 껍질 씌우기</text>
    
    <text x="140" y="100" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">배열 a (2차원, 1x4)</text>
    
    <g transform="translate(200, 80)">
        <!-- New Outer 2D Brackets flashing -->
        <text x="-40" y="26" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0">
            [
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.3;0.8;1" dur="2s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="2s" repeatCount="indefinite"/>
        </text>
        
        <!-- Original 1D shape -->
        <text x="-15" y="26" font-family="sans-serif" font-size="30" font-weight="bold" fill="#94a3b8" text-anchor="middle">[</text>
        
        <rect x="10" y="0" width="40" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">0</text>
        <rect x="55" y="0" width="40" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="75" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">10</text>
        <rect x="100" y="0" width="40" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="120" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">20</text>
        <rect x="145" y="0" width="40" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="165" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">30</text>
        
        <text x="210" y="26" font-family="sans-serif" font-size="30" font-weight="bold" fill="#94a3b8" text-anchor="middle">]</text>

        <!-- New Outer 2D Brackets flashing -->
        <text x="235" y="26" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0">
            ]
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.3;0.8;1" dur="2s" repeatCount="indefinite"/>
            <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="2s" repeatCount="indefinite"/>
        </text>
        
        <!-- Hovering empty rows underneath representing it's now 2D -->
        <g opacity="0">
            <rect x="10" y="45" width="175" height="40" rx="4" fill="none" stroke="#fcd34d" stroke-width="2" stroke-dasharray="4"/>
            <text x="95" y="70" font-family="sans-serif" font-size="14" fill="#d97706" text-anchor="middle">+</text>
            <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.5;0.8;1" dur="2s" repeatCount="indefinite"/>
        </g>
    </g>

    <text x="300" y="200" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ea580c" text-anchor="middle">겉면에 2차원을 의미하는 주황색 대괄호 [[ ]] 가 마법처럼 씌워졌습니다!</text>
    <text x="300" y="225" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">이제 이 데이터는 "4칸짜리 선"이 아니라, "1행 4열짜리 2D 테이블"로 승격되었습니다.</text>
</svg>
