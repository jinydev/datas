<svg width="600" height="340" viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="340" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">4단계: 세로 기둥 탑과 가로선 배열의 전면 교전(크로스 확장)</text>
    
    <!-- Top Row Vector (b) -->
    <text x="180" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">가로선 배열 b [1, 2, 3]</text>
    <g transform="translate(120, 90)">
        <rect x="0" y="0" width="40" height="30" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
        <text x="20" y="20" font-family="sans-serif" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="middle">1</text>
        <rect x="45" y="0" width="40" height="30" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
        <text x="65" y="20" font-family="sans-serif" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="middle">2</text>
        <rect x="90" y="0" width="40" height="30" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
        <text x="110" y="20" font-family="sans-serif" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="middle">3</text>
        
        <!-- Downward expansion -->
        <g opacity="0">
            <rect x="0" y="35" width="130" height="100" rx="2" fill="#fee2e2" opacity="0.6"/>
            <path d="M 65 35 L 65 130" stroke="#f87171" stroke-width="4" stroke-dasharray="5" marker-end="url(#arrow_red)"/>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.3;0.8;1" dur="3s" repeatCount="indefinite"/>
        </g>
    </g>

    <text x="320" y="160" font-family="sans-serif" font-size="24" font-weight="bold" fill="#475569" text-anchor="middle">*</text>

    <!-- Column Vector (x_newaxis) -->
    <text x="440" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">세로선 기둥 x (4x1)</text>
    <g transform="translate(420, 90)">
        <rect x="0" y="0" width="40" height="30" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="20" y="20" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">0</text>
        <rect x="0" y="35" width="40" height="30" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="20" y="55" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">10</text>
        <rect x="0" y="70" width="40" height="30" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="20" y="90" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">20</text>
        <rect x="0" y="105" width="40" height="30" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="20" y="125" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">30</text>

        <!-- Rightward expansion -->
        <g opacity="0">
            <rect x="45" y="0" width="85" height="135" rx="2" fill="#e0f2fe" opacity="0.6"/>
            <path d="M 45 65 L 125 65" stroke="#0284c7" stroke-width="4" stroke-dasharray="5" marker-end="url(#arrow_blue)"/>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.3;0.8;1" dur="3s" repeatCount="indefinite"/>
        </g>
    </g>

    <defs>
        <marker id="arrow_red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
        </marker>
        <marker id="arrow_blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7"/>
        </marker>
    </defs>

    <!-- Explosion text -->
    <g transform="translate(180, 240)" opacity="0">
        <text x="120" y="0" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">서로 넓어져 거대한 (4x3) 구구단 테이블 창조!</text>
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.7;0.9;1" dur="3s" repeatCount="indefinite"/>
    </g>

    <text x="300" y="300" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">b는 텅 빈 수직으로 4칸 복제 하강하고, 승격된 기둥 x는 우측으로 3칸 수평 확장하며 전면 교전!</text>
</svg>
