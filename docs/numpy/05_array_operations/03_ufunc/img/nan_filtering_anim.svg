<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: ~np.isnan() 필터링으로 결측치 제거</text>
    
    <!-- True / False masks appearing -->
    <g transform="translate(180, 50)">
        <rect x="0" y="0" width="60" height="25" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="3" stroke-width="2"/>
        <text x="30" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">True</text>
        
        <rect x="70" y="0" width="60" height="25" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="3" stroke-width="2"/>
        <text x="100" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">False</text>

        <rect x="140" y="0" width="60" height="25" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="3" stroke-width="2"/>
        <text x="170" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">True</text>
        
        <rect x="210" y="0" width="60" height="25" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="3" stroke-width="2"/>
        <text x="240" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">True</text>
        
        <!-- Whole mask fading in and out -->
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.8;1" dur="3s" repeatCount="indefinite" />
    </g>

    <!-- Stable Boxes -->
    <text x="70" y="110" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">정상 데이터 통과</text>
    <g transform="translate(180, 90)">
        <rect x="0" y="0" width="60" height="35" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="30" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">20</text>
        
        <rect x="140" y="0" width="60" height="35" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="170" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">13</text>
        
        <rect x="210" y="0" width="60" height="35" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="240" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">24</text>
    </g>

    <!-- Moving Nan Box (Dropping) -->
    <text x="70" y="160" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="start">nan 오염치 제거</text>
    <g transform="translate(250, 90)">
        <rect x="0" y="0" width="60" height="35" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
        <text x="30" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">nan</text>
        <!-- Drop animation -->
        <animateTransform attributeName="transform" type="translate" values="250,90; 250,90; 250,220; 250,90" keyTimes="0; 0.4; 0.8; 1" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.3;0.6;1" dur="3s" repeatCount="indefinite" />
    </g>

    <text x="330" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">False 판정을 받은 부분만 밑으로 폐기</text>

</svg>
