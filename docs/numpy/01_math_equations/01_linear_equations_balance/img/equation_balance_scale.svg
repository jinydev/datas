<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .scale-base { fill: #e0ac26; stroke: #b8860b; stroke-width: 3; }
      .scale-beam { fill: #f0c341; stroke: #b8860b; stroke-width: 4; }
      .scale-plate { fill: #d3d3d3; stroke: #808080; stroke-width: 2; }
      .scale-string { stroke: #808080; stroke-width: 2; fill: none; }
      .box-x { fill: rgba(13, 110, 253, 0.7); stroke: #0b5ed7; stroke-width: 2; rx: 5; ry: 5; }
      .box-num { fill: rgba(220, 53, 69, 0.7); stroke: #b02a37; stroke-width: 2; rx: 5; ry: 5; }
      .text-bold { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #343a40; text-anchor: middle; }
      .text-desc { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; fill: #6f42c1; text-anchor: middle; }
      .arrow { stroke: #dc3545; stroke-width: 4; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 5 5; }
      .arrow-blue { stroke: #0d6efd; stroke-width: 4; fill: none; marker-end: url(#arrowhead-blue); stroke-dasharray: 5 5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc3545" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d6efd" />
    </marker>
  </defs>

  <text class="text-title" x="400" y="40">방정식의 영혼: 등식과 양팔 저울</text>

  <!-- Central Pivot -->
  <polygon points="380,350 420,350 400,200" class="scale-base" />
  <circle cx="400" cy="200" r="10" fill="#343a40" />

  <!-- The Balance Beam -->
  <rect x="200" y="195" width="400" height="10" class="scale-beam" />
  
  <!-- Left Strings and Plate -->
  <line x1="205" y1="200" x2="160" y2="280" class="scale-string" />
  <line x1="205" y1="200" x2="250" y2="280" class="scale-string" />
  <path d="M 150 280 Q 205 300 260 280" class="scale-plate" fill="#dee2e6" />

  <!-- Right Strings and Plate -->
  <line x1="595" y1="200" x2="550" y2="280" class="scale-string" />
  <line x1="595" y1="200" x2="640" y2="280" class="scale-string" />
  <path d="M 540 280 Q 595 300 650 280" class="scale-plate" fill="#dee2e6" />

  <!-- Items on Left Plate (2x + 3) -->
  <rect class="box-x" x="165" y="240" width="30" height="35" />
  <text class="text-bold" x="180" y="265">x</text>
  
  <rect class="box-x" x="195" y="240" width="30" height="35" />
  <text class="text-bold" x="210" y="265">x</text>
  
  <rect class="box-num" x="225" y="250" width="25" height="25" fill="#198754" stroke="#146c43" />
  <text class="text-bold" x="238" y="268" font-size="14">+3</text>

  <!-- Items on Right Plate (11) -->
  <rect class="box-num" x="555" y="230" width="80" height="45" />
  <text class="text-bold" x="595" y="260" font-size="24">11</text>

  <!-- Big Equation Text -->
  <text class="text-title" x="205" y="360" fill="#0d6efd">2x + 3</text>
  <text class="text-title" x="400" y="360" font-size="36" fill="#343a40">=</text>
  <text class="text-title" x="595" y="360" fill="#dc3545">11</text>

  <!-- Animation / Action Hint -->
  <path class="arrow" d="M 238 230 Q 238 180 300 150" />
  <text class="text-desc" x="320" y="140" fill="#dc3545">-3 제거 (폭파!)</text>

  <path class="arrow" d="M 595 210 Q 595 180 500 150" />
  <text class="text-desc" x="480" y="140" fill="#dc3545">-3 제거 (수평 유지!)</text>

</svg>
