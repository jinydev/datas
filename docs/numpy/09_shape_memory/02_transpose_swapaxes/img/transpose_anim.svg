<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">행과 열의 대칭 반사 (거울 뒤집기): .T</text>
    
    <g transform="translate(100, 50)">
        <g font-family="monospace" font-size="16" font-weight="bold" fill="#475569" text-anchor="middle">
             <rect x="0" y="10" width="50" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
             <rect x="50" y="10" width="50" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
             <rect x="100" y="10" width="50" height="30" fill="#fef08a" stroke="#eab308" stroke-width="2"/> 
             
             <rect x="0" y="40" width="50" height="30" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/> 
             <rect x="50" y="40" width="50" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
             <rect x="100" y="40" width="50" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
             
             <text x="25" y="30">1</text> <text x="75" y="30">2</text> <text x="125" y="30" fill="#a16207">3</text>
             <text x="25" y="60" fill="#1e40af">4</text> <text x="75" y="60">5</text> <text x="125" y="60">6</text>
             
             <text x="75" y="-10" font-size="14" fill="#64748b">원본 (2x3)</text>
        </g>
        
        <line x1="-10" y1="0" x2="150" y2="160" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4"/>
        <text x="30" y="130" font-family="sans-serif" font-size="12" fill="#f43f5e" transform="rotate(45, 15, 120)">대각 거울축</text>

        <g transform="translate(180, 25)">
            <path d="M0,8 L40,8 L40,0 L50,15 L40,30 L40,22 L0,22 Z" fill="#94a3b8"/>
            <text x="25" y="-5" font-family="monospace" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle">.T</text>
        </g>

        <g transform="translate(260, 0)">
            <g font-family="monospace" font-size="16" font-weight="bold" fill="#475569" text-anchor="middle">
                 <rect x="0" y="10" width="50" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
                 <rect x="50" y="10" width="50" height="30" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
                 
                 <rect x="0" y="40" width="50" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
                 <rect x="50" y="40" width="50" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
                 
                 <rect x="0" y="70" width="50" height="30" fill="#fef08a" stroke="#eab308" stroke-width="2"/> 
                 <rect x="50" y="70" width="50" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
                 
                 <text x="25" y="30">1</text> <text x="75" y="30" fill="#1e40af">4</text>
                 <text x="25" y="60">2</text> <text x="75" y="60">5</text>
                 <text x="25" y="90" fill="#a16207">3</text> <text x="75" y="90">6</text>
                 
                 <text x="50" y="-10" font-size="14" fill="#64748b">전치 결과 (3x2)</text>
            </g>
             
            <!-- Animation arcs showing the swap -->
            <path d="M-80,45 Q-20,-20 50,25" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
            <path d="M-135,15 Q-50,150 25,85" fill="none" stroke="#ca8a04" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
            
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
              </marker>
            </defs>
        </g>
    </g>
    
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">대각선 거울축을 기준으로 데칼코마니처럼 접어 반대쪽 원소 위치를 맞바꿉니다.</text>
</svg>
