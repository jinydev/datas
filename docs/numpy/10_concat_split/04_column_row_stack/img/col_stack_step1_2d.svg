<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .boxA { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; rx: 4; }
    .boxB { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrowhead); }
    .label { font-size: 18px; fill: #e91e63; font-weight: bold; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">2차원 배열일 때는 hstack과 똑같이 수평 결합!</text>
  
  <g transform="translate(100, 100)">
    <rect x="-40" y="0" width="80" height="90" class="boxA"/>
    <text x="0" y="50" class="text" fill="#2196f3" text-anchor="middle">A(3x2)</text>
  </g>
  <g transform="translate(300, 100)">
    <animateTransform attributeName="transform" type="translate" values="300,100; 180,100; 300,100" dur="4s" repeatCount="indefinite"/>
    <rect x="-60" y="0" width="120" height="90" class="boxB"/>
    <text x="0" y="50" class="text" fill="#9c27b0" text-anchor="middle">B(3x4)</text>
  </g>
  
  <line x1="380" y1="145" x2="480" y2="145" class="arrow"/>
  <text x="430" y="130" class="label">hstack = column_stack</text>
  
  <g transform="translate(600, 100)">
    <path d="M -80 -10 Q -90 -10 -90 0 L -90 100 Q -90 110 -80 110 L 120 110 Q 130 110 130 100 L 130 0 Q 130 -10 120 -10 Z" fill="#fff" stroke="#e91e63" stroke-width="2" stroke-dasharray="4"/>
    <rect x="-80" y="0" width="80" height="90" class="boxA"/>
    <text x="-40" y="50" class="text" fill="#2196f3" text-anchor="middle">A(3x2)</text>
    <rect x="0" y="0" width="120" height="90" class="boxB"/>
    <text x="60" y="50" class="text" fill="#9c27b0" text-anchor="middle">B(3x4)</text>
  </g>
</svg>
