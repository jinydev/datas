<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .boxA { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; rx: 4; }
    .boxD { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">1차원 배열(길이 2)은 자동으로 1x2 형태로 합쳐짐</text>
  
  <g transform="translate(200, 160)">
    <rect x="-40" y="0" width="80" height="90" class="boxA"/>
    <text x="0" y="50" class="text" fill="#2196f3" text-anchor="middle">A(3x2)</text>
  </g>
  <g transform="translate(200, 80)">
    <animateTransform attributeName="transform" type="translate" values="200,80; 200,120; 200,80" dur="3s" repeatCount="indefinite"/>
    <rect x="-40" y="-20" width="80" height="30" class="boxD"/>
    <text x="0" y="0" class="text" fill="#ff9800" text-anchor="middle">d(2,)</text>
  </g>
  
  <line x1="350" y1="150" x2="450" y2="150" stroke="#cbd5e1" stroke-width="4" marker-end="url(#arrowhead)"/>
  
  <g transform="translate(600, 100)">
    <path d="M -50 -10 L 50 -10 L 50 130 L -50 130 Z" fill="#fff" stroke="#e91e63" stroke-width="2" stroke-dasharray="4"/>
    <rect x="-40" y="0" width="80" height="90" class="boxA"/>
    <text x="0" y="50" class="text" fill="#2196f3" text-anchor="middle">A(3x2)</text>
    
    <rect x="-40" y="90" width="80" height="30" class="boxD"/>
    <text x="0" y="110" class="text" fill="#ff9800" text-anchor="middle">d(1x2)</text>
  </g>
</svg>
