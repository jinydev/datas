<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .boxX { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; rx: 4; }
    .boxY { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">concatenate((x, y), axis=0): 수직 결합 (vstack과 동일)</text>
  
  <g transform="translate(150, 150)">
    <rect x="-40" y="0" width="80" height="60" class="boxX"/>
    <text x="0" y="35" class="text" fill="#2196f3" text-anchor="middle">x(2x3)</text>
  </g>
  <g transform="translate(150, 60)">
    <animateTransform attributeName="transform" type="translate" values="150,60; 150,115; 150,60" dur="3s" repeatCount="indefinite"/>
    <rect x="-40" y="-25" width="80" height="60" class="boxY"/>
    <text x="0" y="10" class="text" fill="#9c27b0" text-anchor="middle">y(2x3)</text>
  </g>
  
  <line x1="300" y1="150" x2="400" y2="150" class="arrow"/>

  <g transform="translate(550, 90)">
    <path d="M -50 -10 L 50 -10 L 50 130 L -50 130 Z" fill="#fff" stroke="#e91e63" stroke-width="2" stroke-dasharray="4"/>
    <rect x="-40" y="0" width="80" height="60" class="boxX"/>
    <text x="0" y="35" class="text" fill="#2196f3" text-anchor="middle">x(2x3)</text>
    
    <rect x="-40" y="60" width="80" height="60" class="boxY"/>
    <text x="0" y="95" class="text" fill="#9c27b0" text-anchor="middle">y(2x3)</text>
  </g>
</svg>
