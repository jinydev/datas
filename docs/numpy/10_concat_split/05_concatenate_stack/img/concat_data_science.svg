<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; fill: #555; }
      .box-head { fill: #cce5ff; stroke: #b8daff; stroke-width: 2px; }
      .box-body { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 2px; }
      .box-new-row { fill: #d4edda; stroke: #c3e6cb; stroke-width: 2px; }
      .box-new-col { fill: #f8d7da; stroke: #f5c6cb; stroke-width: 2px; }
      .arrow { fill: none; stroke: #b0b0b0; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  
  <text x="425" y="30" class="title" text-anchor="middle">데이터 과학에서의 활용 (표본 데이터와 특성 컬럼의 병합)</text>

  <!-- Left Side: axis=0 (Row Concatenation) -->
  <g transform="translate(100, 70)">
    <!-- Base Table -->
    <rect x="0" y="0" width="150" height="25" class="box-head" />
    <rect x="0" y="25" width="150" height="60" class="box-body" />
    <text x="75" y="17" class="title" font-size="14" text-anchor="middle" fill="#004085">기존 데이터 (N명)</text>
    <text x="75" y="60" class="desc" text-anchor="middle">관측 데이터 1~N</text>

    <!-- New Row Table -->
    <rect x="0" y="110" width="150" height="40" class="box-new-row" />
    <text x="75" y="135" class="desc" text-anchor="middle" fill="#155724">+ 새로운 관측치 M명</text>
    
    <path d="M 75 90 L 75 105" class="arrow" stroke="#28a745" />

    <!-- Result Table -->
    <path d="M 170 80 L 220 80 M 210 70 L 220 80 L 210 90" class="arrow" />
    <text x="195" y="65" class="desc" text-anchor="middle" font-weight="bold">axis=0</text>

    <!-- Appended table -->
    <rect x="240" y="20" width="150" height="25" class="box-head" />
    <rect x="240" y="45" width="150" height="60" class="box-body" />
    <rect x="240" y="105" width="150" height="40" class="box-new-row" />
    <text x="315" y="37" class="title" font-size="14" text-anchor="middle" fill="#004085">N+M 명 데이터</text>
    
    <text x="195" y="180" class="title" font-size="16" text-anchor="middle" fill="#28a745">👇아래로 이어붙이기 (수직 결합)</text>
  </g>

  <!-- Vertical Divider -->
  <line x1="500" y1="60" x2="500" y2="280" stroke="#f0f0f0" stroke-width="2" />

  <!-- Right Side: axis=1 (Column Concatenation) -->
  <g transform="translate(520, 70)">
    <!-- Base Table -->
    <rect x="0" y="0" width="90" height="25" class="box-head" />
    <rect x="0" y="25" width="90" height="100" class="box-body" />
    <text x="45" y="17" class="title" font-size="14" text-anchor="middle" fill="#004085">기존 특성</text>
    <text x="45" y="70" class="desc" text-anchor="middle">Feature A</text>

    <!-- New Column Table -->
    <rect x="110" y="0" width="60" height="100" class="box-new-col" y="25"/>
    <rect x="110" y="0" width="60" height="25" class="box-head" fill="#f8d7da" stroke="#f5c6cb" />
    <text x="140" y="17" class="title" font-size="14" text-anchor="middle" fill="#721c24">+ 신규</text>
    <text x="140" y="70" class="desc" text-anchor="middle" fill="#721c24">Feat B</text>

    <path d="M 95 65 L 105 65" class="arrow" stroke="#dc3545" />

    <!-- Result Table -->
    <path d="M 180 80 L 210 80 M 200 70 L 210 80 L 200 90" class="arrow" />
    <text x="195" y="65" class="desc" text-anchor="middle" font-weight="bold">axis=1</text>

    <!-- Appended table -->
    <rect x="220" y="0" width="90" height="25" class="box-head" />
    <rect x="220" y="25" width="90" height="100" class="box-body" />
    <rect x="310" y="0" width="60" height="25" class="box-head" fill="#f8d7da" stroke="#f5c6cb" />
    <rect x="310" y="25" width="60" height="100" class="box-new-col" />
    <text x="265" y="17" class="title" font-size="14" text-anchor="middle" fill="#004085">기존 특성</text>
    <text x="340" y="17" class="title" font-size="14" text-anchor="middle" fill="#721c24">신규</text>
    
    <text x="160" y="180" class="title" font-size="16" text-anchor="middle" fill="#dc3545">👉옆으로 이어붙이기 (수평 결합)</text>
  </g>
</svg>
