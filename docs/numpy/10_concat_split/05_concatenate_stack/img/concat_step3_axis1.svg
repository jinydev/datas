<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .boxX { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; rx: 4; }
    .boxY { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">concatenate((x, y), axis=1): 수평 결합 (hstack과 동일)</text>
  
  <g transform="translate(100, 120)">
    <rect x="-40" y="0" width="80" height="60" class="boxX"/>
    <text x="0" y="35" class="text" fill="#2196f3" text-anchor="middle">x(2x3)</text>
  </g>
  <g transform="translate(280, 120)">
    <animateTransform attributeName="transform" type="translate" values="280,120; 180,120; 280,120" dur="4s" repeatCount="indefinite"/>
    <rect x="-40" y="0" width="80" height="60" class="boxY"/>
    <text x="0" y="35" class="text" fill="#9c27b0" text-anchor="middle">y(2x3)</text>
  </g>
  
  <line x1="360" y1="150" x2="460" y2="150" class="arrow"/>
  
  <g transform="translate(600, 120)">
    <path d="M -50 -10 Q -60 -10 -60 0 L -60 70 Q -60 80 -50 80 L 130 80 Q 140 80 140 70 L 140 0 Q 140 -10 130 -10 Z" fill="#fff" stroke="#e91e63" stroke-width="2" stroke-dasharray="4"/>
    <rect x="-50" y="0" width="80" height="60" class="boxX"/>
    <text x="-10" y="35" class="text" fill="#2196f3" text-anchor="middle">x(2x3)</text>
    <rect x="30" y="0" width="80" height="60" class="boxY"/>
    <text x="70" y="35" class="text" fill="#9c27b0" text-anchor="middle">y(2x3)</text>
  </g>
</svg>
