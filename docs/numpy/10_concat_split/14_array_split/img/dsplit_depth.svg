<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .code-txt { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #d63384; }
      .box { fill: #f8f9fa; stroke: #adb5bd; stroke-width: 2px; }
      .cube { fill: rgba(0, 123, 255, 0.1); stroke: #0056b3; stroke-width: 2px; stroke-linejoin: round; }
      .solid-arrow { fill: none; stroke: #28a745; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .knife-dash { stroke: #dc3545; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 6 5; fill: rgba(220, 53, 69, 0.3); }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="30" class="title" text-anchor="middle">np.dsplit() : 3차원 깊이(Depth, Z축) 방향 평면으로 썰어 분할하기(axis=2)</text>

  <!-- Left: Original 3D Tensor -->
  <g transform="translate(150, 100)">
    <!-- Back face -->
    <rect x="50" y="-30" width="100" height="80" class="cube" />
    <!-- Connecting lines -->
    <path d="M 0 0 L 50 -30 M 100 0 L 150 -30 M 0 80 L 50 50 M 100 80 L 150 50" stroke="#0056b3" stroke-width="2" />
    <!-- Front face -->
    <rect x="0" y="0" width="100" height="80" class="cube" />
    
    <!-- Add depth lines to signify multiple depth layers -->
    <path d="M 25 -15 L 125 -15" stroke="#0056b3" stroke-dasharray="2,2" />
    <path d="M 25 65 L 125 65" stroke="#0056b3" stroke-dasharray="2,2" />
    <path d="M 100 40 L 150 10" stroke="#0056b3" stroke-dasharray="2,2" />

    <text x="180" y="-10" class="title" fill="#0056b3" text-anchor="start">Z축(깊이) 방향 단위</text>
    
    <!-- Knife splitting through the middle of the depth (Z-axis) -->
    <!-- The cut plane -->
    <polygon points="10,-60 110,-60 110,90 10,90" class="knife-dash" transform="translate(15, 10)" />
    
    <text x="75" y="140" class="code-txt" fill="#dc3545" text-anchor="middle">🔪 깊이(Depth) 절단면 통과</text>
  </g>

  <path d="M 380 150 L 450 150 M 440 140 L 450 150 L 440 160" class="solid-arrow" />
  <text x="415" y="140" class="code-txt" fill="#28a745" text-anchor="middle">전단면 분리!</text>

  <!-- Right: Resulting 2 Blocks -->
  <g transform="translate(500, 100)">
    <!-- Block 2 (Back half - draw first to be behind) -->
    <g transform="translate(120, -30)">
      <rect x="25" y="-15" width="100" height="80" class="cube" />
      <path d="M 0 0 L 25 -15 M 100 0 L 125 -15 M 0 80 L 25 65 M 100 80 L 125 65" stroke="#0056b3" stroke-width="2" />
      <rect x="0" y="0" width="100" height="80" class="cube" />
      <text x="50" y="110" class="title" fill="#0056b3" text-anchor="middle">뒤쪽 블록 (3D)</text>
    </g>

    <!-- Block 1 (Front half) -->
    <g transform="translate(-20, 20)">
      <rect x="25" y="-15" width="100" height="80" class="cube" />
      <path d="M 0 0 L 25 -15 M 100 0 L 125 -15 M 0 80 L 25 65 M 100 80 L 125 65" stroke="#0056b3" stroke-width="2" />
      <rect x="0" y="0" width="100" height="80" class="cube" />
      <text x="50" y="110" class="title" fill="#0056b3" text-anchor="middle">앞쪽 블록 (3D)</text>
    </g>
  </g>
</svg>
