<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 24px; font-weight: bold; fill: #333; }
      .label { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #e74c3c; }
      .code { font-family: 'Consolas', monospace; font-size: 22px; fill: #d63384; font-weight: bold; }
      .box { rx: 2px; ry: 2px; stroke-width: 1px; fill: #f8f9fa; stroke: #adb5bd; }
      .slice { stroke: #e74c3c; stroke-width: 4px; stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect width="850" height="400" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">2D Array vsplit() Operations</text>
  <text x="425" y="80" class="code" text-anchor="middle">np.vsplit(a, 3)</text>

  <!-- Original 6x3 array -->
  <g transform="translate(150, 110)">
    <!-- 6x3 Outline (w=150, h=240, grid 50x40) -->
    <rect x="0" y="0" width="150" height="240" fill="#f8f9fa" stroke="#adb5bd" />
    
    <!-- 3 cols -->
    <line x1="50" y1="0" x2="50" y2="240" stroke="#adb5bd" />
    <line x1="100" y1="0" x2="100" y2="240" stroke="#adb5bd" />

    <!-- 6 rows -->
    <line x1="0" y1="40" x2="150" y2="40" stroke="#adb5bd" />
    <line x1="0" y1="80" x2="150" y2="80" stroke="#adb5bd" /> <!-- Slice 1 -->
    <line x1="0" y1="120" x2="150" y2="120" stroke="#adb5bd" />
    <line x1="0" y1="160" x2="150" y2="160" stroke="#adb5bd" /> <!-- Slice 2 -->
    <line x1="0" y1="200" x2="150" y2="200" stroke="#adb5bd" />

    <!-- Slicing actions -->
    <path d="M -30 80 L 180 80" class="slice" />
    <path d="M -30 160 L 180 160" class="slice" />

    <!-- Axis textual info -->
    <text x="230" y="125" class="label" text-anchor="start">행을 분할하는 가로 칼질! (vsplit)</text>
    <polygon points="-20,80 -30,75 -30,85" fill="#e74c3c" />
    <polygon points="-20,160 -30,155 -30,165" fill="#e74c3c" />
  </g>

  <!-- Output 3 pieces of 2x3 -->
  <g transform="translate(500, 110)">
    
    <!-- Chunk 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="150" height="70" fill="#e3f2fd" stroke="#0056b3" stroke-width="2" />
      <line x1="50" y1="0" x2="50" y2="70" stroke="#0056b3" />
      <line x1="100" y1="0" x2="100" y2="70" stroke="#0056b3" />
      <line x1="0" y1="35" x2="150" y2="35" stroke="#0056b3" />
      <text x="170" y="40" class="label" fill="#0056b3">1번째 지붕 (2x3)</text>
    </g>
    
    <!-- Chunk 2 -->
    <g transform="translate(0, 85)">
      <rect x="0" y="0" width="150" height="70" fill="#e8f5e9" stroke="#198754" stroke-width="2" />
      <line x1="50" y1="0" x2="50" y2="70" stroke="#198754" />
      <line x1="100" y1="0" x2="100" y2="70" stroke="#198754" />
      <line x1="0" y1="35" x2="150" y2="35" stroke="#198754" />
      <text x="170" y="40" class="label" fill="#198754">2번째 밑장 (2x3)</text>
    </g>

    <!-- Chunk 3 -->
    <g transform="translate(0, 170)">
      <rect x="0" y="0" width="150" height="70" fill="#fff3cd" stroke="#d39e00" stroke-width="2" />
      <line x1="50" y1="0" x2="50" y2="70" stroke="#d39e00" />
      <line x1="100" y1="0" x2="100" y2="70" stroke="#d39e00" />
      <line x1="0" y1="35" x2="150" y2="35" stroke="#d39e00" />
      <text x="170" y="40" class="label" fill="#d39e00">3번째 바닥 (2x3)</text>
    </g>
  </g>
</svg>
