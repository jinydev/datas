<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 24px; font-weight: bold; fill: #333; }
      .label { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #e74c3c; }
      .code { font-family: 'Consolas', monospace; font-size: 22px; fill: #d63384; font-weight: bold; }
      .box { rx: 2px; ry: 2px; stroke-width: 1px; fill: #f8f9fa; stroke: #adb5bd; }
      .slice { stroke: #e74c3c; stroke-width: 4px; stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">2D Array hsplit() Operations</text>

  <text x="425" y="80" class="code" text-anchor="middle">np.hsplit(a, 3)</text>

  <!-- 2x12 Original Array outline with slicing marks -->
  <g transform="translate(125, 110)">
    <!-- background representing 2x12 -->
    <rect x="0" y="0" width="600" height="80" class="box" />
    
    <!-- 12 columns grid lines -->
    <line x1="50" y1="0" x2="50" y2="80" stroke="#adb5bd" />
    <line x1="100" y1="0" x2="100" y2="80" stroke="#adb5bd" />
    <line x1="150" y1="0" x2="150" y2="80" stroke="#adb5bd" />
    
    <line x1="200" y1="0" x2="200" y2="80" stroke="#adb5bd" /> <!-- Slice 1 pos -->
    
    <line x1="250" y1="0" x2="250" y2="80" stroke="#adb5bd" />
    <line x1="300" y1="0" x2="300" y2="80" stroke="#adb5bd" />
    <line x1="350" y1="0" x2="350" y2="80" stroke="#adb5bd" />
    
    <line x1="400" y1="0" x2="400" y2="80" stroke="#adb5bd" /> <!-- Slice 2 pos -->
    
    <line x1="450" y1="0" x2="450" y2="80" stroke="#adb5bd" />
    <line x1="500" y1="0" x2="500" y2="80" stroke="#adb5bd" />
    <line x1="550" y1="0" x2="550" y2="80" stroke="#adb5bd" />
    
    <!-- middle row -->
    <line x1="0" y1="40" x2="600" y2="40" stroke="#adb5bd" />

    <!-- Slicing action (Red dashed lines) -->
    <path d="M 200 -20 L 200 100" class="slice" />
    <path d="M 400 -20 L 400 100" class="slice" />

    <!-- Axis text -->
    <text x="300" y="-30" class="label" text-anchor="middle">열을 찍어내리는 수직 칼질! (hsplit)</text>
    <polygon points="200,-20 190,-30 210,-30" fill="#e74c3c" />
    <polygon points="400,-20 390,-30 410,-30" fill="#e74c3c" />
  </g>

  <!-- Output 3 pieces of 2x4 -->
  <g transform="translate(125, 240)">
    <!-- Part 1 -->
    <rect x="0" y="0" width="180" height="80" fill="#e3f2fd" stroke="#0056b3" stroke-width="2" />
    <line x1="45" y1="0" x2="45" y2="80" stroke="#0056b3" />
    <line x1="90" y1="0" x2="90" y2="80" stroke="#0056b3" />
    <line x1="135" y1="0" x2="135" y2="80" stroke="#0056b3" />
    <line x1="0" y1="40" x2="180" y2="40" stroke="#0056b3" />
    <text x="90" y="105" class="label" fill="#0056b3" text-anchor="middle">1번째 기둥 묶음 (2x4)</text>
    
    <!-- Part 2 -->
    <rect x="210" y="0" width="180" height="80" fill="#e8f5e9" stroke="#198754" stroke-width="2" />
    <line x1="255" y1="0" x2="255" y2="80" stroke="#198754" />
    <line x1="300" y1="0" x2="300" y2="80" stroke="#198754" />
    <line x1="345" y1="0" x2="345" y2="80" stroke="#198754" />
    <line x1="210" y1="40" x2="390" y2="40" stroke="#198754" />
    <text x="300" y="105" class="label" fill="#198754" text-anchor="middle">2번째 기둥 묶음 (2x4)</text>

    <!-- Part 3 -->
    <rect x="420" y="0" width="180" height="80" fill="#fff3cd" stroke="#d39e00" stroke-width="2" />
    <line x1="465" y1="0" x2="465" y2="80" stroke="#d39e00" />
    <line x1="510" y1="0" x2="510" y2="80" stroke="#d39e00" />
    <line x1="555" y1="0" x2="555" y2="80" stroke="#d39e00" />
    <line x1="420" y1="40" x2="600" y2="40" stroke="#d39e00" />
    <text x="510" y="105" class="label" fill="#d39e00" text-anchor="middle">3번째 기둥 묶음 (2x4)</text>
  </g>
</svg>
