<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .code-txt { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #d63384; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .bg-cake { fill: #fff3cd; stroke: #ffc107; stroke-width: 3px; stroke-dasharray: 6 3; }
      .arr-batch { fill: #cce5ff; stroke: #0056b3; stroke-width: 2px; }
      .knife { stroke: #dc3545; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 6 4; }
      .solid-arrow { fill: none; stroke: #28a745; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="400" fill="#fff" rx="10" ry="10" />
  <text x="425" y="30" class="title" text-anchor="middle">np.vsplit() : 거대한 케이크 층 떼어내기 (수평면 가로 칼질로 미니 배치(Mini-Batch) 분할)</text>

  <!-- Left: Original Data -->
  <g transform="translate(150, 70)">
    <rect x="-20" y="-20" width="160" height="290" class="bg-cake" />
    <text x="60" y="295" class="title" fill="#d39e00" text-anchor="middle">거대한 전체 데이터세트</text>

    <!-- Matrix Base -->
    <rect x="0" y="10" width="120" height="240" class="box" />
    <path d="M 40 10 L 40 250 M 80 10 L 80 250" stroke="#ccc" stroke-width="2" />
    <!-- Row dividers -->
    <path d="M 0 50 L 120 50 M 0 90 L 120 90 M 0 130 L 120 130 M 0 170 L 120 170 M 0 210 L 120 210" stroke="#ccc" stroke-width="1" />
    
    <!-- Knife marks horizontal slicing -->
    <path d="M -50 90 L 150 90" class="knife" />
    <path d="M -50 170 L 150 170" class="knife" />
    
    <text x="-75" y="95" class="code-txt" fill="#dc3545" text-anchor="start">🔪 vsplit 가로 절개</text>
  </g>

  <!-- Arrow -->
  <path d="M 360 190 L 450 190 M 440 180 L 450 190 L 440 200" class="solid-arrow" />
  <text x="405" y="180" class="code-txt" fill="#28a745" text-anchor="middle">분해 완료!</text>

  <!-- Right: Split Result -->
  <g transform="translate(520, 60)">
    <!-- Batch 1 -->
    <rect x="0" y="0" width="120" height="80" class="arr-batch" />
    <path d="M 40 0 L 40 80 M 80 0 L 80 80" stroke="#0056b3" stroke-width="2" />
    <path d="M 0 40 L 120 40" stroke="#adb5bd" stroke-width="1" />
    <text x="140" y="45" class="title" fill="#0056b3">미니배치 1 (Train)</text>

    <!-- Batch 2 -->
    <rect x="0" y="100" width="120" height="80" class="arr-batch" />
    <path d="M 40 100 L 40 180 M 80 100 L 80 180" stroke="#0056b3" stroke-width="2" />
    <path d="M 0 140 L 120 140" stroke="#adb5bd" stroke-width="1" />
    <text x="140" y="145" class="title" fill="#0056b3">미니배치 2 (Train)</text>

    <!-- Batch 3 -->
    <rect x="0" y="200" width="120" height="80" class="arr-batch" />
    <path d="M 40 200 L 40 280 M 80 200 L 80 280" stroke="#0056b3" stroke-width="2" />
    <path d="M 0 240 L 120 240" stroke="#adb5bd" stroke-width="1" />
    <text x="140" y="245" class="title" fill="#28a745">미니배치 3 (Test)</text>
    
    <text x="-40" y="315" class="title" fill="#28a745" font-size="16">훈련/테스트 셋 혹은 BATCH_SIZE 단위로 끊어 묶음 추출할 때 핵심!</text>
  </g>
</svg>
