<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .fill-gray { fill: #e9ecef; }
      .ok-box { fill: #d4edda; stroke: #28a745; stroke-width: 3px; }
      .arr-1 { fill: #fff3cd; stroke: #ffc107; }
      .arr-2 { fill: #cce5ff; stroke: #0056b3; }
      .check { stroke: #28a745; stroke-width: 8; stroke-linecap: round; fill:none; }
      .arrow { fill: none; stroke: #dc3545; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 4; }
      .solid-arrow { fill: none; stroke: #28a745; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  
  <text x="425" y="30" class="title" text-anchor="middle">column_stack의 스마트 래핑 (1차원을 2차원 열 벡터로 자동 승격)</text>

  <!-- Diagram Background Area -->
  <rect x="50" y="60" width="750" height="210" class="ok-box" fill-opacity="0.1" stroke-dasharray="10,5" />
  
  <text x="425" y="90" class="desc" text-anchor="middle" fill="#0056b3">✨ 유연함: 1D 배열을 2D '열 벡터(Column Vector)'로 세워서 매끄럽게 병합! ✨</text>

  <g transform="translate(100, 120)">
    <!-- 2D Matrix 1 -->
    <rect x="0" y="0" width="100" height="100" class="box fill-gray" />
    <path d="M 0 50 L 100 50 M 50 0 L 50 100" stroke="#ccc" stroke-width="2" />
    <text x="50" y="130" class="title" font-size="14" text-anchor="middle">2차원 행렬</text>
    
    <text x="140" y="60" class="title" font-size="24" text-anchor="middle">+</text>

    <!-- 1D Array (Flat) -->
    <rect x="170" y="60" width="35" height="30" class="box arr-1" />
    <rect x="205" y="60" width="35" height="30" class="box arr-1" />
    <text x="205" y="130" class="title" font-size="14" text-anchor="middle" fill="#dc3545">1차원 원형</text>
    
    <!-- Promotion Path -->
    <path d="M 230 40 Q 255 10 280 40" class="arrow" />
    <path d="M 270 30 L 280 40 L 290 30" class="arrow" stroke-dasharray="none" />
    <text x="255" y="12" class="title" font-size="12" text-anchor="middle" fill="#dc3545">2D로 변환</text>
    
    <!-- Promoted 2D Column Vector -->
    <rect x="290" y="0" width="40" height="100" class="box arr-2" />
    <path d="M 290 50 L 330 50" stroke="#0056b3" stroke-width="2" />
    <text x="310" y="130" class="title" font-size="14" text-anchor="middle" fill="#0056b3">2D 열 벡터</text>

    <!-- Combine result arrow -->
    <path d="M 360 50 L 440 50 M 430 40 L 440 50 L 430 60" class="solid-arrow" />
    <text x="400" y="40" class="title" font-size="12" text-anchor="middle" fill="#28a745">수평 병합 완료</text>
    
    <!-- Result -->
    <g transform="translate(470, 0)">
      <rect x="0" y="0" width="100" height="100" class="box fill-gray" />
      <path d="M 0 50 L 100 50 M 50 0 L 50 100" stroke="#ccc" stroke-width="2" />
      
      <rect x="100" y="0" width="40" height="100" class="box arr-2" stroke-dasharray="4,2" />
      <path d="M 100 50 L 140 50" stroke="#0056b3" stroke-width="2" stroke-dasharray="4,2" />
      
      <path d="M 160 30 L 175 50 L 195 15" class="check" />
      <text x="70" y="130" class="title" font-size="14" text-anchor="middle" fill="#28a745">결합 성공!</text>
    </g>
  </g>
</svg>
