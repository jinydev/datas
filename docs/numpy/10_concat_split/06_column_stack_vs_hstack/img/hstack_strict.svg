<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .fill-gray { fill: #e9ecef; }
      .ok-box { fill: #d4edda; stroke: #28a745; stroke-width: 3px; }
      .err-box { fill: #f8d7da; stroke: #dc3545; stroke-width: 3px; }
      .arr-1 { fill: #fff3cd; stroke: #ffc107; }
      .cross { stroke: #dc3545; stroke-width: 8; stroke-linecap: round; }
      .check { stroke: #28a745; stroke-width: 8; stroke-linecap: round; fill:none; }
      .arrow { fill: none; stroke: #b0b0b0; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  
  <text x="425" y="30" class="title" text-anchor="middle">hstack의 차원 엄격성 (공간 차원 불일치 불허)</text>

  <!-- Left Side: OK Case (2D + 2D) -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="350" height="200" class="ok-box" fill-opacity="0.2" stroke-dasharray="8,4" />
    
    <text x="175" y="30" class="desc" text-anchor="middle" fill="#28a745">✅ 허용: 2D 행렬 + 2D 행렬</text>

    <!-- 2D Matrix 1 -->
    <rect x="30" y="60" width="100" height="100" class="box fill-gray" />
    <path d="M 30 110 L 130 110 M 80 60 L 80 160" stroke="#ccc" stroke-width="2" />
    <text x="80" y="185" class="title" font-size="14" text-anchor="middle">2차원 (2D)</text>
    
    <text x="155" y="120" class="title" font-size="24" text-anchor="middle">+</text>

    <!-- 2D Matrix 2 -->
    <rect x="180" y="60" width="50" height="100" class="box arr-1" />
    <path d="M 180 110 L 230 110" stroke="#ffc107" stroke-width="2" />
    <text x="205" y="185" class="title" font-size="14" text-anchor="middle">2차원 (2D)</text>
    
    <path d="M 255 110 L 295 110 M 285 100 L 295 110 L 285 120" class="arrow" stroke="#28a745"/>
    
    <path d="M 310 95 L 325 115 L 345 80" class="check" />
  </g>

  <!-- Divider -->
  <line x1="425" y1="60" x2="425" y2="280" stroke="#f0f0f0" stroke-width="2" />

  <!-- Right Side: Error Case (2D + 1D) -->
  <g transform="translate(450, 60)">
    <rect x="0" y="0" width="350" height="200" class="err-box" fill-opacity="0.2" stroke-dasharray="8,4" />
    
    <text x="175" y="30" class="desc" text-anchor="middle" fill="#dc3545">❌ 에러: 2D 행렬 + 1D 스칼라 배열</text>

    <!-- 2D Matrix 1 -->
    <rect x="30" y="60" width="100" height="100" class="box fill-gray" />
    <path d="M 30 110 L 130 110 M 80 60 L 80 160" stroke="#ccc" stroke-width="2" />
    <text x="80" y="185" class="title" font-size="14" text-anchor="middle">2차원 (2D)</text>
    
    <text x="155" y="120" class="title" font-size="24" text-anchor="middle">+</text>

    <!-- 1D Array -->
    <rect x="180" y="90" width="45" height="40" class="box arr-1" />
    <rect x="225" y="90" width="45" height="40" class="box arr-1" />
    <text x="225" y="185" class="title" font-size="14" text-anchor="middle" fill="#dc3545">1차원 (1D)</text>
    
    <path d="M 265 110 L 295 110 M 285 100 L 295 110 L 285 120" class="arrow" stroke="#dc3545"/>
    
    <path d="M 310 95 L 340 125 M 340 95 L 310 125" class="cross" />
  </g>
</svg>
