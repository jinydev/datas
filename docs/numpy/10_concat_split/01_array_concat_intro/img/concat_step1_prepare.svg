<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .text-label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; fill: #555; }
      .code-label { font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; fill: #d63384; }
      .box { rx: 8px; ry: 8px; stroke-width: 2px; }
      .train-A { fill: #cce5ff; stroke: #004085; }
      .train-B { fill: #d4edda; stroke: #155724; }
      .apt-C { fill: #fff3cd; stroke: #856404; }
      .apt-D { fill: #f8d7da; stroke: #721c24; }
      .cell-text { font-family: 'Courier New', Courier, monospace; font-size: 18px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; fill: #333; }
      .grid-line { stroke: rgba(0,0,0,0.2); stroke-width: 1px; }
    </style>
  </defs>

  <rect width="800" height="300" fill="#f8f9fa" rx="15" ry="15"/>
  
  <text x="400" y="30" class="title" text-anchor="middle">Step 1. 재료 준비: 기차 화물칸(A, B)과 아파트 기초(C, D)</text>

  <!-- Train A -->
  <g transform="translate(80, 80)">
    <text x="60" y="-15" class="text-label" text-anchor="middle">기차칸 A (2x2)</text>
    <rect x="0" y="0" width="120" height="120" class="box train-A" />
    <line x1="60" y1="0" x2="60" y2="120" class="grid-line" />
    <line x1="0" y1="60" x2="120" y2="60" class="grid-line" />
    <text x="30" y="30" class="cell-text">1</text>
    <text x="90" y="30" class="cell-text">2</text>
    <text x="30" y="90" class="cell-text">3</text>
    <text x="90" y="90" class="cell-text">4</text>
    <!-- wheels -->
    <circle cx="30" cy="130" r="15" fill="#333" />
    <circle cx="90" cy="130" r="15" fill="#333" />
  </g>

  <!-- Train B -->
  <g transform="translate(260, 80)">
    <text x="60" y="-15" class="text-label" text-anchor="middle">기차칸 B (2x2)</text>
    <rect x="0" y="0" width="120" height="120" class="box train-B" />
    <line x1="60" y1="0" x2="60" y2="120" class="grid-line" />
    <line x1="0" y1="60" x2="120" y2="60" class="grid-line" />
    <text x="30" y="30" class="cell-text">5</text>
    <text x="90" y="30" class="cell-text">6</text>
    <text x="30" y="90" class="cell-text">7</text>
    <text x="90" y="90" class="cell-text">8</text>
    <!-- wheels -->
    <circle cx="30" cy="130" r="15" fill="#333" />
    <circle cx="90" cy="130" r="15" fill="#333" />
  </g>

  <!-- Divider -->
  <line x1="430" y1="60" x2="430" y2="280" stroke="#ddd" stroke-width="2" stroke-dasharray="5 5" />

  <!-- Apt C -->
  <g transform="translate(500, 150)">
    <text x="90" y="-15" class="text-label" text-anchor="middle">1층 기초 공사 C (1x3)</text>
    <rect x="0" y="0" width="180" height="60" class="box apt-C" />
    <line x1="60" y1="0" x2="60" y2="60" class="grid-line" />
    <line x1="120" y1="0" x2="120" y2="60" class="grid-line" />
    <text x="30" y="30" class="cell-text">1</text>
    <text x="90" y="30" class="cell-text">2</text>
    <text x="150" y="30" class="cell-text">3</text>
  </g>

  <!-- Apt D -->
  <g transform="translate(500, 60)">
    <text x="90" y="-15" class="text-label" text-anchor="middle">2층 모듈 D (1x3)</text>
    <rect x="0" y="0" width="180" height="60" class="box apt-D" />
    <line x1="60" y1="0" x2="60" y2="60" class="grid-line" />
    <line x1="120" y1="0" x2="120" y2="60" class="grid-line" />
    <text x="30" y="30" class="cell-text">4</text>
    <text x="90" y="30" class="cell-text">5</text>
    <text x="150" y="30" class="cell-text">6</text>
  </g>
</svg>
