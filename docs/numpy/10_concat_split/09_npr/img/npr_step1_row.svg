<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .code-txt { font-family: 'Consolas', monospace; font-size: 20px; font-weight: bold; fill: #d63384; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .arr-1 { fill: #fff3cd; stroke: #ffc107; }
      .arr-2 { fill: #d4edda; stroke: #28a745; }
      .solid-arrow { fill: none; stroke: #0056b3; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  <text x="425" y="30" class="title" text-anchor="middle">np.r_ (Row-wise) 1차원 옆으로 나란히 잇기 (hstack 완벽 호환)</text>

  <!-- Left: Inputs -->
  <g transform="translate(100, 100)">
    <!-- Array A -->
    <rect x="0" y="0" width="100" height="30" class="box arr-1" />
    <path d="M 33 0 L 33 30 M 66 0 L 66 30" stroke="#ffc107" stroke-width="2" />
    <text x="50" y="-10" class="title" font-size="14" text-anchor="middle" fill="#dc3545">배열 a</text>
    
    <text x="130" y="20" class="title" font-size="24" text-anchor="middle">,</text>

    <!-- Array B -->
    <rect x="160" y="0" width="100" height="30" class="box arr-2" />
    <path d="M 193 0 L 193 30 M 226 0 L 226 30" stroke="#28a745" stroke-width="2" />
    <text x="210" y="-10" class="title" font-size="14" text-anchor="middle" fill="#dc3545">배열 b</text>
  </g>

  <!-- np.r_ Command -->
  <rect x="100" y="160" width="260" height="50" rx="10" ry="10" fill="#f8f9fa" stroke="#0056b3" stroke-width="2" stroke-dasharray="8,4" />
  <text x="230" y="192" class="code-txt" text-anchor="middle">np.r_[a, b]</text>

  <path d="M 380 180 L 450 180 M 440 170 L 450 180 L 440 190" class="solid-arrow" />
  
  <!-- Right: Result -->
  <g transform="translate(480, 160)">
    <rect x="0" y="0" width="220" height="50" class="box" fill="#e9ecef" />
    
    <!-- col A -->
    <rect x="10" y="10" width="100" height="30" class="box arr-1" />
    <path d="M 43 10 L 43 40 M 76 10 L 76 40" stroke="#ffc107" stroke-width="2" />
    
    <!-- col B -->
    <rect x="110" y="10" width="100" height="30" class="box arr-2" />
    <path d="M 143 10 L 143 40 M 176 10 L 176 40" stroke="#28a745" stroke-width="2" />
    
    <text x="110" y="-10" class="title" font-size="14" text-anchor="middle" fill="#0056b3">수평으로 이어붙인 1차원 결과</text>
  </g>
</svg>
