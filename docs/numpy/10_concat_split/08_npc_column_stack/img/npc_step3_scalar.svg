<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .code-txt { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #d63384; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .arr-x { fill: #e2e3e5; stroke: #adb5bd; }
      .arr-y { fill: #cce5ff; stroke: #0056b3; }
      .scal-1 { fill: #f8d7da; stroke: #dc3545; }
      .scal-2 { fill: #fff3cd; stroke: #ffc107; }
      .arrow { fill: none; stroke: #dc3545; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4,4; }
      .solid-arrow { fill: none; stroke: #28a745; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  <text x="425" y="30" class="title" text-anchor="middle">np.c_ 만의 초능력: 단일 숫자(스칼라) 자동 팽창 (Broadcasting)</text>

  <!-- np.c_ Command -->
  <rect x="250" y="60" width="350" height="50" rx="5" ry="5" fill="#fcfcfc" stroke="#333" stroke-width="2" />
  <text x="425" y="92" class="code-txt" text-anchor="middle">np.c_[ x, 10, 20, y ]</text>

  <!-- Flow down arrows -->
  <path d="M 290 110 L 290 140" class="solid-arrow" stroke="#adb5bd" />
  <path d="M 370 110 L 370 140" class="solid-arrow" stroke="#dc3545" stroke-dasharray="4,4" />
  <polygon points="365,135 375,135 370,145" fill="#dc3545" />
  <path d="M 450 110 L 450 140" class="solid-arrow" stroke="#ffc107" stroke-dasharray="4,4" />
  <polygon points="445,135 455,135 450,145" fill="#ffc107" />
  <path d="M 520 110 L 520 140" class="solid-arrow" stroke="#0056b3" />

  <!-- Below the flow -->
  <g transform="translate(180, 160)">
    <!-- x -->
    <rect x="0" y="0" width="150" height="30" class="box arr-x" />
    <path d="M 50 0 L 50 30 M 100 0 L 100 30" stroke="#adb5bd" stroke-width="2" />
    <text x="75" y="20" class="code-txt" fill="#333">1 2 3</text>
    <text x="75" y="-10" class="title" font-size="14" text-anchor="middle">배열 x</text>
    
    <!-- 10 (expands) -->
    <rect x="160" y="0" width="40" height="30" class="box scal-1" />
    <text x="180" y="20" class="code-txt" fill="#dc3545">10</text>
    <text x="180" y="-10" class="title" font-size="14" fill="#dc3545" text-anchor="middle">자동팽창</text>

    <!-- 20 (expands) -->
    <rect x="210" y="0" width="40" height="30" class="box scal-2" />
    <text x="230" y="20" class="code-txt" fill="#000">20</text>
    <text x="230" y="-10" class="title" font-size="14" fill="#ffc107" text-anchor="middle">자동팽창</text>

    <!-- y -->
    <rect x="260" y="0" width="150" height="30" class="box arr-y" />
    <path d="M 310 0 L 310 30 M 360 0 L 360 30" stroke="#0056b3" stroke-width="2" />
    <text x="335" y="20" class="code-txt" fill="#0056b3">4 5 6</text>
    <text x="335" y="-10" class="title" font-size="14" text-anchor="middle">배열 y</text>

    <!-- Bracket wrap -->
    <path d="M -15 0 L -25 0 L -25 30 L -15 30 M 425 0 L 435 0 L 435 30 L 425 30" fill="none" stroke="#333" stroke-width="4" />
    <text x="205" y="60" class="title" font-size="16" text-anchor="middle" fill="#28a745">주변 배열 길이에 맞춰 빈칸을 자동으로 꽉 채워 병합완료!</text>
  </g>
</svg>
