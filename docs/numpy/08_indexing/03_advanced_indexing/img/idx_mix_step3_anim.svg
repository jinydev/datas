<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="250" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">역순 추출 혼합 작전: [:, np.arange(-1, -8, -1)]</text>
    
    <g transform="translate(150, 50)">
        <text x="-20" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#64748b" text-anchor="end">원본 (2~4행)</text>
        
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="240" height="20" fill="#f1f5f9" />
            <rect x="0" y="20" width="240" height="20" fill="#f1f5f9" />
            <rect x="0" y="40" width="240" height="20" fill="#f1f5f9" />
            <line x1="30" y1="0" x2="30" y2="60"/> <line x1="60" y1="0" x2="60" y2="60"/> <line x1="90" y1="0" x2="90" y2="60"/> <line x1="120" y1="0" x2="120" y2="60"/> <line x1="150" y1="0" x2="150" y2="60"/> <line x1="180" y1="0" x2="180" y2="60"/> <line x1="210" y1="0" x2="210" y2="60"/>
        </g>
        <g font-family="monospace" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle">
             <!-- Not extracted idx 0 -->
             <text x="15" y="14">16</text> <text x="15" y="34">24</text> <text x="15" y="54">32</text>
        </g>
        <g font-family="monospace" font-size="10" font-weight="bold" fill="#3b82f6" text-anchor="middle">
             <!-- Extracted elements 1 to 7 -->
             <text x="45" y="14">17</text> <text x="75" y="14">18</text> <text x="105" y="14">19</text> <text x="135" y="14">20</text> <text x="165" y="14">21</text> <text x="195" y="14">22</text> <text x="225" y="14">23</text>
             <text x="45" y="34">25</text> <text x="75" y="34">26</text> <text x="105" y="34">27</text> <text x="135" y="34">28</text> <text x="165" y="34">29</text> <text x="195" y="34">30</text> <text x="225" y="34">31</text>
             <text x="45" y="54">33</text> <text x="75" y="54">34</text> <text x="105" y="54">35</text> <text x="135" y="54">36</text> <text x="165" y="54">37</text> <text x="195" y="54">38</text> <text x="225" y="54">39</text>
        </g>

        <!-- Arrow -->
        <text x="150" y="85" font-family="sans-serif" font-size="12" fill="#ef4444" font-weight="bold" text-anchor="middle">-1 부터 7개를 거꾸로 추출하여 조립!</text>
        <path d="M 150 70 L 150 90 M 145 85 L 150 90 L 155 85" stroke="#ef4444" stroke-width="2" fill="none"/>

        <!-- Mirrored Block -->
        <g transform="translate(0, 100)">
             <text x="-20" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#64748b" text-anchor="end">역순 정렬</text>
             <g stroke="#fca5a5" stroke-width="1" stroke-dasharray="2" opacity="0.3">
                  <rect x="0" y="0" width="210" height="60" fill="#fee2e2" />
                  <line x1="30" y1="0" x2="30" y2="60"/> <line x1="60" y1="0" x2="60" y2="60"/> <line x1="90" y1="0" x2="90" y2="60"/> <line x1="120" y1="0" x2="120" y2="60"/> <line x1="150" y1="0" x2="150" y2="60"/> <line x1="180" y1="0" x2="180" y2="60"/> 
             </g>
             
            <g font-family="monospace" font-size="10" font-weight="bold" fill="#b91c1c" text-anchor="middle">
                 <!-- Col 1 -->
                 <g>
                     <animateTransform attributeName="transform" type="translate" values="0,-100; 180,0; 180,0; 0,-100" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                     <text x="45" y="14">17</text> <text x="45" y="34">25</text> <text x="45" y="54">33</text>
                 </g>
                 <!-- Col 2 -->
                 <g>
                     <animateTransform attributeName="transform" type="translate" values="0,-100; 120,0; 120,0; 0,-100" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                     <text x="75" y="14">18</text> <text x="75" y="34">26</text> <text x="75" y="54">34</text>
                 </g>
                 <!-- Col 3 -->
                 <g>
                     <animateTransform attributeName="transform" type="translate" values="0,-100; 60,0; 60,0; 0,-100" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                     <text x="105" y="14">19</text> <text x="105" y="34">27</text> <text x="105" y="54">35</text>
                 </g>
                 <!-- Col 4 -->
                 <g>
                     <animateTransform attributeName="transform" type="translate" values="0,-100; 0,0; 0,0; 0,-100" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                     <text x="135" y="14">20</text> <text x="135" y="34">28</text> <text x="135" y="54">36</text>
                 </g>
                 <!-- Col 5 -->
                 <g>
                     <animateTransform attributeName="transform" type="translate" values="0,-100; -60,0; -60,0; 0,-100" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                     <text x="165" y="14">21</text> <text x="165" y="34">29</text> <text x="165" y="54">37</text>
                 </g>
                 <!-- Col 6 -->
                 <g>
                     <animateTransform attributeName="transform" type="translate" values="0,-100; -120,0; -120,0; 0,-100" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                     <text x="195" y="14">22</text> <text x="195" y="34">30</text> <text x="195" y="54">38</text>
                 </g>
                 <!-- Col 7 -->
                 <g>
                     <animateTransform attributeName="transform" type="translate" values="0,-100; -180,0; -180,0; 0,-100" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                     <text x="225" y="14">23</text> <text x="225" y="34">31</text> <text x="225" y="54">39</text>
                 </g>
             </g>
        </g>
    </g>
    
    <text x="300" y="235" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">음수 인덱스 배열([-1, -2...])을 던지면 거울을 본 것처럼 역순으로 추출됩니다.</text>
</svg>
