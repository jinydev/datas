<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">스칼라(단일 상수) 브로드캐스팅: x[[0, 2, 4], 1]</text>
    
    <g transform="translate(140, 70)">
        <text x="0" y="0" font-family="monospace" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">
            <tspan fill="#ef4444">[0, 2, 4]</tspan>
            <tspan fill="#64748b"> , </tspan>
            <tspan fill="#3b82f6">1</tspan>
        </text>
        <path d="M 0 20 L 0 60 M 80 20 L 80 60" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4"/>
        <path d="M -5 55 L 0 60 L 5 55 M 75 55 L 80 60 L 85 55" fill="#94a3b8"/>
        
        <text x="0" y="90" font-family="monospace" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">
            <tspan fill="#ef4444">[0, 2, 4]</tspan>
            <tspan fill="#64748b"> , </tspan>
            <tspan fill="#3b82f6">[1, 1, 1]</tspan>
        </text>
        
        <text x="180" y="15" font-family="sans-serif" font-size="14" fill="#64748b">숫자 1개만 던져줘도 배열 길이에 맞춰</text>
        <text x="180" y="35" font-family="sans-serif" font-size="14" fill="#64748b">알아서 복제 리스트를 만듭니다.</text>
        <text x="180" y="85" font-family="sans-serif" font-size="14" fill="#3b82f6" font-weight="bold">(Broadcasting 발동! 단일 스칼라 1 -> [1, 1, 1])</text>
    </g>
    
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">결과적으로 0행 1열, 2행 1열, 4행 1열에 있는 값을 세로로 뽑아냅니다.</text>
</svg>
