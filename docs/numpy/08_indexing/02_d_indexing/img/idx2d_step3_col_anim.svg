<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">지정 열(Col) 순서 다중 추출: x[:, [5, 4]]</text>
    <g transform="translate(180, 50)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="240" height="140" fill="#f1f5f9" opacity="0.4" />
        </g>
        
        <g>
            <animateTransform attributeName="transform" type="translate" values="0,0; 0,30; 0,30; 0,0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            
            <g transform="translate(-150, 0)">
                <rect x="150" y="0" width="30" height="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
                <g font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">
                     <text x="165" y="14">5</text><text x="165" y="34">13</text><text x="165" y="54">21</text><text x="165" y="74">29</text><text x="165" y="94">37</text><text x="165" y="114">45</text><text x="165" y="134">53</text>
                </g>
            </g>
            <g transform="translate(-90, 0)">
                <rect x="120" y="0" width="30" height="140" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
                <g font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">
                     <text x="135" y="14">4</text><text x="135" y="34">12</text><text x="135" y="54">20</text><text x="135" y="74">28</text><text x="135" y="94">36</text><text x="135" y="114">44</text><text x="135" y="134">52</text>
                </g>
            </g>
        </g>
    </g>
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">지정해 준 콜론 배열 순서([5번째, 4번째 열]) 그대로 세로줄이 뽑혀나와 조립됩니다.</text>
</svg>
