<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">기지국 셋업 완료: 1차원 배열(크기 10)</text>
    
    <g transform="translate(100, 100)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="40" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="80" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="120" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="160" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="200" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="240" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="280" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="320" y="0" width="40" height="40" fill="#f1f5f9"/>
            <rect x="360" y="0" width="40" height="40" fill="#f1f5f9"/>
        </g>
        <g font-family="monospace" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">
             <text x="20" y="25">0</text>
             <text x="60" y="25">1</text>
             <text x="100" y="25">2</text>
             <text x="140" y="25">3</text>
             <text x="180" y="25">4</text>
             <text x="220" y="25">5</text>
             <text x="260" y="25">6</text>
             <text x="300" y="25">7</text>
             <text x="340" y="25">8</text>
             <text x="380" y="25">9</text>
        </g>
        <g font-family="sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">
             <text x="20" y="-10">idx0</text>
             <text x="60" y="-10">idx1</text>
             <text x="100" y="-10">idx2</text>
             <text x="140" y="-10">idx3</text>
             <text x="180" y="-10">idx4</text>
             <text x="220" y="-10">idx5</text>
             <text x="260" y="-10">idx6</text>
             <text x="300" y="-10">idx7</text>
             <text x="340" y="-10">idx8</text>
             <text x="380" y="-10">idx9</text>
        </g>
    </g>
    
    <text x="300" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">Fancy Indexing의 타겟 목표물이 될 연속된 공간(기지국)을 배정했습니다.</text>
</svg>
