<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="150" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">1차원 기본 배열 생성 (np.arange)</text>
    
    <g transform="translate(50, 50)">
        <rect width="160" height="40" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
        <text x="80" y="26" font-family="Courier New, Courier, monospace" font-size="18" font-weight="bold" fill="#38bdf8" text-anchor="middle">np.arange(3)</text>
    </g>

    <path d="M 220 70 L 290 70" stroke="#94a3b8" stroke-width="3" stroke-dasharray="4" marker-end="url(#arrow)"/>

    <text x="320" y="60" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">생성된 배열 a</text>

    <g transform="translate(320, 70)">
        <rect width="70" height="40" rx="5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="35" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">0</text>
    </g>
    <g transform="translate(400, 70)">
        <rect width="70" height="40" rx="5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="35" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">1</text>
    </g>
    <g transform="translate(480, 70)">
        <rect width="70" height="40" rx="5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="35" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">2</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
        </marker>
    </defs>
</svg>
