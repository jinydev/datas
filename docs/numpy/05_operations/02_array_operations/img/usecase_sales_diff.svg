<svg width="700" height="150" viewBox="0 0 700 150" xmlns="http://www.w3.org/2000/svg">
    <rect width="700" height="150" fill="#f8fafc" rx="10"/>
    <text x="350" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">데이터 병합: 전년대비 매출 증감액 계산 (1:1 뺄셈)</text>

    <text x="120" y="55" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">올해 매출 배열</text>
    <g transform="translate(30, 65)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">150</text>
        <rect x="65" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="95" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">180</text>
        <rect x="130" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="160" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">210</text>
    </g>

    <text x="245" y="93" font-family="sans-serif" font-size="28" font-weight="bold" fill="#64748b" text-anchor="middle">-</text>

    <text x="360" y="55" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">작년 매출 배열</text>
    <g transform="translate(270, 65)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="30" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">120</text>
        <rect x="65" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="95" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">190</text>
        <rect x="130" y="0" width="60" height="40" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="160" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">200</text>
    </g>

    <text x="485" y="93" font-family="sans-serif" font-size="28" font-weight="bold" fill="#64748b" text-anchor="middle">=</text>

    <text x="600" y="55" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">매출 증감액 결과</text>
    <g transform="translate(510, 65)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
        <text x="30" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="middle">+30</text>
        <rect x="65" y="0" width="60" height="40" rx="4" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
        <text x="95" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1d4ed8" text-anchor="middle">-10</text>
        <rect x="130" y="0" width="60" height="40" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
        <text x="160" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="middle">+10</text>
    </g>
