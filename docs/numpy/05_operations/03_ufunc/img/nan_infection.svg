<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="200" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: 결측치(nan) 감염 원리</text>
    
    <g transform="translate(100, 80)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">20</text>
        <rect x="70" y="0" width="60" height="40" rx="4" fill="#1e293b" stroke="#000000" stroke-width="2"/>
        <text x="100" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">nan</text>
        <rect x="140" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="170" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">13</text>
        <rect x="210" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="240" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">24</text>
    </g>

    <text x="400" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">일반 합계 연산 시</text>
    
    <!-- Animated Path -->
    <path d="M 380 120 L 420 120" stroke="#ef4444" stroke-width="4" stroke-dasharray="10">
        <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.5s" repeatCount="indefinite"/>
    </path>

    <rect x="440" y="80" width="100" height="40" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="3"/>
    
    <!-- Flashing Result -->
    <text x="490" y="106" font-family="sans-serif" font-size="20" font-weight="bold" fill="#b91c1c" text-anchor="middle">
        nan !!
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </text>

    <!-- Biohazard style effect -->
    <circle cx="200" cy="100" r="40" fill="none" stroke="#ef4444" stroke-width="4" opacity="0">
        <animate attributeName="r" values="40;80" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <text x="300" y="160" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">중간에 결측치가 섞여 들어가서 정상적인 결과가 모두 파괴됩니다</text>

</svg>
