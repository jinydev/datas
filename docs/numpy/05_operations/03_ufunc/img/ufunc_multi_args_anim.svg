<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: 다중 인자 범용 함수의 요소별 일괄 연산</text>
    
    <!-- Magic Box -->
    <g transform="translate(240, 85)">
        <rect x="0" y="0" width="120" height="90" rx="10" fill="#64748b" stroke="#334155" stroke-width="3"/>
        <rect x="10" y="10" width="100" height="70" rx="5" fill="#1e293b"/>
        <text x="60" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">거듭제곱 기계</text>
        <text x="60" y="65" font-family="monospace" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle">np.power()</text>
    </g>
    
    <!-- Arrays Sliding In -->
    <g>
        <g transform="translate(45, 75)">
            <rect x="0" y="0" width="30" height="30" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
            <text x="15" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">1</text>
            <rect x="35" y="0" width="30" height="30" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
            <text x="50" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">4</text>
            <rect x="70" y="0" width="30" height="30" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
            <text x="85" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">9</text>
            <animateTransform attributeName="transform" type="translate" values="45,75;250,75;250,75;45,75" keyTimes="0;0.4;0.9;1" dur="3s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0;0;1" keyTimes="0;0.35;0.9;1" dur="3s" repeatCount="indefinite" />
        </g>
        <text x="95" y="65" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">배열 c</text>
    </g>

    <g>
        <g transform="translate(45, 140)">
            <rect x="0" y="0" width="30" height="30" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
            <text x="15" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a16207" text-anchor="middle">2</text>
            <rect x="35" y="0" width="30" height="30" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
            <text x="50" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a16207" text-anchor="middle">2</text>
            <rect x="70" y="0" width="30" height="30" rx="4" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
            <text x="85" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a16207" text-anchor="middle">2</text>
            <animateTransform attributeName="transform" type="translate" values="45,140;250,140;250,140;45,140" keyTimes="0;0.4;0.9;1" dur="3s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0;0;1" keyTimes="0;0.35;0.9;1" dur="3s" repeatCount="indefinite" />
        </g>
        <text x="95" y="185" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">배열 d</text>
    </g>

    <!-- Output Sliding Out -->
    <g>
        <g transform="translate(430, 115)" opacity="0">
            <rect x="0" y="0" width="30" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
            <text x="15" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">1</text>
            <rect x="35" y="0" width="30" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
            <text x="50" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">16</text>
            <rect x="70" y="0" width="30" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
            <text x="85" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">81</text>
            <animateTransform attributeName="transform" type="translate" values="250,115;430,115;430,115;250,115" keyTimes="0;0.4;0.9;1" dur="3s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.4;0.5;1" dur="3s" repeatCount="indefinite" />
        </g>
        <text x="475" y="105" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">결과 배열 도출!</text>
    </g>
</svg>
