<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">전체 원소 더하기 (a.sum())</text>
    
    <!-- 3x2 Matrix -->
    <g transform="translate(150, 60)">
        <rect x="0" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">10</text>
        
        <rect x="70" y="0" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="100" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">20</text>
        
        <rect x="0" y="50" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="76" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">5</text>
        
        <rect x="70" y="50" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="100" y="76" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">8</text>
        
        <rect x="0" y="100" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="126" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">1</text>
        
        <rect x="70" y="100" width="60" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="100" y="126" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">2</text>
    </g>

    <!-- Converging Arrows to the right -->
    <path d="M 290 80 Q 340 130 380 130" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow_red)"/>
    <path d="M 290 130 L 380 130" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow_red)"/>
    <path d="M 290 180 Q 340 130 380 130" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow_red)"/>

    <text x="340" y="110" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">모두 집어넣어 합산</text>

    <!-- Result Scalar -->
    <path d="M 390 100 L 460 100 L 440 160 L 370 160 Z" fill="#fecaca" stroke="#dc2626" stroke-width="3"/>
    <rect x="400" y="105" width="80" height="50" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="4"/>
    <text x="440" y="138" font-family="sans-serif" font-size="24" font-weight="bold" fill="#15803d" text-anchor="middle">46</text>

    <text x="440" y="180" font-family="sans-serif" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">단 하나의 값(스칼라)</text>

    <defs>
        <marker id="arrow_red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
        </marker>
    </defs>
</svg>
