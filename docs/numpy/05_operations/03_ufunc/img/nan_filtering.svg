<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">결측치 제거: ~np.isnan 필터링 원리</text>
    
    <!-- Original Array e -->
    <text x="70" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">1. 감염된 원본 (e)</text>
    <g transform="translate(250, 45)">
        <rect x="0" y="0" width="60" height="35" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="30" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">20</text>
        <!-- infected cell -->
        <rect x="65" y="0" width="60" height="35" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
        <text x="95" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">nan</text>
        
        <rect x="130" y="0" width="60" height="35" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="160" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">13</text>
        
        <rect x="195" y="0" width="60" height="35" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="225" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">24</text>
    </g>

    <!-- Filter ~np.isnan(e) -->
    <text x="70" y="130" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">2. 소독 거름망 (~np.isnan)</text>
    <g transform="translate(250, 105)">
        <!-- boolean filter -->
        <rect x="0" y="0" width="60" height="35" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="4" stroke-width="2"/>
        <text x="30" y="23" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">True</text>
        <path d="M 30 40 L 30 65" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow_green)"/>
        
        <!-- dropping the nan cell -->
        <rect x="65" y="0" width="60" height="35" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="4" stroke-width="2"/>
        <text x="95" y="23" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">False</text>
        <path d="M 85 41 L 105 61" stroke="#dc2626" stroke-width="4"/>
        <path d="M 105 41 L 85 61" stroke="#dc2626" stroke-width="4"/>

        <rect x="130" y="0" width="60" height="35" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="4" stroke-width="2"/>
        <text x="160" y="23" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">True</text>
        <path d="M 160 40 L 160 65" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow_green)"/>

        <rect x="195" y="0" width="60" height="35" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-dasharray="4" stroke-width="2"/>
        <text x="225" y="23" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">True</text>
        <path d="M 225 40 L 225 65" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow_green)"/>
    </g>

    <!-- Final Result Array -->
    <text x="70" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">3. 정제 완료된 결과</text>
    <g transform="translate(250, 185)">
        <rect x="0" y="0" width="60" height="35" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="30" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">20</text>
        
        <rect x="65" y="0" width="60" height="35" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="95" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">13</text>
        
        <rect x="130" y="0" width="60" height="35" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
        <text x="160" y="23" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">24</text>
    </g>

    <defs>
        <marker id="arrow_green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
        </marker>
    </defs>
</svg>
