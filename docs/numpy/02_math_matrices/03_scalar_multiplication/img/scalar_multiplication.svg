<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#1a202c" rx="10"/>

  <defs>
    <linearGradient id="scalarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#ed8936"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <text x="300" y="30" font-family="Arial" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    스칼라 곱셈 (Scalar Multiplication) 애니메이션
  </text>

  <!-- The Scalar '2' -->
  <g transform="translate(100, 150)">
    <circle cx="0" cy="0" r="30" fill="url(#scalarGrad)" filter="url(#glow)"/>
    <text x="0" y="10" font-family="Arial" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
  </g>

  <text x="160" y="160" font-family="Arial" font-size="32" font-weight="bold" fill="#a0aec0" text-anchor="middle">×</text>

  <!-- The Matrix Container -->
  <g transform="translate(200, 70)">
    <!-- Left Bracket -->
    <path d="M 20 0 L 0 0 L 0 160 L 20 160" fill="none" stroke="#4a5568" stroke-width="4"/>
    <!-- Right Bracket -->
    <path d="M 330 0 L 350 0 L 350 160 L 330 160" fill="none" stroke="#4a5568" stroke-width="4"/>

    <!-- Matrix Cells -->
    <g transform="translate(40, 40)">
      <rect x="-30" y="-30" width="120" height="60" fill="#2d3748" rx="6"/>
      <!-- Original Value -->
      <text x="30" y="8" font-family="monospace" font-size="24" fill="#cbd5e0" text-anchor="middle" opacity="1">
        <animate attributeName="opacity" values="1; 0; 0; 1" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.9; 1"/>
        1000
      </text>
      <!-- Calculation -->
      <text x="30" y="8" font-family="monospace" font-size="20" fill="#fbd38d" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.6; 0.65; 1"/>
        1000 × 2
      </text>
      <!-- Final Value -->
      <text x="30" y="8" font-family="monospace" font-size="24" font-weight="bold" fill="#68d391" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.65; 0.7; 0.9; 1"/>
        2000
      </text>
    </g>

    <g transform="translate(200, 40)">
      <rect x="-30" y="-30" width="120" height="60" fill="#2d3748" rx="6"/>
      <text x="30" y="8" font-family="monospace" font-size="24" fill="#cbd5e0" text-anchor="middle" opacity="1">
        <animate attributeName="opacity" values="1; 0; 0; 1" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.9; 1"/>
        800
      </text>
      <text x="30" y="8" font-family="monospace" font-size="20" fill="#fbd38d" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.6; 0.65; 1"/>
        800 × 2
      </text>
      <text x="30" y="8" font-family="monospace" font-size="24" font-weight="bold" fill="#68d391" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.65; 0.7; 0.9; 1"/>
        1600
      </text>
    </g>

    <g transform="translate(40, 120)">
      <rect x="-30" y="-30" width="120" height="60" fill="#2d3748" rx="6"/>
      <text x="30" y="8" font-family="monospace" font-size="24" fill="#cbd5e0" text-anchor="middle" opacity="1">
        <animate attributeName="opacity" values="1; 0; 0; 1" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.9; 1"/>
        1200
      </text>
      <text x="30" y="8" font-family="monospace" font-size="20" fill="#fbd38d" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.6; 0.65; 1"/>
        1200 × 2
      </text>
      <text x="30" y="8" font-family="monospace" font-size="24" font-weight="bold" fill="#68d391" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.65; 0.7; 0.9; 1"/>
        2400
      </text>
    </g>

    <g transform="translate(200, 120)">
      <rect x="-30" y="-30" width="120" height="60" fill="#2d3748" rx="6"/>
      <text x="30" y="8" font-family="monospace" font-size="24" fill="#cbd5e0" text-anchor="middle" opacity="1">
        <animate attributeName="opacity" values="1; 0; 0; 1" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.9; 1"/>
        500
      </text>
      <text x="30" y="8" font-family="monospace" font-size="20" fill="#fbd38d" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.6; 0.65; 1"/>
        500 × 2
      </text>
      <text x="30" y="8" font-family="monospace" font-size="24" font-weight="bold" fill="#68d391" text-anchor="middle" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.65; 0.7; 0.9; 1"/>
        1000
      </text>
    </g>
  </g>

  <!-- Flying '2' projectiles -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.1; 0.35; 0.4; 1"/>
    
    <!-- To Top-Left -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="100, 150; 270, 110" dur="6s" repeatCount="indefinite" keyTimes="0; 0.3"/>
      <circle cx="0" cy="0" r="15" fill="#ed8936"/>
      <text x="0" y="5" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    </g>
    <!-- To Top-Right -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="100, 150; 430, 110" dur="6s" repeatCount="indefinite" keyTimes="0; 0.3"/>
      <circle cx="0" cy="0" r="15" fill="#ed8936"/>
      <text x="0" y="5" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    </g>
    <!-- To Bottom-Left -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="100, 150; 270, 190" dur="6s" repeatCount="indefinite" keyTimes="0; 0.3"/>
      <circle cx="0" cy="0" r="15" fill="#ed8936"/>
      <text x="0" y="5" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    </g>
    <!-- To Bottom-Right -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="100, 150; 430, 190" dur="6s" repeatCount="indefinite" keyTimes="0; 0.3"/>
      <circle cx="0" cy="0" r="15" fill="#ed8936"/>
      <text x="0" y="5" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    </g>
  </g>
</svg>
