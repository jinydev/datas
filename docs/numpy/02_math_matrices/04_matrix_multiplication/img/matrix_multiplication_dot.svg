<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .box-a { fill: none; stroke: #0d6efd; stroke-width: 3; rx: 5; ry: 5; }
      .box-b { fill: none; stroke: #dc3545; stroke-width: 3; rx: 5; ry: 5; }
      .box-c { fill: #e9ecef; stroke: #6f42c1; stroke-width: 4; rx: 10; ry: 10; }
      .text-val { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: bold; fill: #343a40; text-anchor: middle; }
      .text-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: bold; fill: #343a40; text-anchor: middle; }
      .arrow { stroke: #6f42c1; stroke-width: 4; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6f42c1" />
    </marker>
  </defs>

  <!-- Matrix A -->
  <text class="text-title" x="100" y="50">Matrix A (가로본능)</text>
  <text class="text-title" x="35" y="110">[</text>
  <rect class="box-a" x="45" y="80" width="110" height="40" fill="rgba(13,110,253,0.1)" />
  <text class="text-val" x="70" y="110" fill="#0d6efd">1</text>
  <text class="text-val" x="130" y="110" fill="#0d6efd">2</text>
  
  <text class="text-val" x="70" y="170">3</text>
  <text class="text-val" x="130" y="170">4</text>
  <text class="text-title" x="165" y="110">]</text>

  <text class="text-title" x="200" y="140" font-size="30">×</text>

  <!-- Matrix B -->
  <text class="text-title" x="300" y="50">Matrix B (세로본능)</text>
  <text class="text-title" x="235" y="110">[</text>
  <rect class="box-b" x="245" y="80" width="50" height="100" fill="rgba(220,53,69,0.1)" />
  <text class="text-val" x="270" y="110" fill="#dc3545">5</text>
  <text class="text-val" x="330" y="110">6</text>
  
  <text class="text-val" x="270" y="170" fill="#dc3545">7</text>
  <text class="text-val" x="330" y="170">8</text>
  <text class="text-title" x="365" y="110">]</text>

  <text class="text-title" x="400" y="140" font-size="30">=</text>

  <!-- Result Matrix C -->
  <text class="text-title" x="600" y="50">결과 (Dot Product)</text>
  <rect class="box-c" x="450" y="80" width="300" height="150" />
  
  <text x="600" y="120" font-family="'Inter', sans-serif" font-size="18" font-weight="bold" fill="#6f42c1" text-anchor="middle">
    (1 × 5) + (2 × 7) = 19
  </text>
  
  <text class="text-val" x="520" y="200">19</text>
  <text class="text-val" x="680" y="200">22</text>
  
  <rect x="480" y="160" width="80" height="60" fill="none" stroke="#6f42c1" stroke-width="4" stroke-dasharray="5 5" rx="5" ry="5"/>

  <!-- Collision Arrows -->
  <path class="arrow" d="M 120 70 Q 270 30 270 70" />
  <text x="210" y="40" font-family="'Inter', sans-serif" font-size="14" fill="#6f42c1" font-weight="bold">내적 충돌 (쾅!)</text>

</svg>
