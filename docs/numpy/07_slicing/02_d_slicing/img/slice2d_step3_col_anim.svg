<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="280" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">열(Column) 추출: 세로 막대기 슬라이싱 a[:, 2:4]</text>
    
    <g transform="translate(150, 70)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="0" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="120" y="0" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="160" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="200" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="0" y="30" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="30" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="30" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="120" y="30" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="160" y="30" width="40" height="30" fill="#f1f5f9"/>
            <rect x="200" y="30" width="40" height="30" fill="#f1f5f9"/>
            <rect x="0" y="60" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="60" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="60" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="120" y="60" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="160" y="60" width="40" height="30" fill="#f1f5f9"/>
            <rect x="200" y="60" width="40" height="30" fill="#f1f5f9"/>
            <rect x="0" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="90" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="120" y="90" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="160" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="200" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="0" y="120" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="120" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="120" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="120" y="120" width="40" height="30" fill="#e0f2fe" opacity="0.6"/>
            <rect x="160" y="120" width="40" height="30" fill="#f1f5f9"/>
            <rect x="200" y="120" width="40" height="30" fill="#f1f5f9"/>
        </g>
        
        <g>
            <rect x="80" y="0" width="80" height="150" fill="#bae6fd" stroke="#0284c7" stroke-width="3" rx="2"/>
            <animateTransform attributeName="transform" type="translate" values="0,0;100,-40;100,-40;0,0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            
            <text x="120" y="-10" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0284c7" text-anchor="middle" opacity="0">
                추출된 열 (세로막대)
                <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.4;0.9;1"/>
            </text>
            
            <g font-family="monospace" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">
                <text x="100" y="20">2</text><text x="140" y="20">3</text>
                <text x="100" y="50">8</text><text x="140" y="50">9</text>
                <text x="100" y="80">14</text><text x="140" y="80">15</text>
                <text x="100" y="110">20</text><text x="140" y="110">21</text>
                <text x="100" y="140">26</text><text x="140" y="140">27</text>
            </g>
        </g>
        
        <rect x="80" y="0" width="80" height="150" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4"/>
        
        <text x="-40" y="80" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" transform="rotate(-90, -40, 80)">행(:) 구역 전체허용</text>
        <text x="120" y="-20" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">열(2:4) 구역 제한</text>
    </g>

    <text x="300" y="260" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">콤마 앞(행)은 ':'로 통과시키고, 뒤(열)만 지정하여 세로 막대기 형태로 썰어냅니다.</text>
</svg>
