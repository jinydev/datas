<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">정밀 타격: 개별 요소 1개 단일 저격 a[2, 4]</text>
    
    <g transform="translate(150, 60)">
        <g stroke="#cbd5e1" stroke-width="1" opacity="0.6">
            <rect x="0" y="0" width="240" height="150" fill="#f1f5f9"/>
        </g>
        <g transform="translate(180, 75)">
            <circle cx="0" cy="0" r="15" fill="#fecaca" opacity="0">
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </circle>
            <path d="M -25 0 L -10 0 M 10 0 L 25 0 M 0 -25 L 0 -10 M 0 10 L 0 25" stroke="#ef4444" stroke-width="2" opacity="0">
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </path>
            <circle cx="0" cy="0" r="2" fill="#ef4444"/>
            <text x="-5" y="-20" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="end">[2, 4] 타겟팅!</text>
        </g>
        
        <g transform="translate(180, 75)">
            <animateTransform attributeName="transform" type="translate" values="180,75; 80,-20; 80,-20; 180,75" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            <rect x="-15" y="-15" width="30" height="30" fill="#ef4444" rx="4" stroke="#7f1d1d" stroke-width="2" opacity="0">
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </rect>
            <text x="0" y="5" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0">
                16
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </text>
            <text x="0" y="30" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b91c1c" text-anchor="middle" opacity="0">
                스칼라 추출
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            </text>
        </g>
    </g>
    
    <text x="300" y="230" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">행과 열의 정확한 교차점 좌표를 넘겨 숫자값 하나만 정밀 저격합니다.</text>
</svg>
