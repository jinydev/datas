<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="200" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">1단계: 단일 요소 인덱싱 (단건 저격)</text>
    
    <g transform="translate(30, 100)">
        <g font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">
            <text x="25" y="-15">0</text>
            <text x="75" y="-15">1</text>
            <text x="125" y="-15">2</text>
            <text x="175" y="-15" fill="#e11d48" font-weight="bold">3</text>
            <text x="225" y="-15">4</text>
            <text x="275" y="-15">5</text>
            <text x="325" y="-15">6</text>
            <text x="375" y="-15">7</text>
            <text x="425" y="-15" fill="#0284c7" font-weight="bold">8 (-2)</text>
            <text x="475" y="-15">9 (-1)</text>
        </g>
        
        <g stroke="#94a3b8" stroke-width="1">
            <rect x="0" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="50" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="100" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="150" y="0" width="50" height="40" fill="#ffe4e6" stroke="#e11d48" stroke-width="2">
                <animate attributeName="fill" values="#ffe4e6;#fda4af;#ffe4e6" dur="2s" repeatCount="indefinite"/>
            </rect>
            
            <rect x="200" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="250" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="300" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="350" y="0" width="50" height="40" fill="#f1f5f9"/>
            
            <rect x="400" y="0" width="50" height="40" fill="#e0f2fe" stroke="#0284c7" stroke-width="2">
                <animate attributeName="fill" values="#e0f2fe;#7dd3fc;#e0f2fe" dur="2s" repeatCount="indefinite"/>
            </rect>
            <rect x="450" y="0" width="50" height="40" fill="#f1f5f9"/>
        </g>

        <g font-family="monospace" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">
            <text x="25" y="26">0</text>
            <text x="75" y="26">1</text>
            <text x="125" y="26">4</text>
            <text x="175" y="26" fill="#be123c">9</text>
            <text x="225" y="26">16</text>
            <text x="275" y="26">25</text>
            <text x="325" y="26">36</text>
            <text x="375" y="26">49</text>
            <text x="425" y="26" fill="#0369a1">64</text>
            <text x="475" y="26">81</text>
        </g>
        
        <g opacity="0">
            <path d="M 175 -50 L 175 -30" stroke="#e11d48" stroke-width="3" marker-end="url(#arrow_red)"/>
            <text x="175" y="-55" font-family="monospace" font-size="14" font-weight="bold" fill="#e11d48" text-anchor="middle">a[3]</text>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.2;0.8;1" dur="4s" repeatCount="indefinite"/>
        </g>
        
        <g opacity="0">
            <path d="M 425 90 L 425 70" stroke="#0284c7" stroke-width="3" marker-end="url(#arrow_blue)"/>
            <text x="425" y="110" font-family="monospace" font-size="14" font-weight="bold" fill="#0284c7" text-anchor="middle">a[-2]</text>
            <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.6;0.9;1" dur="4s" repeatCount="indefinite"/>
        </g>
    </g>

    <defs>
        <marker id="arrow_red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e11d48"/>
        </marker>
        <marker id="arrow_blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7"/>
        </marker>
    </defs>
</svg>
