<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="300" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: 세로 기둥 배열의 옆구리(측면) 브로드캐스팅</text>
    
    <!-- Target Matrix X (Background) -->
    <text x="140" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">대상 2차원 배열 x (3x3)</text>
    <g transform="translate(80, 90)">
        <rect x="0" y="0" width="120" height="120" rx="4" fill="none" stroke="#bae6fd" stroke-width="2" stroke-dasharray="4"/>
        <path d="M 40 0 L 40 120 M 80 0 L 80 120" stroke="#bae6fd" stroke-width="2" stroke-dasharray="4"/>
        <path d="M 0 40 L 120 40 M 0 80 L 120 80" stroke="#bae6fd" stroke-width="2" stroke-dasharray="4"/>
        <text x="60" y="65" font-family="sans-serif" font-size="18" font-weight="bold" fill="#bae6fd" text-anchor="middle">3x3 거대 테이블</text>
    </g>

    <text x="240" y="155" font-family="sans-serif" font-size="24" font-weight="bold" fill="#475569" text-anchor="middle">/</text>

    <!-- Source Column Vector Y -->
    <text x="360" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">세로 기둥 배열 y (3x1)</text>
    <g transform="translate(320, 90)">
        <!-- Original Column -->
        <g>
            <rect x="0" y="0" width="40" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
            <text x="20" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">3</text>
            <rect x="0" y="40" width="40" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
            <text x="20" y="66" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">6</text>
            <rect x="0" y="80" width="40" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
            <text x="20" y="106" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">9</text>
        </g>
        
        <!-- Stretching ghost clones rightwards -->
        <g opacity="0">
            <!-- Col 2 copy -->
            <rect x="40" y="0" width="40" height="40" rx="4" fill="#fee2e2" stroke="#f87171" stroke-width="2" stroke-dasharray="4"/>
            <text x="60" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">3</text>
            <rect x="40" y="40" width="40" height="40" rx="4" fill="#fee2e2" stroke="#f87171" stroke-width="2" stroke-dasharray="4"/>
            <text x="60" y="66" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">6</text>
            <rect x="40" y="80" width="40" height="40" rx="4" fill="#fee2e2" stroke="#f87171" stroke-width="2" stroke-dasharray="4"/>
            <text x="60" y="106" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">9</text>
            
            <!-- Col 3 copy -->
            <rect x="80" y="0" width="40" height="40" rx="4" fill="#fee2e2" stroke="#f87171" stroke-width="2" stroke-dasharray="4"/>
            <text x="100" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">3</text>
            <rect x="80" y="40" width="40" height="40" rx="4" fill="#fee2e2" stroke="#f87171" stroke-width="2" stroke-dasharray="4"/>
            <text x="100" y="66" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">6</text>
            <rect x="80" y="80" width="40" height="40" rx="4" fill="#fee2e2" stroke="#f87171" stroke-width="2" stroke-dasharray="4"/>
            <text x="100" y="106" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">9</text>
            <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.5;0.9;1" dur="2.5s" repeatCount="indefinite"/>
        </g>
    </g>

    <path d="M 470 150 L 520 150" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow_green)"/>
    <text x="550" y="155" font-family="sans-serif" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">3x3 완성</text>

    <defs>
        <marker id="arrow_green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
        </marker>
    </defs>

    <text x="300" y="260" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">오른쪽 빈 공간(가로 길이 1단면) 감지 즉시 우측 옆구리를 찔러넣듯 수평 기둥 복제 연쇄를 일으킵니다.</text>
</svg>
