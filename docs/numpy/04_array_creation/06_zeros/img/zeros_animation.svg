<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Comic Sans MS', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .code { font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #e74c3c; background: #fdf2e9; }
    
    .grid-cell { fill: #ecf0f1; stroke: #95a5a6; stroke-width: 2; rx: 5; }
    .grid-text { font-family: 'Courier New', monospace; font-size: 24px; font-weight: bold; fill: #3498db; text-anchor: middle; alignment-baseline: central; opacity: 0; }
    
    /* Animations */
    @keyframes drop-zero {
      0% { opacity: 0; transform: translateY(-30px); fill: #e74c3c; }
      40% { opacity: 1; transform: translateY(0); fill: #3498db; }
      80%, 100% { opacity: 1; transform: translateY(0); fill: #3498db; }
    }
    
    /* Cascading delays for each cell */
    .z0 { animation: drop-zero 3s infinite; animation-delay: 0.1s; }
    .z1 { animation: drop-zero 3s infinite; animation-delay: 0.2s; }
    .z2 { animation: drop-zero 3s infinite; animation-delay: 0.3s; }
    .z3 { animation: drop-zero 3s infinite; animation-delay: 0.4s; }
    .z4 { animation: drop-zero 3s infinite; animation-delay: 0.5s; }
    .z5 { animation: drop-zero 3s infinite; animation-delay: 0.6s; }
    .z6 { animation: drop-zero 3s infinite; animation-delay: 0.7s; }
    .z7 { animation: drop-zero 3s infinite; animation-delay: 0.8s; }

  </style>

  <rect width="100%" height="100%" fill="#f9fcfb" rx="20" />
  
  <text x="300" y="40" class="title" text-anchor="middle">빈 공간(메모리)을 0으로 깨끗하게 초기화!</text>
  <text x="300" y="70" class="code" text-anchor="middle">np.zeros( (2, 4) )</text>

  <!-- 2x4 Grid -->
  <g transform="translate(140, 110)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="70" height="70" class="grid-cell" />
    <text x="35" y="38" class="grid-text z0">0.</text>
    
    <rect x="80" y="0" width="70" height="70" class="grid-cell" />
    <text x="115" y="38" class="grid-text z1">0.</text>

    <rect x="160" y="0" width="70" height="70" class="grid-cell" />
    <text x="195" y="38" class="grid-text z2">0.</text>

    <rect x="240" y="0" width="70" height="70" class="grid-cell" />
    <text x="275" y="38" class="grid-text z3">0.</text>
    
    <!-- Row 2 -->
    <rect x="0" y="80" width="70" height="70" class="grid-cell" />
    <text x="35" y="118" class="grid-text z4">0.</text>
    
    <rect x="80" y="80" width="70" height="70" class="grid-cell" />
    <text x="115" y="118" class="grid-text z5">0.</text>

    <rect x="160" y="80" width="70" height="70" class="grid-cell" />
    <text x="195" y="118" class="grid-text z6">0.</text>

    <rect x="240" y="80" width="70" height="70" class="grid-cell" />
    <text x="275" y="118" class="grid-text z7">0.</text>
  </g>

</svg>
