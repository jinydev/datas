<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .code { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #e74c3c; background: #fdf2e9; }
    .line { stroke: #bdc3c7; stroke-width: 6; stroke-linecap: round; }
    
    .jump-path { stroke: #e67e22; stroke-width: 4; fill: none; stroke-dasharray: 4 4; }
    .mark { stroke: #e74c3c; stroke-width: 3; }
    
    .dot-arange { fill: #e67e22; opacity: 0; }
    .dot-linspace { fill: #2980b9; opacity: 0; }
    
    .text-label { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #555; text-anchor: middle; opacity: 0; }
    .alert-text { font-family: 'Comic Sans MS', sans-serif; font-size: 14px; font-weight: bold; fill: #c0392b; opacity: 0; }
    
    /* Animations */
    @keyframes appear { 
      0%, 10% { opacity: 0; transform: translateY(-5px); } 
      15%, 80% { opacity: 1; transform: translateY(0); } 
      100% { opacity: 1; transform: translateY(0); } 
    }
    
    @keyframes alert-blink { 
      0%, 40% { opacity: 0; }
      45%, 55%, 65%, 75% { opacity: 1; fill: #c0392b; }
      50%, 60%, 70% { opacity: 1; fill: #f39c12; }
      80% { opacity: 1; }
      100% { opacity: 1; }
    }

    .anim { animation: appear 8s infinite; }
    .blinker { animation: alert-blink 8s infinite; }
  </style>

  <rect width="100%" height="100%" fill="#f9fcfb" rx="20" />
  
  <text x="400" y="30" class="title" text-anchor="middle">⚠️ arange의 함정: 소수점(Float) 오차 주의!</text>

  <!-- CASE 1: arange(0.1, 0.4, 0.1) -->
  <g transform="translate(0, 90)">
    <text x="50" y="-15" class="code">np.arange(0.1, 0.4, 0.1)</text>
    <line x1="150" y1="0" x2="600" y2="0" class="line" />
    <line x1="600" y1="-20" x2="600" y2="20" class="mark" /> <!-- End line at 0.4 -->
    <text x="600" y="-30" class="text-label" style="opacity:1; fill:#e74c3c">도착선 (0.4 제외해야 함)</text>
    
    <!-- Jumps -->
    <path d="M 150 0 Q 225 -50 300 0" class="jump-path anim" style="animation-delay: 0s" />
    <path d="M 300 0 Q 375 -50 450 0" class="jump-path anim" style="animation-delay: 1s" />
    <path d="M 450 0 Q 525 -50 600 0" class="jump-path anim" style="animation-delay: 2s" />
    <path d="M 600 0 Q 675 -50 750 0" class="jump-path anim" style="animation-delay: 3s; stroke: #c0392b" />
    
    <!-- Dots -->
    <circle cx="150" cy="0" r="8" class="dot-arange anim" style="animation-delay: 0s" /><text x="150" y="25" class="text-label anim" style="animation-delay: 0s">0.1</text>
    <circle cx="300" cy="0" r="8" class="dot-arange anim" style="animation-delay: 1s" /><text x="300" y="25" class="text-label anim" style="animation-delay: 1s">0.2</text>
    <circle cx="450" cy="0" r="8" class="dot-arange anim" style="animation-delay: 2s" /><text x="450" y="25" class="text-label anim" style="animation-delay: 2s">0.3</text>
    <circle cx="600" cy="0" r="8" class="dot-arange anim" style="animation-delay: 3s" /><text x="600" y="25" class="text-label anim" style="animation-delay: 3s; fill: #c0392b">0.4 !!</text>
    
    <text x="650" y="50" class="alert-text blinker">미세한 소수점 오차 때문에 0.4가 포함되어버림!</text>
  </g>

  <!-- CASE 2: linspace -->
  <g transform="translate(0, 220)">
    <text x="50" y="-10" class="code">np.linspace(0.1, 0.4, 4, endpoint=False)</text>
    <line x1="150" y1="0" x2="600" y2="0" class="line" />
    <line x1="600" y1="-20" x2="600" y2="20" class="mark" /> <!-- End line at 0.4 -->
    
    <circle cx="150" cy="0" r="8" class="dot-linspace anim" style="animation-delay: 0s" /><text x="150" y="25" class="text-label anim" style="animation-delay: 0s">0.1</text>
    <circle cx="262.5" cy="0" r="8" class="dot-linspace anim" style="animation-delay: 1s" /><text x="262.5" y="25" class="text-label anim" style="animation-delay: 1s">0.2</text>
    <circle cx="375" cy="0" r="8" class="dot-linspace anim" style="animation-delay: 2s" /><text x="375" y="25" class="text-label anim" style="animation-delay: 2s">0.3</text>
    <circle cx="487.5" cy="0" r="8" class="dot-linspace anim" style="animation-delay: 3s" /><text x="487.5" y="25" class="text-label anim" style="animation-delay: 3s">0.4</text>
    
    <text x="650" y="30" class="text-label anim" style="animation-delay: 4s; fill:#27ae60">정확히 요구한 n개의 조각 수납!</text>
  </g>

</svg>
