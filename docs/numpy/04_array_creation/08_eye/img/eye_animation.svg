<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Comic Sans MS', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .code { font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #e74c3c; background: #fdf2e9; }
    
    .grid-cell { fill: #fdf2e9; stroke: #95a5a6; stroke-width: 2; rx: 5; }
    .diag-cell { stroke: #8e44ad; stroke-width: 3; }
    
    .grid-text { font-family: 'Courier New', monospace; font-size: 24px; font-weight: normal; fill: #bdc3c7; text-anchor: middle; alignment-baseline: central; opacity: 0; }
    .diag-text { font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; fill: #9b59b6; text-anchor: middle; alignment-baseline: central; opacity: 0; }
    
    /* Animations */
    @keyframes fade-zero {
      0% { opacity: 0; }
      20%, 100% { opacity: 1; }
    }
    
    @keyframes slash-one {
      0%, 30% { opacity: 0; transform: scale(1.5); }
      40%, 100% { opacity: 1; transform: scale(1); }
    }
    
    /* Zeros appear first */
    .z { animation: fade-zero 5s infinite; }
    
    /* Diagonal drops sequentially */
    .d0 { animation: slash-one 5s infinite; animation-delay: 0.1s; }
    .d1 { animation: slash-one 5s infinite; animation-delay: 0.4s; }
    .d2 { animation: slash-one 5s infinite; animation-delay: 0.7s; }

  </style>

  <rect width="100%" height="100%" fill="#f9fcfb" rx="20" />
  
  <text x="300" y="40" class="title" text-anchor="middle">주대각선(Diagonal)에만 1을 번개처럼 긋기!</text>
  <text x="300" y="70" class="code" text-anchor="middle">np.eye( 3 )</text>

  <!-- 3x3 Grid -->
  <g transform="translate(195, 95)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="60" height="60" class="grid-cell diag-cell d0" />
    <text x="30" y="30" class="diag-text d0">1.</text>
    
    <rect x="70" y="0" width="60" height="60" class="grid-cell" />
    <text x="100" y="30" class="grid-text z">0.</text>

    <rect x="140" y="0" width="60" height="60" class="grid-cell" />
    <text x="170" y="30" class="grid-text z">0.</text>

    <!-- Row 1 -->
    <rect x="0" y="70" width="60" height="60" class="grid-cell" />
    <text x="30" y="100" class="grid-text z">0.</text>
    
    <rect x="70" y="70" width="60" height="60" class="grid-cell diag-cell d1" />
    <text x="100" y="100" class="diag-text d1">1.</text>

    <rect x="140" y="70" width="60" height="60" class="grid-cell" />
    <text x="170" y="100" class="grid-text z">0.</text>

    <!-- Row 2 -->
    <rect x="0" y="140" width="60" height="60" class="grid-cell" />
    <text x="30" y="170" class="grid-text z">0.</text>
    
    <rect x="70" y="140" width="60" height="60" class="grid-cell" />
    <text x="100" y="170" class="grid-text z">0.</text>

    <rect x="140" y="140" width="60" height="60" class="grid-cell diag-cell d2" />
    <text x="170" y="170" class="diag-text d2">1.</text>
  </g>

</svg>
