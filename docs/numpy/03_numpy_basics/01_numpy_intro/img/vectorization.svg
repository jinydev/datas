<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 배경 그라데이션 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    
    <!-- 데이터 블록 그라데이션 -->
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#2c7a7b"/>
    </linearGradient>

    <!-- 결과 블록 그라데이션 -->
    <linearGradient id="resGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ed8936"/>
      <stop offset="100%" stop-color="#c05621"/>
    </linearGradient>

    <!-- 마법사(연산자) 그라데이션 -->
    <linearGradient id="opGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#dd6b20"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="250" fill="url(#bgGrad)" rx="10"/>

  <!-- 타이틀 -->
  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    Numpy 단일 연산 폭격 (Vectorized Operation)
  </text>
  <text x="300" y="50" font-family="monospace" font-size="14" fill="#a0aec0" text-anchor="middle">
    prices * 1.1
  </text>

  <!-- 1. 원본 배열 (prices) -->
  <g transform="translate(150, 160)">
    <text x="0" y="40" font-family="monospace" font-size="14" font-weight="bold" fill="#4fd1c5" text-anchor="middle">prices array</text>
    
    <!-- 사과 1 (100) -->
    <g transform="translate(-100, 0)">
      <rect x="-30" y="-20" width="60" height="40" fill="url(#dataGrad)" rx="5" stroke="#81e6d9" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">100</text>
      
      <!-- 결과 변신 애니메이션 -->
      <rect x="-30" y="-20" width="60" height="40" fill="url(#resGrad)" rx="5" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.65; 0.9; 1"/>
      </rect>
      <text x="0" y="5" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0">
        110
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.65; 0.9; 1"/>
      </text>
    </g>

    <!-- 사과 2 (200) -->
    <g transform="translate(0, 0)">
      <rect x="-30" y="-20" width="60" height="40" fill="url(#dataGrad)" rx="5" stroke="#81e6d9" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">200</text>
      
      <!-- 결과 변신 애니메이션 -->
      <rect x="-30" y="-20" width="60" height="40" fill="url(#resGrad)" rx="5" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.65; 0.9; 1"/>
      </rect>
      <text x="0" y="5" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0">
        220
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.65; 0.9; 1"/>
      </text>
    </g>

    <!-- 사과 3 (300) -->
    <g transform="translate(100, 0)">
      <rect x="-30" y="-20" width="60" height="40" fill="url(#dataGrad)" rx="5" stroke="#81e6d9" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">300</text>

      <!-- 결과 변신 애니메이션 -->
      <rect x="-30" y="-20" width="60" height="40" fill="url(#resGrad)" rx="5" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.65; 0.9; 1"/>
      </rect>
      <text x="0" y="5" font-family="monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0">
        330
        <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.65; 0.9; 1"/>
      </text>
    </g>
  </g>

  <!-- 2. 스칼라 곱셈 연산자 분신술 (Broadcasting) -->
  <g transform="translate(300, 80)">
    <!-- 메인 연산자 -->
    <g opacity="1">
      <animate attributeName="opacity" values="1; 1; 0; 0; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.3; 0.9; 1"/>
      <circle cx="0" cy="0" r="25" fill="url(#opGrad)" filter="url(#glow)"/>
      <text x="0" y="5" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">* 1.1</text>
    </g>

    <!-- 3개로 분기되는 연산자 애니메이션 -->
    <!-- 첫 번째 원소로 날아가는 빔 -->
    <g transform="translate(0, 0)" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.3; 0.6; 0.65; 1"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -100, 60; -100,60" dur="4s" repeatCount="indefinite" keyTimes="0; 0.3; 0.6; 1"/>
      <circle cx="0" cy="0" r="20" fill="url(#opGrad)" filter="url(#glow)"/>
      <text x="0" y="5" font-family="Arial" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">* 1.1</text>
    </g>

    <!-- 두 번째 원소로 날아가는 빔 -->
    <g transform="translate(0, 0)" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.3; 0.6; 0.65; 1"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0, 60; 0,60" dur="4s" repeatCount="indefinite" keyTimes="0; 0.3; 0.6; 1"/>
      <circle cx="0" cy="0" r="20" fill="url(#opGrad)" filter="url(#glow)"/>
      <text x="0" y="5" font-family="Arial" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">* 1.1</text>
    </g>

    <!-- 세 번째 원소로 날아가는 빔 -->
    <g transform="translate(0, 0)" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.3; 0.6; 0.65; 1"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 100, 60; 100,60" dur="4s" repeatCount="indefinite" keyTimes="0; 0.3; 0.6; 1"/>
      <circle cx="0" cy="0" r="20" fill="url(#opGrad)" filter="url(#glow)"/>
      <text x="0" y="5" font-family="Arial" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">* 1.1</text>
    </g>
  </g>

  <!-- 번쩍이는 효과 -->
  <rect width="600" height="250" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0; 0; 0.8; 0; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.55; 0.6; 0.7; 1"/>
  </rect>

  <g transform="translate(480, 160)" opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.65; 0.9; 1"/>
    <text x="0" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#ed8936" text-anchor="middle">결과 생성됨!</text>
    <text x="0" y="10" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">new_prices</text>
  </g>
  
</svg>
