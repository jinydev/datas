<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 배경 그라데이션 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>

    <!-- 1D 배열 블록 색상 -->
    <linearGradient id="vecGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#2c7a7b"/>
    </linearGradient>

    <!-- 2D 행렬 블록 색상 -->
    <linearGradient id="matGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ed8936"/>
      <stop offset="100%" stop-color="#c05621"/>
    </linearGradient>

    <!-- 속성 패널 색상 -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3748"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="600" height="300" fill="url(#bgGrad)" rx="10"/>

  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    Numpy 배열의 구조 파악 (.shape 와 .size)
  </text>

  <!-- 파트 1: 1D 벡터 기차 (vec) -->
  <g transform="translate(30, 80)">
    <text x="0" y="-15" font-family="monospace" font-size="14" font-weight="bold" fill="#81e6d9">vec: 1차원 벡터 (1D)</text>
    
    <!-- 5개의 블록 조립 애니메이션 -->
    <g transform="translate(0, 0)">
      <!-- 개별 블록들 -->
      <g>
        <!-- 1번 블록 -->
        <g>
          <animateTransform attributeName="transform" type="translate" values="-50, -30; 0, 0; 0, 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 1"/>
          <animate attributeName="opacity" values="0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 1"/>
          <rect x="0" y="0" width="40" height="40" fill="url(#vecGrad)" rx="4" stroke="#e6fffa" stroke-width="1"/>
          <text x="20" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
        </g>
        <!-- 2번 블록 -->
        <g>
          <animateTransform attributeName="transform" type="translate" values="-30, 40; 45, 0; 45, 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.3; 1"/>
          <animate attributeName="opacity" values="0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.3; 1"/>
          <rect x="0" y="0" width="40" height="40" fill="url(#vecGrad)" rx="4" stroke="#e6fffa" stroke-width="1"/>
          <text x="20" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
        </g>
        <!-- 3번 블록 -->
        <g>
          <animateTransform attributeName="transform" type="translate" values="100, -50; 90, 0; 90, 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.4; 1"/>
          <animate attributeName="opacity" values="0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.4; 1"/>
          <rect x="0" y="0" width="40" height="40" fill="url(#vecGrad)" rx="4" stroke="#e6fffa" stroke-width="1"/>
          <text x="20" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3</text>
        </g>
        <!-- 4번 블록 -->
        <g>
          <animateTransform attributeName="transform" type="translate" values="150, 40; 135, 0; 135, 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.5; 1"/>
          <animate attributeName="opacity" values="0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.5; 1"/>
          <rect x="0" y="0" width="40" height="40" fill="url(#vecGrad)" rx="4" stroke="#e6fffa" stroke-width="1"/>
          <text x="20" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">4</text>
        </g>
        <!-- 5번 블록 -->
        <g>
          <animateTransform attributeName="transform" type="translate" values="220, -20; 180, 0; 180, 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 1"/>
          <animate attributeName="opacity" values="0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 1"/>
          <rect x="0" y="0" width="40" height="40" fill="url(#vecGrad)" rx="4" stroke="#e6fffa" stroke-width="1"/>
          <text x="20" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">5</text>
        </g>
      </g>
      
      <!-- .shape 패널 등장 -->
      <g transform="translate(240, -10)" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.7; 0.8; 1"/>
        <rect x="0" y="0" width="130" height="60" fill="url(#panelGrad)" rx="5" stroke="#4fd1c5" stroke-width="2" filter="url(#glow)"/>
        <text x="65" y="22" font-family="monospace" font-size="13" fill="#e2e8f0" text-anchor="middle">vec.shape</text>
        <text x="65" y="45" font-family="monospace" font-size="18" font-weight="bold" fill="#81e6d9" text-anchor="middle">(5,)</text>
      </g>
    </g>
  </g>

  <!-- 파트 2: 2D 행렬 타일 (mat) -->
  <g transform="translate(30, 180)">
    <text x="0" y="-15" font-family="monospace" font-size="14" font-weight="bold" fill="#fbd38d">mat: 2차원 행렬 타일 (2D)</text>

    <!-- (2, 3) 행렬 블록 조립 애니메이션 -->
    <g transform="translate(0, 0)">
      <!-- 1행 블록들 -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="-80, 0; 0, 0; 0, 0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.3; 1"/>
        <animate attributeName="opacity" values="0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.3; 1"/>
        <rect x="0" y="0" width="40" height="40" fill="url(#matGrad)" rx="4" stroke="#feebc8" stroke-width="1"/>
        <text x="20" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
        <rect x="45" y="0" width="40" height="40" fill="url(#matGrad)" rx="4" stroke="#feebc8" stroke-width="1"/>
        <text x="65" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
        <rect x="90" y="0" width="40" height="40" fill="url(#matGrad)" rx="4" stroke="#feebc8" stroke-width="1"/>
        <text x="110" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3</text>
      </g>
      
      <!-- 2행 블록들 -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="80, 80; 0, 45; 0, 45" dur="4s" repeatCount="indefinite" keyTimes="0; 0.5; 1"/>
        <animate attributeName="opacity" values="0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.5; 1"/>
        <rect x="0" y="0" width="40" height="40" fill="url(#matGrad)" rx="4" stroke="#feebc8" stroke-width="1"/>
        <text x="20" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">4</text>
        <rect x="45" y="0" width="40" height="40" fill="url(#matGrad)" rx="4" stroke="#feebc8" stroke-width="1"/>
        <text x="65" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">5</text>
        <rect x="90" y="0" width="40" height="40" fill="url(#matGrad)" rx="4" stroke="#feebc8" stroke-width="1"/>
        <text x="110" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">6</text>
      </g>

      <!-- Dimension 축 화살표 표시 (가로/세로) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.7; 1"/>
        <!-- 행(Row) 축 -->
        <path d="M-15,0 L-15,85" stroke="#fbd38d" stroke-width="2" stroke-dasharray="4,2"/>
        <polygon points="-15,85 -10,75 -20,75" fill="#fbd38d"/>
        <text x="-20" y="50" font-family="sans-serif" font-size="12" fill="#fbd38d" transform="rotate(-90 -25 50)">2 Rows</text>
        
        <!-- 열(Column) 축 -->
        <path d="M0,-15 L130,-15" stroke="#fbd38d" stroke-width="2" stroke-dasharray="4,2"/>
        <polygon points="130,-15 120,-20 120,-10" fill="#fbd38d"/>
        <text x="65" y="-20" font-family="sans-serif" font-size="12" fill="#fbd38d" text-anchor="middle">3 Columns</text>
      </g>

      <!-- .shape 패널 등장 -->
      <g transform="translate(160, 10)" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.8; 0.9; 1"/>
        <rect x="0" y="0" width="130" height="60" fill="url(#panelGrad)" rx="5" stroke="#ed8936" stroke-width="2" filter="url(#glow)"/>
        <text x="65" y="22" font-family="monospace" font-size="13" fill="#e2e8f0" text-anchor="middle">mat.shape</text>
        <text x="65" y="45" font-family="monospace" font-size="18" font-weight="bold" fill="#fbd38d" text-anchor="middle">(2, 3)</text>
      </g>

      <!-- .size 패널 등장 -->
      <g transform="translate(305, 10)" opacity="0">
        <animate attributeName="opacity" values="0; 0; 1; 1" dur="4s" repeatCount="indefinite" keyTimes="0; 0.85; 0.95; 1"/>
        <rect x="0" y="0" width="130" height="60" fill="url(#panelGrad)" rx="5" stroke="#f6ad55" stroke-width="2" filter="url(#glow)"/>
        <text x="65" y="22" font-family="monospace" font-size="13" fill="#e2e8f0" text-anchor="middle">mat.size</text>
        <text x="65" y="45" font-family="monospace" font-size="18" font-weight="bold" fill="#f6ad55" text-anchor="middle">6 개</text>
      </g>

    </g>
  </g>

</svg>
