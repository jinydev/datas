<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#14b8a6" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">🎨 hue='sex' 파라미터로 다차원 매핑의 마법 부여</text>

    <!-- Grid lines -->
    <g transform="translate(80, 70)" stroke="#e2e8f0" stroke-dasharray="4,4" stroke-width="1">
        <line x1="0" y1="0" x2="420" y2="0" />
        <line x1="0" y1="50" x2="420" y2="50" />
        <line x1="0" y1="100" x2="420" y2="100" />
        <line x1="0" y1="150" x2="420" y2="150" />
        <line x1="0" y1="200" x2="420" y2="200" />
        <line x1="0" y1="250" x2="420" y2="250" />
    </g>

    <g transform="translate(80, 70)">
        <path d="M 0 0 L 0 250 L 420 250" stroke="#475569" stroke-width="2" fill="none" />
        
        <text x="-10" y="5" fill="#64748b" font-size="12" text-anchor="end">10.0</text>
        <text x="-10" y="130" fill="#64748b" font-size="12" text-anchor="end">5.0</text>
        <text x="-10" y="255" fill="#64748b" font-size="12" text-anchor="end">0.0</text>
        
        <text x="0" y="275" fill="#64748b" font-size="12" text-anchor="middle">0</text>
        <text x="210" y="275" fill="#64748b" font-size="12" text-anchor="middle">25</text>
        <text x="420" y="275" fill="#64748b" font-size="12" text-anchor="middle">50</text>

        <!-- Female (Orange) -->
        <g fill="#f97316" fill-opacity="0.8">
            <circle cx="85" cy="210" r="5" />
            <circle cx="95" cy="200" r="5" />
            <circle cx="120" cy="180" r="5" />
            <circle cx="160" cy="170" r="5" />
            <circle cx="190" cy="130" r="5" />
            <circle cx="210" cy="120" r="5" />
            <circle cx="270" cy="85" r="5" />
        </g>

        <!-- Male (Blue) -->
        <g fill="#3b82f6" fill-opacity="0.8">
            <circle cx="135" cy="165" r="5" />
            <circle cx="150" cy="190" r="5" />
            <circle cx="170" cy="150" r="5" />
            <circle cx="200" cy="145" r="5" />
            <circle cx="230" cy="100" r="5" />
            <circle cx="250" cy="110" r="5" />
            <circle cx="290" cy="60" r="5" />
            <circle cx="310" cy="70" r="5" />
            <circle cx="330" cy="50" r="5" />
            <!-- High rollers are all blue! -->
            <circle cx="370" cy="30" r="5" />
            <circle cx="390" cy="10" r="5" />
            <circle cx="410" cy="15" r="5" />
        </g>
        
        <text x="-40" y="125" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90, -40, 125)">팁 (tip)</text>
        <text x="210" y="310" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">총 청구액 (total_bill)</text>
    </g>

    <!-- Legend -->
    <g transform="translate(510, 70)">
        <rect x="0" y="0" width="80" height="60" fill="white" stroke="#cbd5e1" rx="5" />
        <text x="10" y="15" fill="#475569" font-size="10" font-weight="bold">sex</text>
        
        <circle cx="15" cy="30" r="5" fill="#3b82f6" />
        <text x="30" y="34" fill="#475569" font-size="12">Male</text>
        
        <circle cx="15" cy="45" r="5" fill="#f97316" />
        <text x="30" y="49" fill="#475569" font-size="12">Female</text>
    </g>

    <rect x="100" y="350" width="400" height="30" rx="5" fill="#f0fdf4" />
    <text x="300" y="369" fill="#166534" font-size="11" font-weight="bold" text-anchor="middle">💡 우측 상단의 고액 지불/고액 팁 그룹은 모두 남성(Male)이라는 것이 보임!</text>
</svg>
