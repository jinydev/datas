<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#10b981" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">📊 부서별 평가 점수 비교 (Bar Chart)</text>

    <g transform="translate(60, 60)">
        <path d="M 0 0 L 0 180 L 480 180" stroke="#64748b" stroke-width="2" fill="none" />
        
        <g stroke="#cbd5e1" stroke-dasharray="4,4" stroke-width="1">
            <line x1="0" y1="36" x2="480" y2="36" />  <!-- 80 -->
            <line x1="0" y1="90" x2="480" y2="90" />  <!-- 50 -->
            <line x1="0" y1="144" x2="480" y2="144" /> <!-- 20 -->
        </g>
        
        <!-- Y Labels -->
        <text x="-10" y="40" fill="#64748b" font-size="12" text-anchor="end">80</text>
        <text x="-10" y="94" fill="#64748b" font-size="12" text-anchor="end">50</text>
        
        <!-- Bars: [85, 92, 78] Out of 100 max (180px height mapping: y= 180 - (val / 100 * 180)) -->
        <!-- 85 -> 180 - (85*1.8) = 180 - 153 = 27 -->
        <rect x="70" y="27" width="80" height="153" fill="#4ade80" />
        <text x="110" y="20" fill="#166534" font-weight="bold" font-size="14" text-anchor="middle">85</text>
        
        <!-- 92 -> 180 - (92*1.8) = 180 - 165.6 = 14.4 -->
        <rect x="200" y="14" width="80" height="166" fill="#22c55e" />
        <text x="240" y="7" fill="#166534" font-weight="bold" font-size="14" text-anchor="middle">92</text>
        
        <!-- 78 -> 180 - (78*1.8) = 180 - 140.4 = 39.6 -->
        <rect x="330" y="39" width="80" height="141" fill="#16a34a" />
        <text x="370" y="32" fill="#166534" font-weight="bold" font-size="14" text-anchor="middle">78</text>

        <!-- X Labels -->
        <text x="110" y="200" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">A팀</text>
        <text x="240" y="200" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">B팀</text>
        <text x="370" y="200" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">C팀</text>
    </g>

    <rect x="360" y="250" width="220" height="35" rx="5" fill="#dcfce7" />
    <text x="470" y="272" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">💡 카테고리(부서) 간의 크기 직관적 비교</text>
</svg>
