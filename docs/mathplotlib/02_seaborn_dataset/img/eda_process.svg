<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">초기 데이터 탐색(EDA) 3대장 함수 역할</text>

  <!-- 원본 데이터셋 덩어리 -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="150" height="120" fill="#E3F2FD" rx="5" filter="url(#shadow)" stroke="#1976D2" stroke-width="2"/>
    <text x="75" y="30" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">df (데이터프레임)</text>
    
    <!-- 표 느낌의 선들 -->
    <path d="M 10 50 L 140 50 M 10 70 L 140 70 M 10 90 L 140 90" fill="none" stroke="#90CAF9" stroke-width="2" />
    <path d="M 50 40 L 50 110 M 100 40 L 100 110" fill="none" stroke="#90CAF9" stroke-width="2" />
    
    <text x="75" y="140" font-family="sans-serif" font-size="30" text-anchor="middle">🔎</text>
  </g>

  <!-- 파이프라인 화살표들 -->
  <path d="M 210 210 L 260 210" fill="none" stroke="#B0BEC5" stroke-width="3" stroke-dasharray="5,5" />
  <path d="M 235 210 L 235 110 L 260 110" fill="none" stroke="#B0BEC5" stroke-width="3" stroke-dasharray="5,5" />
  <path d="M 235 210 L 235 310 L 260 310" fill="none" stroke="#B0BEC5" stroke-width="3" stroke-dasharray="5,5" />
  
  <polygon points="255,105 265,110 255,115" fill="#B0BEC5" />
  <polygon points="255,205 265,210 255,215" fill="#B0BEC5" />
  <polygon points="255,305 265,310 255,315" fill="#B0BEC5" />

  <!-- 1. df.head() -->
  <g transform="translate(280, 60)">
    <rect x="0" y="0" width="350" height="80" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="175" y="25" font-family="monospace" font-size="18" fill="#2E7D32" font-weight="bold" text-anchor="middle">df.head()</text>
    <text x="175" y="45" font-family="sans-serif" font-size="13" fill="#333" text-anchor="middle">데이터의 '상위 5줄'만 살짝 맛보기로 확인</text>
    <rect x="25" y="60" width="300" height="8" fill="#E8F5E9" rx="4" />
  </g>

  <!-- 2. df.info() -->
  <g transform="translate(280, 160)">
    <rect x="0" y="0" width="350" height="80" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#FF9800" stroke-width="2"/>
    <text x="175" y="25" font-family="monospace" font-size="18" fill="#E65100" font-weight="bold" text-anchor="middle">df.info()</text>
    <text x="175" y="45" font-family="sans-serif" font-size="13" fill="#333" text-anchor="middle">엑스레이(X-ray)! 결측치(NaN) 유무와 데이터 타입 파악</text>
    <text x="175" y="65" font-family="monospace" font-size="11" fill="#757575" text-anchor="middle">ex: 891 non-null int64</text>
  </g>

  <!-- 3. df.describe() -->
  <g transform="translate(280, 260)">
    <rect x="0" y="0" width="350" height="80" fill="#FFFFFF" rx="8" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="175" y="25" font-family="monospace" font-size="18" fill="#6A1B9A" font-weight="bold" text-anchor="middle">df.describe()</text>
    <text x="175" y="45" font-family="sans-serif" font-size="13" fill="#333" text-anchor="middle">숫자 데이터의 통계 요약 (평균, 최소, 최대, 4분위수)</text>
    <text x="175" y="65" font-family="monospace" font-size="11" fill="#757575" text-anchor="middle">ex: mean=29.6, max=80, min=0.42</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 360)">
    <rect x="-310" y="-15" width="620" height="30" fill="#ECEFF1" rx="8" stroke="#78909C" stroke-width="2" />
    <text x="0" y="5" font-family="sans-serif" font-size="13" fill="#37474F" font-weight="bold" text-anchor="middle">그래프를 그리기 전에 이 3가지 함수를 실행하는 것은 데이터 분석가의 필수 루틴입니다.</text>
  </g>

</svg>
