<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .code { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #d63384; }
      .box { rx: 10px; ry: 10px; fill: #fcfcfc; stroke: #ccc; stroke-width: 3px; }
      .arrow { fill: none; stroke: #6c757d; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">데이터 탐색(EDA) 3대장 플로우</text>
  <text x="425" y="65" class="title" font-size="14" text-anchor="middle" fill="#6c757d">새로운 데이터를 만났을 때 무조건 가장 먼저 입력해야 하는 필수 명령어 3개</text>

  <!-- Step 1 -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="200" height="150" class="box" fill="#e3f2fd" stroke="#0d6efd" />
    <text x="100" y="40" class="title" fill="#0d6efd" text-anchor="middle">1. 살짝 엿보기</text>
    <text x="100" y="80" class="code" text-anchor="middle">df.head()</text>
    <text x="100" y="115" class="title" font-size="14" fill="#6c757d" text-anchor="middle">첫 5줄만 출력하여</text>
    <text x="100" y="135" class="title" font-size="14" fill="#6c757d" text-anchor="middle">생김새를 확인</text>
  </g>

  <!-- Arrow -->
  <path d="M 260 195 L 310 195" class="arrow" />
  <polygon points="305,190 315,195 305,200" fill="#6c757d" />

  <!-- Step 2 -->
  <g transform="translate(325, 120)">
    <rect x="0" y="0" width="200" height="150" class="box" fill="#e8f5e9" stroke="#198754" />
    <text x="100" y="40" class="title" fill="#198754" text-anchor="middle">2. 신원 조회</text>
    <text x="100" y="80" class="code" text-anchor="middle">df.info()</text>
    <text x="100" y="115" class="title" font-size="14" fill="#6c757d" text-anchor="middle">행/열 크기, 결측치,</text>
    <text x="100" y="135" class="title" font-size="14" fill="#6c757d" text-anchor="middle">데이터 타입(문자/숫자)</text>
  </g>

  <!-- Arrow -->
  <path d="M 535 195 L 585 195" class="arrow" />
  <polygon points="580,190 590,195 580,200" fill="#6c757d" />

  <!-- Step 3 -->
  <g transform="translate(600, 120)">
    <rect x="0" y="0" width="200" height="150" class="box" fill="#fff3cd" stroke="#ffc107" />
    <text x="100" y="40" class="title" fill="#d39e00" text-anchor="middle">3. 평균/요약 통계</text>
    <text x="100" y="80" class="code" text-anchor="middle">df.describe()</text>
    <text x="100" y="115" class="title" font-size="14" fill="#6c757d" text-anchor="middle">평균, 최소/최대치 등</text>
    <text x="100" y="135" class="title" font-size="14" fill="#6c757d" text-anchor="middle">숫자형 컬럼 수치 요약</text>
  </g>

</svg>
