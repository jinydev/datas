<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#2563eb" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">🔍 필수 EDA 3대장 함수: 데이터의 해부 구조 알아내기</text>

    <!-- df.head() section -->
    <g transform="translate(40, 70)">
        <rect width="140" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="5" />
        <text x="70" y="25" fill="#1e40af" font-weight="bold" font-size="14" text-anchor="middle">1. df.head()</text>
        <path d="M 140 20 L 190 20" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="200" y="-10" width="340" height="60" fill="white" stroke="#cbd5e1" stroke-width="1.5" />
        <rect x="200" y="-10" width="340" height="20" fill="#f1f5f9" />
        <text x="210" y="5" fill="#475569" font-size="10" font-weight="bold">idx</text>
        <text x="250" y="5" fill="#475569" font-size="10" font-weight="bold">survived</text>
        <text x="320" y="5" fill="#475569" font-size="10" font-weight="bold">pclass</text>
        <text x="390" y="5" fill="#475569" font-size="10" font-weight="bold">sex</text>
        <text x="460" y="5" fill="#475569" font-size="10" font-weight="bold">age</text>

        <text x="210" y="23" fill="#64748b" font-size="10">0</text>
        <text x="250" y="23" fill="#64748b" font-size="10">0</text>
        <text x="320" y="23" fill="#64748b" font-size="10">3</text>
        <text x="390" y="23" fill="#64748b" font-size="10">male</text>
        <text x="460" y="23" fill="#64748b" font-size="10">22.0</text>
        <text x="210" y="40" fill="#64748b" font-size="10">1</text>
        <text x="250" y="40" fill="#64748b" font-size="10">1</text>
        <text x="320" y="40" fill="#64748b" font-size="10">1</text>
        <text x="390" y="40" fill="#64748b" font-size="10">female</text>
        <text x="460" y="40" fill="#64748b" font-size="10">38.0</text>
        <text x="550" y="23" fill="#1e40af" font-size="12" font-weight="bold">... 상위 5개행 표본 노출</text>
    </g>

    <!-- df.info() section -->
    <g transform="translate(40, 170)">
        <rect width="140" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="5" />
        <text x="70" y="25" fill="#1e40af" font-weight="bold" font-size="14" text-anchor="middle">2. df.info()</text>
        <path d="M 140 20 L 190 20" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="200" y="-10" width="340" height="60" fill="#1e293b" />
        <text x="210" y="10" fill="#10b981" font-size="11" font-family="monospace">RangeIndex: 891 entries</text>
        <text x="210" y="25" fill="#facc15" font-size="11" font-family="monospace">891 non-null int64</text>
        <text x="210" y="40" fill="#f87171" font-size="11" font-family="monospace">714 non-null float64 (결측치 존재!)</text>
        <text x="550" y="23" fill="#1e40af" font-size="12" font-weight="bold">... 메모리, 데이터 타입 반환</text>
    </g>

    <!-- df.describe() section -->
    <g transform="translate(40, 270)">
        <rect width="140" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="5" />
        <text x="70" y="25" fill="#1e40af" font-weight="bold" font-size="14" text-anchor="middle">3. df.describe()</text>
        <path d="M 140 20 L 190 20" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" />
        
        <rect x="200" y="-10" width="340" height="80" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
        <text x="250" y="5" fill="#475569" font-size="10" font-weight="bold">survived</text>
        <text x="320" y="5" fill="#475569" font-size="10" font-weight="bold">pclass</text>
        <text x="390" y="5" fill="#475569" font-size="10" font-weight="bold">age</text>
        
        <text x="210" y="20" fill="#475569" font-size="10" font-weight="bold">mean</text>
        <text x="250" y="20" fill="#64748b" font-size="10">0.3838</text>
        <text x="320" y="20" fill="#64748b" font-size="10">2.308</text>
        <text x="390" y="20" fill="#64748b" font-size="10">29.699</text>
        
        <text x="210" y="35" fill="#475569" font-size="10" font-weight="bold">min</text>
        <text x="250" y="35" fill="#64748b" font-size="10">0.0</text>
        <text x="320" y="35" fill="#64748b" font-size="10">1.0</text>
        <text x="390" y="35" fill="#64748b" font-size="10">0.42</text>
        
        <text x="210" y="50" fill="#475569" font-size="10" font-weight="bold">max</text>
        <text x="250" y="50" fill="#64748b" font-size="10">1.0</text>
        <text x="320" y="50" fill="#64748b" font-size="10">3.0</text>
        <text x="390" y="50" fill="#64748b" font-size="10">80.0</text>
        <text x="550" y="23" fill="#1e40af" font-size="12" font-weight="bold">... 모든 숫자열의 통계</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
        </marker>
    </defs>
    
    <rect x="150" y="380" width="300" height="35" rx="5" fill="#e0f2fe" />
    <text x="300" y="402" fill="#0369a1" font-size="12" font-weight="bold" text-anchor="middle">💡 시각화 이전에 위 3가지 함수로 데이터 형태를 파악해야 함!</text>
</svg>
