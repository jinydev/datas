<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#3b82f6" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">📦 데이터 로딩 파이프라인 (Toy Datasets)</text>

    <!-- Source 1: PyDataset -->
    <g transform="translate(50, 80)">
        <rect x="0" y="0" width="120" height="60" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" rx="5" />
        <text x="60" y="25" fill="#0369a1" font-weight="bold" font-size="14" text-anchor="middle">PyDataset</text>
        <text x="60" y="45" fill="#0369a1" font-size="12" text-anchor="middle">750+ Datasets</text>
        <path d="M 120 30 L 220 30" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" />
        <text x="170" y="20" fill="#64748b" font-weight="bold" font-size="12" text-anchor="middle">data('mpg')</text>
    </g>

    <!-- Source 2: Seaborn -->
    <g transform="translate(50, 180)">
        <rect x="0" y="0" width="120" height="60" fill="#fce7f3" stroke="#f472b6" stroke-width="2" rx="5" />
        <text x="60" y="25" fill="#be185d" font-weight="bold" font-size="14" text-anchor="middle">Seaborn</text>
        <text x="60" y="45" fill="#be185d" font-size="12" text-anchor="middle">tips, titanic, iris...</text>
        <path d="M 120 30 L 220 30" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" />
        <text x="170" y="20" fill="#64748b" font-weight="bold" font-size="12" text-anchor="middle">load_dataset()</text>
    </g>

    <!-- Destination: Pandas DataFrame -->
    <g transform="translate(280, 105)">
        <rect x="0" y="0" width="260" height="110" fill="#ffffff" stroke="#cbd5e1" stroke-width="3" rx="10" />
        <rect x="0" y="0" width="260" height="30" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3" rx="10" style="clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);" />
        <text x="130" y="20" fill="#0f172a" font-weight="bold" font-size="14" text-anchor="middle">🐼 Pandas DataFrame (메모리)</text>
        
        <!-- Table Mockup -->
        <g stroke="#e2e8f0" stroke-width="1">
            <line x1="20" y1="50" x2="240" y2="50" />
            <line x1="20" y1="70" x2="240" y2="70" />
            <line x1="20" y1="90" x2="240" y2="90" />
            
            <line x1="60" y1="40" x2="60" y2="100" />
            <line x1="120" y1="40" x2="120" y2="100" />
            <line x1="180" y1="40" x2="180" y2="100" />
        </g>
        <text x="40" y="65" fill="#475569" font-size="10" text-anchor="middle">row 1</text>
        <text x="90" y="65" fill="#475569" font-size="10" text-anchor="middle">data</text>
        <text x="150" y="65" fill="#475569" font-size="10" text-anchor="middle">data</text>
        <text x="210" y="65" fill="#475569" font-size="10" text-anchor="middle">data</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
        </marker>
    </defs>
    
    <rect x="150" y="250" width="300" height="35" rx="5" fill="#f0fdf4" />
    <text x="300" y="272" fill="#166534" font-size="12" font-weight="bold" text-anchor="middle">💡 내장 데이터셋 함수들은 항상 DataFrame 객체를 뱉어냅니다!</text>
</svg>
