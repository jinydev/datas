<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .text-desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 15px; fill: #333; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">히스토그램 마법: 데이터 통(Bins)의 개수가 모든 것을 결정한다</text>
  
  <rect x="50" y="70" width="220" height="25" rx="5" fill="#f8f9fa" stroke="#ccc" />
  <text x="160" y="88" class="text-desc" font-weight="bold" fill="#6c757d" text-anchor="middle">동일한 성적 데이터</text>

  <!-- Left: bins=3 (Too few) -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="220" height="200" fill="#f8f9fa" stroke="#dc3545" stroke-width="2" />
    <text x="110" y="25" class="title" fill="#dc3545" text-anchor="middle">bins = 3 (과소 분할)</text>
    <text x="110" y="45" class="text-desc" fill="#dc3545" text-anchor="middle" font-size="12">모두 똑같아 보임 (패턴 상실)</text>
    
    <line x1="20" y1="170" x2="200" y2="170" stroke="#333" stroke-width="2" />
    <line x1="20" y1="60" x2="20" y2="170" stroke="#333" stroke-width="2" />
    
    <!-- 3 big bars -->
    <rect x="25" y="90" width="55" height="80" fill="#e83e8c" stroke="#fff" />
    <rect x="80" y="70" width="55" height="100" fill="#e83e8c" stroke="#fff" />
    <rect x="135" y="100" width="55" height="70" fill="#e83e8c" stroke="#fff" />
  </g>

  <!-- Middle: bins=10 (Just Right) -->
  <g transform="translate(315, 110)">
    <rect x="0" y="0" width="220" height="200" fill="#e3f2fd" stroke="#0056b3" stroke-width="3" />
    <text x="110" y="25" class="title" fill="#0056b3" text-anchor="middle">bins = 10 (적당한 분할)</text>
    <text x="110" y="45" class="text-desc" fill="#0056b3" text-anchor="middle" font-size="12">정규분포(종 모양)를 완벽히 포착!</text>
    
    <line x1="10" y1="170" x2="210" y2="170" stroke="#333" stroke-width="2" />
    <line x1="10" y1="60" x2="10" y2="170" stroke="#333" stroke-width="2" />
    
    <!-- 10 nice normal distribution bars -->
    <rect x="15" y="160" width="18" height="10" fill="#0d6efd" stroke="#fff" />
    <rect x="33" y="140" width="18" height="30" fill="#0d6efd" stroke="#fff" />
    <rect x="51" y="110" width="18" height="60" fill="#0d6efd" stroke="#fff" />
    <rect x="69" y="80" width="18" height="90" fill="#0d6efd" stroke="#fff" />
    <rect x="87" y="60" width="18" height="110" fill="#0d6efd" stroke="#fff" />
    <rect x="105" y="70" width="18" height="100" fill="#0d6efd" stroke="#fff" />
    <rect x="123" y="100" width="18" height="70" fill="#0d6efd" stroke="#fff" />
    <rect x="141" y="130" width="18" height="40" fill="#0d6efd" stroke="#fff" />
    <rect x="159" y="150" width="18" height="20" fill="#0d6efd" stroke="#fff" />
    <rect x="177" y="165" width="18" height="5" fill="#0d6efd" stroke="#fff" />
  </g>

  <!-- Right: bins=50 (Too many) -->
  <g transform="translate(570, 110)">
    <rect x="0" y="0" width="220" height="200" fill="#f8f9fa" stroke="#dc3545" stroke-width="2" />
    <text x="110" y="25" class="title" fill="#dc3545" text-anchor="middle">bins = 50 (과대 분할)</text>
    <text x="110" y="45" class="text-desc" fill="#dc3545" text-anchor="middle" font-size="12">노이즈 덩어리 (큰 흐름을 놓침)</text>
    
    <line x1="10" y1="170" x2="210" y2="170" stroke="#333" stroke-width="2" />
    <line x1="10" y1="60" x2="10" y2="170" stroke="#333" stroke-width="2" />
    
    <!-- Too many jagged bars -->
    <path d="M 15 170 L 15 160 L 19 160 L 19 150 L 23 150 L 23 165 L 27 165 L 27 130 L 31 130 
             L 31 145 L 35 145 L 35 120 L 39 120 L 39 125 L 43 125 L 43 110 L 47 110 L 47 160
             L 51 160 L 51 90 L 55 90 L 55 80 L 59 80 L 59 130 L 63 130 L 63 70 L 67 70 L 67 110
             L 71 110 L 71 60 L 75 60 L 75 90 L 79 90 L 79 80 L 83 80 L 83 50 L 87 50 L 87 95
             L 91 95 L 91 70 L 95 70 L 95 100 L 99 100 L 99 75 L 103 75 L 103 85 L 107 85 L 107 100
             L 111 100 L 111 130 L 115 130 L 115 110 L 119 110 L 119 140 L 123 140 L 123 155
             L 127 155 L 127 145 L 131 145 L 131 168 L 135 168 L 135 160 L 139 160 L 139 165
             L 143 165 L 143 170 Z" fill="#e83e8c" />
  </g>
</svg>
