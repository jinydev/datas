<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="400" height="40" fill="#14b8a6" />
    <text x="200" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">🍩 모던한 도넛 차트 (Donut Chart)</text>

    <g transform="translate(200, 220)">
        <!-- 3rd class: ~55% (491/891), 1st class: ~24% (216/891), 2nd class: ~21% (184/891) -->
        <!-- Center at (0,0), radius 120 -->
        
        <!-- 3rd Class (55.1%). 0 to 198 degrees -->
        <path d="M 0 0 L 0 -120 A 120 120 0 1 1 -37.08 114.12 Z" fill="#ffedd5" stroke="white" stroke-width="2" />
        <text x="80" y="40" fill="#c2410c" font-size="16" font-weight="bold" text-anchor="middle">55.1%</text>
        <text x="80" y="60" fill="#78350f" font-size="12" text-anchor="middle">3rd Class</text>

        <!-- 1st Class (24.2%). 198.3 to 285.5 degrees -->
        <path d="M 0 0 L -37.08 114.12 A 120 120 0 0 1 -115.6 -32.1 Z" fill="#e0e7ff" stroke="white" stroke-width="2" />
        <text x="-80" y="50" fill="#3730a3" font-size="14" font-weight="bold" text-anchor="middle">24.2%</text>
        <text x="-80" y="65" fill="#312e81" font-size="10" text-anchor="middle">1st Class</text>

        <!-- 2nd Class (20.7%). 285.5 to 360 degrees -->
        <path d="M 0 0 L -115.6 -32.1 A 120 120 0 0 1 0 -120 Z" fill="#dcfce7" stroke="white" stroke-width="2" />
        <text x="-65" y="-60" fill="#166534" font-size="14" font-weight="bold" text-anchor="middle">20.7%</text>
        <text x="-65" y="-45" fill="#14532d" font-size="10" text-anchor="middle">2nd Class</text>
        
        <!-- Center circle to make a donut! -->
        <circle cx="0" cy="0" r="70" fill="#f8fafc" stroke="white" stroke-width="2" />
        
        <text x="0" y="-5" fill="#334155" font-size="14" font-weight="bold" text-anchor="middle">Total</text>
        <text x="0" y="15" fill="#1e293b" font-size="16" font-weight="bold" text-anchor="middle">891</text>
    </g>
</svg>
