<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="400" height="40" fill="#2563eb" />
    <text x="200" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">📦 타이타닉 탑승객 요금(Fare) 분포 (Pandas)</text>

    <!-- axes -->
    <g transform="translate(80, 70)">
        <path d="M 0 0 L 0 350 L 250 350" stroke="#475569" stroke-width="2" fill="none" />
        
        <text x="-10" y="5" fill="#64748b" font-size="12" text-anchor="end">500</text>
        <text x="-10" y="75" fill="#64748b" font-size="12" text-anchor="end">400</text>
        <text x="-10" y="145" fill="#64748b" font-size="12" text-anchor="end">300</text>
        <text x="-10" y="215" fill="#64748b" font-size="12" text-anchor="end">200</text>
        <text x="-10" y="285" fill="#64748b" font-size="12" text-anchor="end">100</text>
        <text x="-10" y="355" fill="#64748b" font-size="12" text-anchor="end">0</text>

        <text x="125" y="375" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">fare</text>

        <!-- Y max 500 = 350px => height = val * 0.7. Y cord = 350 - (val * 0.7) -->
        <!-- Box: Q1=8(344), Median=14(340), Q3=31(328) -->
        <!-- Whiskers: min=0(350), max=65(304) -->
        
        <!-- Whiskers line -->
        <path d="M 125 304 L 125 350" stroke="#1e293b" stroke-width="2" />
        <!-- Bottom whisker cap -->
        <path d="M 100 350 L 150 350" stroke="#1e293b" stroke-width="2" />
        <!-- Top whisker cap -->
        <path d="M 100 304 L 150 304" stroke="#1e293b" stroke-width="2" />

        <!-- Box (Q1 to Q3) -->
        <rect x="75" y="328" width="100" height="16" fill="white" stroke="#2563eb" stroke-width="2" />
        
        <!-- Median line -->
        <path d="M 75 340 L 175 340" stroke="#10b981" stroke-width="3" />

        <!-- Outliers -->
        <g fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.6">
            <circle cx="125" cy="280" r="3" /> <!-- ~100 -->
            <circle cx="125" cy="265" r="3" />
            <circle cx="125" cy="250" r="3" />
            <circle cx="125" cy="245" r="3" /> <!-- ~150 -->
            
            <circle cx="125" cy="200" r="3" /> <!-- ~214 -->
            <circle cx="125" cy="195" r="3" />
            <circle cx="125" cy="190" r="3" />
            
            <circle cx="125" cy="160" r="3" /> <!-- ~270 -->
            <circle cx="125" cy="158" r="3" />
            
            <circle cx="125" cy="0" r="3" /> <!-- 500! -->
            <circle cx="125" cy="2" r="3" />
            <circle cx="125" cy="-2" r="3" />
        </g>
        
        <text x="-40" y="175" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90, -40, 175)">요금 달러 ($)</text>

        <!-- Tooltip -->
        <path d="M 130 15 L 200 60" stroke="#ea580c" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" />
        <rect x="190" y="60" width="120" height="40" fill="#fff7ed" stroke="#ea580c" rx="4" />
        <text x="250" y="75" fill="#c2410c" font-size="10" font-weight="bold" text-anchor="middle">초고액 이상치(Outlier)</text>
        <text x="250" y="90" fill="#9a3412" font-size="10" text-anchor="middle">상자를 아득히 벗어남!</text>
    </g>
    
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
        </marker>
    </defs>
</svg>
