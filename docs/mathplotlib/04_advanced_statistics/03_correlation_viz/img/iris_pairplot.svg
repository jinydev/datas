<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#14b8a6" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">✨ 무차별 융단 폭격 16종 산점도 행렬 (Pairplot)</text>

    <!-- Grid structure: 4x4 matrix -->
    <!-- SL, SW, PL, PW -->
    <g transform="translate(60, 60)">
        
        <!-- Row 0: SL vs SL, SW, PL, PW -->
        <g transform="translate(0, 0)">
            <rect x="0" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <!-- KDE for SL (Diagonal) -->
            <!-- 3 peaks for species -->
            <path d="M 5 70 Q 20 20 30 75 Q 40 10 50 75 Q 60 5 75 75" fill="none" stroke="#2563eb" stroke-width="2" />
            
            <!-- Scatter SL vs SW -->
            <rect x="90" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="110" cy="50" r="2" fill="#ef4444" />
            <circle cx="120" cy="40" r="2" fill="#10b981" />
            <circle cx="150" cy="20" r="2" fill="#3b82f6" />
            
            <rect x="180" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="200" cy="65" r="2" fill="#ef4444" />
            <circle cx="230" cy="40" r="2" fill="#10b981" />
            <circle cx="250" cy="15" r="2" fill="#3b82f6" />
            
            <rect x="270" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="290" cy="70" r="2" fill="#ef4444" />
            <circle cx="320" cy="40" r="2" fill="#10b981" />
            <circle cx="340" cy="15" r="2" fill="#3b82f6" />
        </g>
        
        <!-- Row 1: SW vs SL, SW, PL, PW -->
        <g transform="translate(0, 90)">
            <!-- Scatter SW vs SL -->
            <rect x="0" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="20" cy="50" r="2" fill="#ef4444" />
            <circle cx="45" cy="40" r="2" fill="#10b981" />
            
            <!-- KDE SW (Diagonal) -->
            <rect x="90" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <path d="M 95 70 Q 110 10 130 75 Q 150 40 165 75" fill="none" stroke="#10b981" stroke-width="2" />
            
            <rect x="180" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="200" cy="70" r="2" fill="#ef4444" />
            <circle cx="230" cy="45" r="2" fill="#10b981" />
            
            <rect x="270" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="290" cy="70" r="2" fill="#ef4444" />
            <circle cx="330" cy="45" r="2" fill="#3b82f6" />
        </g>
        
        <!-- Row 2: PL vs SL, SW, PL, PW -->
        <g transform="translate(0, 180)">
            <rect x="0" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="20" cy="65" r="2" fill="#ef4444" />
            <circle cx="60" cy="15" r="2" fill="#3b82f6" />
            
            <rect x="90" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="110" cy="70" r="2" fill="#ef4444" />
            <circle cx="150" cy="25" r="2" fill="#3b82f6" />
            
            <!-- KDE PL (Diagonal) -->
            <!-- Highlight this box because PL is perfectly separated! -->
            <rect x="180" y="0" width="80" height="80" fill="none" stroke="#fcd34d" stroke-width="4" />
            <path d="M 185 70 Q 195 10 205 75 M 220 70 Q 230 40 240 75 M 245 70 Q 255 10 255 75" fill="none" stroke="#ef4444" stroke-width="2" />

            <!-- Scatter PL vs PW (Almost linear) -->
            <rect x="270" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <!-- Group 1 -->
            <circle cx="280" cy="70" r="2.5" fill="#ef4444" />
            <circle cx="282" cy="68" r="2.5" fill="#ef4444" />
            <!-- Group 2 -->
            <circle cx="310" cy="40" r="2.5" fill="#10b981" />
            <circle cx="315" cy="35" r="2.5" fill="#10b981" />
            <!-- Group 3 -->
            <circle cx="340" cy="15" r="2.5" fill="#3b82f6" />
            <circle cx="345" cy="10" r="2.5" fill="#3b82f6" />
        </g>
        
        <!-- Row 3: PW vs SL, SW, PL, PW -->
        <g transform="translate(0, 270)">
            <rect x="0" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <rect x="90" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            
            <!-- Scatter PW vs PL -->
            <rect x="180" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <circle cx="190" cy="70" r="2" fill="#ef4444" />
            <circle cx="220" cy="40" r="2" fill="#10b981" />
            <circle cx="250" cy="10" r="2" fill="#3b82f6" />
            
            <!-- KDE PW (Diagonal) -->
            <rect x="270" y="0" width="80" height="80" fill="white" stroke="#cbd5e1" />
            <path d="M 275 70 Q 290 10 300 75 M 310 70 Q 320 20 330 75 M 335 70 Q 345 5 345 75" fill="none" stroke="#ef4444" stroke-width="2" />
        </g>

        <!-- Labels Y axis -->
        <text x="-10" y="45" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="end">sepal_length</text>
        <text x="-10" y="135" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="end">sepal_width</text>
        <text x="-10" y="225" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="end">petal_length</text>
        <text x="-10" y="315" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="end">petal_width</text>

        <!-- Labels X axis -->
        <text x="40" y="370" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="middle">sepal_length</text>
        <text x="130" y="370" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="middle">sepal_width</text>
        <text x="220" y="370" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="middle">petal_length</text>
        <text x="310" y="370" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="middle">petal_width</text>

        <!-- Legend Area -->
        <g transform="translate(380, 0)">
            <text x="0" y="20" fill="#1e293b" font-size="14" font-weight="bold">species (품종)</text>
            <circle cx="10" cy="40" r="4" fill="#ef4444" />
            <text x="25" y="44" fill="#475569" font-size="12">setosa</text>
            
            <circle cx="10" cy="65" r="4" fill="#10b981" />
            <text x="25" y="69" fill="#475569" font-size="12">versicolor</text>
            
            <circle cx="10" cy="90" r="4" fill="#3b82f6" />
            <text x="25" y="94" fill="#475569" font-size="12">virginica</text>

            <rect x="-10" y="130" width="130" height="70" fill="#fff7ed" stroke="#f59e0b" rx="5" />
            <text x="55" y="150" fill="#d97706" font-size="10" font-weight="bold" text-anchor="middle">대각선 (Diagonal)</text>
            <text x="55" y="165" fill="#475569" font-size="9" text-anchor="middle">자기 자신과의 비교이므로</text>
            <text x="55" y="180" fill="#475569" font-size="9" text-anchor="middle">산점도 대신 KDE 분포로</text>
            <text x="55" y="190" fill="#475569" font-size="9" text-anchor="middle">대체되어 그려짐!</text>
        </g>
    </g>
</svg>
