<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; }
      .title-sm { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; }
      .code { font-family: 'Consolas', monospace; font-size: 16px; font-weight: bold; fill: #d63384; }
      .ax-box { stroke-width: 3px; rx: 5px; ry: 5px; }
      .grid-bg { fill: none; stroke: #dee2e6; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect width="850" height="450" fill="#f8fafc" rx="10" ry="10" />
  <text x="425" y="40" class="title" fill="#1e293b" text-anchor="middle">GridSpec(3, 3) 비대칭 테트리스 레이아웃 병합</text>

  <g transform="translate(200, 70)">
    
    <!-- Code Command -->
    <text x="225" y="0" class="code" text-anchor="middle">gs = GridSpec(3, 3)</text>
    
    <!-- Background 3x3 grid dashed -->
    <g transform="translate(0, 20)">
      <!-- rows -->
      <line x1="0" y1="0" x2="450" y2="0" class="grid-bg" />
      <line x1="0" y1="100" x2="450" y2="100" class="grid-bg" />
      <line x1="0" y1="200" x2="450" y2="200" class="grid-bg" />
      <line x1="0" y1="300" x2="450" y2="300" class="grid-bg" />
      <!-- cols -->
      <line x1="0" y1="0" x2="0" y2="300" class="grid-bg" />
      <line x1="150" y1="0" x2="150" y2="300" class="grid-bg" />
      <line x1="300" y1="0" x2="300" y2="300" class="grid-bg" />
      <line x1="450" y1="0" x2="450" y2="300" class="grid-bg" />

      <!-- ax1: top row entirely -->
      <rect x="5" y="5" width="440" height="90" class="ax-box" fill="#e8f8f5" stroke="#1abc9c" />
      <text x="225" y="45" class="title" fill="#1abc9c" text-anchor="middle">ax1 = fig.add_subplot(gs[0, :])</text>
      <text x="225" y="70" class="code" fill="#6c757d" font-size="14" text-anchor="middle">0번 행의 전체 열 차지</text>

      <!-- ax2: row 1~2, col 0~1 -->
      <rect x="5" y="105" width="290" height="190" class="ax-box" fill="#f4ecf8" stroke="#9b59b6" />
      <text x="150" y="195" class="title-sm" fill="#9b59b6" text-anchor="middle">ax2 = fig.add_subplot(gs[1:, :2])</text>
      <text x="150" y="220" class="code" fill="#6c757d" font-size="14" text-anchor="middle">1~2번 행, 0~1번 열 병합</text>

      <!-- ax3: row 1~2, col 2 -->
      <rect x="305" y="105" width="140" height="190" class="ax-box" fill="#fff3cd" stroke="#ffc107" />
      <text x="375" y="195" class="title-sm" fill="#d39e00" text-anchor="middle">gs[1:, 2]</text>
      <text x="375" y="220" class="code" fill="#6c757d" font-size="14" text-anchor="middle">1~2번 행, 2번 열</text>
    </g>
  </g>
</svg>
