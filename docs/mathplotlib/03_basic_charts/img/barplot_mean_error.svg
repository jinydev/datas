<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .text-desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 15px; fill: #333; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">Seaborn 막대그래프(Barplot)의 원리: 단순 개수가 아닙니다!</text>

  <!-- Wrong Assumption -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="300" height="230" rx="5" ry="5" fill="#f8f9fa" stroke="#dc3545" stroke-width="2" />
    <rect x="0" y="0" width="300" height="40" fill="#dc3545" />
    <text x="150" y="26" class="title" fill="#fff" text-anchor="middle">흔한 오해 (Matplotlib 방식)</text>
    
    <line x1="30" y1="180" x2="270" y2="180" stroke="#333" stroke-width="2" />
    <line x1="30" y1="60" x2="30" y2="180" stroke="#333" stroke-width="2" />
    
    <!-- Bar representing sum or count -->
    <rect x="110" y="80" width="80" height="100" fill="#adb5bd" />
    <text x="150" y="140" class="text-desc" fill="#fff" font-weight="bold" text-anchor="middle">그냥</text>
    <text x="150" y="160" class="text-desc" fill="#fff" font-weight="bold" text-anchor="middle">개수/총합?</text>
    
    <text x="150" y="210" class="text-desc" fill="#dc3545" font-weight="bold" text-anchor="middle">❌ Seaborn Barplot은 통계 차트입니다!</text>
  </g>

  <!-- Seaborn Barplot Magic -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="350" height="230" rx="5" ry="5" fill="#e3f2fd" stroke="#0056b3" stroke-width="3" />
    <rect x="0" y="0" width="350" height="40" fill="#0056b3" />
    <text x="175" y="26" class="title" fill="#fff" text-anchor="middle">Seaborn SNS Barplot의 진실</text>
    
    <line x1="30" y1="180" x2="320" y2="180" stroke="#333" stroke-width="2" />
    <line x1="30" y1="60" x2="30" y2="180" stroke="#333" stroke-width="2" />
    
    <!-- Data points scattering inside the bar conceptually -->
    <rect x="80" y="110" width="60" height="70" fill="#0d6efd" fill-opacity="0.3" stroke="#0d6efd" />
    <circle cx="110" cy="160" r="3" fill="#0056b3" />
    <circle cx="110" cy="140" r="3" fill="#0056b3" />
    <circle cx="110" cy="120" r="3" fill="#0056b3" />
    <circle cx="110" cy="100" r="3" fill="#0056b3" />
    <circle cx="110" cy="80" r="3" fill="#0056b3" />
    
    <!-- Mean line / Top of bar -->
    <path d="M 80 110 L 140 110" fill="none" stroke="#0056b3" stroke-width="4" />
    
    <!-- Error Bar -->
    <path d="M 110 70 L 110 150" fill="none" stroke="#333" stroke-width="2" />
    <path d="M 100 70 L 120 70" fill="none" stroke="#333" stroke-width="2" />
    <path d="M 100 150 L 120 150" fill="none" stroke="#333" stroke-width="2" />
    <text x="110" y="200" class="text-desc" fill="#333" font-weight="bold" text-anchor="middle">A팀 성과</text>

    <!-- Explanations -->
    <path d="M 140 110 L 180 100" fill="none" stroke="#0056b3" stroke-dasharray="2,2" />
    <text x="245" y="105" class="text-desc" fill="#0056b3" font-weight="bold" text-anchor="middle">1. 막대 높이는 '평균(Mean)'</text>

    <path d="M 115 70 L 150 60" fill="none" stroke="#333" stroke-dasharray="2,2" />
    <text x="245" y="65" class="text-desc" fill="#333" font-weight="bold" text-anchor="middle">2. 검은 선은 '신뢰구간(오차)'</text>
    
    <text x="245" y="150" class="text-desc" fill="#6c757d" font-size="13" text-anchor="middle">데이터가 여러개일 경우,</text>
    <text x="245" y="165" class="text-desc" fill="#6c757d" font-size="13" text-anchor="middle">Seaborn이 내부에서 평균을 내고</text>
    <text x="245" y="180" class="text-desc" fill="#6c757d" font-size="13" text-anchor="middle">오차(CI)를 계산해 막대를 세웁니다.</text>
  </g>
</svg>
