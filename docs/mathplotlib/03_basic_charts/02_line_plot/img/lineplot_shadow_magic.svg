<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">Seaborn Lineplot의 숨겨진 힘: 신뢰구간(Confidence Interval) 그림자</text>

  <!-- 원본 데이터 (점이 여러 개 찍힘) -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="280" height="250" fill="#FFFFFF" rx="10" filter="url(#shadow)" stroke="#CFD8DC" stroke-width="2"/>
    <text x="140" y="25" font-family="sans-serif" font-size="14" fill="#607D8B" font-weight="bold" text-anchor="middle">실제 원본 데이터 모습 (Scatter)</text>
    <text x="140" y="45" font-family="sans-serif" font-size="11" fill="#757575" text-anchor="middle">같은 X시간대에 Y값이 여러 사람의 데이터로 중복됨</text>
    
    <path d="M 40 60 L 40 220 L 250 220" fill="none" stroke="#90A4AE" stroke-width="2" />
    <text x="140" y="240" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">X (Time)</text>

    <!-- X1 = 80 -->
    <circle cx="80" cy="180" r="4" fill="#607D8B" />
    <circle cx="80" cy="160" r="4" fill="#607D8B" />
    <circle cx="80" cy="190" r="4" fill="#607D8B" />
    <!-- X2 = 140 -->
    <circle cx="140" cy="110" r="4" fill="#607D8B" />
    <circle cx="140" cy="80" r="4" fill="#607D8B" />
    <circle cx="140" cy="140" r="4" fill="#607D8B" />
    <circle cx="140" cy="100" r="4" fill="#607D8B" />
    <!-- X3 = 200 -->
    <circle cx="200" cy="170" r="4" fill="#607D8B" />
    <circle cx="200" cy="150" r="4" fill="#607D8B" />
    <circle cx="200" cy="160" r="4" fill="#607D8B" />
  </g>

  <!-- 마법 지팡이 화살표 -->
  <text x="350" y="185" font-family="sans-serif" font-size="30" fill="#E91E63" text-anchor="middle">✨</text>
  <path d="M 330 200 L 370 200" fill="none" stroke="#E91E63" stroke-width="3" stroke-dasharray="5,5" />
  <polygon points="360,195 370,200 360,205" fill="#E91E63" />
  <text x="350" y="225" font-family="monospace" font-size="12" fill="#C2185B" font-weight="bold" text-anchor="middle">sns.lineplot()</text>

  <!-- 오른쪽: Seaborn Lineplot (선 + 그림자) -->
  <g transform="translate(390, 70)">
    <rect x="0" y="0" width="280" height="250" fill="#FCE4EC" rx="10" filter="url(#shadow)" stroke="#E91E63" stroke-width="3"/>
    <text x="140" y="25" font-family="sans-serif" font-size="14" fill="#C2185B" font-weight="bold" text-anchor="middle">Seaborn 자동 변환 결과물</text>
    <text x="140" y="45" font-family="sans-serif" font-size="11" fill="#757575" text-anchor="middle">점들을 통계적으로 요약해 선과 그림자로 한방에 완성!</text>
    
    <path d="M 40 60 L 40 220 L 250 220" fill="none" stroke="#90A4AE" stroke-width="2" />
    
    <!-- 그림자 (Confidence Interval) 영역 -->
    <!-- X1(80)-y(160~190), X2(140)-y(80~140), X3(200)-y(150~170) -->
    <path d="M 80 160 L 140 80 L 200 150 L 200 170 L 140 140 L 80 190 Z" fill="#F48FB1" opacity="0.6" stroke="none" />

    <!-- 굵은 평균선 (Mean) : y수치(175, 110, 160) 대략 중간값들 -->
    <path d="M 80 175 L 140 110 L 200 160" fill="none" stroke="#D81B60" stroke-width="4" />

    <!-- 설명선 -->
    <path d="M 140 110 L 140 70 L 180 70" fill="none" stroke="#333" stroke-width="1" />
    <circle cx="140" cy="110" r="3" fill="#333" />
    <text x="185" y="73" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">중앙 굵은 선: '평균(Mean)'</text>

    <path d="M 140 135 L 140 190 L 180 190" fill="none" stroke="#333" stroke-width="1" />
    <circle cx="140" cy="135" r="3" fill="#333" />
    <text x="185" y="193" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">반투명 그림자: '신뢰 구간 범위'</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 350)">
    <rect x="-330" y="-15" width="660" height="35" fill="#FBE9E7" rx="8" stroke="#FF5722" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#D84315" font-weight="bold" text-anchor="middle">단순히 점을 잇는 Matplotlib과 달리, Seaborn은 같은 시간의 여러 실험자 데이터를 "평균과 편차"로 자동 요약합니다!</text>
  </g>

</svg>
