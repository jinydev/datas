<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .code { font-family: 'Consolas', monospace; font-size: 16px; font-weight: bold; fill: #d63384; }
      .ax-box { fill: #fdf2e9; stroke: #e67e22; stroke-width: 3px; rx: 5px; ry: 5px; }
      .grid-bg { fill: none; stroke: #dee2e6; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="30" class="title" text-anchor="middle">GridSpec: 병합 병합 비대칭 테트리스 레이아웃</text>

  <g transform="translate(150, 70)">
    
    <!-- Code Command -->
    <text x="275" y="0" class="code" text-anchor="middle">gs = plt.GridSpec(2, 3)</text>
    
    <!-- Background 2x3 grid dashed -->
    <g transform="translate(50, 20)">
      <!-- rows -->
      <line x1="0" y1="0" x2="450" y2="0" class="grid-bg" />
      <line x1="0" y1="100" x2="450" y2="100" class="grid-bg" />
      <line x1="0" y1="200" x2="450" y2="200" class="grid-bg" />
      <!-- cols -->
      <line x1="0" y1="0" x2="0" y2="200" class="grid-bg" />
      <line x1="150" y1="0" x2="150" y2="200" class="grid-bg" />
      <line x1="300" y1="0" x2="300" y2="200" class="grid-bg" />
      <line x1="450" y1="0" x2="450" y2="200" class="grid-bg" />

      <!-- ax1: top row entirely -->
      <rect x="5" y="5" width="440" height="90" class="ax-box" fill="#e8f8f5" stroke="#1abc9c" />
      <text x="225" y="45" class="title" fill="#1abc9c" text-anchor="middle">ax1 = fig.add_subplot(gs[0, :])</text>
      <text x="225" y="70" class="code" fill="#6c757d" font-size="14" text-anchor="middle">0번 행(Row)의 전체 열(Col) 차지</text>

      <!-- ax2: bottom row, col 0~1 -->
      <rect x="5" y="105" width="290" height="90" class="ax-box" fill="#f4ecf8" stroke="#9b59b6" />
      <text x="150" y="145" class="title" fill="#9b59b6" text-anchor="middle">ax2 = fig.add_subplot(gs[1, :2])</text>

      <!-- ax3: bottom row, col 2 -->
      <rect x="305" y="105" width="140" height="90" class="ax-box" fill="#fff3cd" stroke="#ffc107" />
      <text x="375" y="145" class="title" fill="#d39e00" text-anchor="middle">gs[1, 2]</text>
    </g>
  </g>
</svg>
