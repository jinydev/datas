<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <!-- Title Area -->
    <rect width="600" height="40" fill="#3b82f6" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">📉 연도별 자산 가치 추세 (Line Plot)</text>

    <!-- Graph Area -->
    <g transform="translate(60, 60)">
        <!-- Axes -->
        <path d="M 0 0 L 0 180 L 480 180" stroke="#64748b" stroke-width="2" fill="none" />
        
        <!-- Y Grid -->
        <g stroke="#cbd5e1" stroke-dasharray="4,4" stroke-width="1">
            <line x1="0" y1="45" x2="480" y2="45" />  <!-- 1500 -->
            <line x1="0" y1="90" x2="480" y2="90" />  <!-- 1000 -->
            <line x1="0" y1="135" x2="480" y2="135" /> <!-- 500 -->
        </g>

        <!-- Y Labels -->
        <text x="-10" y="50" fill="#64748b" font-size="12" text-anchor="end">1500</text>
        <text x="-10" y="95" fill="#64748b" font-size="12" text-anchor="end">1000</text>
        <text x="-10" y="140" fill="#64748b" font-size="12" text-anchor="end">500</text>
        <text x="-10" y="185" fill="#64748b" font-size="12" text-anchor="end">0</text>
        
        <!-- X Labels -->
        <text x="60" y="200" fill="#64748b" font-size="12" text-anchor="middle">2020</text>
        <text x="180" y="200" fill="#64748b" font-size="12" text-anchor="middle">2021</text>
        <text x="300" y="200" fill="#64748b" font-size="12" text-anchor="middle">2022</text>
        <text x="420" y="200" fill="#64748b" font-size="12" text-anchor="middle">2023</text>

        <!-- Plot Line -->
        <path d="M 60 90 L 180 45 L 300 108 L 420 0" fill="none" stroke="#2563eb" stroke-width="3" />
        
        <!-- Markers -->
        <circle cx="60" cy="90" r="5" fill="#2563eb" />
        <circle cx="180" cy="45" r="5" fill="#2563eb" />
        <circle cx="300" cy="108" r="5" fill="#2563eb" />
        <circle cx="420" cy="0" r="5" fill="#2563eb" />

        <!-- Data Value Labels -->
        <text x="60" y="80" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="middle">1000</text>
        <text x="180" y="35" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="middle">1500</text>
        <text x="300" y="125" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="middle">800</text>
        <text x="420" y="-10" fill="#1e293b" font-size="11" font-weight="bold" text-anchor="middle">2000</text>
    </g>

    <!-- Info Box -->
    <rect x="360" y="250" width="220" height="35" rx="5" fill="#dbeafe" />
    <text x="470" y="272" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">💡 시간에 따른 가치의 변화 추세를 보여줌</text>
</svg>
