<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#10b981" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">🧱 plt.subplots(2, 2) 객체지향 4분할 격자 그리기</text>

    <!-- Grid -->
    <g transform="translate(100, 70)">
        
        <!-- [0,0] Line -->
        <g transform="translate(0, 0)">
            <rect width="180" height="120" fill="white" stroke="#94a3b8" stroke-width="1" />
            <text x="90" y="-10" fill="#1e293b" font-weight="bold" font-size="12" text-anchor="middle">1행 1열: Line Plot</text>
            <path d="M 20 100 L 90 60 L 160 20" stroke="#ef4444" stroke-width="2" fill="none" />
            <circle cx="20" cy="100" r="4" fill="#ef4444" />
            <circle cx="90" cy="60" r="4" fill="#ef4444" />
            <circle cx="160" cy="20" r="4" fill="#ef4444" />
            <rect x="-30" y="0" width="25" height="15" fill="#333" rx="2" />
            <text x="-17" y="11" fill="white" font-size="9" text-anchor="middle">[0,0]</text>
        </g>

        <!-- [0,1] Scatter -->
        <g transform="translate(220, 0)">
            <rect width="180" height="120" fill="white" stroke="#94a3b8" stroke-width="1" />
            <text x="90" y="-10" fill="#1e293b" font-weight="bold" font-size="12" text-anchor="middle">1행 2열: Scatter</text>
            <circle cx="30" cy="90" r="5" fill="#3b82f6" />
            <circle cx="90" cy="70" r="5" fill="#3b82f6" />
            <circle cx="150" cy="40" r="5" fill="#3b82f6" />
            <rect x="-30" y="0" width="25" height="15" fill="#333" rx="2" />
            <text x="-17" y="11" fill="white" font-size="9" text-anchor="middle">[0,1]</text>
        </g>

        <!-- [1,0] Bar -->
        <g transform="translate(0, 160)">
            <rect width="180" height="120" fill="white" stroke="#94a3b8" stroke-width="1" />
            <text x="90" y="-10" fill="#1e293b" font-weight="bold" font-size="12" text-anchor="middle">2행 1열: Bar Plot</text>
            <rect x="40" y="60" width="30" height="60" fill="#22c55e" />
            <rect x="110" y="20" width="30" height="100" fill="#22c55e" />
            <rect x="-30" y="0" width="25" height="15" fill="#333" rx="2" />
            <text x="-17" y="11" fill="white" font-size="9" text-anchor="middle">[1,0]</text>
        </g>

        <!-- [1,1] Line k-- -->
        <g transform="translate(220, 160)">
            <rect width="180" height="120" fill="white" stroke="#94a3b8" stroke-width="1" />
            <text x="90" y="-10" fill="#1e293b" font-weight="bold" font-size="12" text-anchor="middle">2행 2열: Empty/Line</text>
            <path d="M 20 20 L 160 100" stroke="#000000" stroke-width="2" stroke-dasharray="5,5" fill="none" />
            <rect x="-30" y="0" width="25" height="15" fill="#333" rx="2" />
            <text x="-17" y="11" fill="white" font-size="9" text-anchor="middle">[1,1]</text>
        </g>

    </g>

    <!-- Info Box -->
    <rect x="125" y="345" width="350" height="35" rx="5" fill="#dcfce7" />
    <text x="300" y="367" fill="#15803d" font-size="12" font-weight="bold" text-anchor="middle">💡 행렬과 같이 좌표 인덱스 [행, 열]을 통해서 각 서브플롯 영역에 접근할 수 있습니다!</text>
</svg>
