<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .code { font-family: 'Consolas', monospace; font-size: 14px; font-weight: bold; fill: #d63384; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
    </style>
  </defs>

  <rect width="850" height="200" fill="#fff" rx="10" ry="10" />
  <text x="425" y="30" class="title" text-anchor="middle" font-size="18">Matplotlib 3대 핵심 스타일 (선, 점, 색상)</text>

  <!-- 1. color / c -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="220" height="110" class="box" />
    <text x="110" y="25" class="title" text-anchor="middle" fill="#0056b3">1. 색상 (color, c)</text>
    <line x1="30" y1="60" x2="190" y2="60" stroke="red" stroke-width="4" />
    <text x="110" y="90" class="code" text-anchor="middle">color='red'</text>
  </g>

  <!-- 2. linestyle / ls -->
  <g transform="translate(315, 60)">
    <rect x="0" y="0" width="220" height="110" class="box" />
    <text x="110" y="25" class="title" text-anchor="middle" fill="#0056b3">2. 선 스크립트 (linestyle, ls)</text>
    <line x1="30" y1="50" x2="190" y2="50" stroke="#333" stroke-width="4" stroke-dasharray="10 5" />
    <line x1="30" y1="70" x2="190" y2="70" stroke="#333" stroke-width="4" stroke-dasharray="2 4" />
    <text x="110" y="95" class="code" text-anchor="middle">ls='--' 또는 ls=':'</text>
  </g>

  <!-- 3. marker -->
  <g transform="translate(580, 60)">
    <rect x="0" y="0" width="220" height="110" class="box" />
    <text x="110" y="25" class="title" text-anchor="middle" fill="#0056b3">3. 마커 (marker)</text>
    <line x1="30" y1="60" x2="190" y2="60" stroke="#28a745" stroke-width="2" />
    <circle cx="70" cy="60" r="6" fill="#28a745" />
    <circle cx="110" cy="60" r="6" fill="#28a745" />
    <polygon points="150,53 158,65 142,65" fill="#e74c3c" />
    <text x="110" y="90" class="code" text-anchor="middle">marker='o', marker='^'</text>
  </g>
</svg>
