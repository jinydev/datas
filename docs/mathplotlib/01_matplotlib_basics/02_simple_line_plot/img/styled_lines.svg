<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#64748b" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">✨ 스타일이 적용된 2개의 선 합치기</text>

    <!-- Graph Area -->
    <g transform="translate(80, 60)">
        <path d="M 0 0 L 0 180 L 400 180" stroke="#64748b" stroke-width="2" fill="none" />
        
        <g stroke="#cbd5e1" stroke-dasharray="4,4" stroke-width="1">
            <line x1="0" y1="45" x2="400" y2="45" />  <!-- 30 -->
            <line x1="0" y1="90" x2="400" y2="90" />  <!-- 20 -->
            <line x1="0" y1="135" x2="400" y2="135" /> <!-- 10 -->
        </g>
        
        <!-- Y Labels -->
        <text x="-10" y="5" fill="#64748b" font-size="12" text-anchor="end">40</text>
        <text x="-10" y="50" fill="#64748b" font-size="12" text-anchor="end">30</text>
        <text x="-10" y="95" fill="#64748b" font-size="12" text-anchor="end">20</text>
        <text x="-10" y="140" fill="#64748b" font-size="12" text-anchor="end">10</text>
        <text x="-40" y="90" fill="#0f172a" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90, -40, 90)">매출액(억)</text>

        <!-- X Labels (1, 2, 3, 4) mapped across 400px -->
        <text x="50" y="200" fill="#64748b" font-size="12" text-anchor="middle">1 분기</text>
        <text x="150" y="200" fill="#64748b" font-size="12" text-anchor="middle">2 분기</text>
        <text x="250" y="200" fill="#64748b" font-size="12" text-anchor="middle">3 분기</text>
        <text x="350" y="200" fill="#64748b" font-size="12" text-anchor="middle">4 분기</text>

        <!-- Line A: [10, 20, 30, 40] -> thick, red, dashed, diamond -->
        <path d="M 50 135 L 150 90 L 250 45 L 350 0" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10,6" />
        
        <!-- Diamond markers -->
        <polygon points="50,127 58,135 50,143 42,135" fill="#ef4444" />
        <polygon points="150,82 158,90 150,98 142,90" fill="#ef4444" />
        <polygon points="250,37 258,45 250,53 242,45" fill="#ef4444" />
        <polygon points="350,-8 358,0 350,8 342,0" fill="#ef4444" />

        <!-- Line B: [40, 30, 20, 10] -> thin, blue, dotted, star (asterisk simulating star) -->
        <!-- Just an asterisk drawn natively or circles to save time -->
        <path d="M 50 0 L 150 45 L 250 90 L 350 135" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,5" />
        
        <!-- Star markers (simplified to + x combinations) -->
        <g stroke="#3b82f6" stroke-width="1.5">
            <path d="M 45 0 L 55 0 M 50 -5 L 50 5 M 46 -4 L 54 4 M 46 4 L 54 -4" />
            <path d="M 145 45 L 155 45 M 150 40 L 150 50 M 146 41 L 154 49 M 146 49 L 154 41" />
            <path d="M 245 90 L 255 90 M 250 85 L 250 95 M 246 86 L 254 94 M 246 94 L 254 86" />
            <path d="M 345 135 L 355 135 M 350 130 L 350 140 M 346 131 L 354 139 M 346 139 L 354 131" />
        </g>
    </g>

    <!-- Legend box -->
    <g transform="translate(480, 70)">
        <rect x="0" y="0" width="90" height="60" fill="white" stroke="#cbd5e1" rx="4" />
        
        <!-- Legend A -->
        <path d="M 10 20 L 35 20" stroke="#ef4444" stroke-width="3" stroke-dasharray="6,4" />
        <polygon points="22.5,16 26.5,20 22.5,24 18.5,20" fill="#ef4444" />
        <text x="45" y="24" fill="#475569" font-size="12">매출 A</text>

        <!-- Legend B -->
        <path d="M 10 40 L 35 40" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="2,3" />
        <path d="M 19 40 L 25 40 M 22 37 L 22 43 M 19.5 37.5 L 24.5 42.5 M 19.5 42.5 L 24.5 37.5" stroke="#3b82f6" stroke-width="1.5" />
        <text x="45" y="44" fill="#475569" font-size="12">매출 B</text>
    </g>

    <rect x="300" y="240" width="280" height="40" rx="5" fill="#f8fafc" stroke="#cbd5e1" />
    <text x="440" y="265" fill="#0f172a" font-size="12" font-weight="bold" text-anchor="middle">💡 Linestyle, Marker, Color가 모두 적용된 결과</text>
</svg>
