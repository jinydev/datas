<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .box { rx: 5px; ry: 5px; stroke-width: 3px; }
      .code { font-family: 'Consolas', monospace; font-size: 16px; font-weight: bold; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">동일한 데이터, 극과 극의 스타일링 차이</text>

  <!-- Ugly Default -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="300" height="200" fill="#fff" stroke="#adb5bd" stroke-width="2" />
    <text x="150" y="230" class="title" fill="#6c757d" text-anchor="middle">순정 플롯 (Monster)</text>
    
    <line x1="30" y1="170" x2="270" y2="170" stroke="#333" stroke-width="1" />
    <line x1="30" y1="30" x2="30" y2="170" stroke="#333" stroke-width="1" />
    
    <path d="M 30 150 L 90 90 L 150 120 L 210 60 L 270 100" fill="none" stroke="#007bff" stroke-width="2" />
  </g>

  <!-- Beautiful Styled -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="300" height="200" fill="#f8f9fa" stroke="#0056b3" stroke-width="3" rx="10" ry="10" />
    <text x="150" y="230" class="title" fill="#0056b3" text-anchor="middle">스타일링 적용 (Hero)</text>
    
    <!-- Grid -->
    <line x1="30" y1="140" x2="270" y2="140" stroke="#ced4da" stroke-dasharray="4 4" />
    <line x1="30" y1="110" x2="270" y2="110" stroke="#ced4da" stroke-dasharray="4 4" />
    <line x1="30" y1="80" x2="270" y2="80" stroke="#ced4da" stroke-dasharray="4 4" />
    <line x1="30" y1="50" x2="270" y2="50" stroke="#ced4da" stroke-dasharray="4 4" />
    
    <!-- Axes -->
    <line x1="30" y1="170" x2="270" y2="170" stroke="#333" stroke-width="3" />
    <line x1="30" y1="30" x2="30" y2="170" stroke="#333" stroke-width="3" />
    
    <!-- Data -->
    <path d="M 30 150 L 90 90 L 150 120 L 210 60 L 270 100" fill="none" stroke="#dc3545" stroke-width="4" />
    <circle cx="90" cy="90" r="5" fill="#dc3545" />
    <circle cx="150" cy="120" r="5" fill="#dc3545" />
    <circle cx="210" cy="60" r="5" fill="#dc3545" />

    <!-- Labels & Legend -->
    <text x="150" y="20" class="title" fill="#dc3545" text-anchor="middle" font-size="14">Sales Growth 2024</text>
    <rect x="180" y="30" width="80" height="40" fill="#fff" stroke="#adb5bd" rx="3" ry="3" />
    <line x1="185" y1="50" x2="200" y2="50" stroke="#dc3545" stroke-width="2" />
    <text x="205" y="55" class="code" fill="#333" font-size="12">Sales</text>
    
    <text x="-20" y="100" class="code" fill="#333" font-size="12" transform="rotate(-90, -20, 100)">USD ($)</text>
  </g>
</svg>
