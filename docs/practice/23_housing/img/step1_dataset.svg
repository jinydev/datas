<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 캘리포니아 집값(California Housing) 데이터 구조</text>

  <!-- Location (Lat/Lon) Metaphor -->
  <g transform="translate(100, 100)">
    
    <rect x="0" y="0" width="180" height="200" fill="#eaf2f8" stroke="#3498db" stroke-width="2" rx="10"/>
    
    <!-- Map Icon -->
    <path d="M40,150 L40,60 L90,40 L140,60 L140,150 L90,130 Z" fill="#fff" stroke="#2980b9" stroke-width="2"/>
    <line x1="90" y1="40" x2="90" y2="130" stroke="#2980b9" stroke-width="2" stroke-dasharray="4,4"/>
    
    <!-- Pin Icon -->
    <path d="M90,110 C70,80 70,50 90,50 C110,50 110,80 90,110 Z" fill="#e74c3c"/>
    <circle cx="90" cy="70" r="8" fill="#fff"/>

    <text x="90" y="170" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">longitude (경도)</text>
    <text x="90" y="190" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">latitude (위도)</text>

  </g>

  <!-- Demographics (Income, Population) Metaphor -->
  <g transform="translate(310, 100)">
    
    <rect x="0" y="0" width="180" height="200" fill="#fdedec" stroke="#e74c3c" stroke-width="2" rx="10"/>
    
    <!-- People Icon -->
    <circle cx="65" cy="70" r="15" fill="#c0392b"/>
    <path d="M40,130 Q65,90 90,130 Z" fill="#c0392b"/>
    <circle cx="115" cy="80" r="12" fill="#e74c3c"/>
    <path d="M95,130 Q115,100 135,130 Z" fill="#e74c3c"/>

    <!-- Dollar Icon -->
    <text x="90" y="50" font-family="Arial" font-size="24" fill="#f1c40f" font-weight="bold" text-anchor="middle">$</text>

    <text x="90" y="170" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">population (인구)</text>
    <text x="90" y="190" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">median_income(소득)</text>

  </g>

  <!-- Arrow -->
  <path d="M500,200 L530,200 M520,190 L530,200 L520,210" fill="none" stroke="#2c3e50" stroke-width="4"/>

  <!-- Target Variable (House Value) -->
  <g transform="translate(550, 100)">
    
    <rect x="0" y="0" width="180" height="200" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2" rx="10"/>
    
    <!-- House Icon -->
    <path d="M90,40 L30,90 L40,90 L40,140 L140,140 L140,90 L150,90 Z" fill="#16a085"/>
    <rect x="75" y="110" width="30" height="30" fill="#fff"/> <!-- Door -->
    <rect x="50" y="100" width="20" height="20" fill="#e8f8f5"/> <!-- Window 1 -->
    <rect x="110" y="100" width="20" height="20" fill="#e8f8f5"/> <!-- Window 2 -->

    <text x="90" y="170" font-family="Courier" font-size="14" fill="#16a085" font-weight="bold" text-anchor="middle">median_house_value</text>
    <text x="90" y="190" font-family="Arial" font-size="12" fill="#16a085" font-weight="bold" text-anchor="middle">(집값 중간값)</text>
  </g>

  <rect x="150" y="330" width="500" height="40" fill="#fff" stroke="#bdc3c7" rx="5"/>
  <text x="400" y="355" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">"동네의 위치와 사람들의 소득 수준이 그 동네의 집값을 결정한다"</text>

</svg>
