<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 인지 심리학(Attention) 실험 데이터의 이해</text>

  <!-- Focused Attention Metaphor -->
  <g transform="translate(150, 100)">
    <rect width="200" height="200" fill="#fff" stroke="#2980b9" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="200" height="40" fill="#2980b9" rx="10"/>
    <rect x="0" y="20" width="200" height="20" fill="#2980b9"/>
    <text x="100" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Focused (집중)</text>

    <!-- Brain / Eye -->
    <circle cx="100" cy="110" r="40" fill="#eaf2f8" stroke="#3498db" stroke-width="3"/>
    <circle cx="100" cy="110" r="15" fill="#2c3e50"/>
    <!-- Laser beam -->
    <path d="M100,110 L100,180" fill="none" stroke="#e74c3c" stroke-width="6"/>
    <polygon points="100,190 90,170 110,170" fill="#e74c3c"/>

    <!-- Single Task -->
    <rect x="60" y="190" width="80" height="20" fill="#fcf3cf" rx="3"/>
    <text x="100" y="205" font-family="Arial" font-size="12" fill="#d35400" font-weight="bold" text-anchor="middle">하나의 과제</text>
  </g>

  <!-- VS -->
  <text x="400" y="200" font-family="Arial" font-size="24" fill="#34495e" font-weight="bold" text-anchor="middle">VS</text>

  <!-- Divided Attention Metaphor -->
  <g transform="translate(450, 100)">
    <rect width="200" height="200" fill="#fff" stroke="#e67e22" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="200" height="40" fill="#e67e22" rx="10"/>
    <rect x="0" y="20" width="200" height="20" fill="#e67e22"/>
    <text x="100" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Divided (분산/멀티태스킹)</text>

    <!-- Brain / Eye -->
    <circle cx="100" cy="110" r="40" fill="#fdf2e9" stroke="#d35400" stroke-width="3"/>
    <circle cx="100" cy="110" r="15" fill="#2c3e50"/>
    
    <!-- Multiple weak beams -->
    <path d="M100,110 L40,170" fill="none" stroke="#f39c12" stroke-width="3" stroke-dasharray="4,2"/>
    <path d="M100,110 L100,170" fill="none" stroke="#f39c12" stroke-width="3" stroke-dasharray="4,2"/>
    <path d="M100,110 L160,170" fill="none" stroke="#f39c12" stroke-width="3" stroke-dasharray="4,2"/>

    <!-- Multiple Tasks -->
    <rect x="10" y="175" width="50" height="20" fill="#ecf0f1" rx="3"/>
    <rect x="75" y="175" width="50" height="20" fill="#ecf0f1" rx="3"/>
    <rect x="140" y="175" width="50" height="20" fill="#ecf0f1" rx="3"/>
    <text x="35" y="188" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">음악듣기</text>
    <text x="100" y="188" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">과제하기</text>
    <text x="165" y="188" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">폰보기</text>
  </g>

  <!-- Target -->
  <rect x="250" y="330" width="300" height="40" fill="#eaf2f8" rx="5"/>
  <text x="400" y="355" font-family="Arial" font-size="16" fill="#2c3e50" font-weight="bold" text-anchor="middle">과연 멀티태스킹은 성적(Score)을 떨어뜨릴까?</text>

</svg>
