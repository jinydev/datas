<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: Barplot이 보여주는 잔인한 진실 (신뢰구간)</text>

  <!-- Barplot construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">멀티태스킹(Divided)은 정말로 비효율적일까?</text>
    
    <!-- Axes -->
    <line x1="100" y1="240" x2="400" y2="240" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="100" y1="240" x2="100" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="275" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Attention (주의력 유형)</text>
    <text x="70" y="145" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 70,145)">Score (평균 점수)</text>
    
    <text x="85" y="240" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="end">0</text>
    <text x="85" y="145" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="end">4</text>
    <text x="85" y="55" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="end">8</text>

    <!-- Bar 1 (Divided) -->
    <rect x="150" y="130" width="80" height="110" fill="#e67e22" opacity="0.8"/>
    <text x="190" y="260" font-family="Arial" font-size="12" fill="#d35400" font-weight="bold" text-anchor="middle">divided</text>
    <!-- Error bar -->
    <line x1="190" y1="100" x2="190" y2="160" stroke="#d35400" stroke-width="2"/>
    <line x1="185" y1="100" x2="195" y2="100" stroke="#d35400" stroke-width="2"/>
    <line x1="185" y1="160" x2="195" y2="160" stroke="#d35400" stroke-width="2"/>

    <!-- Bar 2 (Focused) -->
    <rect x="270" y="80" width="80" height="160" fill="#2980b9" opacity="0.8"/>
    <text x="310" y="260" font-family="Arial" font-size="12" fill="#1f618d" font-weight="bold" text-anchor="middle">focused</text>
    <!-- Error bar -->
    <line x1="310" y1="60" x2="310" y2="100" stroke="#1f618d" stroke-width="2"/>
    <line x1="305" y1="60" x2="315" y2="60" stroke="#1f618d" stroke-width="2"/>
    <line x1="305" y1="100" x2="315" y2="100" stroke="#1f618d" stroke-width="2"/>

    <!-- Insight -->
    <path d="M190,90 Q250,50 310,50" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,4"/>
    <polygon points="310,50 300,45 300,55" fill="#c0392b"/>

    <rect x="340" y="60" width="140" height="60" fill="#fdedec" rx="5"/>
    <text x="410" y="85" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">집중(Focused) 그룹의</text>
    <text x="410" y="100" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">평균 점수가 압도적으로 높음</text>

  </g>
</svg>
