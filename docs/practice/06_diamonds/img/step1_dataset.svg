<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 다이아몬드(Diamonds) 데이터와 4C의 이해</text>

  <!-- Diamond Metaphor -->
  <g transform="translate(100, 100)">
    <!-- Main Diamond -->
    <path d="M60,20 L140,20 L180,60 L100,160 L20,60 Z" fill="#eaf2f8" stroke="#3498db" stroke-width="2"/>
    <path d="M60,20 L100,60 L140,20" fill="none" stroke="#3498db" stroke-width="1"/>
    <path d="M20,60 L100,60 L180,60" fill="none" stroke="#3498db" stroke-width="1"/>
    <path d="M60,20 L40,60 L100,160 L160,60 L140,20" fill="none" stroke="#3498db" stroke-width="1"/>
    <path d="M100,60 L100,160" fill="none" stroke="#3498db" stroke-width="1"/>

    <!-- Measurements (x, y, z, table, depth) -->
    <line x1="10" y1="60" x2="190" y2="60" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="-10" y="65" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">x, y (너비/길이)</text>

    <line x1="210" y1="20" x2="210" y2="160" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="220" y="95" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold">z (깊이)</text>

    <text x="100" y="10" font-family="Arial" font-size="12" fill="#8e44ad" font-weight="bold" text-anchor="middle">table (윗면 평행도)</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(420, 80)">
    <rect width="350" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="350" height="40" fill="#3498db" rx="10"/>
    <rect x="0" y="20" width="350" height="20" fill="#3498db"/>
    <text x="175" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">가격을 결정하는 핵심 4C (Features)</text>

    <!-- 4C Features -->
    <rect x="20" y="60" width="310" height="130" fill="#f4ecf7" rx="5"/>
    <text x="30" y="85" font-family="Courier" font-size="14" fill="#8e44ad" font-weight="bold">• Carat (무게)</text>
    <text x="150" y="85" font-family="Arial" font-size="12" fill="#34495e">: 0.2 ~ 5.0 (클수록 비쌈)</text>
    
    <text x="30" y="110" font-family="Courier" font-size="14" fill="#8e44ad" font-weight="bold">• Cut (세공)</text>
    <text x="150" y="110" font-family="Arial" font-size="12" fill="#34495e">: Fair ~ Ideal (가공 품질)</text>
    
    <text x="30" y="135" font-family="Courier" font-size="14" fill="#8e44ad" font-weight="bold">• Color (색상)</text>
    <text x="150" y="135" font-family="Arial" font-size="12" fill="#34495e">: J(누런색) ~ D(무색/비쌈)</text>
    
    <text x="30" y="160" font-family="Courier" font-size="14" fill="#8e44ad" font-weight="bold">• Clarity(투명도)</text>
    <text x="150" y="160" font-family="Arial" font-size="12" fill="#34495e">: I1(불순물) ~ IF(무결점)</text>

    <!-- Target -->
    <rect x="20" y="200" width="310" height="40" fill="#fcf3cf" rx="5"/>
    <text x="175" y="225" font-family="Courier" font-size="16" fill="#d35400" font-weight="bold" text-anchor="middle">Target (y) = price (가격, USD)</text>
  </g>

</svg>