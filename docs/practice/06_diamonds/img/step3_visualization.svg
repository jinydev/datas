<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 가격(Price) 분포와 비대칭(Right-Skewed) 시각화</text>

  <!-- KDE Plot Interpretation -->
  <g transform="translate(150, 90)">
    <rect width="500" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#e67e22" font-weight="bold" text-anchor="middle">다이아몬드 가격 분포 (Histogram + KDE)</text>
    
    <line x1="50" y1="200" x2="450" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="200" x2="50" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="235" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Price ($)</text>
    <text x="20" y="130" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,130)">빈도수 (Count)</text>
    
    <text x="50" y="220" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">0</text>
    <text x="150" y="220" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">5,000</text>
    <text x="250" y="220" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">10,000</text>
    <text x="450" y="220" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">18,000</text>

    <!-- Histogram Bars -->
    <rect x="55" y="60" width="30" height="140" fill="#f39c12" opacity="0.6"/>
    <rect x="85" y="90" width="30" height="110" fill="#f39c12" opacity="0.6"/>
    <rect x="115" y="130" width="30" height="70" fill="#f39c12" opacity="0.6"/>
    <rect x="145" y="150" width="30" height="50" fill="#f39c12" opacity="0.6"/>
    <rect x="175" y="165" width="30" height="35" fill="#f39c12" opacity="0.6"/>
    <rect x="205" y="175" width="30" height="25" fill="#f39c12" opacity="0.6"/>
    <rect x="235" y="182" width="30" height="18" fill="#f39c12" opacity="0.6"/>
    <rect x="265" y="187" width="30" height="13" fill="#f39c12" opacity="0.6"/>
    <rect x="295" y="190" width="30" height="10" fill="#f39c12" opacity="0.6"/>
    <rect x="325" y="193" width="30" height="7" fill="#f39c12" opacity="0.6"/>
    <rect x="355" y="195" width="30" height="5" fill="#f39c12" opacity="0.6"/>

    <!-- KDE Curve -->
    <path d="M50,200 L65,50 Q120,160 200,180 T450,195" fill="none" stroke="#d35400" stroke-width="3"/>

    <!-- Annotations -->
    <line x1="80" y1="40" x2="80" y2="200" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="140" y="45" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">대부분 싼 다이아몬드 (1,000$ 이하)</text>

    <text x="350" y="140" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">Long Tail</text>
    <text x="350" y="155" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">극소수의 초고가 보석들</text>

  </g>

</svg>