<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 심장 질환 진단(Heart Disease) 데이터 구조</text>

  <!-- Patient Vitals Concept -->
  <g transform="translate(100, 100)">
    
    <rect x="0" y="0" width="220" height="200" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="220" height="40" fill="#3498db" rx="10"/>
    <rect x="0" y="20" width="220" height="20" fill="#3498db"/>
    <text x="110" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">환자 신체 징후 (Features)</text>
    
    <!-- Heartbeat Icon -->
    <path d="M50,90 L70,90 L80,70 L95,120 L110,60 L125,110 L135,90 L160,90" fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <text x="110" y="140" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">age (나이)</text>
    <text x="110" y="160" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">trestbps (혈압)</text>
    <text x="110" y="180" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">thalach (최대 심박수)</text>
  </g>

  <!-- AI Prediction Arrow -->
  <g transform="translate(350, 170)">
    <path d="M0,20 L60,20 M50,10 L60,20 L50,30" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="30" y="10" font-family="Arial" font-size="12" fill="#7f8c8d" font-weight="bold" text-anchor="middle">분류(Classification)</text>
  </g>

  <!-- Target Variable Concept -->
  <g transform="translate(450, 100)">
    
    <rect x="0" y="0" width="220" height="200" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="220" height="40" fill="#e74c3c" rx="10"/>
    <rect x="0" y="20" width="220" height="20" fill="#e74c3c"/>
    <text x="110" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">최종 진단 (Target)</text>

    <!-- Heart Icon -->
    <path d="M110,120 C110,120 70,85 70,65 C70,50 85,40 100,50 C110,60 110,60 110,60 C110,60 110,60 120,50 C135,40 150,50 150,65 C150,85 110,120 110,120 Z" fill="#e74c3c"/>
    
    <text x="110" y="150" font-family="Courier" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">target (심장병 여부)</text>
    
    <!-- Binary Results -->
    <rect x="30" y="165" width="70" height="25" fill="#eaf2f8" rx="5"/>
    <text x="65" y="182" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold" text-anchor="middle">0: 정상</text>
    
    <rect x="120" y="165" width="70" height="25" fill="#fdedec" rx="5"/>
    <text x="155" y="182" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">1: 발병</text>

  </g>

  <rect x="150" y="340" width="500" height="40" fill="#e8f8f5" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#16a085" font-weight="bold" text-anchor="middle">"수십 개의 신체 건강 수치를 조합하여, 심장병(Target)을 진단합니다."</text>

</svg>
