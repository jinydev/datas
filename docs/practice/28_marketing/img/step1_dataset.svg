<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 은행 마케팅 캠페인(Bank Marketing) 데이터 구조</text>

  <!-- Customer Profile (Features) -->
  <g transform="translate(80, 100)">
    
    <rect x="0" y="0" width="180" height="200" fill="#eaf2f8" stroke="#3498db" stroke-width="2" rx="10"/>
    
    <!-- Profile Icon -->
    <circle cx="90" cy="60" r="20" fill="#3498db"/>
    <path d="M50,120 C50,90 130,90 130,120 Z" fill="#3498db"/>
    
    <rect x="25" y="130" width="130" height="20" fill="#f1c40f" rx="3"/>
    <text x="90" y="144" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">balance: $5,000</text>

    <!-- Text descriptors -->
    <text x="90" y="170" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">job (직업)</text>
    <text x="90" y="190" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">age (나이)</text>
  </g>

  <!-- Telemarketing Call (Feature) -->
  <g transform="translate(300, 100)">
    <rect x="0" y="0" width="180" height="200" fill="#fcf3cf" stroke="#f1c40f" stroke-width="2" rx="10"/>
    
    <!-- Phone / Headset Icon -->
    <path d="M50,110 C50,60 130,60 130,110 L130,120 C130,140 110,140 110,140 L110,100 C110,90 130,90 130,90 M50,120 C50,140 70,140 70,140 L70,100 C70,90 50,90 50,90" fill="none" stroke="#d4ac0d" stroke-width="4"/>
    <path d="M120,120 C140,150 110,160 90,150" fill="none" stroke="#d4ac0d" stroke-width="3" stroke-dasharray="3,3"/>
    
    <text x="90" y="170" font-family="Courier" font-size="14" fill="#d4ac0d" font-weight="bold" text-anchor="middle">duration</text>
    <text x="90" y="190" font-family="Arial" font-size="12" fill="#d4ac0d" font-weight="bold" text-anchor="middle">(통화 시간)</text>
  </g>

  <!-- Prediction Arrow -->
  <g transform="translate(500, 190)">
    <path d="M0,10 L30,10 M20,0 L30,10 L20,20" fill="none" stroke="#2c3e50" stroke-width="4"/>
  </g>

  <!-- Target Variable (Deposit Yes/No) -->
  <g transform="translate(550, 100)">
    
    <rect x="0" y="0" width="180" height="200" fill="#e8f8f5" stroke="#27ae60" stroke-width="2" rx="10"/>
    
    <!-- Bank/Piggy Bank Icon -->
    <circle cx="90" cy="80" r="30" fill="#2ecc71"/>
    <path d="M60,60 Q90,40 120,60" fill="none" stroke="#fff" stroke-width="3"/>
    <rect x="80" y="40" width="20" height="5" fill="#fff"/> <!-- Coin slot -->
    
    <text x="90" y="140" font-family="Courier" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">deposit (예금 가입)</text>
    
    <!-- Binary Results -->
    <rect x="25" y="160" width="60" height="25" fill="#fff" stroke="#e74c3c" rx="5"/>
    <text x="55" y="177" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">no</text>
    
    <rect x="95" y="160" width="60" height="25" fill="#fff" stroke="#27ae60" rx="5"/>
    <text x="125" y="177" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">yes</text>
  </g>

  <rect x="150" y="340" width="500" height="40" fill="#fff" stroke="#bdc3c7" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">"고객 프로필과 통화 시간을 종합하여 예금 가입 여부를 예측한다"</text>

</svg>
