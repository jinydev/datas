<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 그룹별 밀도 시각화 (Violinplot)</text>

  <!-- Boxplot vs Violinplot Concept -->
  
  <!-- The Data points (Mental Model) -->
  <g transform="translate(50, 100)">
    <rect width="200" height="200" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="100" y="30" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">실제 데이터 분포</text>
    
    <text x="60" y="60" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">양성 (B)</text>
    <circle cx="60" cy="180" r="3" fill="#27ae60" opacity="0.6"/>
    <circle cx="60" cy="170" r="3" fill="#27ae60" opacity="0.6"/>
    <circle cx="60" cy="175" r="3" fill="#27ae60" opacity="0.6"/>
    <circle cx="60" cy="160" r="3" fill="#27ae60" opacity="0.6"/>
    <!-- clustered -->
    <ellipse cx="60" cy="170" rx="8" ry="15" fill="#27ae60" opacity="0.3"/>

    <text x="140" y="60" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">악성 (M)</text>
    <circle cx="140" cy="160" r="3" fill="#c0392b" opacity="0.6"/>
    <circle cx="140" cy="130" r="3" fill="#c0392b" opacity="0.6"/>
    <circle cx="140" cy="100" r="3" fill="#c0392b" opacity="0.6"/>
    <circle cx="140" cy="80" r="3" fill="#c0392b" opacity="0.6"/>
    <!-- spread out -->
    <ellipse cx="140" cy="120" rx="6" ry="40" fill="#c0392b" opacity="0.2"/>

    <text x="100" y="230" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">밀집 vs 분산</text>
  </g>

  <path d="M270,200 L320,200 M310,190 L320,200 L310,210" fill="none" stroke="#2c3e50" stroke-width="3"/>

  <!-- Violinplot Visualization -->
  <g transform="translate(350, 80)">
    <rect width="400" height="240" fill="#fff" stroke="#2980b9" stroke-width="2" rx="5"/>
    <text x="200" y="30" font-family="Arial" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">Violinplot (밀도 반영)</text>
    
    <line x1="50" y1="210" x2="350" y2="210" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="210" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="120" y="230" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">B (Benign)</text>
    <text x="280" y="230" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">M (Malignant)</text>
    <text x="20" y="130" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,130)">Area (면적)</text>

    <!-- Violin B (Fat and low) -->
    <path d="M120,200 C150,200 160,180 120,160 C80,180 90,200 120,200 Z" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
    <rect x="117" y="170" width="6" height="20" fill="#2c3e50"/> <!-- Inner boxplot -->
    
    <!-- Violin M (Tall and stretched) -->
    <path d="M280,180 C320,180 300,100 280,60 C260,100 240,180 280,180 Z" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
    <rect x="277" y="100" width="6" height="60" fill="#2c3e50"/> <!-- Inner boxplot -->

    <!-- Callouts -->
    <line x1="160" y1="180" x2="200" y2="180" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="240" y="185" font-family="Arial" font-size="11" fill="#27ae60" font-weight="bold">크기가 작고 밀집됨</text>
    
    <line x1="310" y1="90" x2="350" y2="90" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="350" y="75" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold">크기가 크고</text>
    <text x="350" y="90" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold">넓게 분산됨</text>

  </g>

  <rect x="150" y="340" width="500" height="40" fill="#eaf2f8" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">결론: "종양의 면적이 크고 형태가 다양하면 암(M)일 확률이 높다."</text>

</svg>
