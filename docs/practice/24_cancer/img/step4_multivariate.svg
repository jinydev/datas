<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 암 판별을 위한 완벽한 선 찾기 (Pairplot)</text>

  <!-- Pairplot Matrix Concept -->
  <g transform="translate(150, 60)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <!-- Matrix Grid 2x2 Concept -->
    <!-- X Labels -->
    <text x="125" y="30" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">radius</text>
    <text x="375" y="30" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">smoothness</text>
    
    <!-- Y Labels -->
    <text x="40" y="110" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle" transform="rotate(-90 40,110)">texture</text>
    <text x="40" y="240" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle" transform="rotate(-90 40,240)">area</text>

    <!-- Plot 1 (Top Left) -->
    <g transform="translate(60, 40)">
      <rect width="180" height="120" fill="#fff" stroke="#bdc3c7"/>
      <!-- Scattered slightly -->
      <circle cx="50" cy="80" r="4" fill="#3498db" opacity="0.6"/>
      <circle cx="70" cy="90" r="4" fill="#3498db" opacity="0.6"/>
      <circle cx="120" cy="40" r="4" fill="#e74c3c" opacity="0.6"/>
      <circle cx="140" cy="50" r="4" fill="#e74c3c" opacity="0.6"/>
      <circle cx="90" cy="60" r="4" fill="#3498db" opacity="0.6"/>
      <circle cx="100" cy="70" r="4" fill="#e74c3c" opacity="0.6"/> <!-- mixed -->
      <line x1="20" y1="100" x2="160" y2="20" stroke="#7f8c8d" stroke-dasharray="2,2"/>
    </g>

    <!-- Plot 2 (Top Right - BAD features) -->
    <g transform="translate(260, 40)">
      <rect width="180" height="120" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
      <text x="90" y="20" font-family="Arial" font-size="10" fill="#c0392b" font-weight="bold" text-anchor="middle">분류 불가능 (완전 겹침)</text>
      <!-- All mixed up -->
      <circle cx="90" cy="60" r="4" fill="#3498db" opacity="0.6"/>
      <circle cx="100" cy="50" r="4" fill="#e74c3c" opacity="0.6"/>
      <circle cx="80" cy="70" r="4" fill="#3498db" opacity="0.6"/>
      <circle cx="110" cy="60" r="4" fill="#e74c3c" opacity="0.6"/>
      <circle cx="95" cy="65" r="4" fill="#3498db" opacity="0.6"/>
      <circle cx="85" cy="55" r="4" fill="#e74c3c" opacity="0.6"/>
    </g>

    <!-- Plot 3 (Bottom Left - PERFECT features) -->
    <g transform="translate(60, 180)">
      <rect width="180" height="100" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
      <text x="90" y="20" font-family="Arial" font-size="10" fill="#27ae60" font-weight="bold" text-anchor="middle">분류 완벽 (강력한 기준)</text>
      <!-- Blue bottom left, Red top right -->
      <circle cx="40" cy="80" r="4" fill="#3498db" opacity="0.8"/>
      <circle cx="50" cy="75" r="4" fill="#3498db" opacity="0.8"/>
      <circle cx="60" cy="90" r="4" fill="#3498db" opacity="0.8"/>
      
      <circle cx="140" cy="30" r="4" fill="#e74c3c" opacity="0.8"/>
      <circle cx="130" cy="40" r="4" fill="#e74c3c" opacity="0.8"/>
      <circle cx="150" cy="20" r="4" fill="#e74c3c" opacity="0.8"/>
      
      <line x1="80" y1="90" x2="100" y2="10" stroke="#27ae60" stroke-width="3"/>
    </g>
    
    <!-- Legend -->
    <g transform="translate(260, 180)">
      <rect width="180" height="100" fill="#fff" stroke="#bdc3c7"/>
      <text x="90" y="30" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">Legend (Hue)</text>
      <circle cx="50" cy="60" r="6" fill="#3498db"/>
      <text x="70" y="64" font-family="Arial" font-size="12" fill="#34495e">양성(B)</text>
      <circle cx="120" cy="60" r="6" fill="#e74c3c"/>
      <text x="140" y="64" font-family="Arial" font-size="12" fill="#34495e">악성(M)</text>
    </g>

  </g>
</svg>
