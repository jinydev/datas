<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 계절성(Seasonality)을 보여주는 시계열 선 그래프</text>

  <!-- Lineplot Concept -->
  <g transform="translate(100, 60)">
    <rect width="600" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="300" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">월별(Month) 총 매출액(TotalPrice 합계) 추이</text>
    
    <!-- Axes -->
    <line x1="50" y1="250" x2="550" y2="250" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="250" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="300" y="290" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Month (1월 ~ 12월)</text>
    <text x="20" y="150" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,150)">Total Sales ($)</text>

    <!-- Grid -->
    <line x1="50" y1="200" x2="550" y2="200" stroke="#bdc3c7" stroke-dasharray="2,2"/>
    <line x1="50" y1="150" x2="550" y2="150" stroke="#bdc3c7" stroke-dasharray="2,2"/>
    <line x1="50" y1="100" x2="550" y2="100" stroke="#bdc3c7" stroke-dasharray="2,2"/>

    <!-- X-axis Labels -->
    <text x="80" y="270" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">1</text>
    <text x="120" y="270" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">2</text>
    <text x="160" y="270" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">3</text>
    <text x="240" y="270" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">5</text>
    <text x="320" y="270" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">7</text>
    <text x="400" y="270" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">9</text>
    <text x="480" y="270" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">11</text>
    <text x="520" y="270" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">12</text>

    <!-- Data Points &amp; Line -->
    <!-- Jan-Oct: Steady/Slight increase -->
    <path d="M80,200 L120,210 L160,190 L200,195 L240,180 L280,185 L320,170 L360,175 L400,160 L440,150 
             L480,70 L520,60" fill="none" stroke="#16a085" stroke-width="4"/>
    
    <!-- Markers -->
    <circle cx="80" cy="200" r="5" fill="#1abc9c"/>
    <circle cx="160" cy="190" r="5" fill="#1abc9c"/>
    <circle cx="240" cy="180" r="5" fill="#1abc9c"/>
    <circle cx="320" cy="170" r="5" fill="#1abc9c"/>
    <circle cx="400" cy="160" r="5" fill="#1abc9c"/>
    <circle cx="440" cy="150" r="5" fill="#1abc9c"/>
    
    <!-- Highlight Peaks -->
    <circle cx="480" cy="70" r="7" fill="#e74c3c"/>
    <circle cx="520" cy="60" r="7" fill="#e74c3c"/>
    
    <!-- Annotation -->
    <rect x="350" y="90" width="180" height="40" fill="#fdedec" stroke="#e74c3c" rx="5"/>
    <text x="440" y="105" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold" text-anchor="middle">연말 시즌 가파른 매출 상승</text>
    <text x="440" y="120" font-family="Arial" font-size="10" fill="#c0392b" text-anchor="middle">(블랙 프라이데이, 크리스마스)</text>
    <path d="M480,90 L480,80" fill="none" stroke="#e74c3c" stroke-width="2"/>

  </g>
</svg>
