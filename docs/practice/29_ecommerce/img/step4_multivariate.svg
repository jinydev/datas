<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 피벗 테이블(Pivot)과 매출 히트맵(Heatmap)</text>

  <!-- Heatmap Concept -->
  <g transform="translate(100, 70)">
    
    <!-- Y-axis Labels (Countries) -->
    <text x="120" y="50" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="end">United Kingdom</text>
    <text x="120" y="100" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="end">Germany</text>
    <text x="120" y="150" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="end">France</text>
    <text x="120" y="200" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="end">EIRE</text>

    <!-- X-axis Labels (Months) -->
    <text x="150" y="20" font-family="Courier" font-size="14" fill="#34495e" text-anchor="middle">1</text>
    <text x="250" y="20" font-family="Courier" font-size="14" fill="#34495e" text-anchor="middle">2</text>
    <text x="350" y="20" font-family="Courier" font-size="14" fill="#34495e" text-anchor="middle">...</text>
    <text x="450" y="20" font-family="Courier" font-size="14" fill="#e74c3c" font-weight="bold" text-anchor="middle">11</text>
    <text x="550" y="20" font-family="Courier" font-size="14" fill="#e74c3c" font-weight="bold" text-anchor="middle">12</text>

    <!-- Heatmap Cells -->
    
    <!-- UK Row (Very Dark Blues - High Sales) -->
    <rect x="130" y="30" width="40" height="40" fill="#21618c" stroke="#fff"/>
    <rect x="230" y="30" width="40" height="40" fill="#2874a6" stroke="#fff"/>
    <rect x="430" y="30" width="40" height="40" fill="#154360" stroke="#fff"/> <!-- Darkest -->
    <rect x="530" y="30" width="40" height="40" fill="#1a5276" stroke="#fff"/>

    <!-- Germany Row (Medium Blues) -->
    <rect x="130" y="80" width="40" height="40" fill="#85c1e9" stroke="#fff"/>
    <rect x="230" y="80" width="40" height="40" fill="#aed6f1" stroke="#fff"/>
    <rect x="430" y="80" width="40" height="40" fill="#2e86c1" stroke="#fff"/> <!-- Peak for GER -->
    <rect x="530" y="80" width="40" height="40" fill="#5dade2" stroke="#fff"/>

    <!-- France Row (Light Blues) -->
    <rect x="130" y="130" width="40" height="40" fill="#d4e6f1" stroke="#fff"/>
    <rect x="230" y="130" width="40" height="40" fill="#eaf2f8" stroke="#fff"/>
    <rect x="430" y="130" width="40" height="40" fill="#5dade2" stroke="#fff"/>
    <rect x="530" y="130" width="40" height="40" fill="#85c1e9" stroke="#fff"/>

    <!-- EIRE Row (Intermittent) -->
    <rect x="130" y="180" width="40" height="40" fill="#eaf2f8" stroke="#fff"/>
    <rect x="230" y="180" width="40" height="40" fill="#f8f9fa" stroke="#fff"/> <!-- Zero -->
    <rect x="430" y="180" width="40" height="40" fill="#aed6f1" stroke="#fff"/>
    <rect x="530" y="180" width="40" height="40" fill="#d4e6f1" stroke="#fff"/>

    <!-- Color Bar / Legend -->
    <defs>
      <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#154360;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#5dade2;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect x="620" y="30" width="20" height="190" fill="url(#grad1)" stroke="#bdc3c7"/>
    <text x="650" y="40" font-family="Arial" font-size="12" fill="#2c3e50">High Sales</text>
    <text x="650" y="215" font-family="Arial" font-size="12" fill="#7f8c8d">Low (0)</text>

    <!-- Callout -->
    <path d="M110,40 L90,40 L90,10" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <rect x="0" y="-15" width="110" height="30" fill="#fdedec" rx="5"/>
    <text x="55" y="0" font-family="Arial" font-size="10" fill="#c0392b" font-weight="bold" text-anchor="middle">영국(UK) 매출 압도적</text>

  </g>

  <rect x="150" y="340" width="500" height="40" fill="#fff" stroke="#bdc3c7" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">"Pivot으로 데이터를 2차원 매트릭스로 만들고, Heatmap으로 패턴을 읽는다"</text>

</svg>
