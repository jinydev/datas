<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 회귀선이 포함된 산점도 (sns.regplot)</text>

  <!-- Regplot Concept -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">기온(Temp)과 자전거 대여량(Count)의 양(+)의 상관관계</text>
    
    <!-- Axes -->
    <line x1="50" y1="240" x2="450" y2="240" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="240" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Temp (기온 °C)</text>
    <text x="20" y="145" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,145)">Count (대여량)</text>

    <!-- Scatter Dots (Randomly scattered but upward trend) -->
    <!-- Low temp -->
    <circle cx="100" cy="200" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="120" cy="180" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="110" cy="220" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="140" cy="190" r="4" fill="#3498db" opacity="0.6"/>
    
    <!-- Mid temp -->
    <circle cx="200" cy="160" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="220" cy="120" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="250" cy="170" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="270" cy="130" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="280" cy="150" r="4" fill="#3498db" opacity="0.6"/>

    <!-- High temp -->
    <circle cx="340" cy="100" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="360" cy="80" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="380" cy="110" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="400" cy="70" r="4" fill="#3498db" opacity="0.6"/>
    <circle cx="420" cy="90" r="4" fill="#3498db" opacity="0.6"/>

    <!-- Regression Line -->
    <path d="M70,220 L430,60" fill="none" stroke="#e74c3c" stroke-width="4"/>
    
    <!-- Confidence Interval (Shadow) -->
    <path d="M70,230 L430,80 L430,40 L70,210 Z" fill="#e74c3c" opacity="0.1"/>

    <!-- Annotations -->
    <rect x="250" y="200" width="180" height="30" fill="#fdedec" rx="5"/>
    <text x="340" y="220" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">뚜렷한 우상향 회귀선</text>
    
    <path d="M250,215 L215,215 L215,185" fill="none" stroke="#c0392b" stroke-width="2"/>
    <polygon points="215,185 210,195 220,195" fill="#c0392b"/>

    <text x="120" y="70" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">"온도가 1도 오를 때마다</text>
    <text x="120" y="85" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">자전거 대여량도 증가한다"</text>

  </g>
</svg>
