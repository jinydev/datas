<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: MultiIndex 슬라이싱과 상관행렬 생성</text>

  <!-- Problem (Messy MultiIndex) -->
  <g transform="translate(50, 100)">
    <rect width="250" height="200" fill="#fff" stroke="#9b59b6" stroke-width="2" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#8e44ad" font-weight="bold" text-anchor="middle">원본 (MultiIndex 열)</text>
    
    <text x="20" y="70" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold">Level 0: network</text>
    <text x="20" y="90" font-family="Courier" font-size="12" fill="#3498db" font-weight="bold">Level 1: node</text>
    <text x="20" y="110" font-family="Courier" font-size="12" fill="#34495e">Level 2: hemi</text>

    <text x="125" y="160" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">컬럼이 너무 복잡해서</text>
    <text x="125" y="180" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">그대로 다루기가 힘듦</text>
  </g>

  <!-- Transformation -->
  <g transform="translate(320, 170)">
    <path d="M0,0 L50,0 L40,-10 M50,0 L40,10" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="25" y="-30" font-family="Courier" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">.corr()</text>
    <text x="25" y="-10" font-family="Courier" font-size="12" fill="#e74c3c" font-weight="bold" text-anchor="middle">.loc[ ]</text>
  </g>

  <!-- Solution (Correlation Matrix) -->
  <g transform="translate(400, 100)">
    <rect width="350" height="200" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="175" y="30" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">상관관계 행렬 (Correlation Matrix)</text>
    
    <!-- Matrix Graphic -->
    <rect x="70" y="60" width="220" height="110" fill="none" stroke="#bdc3c7"/>
    
    <!-- Diagonal -->
    <rect x="70" y="60" width="55" height="27" fill="#e74c3c"/>
    <rect x="125" y="87" width="55" height="27" fill="#e74c3c"/>
    <rect x="180" y="114" width="55" height="27" fill="#e74c3c"/>
    <rect x="235" y="141" width="55" height="27" fill="#e74c3c"/>
    
    <text x="97" y="77" font-family="Courier" font-size="12" fill="#fff" font-weight="bold">1.0</text>
    <text x="152" y="104" font-family="Courier" font-size="12" fill="#fff" font-weight="bold">1.0</text>
    <text x="207" y="131" font-family="Courier" font-size="12" fill="#fff" font-weight="bold">1.0</text>
    <text x="262" y="158" font-family="Courier" font-size="12" fill="#fff" font-weight="bold">1.0</text>

    <!-- Off diagonal values -->
    <text x="152" y="77" font-family="Courier" font-size="12" fill="#3498db">-.8</text>
    <text x="207" y="77" font-family="Courier" font-size="12" fill="#e67e22">0.5</text>
    <text x="97" y="104" font-family="Courier" font-size="12" fill="#3498db">-.8</text>

    <text x="175" y="190" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">각 노드끼리 얼마나 유사하게 움직이는지 계산 (1.0 = 완벽 일치)</text>
  </g>

</svg>
