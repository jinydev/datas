<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 기호('?')로 위장한 결측치 색출 및 필터링</text>

  <!-- Normal DataFrame (With disguised missing values) -->
  <g transform="translate(60, 100)">
    <rect width="260" height="220" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="260" height="30" fill="#34495e" rx="5"/>
    <text x="130" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">workclass (직업군 데이터)</text>
    
    <line x1="0" y1="60" x2="260" y2="60" stroke="#ecf0f1"/>
    <line x1="0" y1="90" x2="260" y2="90" stroke="#ecf0f1"/>
    <line x1="0" y1="120" x2="260" y2="120" stroke="#ecf0f1"/>
    <line x1="0" y1="150" x2="260" y2="150" stroke="#ecf0f1"/>
    
    <text x="20" y="50" font-family="Courier" font-size="14" fill="#2c3e50">0</text>
    <text x="100" y="50" font-family="Arial" font-size="14" fill="#2980b9">Private</text>
    
    <text x="20" y="80" font-family="Courier" font-size="14" fill="#2c3e50">1</text>
    <text x="100" y="80" font-family="Arial" font-size="14" fill="#2980b9">Local-gov</text>
    
    <text x="20" y="110" font-family="Courier" font-size="14" fill="#2c3e50">2</text>
    <!-- The Imposter -->
    <rect x="90" y="95" width="40" height="20" fill="#fdedec" stroke="#e74c3c"/>
    <text x="110" y="110" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">?</text>
    
    <text x="20" y="140" font-family="Courier" font-size="14" fill="#2c3e50">3</text>
    <text x="100" y="140" font-family="Arial" font-size="14" fill="#2980b9">Self-emp</text>

    <!-- The Imposter 2 -->
    <text x="20" y="170" font-family="Courier" font-size="14" fill="#2c3e50">4</text>
    <rect x="90" y="155" width="40" height="20" fill="#fdedec" stroke="#e74c3c"/>
    <text x="110" y="170" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">?</text>

    <text x="130" y="200" font-family="Arial" font-size="11" fill="#7f8c8d" text-anchor="middle">info() 曰: "결측치(NaN) 0개인데요?"</text>
  </g>

  <!-- Filter Process -->
  <g transform="translate(340, 190)">
    <path d="M0,20 L60,20 M50,10 L60,20 L50,30" fill="none" stroke="#27ae60" stroke-width="4"/>
    <text x="30" y="-10" font-family="Courier" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">df[df != '?']</text>
    <text x="30" y="10" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">스파이 색출</text>
  </g>

  <!-- Clean DataFrame -->
  <g transform="translate(420, 120)">
    <rect width="260" height="150" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="260" height="30" fill="#27ae60" rx="5"/>
    <text x="130" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">정제된 데이터 (Cleaned)</text>
    
    <text x="20" y="60" font-family="Courier" font-size="14" fill="#2c3e50">0</text>
    <text x="100" y="60" font-family="Arial" font-size="14" fill="#27ae60">Private</text>
    
    <text x="20" y="90" font-family="Courier" font-size="14" fill="#2c3e50">1</text>
    <text x="100" y="90" font-family="Arial" font-size="14" fill="#27ae60">Local-gov</text>
    
    <text x="20" y="120" font-family="Courier" font-size="14" fill="#2c3e50">3</text>
    <text x="100" y="120" font-family="Arial" font-size="14" fill="#27ae60">Self-emp</text>

    <!-- Note -->
    <rect x="160" y="80" width="110" height="40" fill="#f8f9fa" stroke="#bdc3c7" rx="5" transform="rotate(-5 215,100)"/>
    <text x="215" y="95" font-family="Arial" font-size="10" fill="#c0392b" font-weight="bold" text-anchor="middle">? 데이터 행</text>
    <text x="215" y="110" font-family="Arial" font-size="10" fill="#c0392b" font-weight="bold" text-anchor="middle">완전 삭제됨!</text>
  </g>

  <rect x="150" y="340" width="500" height="40" fill="#fcf3cf" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#d35400" font-weight="bold" text-anchor="middle">결측치는 반드시 'NaN' 형태로만 존재하는 것이 아니다!</text>

</svg>
