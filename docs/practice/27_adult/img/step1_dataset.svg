<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 성인 인구조사(Adult Census Income) 데이터 구조</text>

  <!-- Input Features (Socioeconomic) -->
  <g transform="translate(100, 100)">
    
    <rect x="0" y="0" width="220" height="200" fill="#eaf2f8" stroke="#3498db" stroke-width="2" rx="10"/>
    
    <!-- Profile Icon -->
    <circle cx="110" cy="50" r="20" fill="#3498db"/>
    <path d="M70,110 C70,80 150,80 150,110 Z" fill="#3498db"/>
    
    <!-- Badges / Info -->
    <rect x="30" y="120" width="70" height="20" fill="#f1c40f" rx="3"/>
    <text x="65" y="134" font-family="Arial" font-size="10" fill="#2c3e50" font-weight="bold" text-anchor="middle">Bachelors</text>
    
    <rect x="120" y="120" width="70" height="20" fill="#2ecc71" rx="3"/>
    <text x="155" y="134" font-family="Arial" font-size="10" fill="#2c3e50" font-weight="bold" text-anchor="middle">40 hrs/wk</text>

    <!-- Text descriptors -->
    <text x="110" y="160" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">education (학력)</text>
    <text x="110" y="180" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">hours.per.week (근로시간)</text>
  </g>

  <!-- Prediction Arrow -->
  <g transform="translate(350, 170)">
    <path d="M0,20 L60,20 M50,10 L60,20 L50,30" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="30" y="10" font-family="Arial" font-size="12" fill="#7f8c8d" font-weight="bold" text-anchor="middle">소득 예측</text>
  </g>

  <!-- Target Variable Concept -->
  <g transform="translate(450, 100)">
    
    <rect x="0" y="0" width="220" height="200" fill="#fcf3cf" stroke="#f39c12" stroke-width="2" rx="10"/>
    
    <!-- Money/Income Icon -->
    <circle cx="110" cy="70" r="35" fill="#f1c40f" stroke="#f39c12" stroke-width="3"/>
    <text x="110" y="80" font-family="Arial" font-size="30" fill="#d35400" font-weight="bold" text-anchor="middle">$</text>
    
    <text x="110" y="140" font-family="Courier" font-size="16" fill="#d35400" font-weight="bold" text-anchor="middle">income (연 소득)</text>
    
    <!-- Binary Results -->
    <rect x="30" y="155" width="70" height="25" fill="#fff" stroke="#3498db" rx="5"/>
    <text x="65" y="172" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold" text-anchor="middle">&lt;=50K</text>
    
    <rect x="120" y="155" width="70" height="25" fill="#fff" stroke="#e74c3c" rx="5"/>
    <text x="155" y="172" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">&gt;50K</text>
  </g>

  <rect x="150" y="340" width="500" height="40" fill="#fff" stroke="#bdc3c7" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">"이 사람의 학력과 근로시간을 보면 연봉 6천만원을 넘을지 알 수 있다"</text>

</svg>
