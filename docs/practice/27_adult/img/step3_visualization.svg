<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 법정 근로시간의 극단적 쏠림 현상 (Histplot Spike)</text>

  <!-- Histplot construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">주당 근로시간(hours.per.week) 히스토그램</text>
    
    <!-- Axes -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="250" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Hours Per Week (근로 시간)</text>
    <text x="20" y="150" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,150)">사람 수 (명)</text>
    
    <!-- Ticks -->
    <text x="100" y="265" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">20</text>
    <text x="200" y="265" font-family="Arial" font-size="10" fill="#e74c3c" font-weight="bold" text-anchor="middle">40</text>
    <text x="300" y="265" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">60</text>
    <text x="400" y="265" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">80</text>

    <!-- Histogram Bars -->
    <!-- Part time -->
    <rect x="70" y="230" width="10" height="20" fill="#1abc9c"/>
    <rect x="95" y="210" width="10" height="40" fill="#1abc9c"/>
    <rect x="120" y="220" width="10" height="30" fill="#1abc9c"/>
    <rect x="145" y="200" width="10" height="50" fill="#1abc9c"/>
    
    <!-- The 40 Hour Spike -->
    <rect x="170" y="180" width="10" height="70" fill="#1abc9c"/>
    <rect x="195" y="50" width="10" height="200" fill="#16a085"/> <!-- Spike -->
    <rect x="220" y="160" width="10" height="90" fill="#1abc9c"/>
    
    <!-- Overtime -->
    <rect x="245" y="190" width="10" height="60" fill="#1abc9c"/>
    <rect x="270" y="210" width="10" height="40" fill="#1abc9c"/>
    <rect x="295" y="180" width="10" height="70" fill="#1abc9c"/> <!-- 60 hour peak -->
    <rect x="320" y="230" width="10" height="20" fill="#1abc9c"/>
    
    <!-- Extreme Workaholic -->
    <rect x="395" y="240" width="10" height="10" fill="#1abc9c"/>

    <!-- Annotations -->
    <path d="M220,70 L260,70" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <rect x="260" y="50" width="150" height="40" fill="#fdedec" rx="5"/>
    <text x="335" y="65" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold" text-anchor="middle">비정상적인 거대한 봉우리</text>
    <text x="335" y="80" font-family="Arial" font-size="10" fill="#34495e" text-anchor="middle">미국 법정 주 40시간 기준 때문</text>

    <!-- Normal Distribution vs Reality -->
    <path d="M70,250 Q200,-50 350,250" fill="none" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="330" y="140" font-family="Arial" font-size="10" fill="#7f8c8d">이론적인 정규 분포</text>

  </g>
</svg>
