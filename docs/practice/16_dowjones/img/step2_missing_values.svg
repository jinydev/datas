<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 이동 평균(Moving Average)으로 노이즈 제거하기</text>

  <!-- Raw Data (Noisy) -->
  <g transform="translate(50, 100)">
    <rect width="320" height="200" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="160" y="30" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">원본 데이터 (단기적 변동성/노이즈)</text>
    
    <line x1="20" y1="160" x2="300" y2="160" stroke="#7f8c8d" stroke-width="2"/>
    
    <path d="M30,150 L40,110 L50,160 L60,100 L70,140 L80,90 L90,130 L100,80 L110,140 L120,70 L130,120 L140,60 L150,110 L160,50 L170,100 L180,60 L190,110 L200,70 L210,120 L220,80 L230,130 L240,90 L250,140 L260,100 L270,160 L280,110" fill="none" stroke="#e74c3c" stroke-width="2"/>
    
    <text x="160" y="190" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">매일매일 출렁여서 '장기적인 추세'가 안 보임</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(390, 180)">
    <path d="M0,0 L20,0 M10,-10 L20,0 L10,10" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="10" y="-30" font-family="Courier" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">.rolling()</text>
    <text x="10" y="-15" font-family="Courier" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">.mean()</text>
  </g>

  <!-- Smoothed Data (Moving Average) -->
  <g transform="translate(430, 100)">
    <rect width="320" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="160" y="30" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">이동 평균선 (장기적 추세 확인)</text>
    
    <line x1="20" y1="160" x2="300" y2="160" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Faint original line -->
    <path d="M30,150 L40,110 L50,160 L60,100 L70,140 L80,90 L90,130 L100,80 L110,140 L120,70 L130,120 L140,60 L150,110 L160,50 L170,100 L180,60 L190,110 L200,70 L210,120 L220,80 L230,130 L240,90 L250,140 L260,100 L270,160 L280,110" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.3"/>
    
    <!-- Smoothed line -->
    <path d="M45,130 Q90,100 135,90 T225,100 T265,120" fill="none" stroke="#27ae60" stroke-width="5"/>
    
    <!-- Highlight Window -->
    <rect x="70" y="70" width="60" height="90" fill="#f1c40f" opacity="0.2"/>
    <path d="M100,70 L100,50 L140,50" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="200" y="55" font-family="Arial" font-size="12" fill="#d35400" font-weight="bold" text-anchor="middle">N일 동안의 데이터 평균치</text>

    <text x="160" y="190" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">잔파도(Noise)를 깎아내고 큰 흐름(Trend)만 남김</text>
  </g>

</svg>
