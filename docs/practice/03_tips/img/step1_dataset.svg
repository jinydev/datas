<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 레스토랑 영수증(Tips) 데이터 구조 이해</text>

  <!-- Receipt Metaphor -->
  <g transform="translate(150, 80)">
    <!-- Receipt Paper -->
    <rect x="0" y="0" width="200" height="280" fill="#fff" stroke="#bdc3c7" stroke-width="2"/>
    <path d="M0,280 L10,270 L20,280 L30,270 L40,280 L50,270 L60,280 L70,270 L80,280 L90,270 L100,280 L110,270 L120,280 L130,270 L140,280 L150,270 L160,280 L170,270 L180,280 L190,270 L200,280" fill="none" stroke="#bdc3c7" stroke-width="2"/>
    
    <text x="100" y="30" font-family="Courier" font-size="18" fill="#2c3e50" font-weight="bold" text-anchor="middle">GUEST CHECK</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#7f8c8d" stroke-dasharray="4,4"/>
    
    <!-- Info -->
    <text x="20" y="60" font-family="Courier" font-size="14" fill="#34495e">Day  : Sun</text>
    <text x="20" y="80" font-family="Courier" font-size="14" fill="#34495e">Time : Dinner</text>
    <text x="20" y="100" font-family="Courier" font-size="14" fill="#34495e">Size : 3 persons</text>
    <line x1="20" y1="110" x2="180" y2="110" stroke="#7f8c8d" stroke-dasharray="4,4"/>
    
    <!-- Customer -->
    <text x="20" y="130" font-family="Courier" font-size="14" fill="#34495e">Sex  : Male</text>
    <text x="20" y="150" font-family="Courier" font-size="14" fill="#34495e">Smoker: No</text>
    <line x1="20" y1="160" x2="180" y2="160" stroke="#7f8c8d" stroke-dasharray="4,4"/>
    
    <!-- Bill &amp; Tip -->
    <text x="20" y="190" font-family="Courier" font-size="16" fill="#2980b9" font-weight="bold">Total Bill: $21.01</text>
    <text x="20" y="220" font-family="Courier" font-size="20" fill="#e74c3c" font-weight="bold">TIP       : $3.50</text>
    
    <line x1="20" y1="240" x2="180" y2="240" stroke="#2c3e50" stroke-width="2"/>
    <text x="100" y="260" font-family="Courier" font-size="12" fill="#7f8c8d" text-anchor="middle">Thank you!</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(420, 80)">
    <rect width="350" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="350" height="40" fill="#e67e22" rx="10"/>
    <rect x="0" y="20" width="350" height="20" fill="#e67e22"/>
    <text x="175" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">피처(Features)와 타겟(Target)</text>

    <!-- Context -->
    <text x="20" y="70" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold">어떤 손님이 팁(Tip)을 후하게 줄까?</text>
    <text x="20" y="90" font-family="Arial" font-size="12" fill="#7f8c8d">영업 데이터 기반 고객 행동 패턴 분석</text>

    <!-- Variables -->
    <rect x="20" y="110" width="310" height="130" fill="#fcf3cf" rx="5"/>
    <text x="30" y="140" font-family="Courier" font-size="14" fill="#d35400" font-weight="bold">Target (Y) : tip</text>
    <text x="190" y="140" font-family="Arial" font-size="12" fill="#7f8c8d">예측할 종속 변수</text>

    <line x1="30" y1="155" x2="310" y2="155" stroke="#f39c12" stroke-dasharray="4,4"/>

    <text x="30" y="180" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold">Features(X): total_bill, size</text>
    <text x="130" y="205" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold">sex, smoker, day, time</text>
    <text x="190" y="225" font-family="Arial" font-size="12" fill="#7f8c8d">분석을 위한 독립 변수</text>
  </g>

</svg>