<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 히스토그램을 통한 우측 꼬리(Right Skewed) 분포 확인</text>

  <!-- KDE Plot Interpretation -->
  <g transform="translate(150, 90)">
    <rect width="500" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">Total Bill (결제 금액) 의 분포 (Histogram + KDE)</text>
    
    <line x1="50" y1="200" x2="450" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="200" x2="50" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="235" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Total Bill ($)</text>
    <text x="20" y="130" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,130)">빈도수 (Count)</text>
    
    <text x="50" y="220" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">0</text>
    <text x="150" y="220" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">15</text>
    <text x="350" y="220" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">50</text>

    <!-- Histogram Bars -->
    <rect x="70" y="150" width="20" height="50" fill="#3498db" opacity="0.6"/>
    <rect x="90" y="100" width="20" height="100" fill="#3498db" opacity="0.6"/>
    <rect x="110" y="60" width="20" height="140" fill="#3498db" opacity="0.6"/>
    <rect x="130" y="80" width="20" height="120" fill="#3498db" opacity="0.6"/>
    <rect x="150" y="120" width="20" height="80" fill="#3498db" opacity="0.6"/>
    <rect x="170" y="140" width="20" height="60" fill="#3498db" opacity="0.6"/>
    <rect x="190" y="160" width="20" height="40" fill="#3498db" opacity="0.6"/>
    <rect x="210" y="170" width="20" height="30" fill="#3498db" opacity="0.6"/>
    <rect x="230" y="180" width="20" height="20" fill="#3498db" opacity="0.6"/>
    <rect x="250" y="185" width="20" height="15" fill="#3498db" opacity="0.6"/>
    <rect x="290" y="190" width="20" height="10" fill="#3498db" opacity="0.6"/>
    <rect x="330" y="195" width="20" height="5" fill="#3498db" opacity="0.6"/>

    <!-- KDE Curve -->
    <path d="M50,200 Q120,0 200,160 T400,200" fill="none" stroke="#e74c3c" stroke-width="3"/>

    <!-- Annotations -->
    <line x1="120" y1="40" x2="120" y2="200" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="120" y="30" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">대부분의 고객 ($15~$20)</text>

    <path d="M350,180 Q320,150 250,160" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <polygon points="250,160 260,155 255,165" fill="#2c3e50"/>
    <text x="350" y="140" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">Long Tail (소수의 큰손들)</text>

  </g>

</svg>