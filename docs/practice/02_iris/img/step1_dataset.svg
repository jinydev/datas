<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 붓꽃(Iris) 데이터 구조의 이해 (형태학적 피처)</text>

  <!-- Flower Metaphor -->
  <g transform="translate(150, 150)">
    <!-- Stem -->
    <rect x="-5" y="50" width="10" height="120" fill="#27ae60"/>
    
    <!-- Sepal (꽃받침) - Larger, darker -->
    <path d="M0,50 Q-80,0 0,-30 Q80,0 0,50 Z" fill="#2ecc71" opacity="0.8"/>
    <path d="M0,50 Q-100,50 -50,100 Q0,50 0,50 Z" fill="#2ecc71" opacity="0.8"/>
    <path d="M0,50 Q100,50 50,100 Q0,50 0,50 Z" fill="#2ecc71" opacity="0.8"/>

    <!-- Petal (꽃잎) - Smaller, colorful -->
    <path d="M0,40 Q-40,-20 0,-60 Q40,-20 0,40 Z" fill="#9b59b6"/>
    <path d="M0,40 Q-60,40 -30,80 Q0,40 0,40 Z" fill="#9b59b6"/>
    <path d="M0,40 Q60,40 30,80 Q0,40 0,40 Z" fill="#9b59b6"/>
    
    <!-- Measurements -->
    <line x1="20" y1="-60" x2="60" y2="-60" stroke="#8e44ad" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="20" y1="40" x2="60" y2="40" stroke="#8e44ad" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="40" y1="-60" x2="40" y2="40" stroke="#8e44ad" stroke-width="2"/>
    <text x="50" y="-10" font-family="Arial" font-size="14" fill="#8e44ad" font-weight="bold">Petal Length</text>
    
    <line x1="-100" y1="80" x2="-50" y2="100" stroke="#27ae60" stroke-width="2"/>
    <text x="-160" y="80" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold">Sepal Width</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(420, 80)">
    <rect width="350" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="350" height="40" fill="#9b59b6" rx="10"/>
    <rect x="0" y="20" width="350" height="20" fill="#9b59b6"/>
    <text x="175" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">피처(Features)와 타겟(Target)</text>

    <!-- Features -->
    <rect x="20" y="60" width="200" height="180" fill="#f4ecf7" rx="5"/>
    <text x="120" y="80" font-family="Arial" font-size="14" fill="#8e44ad" font-weight="bold" text-anchor="middle">X (독립 변수)</text>
    
    <text x="30" y="120" font-family="Courier" font-size="12" fill="#2c3e50">• sepal_length (꽃받침 길이)</text>
    <text x="30" y="145" font-family="Courier" font-size="12" fill="#2c3e50">• sepal_width  (꽃받침 너비)</text>
    <text x="30" y="170" font-family="Courier" font-size="12" fill="#2c3e50">• petal_length (꽃잎 길이)</text>
    <text x="30" y="195" font-family="Courier" font-size="12" fill="#2c3e50">• petal_width  (꽃잎 너비)</text>

    <!-- Target -->
    <rect x="230" y="60" width="100" height="180" fill="#ecf0f1" rx="5"/>
    <text x="280" y="80" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">y (종속 변수)</text>
    
    <text x="280" y="130" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">species</text>
    <text x="280" y="160" font-family="Arial" font-size="12" fill="#e74c3c" font-weight="bold" text-anchor="middle">setosa</text>
    <text x="280" y="180" font-family="Arial" font-size="12" fill="#f39c12" font-weight="bold" text-anchor="middle">versicolor</text>
    <text x="280" y="200" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">virginica</text>
  </g>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#8e44ad" font-weight="bold" text-anchor="middle">"단 4개의 측정값만으로 기계가 꽃의 품종을 스스로 분류해 낼 수 있을까?"</text>
</svg>