<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 다변수 산점도와 군집화 (Scatterplot Clustering)</text>

  <!-- Scatterplot -->
  <g transform="translate(150, 80)">
    <rect width="500" height="280" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">Petal Length (X축) vs Petal Width (Y축) 의 2차원 매핑</text>
    
    <line x1="50" y1="230" x2="450" y2="230" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="230" x2="50" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="265" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Petal Length (X)</text>
    <text x="20" y="145" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,145)">Petal Width (Y)</text>

    <!-- Cluster 1: Setosa -->
    <circle cx="100" cy="180" r="4" fill="#e74c3c"/>
    <circle cx="110" cy="190" r="4" fill="#e74c3c"/>
    <circle cx="90" cy="200" r="4" fill="#e74c3c"/>
    <circle cx="120" cy="170" r="4" fill="#e74c3c"/>
    <circle cx="100" cy="210" r="4" fill="#e74c3c"/>
    <ellipse cx="105" cy="190" rx="30" ry="30" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="105" y="145" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">Setosa (완벽 군집)</text>

    <!-- Cluster 2: Versicolor -->
    <circle cx="250" cy="140" r="4" fill="#3498db"/>
    <circle cx="270" cy="130" r="4" fill="#3498db"/>
    <circle cx="260" cy="150" r="4" fill="#3498db"/>
    <circle cx="240" cy="120" r="4" fill="#3498db"/>
    <circle cx="280" cy="140" r="4" fill="#3498db"/>
    <ellipse cx="260" cy="135" rx="35" ry="30" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="260" y="95" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold" text-anchor="middle">Versicolor</text>

    <!-- Cluster 3: Virginica -->
    <circle cx="370" cy="90" r="4" fill="#2ecc71"/>
    <circle cx="390" cy="80" r="4" fill="#2ecc71"/>
    <circle cx="380" cy="100" r="4" fill="#2ecc71"/>
    <circle cx="360" cy="70" r="4" fill="#2ecc71"/>
    <circle cx="350" cy="110" r="4" fill="#2ecc71"/>
    <!-- Boundary overlap -->
    <circle cx="320" cy="120" r="4" fill="#2ecc71"/> 
    <circle cx="310" cy="130" r="4" fill="#3498db"/> 
    
    <ellipse cx="370" cy="90" rx="40" ry="35" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="370" y="45" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">Virginica</text>

    <text x="320" y="160" font-family="Arial" font-size="10" fill="#f39c12" font-weight="bold">경계선(Decision Boundary)</text>
  </g>
</svg>