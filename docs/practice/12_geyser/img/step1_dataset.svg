<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 간헐천(Geyser) 데이터의 작동 원리</text>

  <!-- Geyser Metaphor -->
  <g transform="translate(80, 80)">
    
    <!-- Waiting phase (Quiet) -->
    <g transform="translate(0, 50)">
      <path d="M20,150 Q60,130 100,150 Q140,170 180,150" fill="none" stroke="#7f8c8d" stroke-width="4"/> <!-- Ground -->
      <path d="M80,150 L80,180 Q100,200 120,180 L120,150" fill="#bdc3c7"/> <!-- Hole -->
      
      <!-- Clock representing waiting time -->
      <circle cx="100" cy="80" r="30" fill="#fff" stroke="#34495e" stroke-width="4"/>
      <line x1="100" y1="80" x2="100" y2="55" stroke="#e74c3c" stroke-width="3"/>
      <line x1="100" y1="80" x2="115" y2="80" stroke="#2c3e50" stroke-width="4"/>
      <circle cx="100" cy="80" r="3" fill="#2c3e50"/>

      <rect x="20" y="200" width="160" height="40" fill="#fcf3cf" rx="5"/>
      <text x="100" y="225" font-family="Courier" font-size="16" fill="#d35400" font-weight="bold" text-anchor="middle">waiting (대기 시간)</text>
    </g>

    <!-- Arrow -->
    <path d="M200,160 L260,160 M250,150 L260,160 L250,170" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="230" y="145" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">폭발!</text>

    <!-- Eruption phase (Active) -->
    <g transform="translate(300, 50)">
      <path d="M20,150 Q60,130 100,150 Q140,170 180,150" fill="none" stroke="#7f8c8d" stroke-width="4"/> <!-- Ground -->
      <path d="M80,150 L80,180 Q100,200 120,180 L120,150" fill="#bdc3c7"/> <!-- Hole -->
      
      <!-- Water Spout -->
      <path d="M90,150 Q80,50 100,10 Q120,50 110,150 Z" fill="#3498db" opacity="0.8"/>
      <circle cx="100" cy="10" r="15" fill="#eaf2f8" opacity="0.9"/>
      <circle cx="85" cy="25" r="10" fill="#eaf2f8" opacity="0.9"/>
      <circle cx="115" cy="30" r="12" fill="#eaf2f8" opacity="0.9"/>
      <circle cx="95" cy="50" r="8" fill="#eaf2f8" opacity="0.9"/>
      <circle cx="105" cy="70" r="10" fill="#eaf2f8" opacity="0.9"/>

      <rect x="20" y="200" width="160" height="40" fill="#eaf2f8" rx="5"/>
      <text x="100" y="225" font-family="Courier" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">duration (분출 시간)</text>
    </g>
  </g>

  <!-- Summary Box -->
  <g transform="translate(560, 100)">
    <rect width="200" height="200" fill="#fff" stroke="#8e44ad" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="200" height="40" fill="#8e44ad" rx="10"/>
    <rect x="0" y="20" width="200" height="20" fill="#8e44ad"/>
    <text x="100" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Features</text>
    
    <text x="20" y="70" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold">• duration (분)</text>
    <text x="20" y="90" font-family="Arial" font-size="11" fill="#7f8c8d">물이 뿜어져 나오는 시간</text>
    
    <text x="20" y="130" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold">• waiting (분)</text>
    <text x="20" y="150" font-family="Arial" font-size="11" fill="#7f8c8d">다음 분출까지 기다리는 시간</text>

    <text x="20" y="180" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold">• kind</text>
    <text x="20" y="195" font-family="Arial" font-size="11" fill="#7f8c8d">짧음(short) vs 긺(long)</text>
  </g>

</svg>
