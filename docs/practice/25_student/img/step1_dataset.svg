<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 학생 성적 예측(Student Performance) 데이터 구조</text>

  <!-- Behavior (Features) -->
  <g transform="translate(100, 100)">
    
    <rect x="0" y="0" width="220" height="220" fill="#eaf2f8" stroke="#3498db" stroke-width="2" rx="10"/>
    
    <!-- Student / Book Icon -->
    <path d="M110,90 L60,110 L110,130 L160,110 Z" fill="#3498db"/>
    <path d="M60,110 L60,140 L110,160 L110,130 Z" fill="#2980b9"/>
    <path d="M160,110 L160,140 L110,160 L110,130 Z" fill="#2471a3"/>
    
    <circle cx="110" cy="50" r="20" fill="#2c3e50"/>
    <path d="M90,90 Q110,70 130,90 L120,110 L100,110 Z" fill="#2c3e50"/>

    <text x="110" y="180" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">studytime (공부 시간)</text>
    <text x="110" y="200" font-family="Courier" font-size="14" fill="#e74c3c" font-weight="bold" text-anchor="middle">failures (낙제 횟수)</text>

  </g>

  <!-- Past Grades (Features) -->
  <g transform="translate(340, 100)">
    
    <rect x="0" y="0" width="160" height="220" fill="#fcf3cf" stroke="#f1c40f" stroke-width="2" rx="10"/>
    
    <!-- Papers Icon -->
    <rect x="50" y="40" width="60" height="80" fill="#fff" stroke="#d4ac0d" stroke-width="2"/>
    <line x1="60" y1="50" x2="100" y2="50" stroke="#d4ac0d" stroke-width="2"/>
    <line x1="60" y1="65" x2="100" y2="65" stroke="#d4ac0d" stroke-width="2"/>
    <text x="80" y="100" font-family="Arial" font-size="20" fill="#e74c3c" font-weight="bold" text-anchor="middle">A+</text>

    <text x="80" y="160" font-family="Courier" font-size="14" fill="#d4ac0d" font-weight="bold" text-anchor="middle">G1 (1학기 성적)</text>
    <text x="80" y="180" font-family="Courier" font-size="14" fill="#d4ac0d" font-weight="bold" text-anchor="middle">G2 (2학기 성적)</text>

  </g>

  <!-- Arrow -->
  <path d="M520,200 L560,200 M550,190 L560,200 L550,210" fill="none" stroke="#2c3e50" stroke-width="4"/>

  <!-- Target Variable (Final Grade) -->
  <g transform="translate(580, 100)">
    
    <rect x="0" y="0" width="160" height="220" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2" rx="10"/>
    
    <!-- Trophy Icon -->
    <path d="M50,50 L110,50 L100,100 L60,100 Z" fill="#f1c40f"/>
    <path d="M40,50 Q20,70 50,80" fill="none" stroke="#f1c40f" stroke-width="5"/>
    <path d="M120,50 Q140,70 110,80" fill="none" stroke="#f1c40f" stroke-width="5"/>
    <rect x="75" y="100" width="10" height="20" fill="#f39c12"/>
    <rect x="60" y="120" width="40" height="15" fill="#f39c12"/>

    <text x="80" y="170" font-family="Courier" font-size="16" fill="#16a085" font-weight="bold" text-anchor="middle">G3</text>
    <text x="80" y="190" font-family="Arial" font-size="12" fill="#16a085" font-weight="bold" text-anchor="middle">(최종 기말 성적)</text>
  </g>

  <rect x="150" y="340" width="500" height="40" fill="#fff" stroke="#bdc3c7" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">"학생의 생활 태도와 과거 성적을 보면 기말고사 점수를 맞출 수 있다!"</text>

</svg>
