<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 히스토그램(Histplot)으로 숨겨진 이상치(0점) 발굴</text>

  <!-- Histplot construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">기말 성적(G3) 분포</text>
    
    <!-- Axes -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="250" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">G3 (0점 ~ 20점)</text>
    <text x="20" y="150" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,150)">학생 수</text>
    
    <!-- Ticks -->
    <text x="60" y="265" font-family="Arial" font-size="10" fill="#e74c3c" font-weight="bold" text-anchor="middle">0</text>
    <text x="160" y="265" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">5</text>
    <text x="260" y="265" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">10</text>
    <text x="360" y="265" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">15</text>
    <text x="440" y="265" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">20</text>

    <!-- Normal Bell Curve Bars (10~15 average) -->
    <rect x="180" y="230" width="15" height="20" fill="#9b59b6"/>
    <rect x="200" y="210" width="15" height="40" fill="#9b59b6"/>
    <rect x="220" y="170" width="15" height="80" fill="#9b59b6"/>
    <rect x="240" y="120" width="15" height="130" fill="#9b59b6"/>
    <rect x="260" y="90" width="15" height="160" fill="#8e44ad"/> <!-- Peak -->
    <rect x="280" y="110" width="15" height="140" fill="#9b59b6"/>
    <rect x="300" y="140" width="15" height="110" fill="#9b59b6"/>
    <rect x="320" y="180" width="15" height="70" fill="#9b59b6"/>
    <rect x="340" y="210" width="15" height="40" fill="#9b59b6"/>
    <rect x="360" y="230" width="15" height="20" fill="#9b59b6"/>
    <rect x="380" y="240" width="15" height="10" fill="#9b59b6"/>

    <!-- KDE Line -->
    <path d="M160,245 Q260,30 380,245" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- The 0-Score Anomaly -->
    <rect x="55" y="170" width="15" height="80" fill="#e74c3c"/>

    <!-- Annotations -->
    <path d="M62,160 L62,120 L100,120" fill="none" stroke="#c0392b" stroke-width="2"/>
    <rect x="100" y="100" width="180" height="40" fill="#fdedec" rx="5"/>
    <text x="190" y="115" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold" text-anchor="middle">비정상적인 0점 막대 그룹</text>
    <text x="190" y="130" font-family="Arial" font-size="10" fill="#34495e" text-anchor="middle">결시자이거나 자퇴생일 가능성 높음</text>

    <text x="260" y="75" font-family="Arial" font-size="11" fill="#8e44ad" font-weight="bold" text-anchor="middle">대부분의 정상적인 학생들</text>

  </g>
</svg>
