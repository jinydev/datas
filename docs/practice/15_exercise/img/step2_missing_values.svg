<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 연속형 변수와 범주형 변수의 차이 (time의 비밀)</text>

  <!-- Problem Context -->
  <g transform="translate(80, 100)">
    <rect width="300" height="200" fill="#fff" stroke="#95a5a6" stroke-width="2" rx="5"/>
    <text x="150" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">time을 단순한 '숫자'로 다룬다면?</text>
    
    <!-- Linear axis -->
    <line x1="30" y1="120" x2="270" y2="120" stroke="#7f8c8d" stroke-width="2"/>
    <circle cx="40" cy="120" r="5" fill="#34495e"/>
    <text x="40" y="145" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">1분</text>
    
    <circle cx="140" cy="120" r="5" fill="#34495e"/>
    <text x="140" y="145" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">15분</text>
    
    <circle cx="260" cy="120" r="5" fill="#34495e"/>
    <text x="260" y="145" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">30분</text>

    <!-- Problem indicator -->
    <line x1="40" y1="110" x2="140" y2="110" stroke="#e74c3c" stroke-width="2"/>
    <text x="90" y="100" font-family="Arial" font-size="10" fill="#c0392b" text-anchor="middle">간격 14</text>

    <line x1="140" y1="110" x2="260" y2="110" stroke="#e74c3c" stroke-width="2"/>
    <text x="200" y="100" font-family="Arial" font-size="10" fill="#c0392b" text-anchor="middle">간격 15</text>

    <text x="150" y="180" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">간격이 일정하지 않아 그래프가 왜곡된다!</text>
  </g>

  <!-- Arrow -->
  <path d="M400,200 L440,200 M430,190 L440,200 L430,210" fill="none" stroke="#2c3e50" stroke-width="4"/>

  <!-- Solution Context -->
  <g transform="translate(460, 100)">
    <rect width="260" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="130" y="30" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">time을 '범주형(Category)'으로!</text>

    <!-- Categorical axis (evenly spaced) -->
    <line x1="30" y1="120" x2="230" y2="120" stroke="#7f8c8d" stroke-width="2"/>
    
    <rect x="40" y="110" width="20" height="20" fill="#2ecc71" rx="3"/>
    <text x="50" y="145" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">T1</text>
    
    <rect x="120" y="110" width="20" height="20" fill="#2ecc71" rx="3"/>
    <text x="130" y="145" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">T2</text>
    
    <rect x="200" y="110" width="20" height="20" fill="#2ecc71" rx="3"/>
    <text x="210" y="145" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">T3</text>

    <!-- Equal spacing -->
    <path d="M50,100 Q90,70 130,100" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="90" y="70" font-family="Arial" font-size="10" fill="#2980b9" text-anchor="middle">동일 간격</text>
    
    <path d="M130,100 Q170,70 210,100" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="170" y="70" font-family="Arial" font-size="10" fill="#2980b9" text-anchor="middle">동일 간격</text>

    <text x="130" y="180" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">pointplot은 X축을 무조건 같은 간격으로 둔다!</text>
  </g>

</svg>
