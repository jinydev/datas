<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 다변수 상호작용 (Interaction Effect) 분석</text>

  <!-- Split plots (Catplot/FacetGrid concept) -->
  <g transform="translate(50, 80)">
    
    <!-- No Fat Diet Panel -->
    <g transform="translate(0, 0)">
      <rect width="320" height="260" fill="#fff" stroke="#f39c12" stroke-width="2" rx="5"/>
      <rect x="0" y="0" width="320" height="30" fill="#f39c12" rx="5"/>
      <rect x="0" y="15" width="320" height="15" fill="#f39c12"/>
      <text x="160" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">식단: No Fat (지방 섭취 안 함)</text>
      
      <!-- Axis -->
      <line x1="40" y1="230" x2="280" y2="230" stroke="#7f8c8d" stroke-width="2"/>
      <line x1="40" y1="230" x2="40" y2="50" stroke="#7f8c8d" stroke-width="2"/>
      <text x="160" y="250" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">Time (1, 15, 30)</text>
      
      <!-- Run Line (High spike) -->
      <path d="M80,180 L160,100 L240,50" fill="none" stroke="#c0392b" stroke-width="3"/>
      <circle cx="80" cy="180" r="4" fill="#c0392b"/>
      <circle cx="160" cy="100" r="4" fill="#c0392b"/>
      <circle cx="240" cy="50" r="4" fill="#c0392b"/>
      <!-- Error bars wide (High uncertainty) -->
      <line x1="240" y1="20" x2="240" y2="80" stroke="#c0392b" stroke-width="1"/>
      <text x="270" y="55" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">run</text>
      
      <text x="160" y="80" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">심박수 폭발!</text>
    </g>

    <text x="350" y="160" font-family="Arial" font-size="20" fill="#34495e" font-weight="bold" text-anchor="middle">VS</text>

    <!-- Low Fat Diet Panel -->
    <g transform="translate(380, 0)">
      <rect width="320" height="260" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
      <rect x="0" y="0" width="320" height="30" fill="#27ae60" rx="5"/>
      <rect x="0" y="15" width="320" height="15" fill="#27ae60"/>
      <text x="160" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">식단: Low Fat (저지방 섭취)</text>
      
      <!-- Axis -->
      <line x1="40" y1="230" x2="280" y2="230" stroke="#7f8c8d" stroke-width="2"/>
      <line x1="40" y1="230" x2="40" y2="50" stroke="#7f8c8d" stroke-width="2"/>
      <text x="160" y="250" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">Time (1, 15, 30)</text>
      
      <!-- Run Line (Lower spike) -->
      <path d="M80,185 L160,120 L240,90" fill="none" stroke="#c0392b" stroke-width="3"/>
      <circle cx="80" cy="185" r="4" fill="#c0392b"/>
      <circle cx="160" cy="120" r="4" fill="#c0392b"/>
      <circle cx="240" cy="90" r="4" fill="#c0392b"/>
      <!-- Error bars narrow (Low uncertainty) -->
      <line x1="240" y1="70" x2="240" y2="110" stroke="#c0392b" stroke-width="1"/>
      <text x="270" y="95" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">run</text>

      <text x="160" y="70" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">안정적인 심박수 유지</text>
    </g>

  </g>

  <rect x="150" y="350" width="500" height="40" fill="#eaf2f8" rx="5"/>
  <text x="400" y="375" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">결론: "지방을 조금 섭취한 그룹이, 격렬한 운동 시 심장이 덜 무리한다!"</text>

</svg>
