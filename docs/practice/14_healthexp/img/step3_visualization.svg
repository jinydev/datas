<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 시간에 따른 의료비 지출 폭증 (Lineplot)</text>

  <!-- Lineplot construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">미국의 의료비 지출액은 다른 나라와 무엇이 다를까?</text>
    
    <!-- Axes -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="250" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="285" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Year (연도)</text>
    <text x="20" y="150" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,150)">Spending_USD (의료비)</text>

    <!-- Normal Countries (Europe, Japan) -->
    <path d="M50,240 Q150,230 250,200 Q350,150 450,120" fill="none" stroke="#95a5a6" stroke-width="3"/>
    <path d="M50,245 Q150,235 250,210 Q350,170 450,140" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    <path d="M50,235 Q150,225 250,190 Q350,140 450,100" fill="none" stroke="#2980b9" stroke-width="3"/>
    
    <text x="460" y="125" font-family="Arial" font-size="12" fill="#34495e">유럽/일본</text>

    <!-- USA (Exponential) -->
    <path d="M50,240 Q150,230 250,180 Q350,100 450,30" fill="none" stroke="#e74c3c" stroke-width="5"/>
    <text x="460" y="35" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold">USA</text>

    <!-- Callout Box -->
    <rect x="70" y="50" width="180" height="70" fill="#fdedec" stroke="#c0392b" rx="5"/>
    <text x="160" y="75" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">압도적인 기울기 차이!</text>
    <text x="160" y="95" font-family="Arial" font-size="12" fill="#c0392b" text-anchor="middle">미국은 90년대 이후로</text>
    <text x="160" y="110" font-family="Arial" font-size="12" fill="#c0392b" text-anchor="middle">의료비가 우주로 뚫고 나감</text>

  </g>
</svg>
