<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 막대 그래프(Barplot)와 데이터 정렬(Sorting)의 힘</text>

  <!-- Problem (Unsorted) -->
  <g transform="translate(50, 100)">
    <rect width="250" height="220" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">알파벳 순서 (Unsorted)</text>
    
    <!-- Bars -->
    <rect x="50" y="60" width="20" height="80" fill="#34495e"/>
    <rect x="80" y="60" width="20" height="140" fill="#34495e"/>
    <rect x="110" y="60" width="20" height="50" fill="#34495e"/>
    <rect x="140" y="60" width="20" height="110" fill="#34495e"/>
    <rect x="170" y="60" width="20" height="90" fill="#34495e"/>
    <rect x="200" y="60" width="20" height="150" fill="#34495e"/>
    
    <line x1="30" y1="60" x2="230" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="60" y="160" font-family="Courier" font-size="12" fill="#7f8c8d" transform="rotate(-90 60,160)">AL</text>
    <text x="90" y="220" font-family="Courier" font-size="12" fill="#7f8c8d" transform="rotate(-90 90,220)">AK</text>
    <text x="120" y="130" font-family="Courier" font-size="12" fill="#7f8c8d" transform="rotate(-90 120,130)">AZ</text>
    <text x="150" y="190" font-family="Courier" font-size="12" fill="#7f8c8d" transform="rotate(-90 150,190)">AR</text>
    
    <text x="125" y="200" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">"누가 가장 높은지 한눈에 알 수 없다"</text>
  </g>

  <!-- Transformation -->
  <g transform="translate(320, 190)">
    <path d="M0,0 L50,0 L40,-10 M50,0 L40,10" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="25" y="-30" font-family="Courier" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">sort_values()</text>
    <text x="25" y="-10" font-family="Courier" font-size="12" fill="#e74c3c" font-weight="bold" text-anchor="middle">ascending=False</text>
  </g>

  <!-- Solution (Sorted) -->
  <g transform="translate(400, 100)">
    <rect width="350" height="220" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="175" y="30" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">값에 따른 내림차순 정렬 (Sorted)</text>
    
    <!-- Bars -->
    <rect x="50" y="60" width="20" height="150" fill="#c0392b"/> <!-- Highest -->
    <rect x="80" y="60" width="20" height="140" fill="#e74c3c"/>
    <rect x="110" y="60" width="20" height="110" fill="#e67e22"/>
    <rect x="140" y="60" width="20" height="90" fill="#f39c12"/>
    <rect x="170" y="60" width="20" height="80" fill="#f1c40f"/>
    <rect x="200" y="60" width="20" height="50" fill="#fcf3cf"/>
    <rect x="230" y="60" width="20" height="30" fill="#ecf0f1"/>
    
    <line x1="30" y1="60" x2="260" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="60" y="230" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold" transform="rotate(-90 60,230)">SC (최악)</text>
    <text x="240" y="110" font-family="Courier" font-size="12" fill="#7f8c8d" transform="rotate(-90 240,110)">DC (최상)</text>

    <text x="175" y="200" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">순위(Rank)와 트렌드가 직관적으로 보인다!</text>
  </g>
</svg>