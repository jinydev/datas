<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 다중 변수 시각화 (Multivariate Analysis)</text>

  <!-- Barplot (Survival by Sex) -->
  <g transform="translate(100, 100)">
    <rect width="250" height="220" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#34495e" text-anchor="middle">성별에 따른 생존율 (Barplot)</text>
    
    <!-- Chart axes -->
    <line x1="40" y1="180" x2="220" y2="180" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="40" y1="180" x2="40" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Bars -->
    <rect x="70" y="140" width="40" height="40" fill="#3498db"/> <!-- Male survival ~ 20% -->
    <!-- Error bar -->
    <line x1="90" y1="130" x2="90" y2="150" stroke="#2c3e50" stroke-width="2"/>
    <line x1="85" y1="130" x2="95" y2="130" stroke="#2c3e50" stroke-width="2"/>
    
    <text x="90" y="200" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle">Male</text>
    
    <rect x="140" y="70" width="40" height="110" fill="#e74c3c"/> <!-- Female survival ~ 75% -->
    <!-- Error bar -->
    <line x1="160" y1="60" x2="160" y2="80" stroke="#2c3e50" stroke-width="2"/>
    <line x1="155" y1="60" x2="165" y2="60" stroke="#2c3e50" stroke-width="2"/>
    
    <text x="160" y="200" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle">Female</text>
  </g>

  <!-- Heatmap (Correlation) -->
  <g transform="translate(450, 100)">
    <rect width="250" height="220" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#34495e" text-anchor="middle">상관관계 분석 (Heatmap)</text>
    
    <!-- Grid -->
    <g transform="translate(60, 60)">
      <rect x="0" y="0" width="40" height="40" fill="#e74c3c"/>
      <rect x="40" y="0" width="40" height="40" fill="#fadbd8"/>
      <rect x="80" y="0" width="40" height="40" fill="#f5b7b1"/>
      
      <rect x="0" y="40" width="40" height="40" fill="#fadbd8"/>
      <rect x="40" y="40" width="40" height="40" fill="#e74c3c"/>
      <rect x="80" y="40" width="40" height="40" fill="#fdf2e9"/>
      
      <rect x="0" y="80" width="40" height="40" fill="#f5b7b1"/>
      <rect x="40" y="80" width="40" height="40" fill="#fdf2e9"/>
      <rect x="80" y="80" width="40" height="40" fill="#e74c3c"/>
    </g>
    
    <text x="40" y="85" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="end">Age</text>
    <text x="40" y="125" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="end">Fare</text>
    <text x="40" y="165" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="end">Surv.</text>
    
  </g>

</svg>
