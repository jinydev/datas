<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 막대그래프로 집단 간 생존율 비교 (Barplot &amp; Countplot)</text>

  <!-- Left: Countplot (Absolute numbers) -->
  <g transform="translate(80, 100)">
    <rect width="300" height="240" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="150" y="30" font-family="Arial" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">1. 단순 머릿수 비교 (Countplot)</text>
    
    <line x1="40" y1="200" x2="260" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="40" y1="200" x2="40" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    <text x="15" y="130" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 15,130)">인원 수 (명)</text>

    <!-- Male -->
    <rect x="70" y="80" width="40" height="120" fill="#e74c3c" opacity="0.4"/> <!-- Dead -->
    <rect x="70" y="160" width="40" height="40" fill="#2ecc71" opacity="0.8"/> <!-- Survived -->
    <text x="90" y="220" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Male</text>
    <text x="90" y="70" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">577명</text>

    <!-- Female -->
    <rect x="170" y="130" width="40" height="70" fill="#e74c3c" opacity="0.4"/> <!-- Dead -->
    <rect x="170" y="150" width="40" height="50" fill="#2ecc71" opacity="0.8"/> <!-- Survived -->
    <text x="190" y="220" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Female</text>
    <text x="190" y="120" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">314명</text>

  </g>

  <!-- Right: Barplot (Average = Survival Rate) -->
  <g transform="translate(420, 100)">
    <rect width="300" height="240" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="150" y="30" font-family="Arial" font-size="16" fill="#e67e22" font-weight="bold" text-anchor="middle">2. 평균 생존율 비교 (Barplot)</text>
    
    <line x1="40" y1="200" x2="260" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="40" y1="200" x2="40" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    <text x="15" y="130" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 15,130)">생존율 (%)</text>

    <!-- Male -->
    <rect x="70" y="170" width="40" height="30" fill="#3498db"/>
    <line x1="90" y1="150" x2="90" y2="190" stroke="#2c3e50"/> <!-- Error bar -->
    <text x="90" y="220" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Male</text>
    <text x="90" y="160" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold" text-anchor="middle">18%</text>

    <!-- Female -->
    <rect x="170" y="80" width="40" height="120" fill="#e74c3c"/>
    <line x1="190" y1="60" x2="190" y2="100" stroke="#2c3e50"/> <!-- Error bar -->
    <text x="190" y="220" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Female</text>
    <text x="190" y="70" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">74%</text>

  </g>

  <!-- Conclusion -->
  <text x="400" y="370" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">단순 인원은 남성이 2배 많지만, 실제 생존 '비율'은 여성이 4배 압도적으로 높음을 증명!</text>

</svg>
