<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 북극 해빙(Sea Ice) 면적 데이터의 이해</text>

  <!-- Climate Change Metaphor -->
  <g transform="translate(100, 100)">
    <!-- Ocean Background -->
    <rect x="0" y="50" width="250" height="150" fill="#2980b9" rx="10"/>
    
    <!-- Melting Ice -->
    <path d="M20,60 Q60,30 100,50 T180,60 T230,80 L230,120 L20,120 Z" fill="#ecf0f1"/>
    <!-- Water ripples -->
    <path d="M50,150 Q70,140 90,150" fill="none" stroke="#85c1e9" stroke-width="2"/>
    <path d="M120,170 Q150,160 180,170" fill="none" stroke="#85c1e9" stroke-width="2"/>

    <!-- Polar Bear (Abstract) -->
    <ellipse cx="120" cy="50" rx="15" ry="10" fill="#fff"/>
    <circle cx="130" cy="45" r="7" fill="#fff"/>
    <circle cx="132" cy="43" r="1.5" fill="#2c3e50"/>

    <text x="125" y="15" font-family="Arial" font-size="16" fill="#2c3e50" font-weight="bold" text-anchor="middle">Arctic (북극)</text>
    
    <!-- Arrow indicating Extent -->
    <line x1="20" y1="100" x2="230" y2="100" stroke="#e74c3c" stroke-width="3" stroke-dasharray="4,4"/>
    <polygon points="230,100 220,95 220,105" fill="#e74c3c"/>
    <polygon points="20,100 30,95 30,105" fill="#e74c3c"/>
    <text x="125" y="115" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">Extent (해빙 면적)</text>
    <text x="125" y="130" font-family="Arial" font-size="10" fill="#c0392b" text-anchor="middle">(단위: 백만 km²)</text>
  </g>

  <!-- VS Arrow -->
  <text x="400" y="200" font-family="Arial" font-size="30" fill="#34495e" font-weight="bold" text-anchor="middle">+</text>

  <!-- Time Concept -->
  <g transform="translate(480, 100)">
    <rect width="250" height="200" fill="#fff" stroke="#95a5a6" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="250" height="40" fill="#7f8c8d" rx="10"/>
    <rect x="0" y="20" width="250" height="20" fill="#7f8c8d"/>
    <text x="125" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Date (관측 날짜)</text>
    
    <!-- Calendar icon -->
    <rect x="85" y="60" width="80" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="5"/>
    <rect x="85" y="60" width="80" height="20" fill="#e74c3c" rx="5"/>
    <rect x="85" y="70" width="80" height="10" fill="#e74c3c"/>
    <text x="125" y="115" font-family="Arial" font-size="24" fill="#2c3e50" font-weight="bold" text-anchor="middle">15</text>
    <line x1="95" y1="55" x2="95" y2="65" stroke="#34495e" stroke-width="3"/>
    <line x1="155" y1="55" x2="155" y2="65" stroke="#34495e" stroke-width="3"/>

    <text x="125" y="170" font-family="Courier" font-size="14" fill="#34495e" text-anchor="middle">1980-01-01</text>
    <text x="125" y="185" font-family="Courier" font-size="14" fill="#34495e" text-anchor="middle">...</text>
    <text x="125" y="200" font-family="Courier" font-size="14" fill="#34495e" text-anchor="middle">2019-12-31</text>
  </g>

  <!-- Question -->
  <rect x="150" y="330" width="500" height="40" fill="#fdedec" rx="5"/>
  <text x="400" y="355" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">"지구 온난화로 북극의 얼음은 40년간 얼마나 녹아내렸을까?"</text>

</svg>
