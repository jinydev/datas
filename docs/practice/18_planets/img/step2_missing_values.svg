<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#0b1021" rx="10"/> <!-- Space background -->

  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f1c40f" text-anchor="middle">Step 2: 결측치(NaN)에 숨겨진 천문학적 이유</text>

  <!-- Problem Context (Massive Missing Values) -->
  <g transform="translate(50, 100)">
    <rect width="250" height="200" fill="#1c2833" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#e74c3c" font-weight="bold" text-anchor="middle">mass (질량) 컬럼의 절반이 결측치!</text>
    
    <text x="20" y="70" font-family="Courier" font-size="14" fill="#ecf0f1">Planet A: 2.1 Jupiters</text>
    <text x="20" y="100" font-family="Courier" font-size="14" fill="#ecf0f1">Planet B: <tspan fill="#e74c3c" font-weight="bold">NaN</tspan></text>
    <text x="20" y="130" font-family="Courier" font-size="14" fill="#ecf0f1">Planet C: <tspan fill="#e74c3c" font-weight="bold">NaN</tspan></text>
    <text x="20" y="160" font-family="Courier" font-size="14" fill="#ecf0f1">Planet D: 0.5 Jupiters</text>
    
    <text x="125" y="215" font-family="Arial" font-size="14" fill="#bdc3c7" text-anchor="middle">"데이터 수집 불량일까?"</text>
  </g>

  <text x="350" y="200" font-family="Arial" font-size="24" fill="#ecf0f1" font-weight="bold" text-anchor="middle">NO!</text>
  <path d="M370,195 L420,195 M410,185 L420,195 L410,205" fill="none" stroke="#f1c40f" stroke-width="3"/>

  <!-- Two Methods Context -->
  <g transform="translate(450, 80)">
    
    <!-- Method 1: Radial Velocity -->
    <rect x="0" y="0" width="300" height="110" fill="#154360" stroke="#2980b9" stroke-width="2" rx="5"/>
    <text x="150" y="25" font-family="Arial" font-size="14" fill="#3498db" font-weight="bold" text-anchor="middle">Method 1: 시선 속도법 (Radial Velocity)</text>
    <path d="M20,60 Q50,40 80,60 T140,60 T200,60" fill="none" stroke="#ecf0f1" stroke-width="2"/>
    <circle cx="110" cy="60" r="10" fill="#f1c40f"/>
    <text x="150" y="80" font-family="Arial" font-size="12" fill="#ecf0f1" text-anchor="middle">별이 미세하게 흔들리는 것을 포착</text>
    <text x="150" y="95" font-family="Arial" font-size="12" fill="#2ecc71" font-weight="bold" text-anchor="middle">-> 중력(질량, mass) 계산 가능! (O)</text>

    <!-- Method 2: Transit -->
    <rect x="0" y="130" width="300" height="110" fill="#4a2311" stroke="#d35400" stroke-width="2" rx="5"/>
    <text x="150" y="155" font-family="Arial" font-size="14" fill="#e67e22" font-weight="bold" text-anchor="middle">Method 2: 천체면 통과법 (Transit)</text>
    <rect x="50" y="180" width="100" height="20" fill="#f1c40f"/>
    <rect x="80" y="180" width="15" height="20" fill="#2c3e50"/> <!-- Blocked light -->
    <text x="150" y="215" font-family="Arial" font-size="12" fill="#ecf0f1" text-anchor="middle">행성이 별빛을 가리는 현상을 포착</text>
    <text x="150" y="230" font-family="Arial" font-size="12" fill="#e74c3c" font-weight="bold" text-anchor="middle">-> 크기는 아는데 질량은 모름! (NaN)</text>

  </g>

  <rect x="150" y="340" width="500" height="40" fill="#2c3e50" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#f1c40f" font-weight="bold" text-anchor="middle">결론: 결측치를 함부로 0으로 채우거나 지우면 안 되며, Method별로 분리해야 함!</text>

</svg>