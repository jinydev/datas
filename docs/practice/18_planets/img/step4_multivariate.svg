<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#0b1021" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f1c40f" text-anchor="middle">Step 4: 로그 스케일(Log Scale)이 구원하는 극단적 스펙트럼</text>

  <!-- Problem (Linear Scale) -->
  <g transform="translate(50, 100)">
    <rect width="320" height="240" fill="#1c2833" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="160" y="25" font-family="Arial" font-size="14" fill="#e74c3c" font-weight="bold" text-anchor="middle">Linear Scale (일반적인 선형 축)</text>
    
    <line x1="40" y1="200" x2="280" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="40" y1="200" x2="40" y2="40" stroke="#7f8c8d" stroke-width="2"/>
    <text x="20" y="100" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,100)">공전 주기 (일)</text>

    <!-- Ticks -->
    <text x="30" y="200" font-family="Courier" font-size="10" fill="#7f8c8d" text-anchor="end">0</text>
    <text x="30" y="45" font-family="Courier" font-size="10" fill="#7f8c8d" text-anchor="end">10만</text>

    <!-- Crushed Boxplots -->
    <rect x="80" y="195" width="40" height="5" fill="#3498db"/> <!-- Transit (1~100 days) completely flat -->
    <rect x="180" y="170" width="40" height="30" fill="#2ecc71"/> <!-- Radial Velocity (10~1000 days) mostly flat -->
    
    <!-- Extreme Outlier -->
    <circle cx="200" cy="50" r="3" fill="#e74c3c"/>

    <!-- Callout -->
    <text x="160" y="100" font-family="Arial" font-size="12" fill="#bdc3c7" font-weight="bold" text-anchor="middle">아웃라이어 한 개(10만 일) 때문에</text>
    <text x="160" y="115" font-family="Arial" font-size="12" fill="#bdc3c7" font-weight="bold" text-anchor="middle">나머지 박스들이 바닥에 눌려 형체가 없음!</text>
  </g>

  <!-- Transformation -->
  <g transform="translate(390, 200)">
    <path d="M0,0 L20,0 M10,-10 L20,0 L10,10" fill="none" stroke="#f1c40f" stroke-width="4"/>
    <text x="10" y="-20" font-family="Courier" font-size="12" fill="#f1c40f" font-weight="bold" text-anchor="middle">.set_yscale('log')</text>
  </g>

  <!-- Solution (Log Scale) -->
  <g transform="translate(430, 100)">
    <rect width="320" height="240" fill="#1c2833" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="160" y="25" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">Log Scale (로그 스케일 변환)</text>
    
    <line x1="40" y1="200" x2="280" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="40" y1="200" x2="40" y2="40" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Log Ticks (10^0, 10^1, 10^2...) -->
    <text x="30" y="200" font-family="Courier" font-size="10" fill="#7f8c8d" text-anchor="end">1</text>
    <text x="30" y="160" font-family="Courier" font-size="10" fill="#7f8c8d" text-anchor="end">10</text>
    <text x="30" y="120" font-family="Courier" font-size="10" fill="#7f8c8d" text-anchor="end">100</text>
    <text x="30" y="80" font-family="Courier" font-size="10" fill="#7f8c8d" text-anchor="end">1,000</text>
    <text x="30" y="45" font-family="Courier" font-size="10" fill="#7f8c8d" text-anchor="end">10,000</text>

    <!-- Rescued Boxplots -->
    <rect x="80" y="130" width="40" height="60" fill="#3498db" stroke="#2980b9"/> <!-- Transit (e.g. 3 to 50 days) -->
    <line x1="80" y1="160" x2="120" y2="160" stroke="#fff" stroke-width="2"/> <!-- Median -->
    <line x1="100" y1="130" x2="100" y2="100" stroke="#2980b9" stroke-width="2"/>
    <line x1="100" y1="190" x2="100" y2="200" stroke="#2980b9" stroke-width="2"/>
    <text x="100" y="220" font-family="Arial" font-size="10" fill="#3498db" text-anchor="middle">Transit</text>

    <rect x="180" y="80" width="40" height="60" fill="#2ecc71" stroke="#27ae60"/> <!-- Radial Velocity (e.g. 50 to 1000 days) -->
    <line x1="180" y1="110" x2="220" y2="110" stroke="#fff" stroke-width="2"/> <!-- Median -->
    <line x1="200" y1="80" x2="200" y2="50" stroke="#27ae60" stroke-width="2"/>
    <line x1="200" y1="140" x2="200" y2="170" stroke="#27ae60" stroke-width="2"/>
    <text x="200" y="220" font-family="Arial" font-size="10" fill="#2ecc71" text-anchor="middle">Radial Vel.</text>

    <!-- Callout -->
    <text x="160" y="240" font-family="Arial" font-size="10" fill="#ecf0f1" font-weight="bold" text-anchor="middle">숨어있던 데이터의 진짜 상자 모양이 선명하게 드러남!</text>
  </g>

</svg>