<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 남극 펭귄(Penguins) 신체 측정 데이터의 구조</text>

  <!-- Penguin Metaphor -->
  <g transform="translate(150, 100)">
    <!-- Body -->
    <ellipse cx="60" cy="120" rx="40" ry="70" fill="#2c3e50"/>
    <ellipse cx="60" cy="130" rx="30" ry="55" fill="#fff"/>
    
    <!-- Head -->
    <circle cx="60" cy="30" r="25" fill="#2c3e50"/>
    <circle cx="50" cy="25" r="5" fill="#fff"/>
    <circle cx="50" cy="25" r="2" fill="#000"/>
    
    <!-- Bill (부리) -->
    <path d="M20,25 L-20,35 L20,40 Z" fill="#f39c12"/>
    
    <!-- Flipper (날개) -->
    <path d="M100,80 Q130,120 120,180 Q80,120 80,100 Z" fill="#2c3e50"/>
    
    <!-- Feet -->
    <path d="M40,185 L30,200 L50,200 Z" fill="#f39c12"/>
    <path d="M80,185 L70,200 L90,200 Z" fill="#f39c12"/>

    <!-- Labels for Measurements -->
    <line x1="-30" y1="10" x2="-30" y2="50" stroke="#e74c3c" stroke-width="2"/>
    <text x="-40" y="35" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="end">Bill Depth</text>

    <line x1="-20" y1="50" x2="20" y2="50" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="65" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">Bill Length</text>
    
    <line x1="130" y1="80" x2="130" y2="180" stroke="#3498db" stroke-width="2"/>
    <text x="140" y="135" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">Flipper Length</text>

    <text x="60" y="220" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">Body Mass (몸무게)</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(420, 80)">
    <rect width="350" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="350" height="40" fill="#34495e" rx="10"/>
    <rect x="0" y="20" width="350" height="20" fill="#34495e"/>
    <text x="175" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">생물학적 피처(Features)와 타겟(Target)</text>

    <!-- Features -->
    <rect x="20" y="60" width="200" height="180" fill="#ecf0f1" rx="5"/>
    <text x="120" y="80" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">X (측정된 신체 데이터)</text>
    
    <text x="30" y="110" font-family="Courier" font-size="11" fill="#2c3e50">• bill_length_mm (부리 길이)</text>
    <text x="30" y="130" font-family="Courier" font-size="11" fill="#2c3e50">• bill_depth_mm  (부리 깊이/두께)</text>
    <text x="30" y="150" font-family="Courier" font-size="11" fill="#2c3e50">• flipper_length (날개 길이)</text>
    <text x="30" y="170" font-family="Courier" font-size="11" fill="#2c3e50">• body_mass_g    (몸무게)</text>
    <text x="30" y="190" font-family="Courier" font-size="11" fill="#2c3e50">• island         (서식하는 섬)</text>
    <text x="30" y="210" font-family="Courier" font-size="11" fill="#2c3e50">• sex            (성별)</text>

    <!-- Target -->
    <rect x="230" y="60" width="100" height="180" fill="#eaf2f8" rx="5"/>
    <text x="280" y="80" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">y (타겟)</text>
    
    <text x="280" y="130" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">species</text>
    <text x="280" y="160" font-family="Arial" font-size="11" fill="#e67e22" font-weight="bold" text-anchor="middle">Adelie</text>
    <text x="280" y="180" font-family="Arial" font-size="11" fill="#8e44ad" font-weight="bold" text-anchor="middle">Chinstrap</text>
    <text x="280" y="200" font-family="Arial" font-size="11" fill="#27ae60" font-weight="bold" text-anchor="middle">Gentoo</text>
  </g>

</svg>