<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 다차원 특성 비교 시각화 (Boxplot의 우상향)</text>

  <!-- Boxplot construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">와인 등급(Quality)에 따른 알코올 도수(Alcohol) 비교</text>
    
    <!-- Axes -->
    <line x1="50" y1="240" x2="450" y2="240" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="240" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Quality (품질 등급)</text>
    <text x="20" y="145" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,145)">Alcohol (%)</text>
    
    <!-- X-axis labels (3 to 8) -->
    <text x="100" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">3</text>
    <text x="160" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">4</text>
    <text x="220" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">5</text>
    <text x="280" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">6</text>
    <text x="340" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">7</text>
    <text x="400" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">8</text>

    <!-- Boxplots showing upward trend -->
    <!-- Quality 3 -->
    <rect x="90" y="180" width="20" height="30" fill="#fcf3cf" stroke="#f1c40f"/>
    <line x1="90" y1="195" x2="110" y2="195" stroke="#2c3e50" stroke-width="2"/> <!-- Median -->
    <line x1="100" y1="180" x2="100" y2="160" stroke="#f1c40f" stroke-width="2"/>
    <line x1="100" y1="210" x2="100" y2="220" stroke="#f1c40f" stroke-width="2"/>

    <!-- Quality 4 -->
    <rect x="150" y="170" width="20" height="35" fill="#f8c471" stroke="#e67e22"/>
    <line x1="150" y1="185" x2="170" y2="185" stroke="#2c3e50" stroke-width="2"/> <!-- Median -->
    <line x1="160" y1="170" x2="160" y2="150" stroke="#e67e22" stroke-width="2"/>
    <line x1="160" y1="205" x2="160" y2="225" stroke="#e67e22" stroke-width="2"/>

    <!-- Quality 5 (Low alcohol) -->
    <rect x="210" y="185" width="20" height="25" fill="#e67e22" stroke="#d35400"/>
    <line x1="210" y1="200" x2="230" y2="200" stroke="#2c3e50" stroke-width="2"/> <!-- Median -->
    <line x1="220" y1="185" x2="220" y2="165" stroke="#d35400" stroke-width="2"/>
    <line x1="220" y1="210" x2="220" y2="230" stroke="#d35400" stroke-width="2"/>

    <!-- Quality 6 (Higher) -->
    <rect x="270" y="140" width="20" height="40" fill="#d35400" stroke="#a04000"/>
    <line x1="270" y1="160" x2="290" y2="160" stroke="#2c3e50" stroke-width="2"/> <!-- Median -->
    <line x1="280" y1="140" x2="280" y2="120" stroke="#a04000" stroke-width="2"/>
    <line x1="280" y1="180" x2="280" y2="210" stroke="#a04000" stroke-width="2"/>

    <!-- Quality 7 (Higher still) -->
    <rect x="330" y="100" width="20" height="30" fill="#a04000" stroke="#6e2c00"/>
    <line x1="330" y1="115" x2="350" y2="115" stroke="#fff" stroke-width="2"/> <!-- Median -->
    <line x1="340" y1="100" x2="340" y2="80" stroke="#6e2c00" stroke-width="2"/>
    <line x1="340" y1="130" x2="340" y2="150" stroke="#6e2c00" stroke-width="2"/>

    <!-- Quality 8 (Highest) -->
    <rect x="390" y="70" width="20" height="40" fill="#6e2c00" stroke="#4a2311"/>
    <line x1="390" y1="90" x2="410" y2="90" stroke="#fff" stroke-width="2"/> <!-- Median -->
    <line x1="400" y1="70" x2="400" y2="50" stroke="#4a2311" stroke-width="2"/>
    <line x1="400" y1="110" x2="400" y2="130" stroke="#4a2311" stroke-width="2"/>

    <!-- Trend Line Connecting Medians -->
    <path d="M100,195 L160,185 L220,200 L280,160 L340,115 L400,90" fill="none" stroke="#27ae60" stroke-width="3" stroke-dasharray="6,4"/>
    <polygon points="400,90 395,95 395,85" fill="#27ae60"/>

    <!-- Annotation -->
    <rect x="70" y="60" width="180" height="40" fill="#d5f5e3" rx="5"/>
    <text x="160" y="75" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">뚜렷한 우상향 계단</text>
    <text x="160" y="90" font-family="Arial" font-size="10" fill="#34495e" text-anchor="middle">좋은 와인일수록 알코올 평균이 높음!</text>

  </g>
</svg>
