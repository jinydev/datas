<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 상관관계(Correlation)로 핵심 단서 찾기</text>

  <!-- Problem Context -->
  <g transform="translate(50, 100)">
    <rect width="250" height="200" fill="#fff" stroke="#95a5a6" stroke-width="2" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">모든 성분을 다 살펴야 할까?</text>
    
    <text x="20" y="70" font-family="Courier" font-size="12" fill="#7f8c8d">fixed_acidity</text>
    <text x="20" y="90" font-family="Courier" font-size="12" fill="#7f8c8d">volatile_acidity</text>
    <text x="20" y="110" font-family="Courier" font-size="12" fill="#7f8c8d">citric_acid</text>
    <text x="20" y="130" font-family="Courier" font-size="12" fill="#7f8c8d">residual_sugar</text>
    <text x="20" y="150" font-family="Courier" font-size="12" fill="#7f8c8d">chlorides</text>
    <text x="20" y="170" font-family="Courier" font-size="12" fill="#7f8c8d">...</text>
    
    <rect x="130" y="60" width="100" height="110" fill="#fdedec" opacity="0.8" rx="5"/>
    <text x="180" y="115" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">변수가 너무 많음!</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(320, 180)">
    <path d="M0,0 L40,0 M30,-10 L40,0 L30,10" fill="none" stroke="#2980b9" stroke-width="4"/>
    <text x="20" y="-30" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">df.corr()</text>
    <text x="20" y="-15" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">['quality']</text>
  </g>

  <!-- Solution Context -->
  <g transform="translate(400, 100)">
    <rect width="350" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="350" height="30" fill="#27ae60" rx="5"/>
    <rect x="0" y="15" width="350" height="15" fill="#27ae60"/>
    <text x="175" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Target(quality)과의 상관계수 순위</text>
    
    <!-- Top Positive -->
    <rect x="20" y="50" width="310" height="30" fill="#d5f5e3" rx="3"/>
    <text x="30" y="70" font-family="Courier" font-size="14" fill="#27ae60" font-weight="bold">alcohol</text>
    <text x="200" y="70" font-family="Courier" font-size="14" fill="#27ae60" font-weight="bold">0.476 (강한 양+)</text>

    <!-- Weak -->
    <text x="30" y="110" font-family="Courier" font-size="14" fill="#7f8c8d">residual_sugar</text>
    <text x="200" y="110" font-family="Courier" font-size="14" fill="#7f8c8d">0.013 (관계없음)</text>
    
    <text x="30" y="140" font-family="Courier" font-size="14" fill="#7f8c8d">free_sulfur...</text>
    <text x="200" y="140" font-family="Courier" font-size="14" fill="#7f8c8d">-0.050 (관계없음)</text>

    <!-- Top Negative -->
    <rect x="20" y="160" width="310" height="30" fill="#fdedec" rx="3"/>
    <text x="30" y="180" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold">volatile_acidity</text>
    <text x="200" y="180" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold">-0.390 (강한 음-)</text>
  </g>

  <rect x="150" y="340" width="500" height="40" fill="#eaf2f8" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">결론: "알코올이 높고, 휘발성 산도가 낮을수록 와인이 맛있다!"</text>

</svg>
