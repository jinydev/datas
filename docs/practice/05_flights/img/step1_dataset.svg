<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 시계열(Time Series) 데이터의 구조 이해</text>

  <!-- Airplane Metaphor -->
  <g transform="translate(100, 100)">
    <!-- Plane Body -->
    <path d="M20,100 L160,100 Q200,100 200,80 Q200,60 160,60 L20,60 L0,80 Z" fill="#3498db"/>
    <!-- Tail -->
    <path d="M20,60 L50,20 L80,60 Z" fill="#2980b9"/>
    <!-- Wing -->
    <path d="M100,100 L60,150 L120,150 L140,100 Z" fill="#2980b9"/>
    <!-- Windows -->
    <circle cx="100" cy="80" r="5" fill="#fff"/>
    <circle cx="120" cy="80" r="5" fill="#fff"/>
    <circle cx="140" cy="80" r="5" fill="#fff"/>
    <circle cx="160" cy="80" r="5" fill="#fff"/>
    <circle cx="180" cy="80" r="5" fill="#fff"/>

    <path d="M220,80 L280,80 M280,80 L270,70 M280,80 L270,90" fill="none" stroke="#e74c3c" stroke-width="3"/>
    
    <text x="100" y="180" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">항공기 탑승객 수 (1949~1960)</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(380, 80)">
    <rect width="380" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="380" height="40" fill="#2ecc71" rx="10"/>
    <rect x="0" y="20" width="380" height="20" fill="#2ecc71"/>
    <text x="190" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">시간과 값(Time &amp; Value)</text>

    <!-- Context -->
    <rect x="20" y="60" width="180" height="180" fill="#ecf0f1" rx="5"/>
    <text x="110" y="80" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">시간 흐름 (Time)</text>
    
    <text x="30" y="120" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold">• year (연도)</text>
    <text x="40" y="140" font-family="Arial" font-size="11" fill="#7f8c8d">ex) 1949, 1950 ...</text>
    
    <text x="30" y="170" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold">• month (월)</text>
    <text x="40" y="190" font-family="Arial" font-size="11" fill="#7f8c8d">ex) Jan, Feb, Mar ...</text>

    <!-- Target -->
    <rect x="220" y="60" width="140" height="180" fill="#eaf2f8" rx="5"/>
    <text x="290" y="80" font-family="Arial" font-size="14" fill="#e74c3c" font-weight="bold" text-anchor="middle">결과값 (Value)</text>
    
    <text x="290" y="140" font-family="Courier" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">passengers</text>
    <text x="290" y="165" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">월별 탑승객 수 (명)</text>
    <text x="290" y="185" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">112, 118, 132 ...</text>
  </g>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">"시간이 흐름에 따라 사람들은 점점 더 비행기를 많이 탔을까?"</text>

</svg>