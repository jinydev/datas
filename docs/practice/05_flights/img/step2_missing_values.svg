<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 데이터를 입체적으로 만드는 엑셀 마법 (Pivot Table)</text>

  <!-- Flat Data -->
  <g transform="translate(50, 100)">
    <rect width="250" height="220" fill="#fff" stroke="#95a5a6" stroke-width="2" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">1차원 평면 데이터 (Long Form)</text>
    
    <rect x="20" y="50" width="210" height="25" fill="#ecf0f1"/>
    <text x="30" y="67" font-family="Courier" font-size="12" fill="#2c3e50" font-weight="bold">year | month | passengers</text>
    
    <text x="30" y="90" font-family="Courier" font-size="12" fill="#7f8c8d">1949 | Jan   | 112</text>
    <text x="30" y="110" font-family="Courier" font-size="12" fill="#7f8c8d">1949 | Feb   | 118</text>
    <text x="30" y="130" font-family="Courier" font-size="12" fill="#7f8c8d">1949 | Mar   | 132</text>
    <text x="30" y="150" font-family="Courier" font-size="12" fill="#7f8c8d">...</text>
    <text x="30" y="170" font-family="Courier" font-size="12" fill="#7f8c8d">1950 | Jan   | 115</text>
    <text x="30" y="190" font-family="Courier" font-size="12" fill="#7f8c8d">1950 | Feb   | 126</text>

    <text x="125" y="240" font-family="Arial" font-size="12" fill="#e74c3c" font-weight="bold" text-anchor="middle">행(Row)으로 길게 늘어져 있어 한눈에 안 보임</text>
  </g>

  <!-- Transformation -->
  <g transform="translate(320, 170)">
    <path d="M0,0 L50,0 L40,-10 M50,0 L40,10" fill="none" stroke="#2980b9" stroke-width="4"/>
    <text x="25" y="-20" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">df.pivot()</text>
  </g>

  <!-- Pivot Table -->
  <g transform="translate(400, 100)">
    <rect width="350" height="220" fill="#fff" stroke="#3498db" stroke-width="2" rx="5"/>
    <text x="175" y="30" font-family="Arial" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">2차원 매트릭스 (Wide Form)</text>
    
    <rect x="70" y="50" width="260" height="25" fill="#3498db" opacity="0.2"/>
    <text x="90" y="67" font-family="Courier" font-size="12" fill="#2980b9" font-weight="bold">Jan | Feb | Mar | Apr ... (columns=month)</text>
    
    <rect x="20" y="80" width="40" height="100" fill="#e74c3c" opacity="0.2"/>
    <text x="30" y="95" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold">1949</text>
    <text x="30" y="115" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold">1950</text>
    <text x="30" y="135" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold">...</text>
    <text x="25" y="180" font-family="Arial" font-size="10" fill="#c0392b" font-weight="bold">(index)</text>

    <!-- Values -->
    <text x="90" y="95" font-family="Courier" font-size="12" fill="#34495e">112 | 118 | 132 | 129</text>
    <text x="90" y="115" font-family="Courier" font-size="12" fill="#34495e">115 | 126 | 141 | 135</text>
    <text x="90" y="135" font-family="Courier" font-size="12" fill="#34495e">... | ... | ... | ...</text>

    <text x="175" y="240" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">연도별, 월별 교차 비교와 히트맵 그리기가 가능해짐!</text>
  </g>

</svg>