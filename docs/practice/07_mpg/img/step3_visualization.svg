<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 제조 국가(Origin)별 연비(MPG) 차이 비교 (Boxplot)</text>

  <!-- Boxplot Anatomy -->
  <g transform="translate(100, 90)">
    <rect width="600" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="300" y="30" font-family="Arial" font-size="16" fill="#8e44ad" font-weight="bold" text-anchor="middle">일본차는 정말로 미국차보다 연비가 좋을까?</text>
    
    <line x1="50" y1="200" x2="550" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="200" x2="50" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="300" y="235" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Origin (제조 국가)</text>
    <text x="20" y="130" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,130)">MPG (연비)</text>

    <!-- USA (Low MPG) -->
    <rect x="110" y="140" width="40" height="40" fill="#e74c3c" opacity="0.8" stroke="#c0392b"/>
    <line x1="110" y1="160" x2="150" y2="160" stroke="#c0392b" stroke-width="3"/> <!-- Median -->
    <line x1="130" y1="140" x2="130" y2="100" stroke="#c0392b" stroke-width="2"/> <!-- Top whisker -->
    <line x1="130" y1="180" x2="130" y2="190" stroke="#c0392b" stroke-width="2"/> <!-- Bot whisker -->
    <text x="130" y="220" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">USA (미국)</text>

    <!-- Europe (Mid MPG) -->
    <rect x="280" y="100" width="40" height="50" fill="#f39c12" opacity="0.8" stroke="#d35400"/>
    <line x1="280" y1="120" x2="320" y2="120" stroke="#d35400" stroke-width="3"/>
    <line x1="300" y1="100" x2="300" y2="70" stroke="#d35400" stroke-width="2"/>
    <line x1="300" y1="150" x2="300" y2="170" stroke="#d35400" stroke-width="2"/>
    <text x="300" y="220" font-family="Arial" font-size="14" fill="#d35400" font-weight="bold" text-anchor="middle">Europe (유럽)</text>

    <!-- Japan (High MPG) -->
    <rect x="450" y="60" width="40" height="60" fill="#2ecc71" opacity="0.8" stroke="#27ae60"/>
    <line x1="450" y1="80" x2="490" y2="80" stroke="#27ae60" stroke-width="3"/>
    <line x1="470" y1="60" x2="470" y2="30" stroke="#27ae60" stroke-width="2"/>
    <line x1="470" y1="120" x2="470" y2="140" stroke="#27ae60" stroke-width="2"/>
    <circle cx="470" cy="15" r="3" fill="#27ae60"/> <!-- Outlier -->
    <text x="470" y="220" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">Japan (일본)</text>

    <!-- Interpretation -->
    <path d="M160,160 L430,80" fill="none" stroke="#2c3e50" stroke-width="2" stroke-dasharray="5,5"/>
    <polygon points="430,80 420,75 425,85" fill="#2c3e50"/>
    <text x="250" y="100" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold">명백한 연비(MPG) 차이 입증</text>

  </g>

</svg>