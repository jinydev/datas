<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 통계적 추론을 통한 결측치 대치 (Imputation by Group)</text>

  <!-- Problem -->
  <g transform="translate(50, 100)">
    <rect width="250" height="200" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">결측치 발생 (horsepower)</text>
    
    <!-- Table representation -->
    <rect x="20" y="50" width="210" height="30" fill="#34495e"/>
    <text x="30" y="70" font-family="Courier" font-size="12" fill="#fff">Name | Cylinders | Horsepower</text>
    
    <text x="30" y="110" font-family="Courier" font-size="12" fill="#7f8c8d">Ford  | 4기통 | 90</text>
    
    <rect x="20" y="125" width="210" height="25" fill="#fdedec"/>
    <text x="30" y="140" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold">Honda | 4기통 | NaN (결측)</text>
    
    <text x="30" y="170" font-family="Courier" font-size="12" fill="#7f8c8d">Chevy | 8기통 | 150</text>
    
    <text x="125" y="220" font-family="Arial" font-size="12" fill="#c0392b" text-anchor="middle" font-weight="bold">"그냥 전체 평균(104)으로 채울까?"</text>
    <text x="125" y="240" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle">전체 평균 대치는 통계적 오류 유발!</text>
  </g>

  <!-- Transformation -->
  <g transform="translate(320, 170)">
    <path d="M0,0 L50,0 L40,-10 M50,0 L40,10" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="25" y="-20" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">그룹별(groupby)</text>
    <text x="25" y="-5" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">평균 적용</text>
  </g>

  <!-- Solution -->
  <g transform="translate(420, 100)">
    <rect width="320" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="160" y="30" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">스마트한 대치 (Imputation)</text>
    
    <rect x="20" y="50" width="280" height="60" fill="#eaf2f8" rx="5"/>
    <text x="30" y="70" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">💡 기통수(Cylinders)별 평균 마력 계산</text>
    <text x="40" y="90" font-family="Courier" font-size="12" fill="#34495e">4기통 자동차들의 평균 마력 = 78</text>
    <text x="40" y="105" font-family="Courier" font-size="12" fill="#34495e">8기통 자동차들의 평균 마력 = 158</text>

    <!-- Table representation -->
    <rect x="20" y="130" width="280" height="25" fill="#eafaf1"/>
    <text x="30" y="147" font-family="Courier" font-size="12" fill="#27ae60" font-weight="bold">Honda | 4기통 | 78 (그룹 평균으로 채움!)</text>

    <text x="160" y="185" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">비슷한 스펙(4기통)을 가진 차들의 평균을 이용해</text>
    <text x="160" y="200" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">결측치를 훨씬 더 과학적으로 복원!</text>
  </g>

</svg>