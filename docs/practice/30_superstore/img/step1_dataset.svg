<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 글로벌 슈퍼스토어(Superstore) 매출/이익 데이터</text>

  <!-- Superstore Concept -->
  <g transform="translate(100, 100)">
    
    <rect x="0" y="0" width="260" height="200" fill="#eaf2f8" stroke="#3498db" stroke-width="2" rx="10"/>
    <text x="130" y="30" font-family="Arial" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">카테고리 (Category)</text>
    
    <!-- Icons for Categories -->
    <!-- Furniture -->
    <rect x="30" y="50" width="40" height="40" fill="#fcf3cf" rx="5"/>
    <path d="M40,70 L60,70 M40,80 L40,60 L60,60 L60,80 M50,60 L50,50" fill="none" stroke="#d4ac0d" stroke-width="3"/>
    <text x="50" y="105" font-family="Arial" font-size="12" fill="#d4ac0d" font-weight="bold" text-anchor="middle">가구</text>
    
    <!-- Office Supplies -->
    <rect x="110" y="50" width="40" height="40" fill="#e8f8f5" rx="5"/>
    <path d="M125,80 L125,60 L135,60 L135,80 M120,80 L140,80" fill="none" stroke="#1abc9c" stroke-width="3"/>
    <circle cx="130" cy="55" r="3" fill="#1abc9c"/>
    <text x="130" y="105" font-family="Arial" font-size="12" fill="#16a085" font-weight="bold" text-anchor="middle">사무용품</text>
    
    <!-- Technology -->
    <rect x="190" y="50" width="40" height="40" fill="#f5eef8" rx="5"/>
    <rect x="195" y="60" width="30" height="20" fill="none" stroke="#8e44ad" stroke-width="2" rx="2"/>
    <line x1="205" y1="83" x2="215" y2="83" stroke="#8e44ad" stroke-width="3"/>
    <line x1="210" y1="80" x2="210" y2="83" stroke="#8e44ad" stroke-width="2"/>
    <text x="210" y="105" font-family="Arial" font-size="12" fill="#8e44ad" font-weight="bold" text-anchor="middle">전자기기</text>

    <!-- Sub-categories -->
    <text x="130" y="140" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">Sub-Category (중분류)</text>
    <text x="130" y="160" font-family="Arial" font-size="11" fill="#7f8c8d" text-anchor="middle">의자, 책상, 전화기, 복사기 등 수백 종</text>
  </g>

  <!-- KPI Arrow -->
  <g transform="translate(390, 180)">
    <path d="M0,10 L30,10 M20,0 L30,10 L20,20" fill="none" stroke="#2c3e50" stroke-width="4"/>
  </g>

  <!-- Financial KPI (Sales &amp; Profit) -->
  <g transform="translate(450, 100)">
    
    <rect x="0" y="0" width="220" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="10"/>
    
    <!-- Sales -->
    <rect x="30" y="30" width="160" height="60" fill="#eaf2f8" rx="5"/>
    <text x="110" y="55" font-family="Courier" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">Sales (매출액)</text>
    <text x="110" y="75" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">고객이 결제한 총 금액</text>
    
    <!-- Minus icon -->
    <text x="110" y="115" font-family="Arial" font-size="20" fill="#c0392b" font-weight="bold" text-anchor="middle">- 비용/할인</text>
    
    <!-- Profit -->
    <rect x="30" y="125" width="160" height="60" fill="#e9f7ef" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="110" y="150" font-family="Courier" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">Profit (순이익)</text>
    <text x="110" y="170" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">기업이 실제로 남긴 진짜 돈</text>
  </g>

  <rect x="150" y="340" width="500" height="40" fill="#fff" stroke="#bdc3c7" rx="5"/>
  <text x="400" y="365" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">"수만 건의 영수증 내역에서 '진짜 돈(Profit)'을 벌어주는 상품을 찾아라!"</text>

</svg>
