<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">4단계: 코드를 우아하게! .query() 문자열 검색 함수 활용</text>

  <!-- 기존 방식 (복잡함) -->
  <g transform="translate(100, 90)">
    <rect x="0" y="0" width="220" height="60" fill="#FFF3E0" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="2"/>
    <text x="110" y="20" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">기존 방식 (괄호가 너무 많아!)</text>
    <text x="110" y="45" font-family="monospace" font-size="12" fill="#D84315" font-weight="bold" text-anchor="middle">pf[(pf['출석']&gt;=19) &amp; (pf['기말']&gt;=20)]</text>
    
    <!-- 어지러운 표시 -->
    <path d="M 10 35 Q 20 20 30 50 T 50 35" fill="none" stroke="#FF5252" stroke-width="2" opacity="0.5"/>
    <path d="M 170 35 Q 180 50 190 20 T 210 35" fill="none" stroke="#FF5252" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- VS 화살표 연결 -->
  <text x="350" y="125" font-family="sans-serif" font-size="24" fill="#B0BEC5" font-weight="bold" text-anchor="middle">VS</text>
  <path d="M 350 140 L 350 180" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
  <polygon points="345,175 350,185 355,175" fill="#4CAF50" />

  <!-- Query 방식 (깔끔함) -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="500" height="80" fill="#E8F5E9" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    <text x="250" y="25" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">query("문자열 수식") 방식</text>
    
    <rect x="30" y="35" width="440" height="30" fill="#263238" rx="5" />
    <text x="50" y="55" font-family="monospace" font-size="16" fill="#82AAFF" font-weight="bold">pf</text>
    <text x="70" y="55" font-family="monospace" font-size="16" fill="#FFF" font-weight="bold">.query(</text>
    <text x="145" y="55" font-family="monospace" font-size="16" fill="#C3E88D" font-weight="bold">"출석 &gt;= 19 and 기말 &gt;= 20"</text>
    <text x="445" y="55" font-family="monospace" font-size="16" fill="#FFF" font-weight="bold">)</text>
  </g>

  <!-- 외부 변수 @ 사용법 설명 -->
  <g transform="translate(350, 90)">
    <rect x="50" y="0" width="250" height="60" fill="#F3E5F5" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="175" y="20" font-family="sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold" text-anchor="middle">외부 변수 사용시 @ 삽입</text>
    <text x="175" y="45" font-family="monospace" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">.query("과제 &gt; <tspan fill="#E91E63">@limit</tspan>")</text>
  </g>

</svg>
