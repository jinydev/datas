<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: T/F 답안지(Mask)를 대괄호 [ ] 에 넣어 필터링 끝내기</text>

  <!-- 파이썬 코드 박스 -->
  <g transform="translate(60, 60)">
    <rect x="-20" y="0" width="300" height="70" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="130" y="42" font-family="monospace" font-size="22" fill="#82AAFF" font-weight="bold" text-anchor="middle">pf[ <tspan fill="#C3E88D">condition</tspan> ]</text>
  </g>

  <!-- 합성 과정 묘사 -->
  <g transform="translate(60, 160)">
    <!-- T/F 답안지 배열 -->
    <rect x="-20" y="0" width="100" height="150" fill="#E3F2FD" rx="5" filter="url(#shadow)" stroke="#1E88E5" stroke-width="2"/>
    <text x="30" y="25" font-family="monospace" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">조건 배열</text>
    <rect x="-10" y="35" width="80" height="20" fill="#4CAF50" rx="3" />
    <text x="30" y="49" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">True</text>
    
    <rect x="-10" y="60" width="80" height="20" fill="#FF5252" rx="3" />
    <text x="30" y="74" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="-10" y="85" width="80" height="20" fill="#FF5252" rx="3" />
    <text x="30" y="99" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="-10" y="110" width="80" height="20" fill="#FF5252" rx="3" />
    <text x="30" y="124" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="-10" y="135" width="80" height="20" fill="#4CAF50" rx="3" />
    <text x="30" y="149" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">True</text>

    <!-- 대입 렌즈 모양 -->
    <path d="M 120 75 Q 160 75 160 0 Q 160 -40 130 -40" fill="none" stroke="#FFA000" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="125,-47 135,-40 125,-33" fill="#FFA000" />
    <text x="180" y="30" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">"True 행만 출력하라"</text>
  </g>

  <!-- 결과 표 -->
  <g transform="translate(420, 80)">
    <rect x="-30" y="0" width="220" height="110" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <rect x="30" y="0" width="160" height="30" fill="#E8F5E9" rx="3" stroke="#A5D6A7" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">중간</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">기말</text>
    <text x="140" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">과제</text>
    <text x="175" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 바 (윤일형, 신수빈) -->
    <rect x="-30" y="30" width="60" height="80" fill="#FFE0B2" rx="3" />
    <text x="0" y="60" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="90" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 데이터 -->
    <text x="60" y="60" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">25</text>
    <text x="100" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="140" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="175" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">18</text>

    <text x="60" y="90" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">22</text>
    <text x="100" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">34</text>
    <text x="140" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="175" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">16</text>

    <text x="80" y="130" font-family="sans-serif" font-size="16" fill="#2E7D32" font-weight="bold" text-anchor="middle">생존자 2명!</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">변수[논리배열] 패턴은 데이터 분석 실무의 가장 기초적이면서 핵심 테크닉!</text>
  </g>

</svg>
