<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: 여러 명 동시 추출 (리스트 사용)</text>

  <!-- 파이썬 코드 박스 -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="220" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="110" y="35" font-family="monospace" font-size="16" fill="#81D4FA" font-weight="bold" text-anchor="middle">pf.loc[['홍소희', '윤일형']]</text>
    <path d="M 60 -10 Q 75 -30 95 -10" fill="none" stroke="#FFCA28" stroke-width="2" />
    <path d="M 160 -10 Q 145 -30 125 -10" fill="none" stroke="#FFCA28" stroke-width="2" />
    <text x="110" y="-35" font-family="sans-serif" font-size="12" fill="#FFCA28" font-weight="bold" text-anchor="middle">리스트 [ ] 명단 넘기기!</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(290, 150)">
    <path d="M 0 10 L 90 10" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="85,3 95,10 85,17" fill="#2196F3" />
    <text x="45" y="-5" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">표의 형태 유지</text>
    <text x="45" y="30" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">요청한 순서대로!</text>
  </g>

  <!-- 파생된 데이터프레임 (DataFrame) -->
  <g transform="translate(420, 80)">
    <rect x="-30" y="0" width="220" height="110" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#0D47A1" stroke-width="2"/>
    <text x="80" y="-10" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">DataFrame 형식</text>
    
    <!-- 컬럼명 -->
    <rect x="30" y="0" width="160" height="30" fill="#E3F2FD" rx="3" stroke="#2196F3" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#0D47A1" font-weight="bold" text-anchor="middle">중간</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#0D47A1" font-weight="bold" text-anchor="middle">기말</text>
    <text x="140" y="20" font-family="sans-serif" font-size="11" fill="#0D47A1" font-weight="bold" text-anchor="middle">과제</text>
    <text x="175" y="20" font-family="sans-serif" font-size="11" fill="#0D47A1" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 -->
    <rect x="-30" y="30" width="60" height="80" fill="#FFF3E0" rx="3" />
    <text x="0" y="60" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="0" y="90" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>

    <!-- 값 -->
    <!-- 홍소희 (1순위 요청) -->
    <text x="60" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="100" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="140" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="175" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">19</text>
    
    <!-- 윤일형 (2순위 요청) -->
    <text x="60" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">25</text>
    <text x="100" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="140" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="175" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">18</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 300)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E1F5FE" rx="10" stroke="#03A9F4" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#0277BD" font-weight="bold" text-anchor="middle">데이터프레임(DataFrame) 형식을 유지하며, 내부 리스트 인덱스 순서대로 정렬됩니다.</text>
  </g>

</svg>
