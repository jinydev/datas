<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">인덱스 레이블 기반 행 벡터(Row Vector) 투영</text>

  <!-- Left: Original Matrix (DataFrame) -->
  <text x="160" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">원본 행렬 구조</text>

  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="200" height="130" fill="#fff" stroke="#90caf9" stroke-width="2" rx="4"/>
    
    <!-- Axis 0 (Index Labels) -->
    <rect x="0" y="0" width="60" height="130" fill="#e3f2fd" rx="4"/>
    <text x="30" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">Axis 0</text>
    
    <text x="30" y="50" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">'A'</text>
    
    <rect x="5" y="65" width="50" height="25" fill="#bbdefb" stroke="#1e88e5" stroke-width="2" rx="2"/>
    <text x="30" y="82" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">'B'</text>
    
    <text x="30" y="115" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">'C'</text>

    <!-- Data Area -->
    <line x1="60" y1="0" x2="60" y2="130" stroke="#90caf9" stroke-width="2"/>
    <text x="130" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">Data (Axis 1)</text>
    
    <text x="130" y="50" font-family="Courier New, monospace" font-size="12" fill="#666" text-anchor="middle">10, 20, 30</text>
    
    <rect x="65" y="65" width="130" height="25" fill="#e3f2fd" stroke="#1e88e5" stroke-width="1" stroke-dasharray="2,2" rx="2"/>
    <text x="130" y="82" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">40, 50, 60</text>
    
    <text x="130" y="115" font-family="Courier New, monospace" font-size="12" fill="#666" text-anchor="middle">70, 80, 90</text>
  </g>

  <!-- Arrow & Action -->
  <g stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arrow-orange)">
    <path d="M 270 165 C 320 165, 360 165, 410 165" />
  </g>
  <text x="340" y="135" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">매핑 &amp; 추출</text>
  <rect x="290" y="145" width="100" height="40" fill="#fff3e0" stroke="#ff9800" rx="20"/>
  <text x="340" y="170" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#e65100" text-anchor="middle">.loc['B']</text>

  <!-- Right: Extracted Row Vector -->
  <text x="510" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">반환된 행 벡터 (Series)</text>

  <g transform="translate(440, 90)">
    <rect x="0" y="0" width="140" height="130" fill="#fff" stroke="#ff9800" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.1))"/>
    
    <rect x="0" y="0" width="140" height="30" fill="#ffe0b2" rx="2"/>
    <text x="70" y="20" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">Name: 'B'</text>

    <!-- Transposed Data -->
    <text x="30" y="60" font-family="Arial" font-size="12" fill="#999">Col1</text>
    <text x="90" y="60" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333">40</text>

    <text x="30" y="90" font-family="Arial" font-size="12" fill="#999">Col2</text>
    <text x="90" y="90" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333">50</text>

    <text x="30" y="120" font-family="Arial" font-size="12" fill="#999">Col3</text>
    <text x="90" y="120" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333">60</text>
    
    <line x1="60" y1="40" x2="60" y2="125" stroke="#ffe0b2" stroke-width="2"/>
  </g>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
