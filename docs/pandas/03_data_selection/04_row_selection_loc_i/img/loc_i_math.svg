<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">인덱스 배열(Index Array)의 간접 오프셋 참조(Indirect Offset)</text>

  <!-- Step 1: Array Indexing -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="180" height="150" fill="#fff" stroke="#90caf9" stroke-width="2" rx="4"/>
    <rect x="0" y="0" width="180" height="30" fill="#bbdefb" rx="2"/>
    <text x="90" y="20" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">df.index (Array)</text>
    
    <!-- Array elements -->
    <text x="40" y="55" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">i=0</text>
    <rect x="70" y="40" width="90" height="20" fill="#e3f2fd" rx="2"/>
    <text x="115" y="54" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">'A'</text>

    <!-- Target Element -->
    <text x="40" y="85" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">i=1</text>
    <rect x="70" y="70" width="90" height="20" fill="#ffe0b2" stroke="#ff9800" stroke-width="2" rx="2"/>
    <text x="115" y="84" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">'B'</text>

    <text x="40" y="115" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">i=2</text>
    <rect x="70" y="100" width="90" height="20" fill="#e3f2fd" rx="2"/>
    <text x="115" y="114" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">'C'</text>
    
    <!-- Code Snippet -->
    <rect x="30" y="130" width="120" height="30" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="90" y="150" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#d84315" text-anchor="middle">df.index[1]</text>
  </g>

  <!-- Arrow 1 (Passes string) -->
  <g stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arrow-orange)">
    <path d="M 220 145 C 240 145, 260 145, 280 145" />
  </g>
  <text x="250" y="135" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">'B'</text>

  <!-- Step 2: loc[] referencing -->
  <g transform="translate(290, 60)">
    <rect x="0" y="0" width="130" height="150" fill="#fff" stroke="#ffb74d" stroke-width="2" rx="4"/>
    <rect x="0" y="0" width="130" height="30" fill="#ffe0b2" rx="2"/>
    <text x="65" y="20" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">.loc[ Key ]</text>

    <!-- Function block -->
    <rect x="15" y="60" width="100" height="60" fill="#fff3e0" stroke="#ff9800" stroke-dasharray="4,4" rx="5"/>
    <text x="65" y="85" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Key Matching</text>
    <text x="65" y="105" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#d84315" text-anchor="middle">Key = 'B'</text>
  </g>

  <!-- Arrow 2 (Extracts vector) -->
  <g stroke="#4caf50" stroke-width="3" fill="none" marker-end="url(#arrow-green)">
    <path d="M 420 135 C 440 135, 460 135, 480 135" />
  </g>

  <!-- Step 3: Extracted Vector -->
  <g transform="translate(490, 60)">
    <rect x="0" y="0" width="120" height="150" fill="#fff" stroke="#81c784" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="120" height="30" fill="#c8e6c9" rx="2"/>
    <text x="60" y="20" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Row Vector (Series)</text>

    <text x="60" y="60" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">[ 40 ]</text>
    <text x="60" y="90" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">[ 50 ]</text>
    <text x="60" y="120" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">[ 60 ]</text>
    
    <rect x="10" y="130" width="100" height="30" fill="#e8f5e9" stroke="#4caf50" rx="4"/>
    <text x="60" y="150" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#2e7d32" text-anchor="middle">.loc[ df.index[1] ]</text>
  </g>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
  </defs>
</svg>
