<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">열 벡터 배열(Column Array)의 간접 오프셋 참조(Indirect Offset)</text>

  <!-- Step 1: Column Array Indexing -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="200" height="150" fill="#fff" stroke="#78909c" stroke-width="2" rx="4"/>
    <rect x="0" y="0" width="200" height="30" fill="#cfd8dc" rx="2"/>
    <text x="100" y="20" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#37474f" text-anchor="middle">df.columns (Array)</text>
    
    <!-- Array elements horizontally -->
    <rect x="10" y="50" width="55" height="30" fill="#eceff1" rx="2"/>
    <text x="37" y="45" font-family="Courier New, monospace" font-size="10" fill="#999" text-anchor="middle">i=0</text>
    <text x="37" y="70" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">'A'</text>

    <!-- Target Element -->
    <rect x="75" y="45" width="55" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="2"/>
    <text x="102" y="40" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">i=1</text>
    <text x="102" y="70" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">'B'</text>

    <rect x="140" y="50" width="50" height="30" fill="#eceff1" rx="2"/>
    <text x="165" y="45" font-family="Courier New, monospace" font-size="10" fill="#999" text-anchor="middle">i=2</text>
    <text x="165" y="70" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">'C'</text>
    
    <!-- Code Snippet -->
    <rect x="35" y="105" width="130" height="30" fill="#fff3e0" stroke="#ffb74d" rx="4"/>
    <text x="100" y="125" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#d84315" text-anchor="middle">df.columns[1]</text>
  </g>

  <!-- Arrow 1 (Passes string) -->
  <g stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arrow-orange)">
    <path d="M 235 120 C 250 120, 260 120, 275 120" />
  </g>
  <text x="255" y="110" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">'B'</text>

  <!-- Step 2: loc[] referencing -->
  <g transform="translate(285, 60)">
    <rect x="0" y="0" width="150" height="150" fill="#fff" stroke="#ffb74d" stroke-width="2" rx="4"/>
    <rect x="0" y="0" width="150" height="30" fill="#ffe0b2" rx="2"/>
    <text x="75" y="20" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">.loc[ :, Key ]</text>

    <!-- Function block -->
    <rect x="15" y="50" width="120" height="80" fill="#fff3e0" stroke="#ff9800" stroke-dasharray="4,4" rx="5"/>
    <text x="75" y="75" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Axis 0: All (:)</text>
    <line x1="25" y1="85" x2="125" y2="85" stroke="#ffb74d" stroke-width="1"/>
    <text x="75" y="105" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Axis 1 Matching</text>
    <text x="75" y="120" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#d84315" text-anchor="middle">Key = 'B'</text>
  </g>

  <!-- Arrow 2 (Extracts vector) -->
  <g stroke="#4caf50" stroke-width="3" fill="none" marker-end="url(#arrow-green)">
    <path d="M 440 120 C 455 120, 470 120, 485 120" />
  </g>

  <!-- Step 3: Extracted Vector -->
  <g transform="translate(495, 60)">
    <rect x="0" y="0" width="120" height="150" fill="#fff" stroke="#81c784" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="120" height="30" fill="#c8e6c9" rx="2"/>
    <text x="60" y="20" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Column Vector</text>

    <!-- Column Data -->
    <text x="60" y="45" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">Name: 'B'</text>
    <line x1="20" y1="55" x2="100" y2="55" stroke="#a5d6a7" stroke-width="1"/>

    <text x="60" y="75" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">[ 10 ]</text>
    <text x="60" y="95" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">[ 20 ]</text>
    <text x="60" y="115" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">[ 30 ]</text>
    
    <rect x="5" y="125" width="110" height="20" fill="#e8f5e9" rx="2"/>
    <text x="60" y="139" font-family="Courier New, monospace" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">.loc[:, df.columns[1]]</text>
  </g>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
  </defs>
</svg>
