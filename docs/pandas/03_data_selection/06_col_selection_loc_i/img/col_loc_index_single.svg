<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: 첫 번째 열만 추출하기 (Series 반환)</text>

  <!-- 파이썬 명령 스텝 1 -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="230" height="60" fill="#E0F7FA" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="2"/>
    <text x="115" y="20" font-family="sans-serif" font-size="12" fill="#006064" font-weight="bold" text-anchor="middle">Step 1. 열 이름 알아내기</text>
    <text x="115" y="45" font-family="monospace" font-size="18" fill="#00838F" font-weight="bold" text-anchor="middle">pf.columns[<tspan fill="#FF5252">0</tspan>]</text>
  </g>

  <path d="M 155 140 L 155 180" fill="none" stroke="#00BCD4" stroke-width="4" stroke-dasharray="5,5" />
  <polygon points="150,175 155,185 160,175" fill="#00BCD4" />
  <rect x="165" y="150" width="80" height="25" fill="#FFF8E1" rx="5" stroke="#FFC107" stroke-width="1"/>
  <text x="205" y="167" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">'중간'</text>

  <!-- 파이썬 명령 스텝 2 (loc 함수에 전달) -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="250" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="125" y="20" font-family="sans-serif" font-size="12" fill="#81C784" font-weight="bold" text-anchor="middle">Step 2. loc 두 번째 인자로 전달</text>
    <text x="125" y="45" font-family="monospace" font-size="18" fill="#FFF" font-weight="bold" text-anchor="middle">pf.loc[:, <tspan fill="#FFC107">'중간'</tspan>]</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(290, 230)">
    <path d="M 0 0 L 110 0" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="105,-7 115,0 105,7" fill="#4CAF50" />
    <text x="55" y="-10" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">반환 포맷</text>
    <text x="55" y="15" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">Series 형식</text>
  </g>

  <!-- 추출된 데이터 (Series) -->
  <g transform="translate(450, 70)">
    <rect x="0" y="0" width="120" height="190" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="2" stroke-dasharray="4,4"/>
    <rect x="0" y="0" width="120" height="30" fill="#FFE0B2" rx="3" />
    <text x="60" y="20" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">Series</text>

    <!-- 인덱스 (이름) -->
    <rect x="10" y="40" width="50" height="140" fill="#FFF3E0" rx="3" />
    <text x="35" y="65" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="35" y="100" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="35" y="135" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="35" y="170" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>

    <!-- 값 -->
    <text x="90" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">25</text>
    <text x="90" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    <text x="90" y="135" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="90" y="170" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">12</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E0F7FA" rx="10" stroke="#00BCD4" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#006064" font-weight="bold" text-anchor="middle">단일 열만 우회적으로 추출했기 때문에 반환 형식은 1차원 Series 가 됩니다.</text>
  </g>

</svg>
