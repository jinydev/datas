<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">4단계: 번호 배열(.index, .columns)을 조합하여 동적 조준하기</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="380" height="80" fill="#263238" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="2"/>
    <text x="10" y="35" font-family="monospace" font-size="16" fill="#82AAFF" font-weight="bold">pf.loc[</text>
    <text x="80" y="35" font-family="monospace" font-size="16" fill="#FF5252" font-weight="bold">pf.index[0:3]</text>
    <text x="210" y="35" font-family="monospace" font-size="16" fill="#82AAFF" font-weight="bold">,</text>
    <text x="230" y="35" font-family="monospace" font-size="16" fill="#FFA000" font-weight="bold">pf.columns[2:]</text>
    <text x="370" y="35" font-family="monospace" font-size="16" fill="#82AAFF" font-weight="bold">]</text>

    <!-- 번역 1 (행) -->
    <path d="M 140 45 L 140 60" fill="none" stroke="#FFCDD2" stroke-width="2" />
    <text x="140" y="70" font-family="sans-serif" font-size="11" fill="#FF8A80" text-anchor="middle">['윤일형', '강수희', '홍소희']</text>

    <!-- 번역 2 (열) -->
    <path d="M 290 45 L 290 60" fill="none" stroke="#FFE082" stroke-width="2" />
    <text x="290" y="70" font-family="sans-serif" font-size="11" fill="#FFD54F" text-anchor="middle">['과제', '출석']</text>
  </g>

  <!-- 내부 번역 과정 애로우 -->
  <g transform="translate(410, 110)">
    <path d="M 0 0 L 50 0" fill="none" stroke="#00BCD4" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="45,-7 55,0 45,7" fill="#00BCD4" />
    <text x="25" y="-10" font-family="sans-serif" font-size="10" fill="#0097A7" font-weight="bold" text-anchor="middle">결과적으로</text>
    <text x="25" y="15" font-family="sans-serif" font-size="10" fill="#0097A7" font-weight="bold" text-anchor="middle">이름 기반 십자선 교차!</text>
  </g>

  <!-- 파생된 데이터프레임 -->
  <g transform="translate(480, 80)">
    <rect x="-30" y="0" width="160" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="2"/>
    
    <rect x="30" y="0" width="100" height="30" fill="#E0F7FA" rx="3" stroke="#80DEEA" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#006064" font-weight="bold" text-anchor="middle">과제</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#006064" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 -->
    <rect x="-30" y="30" width="60" height="120" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="85" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="115" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>

    <!-- 값 -->
    <!-- 과제 -->
    <text x="60" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="60" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="60" y="115" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>

    <!-- 출석 -->
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    <text x="100" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">20</text>
    <text x="100" y="115" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">19</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-290" y="-15" width="580" height="35" fill="#E0F7FA" rx="10" stroke="#00BCD4" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#006064" font-weight="bold" text-anchor="middle">이론상 .loc 내부에서 문자열 리스트로 변환되어 동작하므로 모든 블럭을 호환하여 조립할 수 있습니다.</text>
  </g>

</svg>
