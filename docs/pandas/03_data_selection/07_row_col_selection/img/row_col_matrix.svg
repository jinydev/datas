<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">3단계: 행과 열 모두 범위로 자르기 (DataFrame 부분 행렬)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(30, 130)">
    <rect x="0" y="0" width="350" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="175" y="35" font-family="monospace" font-size="16" fill="#CE93D8" font-weight="bold" text-anchor="middle">pf.loc['윤일형':'유한빈', '기말':'과제']</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(400, 150)">
    <path d="M 0 10 L 60 10" fill="none" stroke="#9C27B0" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="55,3 65,10 55,17" fill="#9C27B0" />
    <text x="30" y="-10" font-family="sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold" text-anchor="middle">다수 x 다수</text>
    <text x="30" y="35" font-family="sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold" text-anchor="middle">면적 추출!</text>
  </g>

  <!-- 교차점이 만들어낸 부분 데이터프레임 -->
  <g transform="translate(480, 80)">
    <rect x="-30" y="0" width="140" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-dasharray="4,4"/>
    <text x="40" y="-10" font-family="monospace" font-size="14" fill="#7B1FA2" font-weight="bold" text-anchor="middle">DataFrame 반환</text>
    
    <rect x="30" y="0" width="80" height="30" fill="#F3E5F5" rx="3" stroke="#CE93D8" stroke-width="1"/>
    <text x="50" y="20" font-family="sans-serif" font-size="11" fill="#4A148C" font-weight="bold" text-anchor="middle">기말</text>
    <text x="90" y="20" font-family="sans-serif" font-size="11" fill="#4A148C" font-weight="bold" text-anchor="middle">과제</text>

    <!-- 인덱스 -->
    <rect x="-30" y="30" width="60" height="120" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="85" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="115" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="0" y="142" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>

    <!-- 값 -->
    <text x="50" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="90" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    
    <text x="50" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="90" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    
    <text x="50" y="115" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="90" y="115" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>

    <text x="50" y="142" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">22</text>
    <text x="90" y="142" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">9</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#F3E5F5" rx="10" stroke="#CE93D8" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">복수의 행렬이 교차하면 표의 형태를 그대로 유지한 작은 덩어리가 됩니다.</text>
  </g>

</svg>
