<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">3단계: 비연속적인 열을 리스트로 핀셋 추출하기</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(30, 130)">
    <rect x="0" y="0" width="280" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="140" y="35" font-family="monospace" font-size="16" fill="#81D4FA" font-weight="bold" text-anchor="middle">pf.loc[:, ['기말', '출석']]</text>
    
    <!-- 핀셋 모형 (간단히 선으로) -->
    <path d="M 120 40 L 120 70 L 160 70 M 120 70 L 80 70" fill="none" stroke="#FFCA28" stroke-width="2" />
    <text x="120" y="85" font-family="sans-serif" font-size="12" fill="#FFA000" font-weight="bold" text-anchor="middle">리스트 넘기기</text>
  </g>

  <!-- 컬럼 범위 화살표 (두 가닥이 분리됨) -->
  <g transform="translate(310, 140)">
    <path d="M 0 0 L 80 -20" fill="none" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,5" />
    <polygon points="75,-16 80,-20 75,-24" fill="#2196F3" transform="rotate(345 80 -20)" />
    
    <path d="M 0 20 L 80 40" fill="none" stroke="#2196F3" stroke-width="3" stroke-dasharray="5,5" />
    <polygon points="75,36 80,40 75,44" fill="#2196F3" transform="rotate(15 80 40)" />
  </g>

  <!-- 파생된 데이터프레임 (DataFrame) -->
  <g transform="translate(430, 80)">
    <rect x="-30" y="0" width="140" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#0D47A1" stroke-width="2"/>
    
    <!-- 컬럼명 -->
    <rect x="30" y="0" width="80" height="30" fill="#E3F2FD" rx="3" stroke="#2196F3" stroke-width="1"/>
    <text x="50" y="20" font-family="sans-serif" font-size="11" fill="#0D47A1" font-weight="bold" text-anchor="middle">기말</text>
    <text x="90" y="20" font-family="sans-serif" font-size="11" fill="#0D47A1" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 -->
    <rect x="-30" y="30" width="60" height="120" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="60" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="95" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="130" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>

    <!-- 값 -->
    <text x="50" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="90" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    
    <text x="50" y="95" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="90" y="95" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">20</text>
    
    <text x="50" y="130" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="90" y="130" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">19</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E1F5FE" rx="10" stroke="#03A9F4" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#0277BD" font-weight="bold" text-anchor="middle">열 이름들을 대괄호 [ ] 로 한 번 더 묶어서 전달해주면 DataFrame을 얻습니다.</text>
  </g>

</svg>
