<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: 한 과목(열)만 추출 (Series 반환)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="220" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="110" y="35" font-family="monospace" font-size="18" fill="#81C784" font-weight="bold" text-anchor="middle">pf.loc[:, '과제']</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(290, 150)">
    <path d="M 0 10 L 80 10" fill="none" stroke="#FF9800" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,3 85,10 75,17" fill="#FF9800" />
    <text x="40" y="-10" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">단일 열 추출</text>
    <text x="40" y="35" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">Series 로 강등</text>
  </g>

  <!-- 파생된 시리즈 (Series) -->
  <g transform="translate(420, 70)">
    <rect x="0" y="0" width="120" height="150" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FFB300" stroke-width="2"/>
    <text x="60" y="-10" font-family="monospace" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">Series 형식</text>
    
    <rect x="0" y="0" width="120" height="30" fill="#FFE0B2" rx="3" />
    <text x="60" y="20" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">과제</text>

    <!-- 인덱스 -->
    <rect x="0" y="30" width="60" height="120" fill="#FFF3E0" rx="3" />
    <text x="30" y="60" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="30" y="95" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="30" y="130" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>

    <!-- 값 -->
    <text x="90" y="60" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="90" y="95" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="90" y="130" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">10</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">pf['과제'] 와 똑같은 결과를 1차원 Series 자료형으로 반환합니다.</text>
  </g>

</svg>
