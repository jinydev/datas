<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: 열 이름(Name)을 기준으로 슬라이싱 하기</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(40, 130)">
    <rect x="0" y="0" width="260" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#E91E63" stroke-width="2"/>
    <text x="130" y="35" font-family="monospace" font-size="16" fill="#F48FB1" font-weight="bold" text-anchor="middle">pf.loc[:, '중간':'과제']</text>
    
    <text x="130" y="-10" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">끝점('과제' 열) 포함!</text>
  </g>

  <!-- 컬럼 범위 화살표 (중간 ~ 과제) -->
  <g transform="translate(320, 150)">
    <path d="M 0 10 L 80 10" fill="none" stroke="#E91E63" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,3 85,10 75,17" fill="#E91E63" />
  </g>

  <!-- 파생된 데이터프레임 (DataFrame) -->
  <g transform="translate(420, 90)">
    <rect x="-30" y="0" width="180" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#E91E63" stroke-dasharray="4,4"/>
    
    <!-- 컬럼명 -->
    <rect x="30" y="0" width="120" height="30" fill="#FCE4EC" rx="3" stroke="#F48FB1" stroke-width="1"/>
    <text x="50" y="20" font-family="sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">중간</text>
    <text x="90" y="20" font-family="sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">기말</text>
    
    <rect x="110" y="5" width="40" height="20" fill="#FFF59D" rx="3" stroke="#FBC02D" stroke-width="2" />
    <text x="130" y="20" font-family="sans-serif" font-size="11" fill="#D32F2F" font-weight="bold" text-anchor="middle">과제</text>

    <!-- 인덱스 -->
    <rect x="-30" y="30" width="60" height="120" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="60" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="95" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="130" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>

    <!-- 값 -->
    <text x="50" y="60" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">25</text>
    <text x="90" y="60" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">35</text>
    <text x="130" y="60" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">8</text>
    
    <text x="50" y="95" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">18</text>
    <text x="90" y="95" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">27</text>
    <text x="130" y="95" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">10</text>
    
    <text x="50" y="130" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">17</text>
    <text x="90" y="130" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">17</text>
    <text x="130" y="130" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">10</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#FCE4EC" rx="10" stroke="#E91E63" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#C2185B" font-weight="bold" text-anchor="middle">레이블 슬라이싱 규칙에 따라 무조건 '마지막 지정한 열' 도 포함됩니다.</text>
  </g>

</svg>
