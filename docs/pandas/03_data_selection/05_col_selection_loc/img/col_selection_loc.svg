<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.loc [ 행 , 열 ] 구조에서 콤마(,) 뒤에 열 이름표 명시하기</text>

  <!-- 파이썬 문법 박스 -->
  <g transform="translate(60, 60)">
    <rect x="-10" y="0" width="300" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="2"/>
    <text x="50" y="38" font-family="monospace" font-size="26" fill="#82AAFF" font-weight="bold">pf.loc[ <tspan fill="#FF5252">:</tspan> <tspan fill="#82AAFF">,</tspan> <tspan fill="#FFCA28">'과제'</tspan> ]</text>
  </g>

  <!-- 파라미터 설명 -->
  <g transform="translate(130, 130)">
    <!-- 첫 번째 파라미터 (행: 전부 다) -->
    <path d="M 0 0 L -30 30" fill="none" stroke="#FF5252" stroke-width="2" />
    <rect x="-70" y="30" width="80" height="25" fill="#FFEbee" rx="3" stroke="#FFCDD2" />
    <text x="-30" y="47" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">행(Row) 전부</text>
    
    <!-- 두 번째 파라미터 (열 지정) -->
    <path d="M 50 0 L 80 30" fill="none" stroke="#FFA000" stroke-width="2" />
    <rect x="50" y="30" width="80" height="25" fill="#FFF8E1" rx="3" stroke="#FFE082" />
    <text x="90" y="47" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">대상 열(Col)</text>
  </g>

  <!-- 출석부 애니메이션 묘사 -->
  <g transform="translate(420, 80)">
    <!-- 전체 DataFrame -->
    <rect x="-30" y="0" width="220" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="2"/>
    <text x="80" y="-15" font-family="monospace" font-size="14" fill="#0097A7" font-weight="bold" text-anchor="middle">원본 표 (pf)</text>
    
    <!-- 컬럼명 -->
    <rect x="30" y="0" width="160" height="30" fill="#E0F7FA" rx="3" stroke="#80DEEA" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#006064" font-weight="bold" text-anchor="middle">중간</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#006064" font-weight="bold" text-anchor="middle">기말</text>
    <!-- 추출 대상 (과제) 강조 -->
    <rect x="120" y="5" width="40" height="140" fill="#FFF59D" rx="3" stroke="#FBC02D" stroke-width="3" stroke-dasharray="4,4"/>
    <text x="140" y="20" font-family="sans-serif" font-size="11" fill="#F57F17" font-weight="bold" text-anchor="middle">과제</text>
    <text x="175" y="20" font-family="sans-serif" font-size="11" fill="#006064" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 (행 전체 선택을 보여주기 위해 투명도 없이 다 그림) -->
    <rect x="-30" y="30" width="60" height="120" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#FF5252" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="85" font-family="sans-serif" font-size="10" fill="#FF5252" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="115" font-family="sans-serif" font-size="10" fill="#FF5252" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="-45" y="85" font-family="monospace" font-size="20" fill="#FF5252" font-weight="bold" text-anchor="middle">:</text>

    <!-- 값 -->
    <!-- 중간 -->
    <text x="60" y="55" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">25</text>
    <text x="60" y="85" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">18</text>
    <text x="60" y="115" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">17</text>
    
    <!-- 기말 -->
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">35</text>
    <text x="100" y="85" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">27</text>
    <text x="100" y="115" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">17</text>

    <!-- 과제 (추출될 열) -->
    <text x="140" y="55" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">8</text>
    <text x="140" y="85" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">10</text>
    <text x="140" y="115" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">10</text>

    <!-- 출석 -->
    <text x="175" y="55" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">18</text>
    <text x="175" y="85" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">20</text>
    <text x="175" y="115" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">19</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(300, 160)">
    <path d="M 0 0 Q 30 -50 90 -20" fill="none" stroke="#F57F17" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="85,-27 95,-20 85,-13" fill="#F57F17" transform="rotate(27 90 -20)" />
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E0F7FA" rx="10" stroke="#00BCD4" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#006064" font-weight="bold" text-anchor="middle">콜론(:) 으로 가로줄 전체를 허용하고, 콤마(,) 뒤에 열 위치를 명시합니다.</text>
  </g>

</svg>
