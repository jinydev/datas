<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">다차원 배열의 메모리 오프셋 참조(Memory Offset Indexing)</text>

  <!-- Left: Matrix with labels being ignored and numbers used -->
  <g transform="translate(140, 70)">
    <rect x="0" y="0" width="200" height="150" fill="#fff" stroke="#90a4ae" stroke-width="2" rx="4"/>
    
    <!-- Meta Labels (Ignored) -->
    <!-- Column Labels -->
    <rect x="50" y="5" width="40" height="20" fill="#f5f5f5" rx="2"/>
    <text x="70" y="19" font-family="Courier New, monospace" font-size="12" fill="#ccc" text-anchor="middle" text-decoration="line-through">'C1'</text>
    
    <rect x="95" y="5" width="40" height="20" fill="#f5f5f5" rx="2"/>
    <text x="115" y="19" font-family="Courier New, monospace" font-size="12" fill="#ccc" text-anchor="middle" text-decoration="line-through">'C2'</text>
    
    <rect x="140" y="5" width="40" height="20" fill="#f5f5f5" rx="2"/>
    <text x="160" y="19" font-family="Courier New, monospace" font-size="12" fill="#ccc" text-anchor="middle" text-decoration="line-through">'C3'</text>

    <!-- Row Labels -->
    <rect x="5" y="30" width="40" height="30" fill="#f5f5f5" rx="2"/>
    <text x="25" y="49" font-family="Courier New, monospace" font-size="12" fill="#ccc" text-anchor="middle" text-decoration="line-through">'R1'</text>

    <rect x="5" y="65" width="40" height="30" fill="#f5f5f5" rx="2"/>
    <text x="25" y="84" font-family="Courier New, monospace" font-size="12" fill="#ccc" text-anchor="middle" text-decoration="line-through">'R2'</text>

    <rect x="5" y="100" width="40" height="40" fill="#f5f5f5" rx="2"/>
    <text x="25" y="124" font-family="Courier New, monospace" font-size="12" fill="#ccc" text-anchor="middle" text-decoration="line-through">'R3'</text>

    <!-- Physical Memory Offsets (0, 1, 2) -->
    <!-- Col Offsets -->
    <text x="70" y="-5" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#0288d1" text-anchor="middle">Col 0</text>
    <text x="115" y="-5" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#0288d1" text-anchor="middle">Col 1</text>
    <rect x="140" y="-18" width="40" height="15" fill="#e1f5fe" rx="2"/>
    <text x="160" y="-5" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#0288d1" text-anchor="middle">Col 2</text>

    <!-- Row Offsets -->
    <text x="-20" y="49" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#0288d1" text-anchor="middle">Row 0</text>
    <rect x="-40" y="70" width="40" height="15" fill="#e1f5fe" rx="2"/>
    <text x="-20" y="82" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#0288d1" text-anchor="middle">Row 1</text>
    <text x="-20" y="124" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#0288d1" text-anchor="middle">Row 2</text>

    <!-- Grid Data -->
    <text x="70" y="50" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">10</text>
    <text x="115" y="50" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">15</text>
    <text x="160" y="50" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">20</text>

    <text x="70" y="85" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">30</text>
    <text x="115" y="85" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">35</text>
    
    <!-- Target Cell (1, 2) -->
    <rect x="140" y="65" width="40" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="160" y="85" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">40</text>

    <text x="70" y="125" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">50</text>
    <text x="115" y="125" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">55</text>
    <text x="160" y="125" font-family="Courier New, monospace" font-size="12" fill="#999" text-anchor="middle">60</text>

    <!-- Crosshair Lines for Offsets -->
    <line x1="0" y1="80" x2="140" y2="80" stroke="#0288d1" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="160" y1="0" x2="160" y2="65" stroke="#0288d1" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Arrow -->
  <g stroke="#0288d1" stroke-width="3" fill="none" marker-end="url(#arrow-blue)">
    <path d="M 360 145 L 410 145" />
  </g>
  <rect x="360" y="100" width="90" height="30" fill="#fff" stroke="#ccc" rx="15"/>
  <text x="405" y="120" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">.iloc[1, 2]</text>

  <!-- Right: Result -->
  <g transform="translate(450, 95)">
    <rect x="0" y="0" width="80" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="4" filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.15))"/>
    <text x="40" y="32" font-family="Courier New, monospace" font-size="24" font-weight="bold" fill="#e65100" text-anchor="middle">40</text>
  </g>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0288d1" />
    </marker>
  </defs>
</svg>
