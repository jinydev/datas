<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 극장에서 좌석 번호(좌표)로 예매하기</text>

  <!-- Left: Theater seating map -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="200" height="150" fill="#fff" stroke="#9e9e9e" stroke-width="2" rx="10"/>
    
    <rect x="30" y="10" width="140" height="20" fill="#cfd8dc" rx="5"/>
    <text x="100" y="24" font-family="Arial" font-size="12" font-weight="bold" fill="#455a64" text-anchor="middle">SCREEN</text>

    <!-- Coordinate labels -->
    <text x="40" y="45" font-family="Arial" font-size="10" fill="#757575">열0</text>
    <text x="100" y="45" font-family="Arial" font-size="10" fill="#757575">열1</text>
    <text x="160" y="45" font-family="Arial" font-size="10" font-weight="bold" fill="#0288d1">열2</text>

    <text x="10" y="75" font-family="Arial" font-size="10" fill="#757575">행0</text>
    <text x="10" y="115" font-family="Arial" font-size="10" font-weight="bold" fill="#0288d1">행1</text>
    <text x="10" y="155" font-family="Arial" font-size="10" fill="#757575">행2</text>

    <!-- Seats -->
    <!-- Row 0 -->
    <rect x="25" y="55" width="30" height="30" fill="#e0e0e0" rx="3"/>
    <rect x="85" y="55" width="30" height="30" fill="#e0e0e0" rx="3"/>
    <rect x="145" y="55" width="30" height="30" fill="#e0e0e0" rx="3"/>

    <!-- Row 1 -->
    <rect x="25" y="95" width="30" height="30" fill="#e0e0e0" rx="3"/>
    <rect x="85" y="95" width="30" height="30" fill="#e0e0e0" rx="3"/>
    
    <!-- Target Seat: Row 1, Col 2 -->
    <rect x="145" y="95" width="30" height="30" fill="#ffb74d" stroke="#f57f17" stroke-width="2" rx="3"/>
    <circle cx="160" cy="110" r="10" fill="#fff"/>
    <path d="M 155 110 L 158 115 L 166 105" stroke="#f57f17" stroke-width="2" fill="none"/>

    <!-- Row 2 -->
    <rect x="25" y="135" width="30" height="30" fill="#e0e0e0" rx="3"/>
    <rect x="85" y="135" width="30" height="30" fill="#e0e0e0" rx="3"/>
    <rect x="145" y="135" width="30" height="30" fill="#e0e0e0" rx="3"/>
  </g>

  <!-- Middle: Customer asking -->
  <g transform="translate(300, 100)">
    <path d="M 0 10 L 20 -10 L 20 30 Z" fill="#e1f5fe"/>
    <rect x="20" y="-20" width="120" height="60" fill="#e1f5fe" stroke="#81d4fa" rx="10"/>
    <text x="80" y="0" font-family="Arial" font-size="12" font-weight="bold" fill="#0277bd" text-anchor="middle">"누가 앉아있든</text>
    <text x="80" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#0277bd" text-anchor="middle">상관없이, 무조건</text>
    <text x="80" y="40" font-family="Arial" font-size="14" font-weight="bold" fill="#01579b" text-anchor="middle">행1 열2 표 주세요!"</text>
  </g>

  <!-- Right: Ticket Agent / Code -->
  <g transform="translate(460, 80)">
    <rect x="0" y="0" width="140" height="100" fill="#fff" stroke="#ffb74d" stroke-width="3" rx="5" filter="drop-shadow(3px 3px 5px rgba(0,0,0,0.1))"/>
    
    <!-- Ticket header -->
    <rect x="0" y="0" width="140" height="30" fill="#ffe0b2" rx="3"/>
    <text x="70" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">예매 티켓</text>

    <!-- Code representation -->
    <rect x="10" y="45" width="120" height="40" fill="#f5f5f5" stroke="#e0e0e0" rx="4"/>
    <text x="70" y="70" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d32f2f" text-anchor="middle">.iloc[1, 2]</text>
  </g>

</svg>
