<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 거대한 책상(DataFrame)에서 원하는 서랍(Series)만 쑤욱 당겨보기</text>

  <!-- Left: Filing Cabinet (DataFrame) -->
  <g transform="translate(100, 80)">
    <!-- Cabinet Body -->
    <rect x="0" y="0" width="160" height="140" fill="#d7ccc8" stroke="#8d6e63" stroke-width="3" rx="5" filter="drop-shadow(3px 4px 5px rgba(0,0,0,0.3))"/>
    <text x="80" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#5d4037" text-anchor="middle">성적표 책상 (DataFrame)</text>

    <!-- Drawer 1 (Top) -->
    <rect x="10" y="15" width="140" height="35" fill="#a1887f" stroke="#5d4037" stroke-width="2" rx="2"/>
    <rect x="60" y="25" width="40" height="6" fill="#eceff1" rx="2"/>
    <text x="80" y="42" font-family="Arial" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">과제 점수</text>

    <!-- Drawer 2 (Middle - Being pulled out) -->
    <g transform="translate(40, -5)" filter="drop-shadow(4px 4px 6px rgba(0,0,0,0.4))">
      <!-- Pulled drawer side/back for depth -->
      <path d="M 10 55 L 140 55 L 155 70 L 25 70 Z" fill="#bcaaa4" stroke="#5d4037" stroke-width="1"/>
      <path d="M 140 55 L 140 90 L 155 105 L 155 70 Z" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
      
      <!-- Drawer Front -->
      <rect x="10" y="55" width="140" height="35" fill="#ffb74d" stroke="#e65100" stroke-width="2" rx="2"/>
      <rect x="60" y="65" width="40" height="6" fill="#fff" rx="2"/>
      <text x="80" y="82" font-family="Arial" font-size="12" font-weight="bold" fill="#b71c1c" text-anchor="middle">중간고사</text>
      
      <!-- Paper inside pulled drawer -->
      <rect x="30" y="50" width="40" height="20" fill="#fff" transform="rotate(-10 30 50)"/>
      <text x="50" y="65" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">80점</text>
    </g>

    <!-- Drawer 3 (Bottom) -->
    <rect x="10" y="95" width="140" height="35" fill="#a1887f" stroke="#5d4037" stroke-width="2" rx="2"/>
    <rect x="60" y="105" width="40" height="6" fill="#eceff1" rx="2"/>
    <text x="80" y="122" font-family="Arial" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">기말고사</text>
  </g>

  <!-- Arrow -->
  <g stroke="#ff9800" stroke-width="4" fill="none" stroke-dasharray="5,5" marker-end="url(#arrow-orange)">
    <path d="M 330 135 C 380 135, 400 135, 450 135" />
  </g>
  <text x="390" y="125" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">당기기 ['중간']</text>

  <!-- Right: Pulled Drawer Content (Series) -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="80" height="150" fill="#fff3e0" stroke="#e65100" stroke-width="3" rx="5" filter="drop-shadow(4px 4px 6px rgba(0,0,0,0.2))"/>
    
    <rect x="0" y="0" width="80" height="35" fill="#ffb74d" rx="4"/>
    <text x="40" y="23" font-family="Arial" font-size="14" font-weight="bold" fill="#b71c1c" text-anchor="middle">중간고사</text>

    <!-- Content -->
    <line x1="0" y1="35" x2="80" y2="35" stroke="#e65100" stroke-width="2"/>
    
    <text x="15" y="60" font-family="Arial" font-size="12" font-weight="bold" fill="#666">윤일형</text>
    <text x="65" y="60" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="end">25</text>
    <line x1="10" y1="70" x2="70" y2="70" stroke="#ffcc80" stroke-width="1"/>

    <text x="15" y="90" font-family="Arial" font-size="12" font-weight="bold" fill="#666">강수희</text>
    <text x="65" y="90" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="end">18</text>
    <line x1="10" y1="100" x2="70" y2="100" stroke="#ffcc80" stroke-width="1"/>

    <text x="15" y="120" font-family="Arial" font-size="12" font-weight="bold" fill="#666">홍소희</text>
    <text x="65" y="120" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="end">17</text>
    <line x1="10" y1="130" x2="70" y2="130" stroke="#ffcc80" stroke-width="1"/>

    <text x="40" y="145" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">1차원 Series 반환</text>
  </g>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
