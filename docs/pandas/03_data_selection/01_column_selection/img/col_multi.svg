<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">여러 열을 동시에! 대괄호 두 겹 [[ ]] 사용하기</text>

  <!-- 파이썬 코드 박스 -->
  <g transform="translate(40, 130)">
    <rect x="0" y="0" width="220" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="110" y="35" font-family="monospace" font-size="16" fill="#81D4FA" font-weight="bold" text-anchor="middle">pf[['기말', '출석']]</text>
    <path d="M 40 -10 Q 55 -30 75 -10" fill="none" stroke="#FFCA28" stroke-width="2" />
    <path d="M 210 -10 Q 195 -30 175 -10" fill="none" stroke="#FFCA28" stroke-width="2" />
    <text x="110" y="-35" font-family="sans-serif" font-size="12" fill="#FFCA28" font-weight="bold" text-anchor="middle">리스트 [ ] 를 한 번 더!</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(260, 150)">
    <path d="M 0 10 L 100 10" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="95,3 105,10 95,17" fill="#2196F3" />
    <text x="50" y="-5" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">다중 열 동시 추출</text>
    <text x="50" y="30" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">표의 형태 유지!</text>
  </g>

  <!-- 파생된 데이터프레임 (DataFrame) -->
  <g transform="translate(380, 60)">
    <rect x="0" y="0" width="240" height="200" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#0D47A1" stroke-width="2"/>
    
    <!-- 컬럼명 -->
    <rect x="60" y="0" width="180" height="30" fill="#E3F2FD" rx="3" stroke="#2196F3" stroke-width="1"/>
    <text x="105" y="20" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">기말</text>
    <text x="195" y="20" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 -->
    <rect x="0" y="30" width="60" height="170" fill="#FFF3E0" rx="3" />
    <text x="30" y="55" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="30" y="85" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="30" y="115" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="30" y="145" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="30" y="175" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 값 -->
    <!-- 기말 -->
    <text x="105" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="105" y="85" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="105" y="115" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="105" y="145" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">22</text>
    <text x="105" y="175" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">34</text>
    
    <!-- 출석 -->
    <text x="195" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    <text x="195" y="85" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">20</text>
    <text x="195" y="115" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">19</text>
    <text x="195" y="145" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">20</text>
    <text x="195" y="175" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">16</text>

    <text x="210" y="-10" font-family="monospace" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">DataFrame 형식</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 300)">
    <rect x="-240" y="-15" width="480" height="35" fill="#E1F5FE" rx="10" stroke="#03A9F4" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#0277BD" font-weight="bold" text-anchor="middle">여러 개를 부르면 여전히 표 모양인 DataFrame 구조기 유지됩니다.</text>
  </g>

</svg>
