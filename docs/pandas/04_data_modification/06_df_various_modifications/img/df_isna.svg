<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: 블랙홀 NaN 탐지 스캐너 가동 (.isna)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="180" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#FF5722" stroke-width="2"/>
    <text x="90" y="30" font-family="monospace" font-size="18" fill="#FFAB91" font-weight="bold" text-anchor="middle">df.isna()</text>
  </g>

  <!-- 왼쪽: 불완전 데이터 표 -->
  <g transform="translate(80, 150)">
    <rect x="-30" y="-10" width="200" height="120" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-width="2"/>
    <text x="70" y="-25" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">짝이 안맞아 이빨빠진 표</text>

    <!-- 인덱스와 컬럼 -->
    <rect x="40" y="10" width="110" height="20" fill="#ECEFF1" rx="3" />
    <text x="55" y="24" font-family="sans-serif" font-size="10" fill="#78909C" text-anchor="middle">수학</text>
    <text x="95" y="24" font-family="sans-serif" font-size="10" fill="#78909C" text-anchor="middle">영어</text>
    <rect x="120" y="8" width="30" height="24" fill="#FFEBEE" rx="3" stroke="#EF5350" stroke-width="2"/>
    <text x="135" y="24" font-family="sans-serif" font-size="10" fill="#D32F2F" font-weight="bold" text-anchor="middle">과학</text>

    <rect x="-20" y="35" width="40" height="60" fill="#ECEFF1" rx="3" />
    <text x="0" y="55" font-family="sans-serif" font-size="11" fill="#78909C" text-anchor="middle">홍길동</text>
    <text x="0" y="80" font-family="sans-serif" font-size="11" fill="#78909C" text-anchor="middle">이순신</text>

    <!-- 값들 -->
    <text x="55" y="55" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">100</text>
    <text x="95" y="55" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">90</text>
    
    <text x="55" y="80" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">70</text>
    <text x="95" y="80" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">95</text>
    
    <text x="135" y="80" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">88</text>

    <!-- 구멍난 셀 (홍길동 과학) -->
    <rect x="120" y="40" width="30" height="20" fill="#FFCCBC" rx="3" stroke="#FF5722" stroke-dasharray="2,2"/>
    <text x="135" y="54" font-family="monospace" font-size="11" fill="#E64A19" font-weight="bold" text-anchor="middle">NaN</text>
  </g>

  <!-- 중앙: 레이저 스캐너 -->
  <g transform="translate(320, 190)">
    <path d="M 0 10 L 100 10" fill="none" stroke="#FF9800" stroke-width="12" stroke-linecap="round" opacity="0.3"/>
    <path d="M 0 10 L 60 10" fill="none" stroke="#FF5722" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="55,3 65,10 55,17" fill="#FF5722" />
    
    <text x="40" y="-15" font-family="sans-serif" font-size="12" fill="#E64A19" font-weight="bold" text-anchor="middle">지잉! (스캔 중)</text>
    <text x="40" y="-30" font-family="sans-serif" font-size="30" fill="#FF5722" text-anchor="middle">🔍</text>
  </g>

  <!-- 오른쪽: 스캔 결과 표 -->
  <g transform="translate(480, 150)">
    <rect x="-30" y="-10" width="200" height="120" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#FF5722" stroke-width="2"/>
    <text x="70" y="-25" font-family="sans-serif" font-size="12" fill="#E64A19" font-weight="bold" text-anchor="middle">결측치 지도 (Boolean Mask)</text>

    <rect x="40" y="10" width="110" height="20" fill="#FBE9E7" rx="3" />
    <text x="60" y="24" font-family="sans-serif" font-size="10" fill="#D84315" text-anchor="middle">수학</text>
    <text x="100" y="24" font-family="sans-serif" font-size="10" fill="#D84315" text-anchor="middle">영어</text>
    <text x="140" y="24" font-family="sans-serif" font-size="10" fill="#D84315" text-anchor="middle">과학</text>

    <rect x="-20" y="35" width="40" height="60" fill="#FBE9E7" rx="3" />
    <text x="0" y="55" font-family="sans-serif" font-size="11" fill="#D84315" text-anchor="middle">홍길동</text>
    <text x="0" y="80" font-family="sans-serif" font-size="11" fill="#D84315" text-anchor="middle">이순신</text>

    <!-- 값들 (True / False) -->
    <!-- 1행 수학 영어 과학 -->
    <text x="60" y="55" font-family="monospace" font-size="10" fill="#90A4AE" text-anchor="middle">False</text>
    <text x="100" y="55" font-family="monospace" font-size="10" fill="#90A4AE" text-anchor="middle">False</text>
    <rect x="120" y="42" width="40" height="15" fill="#FFE0B2" rx="3" stroke="#FF9800" />
    <text x="140" y="54" font-family="monospace" font-size="12" fill="#D84315" font-weight="bold" text-anchor="middle">True!</text>

    <!-- 2행 수학 영어 과학 -->
    <text x="60" y="80" font-family="monospace" font-size="10" fill="#90A4AE" text-anchor="middle">False</text>
    <text x="100" y="80" font-family="monospace" font-size="10" fill="#90A4AE" text-anchor="middle">False</text>
    <text x="140" y="80" font-family="monospace" font-size="10" fill="#90A4AE" text-anchor="middle">False</text>

    <!-- 구멍난 위치 연결선 -->
    <path d="M 120 49 Q 80 18 30 18" fill="none" stroke="#FF9800" stroke-width="2" />
    <text x="15" y="15" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold">이 위치 누락됨!</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#FBE9E7" rx="10" stroke="#FF5722" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#BF360C" font-weight="bold" text-anchor="middle">NaN은 빈 블랙홀 공간입니다. .isna() 엑스레이를 쬐어 구멍난 위치를 파악할 수 있습니다.</text>
  </g>

</svg>
