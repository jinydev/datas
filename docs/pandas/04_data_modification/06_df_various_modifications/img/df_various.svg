<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">DataFrame 전처리(Pre-processing) 공방</text>

  <!-- 중앙의 커다란 불량 데이터프레임 (수리 대상) -->
  <g transform="translate(260, 100)">
    <rect x="0" y="0" width="180" height="150" fill="#ECEFF1" rx="5" filter="url(#shadow)" stroke="#CFD8DC" stroke-width="2"/>
    
    <!-- 정상 데이터 -->
    <rect x="20" y="20" width="40" height="20" fill="#BBDEFB" rx="3" />
    <rect x="70" y="20" width="40" height="20" fill="#BBDEFB" rx="3" />
    
    <!-- 결측치 부분 -->
    <rect x="120" y="20" width="40" height="20" fill="#FFCCBC" rx="3" stroke="#FF5722" stroke-dasharray="2,2"/>
    <text x="140" y="34" font-family="monospace" font-size="10" fill="#E64A19" font-weight="bold" text-anchor="middle">NaN</text>

    <!-- 오타/잘못된 값 부분 -->
    <rect x="20" y="60" width="40" height="20" fill="#E1BEE7" rx="3" />
    <text x="40" y="74" font-family="sans-serif" font-size="10" fill="#8E24AA" font-weight="bold" text-anchor="middle">오타!</text>
    
    <!-- 정상 데이터들 -->
    <rect x="70" y="60" width="40" height="20" fill="#BBDEFB" rx="3" />
    <rect x="120" y="60" width="40" height="20" fill="#BBDEFB" rx="3" />
    <rect x="20" y="100" width="40" height="20" fill="#BBDEFB" rx="3" />
    
    <!-- 불필요한 행 (절단 예정) -->
    <rect x="70" y="100" width="90" height="20" fill="#CFD8DC" rx="3" />
    <text x="115" y="114" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold" text-anchor="middle">잘라낼 쓰레기</text>
  </g>

  <!-- 도구 1: 스포이드 (수정, 대입) -->
  <g transform="translate(100, 70)">
    <rect x="0" y="0" width="120" height="50" fill="#FFF" rx="25" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="60" y="20" font-family="sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold" text-anchor="middle">1. 수정/대입</text>
    <text x="60" y="38" font-family="monospace" font-size="10" fill="#9C27B0" text-anchor="middle">.loc = 새값</text>
    <path d="M 125 25 L 245 105" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="3,3" />
  </g>

  <!-- 도구 2: 돋보기 스캐너 (결측치 탐지) -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="120" height="50" fill="#FFF" rx="25" filter="url(#shadow)" stroke="#FF5722" stroke-width="2"/>
    <text x="60" y="20" font-family="sans-serif" font-size="12" fill="#E64A19" font-weight="bold" text-anchor="middle">2. 누락 탐지</text>
    <text x="60" y="38" font-family="monospace" font-size="10" fill="#FF5722" text-anchor="middle">.isna()</text>
    <path d="M -5 25 L -75 105" fill="none" stroke="#FF5722" stroke-width="2" stroke-dasharray="3,3" />
  </g>

  <!-- 도구 3: 가위 (제거) -->
  <g transform="translate(500, 200)">
    <rect x="0" y="0" width="120" height="50" fill="#FFF" rx="25" filter="url(#shadow)" stroke="#F44336" stroke-width="2"/>
    <text x="60" y="20" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">3. 쓰레기 절단</text>
    <text x="60" y="38" font-family="monospace" font-size="10" fill="#F44336" text-anchor="middle">.drop()</text>
    <path d="M -5 25 L -55 25" fill="none" stroke="#F44336" stroke-width="2" stroke-dasharray="3,3" />
  </g>

  <!-- 도구 4: 라벨기 (이름 교체) -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="120" height="50" fill="#FFF" rx="25" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="60" y="20" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">4. 라벨 교체</text>
    <text x="60" y="38" font-family="monospace" font-size="10" fill="#4CAF50" text-anchor="middle">.rename()</text>
    <!-- 가상 이름표로 선 연결 -->
    <path d="M 125 25 L 245 25" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="3,3" />
    <rect x="250" y="15" width="40" height="20" fill="#E8F5E9" rx="3" stroke="#4CAF50" />
    <text x="270" y="29" font-family="sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">새이름</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-290" y="-15" width="580" height="35" fill="#E0F7FA" rx="10" stroke="#00BCD4" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#006064" font-weight="bold" text-anchor="middle">더럽고 불완전한 현실의 데이터를 분석 가능한 형태(Clean Data)로 만드는 필수 4대 도구입니다.</text>
  </g>

</svg>
