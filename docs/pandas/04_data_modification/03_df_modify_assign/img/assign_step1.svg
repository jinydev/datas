<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: 기존 열들을 조합하여 새로운 연산 결과물(Series) 획득</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="380" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="2"/>
    <text x="190" y="30" font-family="monospace" font-size="16" fill="#FFF" font-weight="bold" text-anchor="middle">df2[[<tspan fill="#FFCC80">'사망'</tspan>, <tspan fill="#FFCC80">'부상'</tspan>]].<tspan fill="#FF9800">sum(axis=1)</tspan></text>
  </g>

  <!-- 원본 테이블에서 뽑아낸 2열을 가로로 합침 -->
  <g transform="translate(80, 150)">
    <!-- 컬럼명 -->
    <rect x="40" y="0" width="100" height="25" fill="#FFF3E0" rx="3" />
    <text x="65" y="17" font-family="sans-serif" font-size="11" fill="#E65100" text-anchor="middle">사망</text>
    <text x="115" y="17" font-family="sans-serif" font-size="11" fill="#E65100" text-anchor="middle">부상</text>

    <!-- 인덱스명 -->
    <rect x="-30" y="30" width="60" height="100" fill="#E0F7FA" rx="3" />
    <text x="0" y="50" font-family="sans-serif" font-size="10" fill="#006064" text-anchor="middle">1월</text>
    <text x="0" y="75" font-family="sans-serif" font-size="10" fill="#006064" text-anchor="middle">2월</text>
    <text x="0" y="100" font-family="sans-serif" font-size="10" fill="#006064" text-anchor="middle">3월</text>
    <text x="0" y="120" font-family="sans-serif" font-size="10" fill="#006064" text-anchor="middle">4월</text>

    <!-- 값 -->
    <!-- 사망 -->
    <text x="65" y="50" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">5</text>
    <text x="65" y="75" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">6</text>
    <text x="65" y="100" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">7</text>
    <text x="65" y="120" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">7</text>
    
    <!-- 부상 -->
    <text x="115" y="50" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">387</text>
    <text x="115" y="75" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">328</text>
    <text x="115" y="100" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">435</text>
    <text x="115" y="120" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">419</text>

    <!-- 수식 기호 '+' -->
    <text x="90" y="50" font-family="monospace" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">+</text>
    <text x="90" y="75" font-family="monospace" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">+</text>
    <text x="90" y="100" font-family="monospace" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">+</text>
    <text x="90" y="120" font-family="monospace" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">+</text>

    <!-- 찌그러트리는 동작 화살표 (오른쪽으로) -->
    <!-- 1월 -->
    <rect x="40" y="38" width="100" height="15" fill="#FF9800" opacity="0.1" />
    <path d="M 150 45 L 180 45" fill="none" stroke="#FF9800" stroke-width="3" stroke-dasharray="4,4" />
    <polygon points="175,41 185,45 175,49" fill="#FF9800" />
    
    <!-- 2월 -->
    <rect x="40" y="63" width="100" height="15" fill="#FF9800" opacity="0.1" />
    <path d="M 150 70 L 180 70" fill="none" stroke="#FF9800" stroke-width="3" stroke-dasharray="4,4" />
    <polygon points="175,66 185,70 175,74" fill="#FF9800" />
  </g>

  <!-- 가로 압축 연산 후 임시 데이터 (Series) -->
  <g transform="translate(380, 140)">
    <rect x="-20" y="0" width="140" height="140" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FFB300" stroke-width="2"/>
    <text x="50" y="-10" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">결과물 (casualties 시리즈)</text>
    
    <!-- 인덱스 똑같이 따라옴 -->
    <rect x="0" y="40" width="40" height="90" fill="#E0F7FA" rx="3" />
    <text x="20" y="60" font-family="sans-serif" font-size="10" fill="#006064" text-anchor="middle">1월</text>
    <text x="20" y="85" font-family="sans-serif" font-size="10" fill="#006064" text-anchor="middle">2월</text>
    <text x="20" y="110" font-family="sans-serif" font-size="10" fill="#006064" text-anchor="middle">3월</text>
    <text x="20" y="130" font-family="sans-serif" font-size="10" fill="#006064" text-anchor="middle">4월</text>

    <!-- 값 -->
    <text x="80" y="60" font-family="monospace" font-size="18" fill="#D32F2F" font-weight="bold" text-anchor="middle">392</text>
    <text x="80" y="85" font-family="monospace" font-size="18" fill="#D32F2F" font-weight="bold" text-anchor="middle">334</text>
    <text x="80" y="110" font-family="monospace" font-size="18" fill="#D32F2F" font-weight="bold" text-anchor="middle">442</text>
    <text x="80" y="130" font-family="monospace" font-size="18" fill="#D32F2F" font-weight="bold" text-anchor="middle">426</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">기존 데이터를 떼어내서 조합/통계 처리하여 새로운 1차원 부품을 완성합니다.</text>
  </g>

</svg>
