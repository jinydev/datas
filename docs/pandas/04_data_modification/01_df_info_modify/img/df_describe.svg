<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.describe() 기초 통계량 요약</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="180" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="2"/>
    <text x="90" y="30" font-family="monospace" font-size="16" fill="#FFCC80" font-weight="bold" text-anchor="middle">df.describe()</text>
  </g>

  <!-- 출력 화면 목업 -->
  <g transform="translate(80, 130)">
    <!-- 테이블 느낌 배경 -->
    <rect x="0" y="0" width="340" height="190" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#FFB300" stroke-width="2"/>
    
    <!-- 헤더 -->
    <rect x="0" y="0" width="340" height="30" fill="#FFF8E1" rx="3" />
    <text x="140" y="20" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">사고(건)</text>
    <text x="210" y="20" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">사망(명)</text>
    <text x="280" y="20" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">부상(명)</text>

    <!-- 행 이름표 -->
    <rect x="0" y="30" width="60" height="160" fill="#FFF3E0" rx="3" />
    <text x="30" y="55" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">count</text>
    <text x="30" y="75" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">mean</text>
    <text x="30" y="95" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">std</text>
    <text x="30" y="115" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">min</text>
    <text x="30" y="135" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">50%</text>
    <text x="30" y="155" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">max</text>

    <!-- 값 예시 (사고건만 하이라이트 되도록 나머지는 회색 처리) -->
    <!-- 사고건 -->
    <text x="140" y="55" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">12.0</text>
    <text x="140" y="75" font-family="monospace" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">198.8</text>
    <text x="140" y="95" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">22.61</text>
    <text x="140" y="115" font-family="monospace" font-size="12" fill="#1976D2" font-weight="bold" text-anchor="middle">168.0</text>
    <text x="140" y="135" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">196.0</text>
    <text x="140" y="155" font-family="monospace" font-size="12" fill="#FBC02D" font-weight="bold" text-anchor="middle">239.0</text>

    <!-- 사망, 부상 (생략 느낌) -->
    <text x="245" y="100" font-family="sans-serif" font-size="24" fill="#E0E0E0" font-weight="bold" text-anchor="middle">...</text>
  </g>

  <!-- 우측 설명 -->
  <!-- 평균 -->
  <g transform="translate(460, 180)">
    <path d="M -150 25 L -50 25" fill="none" stroke="#D32F2F" stroke-width="2" stroke-dasharray="3,3" />
    <rect x="-40" y="10" width="180" height="30" fill="#FFEBEE" rx="3" stroke="#EF5350" />
    <text x="50" y="30" font-family="sans-serif" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">mean: 월 평균 198건 사고 발생</text>
  </g>

  <!-- 분산/최소/최대 묶음 -->
  <g transform="translate(460, 240)">
    <path d="M -150 4 0 4 M -150 45 L 0 45" fill="none" stroke="#1976D2" stroke-width="2" stroke-dasharray="3,3" />
    <rect x="-40" y="0" width="180" height="50" fill="#E3F2FD" rx="3" stroke="#2196F3" />
    <text x="50" y="20" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">데이터의 퍼짐 정도 파악</text>
    <text x="50" y="40" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">(최소 168건 ~ 최대 239건)</text>
  </g>

</svg>
