<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">다차원 텐서(Tensor)의 차원 축소(Dimensionality Reduction)</text>

  <!-- Center: Original Matrix -->
  <g transform="translate(240, 70)">
    <rect x="0" y="0" width="120" height="120" fill="#fff" stroke="#90a4ae" stroke-width="2" rx="4"/>
    
    <!-- Grid -->
    <line x1="40" y1="0" x2="40" y2="120" stroke="#eceff1" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="120" stroke="#eceff1" stroke-width="1"/>
    
    <line x1="0" y1="40" x2="120" y2="40" stroke="#eceff1" stroke-width="1"/>
    <line x1="0" y1="80" x2="120" y2="80" stroke="#eceff1" stroke-width="1"/>

    <text x="20" y="25" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x11</text>
    <text x="60" y="25" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x12</text>
    <text x="100" y="25" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x13</text>

    <text x="20" y="65" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x21</text>
    <text x="60" y="65" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x22</text>
    <text x="100" y="65" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x23</text>

    <text x="20" y="105" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x31</text>
    <text x="60" y="105" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x32</text>
    <text x="100" y="105" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">x33</text>

    <text x="60" y="-10" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">2D Matrix (3x3)</text>
  </g>

  <!-- Left/Down Axis 0 Reduction -->
  <g stroke="#0288d1" stroke-width="3" fill="none" marker-end="url(#arrow-blue)">
    <path d="M 300 200 L 300 230 L 160 230 L 160 160" />
  </g>
  <rect x="180" y="220" width="80" height="20" fill="#e1f5fe" stroke="#0288d1" rx="10"/>
  <text x="220" y="234" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#0277bd" text-anchor="middle">axis=0</text>

  <!-- Down Result: 1D Series -->
  <g transform="translate(100, 110)">
    <rect x="0" y="0" width="120" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="4"/>
    <line x1="40" y1="0" x2="40" y2="40" stroke="#ffe0b2" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="40" stroke="#ffe0b2" stroke-width="1"/>

    <text x="20" y="25" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Σx_i1</text>
    <text x="60" y="25" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Σx_i2</text>
    <text x="100" y="25" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Σx_i3</text>

    <text x="60" y="-10" font-family="Arial" font-size="12" font-weight="bold" fill="#d84315" text-anchor="middle">1D Vector (1x3)</text>
    <text x="60" y="55" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Row Dimension Collapsed</text>
  </g>

  <!-- Right Axis 1 Reduction -->
  <g stroke="#388e3c" stroke-width="3" fill="none" marker-end="url(#arrow-green)">
    <path d="M 370 130 L 440 130" />
  </g>
  <rect x="375" y="105" width="50" height="20" fill="#e8f5e9" stroke="#388e3c" rx="10"/>
  <text x="400" y="119" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#1b5e20" text-anchor="middle">axis=1</text>

  <!-- Right Result: 1D Series -->
  <g transform="translate(460, 70)">
    <rect x="0" y="0" width="40" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="4"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#ffe0b2" stroke-width="1"/>
    <line x1="0" y1="80" x2="40" y2="80" stroke="#ffe0b2" stroke-width="1"/>

    <text x="20" y="25" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Σx_1j</text>
    <text x="20" y="65" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Σx_2j</text>
    <text x="20" y="105" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">Σx_3j</text>

    <text x="20" y="-10" font-family="Arial" font-size="12" font-weight="bold" fill="#d84315" text-anchor="middle">1D Vector</text>
    <text x="80" y="65" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Column Dim Collapsed</text>
  </g>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0288d1" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#388e3c" />
    </marker>
  </defs>
</svg>
