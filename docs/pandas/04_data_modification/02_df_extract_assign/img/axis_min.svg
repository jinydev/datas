<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">3단계: 전체 좌표계 스칼라(단일값) 추출 기법 (2연속 압축)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="300" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="150" y="30" font-family="monospace" font-size="18" fill="#CE93D8" font-weight="bold" text-anchor="middle">df.min().min()</text>
  </g>

  <!-- [1] 1차 압축: 표 -> Series -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="100" height="80" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#455A64" stroke-width="2"/>
    <text x="50" y="-10" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">DataFrame (2D)</text>
    
    <text x="50" y="45" font-family="sans-serif" font-size="20" fill="#E0E0E0" font-weight="bold" text-anchor="middle">데이터</text>
    
    <!-- 압축 화살표 (df.min() 1차 압축, axis=0 기본) -->
    <path d="M 50 85 L 50 145" fill="none" stroke="#EF5350" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="45,138 50,145 55,138" fill="#EF5350" />
    
    <text x="120" y="120" font-family="monospace" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">df.min()</text>
  </g>

  <!-- [2] 중간 산출물: Series -->
  <g transform="translate(190, 150)">
    <rect x="0" y="140" width="100" height="30" fill="#FFEBEE" rx="5" filter="url(#shadow)" stroke="#EF5350" stroke-width="2"/>
    <text x="50" y="185" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">Series (1D)</text>
    
    <text x="25" y="160" font-family="sans-serif" font-size="12" fill="#C62828" text-anchor="middle">168</text>
    <text x="50" y="160" font-family="sans-serif" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">5</text>
    <text x="75" y="160" font-family="sans-serif" font-size="12" fill="#C62828" text-anchor="middle">328</text>

    <!-- 2차 압축 화살표 (.min() 체이닝) -->
    <path d="M 110 155 L 180 155" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="173,150 180,155 173,160" fill="#2196F3" />

    <text x="145" y="145" font-family="monospace" font-size="14" fill="#1976D2" font-weight="bold" text-anchor="middle">.min()</text>
  </g>

  <!-- [3] 2차 압축: Series -> Scalar -->
  <g transform="translate(420, 260)">
    <!-- 점수 단일 렌더러 -->
    <rect x="0" y="0" width="100" height="100" fill="#E3F2FD" rx="50" filter="url(#shadow)" stroke="#2196F3" stroke-width="3"/>
    <text x="50" y="-10" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">Scalar (반환)</text>
    
    <text x="50" y="60" font-family="sans-serif" font-size="40" fill="#0D47A1" font-weight="bold" text-anchor="middle">5</text>
  </g>

  <!-- 전체 흐름 추상화 화살표 -->
  <path d="M 230 110 Q 300 200 460 250" fill="none" stroke="#9C27B0" stroke-width="8" opacity="0.3" />
  <polygon points="445,240 468,252 455,260" fill="#9C27B0" opacity="0.3" transform="rotate(-15 460 250)" />
  <text x="350" y="180" font-family="sans-serif" font-size="16" fill="#7B1FA2" font-weight="bold" text-anchor="middle">연쇄 타격 (차원 2단계 붕괴)</text>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#F3E5F5" rx="10" stroke="#9C27B0" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">함수를 두 번 연달아 쓰면 데이터 전체에서 단 하나의 최고/최저 값을 찾아냅니다.</text>
  </g>

</svg>
