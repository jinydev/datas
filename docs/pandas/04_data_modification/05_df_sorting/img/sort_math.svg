<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">사전식 배열(Lexicographical Ordering)과 순열 재배치</text>

  <!-- Left: Unordered Matrix -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="140" height="150" fill="#fff" stroke="#90a4ae" stroke-width="2" rx="4"/>
    <text x="70" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#546e7a" text-anchor="middle">Unordered M</text>
    
    <!-- Rows -->
    <rect x="10" y="20" width="120" height="30" fill="#ffcdd2" rx="2"/>
    <rect x="10" y="60" width="120" height="30" fill="#c8e6c9" rx="2"/>
    <rect x="10" y="100" width="120" height="30" fill="#bbdefb" rx="2"/>

    <!-- Key Column Outline -->
    <rect x="70" y="10" width="50" height="130" fill="none" stroke="#f57f17" stroke-width="3" stroke-dasharray="4,4" rx="2"/>
    <text x="95" y="5" font-family="Courier New" font-size="12" font-weight="bold" fill="#f57f17" text-anchor="middle">Key</text>

    <!-- Data -->
    <text x="35" y="40" font-family="Courier New" font-size="14" fill="#c62828" text-anchor="middle">R1</text>
    <text x="95" y="40" font-family="Courier New" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">7</text>

    <text x="35" y="80" font-family="Courier New" font-size="14" fill="#2e7d32" text-anchor="middle">R2</text>
    <text x="95" y="80" font-family="Courier New" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">2</text>

    <text x="35" y="120" font-family="Courier New" font-size="14" fill="#1565c0" text-anchor="middle">R3</text>
    <text x="95" y="120" font-family="Courier New" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">5</text>
  </g>

  <!-- Middle: Permutation Logic -->
  <g transform="translate(230, 90)">
    <g stroke="#ffb74d" stroke-width="3" fill="none">
      <path d="M 0 40 L 40 40" marker-end="url(#arrow-orange)" />
      <path d="M 140 40 L 180 40" marker-end="url(#arrow-orange)" />
    </g>
    
    <rect x="45" y="0" width="90" height="80" fill="#fff3e0" stroke="#ff9800" rx="10"/>
    <text x="90" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">Permutation</text>
    <text x="90" y="50" font-family="Arial" font-size="16" font-weight="bold" fill="#e65100" text-anchor="middle">π(K)</text>
    <text x="90" y="70" font-family="Courier New" font-size="12" fill="#d84315" text-anchor="middle">2 &lt; 5 &lt; 7</text>
  </g>

  <!-- Right: Ordered Matrix -->
  <g transform="translate(440, 60)">
    <rect x="0" y="0" width="140" height="150" fill="#fff" stroke="#90a4ae" stroke-width="2" rx="4" filter="drop-shadow(3px 3px 5px rgba(0,0,0,0.1))"/>
    <text x="70" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">Ordered M'</text>
    
    <!-- Rows Reordered -->
    <rect x="10" y="20" width="120" height="30" fill="#c8e6c9" rx="2"/>
    <rect x="10" y="60" width="120" height="30" fill="#bbdefb" rx="2"/>
    <rect x="10" y="100" width="120" height="30" fill="#ffcdd2" rx="2"/>

    <rect x="70" y="10" width="50" height="130" fill="#fff9c4" stroke="#fbc02d" stroke-width="2" opacity="0.5" rx="2"/>

    <!-- Data Reordered -->
    <!-- R2 (2) -->
    <text x="35" y="40" font-family="Courier New" font-size="14" fill="#2e7d32" text-anchor="middle">R2</text>
    <text x="95" y="40" font-family="Courier New" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">2</text>

    <!-- R3 (5) -->
    <text x="35" y="80" font-family="Courier New" font-size="14" fill="#1565c0" text-anchor="middle">R3</text>
    <text x="95" y="80" font-family="Courier New" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">5</text>

    <!-- R1 (7) -->
    <text x="35" y="120" font-family="Courier New" font-size="14" fill="#c62828" text-anchor="middle">R1</text>
    <text x="95" y="120" font-family="Courier New" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">7</text>
  </g>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
