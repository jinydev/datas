<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 도서관 책장 다시 꽂기 (이름표 기준 vs 두께 기준)</text>

  <!-- Top Shelf: .sort_index() -->
  <g transform="translate(100, 50)">
    <rect x="0" y="0" width="450" height="70" fill="#efebe9" stroke="#d7ccc8" rx="5"/>
    <line x1="0" y1="65" x2="450" y2="65" stroke="#8d6e63" stroke-width="5"/>
    
    <text x="-50" y="40" font-family="Courier New" font-size="14" font-weight="bold" fill="#5d4037" text-anchor="middle">.sort_index()</text>

    <!-- Books by label (A, B, C, D) but random thickness -->
    <rect x="40" y="25" width="40" height="40" fill="#ffcdd2" stroke="#e53935" rx="2"/>
    <text x="60" y="50" font-family="Arial" font-size="16" font-weight="bold" fill="#b71c1c" text-anchor="middle">A</text>

    <rect x="120" y="10" width="60" height="55" fill="#c8e6c9" stroke="#43a047" rx="2"/>
    <text x="150" y="45" font-family="Arial" font-size="16" font-weight="bold" fill="#1b5e20" text-anchor="middle">B</text>

    <rect x="220" y="20" width="30" height="45" fill="#bbdefb" stroke="#1e88e5" rx="2"/>
    <text x="235" y="45" font-family="Arial" font-size="16" font-weight="bold" fill="#0d47a1" text-anchor="middle">C</text>

    <rect x="290" y="15" width="80" height="50" fill="#fff9c4" stroke="#fbc02d" rx="2"/>
    <text x="330" y="45" font-family="Arial" font-size="16" font-weight="bold" fill="#f57f17" text-anchor="middle">D</text>

    <!-- Label indicator -->
    <rect x="390" y="15" width="40" height="20" fill="#fff" stroke="#ccc" rx="10"/>
    <text x="410" y="29" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">가나다순</text>
  </g>

  <!-- Bottom Shelf: .sort_values() -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="450" height="70" fill="#efebe9" stroke="#d7ccc8" rx="5"/>
    <line x1="0" y1="65" x2="450" y2="65" stroke="#8d6e63" stroke-width="5"/>
    
    <text x="-50" y="40" font-family="Courier New" font-size="14" font-weight="bold" fill="#5d4037" text-anchor="middle">.sort_values()</text>

    <!-- Books by thickness (thin to thick), mixed labels (C, A, B, D) -->
    <!-- C is thinnest (30) -->
    <rect x="40" y="20" width="30" height="45" fill="#bbdefb" stroke="#1e88e5" rx="2"/>
    <text x="55" y="45" font-family="Arial" font-size="16" font-weight="bold" fill="#0d47a1" text-anchor="middle">C</text>

    <!-- A is next (40) -->
    <rect x="110" y="25" width="40" height="40" fill="#ffcdd2" stroke="#e53935" rx="2"/>
    <text x="130" y="50" font-family="Arial" font-size="16" font-weight="bold" fill="#b71c1c" text-anchor="middle">A</text>

    <!-- B is next (60) -->
    <rect x="190" y="10" width="60" height="55" fill="#c8e6c9" stroke="#43a047" rx="2"/>
    <text x="220" y="45" font-family="Arial" font-size="16" font-weight="bold" fill="#1b5e20" text-anchor="middle">B</text>

    <!-- D is thickest (80) -->
    <rect x="290" y="15" width="80" height="50" fill="#fff9c4" stroke="#fbc02d" rx="2"/>
    <text x="330" y="45" font-family="Arial" font-size="16" font-weight="bold" fill="#f57f17" text-anchor="middle">D</text>

    <!-- Value indicator -->
    <rect x="390" y="15" width="40" height="20" fill="#fff" stroke="#ccc" rx="10"/>
    <text x="410" y="29" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">두께순</text>

    <path d="M 40 80 L 370 80" stroke="#f57f17" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-yellow)"/>
    <text x="205" y="95" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">값이 작다  --->  값이 크다</text>
  </g>

  <defs>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f57f17" />
    </marker>
  </defs>
</svg>
