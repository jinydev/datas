<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.sort_index() 와 .sort_values() : 책장 정리 방식</text>

  <!-- 1. sort_index (왼쪽) -->
  <g transform="translate(100, 100)">
    <rect x="-30" y="-20" width="220" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="80" y="5" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">A. 이름표(Index) 기준 정렬</text>
    
    <!-- 책장 틀 -->
    <rect x="0" y="30" width="160" height="110" fill="#E8F5E9" rx="3" />
    
    <!-- 책 1 (C) -->
    <rect x="10" y="40" width="140" height="25" fill="#4CAF50" rx="2" />
    <text x="30" y="57" font-family="monospace" font-size="14" fill="#FFF" font-weight="bold"># 1월</text>
    <!-- 책 2 (M) -->
    <rect x="10" y="70" width="140" height="25" fill="#4CAF50" rx="2" />
    <text x="30" y="87" font-family="monospace" font-size="14" fill="#FFF" font-weight="bold"># 2월</text>
    <!-- 책 3 (S) -->
    <rect x="10" y="100" width="140" height="25" fill="#4CAF50" rx="2" />
    <text x="30" y="117" font-family="monospace" font-size="14" fill="#FFF" font-weight="bold"># 3월</text>

    <!-- 화살표 및 설명 -->
    <path d="M -15 35 L -15 130" fill="none" stroke="#2E7D32" stroke-width="3" />
    <polygon points="-20,123 -15,130 -10,123" fill="#2E7D32" />
    <text x="-40" y="80" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" transform="rotate(-90 -40 80)" text-anchor="middle">가나다 순</text>

    <!-- 코드 표시 -->
    <rect x="25" y="145" width="110" height="25" fill="#FFF" rx="3" stroke="#A5D6A7" />
    <text x="80" y="162" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">.sort_index()</text>
  </g>

  <!-- 2. sort_values (오른쪽) -->
  <g transform="translate(420, 100)">
    <rect x="-30" y="-20" width="220" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="80" y="5" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">B. 알맹이 값(Value) 기준 정렬</text>
    
    <!-- 책장 틀 -->
    <rect x="0" y="30" width="160" height="110" fill="#E3F2FD" rx="3" />
    
    <!-- 책 (두께/수치 기준) 얇은것 -> 두꺼운것 -->
    <!-- 값 174 -->
    <rect x="10" y="40" width="70" height="25" fill="#2196F3" rx="2" />
    <text x="45" y="57" font-family="monospace" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">174</text>
    <!-- 값 192 -->
    <rect x="10" y="70" width="100" height="25" fill="#2196F3" rx="2" />
    <text x="60" y="87" font-family="monospace" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">192</text>
    <!-- 값 239 -->
    <rect x="10" y="100" width="130" height="25" fill="#2196F3" rx="2" />
    <text x="75" y="117" font-family="monospace" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">239</text>

    <!-- 화살표 및 설명 -->
    <path d="M 145 35 L 145 130" fill="none" stroke="#0D47A1" stroke-width="3" />
    <polygon points="140,123 145,130 150,123" fill="#0D47A1" />
    <text x="165" y="80" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" transform="rotate(-90 165 80)" text-anchor="middle">작은 값부터</text>

    <!-- 코드 표시 -->
    <rect x="25" y="145" width="110" height="25" fill="#FFF" rx="3" stroke="#90CAF9" />
    <text x="80" y="162" font-family="monospace" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">.sort_values()</text>
  </g>

  <!-- 중앙 VS 마크 -->
  <circle cx="350" cy="170" r="15" fill="#FFC107" />
  <text x="350" y="175" font-family="sans-serif" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">VS</text>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">책의 위치가 바뀔 때, 다른 속성값(책갈피)들은 찢어지지 않고 통째로 함께 이동합니다!</text>
  </g>

</svg>
