<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">3단계: 동점자 발생 시 2차 기준 적용 (Multi-column Sorting)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="460" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="230" y="30" font-family="monospace" font-size="16" fill="#CE93D8" font-weight="bold" text-anchor="middle">df.sort_values(by=[<tspan fill="#FFEB3B">'사망(명)'</tspan>, <tspan fill="#4FC3F7">'부상(명)'</tspan>])</text>
  </g>

  <!-- 원본 테이블 모양 (동점자 상황) -->
  <g transform="translate(100, 150)">
    <rect x="-30" y="-15" width="200" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#CFD8DC" stroke-width="2"/>
    <text x="70" y="-25" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">동점자가 있는 원본 표</text>

    <!-- 인덱스 -->
    <rect x="-20" y="25" width="50" height="100" fill="#ECEFF1" rx="3" />
    <text x="5" y="45" font-family="sans-serif" font-size="12" fill="#78909C" text-anchor="middle">1번</text>
    <text x="5" y="75" font-family="sans-serif" font-size="12" fill="#78909C" text-anchor="middle">2번</text>
    <text x="5" y="105" font-family="sans-serif" font-size="12" fill="#78909C" text-anchor="middle">3번</text>

    <!-- 1차 기준: 사망 (동점 발생!) -->
    <rect x="40" y="0" width="60" height="135" fill="#FFF8E1" rx="3" stroke="#FFB300" stroke-width="2"/>
    <text x="70" y="15" font-family="sans-serif" font-size="10" fill="#F57F17" font-weight="bold" text-anchor="middle">1차: 사망</text>
    
    <text x="70" y="45" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">7</text>
    <text x="70" y="75" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">5</text>
    <text x="70" y="105" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">7</text>

    <path d="M 90 35 Q 110 70 90 100" fill="none" stroke="#F44336" stroke-width="2" stroke-dasharray="3,3" />
    <text x="125" y="72" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">동점!</text>

    <!-- 2차 기준: 부상 -->
    <rect x="110" y="5" width="40" height="130" fill="#E1F5FE" rx="3" stroke="#29B6F6"/>
    <text x="130" y="18" font-family="sans-serif" font-size="9" fill="#0277BD" font-weight="bold" text-anchor="middle">2차: 부상</text>
    
    <text x="130" y="45" font-family="monospace" font-size="12" fill="#01579B" text-anchor="middle">435</text>
    <text x="130" y="75" font-family="monospace" font-size="12" fill="#01579B" text-anchor="middle">387</text>
    <text x="130" y="105" font-family="monospace" font-size="12" fill="#01579B" text-anchor="middle">419</text>
  </g>

  <!-- 심판 로직 (Tie Breaker 선) -->
  <g transform="translate(320, 200)">
    <!-- 5번 먼저 보냄 화살표 -->
    <path d="M -20 -20 Q 30 -60 100 -60 L 110 -60" fill="none" stroke="#2E7D32" stroke-width="3" stroke-dasharray="4,4" />
    <polygon points="105,-63 113,-60 105,-57" fill="#2E7D32" />
    <text x="40" y="-70" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">단독 1등 (5)</text>

    <!-- 동점자 판독기 -->
    <path d="M -20 -50 L -20 10" fill="none" stroke="#F44336" stroke-width="2" />
    <path d="M -20 -10 L -10 -10" fill="none" stroke="#F44336" stroke-width="2" />
    <rect x="-10" y="-30" width="80" height="40" fill="#FFEBEE" rx="5" stroke="#EF5350" />
    <text x="30" y="-15" font-family="sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">동점자 발생!</text>
    <text x="30" y="-3" font-family="sans-serif" font-size="10" fill="#C62828" text-anchor="middle">2차 기준 대조</text>

    <path d="M 70 -10 L 110 -10" fill="none" stroke="#29B6F6" stroke-width="3" />
    <polygon points="105,-13 113,-10 105,-7" fill="#29B6F6" />
    
    <path d="M 70 -10 Q 90 40 110 40" fill="none" stroke="#29B6F6" stroke-width="3" />
    <polygon points="105,37 113,40 105,43" fill="#29B6F6" />
    
    <text x="100" y="30" font-family="sans-serif" font-size="10" fill="#0277BD" font-weight="bold" text-anchor="middle">419 승</text>
  </g>

  <!-- 최종 결과 테이블 -->
  <g transform="translate(480, 150)">
    <rect x="-30" y="-15" width="200" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="70" y="-25" font-family="sans-serif" font-size="12" fill="#6A1B9A" font-weight="bold" text-anchor="middle">최종 판정 결과 (DataFrame)</text>

    <!-- 인덱스 -->
    <rect x="-20" y="25" width="50" height="100" fill="#ECEFF1" rx="3" />
    <text x="5" y="45" font-family="sans-serif" font-size="12" fill="#78909C" text-anchor="middle">2번</text>
    <text x="5" y="75" font-family="sans-serif" font-size="12" fill="#78909C" text-anchor="middle">3번</text>
    <text x="5" y="105" font-family="sans-serif" font-size="12" fill="#78909C" text-anchor="middle">1번</text>

    <!-- 1차 기준: 사망 정렬됨 -->
    <rect x="40" y="0" width="60" height="135" fill="#FFF8E1" rx="3" stroke="#FFB300" />
    <text x="70" y="15" font-family="sans-serif" font-size="10" fill="#F57F17" font-weight="bold" text-anchor="middle">1차: 사망</text>
    
    <text x="70" y="45" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">5</text>
    <text x="70" y="75" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">7</text>
    <text x="70" y="105" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">7</text>

    <!-- 2차 기준: 부상 정렬됨 -->
    <rect x="110" y="5" width="40" height="130" fill="#E1F5FE" rx="3" stroke="#29B6F6"/>
    <text x="130" y="18" font-family="sans-serif" font-size="9" fill="#0277BD" font-weight="bold" text-anchor="middle">2차: 부상</text>
    
    <text x="130" y="45" font-family="monospace" font-size="12" fill="#01579B" text-anchor="middle">387</text>
    <text x="130" y="75" font-family="monospace" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">419</text>
    <text x="130" y="105" font-family="monospace" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">435</text>
    
    <path d="M 152 70 L 152 110" fill="none" stroke="#29B6F6" stroke-width="2" />
    <polygon points="149,105 152,112 155,105" fill="#29B6F6" />
    <text x="160" y="93" font-family="sans-serif" font-size="10" fill="#0277BD" text-anchor="start">419가 작음</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#F3E5F5" rx="10" stroke="#9C27B0" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#6A1B9A" font-weight="bold" text-anchor="middle">리스트 형태로 여러 열을 넘기면, 앞에서부터 차례로 기준을 판독하여 깔끔하게 심판합니다.</text>
  </g>

</svg>
