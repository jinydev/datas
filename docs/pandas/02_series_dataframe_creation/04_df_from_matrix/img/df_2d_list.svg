<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2차원 리스트 + 인덱스(행) 이름표 지정</text>

  <!-- 원본 리스트 데이터 -->
  <g transform="translate(60, 80)">
    <rect x="-10" y="-10" width="220" height="150" fill="#E8F5E9" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="10" y="20" font-family="monospace" font-size="14" fill="#2E7D32" font-weight="bold">data_2d = [</text>
    
    <!-- 2D Data -->
    <rect x="25" y="35" width="160" height="25" fill="#C8E6C9" rx="3" />
    <text x="105" y="52" font-family="monospace" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">[ 1,   2,   3 ]</text>
    
    <rect x="25" y="65" width="160" height="25" fill="#C8E6C9" rx="3" />
    <text x="105" y="82" font-family="monospace" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">[ 10,  20,  30 ]</text>
    
    <rect x="25" y="95" width="160" height="25" fill="#C8E6C9" rx="3" />
    <text x="105" y="112" font-family="monospace" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">[ 100, 200, 300 ]</text>

    <text x="10" y="130" font-family="monospace" font-size="14" fill="#2E7D32" font-weight="bold">]</text>
  </g>

  <!-- 파이썬 주문 명령 -->
  <g transform="translate(300, 100)">
    <rect x="0" y="0" width="180" height="90" fill="#FFF3E0" rx="5" stroke="#FF9800" stroke-width="2" />
    <text x="90" y="25" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">pd.DataFrame(</text>
    
    <text x="30" y="50" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold">data</text>
    <text x="65" y="50" font-family="monospace" font-size="12" fill="#333">= data_2d</text>
    
    <text x="30" y="70" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold">index</text>
    <text x="65" y="70" font-family="monospace" font-size="12" fill="#333">= ['a', 'b', 'c']</text>

    <path d="M 180 45 L 210 45" fill="none" stroke="#FF9800" stroke-width="4" stroke-dasharray="4,4" />
    <polygon points="205,38 215,45 205,52" fill="#FF9800" />
  </g>

  <!-- 결과 표 -->
  <g transform="translate(480, 80)">
    <rect x="30" y="0" width="180" height="200" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 컬럼 헤더: 지정안했으니 0,1,2 -->
    <rect x="30" y="0" width="180" height="30" fill="#E3F2FD" rx="3" />
    <text x="60" y="20" font-family="sans-serif" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">0</text>
    <text x="120" y="20" font-family="sans-serif" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">1</text>
    <text x="180" y="20" font-family="sans-serif" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">2</text>
    <text x="160" y="-10" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">&lt;- 컬럼 이름은 생략해서 0, 1, 2</text>
    <path d="M 160 -5 L 160 5" fill="none" stroke="#D32F2F" stroke-width="2" />

    <!-- 인덱스: 직접 지정한 a,b,c -->
    <rect x="-10" y="30" width="40" height="170" fill="#FFE0B2" rx="3" />
    <text x="10" y="55" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">a</text>
    <path d="M -30 50 L -10 50" fill="none" stroke="#E65100" stroke-width="2" />
    <text x="-40" y="55" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">직접 지정</text>
    
    <text x="10" y="85" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">b</text>
    <text x="10" y="115" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">c</text>

    <!-- 데이터 -->
    <!-- a열 -->
    <text x="60" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">1</text>
    <text x="120" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2</text>
    <text x="180" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">3</text>
    
    <!-- b열 -->
    <text x="60" y="85" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="120" y="85" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">20</text>
    <text x="180" y="85" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">30</text>
    
    <!-- c열 -->
    <text x="60" y="115" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">100</text>
    <text x="120" y="115" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">200</text>
    <text x="180" y="115" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">300</text>
  </g>

</svg>
