<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 아무 이름 없는 표에 머리글(이름표 테이프) 씌우기</text>

  <!-- Number Table -->
  <rect x="200" y="90" width="200" height="120" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <line x1="200" y1="130" x2="400" y2="130" stroke="#eee" stroke-width="2"/>
  <line x1="200" y1="170" x2="400" y2="170" stroke="#eee" stroke-width="2"/>
  <line x1="266" y1="90" x2="266" y2="210" stroke="#eee" stroke-width="2"/>
  <line x1="333" y1="90" x2="333" y2="210" stroke="#eee" stroke-width="2"/>

  <!-- Dummy Numbers -->
  <text x="233" y="115" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">10</text>
  <text x="300" y="115" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">20</text>
  <text x="366" y="115" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">30</text>
  <text x="233" y="155" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">40</text>
  <text x="300" y="155" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">50</text>
  <text x="366" y="155" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">60</text>
  <text x="233" y="195" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">70</text>
  <text x="300" y="195" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">80</text>
  <text x="366" y="195" font-family="Courier New, monospace" font-size="14" fill="#999" text-anchor="middle">90</text>

  <!-- Tape: Columns -->
  <g transform="translate(195, 60)">
    <rect x="0" y="0" width="210" height="25" fill="#fdd835" rx="3" stroke="#fbc02d" stroke-dasharray="4,2"/>
    <text x="38" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">A타입</text>
    <text x="105" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">B타입</text>
    <text x="171" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">C타입</text>
  </g>
  <path d="M 300 85 L 300 95" stroke="#fbc02d" stroke-width="3" fill="none" marker-end="url(#arrow-yellow)"/>

  <!-- Tape: Index -->
  <g transform="translate(130, 85)">
    <rect x="0" y="0" width="60" height="130" fill="#81c784" rx="3" stroke="#4caf50" stroke-dasharray="4,2"/>
    <text x="30" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">1번방</text>
    <text x="30" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">2번방</text>
    <text x="30" y="110" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">3번방</text>
  </g>
  <path d="M 190 150 L 200 150" stroke="#4caf50" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>

  <defs>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbc02d" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
  </defs>
</svg>
