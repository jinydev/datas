<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">Boolean Indexing (True/False 거름망 씌우기)</text>

  <!-- 원본 Series 박스 -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="140" height="250" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#CFD8DC" stroke-width="2"/>
    <rect x="0" y="0" width="140" height="30" fill="#ECEFF1" rx="5" />
    <text x="70" y="20" font-family="sans-serif" font-size="14" fill="#455A64" font-weight="bold" text-anchor="middle">원본 Series (데이터)</text>

    <!-- 원본 데이터 -->
    <rect x="15" y="40" width="110" height="25" fill="#E3F2FD" />
    <text x="30" y="57" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">0</text>
    <text x="80" y="57" font-family="sans-serif" font-size="14" fill="#333">3</text>
    
    <rect x="15" y="70" width="110" height="25" fill="#E3F2FD" />
    <text x="30" y="87" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">1</text>
    <text x="80" y="87" font-family="sans-serif" font-size="14" fill="#333">6</text>
    
    <rect x="15" y="100" width="110" height="25" fill="#FFEB3B" />
    <text x="30" y="117" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">2</text>
    <text x="80" y="117" font-family="sans-serif" font-size="14" fill="#D32F2F">-3</text>
    
    <rect x="15" y="130" width="110" height="25" fill="#FFEB3B" />
    <text x="30" y="147" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">3</text>
    <text x="80" y="147" font-family="sans-serif" font-size="14" fill="#D32F2F">0</text>
    
    <rect x="15" y="160" width="110" height="25" fill="#FFEB3B" />
    <text x="30" y="177" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">4</text>
    <text x="80" y="177" font-family="sans-serif" font-size="14" fill="#D32F2F">-4</text>
    
    <rect x="15" y="190" width="110" height="25" fill="#E3F2FD" />
    <text x="30" y="207" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">5</text>
    <text x="80" y="207" font-family="sans-serif" font-size="14" fill="#333">8</text>

    <rect x="15" y="220" width="110" height="22" fill="#FFEB3B" />
    <text x="30" y="235" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">6</text>
    <text x="80" y="235" font-family="sans-serif" font-size="14" fill="#D32F2F">-7</text>
  </g>

  <!-- 거름망 (조건식) -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="140" height="250" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FFC107" stroke-width="2" stroke-dasharray="4,4"/>
    <rect x="0" y="0" width="140" height="30" fill="#FFECB3" rx="5" />
    <text x="70" y="20" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">조건: s &gt; 0</text>

    <!-- 불리언 데이터 -->
    <rect x="15" y="40" width="110" height="25" fill="#E8F5E9" />
    <text x="70" y="57" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">True</text>
    
    <rect x="15" y="70" width="110" height="25" fill="#E8F5E9" />
    <text x="70" y="87" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">True</text>
    
    <rect x="15" y="100" width="110" height="25" fill="#FFCDD2" />
    <text x="70" y="117" font-family="monospace" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="15" y="130" width="110" height="25" fill="#FFCDD2" />
    <text x="70" y="147" font-family="monospace" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="15" y="160" width="110" height="25" fill="#FFCDD2" />
    <text x="70" y="177" font-family="monospace" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="15" y="190" width="110" height="25" fill="#E8F5E9" />
    <text x="70" y="207" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">True</text>

    <rect x="15" y="220" width="110" height="22" fill="#FFCDD2" />
    <text x="70" y="235" font-family="monospace" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">False</text>
  </g>
  
  <!-- 추출 결과물 화살표 -->
  <g transform="translate(420, 160)">
    <path d="M 0 0 L 60 0" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="55,-7 65,0 55,7" fill="#4CAF50" />
    <text x="30" y="-15" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">s[ s&gt;0 ]</text>
  </g>

  <!-- 결과 Series 박스 -->
  <g transform="translate(510, 110)">
    <rect x="0" y="0" width="140" height="130" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    <rect x="0" y="0" width="140" height="30" fill="#81C784" rx="5" />
    <text x="70" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">필터된 Series</text>

    <!-- 남은 데이터(True인 것만) -->
    <rect x="15" y="40" width="110" height="25" fill="#E3F2FD" />
    <text x="30" y="57" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">0</text>
    <text x="80" y="57" font-family="sans-serif" font-size="14" fill="#333">3</text>
    
    <rect x="15" y="70" width="110" height="25" fill="#E3F2FD" />
    <text x="30" y="87" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">1</text>
    <text x="80" y="87" font-family="sans-serif" font-size="14" fill="#333">6</text>
    
    <rect x="15" y="100" width="110" height="25" fill="#E3F2FD" />
    <text x="30" y="117" font-family="sans-serif" font-size="10" fill="#78909C" font-weight="bold">5</text>
    <text x="80" y="117" font-family="sans-serif" font-size="14" fill="#333">8</text>
  </g>

</svg>
