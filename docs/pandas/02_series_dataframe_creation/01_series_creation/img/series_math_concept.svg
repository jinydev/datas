<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="500" height="300" fill="#f8f9fa" rx="10" />
  
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1차원 매핑 함수 (Mapping Function)</text>
  
  <!-- Domain (Index) -->
  <rect x="80" y="70" width="100" height="200" rx="10" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="130" y="100" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0" text-anchor="middle">Domain (Index)</text>
  
  <circle cx="130" cy="140" r="20" fill="#bbdefb" />
  <text x="130" y="145" font-family="Arial" font-size="14" fill="#0d47a1" text-anchor="middle">'a'</text>
  
  <circle cx="130" cy="195" r="20" fill="#bbdefb" />
  <text x="130" y="200" font-family="Arial" font-size="14" fill="#0d47a1" text-anchor="middle">'b'</text>
  
  <circle cx="130" cy="250" r="20" fill="#bbdefb" />
  <text x="130" y="255" font-family="Arial" font-size="14" fill="#0d47a1" text-anchor="middle">'c'</text>

  <!-- Codomain (Values) -->
  <rect x="320" y="70" width="100" height="200" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="370" y="100" font-family="Arial" font-size="16" font-weight="bold" fill="#2e7d32" text-anchor="middle">Codomain (Value)</text>

  <circle cx="370" cy="140" r="20" fill="#c8e6c9" />
  <text x="370" y="145" font-family="Arial" font-size="14" fill="#1b5e20" text-anchor="middle">10.5</text>
  
  <circle cx="370" cy="195" r="20" fill="#c8e6c9" />
  <text x="370" y="200" font-family="Arial" font-size="14" fill="#1b5e20" text-anchor="middle">20.1</text>
  
  <circle cx="370" cy="250" r="20" fill="#c8e6c9" />
  <text x="370" y="255" font-family="Arial" font-size="14" fill="#1b5e20" text-anchor="middle">30.9</text>
  
  <!-- Arrows -->
  <g stroke="#757575" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 155 140 C 200 140, 250 140, 295 140" />
    <path d="M 155 195 C 200 195, 250 195, 295 195" />
    <path d="M 155 250 C 200 250, 250 250, 295 250" />
  </g>
  
  <!-- Function Label -->
  <text x="225" y="130" font-family="Arial" font-size="14" fill="#757575" font-style="italic">f(x)</text>
  <text x="225" y="185" font-family="Arial" font-size="14" fill="#757575" font-style="italic">f(x)</text>
  <text x="225" y="240" font-family="Arial" font-size="14" fill="#757575" font-style="italic">f(x)</text>

  <!-- Defs for arrow -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#757575" />
    </marker>
  </defs>
</svg>
