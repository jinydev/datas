<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">리스트(List)에서 시리즈(Series)로 자동 인덱싱 생성</text>

  <!-- Input List -->
  <text x="120" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Input: List</text>
  <rect x="50" y="90" width="140" height="120" rx="5" fill="#fff" stroke="#ccc" stroke-width="2"/>
  <text x="120" y="115" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">[1, 3, 5, NaN, 6, 8]</text>

  <!-- Arrow -->
  <g stroke="#2196f3" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 200 150 L 300 150" />
  </g>
  <text x="250" y="140" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">pd.Series()</text>

  <!-- Output Series -->
  <text x="420" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Output: Series (자동 0-based Index)</text>
  <rect x="340" y="90" width="160" height="140" rx="5" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  
  <!-- Index column -->
  <rect x="345" y="95" width="40" height="130" fill="#bbdefb" rx="3"/>
  <text x="365" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">0</text>
  <text x="365" y="135" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">1</text>
  <text x="365" y="155" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">2</text>
  <text x="365" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">3</text>
  <text x="365" y="195" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">4</text>
  <text x="365" y="215" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">5</text>

  <!-- Data column -->
  <text x="420" y="115" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">1.0</text>
  <text x="420" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">3.0</text>
  <text x="420" y="155" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">5.0</text>
  <text x="420" y="175" font-family="Courier New, monospace" font-size="14" fill="#f44336" font-style="italic" text-anchor="start">NaN</text>
  <text x="420" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">6.0</text>
  <text x="420" y="215" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">8.0</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2196f3" />
    </marker>
  </defs>
</svg>
