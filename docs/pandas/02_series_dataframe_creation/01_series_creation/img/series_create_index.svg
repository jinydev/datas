<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">시리즈 인덱스(Index) 교체하기</text>

  <!-- Original Series -->
  <text x="130" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Original Series</text>
  <rect x="50" y="90" width="160" height="140" rx="5" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <rect x="55" y="95" width="40" height="130" fill="#bbdefb" rx="3"/>
  <text x="75" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">0</text>
  <text x="75" y="135" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">1</text>
  <text x="75" y="155" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">2</text>
  <text x="75" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">3</text>
  <text x="75" y="195" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">4</text>
  <text x="75" y="215" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">5</text>
  <text x="130" y="115" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">1.0</text>
  <text x="130" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">3.0</text>
  <text x="130" y="155" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">5.0</text>
  <text x="130" y="175" font-family="Courier New, monospace" font-size="14" fill="#f44336" text-anchor="start">NaN</text>
  <text x="130" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">6.0</text>
  <text x="130" y="215" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">8.0</text>

  <!-- Arrow -->
  <g stroke="#4caf50" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 220 150 L 320 150" />
  </g>
  <text x="270" y="140" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">s.index = [...]</text>

  <!-- New Series -->
  <text x="440" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Index Replaced Series</text>
  <rect x="360" y="90" width="160" height="140" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <rect x="365" y="95" width="40" height="130" fill="#c8e6c9" rx="3"/>
  <text x="385" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">'a'</text>
  <text x="385" y="135" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">'b'</text>
  <text x="385" y="155" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">'c'</text>
  <text x="385" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">'d'</text>
  <text x="385" y="195" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">'e'</text>
  <text x="385" y="215" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">'f'</text>
  <text x="440" y="115" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">1.0</text>
  <text x="440" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">3.0</text>
  <text x="440" y="155" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">5.0</text>
  <text x="440" y="175" font-family="Courier New, monospace" font-size="14" fill="#f44336" text-anchor="start">NaN</text>
  <text x="440" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">6.0</text>
  <text x="440" y="215" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">8.0</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
  </defs>
</svg>
