<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.dtypes 로 각 기둥(열)의 보관함 규격 확인하기</text>

  <!-- 원본 표 -->
  <g transform="translate(60, 80)">
    <rect x="-10" y="0" width="220" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#1976D2" stroke-width="2"/>
    <text x="100" y="-15" font-family="monospace" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">원본 DataFrame (df)</text>
    
    <rect x="25" y="10" width="55" height="30" fill="#E3F2FD" rx="3" />
    <text x="52" y="30" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">이름</text>
    
    <rect x="85" y="10" width="55" height="30" fill="#E3F2FD" rx="3" />
    <text x="112" y="30" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">나이</text>
    
    <rect x="145" y="10" width="55" height="30" fill="#E3F2FD" rx="3" />
    <text x="172" y="30" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">키</text>

    <!-- 데이터 영역 -->
    <!-- 이름 -->
    <rect x="25" y="45" width="55" height="90" fill="#F3E5F5" rx="3" />
    <text x="52" y="70" font-family="sans-serif" font-size="12" fill="#4A148C" font-weight="bold" text-anchor="middle">Alice</text>
    <text x="52" y="110" font-family="sans-serif" font-size="12" fill="#4A148C" font-weight="bold" text-anchor="middle">Bob</text>
    
    <!-- 나이 -->
    <rect x="85" y="45" width="55" height="90" fill="#E8F5E9" rx="3" />
    <text x="112" y="70" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">25</text>
    <text x="112" y="110" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">30</text>
    
    <!-- 키 -->
    <rect x="145" y="45" width="55" height="90" fill="#FFF3E0" rx="3" />
    <text x="172" y="70" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">165.5</text>
    <text x="172" y="110" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">178.2</text>
  </g>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(310, 140)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#FF5252" />
    <text x="40" y="-15" font-family="monospace" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">df.dtypes</text>
    <text x="40" y="25" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">스캐너 작동!</text>
  </g>

  <!-- 자료형 리포트 (Series) -->
  <g transform="translate(430, 80)">
    <rect x="0" y="0" width="200" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    <rect x="0" y="0" width="200" height="30" fill="#E8F5E9" rx="3" />
    <text x="100" y="20" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">Dtypes 명세서 (Series)</text>

    <!-- 매핑 리스트 -->
    <!-- 이름 -> object -->
    <text x="40" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">이름</text>
    <rect x="80" y="45" width="90" height="20" fill="#F3E5F5" rx="3" />
    <text x="125" y="60" font-family="monospace" font-size="12" fill="#6A1B9A" font-weight="bold" text-anchor="middle">object</text>
    <text x="210" y="60" font-family="sans-serif" font-size="10" fill="#9E9E9E">(문자형)</text>
    
    <!-- 나이 -> int64 -->
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">나이</text>
    <rect x="80" y="80" width="90" height="20" fill="#E8F5E9" rx="3" />
    <text x="125" y="95" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">int64</text>
    <text x="210" y="95" font-family="sans-serif" font-size="10" fill="#9E9E9E">(정수형)</text>
    
    <!-- 키 -> float64 -->
    <text x="40" y="130" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">키</text>
    <rect x="80" y="115" width="90" height="20" fill="#FFF3E0" rx="3" />
    <text x="125" y="130" font-family="monospace" font-size="12" fill="#EF6C00" font-weight="bold" text-anchor="middle">float64</text>
    <text x="210" y="130" font-family="sans-serif" font-size="10" fill="#9E9E9E">(실수형)</text>
  </g>

</svg>
