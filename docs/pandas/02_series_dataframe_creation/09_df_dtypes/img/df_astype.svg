<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.astype() 으로 데이터 형태 트랜스폼 시키기</text>

  <!-- 원본 열 -->
  <g transform="translate(100, 80)">
    <rect x="-30" y="0" width="120" height="150" fill="#E8F5E9" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="30" y="-15" font-family="monospace" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">df['나이']</text>
    
    <rect x="-30" y="0" width="120" height="30" fill="#C8E6C9" rx="5" />
    <text x="30" y="20" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">int64 (정수)</text>
    
    <text x="30" y="60" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">25</text>
    <text x="30" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">30</text>
  </g>

  <!-- 트랜스포머 (astype) -->
  <g transform="translate(300, 140)">
    <!-- 파이썬 명령 -->
    <text x="40" y="-30" font-family="monospace" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">= df['나이'].astype(str)</text>
    
    <!-- 화살표 -->
    <path d="M 0 0 L 80 0" fill="none" stroke="#9C27B0" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#9C27B0" />
    
    <!-- 형변환 설명 -->
    <rect x="0" y="15" width="80" height="20" fill="#F3E5F5" rx="3" />
    <text x="40" y="29" font-family="sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold" text-anchor="middle">"형변환 빔"</text>
  </g>

  <!-- 결과 열 -->
  <g transform="translate(500, 80)">
    <rect x="-30" y="0" width="120" height="150" fill="#F3E5F5" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="3"/>
    <text x="30" y="-15" font-family="monospace" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">df['나이'] (덮어쓰기)</text>
    
    <rect x="-30" y="0" width="120" height="30" fill="#E1BEE7" rx="5" />
    <text x="30" y="20" font-family="sans-serif" font-size="14" fill="#4A148C" font-weight="bold" text-anchor=" middle">object (문자열)</text>
    
    <!-- 문자로 바뀐 데이터 표기 ('25') -->
    <text x="30" y="60" font-family="monospace" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">"25"</text>
    <text x="30" y="100" font-family="monospace" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">"30"</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 290)">
    <rect x="-240" y="-15" width="480" height="35" fill="#E1BEE7" rx="10" stroke="#7B1FA2" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="12" fill="#4A148C" font-weight="bold" text-anchor="middle">더 이상 숫자가 아니므로 덧셈/뺄셈 연산이 되지 않는 '글자' 취급을 받습니다.</text>
  </g>

</svg>
