<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">이기종(Heterogeneous) 데이터의 자료형 명세</text>

  <!-- Left: DataFrame Matrix -->
  <text x="160" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">논리적 구조 (DataFrame)</text>
  
  <rect x="60" y="90" width="200" height="120" fill="#fff" stroke="#37474f" stroke-width="2" rx="3"/>
  
  <!-- Headers -->
  <rect x="60" y="90" width="60" height="30" fill="#ffccbc"/>
  <text x="90" y="110" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#bf360c" text-anchor="middle">col1</text>
  
  <rect x="120" y="90" width="80" height="30" fill="#bbdefb"/>
  <text x="160" y="110" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">col2</text>
  
  <rect x="200" y="90" width="60" height="30" fill="#c8e6c9"/>
  <text x="230" y="110" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">col3</text>

  <!-- Lines -->
  <line x1="60" y1="120" x2="260" y2="120" stroke="#ccc" stroke-width="1"/>
  <line x1="60" y1="150" x2="260" y2="150" stroke="#ccc" stroke-width="1"/>
  <line x1="60" y1="180" x2="260" y2="180" stroke="#ccc" stroke-width="1"/>
  <line x1="120" y1="90" x2="120" y2="210" stroke="#ccc" stroke-width="1"/>
  <line x1="200" y1="90" x2="200" y2="210" stroke="#ccc" stroke-width="1"/>

  <!-- Data -->
  <text x="90" y="140" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">10</text>
  <text x="160" y="140" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">1.523</text>
  <text x="230" y="140" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">'A'</text>
  
  <text x="90" y="170" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">20</text>
  <text x="160" y="170" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">2.718</text>
  <text x="230" y="170" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">'B'</text>

  <text x="90" y="200" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">30</text>
  <text x="160" y="200" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">3.141</text>
  <text x="230" y="200" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">'C'</text>

  <!-- Arrows -->
  <path d="M 90 220 L 90 230 L 410 230 L 410 190 L 420 190" stroke="#ff5722" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 160 220 L 160 240 L 490 240 L 490 190 L 500 190" stroke="#2196f3" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 230 220 L 230 250 L 570 250 L 570 190 L 580 190" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  
  <text x="330" y="150" font-family="Arial" font-size="12" font-weight="bold" fill="#757575" text-anchor="middle">메모리 할당</text>

  <!-- Right: Memory Layout (dtypes) -->
  <text x="490" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">물리적 메모리 명세 (dtypes)</text>
  
  <rect x="360" y="90" width="260" height="120" fill="#e0e0e0" rx="5"/>
  
  <!-- Block 1: int64 -->
  <rect x="380" y="110" width="70" height="80" fill="#ffccbc" stroke="#bf360c" stroke-width="2" rx="2"/>
  <text x="415" y="130" font-family="Arial" font-size="12" font-weight="bold" fill="#bf360c" text-anchor="middle">int64</text>
  <text x="415" y="150" font-family="Arial" font-size="10" fill="#bf360c" text-anchor="middle">8 Bytes</text>
  <line x1="380" y1="160" x2="450" y2="160" stroke="#bf360c" stroke-dasharray="2,2"/>
  <text x="415" y="180" font-family="Courier New, monospace" font-size="10" fill="#bf360c" text-anchor="middle">10,20...</text>

  <!-- Block 2: float64 -->
  <rect x="460" y="110" width="70" height="80" fill="#bbdefb" stroke="#0d47a1" stroke-width="2" rx="2"/>
  <text x="495" y="130" font-family="Arial" font-size="12" font-weight="bold" fill="#0d47a1" text-anchor="middle">float64</text>
  <text x="495" y="150" font-family="Arial" font-size="10" fill="#0d47a1" text-anchor="middle">8 Bytes</text>
  <line x1="460" y1="160" x2="530" y2="160" stroke="#0d47a1" stroke-dasharray="2,2"/>
  <text x="495" y="180" font-family="Courier New, monospace" font-size="10" fill="#0d47a1" text-anchor="middle">1.52...</text>

  <!-- Block 3: object -->
  <rect x="540" y="110" width="70" height="80" fill="#c8e6c9" stroke="#1b5e20" stroke-width="2" rx="2"/>
  <text x="575" y="130" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20" text-anchor="middle">object</text>
  <text x="575" y="150" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">Pointer</text>
  <line x1="540" y1="160" x2="610" y2="160" stroke="#1b5e20" stroke-dasharray="2,2"/>
  <text x="575" y="180" font-family="Courier New, monospace" font-size="10" fill="#1b5e20" text-anchor="middle">'A','B'..</text>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff5722" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2196f3" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
  </defs>
</svg>
