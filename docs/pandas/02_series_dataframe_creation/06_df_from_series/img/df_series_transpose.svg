<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">행(Row)으로 뭉친 시리즈들을 전치 행렬(.T)로 세우기</text>

  <!-- 가로로 뭉친 표 -->
  <g transform="translate(60, 60)">
    <rect x="-30" y="0" width="230" height="110" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#1976D2" stroke-width="2"/>
    <text x="85" y="-10" font-family="monospace" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">pd.DataFrame([courses, fees])</text>
    
    <rect x="50" y="0" width="150" height="30" fill="#E3F2FD" rx="3" />
    <text x="75" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">0</text>
    <text x="125" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">1</text>
    <text x="175" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">2</text>
    
    <rect x="-30" y="30" width="80" height="80" fill="#FFF3E0" rx="3" />
    <text x="10" y="60" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">과목명</text>
    <text x="10" y="90" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">수강료</text>

    <!-- courses(가로) -->
    <rect x="50" y="30" width="150" height="40" fill="#E8F5E9" rx="3" stroke="#4CAF50" stroke-dasharray="2,2"/>
    <text x="75" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">Spark</text>
    <text x="125" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">PySpark</text>
    <text x="175" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">Hadoop</text>
    
    <!-- fees(가로) -->
    <rect x="50" y="70" width="150" height="40" fill="#E3F2FD" rx="3" stroke="#2196F3" stroke-dasharray="2,2"/>
    <text x="75" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">250000</text>
    <text x="125" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">300000</text>
    <text x="175" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">200000</text>
  </g>

  <!-- 회전 화살표 -->
  <g transform="translate(320, 150)">
    <!-- 90도 회전하는 반원 화살표 -->
    <path d="M 0 -20 A 40 40 0 0 1 40 20" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="35,15 45,20 35,25" fill="#FF5252" />
    <text x="40" y="45" font-family="monospace" font-size="16" fill="#D32F2F" font-weight="bold" text-anchor="middle">.T</text>
    <text x="40" y="-35" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">빙그르르-! (Transpose)</text>
  </g>

  <!-- 뒤집힌 표 -->
  <g transform="translate(440, 70)">
    <rect x="0" y="0" width="200" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <rect x="40" y="0" width="160" height="30" fill="#E3F2FD" rx="3" />
    <text x="80" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">과목명</text>
    <text x="160" y="20" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">수강료</text>
    
    <rect x="0" y="30" width="40" height="150" fill="#FFF3E0" rx="3" />
    <text x="20" y="65" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">0</text>
    <text x="20" y="110" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">1</text>
    <text x="20" y="155" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">2</text>

    <!-- courses(세로) -->
    <rect x="40" y="30" width="80" height="150" fill="#E8F5E9" rx="3" stroke="#4CAF50" stroke-dasharray="2,2"/>
    <text x="80" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">Spark</text>
    <text x="80" y="110" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">PySpark</text>
    <text x="80" y="155" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">Hadoop</text>
    
    <!-- fees(세로) -->
    <rect x="120" y="30" width="80" height="150" fill="#E3F2FD" rx="3" stroke="#2196F3" stroke-dasharray="2,2"/>
    <text x="160" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">250000</text>
    <text x="160" y="110" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">300000</text>
    <text x="160" y="155" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">200000</text>
  </g>

</svg>
