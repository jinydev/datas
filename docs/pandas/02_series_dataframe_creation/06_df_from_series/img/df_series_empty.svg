<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">빈 DataFrame에 기둥(열) 하나씩 세우기</text>

  <!-- 1. 빈 DataFrame -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="100" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-dasharray="4,4" />
    <text x="50" y="75" font-family="monospace" font-size="14" fill="#90A4AE" font-weight="bold" text-anchor="middle">df_empty</text>
    <text x="50" y="95" font-family="sans-serif" font-size="12" fill="#CFD8DC" text-anchor="middle">(텅 비었음)</text>
  </g>

  <!-- 2. 기둥 1 추가 (courses) -->
  <!-- 화살표 -->
  <g transform="translate(180, 150)">
    <path d="M 0 0 L 40 0" fill="none" stroke="#4CAF50" stroke-width="3" stroke-dasharray="3,3" />
    <polygon points="35,-5 45,0 35,5" fill="#4CAF50" />
    <text x="20" y="-15" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">df['과목명']</text>
  </g>

  <g transform="translate(240, 100)">
    <rect x="0" y="0" width="140" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-dasharray="2,2"/>
    
    <!-- 추가된 기둥 -->
    <rect x="20" y="0" width="100" height="150" fill="#E8F5E9" rx="3" stroke="#4CAF50" stroke-width="2"/>
    <rect x="20" y="0" width="100" height="30" fill="#C8E6C9" rx="3" />
    <text x="70" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">과목명</text>
    <text x="70" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">Spark</text>
    <text x="70" y="100" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">PySpark</text>
    <text x="70" y="140" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">Hadoop</text>
  </g>

  <!-- 3. 기둥 2 추가 (fees) -->
  <!-- 화살표 -->
  <g transform="translate(400, 150)">
    <path d="M 0 0 L 40 0" fill="none" stroke="#2196F3" stroke-width="3" stroke-dasharray="3,3" />
    <polygon points="35,-5 45,0 35,5" fill="#2196F3" />
    <text x="20" y="-15" font-family="monospace" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">df['수강료']</text>
  </g>

  <g transform="translate(460, 100)">
    <rect x="0" y="0" width="180" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#90CAF9" stroke-width="3"/>
    
    <!-- 기존 기둥 -->
    <rect x="10" y="0" width="70" height="150" fill="#E8F5E9" rx="3" stroke="#4CAF50" stroke-width="1"/>
    <rect x="10" y="0" width="70" height="30" fill="#C8E6C9" rx="3" />
    <text x="45" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">과목명</text>
    <text x="45" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">Spark</text>
    <text x="45" y="100" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">PySpark</text>
    <text x="45" y="140" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">Hadoop</text>

    <!-- 새로 추가된 기둥 -->
    <rect x="90" y="0" width="80" height="150" fill="#E3F2FD" rx="3" stroke="#2196F3" stroke-width="2"/>
    <rect x="90" y="0" width="80" height="30" fill="#BBDEFB" rx="3" />
    <text x="130" y="20" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">수강료</text>
    <text x="130" y="60" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">250000</text>
    <text x="130" y="100" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">300000</text>
    <text x="130" y="140" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">200000</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 290)">
    <rect x="-240" y="-20" width="480" height="40" fill="#E1F5FE" rx="10" stroke="#03A9F4" stroke-width="2" />
    <text x="0" y="5" font-family="sans-serif" font-size="14" fill="#0277BD" font-weight="bold" text-anchor="middle">df['새로운열이름'] = 데이터 벡터 방식은 실무에서 가장 흔한 패턴!</text>
  </g>

</svg>
