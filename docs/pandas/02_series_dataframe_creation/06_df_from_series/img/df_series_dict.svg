<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">딕셔너리를 활용해 여러 Series 병합하기</text>

  <!-- 파이썬 딕셔너리 포맷 -->
  <g transform="translate(60, 80)">
    <rect x="-10" y="-10" width="230" height="150" fill="#FFF3E0" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="2"/>
    <text x="10" y="20" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold">pd.DataFrame({</text>
    
    <!-- 첫번째 시리즈 -->
    <rect x="25" y="35" width="160" height="25" fill="#FFE0B2" rx="3" />
    <text x="65" y="52" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">courses.name</text>
    <text x="120" y="52" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">:</text>
    <text x="155" y="52" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">courses</text>
    
    <text x="195" y="52" font-family="monospace" font-size="14" fill="#333" font-weight="bold">,</text>

    <!-- 두번째 시리즈 -->
    <rect x="25" y="70" width="160" height="25" fill="#FFE0B2" rx="3" />
    <text x="65" y="87" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">fees.name</text>
    <text x="120" y="87" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">:</text>
    <text x="155" y="87" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">fees</text>

    <text x="10" y="125" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold">})</text>
  </g>

  <!-- 변환 매핑 애로우 -->
  <g transform="translate(320, 140)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#FFA000" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#FFA000" />
    <text x="40" y="-15" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">자동 매핑 결합</text>
  </g>

  <!-- 조립된 표 -->
  <g transform="translate(440, 70)">
    <rect x="-30" y="0" width="220" height="170" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 컬럼 이름 (.name 속성이 들어온 것) -->
    <rect x="30" y="0" width="80" height="30" fill="#E8F5E9" rx="3" />
    <text x="70" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">과목명</text>
    
    <rect x="110" y="0" width="80" height="30" fill="#E8F5E9" rx="3" />
    <text x="150" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">수강료</text>
    
    <!-- 인덱스 (원본 시리즈들의 공통 인덱스 적용) -->
    <rect x="-30" y="30" width="60" height="140" fill="#FFF3E0" rx="3" />
    <text x="0" y="60" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">0</text>
    <text x="0" y="100" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">1</text>
    <text x="0" y="140" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">2</text>

    <!-- 데이터 영역 -->
    <!-- courses 데이터 -->
    <rect x="30" y="30" width="80" height="140" fill="#F1F8E9" rx="3" />
    <text x="70" y="60" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">Spark</text>
    <text x="70" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">PySpark</text>
    <text x="70" y="140" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">Hadoop</text>
    
    <!-- fees 데이터 -->
    <rect x="110" y="30" width="80" height="140" fill="#F1F8E9" rx="3" />
    <text x="150" y="60" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">250000</text>
    <text x="150" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">300000</text>
    <text x="150" y="140" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">200000</text>
  </g>

</svg>
