<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">pd.concat을 이용하여 가로로 나란히 결합하기</text>

  <!-- 원본 재료 시리즈 2개 -->
  <g transform="translate(60, 100)">
    <!-- 첫번째 시리즈(courses) - 세로형 직사각형 -->
    <rect x="0" y="0" width="80" height="150" fill="#E8F5E9" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-dasharray="4,4" />
    <rect x="0" y="0" width="80" height="30" fill="#C8E6C9" rx="5" />
    <text x="40" y="20" font-family="monospace" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">courses</text>
    <text x="40" y="55" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">Spark</text>
    <text x="40" y="90" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">PySpark</text>
    <text x="40" y="125" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">Hadoop</text>
    
    <!-- 더하기 표시 -->
    <text x="100" y="80" font-family="sans-serif" font-size="24" fill="#B0BEC5" font-weight="bold" text-anchor="middle">+</text>

    <!-- 두번째 시리즈(fees) -->
    <rect x="120" y="0" width="80" height="150" fill="#E3F2FD" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-dasharray="4,4" />
    <rect x="120" y="0" width="80" height="30" fill="#BBDEFB" rx="5" />
    <text x="160" y="20" font-family="monospace" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">fees</text>
    <text x="160" y="55" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">250000</text>
    <text x="160" y="90" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">300000</text>
    <text x="160" y="125" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">200000</text>
  </g>

  <!-- 파이썬 명령 박스(pd.concat) -->
  <g transform="translate(300, 150)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#FF5252" />
    
    <rect x="-30" y="-45" width="140" height="30" fill="#FFEbee" rx="5" />
    <text x="40" y="-25" font-family="monospace" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">pd.concat([..], axis=1)</text>

    <!-- axis=1 화살표 설명 -->
    <path d="M 5 -60 L 75 -60" fill="none" stroke="#D32F2F" stroke-width="2" />
    <polygon points="70,-65 80,-60 70,-55" fill="#D32F2F" />
    <text x="40" y="-70" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">옆으로 붙어라!</text>
  </g>

  <!-- 결과 표 -->
  <g transform="translate(440, 70)">
    <rect x="0" y="0" width="200" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 컬럼 이름 (원본 시리즈의 .name 속성) -->
    <rect x="40" y="0" width="80" height="30" fill="#E8F5E9" rx="3" />
    <text x="80" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">과목명</text>
    
    <rect x="120" y="0" width="80" height="30" fill="#E3F2FD" rx="3" />
    <text x="160" y="20" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">수강료</text>
    
    <rect x="0" y="30" width="40" height="150" fill="#FFF3E0" rx="3" />
    <text x="20" y="65" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">0</text>
    <text x="20" y="110" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">1</text>
    <text x="20" y="155" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">2</text>

    <!-- 데이터 영역 -->
    <!-- 과목명 -->
    <text x="80" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">Spark</text>
    <text x="80" y="110" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">PySpark</text>
    <text x="80" y="155" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">Hadoop</text>
    
    <!-- 수강료 -->
    <text x="160" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">250000</text>
    <text x="160" y="110" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">300000</text>
    <text x="160" y="155" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">200000</text>

    <path d="M 120 0 L 120 180" fill="none" stroke="#FF5252" stroke-width="2" stroke-dasharray="3,3" />
  </g>

</svg>
