<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">딕셔너리의 Value로 Series 결합 (기본)</text>

  <!-- 파이썬 딕셔너리 재료 -->
  <g transform="translate(60, 60)">
    <rect x="-10" y="0" width="230" height="200" fill="#E8EAF6" rx="5" filter="url(#shadow)" stroke="#3F51B5" stroke-width="2"/>
    <text x="10" y="25" font-family="monospace" font-size="14" fill="#1A237E" font-weight="bold">pd.DataFrame({</text>
    
    <!-- 국어 -->
    <rect x="20" y="40" width="180" height="40" fill="#C5CAE9" rx="3" />
    <text x="30" y="65" font-family="monospace" font-size="14" fill="#1A237E" font-weight="bold">'국어': </text>
    <text x="80" y="65" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">[90, 80, 60, 66]</text>
    
    <!-- 영어 -->
    <rect x="20" y="90" width="180" height="40" fill="#C5CAE9" rx="3" />
    <text x="30" y="115" font-family="monospace" font-size="14" fill="#1A237E" font-weight="bold">'영어': </text>
    <text x="80" y="115" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">[45, 73, 83, 99]</text>
    
    <!-- 수학 -->
    <rect x="20" y="140" width="180" height="40" fill="#C5CAE9" rx="3" />
    <text x="30" y="165" font-family="monospace" font-size="14" fill="#1A237E" font-weight="bold">'수학': </text>
    <text x="80" y="165" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold">[92, 75, 82, 75]</text>

    <text x="5" y="195" font-family="monospace" font-size="14" fill="#1A237E" font-weight="bold">})</text>
  </g>

  <!-- 변환 애로우 -->
  <g transform="translate(320, 140)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#FFA000" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#FFA000" />
  </g>

  <!-- 결과 표 -->
  <g transform="translate(420, 70)">
    <rect x="0" y="0" width="220" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#3F51B5" stroke-width="3"/>
    
    <!-- 컬럼 헤더 -->
    <rect x="40" y="0" width="180" height="30" fill="#E3F2FD" rx="3" />
    <text x="70" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">국어</text>
    <text x="130" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">영어</text>
    <text x="190" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">수학</text>
    
    <!-- 인덱스 -->
    <rect x="0" y="30" width="40" height="150" fill="#FFF3E0" rx="3" />
    <text x="20" y="65" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">0</text>
    <text x="20" y="100" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">1</text>
    <text x="20" y="135" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">2</text>
    <text x="20" y="170" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">3</text>

    <!-- 데이터 영역 -->
    <!-- s1 -->
    <text x="70" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">90</text>
    <text x="70" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">80</text>
    <text x="70" y="135" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">60</text>
    <text x="70" y="170" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">66</text>
    
    <!-- s2 -->
    <text x="130" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">45</text>
    <text x="130" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">73</text>
    <text x="130" y="135" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">83</text>
    <text x="130" y="170" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">99</text>
    
    <!-- s3 -->
    <text x="190" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">92</text>
    <text x="190" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">75</text>
    <text x="190" y="135" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">82</text>
    <text x="190" y="170" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">75</text>
  </g>

  <g transform="translate(350, 290)">
    <rect x="-240" y="-15" width="480" height="35" fill="#E8EAF6" rx="10" stroke="#3F51B5" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#1A237E" font-weight="bold" text-anchor="middle">모든 시리즈가 기본 인덱스(0,1,2,3)를 공유하여 완벽하게 결합됨!</text>
  </g>

</svg>
