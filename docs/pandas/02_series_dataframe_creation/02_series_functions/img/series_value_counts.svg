<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.value_counts() 투표 개표 및 빈도수 측정!</text>

  <!-- 원본 데이터 풀 -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="220" height="150" fill="#E8EAF6" rx="10" stroke="#3F51B5" stroke-dasharray="4,4" />
    <text x="110" y="-10" font-family="sans-serif" font-size="14" fill="#3F51B5" font-weight="bold" text-anchor="middle">투표함 (설문 결과)</text>
    
    <!-- 1.0들 -->
    <circle cx="40" cy="40" r="18" fill="#4CAF50" />
    <text x="40" y="45" font-family="sans-serif" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">1</text>
    <circle cx="90" cy="30" r="18" fill="#4CAF50" />
    <text x="90" y="35" font-family="sans-serif" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">1</text>
    
    <!-- 6.0들 -->
    <circle cx="150" cy="50" r="18" fill="#2196F3" />
    <text x="150" y="55" font-family="sans-serif" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">6</text>
    <circle cx="180" cy="100" r="18" fill="#2196F3" />
    <text x="180" y="105" font-family="sans-serif" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">6</text>
    
    <!-- 나머지 -->
    <circle cx="40" cy="110" r="18" fill="#FFC107" />
    <text x="40" y="115" font-family="sans-serif" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">2</text>
    
    <circle cx="90" cy="110" r="18" fill="#FF9800" />
    <text x="90" y="115" font-family="sans-serif" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">3</text>
    
    <circle cx="130" cy="110" r="18" fill="#F44336" />
    <text x="130" y="115" font-family="sans-serif" font-size="14" fill="#FFF" font-weight="bold" text-anchor="middle">4</text>
    
    <!-- 결측치 NaN -->
    <circle cx="40" cy="165" r="15" fill="#B0BEC5" stroke="#90A4AE" stroke-dasharray="2,2"/>
    <text x="40" y="169" font-family="sans-serif" font-size="10" fill="#FFF" text-anchor="middle">NaN</text>
    <circle cx="80" cy="175" r="15" fill="#B0BEC5" stroke="#90A4AE" stroke-dasharray="2,2"/>
    <text x="80" y="179" font-family="sans-serif" font-size="10" fill="#FFF" text-anchor="middle">NaN</text>
    <circle cx="120" cy="165" r="15" fill="#B0BEC5" stroke="#90A4AE" stroke-dasharray="2,2"/>
    <text x="120" y="169" font-family="sans-serif" font-size="10" fill="#FFF" text-anchor="middle">NaN</text>
  </g>

  <!-- 개표 기능 화살표 -->
  <g transform="translate(280, 140)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#9C27B0" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#9C27B0" />
    <text x="40" y="-15" font-family="monospace" font-size="14" fill="#7B1FA2" font-weight="bold" text-anchor="middle">value_counts()</text>
  </g>

  <!-- 결과 막대그래프 랭킹 -->
  <g transform="translate(400, 60)">
    <rect x="0" y="0" width="220" height="240" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="30" fill="#F3E5F5" rx="5" />
    <text x="110" y="20" font-family="sans-serif" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">등장 빈도 랭킹 (개표 결과)</text>
    
    <!-- 1등 (NaN) -->
    <text x="35" y="60" font-family="sans-serif" font-size="12" fill="#78909C" font-weight="bold" text-anchor="middle">NaN</text>
    <rect x="60" y="47" width="120" height="18" fill="#B0BEC5" rx="2" />
    <text x="195" y="60" font-family="sans-serif" font-size="12" fill="#78909C" font-weight="bold" text-anchor="middle">3번</text>

    <!-- 2등 (1점) -->
    <text x="35" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">1.0점</text>
    <rect x="60" y="77" width="80" height="18" fill="#4CAF50" rx="2" />
    <text x="195" y="90" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">2번</text>

    <!-- 3등 (6점) -->
    <text x="35" y="120" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">6.0점</text>
    <rect x="60" y="107" width="80" height="18" fill="#2196F3" rx="2" />
    <text x="195" y="120" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">2번</text>
    
    <!-- 4등 (2, 3, 4점) -->
    <text x="35" y="150" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">3.0점</text>
    <rect x="60" y="137" width="40" height="18" fill="#FF9800" rx="2" />
    <text x="195" y="150" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">1번</text>

    <text x="35" y="180" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">2.0점</text>
    <rect x="60" y="167" width="40" height="18" fill="#FFC107" rx="2" />
    <text x="195" y="180" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">1번</text>

    <text x="35" y="210" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">4.0점</text>
    <rect x="60" y="197" width="40" height="18" fill="#F44336" rx="2" />
    <text x="195" y="210" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">1번</text>
  </g>

</svg>
