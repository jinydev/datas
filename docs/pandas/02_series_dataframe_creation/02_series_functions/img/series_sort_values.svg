<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">값(Values) 기준 정렬: sort_values()</text>

  <!-- Original Series -->
  <text x="130" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Original Series</text>
  <rect x="50" y="90" width="160" height="140" rx="5" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <rect x="55" y="95" width="50" height="130" fill="#bbdefb" rx="3"/>
  <text x="80" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">희빈</text>
  <text x="80" y="140" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">수영</text>
  <text x="80" y="165" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">현수</text>
  <text x="80" y="190" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">지호</text>
  <text x="80" y="215" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">지민</text>
  
  <text x="140" y="115" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">99</text>
  <text x="140" y="140" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">84</text>
  <text x="140" y="165" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">92</text>
  <text x="140" y="190" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">65</text>
  <text x="140" y="215" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">78</text>

  <!-- Arrow -->
  <g stroke="#4caf50" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 220 160 L 320 160" />
  </g>
  <text x="270" y="150" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">sort_values()</text>
  <text x="270" y="180" font-family="Arial" font-size="12" fill="#2e7d32" text-anchor="middle">(오름차순)</text>

  <!-- Sorted Series -->
  <text x="440" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Sorted Series (오름차순)</text>
  <rect x="360" y="90" width="160" height="140" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <rect x="365" y="95" width="50" height="130" fill="#c8e6c9" rx="3"/>
  <text x="390" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">지호</text>
  <text x="390" y="140" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">지민</text>
  <text x="390" y="165" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">수영</text>
  <text x="390" y="190" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">현수</text>
  <text x="390" y="215" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">희빈</text>
  
  <text x="450" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">65</text>
  <text x="450" y="140" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">78</text>
  <text x="450" y="165" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">84</text>
  <text x="450" y="190" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">92</text>
  <text x="450" y="215" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">99</text>

  <!-- Highlight box -->
  <rect x="420" y="95" width="60" height="130" fill="none" stroke="#e65100" stroke-width="2" stroke-dasharray="4,4"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
  </defs>
</svg>
