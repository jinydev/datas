<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="300" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">비유: 성적표 석차 매기기와 요약 보고서</text>

  <!-- Report Card -->
  <rect x="100" y="80" width="160" height="190" fill="#fff9c4" stroke="#fbc02d" stroke-width="2" filter="drop-shadow(2px 4px 6px rgba(0,0,0,0.1))"/>
  <rect x="100" y="80" width="160" height="30" fill="#fbc02d"/>
  <text x="180" y="100" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">반 성적표</text>
  
  <text x="130" y="140" font-family="Arial" font-size="16" fill="#333">희빈: 99점</text>
  <text x="130" y="170" font-family="Arial" font-size="16" fill="#333">수영: 84점</text>
  <text x="130" y="200" font-family="Arial" font-size="16" fill="#333">현수: 92점</text>
  <text x="130" y="230" font-family="Arial" font-size="16" fill="#333">지호: 65점</text>

  <!-- Arrows -->
  <path d="M 280 140 L 330 110" stroke="#f57c00" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 280 180 L 330 220" stroke="#8e24aa" stroke-width="3" fill="none" marker-end="url(#arrow-purple)"/>

  <!-- Sorting -->
  <rect x="360" y="70" width="160" height="90" rx="10" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="440" y="95" font-family="Arial" font-size="16" font-weight="bold" fill="#e65100" text-anchor="middle">석차 세우기 (Sort)</text>
  <text x="440" y="120" font-family="Arial" font-size="14" fill="#e65100" text-anchor="middle">1등: 희빈 (99점)</text>
  <text x="440" y="140" font-family="Arial" font-size="14" fill="#e65100" text-anchor="middle">2등: 현수 (92점)</text>

  <!-- Statistics -->
  <rect x="360" y="180" width="160" height="90" rx="10" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2"/>
  <text x="440" y="205" font-family="Arial" font-size="16" font-weight="bold" fill="#6a1b9a" text-anchor="middle">요약 보고서 (Stats)</text>
  <text x="440" y="230" font-family="Arial" font-size="14" fill="#6a1b9a" text-anchor="middle">최고점: 99점</text>
  <text x="440" y="250" font-family="Arial" font-size="14" fill="#6a1b9a" text-anchor="middle">평균점: 85점</text>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f57c00" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8e24aa" />
    </marker>
  </defs>
</svg>
