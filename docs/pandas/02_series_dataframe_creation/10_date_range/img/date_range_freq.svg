<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.freq 옵션으로 징검다리 건너뛰듯 시간 생성하기</text>

  <!-- 기준축 (시간선) 디자인 -->
  <g transform="translate(50, 100)">
    <!-- 시간 안내선 -->
    <path d="M 0 50 L 600 50" fill="none" stroke="#B0BEC5" stroke-width="2" />
    <!-- 화살표 끝 -->
    <polygon points="595,45 605,50 595,55" fill="#B0BEC5" />

    <!-- 1일 간격 (기본, freq='D') 가이드 점선들 -->
    <line x1="50" y1="40" x2="50" y2="60" stroke="#CFD8DC" stroke-width="2" />
    <line x1="150" y1="40" x2="150" y2="60" stroke="#CFD8DC" stroke-width="2" />
    <line x1="250" y1="40" x2="250" y2="60" stroke="#CFD8DC" stroke-width="2" />
    <line x1="350" y1="40" x2="350" y2="60" stroke="#CFD8DC" stroke-width="2" />
    <line x1="450" y1="40" x2="450" y2="60" stroke="#CFD8DC" stroke-width="2" />
    <line x1="550" y1="40" x2="550" y2="60" stroke="#CFD8DC" stroke-width="2" />

    <text x="50" y="80" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">1/1</text>
    <text x="150" y="80" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">1/2</text>
    <text x="250" y="80" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">1/3</text>
    <text x="350" y="80" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">1/4</text>
    <text x="450" y="80" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">1/5</text>
    <text x="550" y="80" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">1/6</text>

    <!-- freq="3D" 점프 화살표 그리기 -->
    <path d="M 50 40 Q 200 -20 350 40" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="345,35 350,40 345,45" fill="#FF5252" transform="rotate(30 350 40)" />
    
    <!-- 첫 번째 포인트 (1/1) -->
    <circle cx="50" cy="50" r="8" fill="#FF5252" />
    <rect x="25" y="-10" width="50" height="20" fill="#FFCDD2" rx="3" />
    <text x="50" y="3" font-family="sans-serif" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">start</text>

    <!-- 두 번째 포인트 (1/4) -->
    <circle cx="350" cy="50" r="8" fill="#FF5252" />
    
    <!-- 점프 텍스트 -->
    <rect x="170" y="-15" width="60" height="25" fill="#FFEbee" rx="5" stroke="#F44336" />
    <text x="200" y="2" font-family="monospace" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">freq='3D'</text>
  </g>

  <!-- 3시간 단위 점프 (freq='3H') 설명 -->
  <g transform="translate(50, 230)">
    <path d="M 0 30 L 600 30" fill="none" stroke="#B0BEC5" stroke-width="2" />
    <polygon points="595,25 605,30 595,35" fill="#B0BEC5" />

    <circle cx="50" cy="30" r="6" fill="#2196F3" />
    <text x="50" y="55" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">00:00</text>
    
    <path d="M 50 20 Q 100 -5 150 20" fill="none" stroke="#2196F3" stroke-width="2" />
    <polygon points="145,15 150,20 145,25" fill="#2196F3" transform="rotate(45 150 20)"/>
    <text x="100" y="-10" font-family="monospace" font-size="12" fill="#1976D2" text-anchor="middle">freq='3H'</text>

    <circle cx="150" cy="30" r="6" fill="#2196F3" />
    <text x="150" y="55" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">03:00</text>

    <path d="M 150 20 Q 200 -5 250 20" fill="none" stroke="#2196F3" stroke-width="2" />
    <polygon points="245,15 250,20 245,25" fill="#2196F3" transform="rotate(45 250 20)"/>
    <circle cx="250" cy="30" r="6" fill="#2196F3" />
    <text x="250" y="55" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">06:00</text>
    
    <path d="M 250 20 Q 300 -5 350 20" fill="none" stroke="#2196F3" stroke-width="2" />
    <polygon points="345,15 350,20 345,25" fill="#2196F3" transform="rotate(45 350 20)"/>
    <circle cx="350" cy="30" r="6" fill="#2196F3" />
    <text x="350" y="55" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">09:00</text>

    <path d="M 350 20 Q 400 -5 450 20" fill="none" stroke="#2196F3" stroke-width="2" />
    <polygon points="445,15 450,20 445,25" fill="#2196F3" transform="rotate(45 450 20)"/>
    <circle cx="450" cy="30" r="6" fill="#2196F3" />
    <text x="450" y="55" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">12:00</text>
  </g>

</svg>
