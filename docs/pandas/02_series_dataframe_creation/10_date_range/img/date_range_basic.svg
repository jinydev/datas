<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">pd.date_range() 기계로 연속된 날짜 뽑기 (일별)</text>

  <!-- 파이썬 명령(기계 모양) -->
  <g transform="translate(40, 100)">
    <!-- 기계 본체 -->
    <rect x="0" y="0" width="220" height="150" fill="#263238" rx="10" filter="url(#shadow)" stroke="#00BCD4" stroke-width="3"/>
    
    <!-- 디스플레이 패널 -->
    <rect x="15" y="20" width="190" height="40" fill="#000" rx="3" />
    <text x="110" y="45" font-family="monospace" font-size="16" fill="#00E676" font-weight="bold" text-anchor="middle">pd.date_range()</text>
    
    <!-- 입력 파라미터 (버튼들) -->
    <rect x="15" y="80" width="90" height="25" fill="#37474F" rx="3" />
    <text x="60" y="97" font-family="sans-serif" font-size="12" fill="#80DEEA" font-weight="bold" text-anchor="middle">start="20250101"</text>
    
    <rect x="15" y="110" width="90" height="25" fill="#37474F" rx="3" />
    <text x="60" y="127" font-family="sans-serif" font-size="12" fill="#FFCA28" font-weight="bold" text-anchor="middle">periods=6</text>
    
    <!-- 배출구 -->
    <rect x="220" y="60" width="20" height="30" fill="#607D8B" />
  </g>

  <!-- 테이프 배출 모양 -->
  <g transform="translate(260, 150)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#00BCD4" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#00BCD4" />
  </g>

  <!-- 결과 시계열 벡터 (DatetimeIndex) -->
  <g transform="translate(360, 50)">
    <rect x="0" y="0" width="280" height="250" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="3"/>
    
    <rect x="0" y="0" width="280" height="35" fill="#E0F7FA" rx="3" />
    <text x="140" y="22" font-family="sans-serif" font-size="14" fill="#006064" font-weight="bold" text-anchor="middle">DatetimeIndex (freq='D')</text>

    <!-- 날짜 하나씩 뽑혀 나온 모습 -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="240" height="25" fill="#FFF" stroke="#B2EBF2" rx="3"/>
      <text x="120" y="17" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2025-01-01</text>
    </g>
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="240" height="25" fill="#FFF" stroke="#B2EBF2" rx="3"/>
      <text x="120" y="17" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2025-01-02</text>
    </g>
    <g transform="translate(20, 110)">
      <rect x="0" y="0" width="240" height="25" fill="#FFF" stroke="#B2EBF2" rx="3"/>
      <text x="120" y="17" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2025-01-03</text>
    </g>
    <g transform="translate(20, 140)">
      <rect x="0" y="0" width="240" height="25" fill="#FFF" stroke="#B2EBF2" rx="3"/>
      <text x="120" y="17" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2025-01-04</text>
    </g>
    <g transform="translate(20, 170)">
      <rect x="0" y="0" width="240" height="25" fill="#FFF" stroke="#B2EBF2" rx="3"/>
      <text x="120" y="17" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2025-01-05</text>
    </g>
    <g transform="translate(20, 200)">
      <rect x="0" y="0" width="240" height="25" fill="#FFF" stroke="#B2EBF2" rx="3"/>
      <text x="120" y="17" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2025-01-06</text>
    </g>
  </g>

</svg>
