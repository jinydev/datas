<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">일정한 시간 공차(Freq)를 갖는 등차수열 시퀀스</text>

  <!-- Formula / Concept -->
  <text x="325" y="70" font-family="Times New Roman, serif" font-size="20" font-style="italic" fill="#0d47a1" text-anchor="middle">
    t<tspan baseline-shift="sub" font-size="14">n</tspan> = start + (n × freq)
  </text>
  <text x="325" y="90" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">(for n = 0, 1, 2, ... periods-1)</text>

  <!-- Timeline Axis -->
  <line x1="50" y1="160" x2="600" y2="160" stroke="#90caf9" stroke-width="4"/>
  <polygon points="600,160 590,155 590,165" fill="#90caf9"/>
  <text x="590" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">Time</text>

  <!-- Data Points -->
  <!-- Start -->
  <circle cx="100" cy="160" r="6" fill="#1e88e5"/>
  <text x="100" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">t<tspan baseline-shift="sub" font-size="10">0</tspan></text>
  <text x="100" y="185" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">start</text>
  <text x="100" y="200" font-family="Courier New, monospace" font-size="10" fill="#666" text-anchor="middle">'2025-01-01'</text>

  <!-- Jump 1 -->
  <path d="M 100 130 C 130 100, 170 100, 200 130" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="150" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">+ freq</text>

  <!-- t1 -->
  <circle cx="200" cy="160" r="6" fill="#1e88e5"/>
  <text x="200" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">t<tspan baseline-shift="sub" font-size="10">1</tspan></text>
  <text x="200" y="185" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">period 2</text>
  <text x="200" y="200" font-family="Courier New, monospace" font-size="10" fill="#666" text-anchor="middle">'2025-01-02'</text>

  <!-- Jump 2 -->
  <path d="M 200 130 C 230 100, 270 100, 300 130" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="250" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">+ freq</text>

  <!-- t2 -->
  <circle cx="300" cy="160" r="6" fill="#1e88e5"/>
  <text x="300" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">t<tspan baseline-shift="sub" font-size="10">2</tspan></text>
  <text x="300" y="185" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">period 3</text>
  <text x="300" y="200" font-family="Courier New, monospace" font-size="10" fill="#666" text-anchor="middle">'2025-01-03'</text>

  <!-- Ellipsis -->
  <text x="400" y="165" font-family="Arial" font-size="20" font-weight="bold" fill="#1e88e5" text-anchor="middle">...</text>

  <!-- Jump n -->
  <path d="M 400 130 C 430 100, 470 100, 500 130" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="450" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">+ freq</text>

  <!-- end -->
  <circle cx="500" cy="160" r="6" fill="#1e88e5"/>
  <text x="500" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">t<tspan baseline-shift="sub" font-size="10">n</tspan></text>
  <text x="500" y="185" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">end</text>
  <text x="500" y="200" font-family="Courier New, monospace" font-size="10" fill="#666" text-anchor="middle">'2025-01-XX'</text>

  <!-- Output Box -->
  <rect x="230" y="215" width="190" height="25" fill="#e3f2fd" stroke="#2196f3" rx="12"/>
  <text x="325" y="232" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#0d47a1" text-anchor="middle">Returns: DatetimeIndex [ ]</text>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
