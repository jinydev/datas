<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">Key-Value 기반의 다형성 열(Column) 매핑</text>

  <!-- Left: Dictionary Structure -->
  <text x="160" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Python Dictionary (Dict)</text>
  <rect x="50" y="90" width="220" height="130" rx="5" fill="#fff" stroke="#ccc" stroke-width="2"/>
  
  <text x="60" y="120" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#333" text-anchor="start">{</text>
  
  <text x="80" y="150" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="start">'Col1':</text>
  <text x="145" y="150" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">[10, 20],</text>
  
  <text x="80" y="180" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="start">'Col2':</text>
  <text x="145" y="180" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">[30, 40]</text>
  
  <text x="60" y="210" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#333" text-anchor="start">}</text>

  <!-- Key & Value Annotations -->
  <rect x="75" y="133" width="60" height="25" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="2,2"/>
  <rect x="140" y="133" width="80" height="25" fill="none" stroke="#2196f3" stroke-width="2" stroke-dasharray="2,2"/>
  
  <text x="105" y="128" font-family="Arial" font-size="12" font-weight="bold" fill="#ff9800" text-anchor="middle">Key</text>
  <text x="180" y="128" font-family="Arial" font-size="12" font-weight="bold" fill="#2196f3" text-anchor="middle">Value List</text>

  <!-- Arrow -->
  <g stroke="#9c27b0" stroke-width="3" fill="none" marker-end="url(#arrow-purple)">
    <path d="M 285 155 L 345 155" />
  </g>
  <text x="315" y="145" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2" text-anchor="middle">매핑</text>

  <!-- Right: DataFrame Structure -->
  <text x="460" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">DataFrame (관계 대수)</text>
  <rect x="370" y="90" width="180" height="130" rx="5" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2"/>
  
  <!-- Headers (Keys) -->
  <rect x="380" y="100" width="70" height="30" fill="#fff3e0" rx="3" stroke="#ff9800"/>
  <text x="415" y="120" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">Col1</text>
  
  <rect x="470" y="100" width="70" height="30" fill="#e8f5e9" rx="3" stroke="#4caf50"/>
  <text x="505" y="120" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">Col2</text>
  
  <!-- Column Vectors (Values) -->
  <rect x="380" y="130" width="70" height="80" fill="#e3f2fd" rx="3" stroke="#2196f3" stroke-dasharray="2,2"/>
  <text x="415" y="160" font-family="Courier New, monospace" font-size="16" fill="#333" text-anchor="middle">10</text>
  <text x="415" y="195" font-family="Courier New, monospace" font-size="16" fill="#333" text-anchor="middle">20</text>
  
  <rect x="470" y="130" width="70" height="80" fill="#e3f2fd" rx="3" stroke="#2196f3" stroke-dasharray="2,2"/>
  <text x="505" y="160" font-family="Courier New, monospace" font-size="16" fill="#333" text-anchor="middle">30</text>
  <text x="505" y="195" font-family="Courier New, monospace" font-size="16" fill="#333" text-anchor="middle">40</text>

  <!-- Connectors -->
  <path d="M 135 150 C 260 90, 320 60, 415 100" stroke="#ff9800" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <path d="M 220 150 C 280 150, 320 180, 380 170" stroke="#2196f3" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>

  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c27b0" />
    </marker>
  </defs>
</svg>
