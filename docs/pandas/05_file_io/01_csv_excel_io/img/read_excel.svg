<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: 엑셀 파일 불러오기 - read_excel()</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="460" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="230" y="30" font-family="monospace" font-size="16" fill="#81C784" font-weight="bold" text-anchor="middle">df = pd.read_excel(<tspan fill="#FFEB3B">"titanic.xlsx"</tspan>)</text>
  </g>

  <!-- 왼쪽: 하드디스크의 엑셀 파일 -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="120" height="150" fill="#E8F5E9" rx="10" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 엑셀 아이콘 (가상) -->
    <rect x="35" y="20" width="50" height="40" fill="#4CAF50" rx="5" />
    <text x="60" y="45" font-family="sans-serif" font-size="20" fill="#FFF" font-weight="bold" text-anchor="middle">X</text>
    <rect x="80" y="45" width="20" height="30" fill="#FFFFFF" rx="2" />
    <path d="M 85 50 L 95 50 M 85 55 L 95 55 M 85 60 L 95 60" stroke="#4CAF50" stroke-width="1" />
    
    <text x="60" y="80" font-family="sans-serif" font-size="16" fill="#2E7D32" font-weight="bold" text-anchor="middle">Excel 상자</text>
    <text x="60" y="100" font-family="monospace" font-size="12" fill="#1B5E20" text-anchor="middle">titanic.xlsx</text>

    <!-- 디스크 기호 -->
    <path d="M 10 130 C 10 145 110 145 110 130" fill="none" stroke="#2E7D32" stroke-width="2" />
    <path d="M 10 120 C 10 135 110 135 110 120" fill="none" stroke="#2E7D32" stroke-width="2" />
    <text x="60" y="145" font-family="sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">용량: 100KB</text>
  </g>

  <!-- 중앙 이동 화살표 (언패킹) -->
  <g transform="translate(250, 170)">
    <!-- 포장 풀기 연출 (점선 화살표) -->
    <path d="M -10 40 L 160 40" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="150,33 165,40 150,47" fill="#4CAF50" />
    
    <rect x="25" y="15" width="100" height="50" fill="#FFF" rx="5" stroke="#4CAF50" stroke-width="2" />
    <text x="75" y="32" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">포장 풀기</text>
    <text x="75" y="50" font-family="monospace" font-size="11" fill="#1B5E20" text-anchor="middle">Deserialization</text>
  </g>

  <!-- 오른쪽: 메모리 위의 데이터프레임 -->
  <g transform="translate(430, 150)">
    <rect x="0" y="0" width="180" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="90" y="-15" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">파이썬 RAM 작업대 위 (DataFrame)</text>

    <!-- 표 구조 -->
    <rect x="20" y="20" width="140" height="20" fill="#E3F2FD" rx="3" />
    <text x="40" y="34" font-family="sans-serif" font-size="10" fill="#0D47A1" font-weight="bold" text-anchor="middle">Name</text>
    <text x="80" y="34" font-family="sans-serif" font-size="10" fill="#0D47A1" font-weight="bold" text-anchor="middle">Sex</text>
    <text x="120" y="34" font-family="sans-serif" font-size="10" fill="#0D47A1" font-weight="bold" text-anchor="middle">Age</text>
    <text x="150" y="34" font-family="sans-serif" font-size="10" fill="#0D47A1" font-weight="bold" text-anchor="middle">...</text>

    <!-- 데이터 세트들 -->
    <rect x="20" y="45" width="40" height="15" fill="#ECEFF1" rx="2" />
    <rect x="65" y="45" width="40" height="15" fill="#ECEFF1" rx="2" />
    <rect x="110" y="45" width="20" height="15" fill="#ECEFF1" rx="2" />

    <rect x="20" y="65" width="40" height="15" fill="#E8F5E9" rx="2" />
    <rect x="65" y="65" width="40" height="15" fill="#E8F5E9" rx="2" />
    <rect x="110" y="65" width="20" height="15" fill="#E8F5E9" rx="2" />

    <rect x="20" y="85" width="40" height="15" fill="#FFF3E0" rx="2" />
    <rect x="65" y="85" width="40" height="15" fill="#FFF3E0" rx="2" />
    <rect x="110" y="85" width="20" height="15" fill="#FFF3E0" rx="2" />

    <text x="90" y="125" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">1309 Rows × 14 Cols</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 320)">
    <text x="0" y="0" font-family="sans-serif" font-size="14" fill="#616161" font-weight="bold" text-anchor="middle">딱딱하게 압축된 엑셀 상실을 열어, 즉각 분석이 가능한 파이썬의 부드러운 도마 위로 꺼내 올립니다.</text>
  </g>

</svg>
