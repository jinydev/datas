<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">비유: 해독 안경 쓰기, 머리채 자르기, 쉼표 수염 떼어내기</text>

  <!-- 1. Decoding (Glasses) -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="170" height="160" fill="#fff" stroke="#90caf9" stroke-width="2" rx="10"/>
    <text x="85" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#0288d1" text-anchor="middle">글씨 해독 안경</text>

    <!-- Garbled text -->
    <text x="85" y="55" font-family="Courier New" font-size="20" fill="#9e9e9e" text-anchor="middle">뛟쀍</text>

    <!-- Glasses -->
    <path d="M 40 85 C 40 105, 70 105, 80 85 C 90 105, 120 105, 120 85 M 30 85 L 130 85" fill="none" stroke="#0288d1" stroke-width="4" stroke-linecap="round"/>
    <circle cx="60" cy="85" r="15" fill="#e1f5fe" opacity="0.6"/>
    <circle cx="100" cy="85" r="15" fill="#e1f5fe" opacity="0.6"/>

    <path d="M 85 110 L 85 130" stroke="#0288d1" stroke-width="2" marker-end="url(#arrow-blue2)"/>

    <text x="85" y="150" font-family="Arial" font-size="20" font-weight="bold" fill="#1565c0" text-anchor="middle">"서울"</text>
  </g>

  <!-- 2. Skiprows (Scissors) -->
  <g transform="translate(240, 50)">
    <rect x="0" y="0" width="170" height="160" fill="#fff" stroke="#ffb74d" stroke-width="2" rx="10"/>
    <text x="85" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">쓸모없는 표지 자르기</text>

    <!-- Paper -->
    <rect x="45" y="50" width="80" height="80" fill="#f5f5f5" stroke="#ccc" rx="2"/>
    <rect x="45" y="50" width="80" height="25" fill="#ffcdd2"/>
    <text x="85" y="66" font-family="Arial" font-size="10" fill="#b71c1c" text-anchor="middle">"2022 통계표..."</text>
    
    <line x1="45" y1="90" x2="125" y2="90" stroke="#ddd" stroke-width="2"/>
    <line x1="45" y1="110" x2="125" y2="110" stroke="#ddd" stroke-width="2"/>

    <!-- Cut line -->
    <line x1="30" y1="75" x2="140" y2="75" stroke="#e65100" stroke-dasharray="3,3" stroke-width="2"/>

    <!-- Scissors -->
    <path d="M 100 70 L 140 60 M 100 80 L 140 90" stroke="#333" stroke-width="3"/>
    <circle cx="145" cy="58" r="5" fill="none" stroke="#f57f17" stroke-width="3"/>
    <circle cx="145" cy="92" r="5" fill="none" stroke="#f57f17" stroke-width="3"/>

    <text x="85" y="150" font-family="Arial" font-size="12" font-weight="bold" fill="#d84315" text-anchor="middle">본론부터 읽기 시작!</text>
  </g>

  <!-- 3. Thousands (Removing Comma) -->
  <g transform="translate(440, 50)">
    <rect x="0" y="0" width="170" height="160" fill="#fff" stroke="#81c784" stroke-width="2" rx="10"/>
    <text x="85" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">콤마(,) 수염 떼어내기</text>

    <!-- Fake String Number -->
    <text x="85" y="65" font-family="Courier New" font-size="24" fill="#333" text-anchor="middle">1,234</text>
    
    <!-- Tweezer / Plucking -->
    <path d="M 110 30 L 70 65 L 120 40" fill="none" stroke="#90a4ae" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Comma falling -->
    <text x="65" y="100" font-family="Arial" font-size="20" fill="#d32f2f" font-weight="bold">,</text>
    <path d="M 70 70 C 65 80, 70 90, 70 95" fill="none" stroke="#d32f2f" stroke-dasharray="2,2"/>

    <text x="85" y="130" font-family="Courier New" font-size="24" font-weight="bold" fill="#1565c0" text-anchor="middle">1234</text>
    <text x="85" y="150" font-family="Arial" font-size="12" font-weight="bold" fill="#388e3c" text-anchor="middle">계산 가능한 숫자!</text>
  </g>

  <defs>
    <marker id="arrow-blue2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0288d1" />
    </marker>
  </defs>
</svg>
