<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">Pandas Series의 3대 핵심 구조 (Values, Index, Name)</text>

  <!-- Series 전체 구조 박스 -->
  <g transform="translate(250, 80)">
    <rect x="-30" y="0" width="260" height="200" fill="#FFFFFF" rx="10" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 3. Name (명패) -->
    <rect x="-10" y="-15" width="220" height="30" fill="#E8F5E9" rx="5" stroke="#81C784" stroke-width="2"/>
    <text x="100" y="5" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">3. Name (이름): "과일 단가표"</text>
    <path d="M 100 15 L 100 35" fill="none" stroke="#81C784" stroke-width="2" />
    
    <!-- 2. Index 영역 -->
    <rect x="0" y="50" width="80" height="130" fill="#FFF3E0" rx="4" />
    <text x="40" y="45" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">2. Index</text>
    
    <text x="40" y="70" font-family="sans-serif" font-size="12" fill="#FF9800" font-weight="bold" text-anchor="middle">Apple</text>
    <text x="40" y="100" font-family="sans-serif" font-size="12" fill="#FF9800" font-weight="bold" text-anchor="middle">Banana</text>
    <text x="40" y="130" font-family="sans-serif" font-size="12" fill="#FF9800" font-weight="bold" text-anchor="middle">Orange</text>
    <text x="40" y="160" font-family="sans-serif" font-size="12" fill="#FF9800" font-weight="bold" text-anchor="middle">Kiwi</text>
    
    <!-- 1. Values 영역 -->
    <rect x="100" y="50" width="80" height="130" fill="#E3F2FD" rx="4" />
    <text x="140" y="45" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">1. Values</text>
    
    <text x="140" y="70" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">1500</text>
    <text x="140" y="100" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">3000</text>
    <text x="140" y="130" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">2000</text>
    <text x="140" y="160" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">500</text>
    
    <!-- 매핑을 보여주는 연결 선 -->
    <path d="M 60 65 L 120 65" fill="none" stroke="#B0BEC5" stroke-dasharray="2,2" />
    <path d="M 60 95 L 120 95" fill="none" stroke="#B0BEC5" stroke-dasharray="2,2" />
    <path d="M 60 125 L 120 125" fill="none" stroke="#B0BEC5" stroke-dasharray="2,2" />
    <path d="M 60 155 L 120 155" fill="none" stroke="#B0BEC5" stroke-dasharray="2,2" />
  </g>

  <!-- 좌측 / 우측 설명 블록 -->
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="180" height="60" fill="#FFF3E0" rx="5" />
    <text x="90" y="25" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">이름표 (Index)</text>
    <text x="90" y="45" font-family="sans-serif" font-size="11" fill="#FF9800" text-anchor="middle">데이터에 접근하는 "비밀번호"</text>
  </g>
  
  <g transform="translate(500, 120)">
    <rect x="0" y="0" width="180" height="60" fill="#E3F2FD" rx="5" />
    <text x="90" y="25" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">실제 값 (Values)</text>
    <text x="90" y="45" font-family="sans-serif" font-size="11" fill="#42A5F5" text-anchor="middle">초고속 연산되는 숫자들</text>
  </g>

</svg>
