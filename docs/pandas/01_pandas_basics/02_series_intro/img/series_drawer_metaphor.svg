<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="auto">
  <!-- Background -->
  <rect width="600" height="500" fill="#f8f9fa" rx="10"/>

  <text x="300" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">판다스 시리즈 = 이름표가 붙은 1열 서랍장</text>

  <!-- Cabinet Body -->
  <g transform="translate(200, 80)">
    <!-- Main Cabinet Frame -->
    <rect x="0" y="0" width="200" height="380" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="4" rx="5"/>
    
    <!-- Top Nameplate (Series Name) -->
    <g transform="translate(25, -20)">
      <rect x="0" y="0" width="150" height="35" fill="#fef08a" stroke="#eab308" stroke-width="2" rx="5"/>
      <text x="75" y="14" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#854d0e" text-anchor="middle">명패 (Name)</text>
      <text x="75" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">"과일 단가표"</text>
    </g>

    <!-- Drawers -->
    <!-- Drawer 1 -->
    <g transform="translate(10, 60)">
      <!-- Drawer Face -->
      <rect x="0" y="0" width="180" height="70" fill="#ffffff" stroke="#94a3b8" stroke-width="2" rx="3"/>
      <!-- Handle -->
      <rect x="70" y="10" width="40" height="8" fill="#cbd5e1" rx="4"/>
      
      <!-- Sticky Note (Index) -->
      <g transform="translate(-60, 20)">
        <rect x="0" y="0" width="70" height="30" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
        <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Apple</text>
        <!-- Arrow to Index -->
        <path d="M -20 15 L 0 15" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-index)"/>
        <text x="-50" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">Index</text>
      </g>

      <!-- Value inside drawer -->
      <text x="90" y="50" font-family="monospace" font-size="20" font-weight="bold" fill="#0284c7" text-anchor="middle">1500</text>
      <text x="150" y="50" font-family="Arial, sans-serif" font-size="12" fill="#0284c7" text-anchor="middle">Value</text>
    </g>

    <!-- Drawer 2 -->
    <g transform="translate(10, 140)">
      <rect x="0" y="0" width="180" height="70" fill="#ffffff" stroke="#94a3b8" stroke-width="2" rx="3"/>
      <rect x="70" y="10" width="40" height="8" fill="#cbd5e1" rx="4"/>
      <g transform="translate(-60, 20)">
        <rect x="0" y="0" width="70" height="30" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
        <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Banana</text>
      </g>
      <text x="90" y="50" font-family="monospace" font-size="20" font-weight="bold" fill="#0284c7" text-anchor="middle">3000</text>
    </g>

    <!-- Drawer 3 -->
    <g transform="translate(10, 220)">
      <rect x="0" y="0" width="180" height="70" fill="#ffffff" stroke="#94a3b8" stroke-width="2" rx="3"/>
      <rect x="70" y="10" width="40" height="8" fill="#cbd5e1" rx="4"/>
      <g transform="translate(-60, 20)">
        <rect x="0" y="0" width="70" height="30" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
        <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Orange</text>
      </g>
      <text x="90" y="50" font-family="monospace" font-size="20" font-weight="bold" fill="#0284c7" text-anchor="middle">2000</text>
    </g>

    <!-- Drawer 4 -->
    <g transform="translate(10, 300)">
      <rect x="0" y="0" width="180" height="70" fill="#ffffff" stroke="#94a3b8" stroke-width="2" rx="3"/>
      <rect x="70" y="10" width="40" height="8" fill="#cbd5e1" rx="4"/>
      <g transform="translate(-60, 20)">
        <rect x="0" y="0" width="70" height="30" fill="#bbf7d0" stroke="#22c55e" stroke-width="1" rx="2"/>
        <text x="35" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Kiwi</text>
      </g>
      <text x="90" y="50" font-family="monospace" font-size="20" font-weight="bold" fill="#0284c7" text-anchor="middle">500</text>
    </g>
  </g>

  <!-- Annotations -->
  <defs>
    <marker id="arrow-index" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
    </marker>
  </defs>

</svg>
