<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="300" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: 양쪽의 빈 공간을 향락 전면 교전 창조 (쌍방향 증식)</text>
    
    <!-- Top Row Vector (x) -->
    <text x="180" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">가로선 배열 x [1, 2, 3]</text>
    <g transform="translate(120, 90)">
        <rect x="0" y="0" width="40" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="3"/>
        <text x="20" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">1</text>
        <rect x="40" y="0" width="40" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="3"/>
        <text x="60" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">2</text>
        <rect x="80" y="0" width="40" height="40" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="3"/>
        <text x="100" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">3</text>
        
        <!-- Downward expansion -->
        <g opacity="0">
            <rect x="0" y="40" width="120" height="80" rx="2" fill="#e0f2fe" opacity="0.6"/>
            <path d="M 60 40 L 60 110" stroke="#0284c7" stroke-width="4" stroke-dasharray="5" marker-end="url(#arrow_blue)"/>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.3;0.8;1" dur="3s" repeatCount="indefinite"/>
        </g>
    </g>

    <text x="300" y="155" font-family="sans-serif" font-size="24" font-weight="bold" fill="#475569" text-anchor="middle">*</text>

    <!-- Column Vector (y) -->
    <text x="420" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">세로선 기둥 배열 y</text>
    <g transform="translate(400, 90)">
        <rect x="0" y="0" width="40" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
        <text x="20" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">1</text>
        <rect x="0" y="40" width="40" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
        <text x="20" y="66" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">2</text>
        <rect x="0" y="80" width="40" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
        <text x="20" y="106" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">3</text>

        <!-- Rightward expansion -->
        <g opacity="0">
            <rect x="40" y="0" width="80" height="120" rx="2" fill="#fee2e2" opacity="0.6"/>
            <path d="M 40 60 L 110 60" stroke="#b91c1c" stroke-width="4" stroke-dasharray="5" marker-end="url(#arrow_red)"/>
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.3;0.8;1" dur="3s" repeatCount="indefinite"/>
        </g>
    </g>

    <defs>
        <marker id="arrow_blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7"/>
        </marker>
        <marker id="arrow_red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
        </marker>
    </defs>

    <!-- Explosion indicator text -->
    <g transform="translate(250, 100)" opacity="0">
        <text x="50" y="130" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">서로 넓어져 3x3 창조!</text>
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.7;0.9;1" dur="3s" repeatCount="indefinite"/>
    </g>

    <text x="300" y="260" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">비어있는 허공을 향해 각자 직진! x는 아래로 3단, y는 우측으로 3단 복제되어 교대로 충돌합니다.</text>
</svg>
