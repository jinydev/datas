<svg width="700" height="350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Comic Sans MS', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    
    .grid-cell-x { fill: #fdf2e9; stroke: #e67e22; stroke-width: 2; rx: 5; }
    .grid-text-x { font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; fill: #e67e22; text-anchor: middle; alignment-baseline: central; }
    
    .grid-cell-y { fill: #e8f8f5; stroke: #1abc9c; stroke-width: 2; rx: 5; }
    .grid-text-y { font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; fill: #1abc9c; text-anchor: middle; alignment-baseline: central; }
    
    .grid-cell-ghost { fill: #f9fcfb; stroke: #bdc3c7; stroke-width: 2; rx: 5; stroke-dasharray: 4; opacity: 0; }
    .grid-text-ghost { font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; fill: #7f8c8d; text-anchor: middle; alignment-baseline: central; opacity: 0; }
    
    .operator { font-family: 'Courier New', monospace; font-size: 26px; font-weight: bold; fill: #95a5a6; }

    @keyframes expand-x {
      0%, 20% { opacity: 0; transform: translateY(-20px); }
      40%, 80% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes expand-y {
      0%, 20% { opacity: 0; transform: translateX(-20px); }
      40%, 80% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(0); }
    }
    
    .gx1 { animation: expand-x 5s infinite; animation-delay: 1s; }
    .gx2 { animation: expand-x 5s infinite; animation-delay: 1.5s; }
    
    .gy1 { animation: expand-y 5s infinite; animation-delay: 1s; }
    .gy2 { animation: expand-y 5s infinite; animation-delay: 1.5s; }
  </style>

  <rect width="100%" height="100%" fill="#f9fcfb" rx="20" />
  
  <text x="350" y="40" class="title" text-anchor="middle">서로 모양이 다를 땐? 둘 다 알아서 늘어난다! (쌍방향 차원 브로드캐스팅)</text>

  <!-- Array X (1x3) -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="40" height="40" class="grid-cell-x" />
    <text x="20" y="20" class="grid-text-x">1</text>
    <rect x="50" y="0" width="40" height="40" class="grid-cell-x" />
    <text x="70" y="20" class="grid-text-x">2</text>
    <rect x="100" y="0" width="40" height="40" class="grid-cell-x" />
    <text x="120" y="20" class="grid-text-x">3</text>
    
    <!-- Ghost Copies X (Expand Down) -->
    <g class="gx1" transform="translate(0, 50)">
      <rect x="0" y="0" width="40" height="40" class="grid-cell-ghost" />
      <text x="20" y="20" class="grid-text-ghost">1</text>
      <rect x="50" y="0" width="40" height="40" class="grid-cell-ghost" />
      <text x="70" y="20" class="grid-text-ghost">2</text>
      <rect x="100" y="0" width="40" height="40" class="grid-cell-ghost" />
      <text x="120" y="20" class="grid-text-ghost">3</text>
    </g>
    <g class="gx2" transform="translate(0, 100)">
      <rect x="0" y="0" width="40" height="40" class="grid-cell-ghost" />
      <text x="20" y="20" class="grid-text-ghost">1</text>
      <rect x="50" y="0" width="40" height="40" class="grid-cell-ghost" />
      <text x="70" y="20" class="grid-text-ghost">2</text>
      <rect x="100" y="0" width="40" height="40" class="grid-cell-ghost" />
      <text x="120" y="20" class="grid-text-ghost">3</text>
    </g>
  </g>

  <!-- Operator -->
  <g transform="translate(320, 160)">
    <text x="0" y="0" class="operator" text-anchor="middle">+</text>
  </g>

  <!-- Array Y (3x1) -->
  <g transform="translate(420, 100)">
    <!-- Main Column -->
    <rect x="0" y="0" width="40" height="40" class="grid-cell-y" />
    <text x="20" y="20" class="grid-text-y">1</text>
    <rect x="0" y="50" width="40" height="40" class="grid-cell-y" />
    <text x="20" y="70" class="grid-text-y">2</text>
    <rect x="0" y="100" width="40" height="40" class="grid-cell-y" />
    <text x="20" y="120" class="grid-text-y">3</text>

    <!-- Ghost Copies Y (Expand Right) -->
    <g class="gy1" transform="translate(50, 0)">
      <rect x="0" y="0" width="40" height="40" class="grid-cell-ghost" />
      <text x="20" y="20" class="grid-text-ghost">1</text>
      <rect x="0" y="50" width="40" height="40" class="grid-cell-ghost" />
      <text x="20" y="70" class="grid-text-ghost">2</text>
      <rect x="0" y="100" width="40" height="40" class="grid-cell-ghost" />
      <text x="20" y="120" class="grid-text-ghost">3</text>
    </g>
    <g class="gy2" transform="translate(100, 0)">
      <rect x="0" y="0" width="40" height="40" class="grid-cell-ghost" />
      <text x="20" y="20" class="grid-text-ghost">1</text>
      <rect x="0" y="50" width="40" height="40" class="grid-cell-ghost" />
      <text x="20" y="70" class="grid-text-ghost">2</text>
      <rect x="0" y="100" width="40" height="40" class="grid-cell-ghost" />
      <text x="20" y="120" class="grid-text-ghost">3</text>
    </g>
  </g>

  <!-- Subtitle -->
  <g transform="translate(350, 300)">
    <text x="0" y="0" style="font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #7f8c8d;" text-anchor="middle">
      가로 배열은 세로로 복제되고, 세로 배열은 가로로 복제되어 최종 3x3 정면 승부!
    </text>
  </g>
</svg>
