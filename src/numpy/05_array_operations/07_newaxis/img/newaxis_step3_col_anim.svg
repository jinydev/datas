<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">3단계: x[:, np.newaxis]로 세로 기둥 탑 세우기</text>
    
    <text x="120" y="140" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">배열 a (2차원, 4x1)</text>
    
    <g transform="translate(250, 60)">
        <!-- Vertical Tower Brackets -->
        <text x="-30" y="15" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f59e0b" text-anchor="middle">[</text>
        
        <!-- Individual elements now stacked vertically with their own brackets -->
        <text x="-15" y="15" font-family="sans-serif" font-size="20" font-weight="bold" fill="#94a3b8" text-anchor="middle">[</text>
        <rect x="0" y="-5" width="40" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
        <text x="20" y="15" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">0</text>
        <text x="55" y="15" font-family="sans-serif" font-size="20" font-weight="bold" fill="#94a3b8" text-anchor="middle">]</text>

        <text x="-15" y="55" font-family="sans-serif" font-size="20" font-weight="bold" fill="#94a3b8" text-anchor="middle">[</text>
        <rect x="0" y="35" width="40" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
        <text x="20" y="55" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">10</text>
        <text x="55" y="55" font-family="sans-serif" font-size="20" font-weight="bold" fill="#94a3b8" text-anchor="middle">]</text>

        <text x="-15" y="95" font-family="sans-serif" font-size="20" font-weight="bold" fill="#94a3b8" text-anchor="middle">[</text>
        <rect x="0" y="75" width="40" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
        <text x="20" y="95" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">20</text>
        <text x="55" y="95" font-family="sans-serif" font-size="20" font-weight="bold" fill="#94a3b8" text-anchor="middle">]</text>

        <text x="-15" y="135" font-family="sans-serif" font-size="20" font-weight="bold" fill="#94a3b8" text-anchor="middle">[</text>
        <rect x="0" y="115" width="40" height="30" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
        <text x="20" y="135" font-family="sans-serif" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">30</text>
        <text x="55" y="135" font-family="sans-serif" font-size="20" font-weight="bold" fill="#94a3b8" text-anchor="middle">]</text>
        
        <text x="70" y="135" font-family="sans-serif" font-size="40" font-weight="bold" fill="#f59e0b" text-anchor="middle">]</text>

        <!-- Rightward ghost block indicating its flexibility -->
        <g opacity="0">
            <rect x="50" y="-5" width="40" height="140" fill="none" rx="4" stroke="#fcd34d" stroke-width="2" stroke-dasharray="4"/>
            <text x="70" y="65" font-family="sans-serif" font-size="14" fill="#d97706" text-anchor="middle">+</text>
            <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.5;0.8;1" dur="2s" repeatCount="indefinite"/>
        </g>
    </g>

    <text x="300" y="230" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ea580c" text-anchor="middle">각 원소마다 개별 대괄호가 씌워지고 겉면을 한 번 더 감싸며 수직으로 우뚝 솟았습니다!</text>
</svg>
