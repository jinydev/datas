<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="200" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: Ufunc 수학 기계 컨베이어 일괄 변환</text>
    
    <!-- Conveyor Belt Line -->
    <path d="M 60 130 L 540 130" stroke="#475569" stroke-width="4" stroke-dasharray="10" />
    
    <!-- Magic Box -->
    <g transform="translate(250, 80)">
        <rect x="0" y="0" width="100" height="100" rx="10" fill="#64748b" stroke="#334155" stroke-width="3"/>
        <rect x="10" y="10" width="80" height="80" rx="5" fill="#1e293b"/>
        <text x="50" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">수학 기계</text>
        <text x="50" y="70" font-family="monospace" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle">np.sqrt()</text>
    </g>
    
    <!-- Arrays Sliding In -->
    <g>
        <g transform="translate(60, 110)">
            <rect x="0" y="0" width="40" height="40" rx="6" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
            <text x="20" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">1</text>
            <rect x="45" y="0" width="40" height="40" rx="6" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
            <text x="65" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">4</text>
            <rect x="90" y="0" width="40" height="40" rx="6" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
            <text x="110" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">9</text>
            <animateTransform attributeName="transform" type="translate" values="60,110;250,110;250,110;60,110" keyTimes="0;0.4;0.9;1" dur="2.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0;0;1" keyTimes="0;0.35;0.9;1" dur="2.5s" repeatCount="indefinite" />
        </g>
    </g>

    <!-- Processing Flash -->
    <circle cx="300" cy="130" r="10" fill="#fbbf24" opacity="0">
        <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.37;0.5;1" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="r" values="10;40;10;10" keyTimes="0;0.37;0.5;1" dur="2.5s" repeatCount="indefinite" />
    </circle>

    <!-- Output Array Sliding Out -->
    <g>
        <g transform="translate(420, 110)" opacity="0">
            <rect x="0" y="0" width="40" height="40" rx="6" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
            <text x="20" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">1.0</text>
            <rect x="45" y="0" width="40" height="40" rx="6" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
            <text x="65" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">2.0</text>
            <rect x="90" y="0" width="40" height="40" rx="6" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
            <text x="110" y="26" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">3.0</text>
            <animateTransform attributeName="transform" type="translate" values="250,110;420,110;420,110;250,110" keyTimes="0;0.4;0.9;1" dur="2.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.38;0.45;1" dur="2.5s" repeatCount="indefinite" />
        </g>
    </g>

    <text x="300" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">배열 전체가 한 번에 통과하며 계산 완료됨</text>

</svg>
