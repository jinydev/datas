<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="200" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">In-place 치환 성공: 큰 자료형 공간에 작은 자료형 데이터 안전하게 보관</text>
    
    <text x="150" y="160" font-family="sans-serif" font-size="16" font-weight="bold" fill="#16a34a" text-anchor="middle">넓은 실수(float64) 보관함 'b'</text>
    <!-- Large float container -->
    <polygon points="50,100 80,60 220,60 250,100 220,140 80,140" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
    <text x="150" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">여유로운 공간</text>
    
    <g transform="translate(400, 80)">
        <rect x="0" y="0" width="80" height="40" rx="5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="40" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">10 (정수)</text>
        <text x="40" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0284c7" text-anchor="middle">작은 int32 데이터</text>
    </g>
    
    <!-- Green line indicating success -->
    <path d="M 380 100 L 260 100" stroke="#16a34a" stroke-width="4" stroke-dasharray="6" marker-end="url(#arrow_green)"/>
    
    <!-- Green Check -->
    <g transform="translate(320, 95)">
        <path d="M -12 0 L -3 10 L 15 -12" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <defs>
        <marker id="arrow_green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
        </marker>
    </defs>
</svg>
