    <!-- Equals -->
    <text x="415" y="140" font-family="sans-serif" font-size="30" font-weight="bold" fill="#64748b" text-anchor="middle">=</text>

    <!-- Result -->
    <text x="515" y="60" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">크롭된 결과 이미지</text>
    <g transform="translate(455, 75)">
