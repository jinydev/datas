        <text x="103" y="66" font-family="sans-serif" font-size="14" font-weight="bold" fill="#854d0e" text-anchor="middle">1</text>
        
        <rect x="0" y="84" width="38" height="38" rx="4" fill="#0f172a" stroke="#000000" stroke-width="2"/>
        <text x="19" y="108" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">0</text>
        <rect x="42" y="84" width="38" height="38" rx="4" fill="#0f172a" stroke="#000000" stroke-width="2"/>
        <text x="61" y="108" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">0</text>
        <rect x="84" y="84" width="38" height="38" rx="4" fill="#0f172a" stroke="#000000" stroke-width="2"/>
