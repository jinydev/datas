        <text x="19" y="24" font-family="sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">0</text>
        <rect x="42" y="0" width="38" height="38" rx="4" fill="#0f172a" stroke="#000000" stroke-width="2"/>
        <text x="61" y="24" font-family="sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">0</text>
