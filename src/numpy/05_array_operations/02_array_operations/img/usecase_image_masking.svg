        <text x="103" y="24" font-family="sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">0</text>
        
        <rect x="0" y="42" width="38" height="38" rx="4" fill="#f8fafc" stroke="#2563eb" stroke-width="3"/>
