    <text x="350" y="215" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">1이 있는 행렬 영역만 원본 값이 유지되고 나머지는 검은색(0) 처리됨</text>
</svg>
