<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">3단계: 역순 슬라이싱 (a[::-1]) 거울 뒤집기</text>
    
    <g transform="translate(50, 100)">
        <g stroke="#cbd5e1" stroke-width="1" opacity="0.4">
            <rect x="0" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="50" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="100" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="150" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="200" y="0" width="300" height="40" fill="#f1f5f9"/>
            <text x="25" y="25" font-family="sans-serif" fill="#64748b" text-anchor="middle">0</text>
            <text x="75" y="25" font-family="sans-serif" fill="#64748b" text-anchor="middle">1</text>
            <text x="125" y="25" font-family="sans-serif" fill="#64748b" text-anchor="middle">4</text>
            <text x="175" y="25" font-family="sans-serif" fill="#64748b" text-anchor="middle">9</text>
            <text x="350" y="25" font-family="sans-serif" fill="#64748b" text-anchor="middle">... 81 (끝)</text>
        </g>
        
        <g>
            <rect x="0" y="60" width="500" height="40" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="4"/>
            <text x="250" y="85" font-family="monospace" font-size="14" font-weight="bold" fill="#b45309" text-anchor="middle">
                역순 데이터: [81, 64, 49, 36, 25, 16, 9, 4, 1, 0]
            </text>
            
            <animateTransform attributeName="transform" type="translate" values="500,0;0,0;0,0;500,0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
        </g>

        <path d="M 450 30 C 250 -30, 50 30, 50 30" stroke="#f59e0b" stroke-width="4" stroke-dasharray="6" fill="none" marker-start="url(#arrow_orange)">
            <animate attributeName="stroke-dashoffset" values="100;0" dur="2s" repeatCount="indefinite"/>
        </path>
    </g>

    <defs>
        <marker id="arrow_orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
        </marker>
    </defs>
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">Step 자리에 음수(-1)를 넣으면, 데이터가 끝에서부터 역방향 거울처럼 뒤집혀 반환됩니다.</text>
</svg>
