<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">5단계: 징검다리 덮어쓰기 심화 (b[::2] = -10)</text>
    
    <g transform="translate(50, 150)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="50" y="0" width="50" height="40" fill="#f8fafc"/>
            <rect x="100" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="150" y="0" width="50" height="40" fill="#f8fafc"/>
            <rect x="200" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="250" y="0" width="50" height="40" fill="#f8fafc"/>
            <rect x="300" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="350" y="0" width="50" height="40" fill="#f8fafc"/>
            <rect x="400" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="450" y="0" width="50" height="40" fill="#f8fafc"/>
        </g>
        
        <g font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">
            <text x="25" y="-10">0</text>
            <text x="75" y="-10">1</text>
            <text x="125" y="-10">2</text>
            <text x="175" y="-10">3</text>
            <text x="225" y="-10">4</text>
            <text x="275" y="-10">5</text>
            <text x="325" y="-10">6</text>
            <text x="375" y="-10">7</text>
            <text x="425" y="-10">8</text>
            <text x="475" y="-10">9</text>
        </g>

        <g font-family="monospace" font-size="16" fill="#94a3b8" text-anchor="middle">
            <text x="75" y="26">5</text>
            <text x="175" y="26">5</text>
            <text x="275" y="26">5</text>
            <text x="375" y="26">5</text>
            <text x="475" y="26">5</text>
        </g>
        <g font-family="monospace" font-size="16" fill="#94a3b8" text-anchor="middle">
            <text x="25" y="26">5<animate attributeName="opacity" values="1;0;0;1" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/></text>
            <text x="125" y="26">5<animate attributeName="opacity" values="1;0;0;1" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/></text>
            <text x="225" y="26">5<animate attributeName="opacity" values="1;0;0;1" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/></text>
            <text x="325" y="26">5<animate attributeName="opacity" values="1;0;0;1" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/></text>
            <text x="425" y="26">5<animate attributeName="opacity" values="1;0;0;1" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/></text>
        </g>

        <g font-family="monospace" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">
            <g opacity="0">
                <rect x="0" y="0" width="50" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
                <text x="25" y="24">-10</text>
                <animateTransform attributeName="transform" type="translate" values="0,-80;0,0;0,0;0,-80" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </g>
            <g opacity="0">
                <rect x="100" y="0" width="50" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
                <text x="125" y="24">-10</text>
                <animateTransform attributeName="transform" type="translate" values="0,-80;0,0;0,0;0,-80" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </g>
            <g opacity="0">
                <rect x="200" y="0" width="50" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
                <text x="225" y="24">-10</text>
                <animateTransform attributeName="transform" type="translate" values="0,-80;0,0;0,0;0,-80" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </g>
            <g opacity="0">
                <rect x="300" y="0" width="50" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
                <text x="325" y="24">-10</text>
                <animateTransform attributeName="transform" type="translate" values="0,-80;0,0;0,0;0,-80" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </g>
            <g opacity="0">
                <rect x="400" y="0" width="50" height="40" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
                <text x="425" y="24">-10</text>
                <animateTransform attributeName="transform" type="translate" values="0,-80;0,0;0,0;0,-80" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </g>
        </g>
        
        <g stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4" opacity="0">
            <path d="M 25 -30 Q 75 -60 125 -30" marker-end="url(#arrow_orange)"/>
            <path d="M 125 -30 Q 175 -60 225 -30" marker-end="url(#arrow_orange)"/>
            <path d="M 225 -30 Q 275 -60 325 -30" marker-end="url(#arrow_orange)"/>
            <path d="M 325 -30 Q 375 -60 425 -30" marker-end="url(#arrow_orange)"/>
            <animate attributeName="opacity" values="0;1;0;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.1;0.4;1"/>
        </g>
    </g>

    <defs>
        <marker id="arrow_orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
        </marker>
    </defs>
    
    <text x="300" y="230" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">Step 2를 지정하면 토끼뜀을 뛰듯 두 칸 간격으로 타겟팅하여 새로운 데이터를 심습니다!</text>
</svg>
