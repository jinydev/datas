<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="280" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">십자 커팅: 2차원 부분 범위 추출 (a[1:3, 2:5])</text>
    
    <g transform="translate(150, 70)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="120" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="160" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="200" y="0" width="40" height="30" fill="#f1f5f9"/>
            <rect x="0" y="30" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="30" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="30" width="40" height="30" fill="#dcfce7" opacity="0.6"/>
            <rect x="120" y="30" width="40" height="30" fill="#dcfce7" opacity="0.6"/>
            <rect x="160" y="30" width="40" height="30" fill="#dcfce7" opacity="0.6"/>
            <rect x="200" y="30" width="40" height="30" fill="#f1f5f9"/>
            <rect x="0" y="60" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="60" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="60" width="40" height="30" fill="#dcfce7" opacity="0.6"/>
            <rect x="120" y="60" width="40" height="30" fill="#dcfce7" opacity="0.6"/>
            <rect x="160" y="60" width="40" height="30" fill="#dcfce7" opacity="0.6"/>
            <rect x="200" y="60" width="40" height="30" fill="#f1f5f9"/>
            <rect x="0" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="120" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="160" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="200" y="90" width="40" height="30" fill="#f1f5f9"/>
            <rect x="0" y="120" width="40" height="30" fill="#f1f5f9"/>
            <rect x="40" y="120" width="40" height="30" fill="#f1f5f9"/>
            <rect x="80" y="120" width="40" height="30" fill="#f1f5f9"/>
            <rect x="120" y="120" width="40" height="30" fill="#f1f5f9"/>
            <rect x="160" y="120" width="40" height="30" fill="#f1f5f9"/>
            <rect x="200" y="120" width="40" height="30" fill="#f1f5f9"/>
        </g>
        
        <rect x="-10" y="30" width="260" height="60" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
        <text x="-40" y="65" font-family="sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold" transform="rotate(-90, -40, 65)">행 1~2</text>
        
        <rect x="80" y="-10" width="120" height="170" fill="none" stroke="#0284c7" stroke-width="2" stroke-dasharray="4"/>
        <text x="140" y="-15" font-family="sans-serif" font-size="12" fill="#0284c7" text-anchor="middle" font-weight="bold">열 2~4</text>

        <g>
            <rect x="80" y="30" width="120" height="60" fill="#bbf7d0" stroke="#16a34a" stroke-width="3" rx="2"/>
            <animateTransform attributeName="transform" type="translate" values="0,0;120,-40;120,-40;0,0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            
            <text x="140" y="20" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle" opacity="0">
                교집합 (2x3 행렬) 추출!
                <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.4;0.9;1"/>
            </text>
            
            <g font-family="monospace" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">
                <text x="100" y="50">8</text><text x="140" y="50">9</text><text x="180" y="50">10</text>
                <text x="100" y="80">14</text><text x="140" y="80">15</text><text x="180" y="80">16</text>
            </g>
        </g>
    </g>

    <text x="300" y="260" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">행(Row) 레이저와 열(Col) 레이저가 만나는 교집합 사각형 조각만을 정밀하게 떼어냅니다.</text>
</svg>
