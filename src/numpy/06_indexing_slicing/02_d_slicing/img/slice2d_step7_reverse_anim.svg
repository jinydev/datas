<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">매트릭스 리버스: 2차원 전체 역순 뒤집기 a[::-1, ::-1]</text>
    
    <g transform="translate(100, 60)">
        <text x="60" y="-10" font-family="sans-serif" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">원본</text>
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="120" height="100" fill="#f1f5f9"/>
        </g>
        <g font-family="monospace" font-size="10" font-weight="bold" fill="#334155" text-anchor="middle">
            <text x="15" y="15">0</text> <text x="105" y="15">5</text>
            <text x="15" y="90">24</text> <text x="105" y="90">29</text>
        </g>

        <path d="M 140 50 L 180 50" stroke="#94a3b8" stroke-width="2" fill="none"/>
        <path d="M 175 45 L 185 50 L 175 55" fill="#94a3b8"/>
        
        <text x="160" y="40" font-family="sans-serif" font-size="12" font-weight="bold" fill="#8b5cf6" text-anchor="middle">180도 회전</text>

        <g transform="translate(200, 0)">
            <text x="60" y="-10" font-family="sans-serif" font-size="12" font-weight="bold" fill="#8b5cf6" text-anchor="middle">역방향 (리버스)</text>
            <g>
                <animateTransform attributeName="transform" type="rotate" values="0 60 50; 180 60 50; 180 60 50; 0 60 50" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
                <g stroke="#c4b5fd" stroke-width="2">
                    <rect x="0" y="0" width="120" height="100" fill="#ede9fe"/>
                </g>
                <g font-family="monospace" font-size="10" font-weight="bold" fill="#5b21b6" text-anchor="middle">
                    <text x="15" y="15">0</text> <text x="105" y="15">5</text>
                    <text x="15" y="90">24</text> <text x="105" y="90">29</text>
                </g>
            </g>
             <g font-family="monospace" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle" opacity="0">
                <animate attributeName="opacity" values="0;0;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.35;0.75;1"/>
                <text x="15" y="15">29</text> <text x="105" y="15">24</text>
                <text x="15" y="90">5</text> <text x="105" y="90">0</text>
            </g>
        </g>
    </g>
    
    <text x="300" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">행(-1)과 열(-1) 모두 역순 스텝을 밟으면, 판 자체가 180도 완전히 돌아간 것과 같습니다.</text>
</svg>
