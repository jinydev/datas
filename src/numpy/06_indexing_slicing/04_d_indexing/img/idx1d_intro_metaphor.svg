<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">배열 색인 (Fancy Indexing): 다중 타겟 동시 저격</text>
    <g transform="translate(100, 60)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="40" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="80" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="120" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="160" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="200" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="240" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="280" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="320" y="50" width="40" height="30" fill="#f1f5f9"/> <rect x="360" y="50" width="40" height="30" fill="#f1f5f9"/>
        </g>
        <g font-family="monospace" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">
             <text x="20" y="70">0</text><text x="60" y="70">1</text><text x="100" y="70">2</text><text x="140" y="70">3</text><text x="180" y="70">4</text><text x="220" y="70">5</text><text x="260" y="70">6</text><text x="300" y="70">7</text><text x="340" y="70">8</text><text x="380" y="70">9</text>
        </g>
        <g transform="translate(80, 50)">
            <rect x="0" y="0" width="40" height="30" fill="none" stroke="#ef4444" stroke-width="3"/>
            <path d="M 20 -20 L 20 0" stroke="#ef4444" stroke-width="2"/>
            <path d="M 15 -5 L 20 0 L 25 -5" fill="#ef4444"/>
        </g>
        <g transform="translate(200, 50)">
            <rect x="0" y="0" width="40" height="30" fill="none" stroke="#ef4444" stroke-width="3"/>
            <path d="M 20 -20 L 20 0" stroke="#ef4444" stroke-width="2"/>
            <path d="M 15 -5 L 20 0 L 25 -5" fill="#ef4444"/>
        </g>
        <g transform="translate(320, 50)">
            <rect x="0" y="0" width="40" height="30" fill="none" stroke="#ef4444" stroke-width="3"/>
            <path d="M 20 -20 L 20 0" stroke="#ef4444" stroke-width="2"/>
            <path d="M 15 -5 L 20 0 L 25 -5" fill="#ef4444"/>
        </g>
        <rect x="120" y="-10" width="200" height="30" fill="#fee2e2" rx="15"/>
        <text x="220" y="10" font-family="monospace" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">[2, 5, 8] 과녁 리스트 하달!</text>
    </g>
    <text x="300" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">연속된 범위(:)가 아니라, 내가 원하는 번호들만 콕콕 집어서 리스트로 전달할 수 있습니다.</text>
</svg>
