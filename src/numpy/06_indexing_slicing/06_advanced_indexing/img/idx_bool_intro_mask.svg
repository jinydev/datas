<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">조건부 색인 (Boolean Indexing): 논리 그물망(Mask) 필터링</text>
    
    <g transform="translate(100, 50)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="40" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="80" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="120" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="160" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="200" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="240" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="280" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="320" y="0" width="40" height="30" fill="#f1f5f9"/>
        </g>
        <g font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">
             <text x="20" y="20">7</text><text x="60" y="20">20</text><text x="100" y="20">15</text><text x="140" y="20">11</text><text x="180" y="20">8</text><text x="220" y="20">7</text><text x="260" y="20">19</text><text x="300" y="20">11</text><text x="340" y="20">4</text>
        </g>
        <text x="-10" y="20" font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="end">배열 a</text>

        <g transform="translate(0, 40)">
            <g stroke="#fca5a5" stroke-width="2" fill="#fee2e2">
                <rect x="0" y="0" width="40" height="20" /> <rect x="40" y="0" width="40" height="20" fill="#10b981" /> <rect x="80" y="0" width="40" height="20" fill="#10b981" /> <rect x="120" y="0" width="40" height="20" fill="#10b981" /> <rect x="160" y="0" width="40" height="20" /> <rect x="200" y="0" width="40" height="20" /> <rect x="240" y="0" width="40" height="20" fill="#10b981" /> <rect x="280" y="0" width="40" height="20" fill="#10b981" /> <rect x="320" y="0" width="40" height="20" />
            </g>
            <g font-family="sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">
                 <text x="20" y="14" fill="#ef4444">F</text> <text x="60" y="14">T</text> <text x="100" y="14">T</text> <text x="140" y="14">T</text> <text x="180" y="14" fill="#ef4444">F</text> <text x="220" y="14" fill="#ef4444">F</text> <text x="260" y="14">T</text> <text x="300" y="14">T</text> <text x="340" y="14" fill="#ef4444">F</text>
            </g>
            <text x="-10" y="14" font-family="monospace" font-size="14" font-weight="bold" fill="#10b981" text-anchor="end">a > 8</text>
        </g>

        <g>
            <animateTransform attributeName="transform" type="translate" values="0,30; 0,80; 0,80; 0,30" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            <g stroke="#10b981" stroke-width="2" fill="#d1fae5">
                <rect x="40" y="0" width="40" height="30" /> <rect x="80" y="0" width="40" height="30" /> <rect x="120" y="0" width="40" height="30" /> <rect x="240" y="0" width="40" height="30" /> <rect x="280" y="0" width="40" height="30" />
            </g>
            <g font-family="monospace" font-size="14" font-weight="bold" fill="#047857" text-anchor="middle">
                 <text x="60" y="20">20</text><text x="100" y="20">15</text><text x="140" y="20">11</text><text x="260" y="20">19</text><text x="300" y="20">11</text>
            </g>
            <path d="M 60 -15 L 60 0 M 100 -15 L 100 0 M 140 -15 L 140 0 M 260 -15 L 260 0 M 300 -15 L 300 0" stroke="#10b981" stroke-width="2" stroke-dasharray="2"/>
        </g>
    </g>
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">거대 필터 그물망(Mask)을 배열에 씌우면, 그물망 구멍(True)이 뚫린 값들만 아래로 톡 튀어나옵니다.</text>
</svg>
