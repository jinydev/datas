    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">1번 행과 3번 행만 골라내어 완전히 새로운 2차원 배열(2, 8)을 만듭니다.</text>
