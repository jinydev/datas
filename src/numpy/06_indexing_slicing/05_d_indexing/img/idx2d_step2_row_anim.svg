            <rect x="0" y="60" width="240" height="20" fill="#dcfce7" />
        </g>
        <g>
            <animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0; 0,0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            <g stroke="#16a34a" stroke-width="2">
                <rect x="0" y="20" width="240" height="20" fill="#dcfce7" />
                <rect x="0" y="60" width="240" height="20" fill="#bbf7d0" />
            </g>
            <g font-family="monospace" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">
                 <text x="15" y="34">8</text> <text x="45" y="34">9</text> <text x="75" y="34">10</text> <text x="105" y="34">11</text> <text x="135" y="34">12</text> <text x="165" y="34">13</text> <text x="195" y="34">14</text> <text x="225" y="34">15</text>
                 <text x="15" y="74">24</text> <text x="45" y="74">25</text> <text x="75" y="74">26</text> <text x="105" y="74">27</text> <text x="135" y="74">28</text> <text x="165" y="74">29</text> <text x="195" y="74">30</text> <text x="225" y="74">31</text>
