<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">특정 좌표 포인트 연동 저격: x[[1, 3], [2, 2]]</text>
    <g transform="translate(180, 50)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="240" height="140" fill="#f1f5f9" opacity="0.6" />
        </g>
        
        <g>
            <circle cx="75" cy="30" r="10" fill="none" stroke="#ef4444" stroke-width="2" opacity="0">
                 <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </circle>
            <circle cx="75" cy="70" r="10" fill="none" stroke="#ef4444" stroke-width="2" opacity="0">
                 <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </circle>
        </g>

        <g>
            <animateTransform attributeName="transform" type="translate" values="0,0; -100,-20; -100,-20; 0,0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            <rect x="60" y="20" width="30" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="2" opacity="0">
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </rect>
            <rect x="60" y="60" width="30" height="20" fill="#fef08a" stroke="#ca8a04" stroke-width="2" opacity="0">
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
            </rect>
             <g font-family="monospace" font-size="12" font-weight="bold" fill="#854d0e" text-anchor="middle" opacity="0">
                  <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
                  <text x="75" y="34">10</text>
                  <text x="75" y="74">26</text>
             </g>
        </g>
    </g>
    
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">행(Row) 원소와 열(Col) 원소가 1:1로 매칭되어 각 [1,2], [3,2] 좌표를 동시 타격합니다.</text>
</svg>
