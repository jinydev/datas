<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">2차원 배열 색인 (Fancy Indexing) 작전 요도</text>
    <g transform="translate(180, 50)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="240" height="20" fill="#f1f5f9" />
            <rect x="0" y="20" width="240" height="20" fill="#f8fafc" />
            <rect x="0" y="40" width="240" height="20" fill="#f1f5f9" />
            <rect x="0" y="60" width="240" height="20" fill="#f8fafc" />
            <rect x="0" y="80" width="240" height="20" fill="#f1f5f9" />
            <rect x="0" y="100" width="240" height="20" fill="#f8fafc" />
            <rect x="0" y="120" width="240" height="20" fill="#f1f5f9" />
            <line x1="30" y1="0" x2="30" y2="140"/> <line x1="60" y1="0" x2="60" y2="140"/> <line x1="90" y1="0" x2="90" y2="140"/> <line x1="120" y1="0" x2="120" y2="140"/> <line x1="150" y1="0" x2="150" y2="140"/> <line x1="180" y1="0" x2="180" y2="140"/> <line x1="210" y1="0" x2="210" y2="140"/> 
        </g>
        <g font-family="monospace" font-size="10" font-weight="bold" fill="#64748b" text-anchor="middle">
             <text x="15" y="14">0</text> <text x="45" y="14">1</text> <text x="75" y="14">2</text> <text x="105" y="14">3</text> <text x="135" y="14">4</text> <text x="165" y="14">5</text> <text x="195" y="14">6</text> <text x="225" y="14">7</text>
             <text x="15" y="34">8</text> <text x="45" y="34">9</text> <text x="75" y="34">10</text> <text x="105" y="34">11</text> <text x="135" y="34">12</text> <text x="165" y="34">13</text> <text x="195" y="34">14</text> <text x="225" y="34">15</text>
             <text x="15" y="54">16</text> <text x="45" y="54">17</text> <text x="75" y="54">18</text> <text x="105" y="54">19</text> <text x="135" y="54">20</text> <text x="165" y="54">21</text> <text x="195" y="54">22</text> <text x="225" y="54">23</text>
             <text x="15" y="74">24</text> <text x="45" y="74">25</text> <text x="75" y="74">26</text> <text x="105" y="74">27</text> <text x="135" y="74">28</text> <text x="165" y="74">29</text> <text x="195" y="74">30</text> <text x="225" y="74">31</text>
             <text x="15" y="94">32</text> <text x="45" y="94">33</text> <text x="75" y="94">34</text> <text x="105" y="94">35</text> <text x="135" y="94">36</text> <text x="165" y="94">37</text> <text x="195" y="94">38</text> <text x="225" y="94">39</text>
             <text x="15" y="114">40</text> <text x="45" y="114">41</text> <text x="75" y="114">42</text> <text x="105" y="114">43</text> <text x="135" y="114">44</text> <text x="165" y="114">45</text> <text x="195" y="114">46</text> <text x="225" y="114">47</text>
             <text x="15" y="134">48</text> <text x="45" y="134">49</text> <text x="75" y="134">50</text> <text x="105" y="134">51</text> <text x="135" y="134">52</text> <text x="165" y="134">53</text> <text x="195" y="134">54</text> <text x="225" y="134">55</text>
        </g>

        <!-- Animation targets -->
        <g stroke="#ef4444" stroke-width="2" fill="none" opacity="0">
             <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
             <rect x="60" y="20" width="30" height="20" /> <!-- (1, 2) = 10 -->
             <circle cx="75" cy="30" r="5" fill="#ef4444" fill-opacity="0.2"/>
             
             <rect x="120" y="60" width="30" height="20" /> <!-- (3, 4) = 28 -->
             <circle cx="135" cy="70" r="5" fill="#ef4444" fill-opacity="0.2"/>
             
             <rect x="180" y="100" width="30" height="20" /> <!-- (5, 6) = 46 -->
             <circle cx="195" cy="110" r="5" fill="#ef4444" fill-opacity="0.2"/>
        </g>
    </g>
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">행(X)과 열(Y) 좌푯값 쌍을 조합하여 여러 타겟(셀)을 한 번에 박살 내는 기법입니다.</text>
</svg>
