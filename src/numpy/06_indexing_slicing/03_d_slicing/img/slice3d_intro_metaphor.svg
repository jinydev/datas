<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">3차원 배열 조감도 (2동, 3층, 4호)</text>
    
    <g transform="translate(100, 70)">
        <g transform="translate(0, 0)">
            <text x="80" y="-15" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">0번 동 (Depth: 0)</text>
            <g stroke="#cbd5e1" stroke-width="1">
                <rect x="0" y="0" width="40" height="30" fill="#e0f2fe"/> <rect x="40" y="0" width="40" height="30" fill="#e0f2fe"/> <rect x="80" y="0" width="40" height="30" fill="#e0f2fe"/> <rect x="120" y="0" width="40" height="30" fill="#e0f2fe"/>
                <rect x="0" y="30" width="40" height="30" fill="#bae6fd"/> <rect x="40" y="30" width="40" height="30" fill="#bae6fd"/> <rect x="80" y="30" width="40" height="30" fill="#bae6fd"/> <rect x="120" y="30" width="40" height="30" fill="#bae6fd"/>
                <rect x="0" y="60" width="40" height="30" fill="#e0f2fe"/> <rect x="40" y="60" width="40" height="30" fill="#e0f2fe"/> <rect x="80" y="60" width="40" height="30" fill="#e0f2fe"/> <rect x="120" y="60" width="40" height="30" fill="#e0f2fe"/>
            </g>
            <g font-family="monospace" font-size="14" font-weight="bold" fill="#0c4a6e" text-anchor="middle">
                <text x="20" y="20">0</text><text x="60" y="20">1</text><text x="100" y="20">2</text><text x="140" y="20">3</text>
                <text x="20" y="50">4</text><text x="60" y="50">5</text><text x="100" y="50">6</text><text x="140" y="50">7</text>
                <text x="20" y="80">8</text><text x="60" y="80">9</text><text x="100" y="80">10</text><text x="140" y="80">11</text>
            </g>
        </g>
        
        <g transform="translate(240, 0)">
            <text x="80" y="-15" font-family="sans-serif" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">1번 동 (Depth: 1)</text>
            <g stroke="#cbd5e1" stroke-width="1">
                <rect x="0" y="0" width="40" height="30" fill="#dcfce7"/> <rect x="40" y="0" width="40" height="30" fill="#dcfce7"/> <rect x="80" y="0" width="40" height="30" fill="#dcfce7"/> <rect x="120" y="0" width="40" height="30" fill="#dcfce7"/>
                <rect x="0" y="30" width="40" height="30" fill="#bbf7d0"/> <rect x="40" y="30" width="40" height="30" fill="#bbf7d0"/> <rect x="80" y="30" width="40" height="30" fill="#bbf7d0"/> <rect x="120" y="30" width="40" height="30" fill="#bbf7d0"/>
                <rect x="0" y="60" width="40" height="30" fill="#dcfce7"/> <rect x="40" y="60" width="40" height="30" fill="#dcfce7"/> <rect x="80" y="60" width="40" height="30" fill="#dcfce7"/> <rect x="120" y="60" width="40" height="30" fill="#dcfce7"/>
            </g>
            <g font-family="monospace" font-size="14" font-weight="bold" fill="#064e3b" text-anchor="middle">
                <text x="20" y="20">12</text><text x="60" y="20">13</text><text x="100" y="20">14</text><text x="140" y="20">15</text>
                <text x="20" y="50">16</text><text x="60" y="50">17</text><text x="100" y="50">18</text><text x="140" y="50">19</text>
                <text x="20" y="80">20</text><text x="60" y="80">21</text><text x="100" y="80">22</text><text x="140" y="80">23</text>
            </g>
        </g>
    </g>
    <text x="300" y="200" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">3차원 (Depth, Row, Col) 배열은 '동 단위'로 나란히 구분된 2차원 공간들의 집합입니다.</text>
</svg>
