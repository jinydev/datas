<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">보기(View)의 원리: 데이터 본체는 하나!</text>
    
    <g transform="translate(150, 60)">
        <text x="-30" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="#64748b" text-anchor="end">메모리 본체</text>
        <g stroke="#cbd5e1" stroke-width="2" fill="#e2e8f0">
             <rect x="0" y="0" width="50" height="40" rx="4"/>
             <rect x="50" y="0" width="50" height="40" rx="4"/>
             <rect x="100" y="0" width="50" height="40" rx="4" fill="#fca5a5">
                 <animate attributeName="fill" values="#e2e8f0; #fca5a5; #fca5a5; #e2e8f0" dur="4s" repeatCount="indefinite" keyTimes="0;0.5;0.9;1"/>
             </rect>
             <rect x="150" y="0" width="50" height="40" rx="4"/>
             <rect x="200" y="0" width="50" height="40" rx="4"/>
        </g>
        <g font-family="monospace" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">
             <text x="25" y="26">0</text> <text x="75" y="26">1</text> 
             <text x="125" y="26">
                 <tspan>2</tspan>
                 <tspan x="125" dy="0" fill="#dc2626" opacity="0">
                     <animate attributeName="opacity" values="0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0;0.5;0.9;1"/>200
                 </tspan>
                 <animate attributeName="opacity" values="1; 0; 0; 1" dur="4s" repeatCount="indefinite" keyTimes="0;0.49;0.91;1"/>
             </text>
             <text x="175" y="26">3</text> <text x="225" y="26">4</text>
        </g>

        <g transform="translate(0, 100)">
             <text x="-30" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="end">반환된 View</text>
             <g stroke="#93c5fd" stroke-width="2" fill="none" stroke-dasharray="4">
                 <rect x="0" y="0" width="50" height="40" rx="4"/>
                 <rect x="50" y="0" width="50" height="40" rx="4"/>
                 <rect x="100" y="0" width="50" height="40" rx="4" stroke="#ef4444">
                     <animate attributeName="stroke" values="#93c5fd; #ef4444; #ef4444; #93c5fd" dur="4s" repeatCount="indefinite" keyTimes="0;0.5;0.9;1"/>
                 </rect>
                 <rect x="150" y="0" width="50" height="40" rx="4"/>
                 <rect x="200" y="0" width="50" height="40" rx="4"/>
             </g>
             
             <path d="M 25 0 L 25 -60" stroke="#94a3b8" stroke-dasharray="2" opacity="0.5"/>
             <path d="M 75 0 L 75 -60" stroke="#94a3b8" stroke-dasharray="2" opacity="0.5"/>
             <path d="M 125 0 L 125 -60" stroke="#ef4444" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)">
                 <animate attributeName="opacity" values="0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.9;1"/>
             </path>
             <path d="M 175 0 L 175 -60" stroke="#94a3b8" stroke-dasharray="2" opacity="0.5"/>
             <path d="M 225 0 L 225 -60" stroke="#94a3b8" stroke-dasharray="2" opacity="0.5"/>

             <g font-family="monospace" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="middle">
                 <text x="25" y="26">0</text> <text x="75" y="26">1</text> 
                 <text x="125" y="26">
                     <tspan>2</tspan>
                     <tspan x="125" dy="0" fill="#dc2626" opacity="0">
                         <animate attributeName="opacity" values="0; 1; 1; 0" dur="4s" repeatCount="indefinite" keyTimes="0;0.4;0.9;1"/>200
                     </tspan>
                     <animate attributeName="opacity" values="1; 0; 0; 1" dur="4s" repeatCount="indefinite" keyTimes="0;0.39;0.91;1"/>
                 </text>
                 <text x="175" y="26">3</text> <text x="225" y="26">4</text>
             </g>
        </g>
    </g>

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
      </marker>
    </defs>
    
    <text x="300" y="230" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">홀로그램(View)에 가해진 타격은 무조건 원본 메모리 공간에 반영됩니다.</text>
</svg>
