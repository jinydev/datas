<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Numpy의 구조적 한계: 규격 위반 불가</text>
    
    <g transform="translate(50, 70)">
        <text x="25" y="-10" font-family="sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Python List</text>
        <rect x="0" y="0" width="150" height="30" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
        <text x="160" y="20" font-family="monospace" font-size="12" fill="#d97706">+</text>
        <rect x="180" y="-10" width="90" height="50" fill="#fcd34d" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3"/>
        <text x="225" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b45309" text-anchor="middle">3개 우겨넣기</text>
        <path d="M 280 15 L 310 15" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow_orange)"/>
        <rect x="320" y="0" width="220" height="30" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
        <text x="430" y="20" font-family="sans-serif" font-size="12" fill="#b45309" text-anchor="middle">동적으로 가방 크기가 늘어남 (OK!)</text>
    </g>

    <g transform="translate(50, 160)">
        <text x="25" y="-10" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0ea5e9" text-anchor="middle">Numpy View</text>
        <rect x="0" y="0" width="100" height="30" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
        <text x="50" y="20" font-family="sans-serif" font-size="12" fill="#0284c7" text-anchor="middle">딱 2칸 공간</text>
        <text x="120" y="20" font-family="monospace" font-size="12" fill="#0ea5e9">+</text>
        
        <rect x="140" y="-10" width="90" height="50" fill="#bae6fd" stroke="#0284c7" stroke-width="2" stroke-dasharray="3"/>
        <text x="185" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0369a1" text-anchor="middle">3개 데이터</text>
        
        <path d="M 240 15 L 270 15" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow_red)"/>
        
        <g transform="translate(280, -10)">
            <rect x="0" y="0" width="260" height="50" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
            <text x="130" y="20" font-family="monospace" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">ValueError!</text>
            <text x="130" y="40" font-family="sans-serif" font-size="11" fill="#dc2626" text-anchor="middle">고정된 메모리 크기 위반 (차단)</text>
        </g>
    </g>

    <defs>
      <marker id="arrow_orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
      </marker>
      <marker id="arrow_red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
      </marker>
    </defs>
    
    <text x="300" y="245" font-family="sans-serif" font-size="13" font-weight="normal" fill="#475569" text-anchor="middle">파이썬 원시 리스트와 달리, Numpy 속에서는 미리 지어진 메모리 골조 크기가 엄격히 제한됩니다.</text>
</svg>
