<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
    .text-title { font-family: 'Pretendard', sans-serif; font-size: 24px; font-weight: 800; fill: #1e293b; }
    .text-sub { font-family: 'Pretendard', sans-serif; font-size: 16px; fill: #64748b; }
    .check { fill: none; stroke: #10b981; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="100%" height="100%" class="bg" rx="12"/>
  
  <g transform="translate(80, 25)">
    <rect x="0" y="0" width="100" height="140" class="box" />
    <line x1="20" y1="30" x2="80" y2="30" stroke="#e2e8f0" stroke-width="3"/>
    <line x1="20" y1="60" x2="80" y2="60" stroke="#e2e8f0" stroke-width="3"/>
    <line x1="20" y1="90" x2="80" y2="90" stroke="#e2e8f0" stroke-width="3"/>
    <line x1="20" y1="120" x2="60" y2="120" stroke="#e2e8f0" stroke-width="3"/>
    
    <path d="M10,20 L30,40 L60,0" class="check" transform="translate(15, 10)" />
    <path d="M10,20 L30,40 L60,0" class="check" transform="translate(15, 60)" />

    <text x="140" y="50" class="text-title">지금까지 배운 내용, 완벽하게 내 것으로 만들 시간!</text>
    <text x="140" y="80" class="text-sub">배열 생성, 다차원 인덱싱, 필터링, 축(Axis) 연산까지 총출동합니다.</text>
    <text x="140" y="110" class="text-sub">눈으로만 보지 말고, 에디터를 켜서 직접 타이핑해 보세요! 💻</text>
  </g>
</svg>
