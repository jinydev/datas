<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">데이터 분리 실전: 문제집(X)과 정답지(y) 나누기</text>
    
    <g transform="translate(100, 70)">
        <!-- Table Header -->
        <g font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">
            <rect x="0" y="-30" width="60" height="30" fill="#e2e8f0"/> <text x="30" y="-10">문제1</text>
            <rect x="65" y="-30" width="60" height="30" fill="#e2e8f0"/> <text x="95" y="-10">문제2</text>
            <rect x="130" y="-30" width="60" height="30" fill="#e2e8f0"/> <text x="160" y="-10">문제3</text>
            <!-- Target column -->
            <rect x="220" y="-30" width="60" height="30" fill="#fef08a"/> <text x="250" y="-10" fill="#b45309">정답(y)</text>
        </g>
        
        <!-- Table Body -->
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="60" height="30" fill="#f1f5f9"/> <rect x="65" y="0" width="60" height="30" fill="#f1f5f9"/> <rect x="130" y="0" width="60" height="30" fill="#f1f5f9"/> 
            <rect x="0" y="35" width="60" height="30" fill="#f8fafc"/> <rect x="65" y="35" width="60" height="30" fill="#f8fafc"/> <rect x="130" y="35" width="60" height="30" fill="#f8fafc"/> 
            <rect x="0" y="70" width="60" height="30" fill="#f1f5f9"/> <rect x="65" y="70" width="60" height="30" fill="#f1f5f9"/> <rect x="130" y="70" width="60" height="30" fill="#f1f5f9"/> 
            <rect x="0" y="105" width="60" height="30" fill="#f8fafc"/> <rect x="65" y="105" width="60" height="30" fill="#f8fafc"/> <rect x="130" y="105" width="60" height="30" fill="#f8fafc"/> 
        </g>
        
        <g stroke="#fbcfe8" stroke-width="1">
            <rect x="220" y="0" width="60" height="30" fill="#fdf2f8"/>
            <rect x="220" y="35" width="60" height="30" fill="#fce7f3"/>
            <rect x="220" y="70" width="60" height="30" fill="#fdf2f8"/>
            <rect x="220" y="105" width="60" height="30" fill="#fce7f3"/>
        </g>
        
        <rect x="-5" y="-35" width="200" height="175" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="6" rx="5" opacity="0">
            <animate attributeName="opacity" values="0;1;1;0;0" dur="5s" repeatCount="indefinite" keyTimes="0;0.1;0.4;0.5;1"/>
        </rect>
        <text x="95" y="155" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle" opacity="0">
            1. 문제집 추출 : a[:, :-1]
            <animate attributeName="opacity" values="0;1;1;0;0" dur="5s" repeatCount="indefinite" keyTimes="0;0.1;0.4;0.5;1"/>
        </text>

        <rect x="215" y="-35" width="70" height="175" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="6" rx="5" opacity="0">
            <animate attributeName="opacity" values="0;0;0;1;1" dur="5s" repeatCount="indefinite" keyTimes="0;0.4;0.5;0.6;1"/>
        </rect>
        <text x="250" y="155" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ea580c" text-anchor="middle" opacity="0">
            2. 정답지 추출 : a[:, -1]
            <animate attributeName="opacity" values="0;0;0;1;1" dur="5s" repeatCount="indefinite" keyTimes="0;0.4;0.5;0.6;1"/>
        </text>
        
        <path d="M 200 50 L 210 50" stroke="#94a3b8" stroke-width="2" fill="none"/>
        <path d="M 205 45 L 215 50 L 205 55" fill="#94a3b8"/>
    </g>
    <text x="300" y="230" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">데이터프레임의 가장 마지막 열(정답)만 가위로 싹둑 오려내는 실전 필수 스킬입니다.</text>
</svg>
