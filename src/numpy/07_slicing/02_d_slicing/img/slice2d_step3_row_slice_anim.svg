<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">수평 자르기: 행(Row) 범위 슬라이싱 a[2:4]</text>
    <g transform="translate(150, 60)">
        <g stroke="#cbd5e1" stroke-width="1" opacity="0.4">
            <rect x="0" y="0" width="240" height="30" fill="#f1f5f9"/>
             <rect x="0" y="30" width="240" height="30" fill="#f1f5f9"/>
             <rect x="0" y="120" width="240" height="30" fill="#f1f5f9"/>
        </g>
        <rect x="-5" y="55" width="250" height="70" fill="none" stroke="#eab308" stroke-width="2" stroke-dasharray="4"/>
        
        <g>
            <rect x="0" y="60" width="240" height="60" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
            <animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0; 0,0" dur="4s" repeatCount="indefinite" keyTimes="0; 0.3; 0.8; 1"/>
            <g font-family="monospace" font-size="14" font-weight="bold" fill="#854d0e" text-anchor="middle">
                <text x="20" y="80">12</text><text x="60" y="80">13</text><text x="100" y="80">14</text><text x="140" y="80">15</text><text x="180" y="80">16</text><text x="220" y="80">17</text>
                <text x="20" y="110">18</text><text x="60" y="110">19</text><text x="100" y="110">20</text><text x="140" y="110">21</text><text x="180" y="110">22</text><text x="220" y="110">23</text>
            </g>
            <text x="-10" y="50" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ca8a04" opacity="0">
                2층과 3층 범위 슬라이스
                <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            </text>
        </g>
    </g>
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">2번 층부터 4번 층 '앞'까지만 수평으로 잘라내어 2차원 블록을 만듭니다.</text>
</svg>
