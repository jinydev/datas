<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">2단계: 범위 자르기 (a[1:4])</text>
    
    <g transform="translate(50, 140)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="50" y="0" width="50" height="40" fill="#f8fafc"/>
            <rect x="100" y="0" width="50" height="40" fill="#f8fafc"/>
            <rect x="150" y="0" width="50" height="40" fill="#f8fafc"/>
            <rect x="200" y="0" width="300" height="40" fill="#f1f5f9"/>
        </g>
        
        <g font-family="monospace" font-size="16" font-weight="bold" fill="#94a3b8" text-anchor="middle">
            <text x="25" y="26">0</text>
            <text x="225" y="26">...</text>
        </g>

        <g>
            <rect x="50" y="0" width="150" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
            <text x="75" y="26" font-family="monospace" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">1</text>
            <text x="125" y="26" font-family="monospace" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">4</text>
            <text x="175" y="26" font-family="monospace" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">9</text>
            
            <animateTransform attributeName="transform" type="translate" values="0,0;0,-60;0,-60;0,0" dur="3s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            <text x="125" y="-10" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle" opacity="0">
                [1:4] 추출 성공!
                <animate attributeName="opacity" values="0;0;1;1;0" dur="3s" repeatCount="indefinite" keyTimes="0;0.2;0.4;0.9;1"/>
            </text>
        </g>
        
        <rect x="50" y="0" width="150" height="40" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4"/>
        <text x="125" y="26" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">절취선 (1~3)</text>
    </g>

    <text x="300" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">인덱스 1번부터 4번 '전'까지(즉, 3번까지) 블록 3개를 레이저로 도려내어 들어올립니다.</text>
</svg>
