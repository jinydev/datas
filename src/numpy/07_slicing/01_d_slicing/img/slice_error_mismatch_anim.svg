<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">🚨 시스템 경고: 크기 불일치 에러 (3칸 vs 2칸)</text>
    
    <g transform="translate(150, 120)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="-100" y="0" width="50" height="40" fill="#f1f5f9"/>
            <rect x="-50" y="0" width="50" height="40" fill="#f1f5f9"/>
            
            <rect x="0" y="0" width="50" height="40" fill="#fecaca" stroke="#ef4444" stroke-width="2" stroke-dasharray="4" rx="2" opacity="0.5"/>
            <rect x="50" y="0" width="50" height="40" fill="#fecaca" stroke="#ef4444" stroke-width="2" stroke-dasharray="4" rx="2" opacity="0.5"/>
            <rect x="100" y="0" width="50" height="40" fill="#fecaca" stroke="#ef4444" stroke-width="2" stroke-dasharray="4" rx="2" opacity="0.5"/>
            
            <rect x="150" y="0" width="50" height="40" fill="#f1f5f9"/>
        </g>
        <text x="75" y="60" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">잘라낸 원본 공간: 3칸 분량의 틈</text>

        <g>
            <rect x="0" y="0" width="100" height="40" fill="#e2e8f0" stroke="#64748b" stroke-width="3" rx="2"/>
            <text x="25" y="26" font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">-5</text>
            <text x="75" y="26" font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">-5</text>
            <text x="50" y="-15" font-family="sans-serif" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">삽입할 새 데이터: 2칸</text>
            
            <animateTransform attributeName="transform" type="translate" values="0,-100; 0,-30; 0,-30; 0,-100" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            
            <path d="M 120 40 L 100 0 L 130 10 L 110 -30" stroke="#f59e0b" stroke-width="4" fill="none" opacity="0">
                <animate attributeName="opacity" values="0;0;1;0;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.35;0.6;1"/>
            </path>
            <text x="140" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="start" opacity="0">
                1칸 부족! 대형 사고!
                <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.7;0.8;1"/>
            </text>
        </g>
    </g>

    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">입력값이 단일 스칼라(1개)가 아니므로 브로드캐스팅도 안 되고, 개수도 달라 1:1 매칭도 깨집니다.</text>
</svg>
