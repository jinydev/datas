<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="250" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">다중 논리 마스크: (a == 4) | (a > 15)</text>
    
    <g transform="translate(140, 50)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="40" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="80" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="120" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="160" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="200" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="240" y="0" width="40" height="30" fill="#f1f5f9"/>
        </g>
        <g font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">
             <text x="20" y="20">1</text><text x="60" y="20">2</text><text x="100" y="20">3</text><text x="140" y="20">4</text><text x="180" y="20">16</text><text x="220" y="20">17</text><text x="260" y="20">18</text>
        </g>
        <text x="-10" y="20" font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="end">배열 a</text>

        <g transform="translate(0, 40)">
            <g stroke="#fca5a5" stroke-width="2" fill="#fee2e2">
                <rect x="0" y="0" width="40" height="20" /> <rect x="40" y="0" width="40" height="20" /> <rect x="80" y="0" width="40" height="20" />
                <rect x="120" y="0" width="40" height="20" fill="#10b981" /> 
                <rect x="160" y="0" width="40" height="20" /> <rect x="200" y="0" width="40" height="20" /> <rect x="240" y="0" width="40" height="20" />
            </g>
            <text x="-10" y="14" font-family="monospace" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="end">(a == 4)</text>
        </g>

        <g transform="translate(0, 70)">
            <g stroke="#fca5a5" stroke-width="2" fill="#fee2e2">
                <rect x="0" y="0" width="40" height="20" /> <rect x="40" y="0" width="40" height="20" /> <rect x="80" y="0" width="40" height="20" /> <rect x="120" y="0" width="40" height="20" />
                <rect x="160" y="0" width="40" height="20" fill="#10b981" /> <rect x="200" y="0" width="40" height="20" fill="#10b981" /> <rect x="240" y="0" width="40" height="20" fill="#10b981" />
            </g>
            <text x="-10" y="14" font-family="monospace" font-size="14" font-weight="bold" fill="#eab308" text-anchor="end">(a > 15)</text>
        </g>

        <g transform="translate(0, 100)">
            <g font-family="sans-serif" font-size="14" font-weight="bold" fill="#ef4444">
                <text x="-10" y="15" text-anchor="end">| (OR 병합)</text>
            </g>
            <g stroke="#fca5a5" stroke-width="2" fill="#fee2e2">
                <rect x="0" y="0" width="40" height="20" /> <rect x="40" y="0" width="40" height="20" /> <rect x="80" y="0" width="40" height="20" />
                <rect x="120" y="0" width="40" height="20" fill="#10b981" /> 
                <rect x="160" y="0" width="40" height="20" fill="#10b981" /> <rect x="200" y="0" width="40" height="20" fill="#10b981" /> <rect x="240" y="0" width="40" height="20" fill="#10b981" />
            </g>
            <g font-family="sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">
                 <text x="20" y="14" fill="#ef4444">F</text> <text x="60" y="14" fill="#ef4444">F</text> <text x="100" y="14" fill="#ef4444">F</text> 
                 <text x="140" y="14">T</text> <text x="180" y="14">T</text> <text x="220" y="14">T</text> <text x="260" y="14">T</text>
            </g>
        </g>
        
        <g>
            <animateTransform attributeName="transform" type="translate" values="0,110; 0,140; 0,140; 0,110" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
            <g stroke="#10b981" stroke-width="2" fill="#d1fae5">
                <rect x="120" y="0" width="40" height="30" /> <rect x="160" y="0" width="40" height="30" /> <rect x="200" y="0" width="40" height="30" /> <rect x="240" y="0" width="40" height="30" />
            </g>
            <g font-family="monospace" font-size="14" font-weight="bold" fill="#047857" text-anchor="middle">
                 <text x="140" y="20">4</text><text x="180" y="20">16</text><text x="220" y="20">17</text><text x="260" y="20">18</text>
            </g>
            <path d="M 140 -20 L 140 0 M 180 -20 L 180 0 M 220 -20 L 220 0 M 260 -20 L 260 0" stroke="#10b981" stroke-width="2" stroke-dasharray="2"/>
        </g>
    </g>
    <text x="300" y="235" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">두 그물망을 겹쳐서 (| 기호) 둘 중 하나라도 구멍 난(True) 곳만 모조리 잡아냅니다.</text>
</svg>
