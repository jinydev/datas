<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">강력한 브로드캐스팅(자동 복제) 저격: x[[1, 3], [2]]</text>
    
    <g transform="translate(100, 70)">
        <text x="0" y="0" font-family="monospace" font-size="20" font-weight="bold" fill="#334155">
            <tspan fill="#ef4444">[1, 3]</tspan>
            <tspan fill="#64748b"> , </tspan>
            <tspan fill="#3b82f6">[2]</tspan>
        </text>
        <path d="M 50 20 L 50 60 M 130 20 L 130 60" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4"/>
        <path d="M 45 55 L 50 60 L 55 55 M 125 55 L 130 60 L 135 55" fill="#94a3b8"/>
        
        <text x="0" y="90" font-family="monospace" font-size="20" font-weight="bold" fill="#334155">
            <tspan fill="#ef4444">[1, 3]</tspan>
            <tspan fill="#64748b"> , </tspan>
            <tspan fill="#3b82f6">[2, 2]</tspan>
        </text>
        
        <text x="180" y="15" font-family="sans-serif" font-size="14" fill="#64748b">크기가 부족한 쪽을 알아서 똑같이 늘려줍니다.</text>
        <text x="180" y="85" font-family="sans-serif" font-size="14" fill="#3b82f6" font-weight="bold">(Broadcasting 발생! [2] -> [2, 2])</text>
    </g>
    
    <text x="300" y="220" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">결과적으로 [1, 2] 와 [3, 2] 좌표를 저격하는 이전 방법과 완전히 동일하게 작동합니다.</text>
</svg>
