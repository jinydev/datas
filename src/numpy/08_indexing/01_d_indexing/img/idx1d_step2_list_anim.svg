<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">리스트(List) 과녁을 이용한 다중 추출: x[[2, 3, 5, 8]]</text>
    <g transform="translate(100, 60)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="40" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="80" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="120" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="160" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="200" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="240" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="280" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="320" y="0" width="40" height="30" fill="#f1f5f9"/> <rect x="360" y="0" width="40" height="30" fill="#f1f5f9"/>
        </g>
        <g font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">
             <text x="20" y="20">0</text><text x="60" y="20">1</text><text x="100" y="20">2</text><text x="140" y="20">3</text><text x="180" y="20">4</text><text x="220" y="20">5</text><text x="260" y="20">6</text><text x="300" y="20">7</text><text x="340" y="20">8</text><text x="380" y="20">9</text>
        </g>
        <rect x="80" y="0" width="40" height="30" fill="none" stroke="#eab308" stroke-width="3" opacity="0">
            <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
        </rect>
        <rect x="120" y="0" width="40" height="30" fill="none" stroke="#eab308" stroke-width="3" opacity="0">
            <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
        </rect>
        <rect x="200" y="0" width="40" height="30" fill="none" stroke="#eab308" stroke-width="3" opacity="0">
            <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
        </rect>
        <rect x="320" y="0" width="40" height="30" fill="none" stroke="#eab308" stroke-width="3" opacity="0">
            <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.8;1"/>
        </rect>
        <g stroke="#eab308" stroke-width="2">
            <rect x="120" y="60" width="40" height="30" fill="#fef08a" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.8;1"/>
            </rect>
            <rect x="160" y="60" width="40" height="30" fill="#fef08a" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.8;1"/>
            </rect>
            <rect x="200" y="60" width="40" height="30" fill="#fef08a" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.8;1"/>
            </rect>
            <rect x="240" y="60" width="40" height="30" fill="#fef08a" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.8;1"/>
            </rect>
        </g>
        <g font-family="monospace" font-size="14" font-weight="bold" fill="#854d0e" text-anchor="middle" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.8;1"/>
            <text x="140" y="80">2</text><text x="180" y="80">3</text><text x="220" y="80">5</text><text x="260" y="80">8</text>
        </g>
        <g stroke="#ca8a04" stroke-width="2" stroke-dasharray="3" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.5;0.8;1"/>
            <line x1="100" y1="35" x2="140" y2="55"/>
            <line x1="140" y1="35" x2="180" y2="55"/>
            <line x1="220" y1="35" x2="220" y2="55"/>
            <line x1="340" y1="35" x2="260" y2="55"/>
        </g>
    </g>
    <text x="300" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">대괄호 두 개 [[ ]] 를 사용하여 리스트나 배열을 넘기면, 해당 첨자위치의 값들만 모아 새 배열을 반환합니다.</text>
</svg>
