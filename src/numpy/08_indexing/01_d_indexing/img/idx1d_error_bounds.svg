<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">주의: 범위를 벗어난 타겟 (IndexError)</text>
    <g transform="translate(100, 70)">
        <g stroke="#cbd5e1" stroke-width="1">
            <rect x="0" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="30" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="60" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="90" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="120" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="150" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="180" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="210" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="240" y="0" width="30" height="30" fill="#f1f5f9"/> <rect x="270" y="0" width="30" height="30" fill="#f1f5f9"/>
        </g>
        <g font-family="monospace" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle" y="20">
             <text x="15">0</text><text x="45">1</text><text x="75">2</text><text x="105">3</text><text x="135">4</text><text x="165">5</text><text x="195">6</text><text x="225">7</text><text x="255">8</text><text x="285">9</text>
        </g>

        <!-- The imaginary index 10 -->
        <g font-family="monospace" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle" y="20" opacity="0">
             <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.3;0.8;1"/>
             <rect x="300" y="0" width="30" height="30" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="2"/>
             <text x="315" y="20">?</text>
             <path d="M 315 -20 L 315 -5" stroke="#ef4444" stroke-width="2"/>
             <text x="315" y="-25" font-family="sans-serif">Index 10</text>
        </g>

        <!-- Boom Icon -->
        <g transform="translate(315, 15)" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.4;0.5;0.8;1"/>
            <path d="M 0 -15 L 5 -5 L 15 -5 L 10 5 L 15 15 L 5 10 L 0 20 L -5 10 L -15 15 L -10 5 L -15 -5 L -5 -5 Z" fill="#f87171"/>
            <text x="0" y="30" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b91c1c" text-anchor="middle">에러 발생!</text>
        </g>
    </g>
    <text x="300" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="middle">배열의 마지막 칸(크기-1)을 넘어서는 인덱스를 요청하면 지뢰(IndexError)가 터집니다.</text>
</svg>
