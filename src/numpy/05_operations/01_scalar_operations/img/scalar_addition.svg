<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="250" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">배열과 스칼라의 덧셈 연산 (+)</text>
    <g transform="translate(100, 70)">
        <rect width="80" height="40" rx="5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="40" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">0</text>
    </g>
    <g transform="translate(250, 70)">
        <rect width="80" height="40" rx="5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="40" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">1</text>
    </g>
    <g transform="translate(400, 70)">
        <rect width="80" height="40" rx="5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <text x="40" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0369a1" text-anchor="middle">2</text>
    </g>
    <text x="80" y="95" font-family="sans-serif" font-size="16" font-weight="bold" fill="#475569" text-anchor="end">배열 a</text>
    
    <g transform="translate(100, 130)">
        <rect width="80" height="30" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="2" stroke-dasharray="4"/>
        <text x="40" y="21" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">+ 2</text>
    </g>
    <g transform="translate(250, 130)">
        <rect width="80" height="30" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="2" stroke-dasharray="4"/>
        <text x="40" y="21" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">+ 2</text>
    </g>
    <g transform="translate(400, 130)">
        <rect width="80" height="30" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="2" stroke-dasharray="4"/>
        <text x="40" y="21" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">+ 2</text>
    </g>
    <text x="80" y="150" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="end">스칼라 복제</text>
    
    <line x1="80" y1="175" x2="520" y2="175" stroke="#94a3b8" stroke-width="2" stroke-dasharray="2"/>
    
    <g transform="translate(100, 190)">
        <rect width="80" height="40" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
        <text x="40" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">2</text>
    </g>
    <g transform="translate(250, 190)">
        <rect width="80" height="40" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
        <text x="40" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">3</text>
    </g>
    <g transform="translate(400, 190)">
        <rect width="80" height="40" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
        <text x="40" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">4</text>
    </g>
    <text x="80" y="215" font-family="sans-serif" font-size="16" font-weight="bold" fill="#475569" text-anchor="end">결과</text>
    
    <path d="M140 110 L140 126" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M290 110 L290 126" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M440 110 L440 126" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M140 160 L140 186" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M290 160 L290 186" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M440 160 L440 186" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
        </marker>
    </defs>
