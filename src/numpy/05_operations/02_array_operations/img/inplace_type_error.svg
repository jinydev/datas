<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="200" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">In-place 치환 에러: 작은 자료형 공간에 큰 자료형 욱여넣기 시도</text>
    
    <text x="150" y="160" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">좁은 정수(int32) 보관함 'a'</text>
    <rect x="100" y="80" width="100" height="40" rx="5" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
    <text x="150" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0369a1" text-anchor="middle">10 (정수)</text>
    
    <g transform="translate(350, 70)">
        <polygon points="0,30 20,-10 120,-10 140,30 120,70 20,70" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
        <text x="70" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a16207" text-anchor="middle">10.555 (실수)</text>
        <text x="70" y="100" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ca8a04" text-anchor="middle">거대한 float64 데이터</text>
    </g>
    
    <!-- Red dotted line indicating failure -->
    <path d="M 330 100 L 220 100" stroke="#dc2626" stroke-width="4" stroke-dasharray="6" marker-end="url(#arrow_red)"/>
    <!-- Big red X -->
    <g transform="translate(260, 93)">
        <line x1="-15" y1="-15" x2="15" y2="15" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
        <line x1="15" y1="-15" x2="-15" y2="15" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
    </g>

    <defs>
        <marker id="arrow_red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
        </marker>
    </defs>
</svg>
