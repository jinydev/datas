<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="260" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">애니메이션: 가로 방향 자바라 통계 압축 (a.sum(axis=1))</text>
    
    <text x="330" y="60" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0ea5e9" text-anchor="middle">← 좌우 뭉개짐(축 이동) →</text>

    <!-- Result Column -->
    <rect x="370" y="70" width="70" height="40" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
    <text x="405" y="96" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">30</text>
    <rect x="370" y="125" width="70" height="40" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
    <text x="405" y="151" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">13</text>
    <rect x="370" y="180" width="70" height="40" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
    <text x="405" y="206" font-family="sans-serif" font-size="18" font-weight="bold" fill="#15803d" text-anchor="middle">3</text>

    <!-- Row 1 -->
