<svg width="800" height="280" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .subtitle { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #7f8c8d; text-anchor: middle;}
    .math-text { font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; fill: #34495e; alignment-baseline: middle; text-anchor: middle;}
    .bracket { font-family: 'Courier New', monospace; font-size: 80px; font-weight: normal; fill: #7f8c8d; alignment-baseline: middle; text-anchor: middle; }
    
    .diag-one { fill: #9b59b6; font-weight: bold; }
    .off-zero { fill: #bdc3c7; }
    .result { fill: #27ae60; font-weight: bold; }
    
    .op { font-family: 'Courier New', monospace; font-size: 36px; font-weight: bold; fill: #f39c12; alignment-baseline: middle; text-anchor: middle; }
    
    @keyframes pulse-purple {
      0%, 20% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      80%, 100% { transform: scale(1); opacity: 1; }
    }
    .anim-pulse { animation: pulse-purple 4s infinite; transform-origin: center; }
  </style>

  <rect width="100%" height="100%" fill="#f9fcfb" rx="20" />
  <text x="400" y="40" class="title" text-anchor="middle">행렬 곱셈(Matrix Multiplication)의 진짜 항등원: A × I = A</text>
  <text x="400" y="65" class="subtitle">어떤 거대한 행렬이든 단위행렬(I)을 곁에 곱해주면 원래 모습 그대로 거울처럼 튀어나옵니다.</text>

  <!-- Matrix A -->
  <g transform="translate(150, 160)">
    <text x="-40" y="0" class="bracket">[</text>
    <text x="-15" y="-20" class="math-text">3</text>
    <text x="15" y="-20" class="math-text">5</text>
    <text x="-15" y="20" class="math-text">2</text>
    <text x="15" y="20" class="math-text">9</text>
    <text x="40" y="0" class="bracket">]</text>
    <text x="0" y="60" class="title" font-size="16" fill="#7f8c8d" text-anchor="middle">어떤 데이터 A</text>
  </g>

  <!-- Multiply (Matrix) -->
  <text x="280" y="155" class="op">×</text>
  <text x="280" y="185" class="subtitle" font-size="11">(Matrix Dot)</text>

  <!-- Identity Matrix (I) -->
  <g transform="translate(410, 160)">
    <text x="-40" y="0" class="bracket anim-pulse" style="fill:#9b59b6">[</text>
    <text x="-15" y="-20" class="math-text diag-one anim-pulse">1</text>
    <text x="15" y="-20" class="math-text off-zero">0</text>
    <text x="-15" y="20" class="math-text off-zero">0</text>
    <text x="15" y="20" class="math-text diag-one anim-pulse">1</text>
    <text x="40" y="0" class="bracket anim-pulse" style="fill:#9b59b6">]</text>
    <text x="0" y="60" class="title" font-size="16" fill="#9b59b6" text-anchor="middle">단위행렬 (I)</text>
  </g>

  <!-- Equals -->
  <text x="540" y="155" class="op">=</text>

  <!-- Result Matrix A -->
  <g transform="translate(670, 160)">
    <text x="-40" y="0" class="bracket">[</text>
    <text x="-15" y="-20" class="math-text result">3</text>
    <text x="15" y="-20" class="math-text result">5</text>
    <text x="-15" y="20" class="math-text result">2</text>
    <text x="15" y="20" class="math-text result">9</text>
    <text x="40" y="0" class="bracket">]</text>
    <text x="0" y="60" class="title" font-size="16" fill="#27ae60" text-anchor="middle">원본 복사 완료!</text>
  </g>

</svg>
