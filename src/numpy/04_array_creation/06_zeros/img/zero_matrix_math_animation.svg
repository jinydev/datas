<svg width="800" height="250" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 20px; font-weight: bold; fill: #2c3e50; }
    .math-text { font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; fill: #34495e; alignment-baseline: middle; text-anchor: middle;}
    .bracket { font-family: 'Courier New', monospace; font-size: 80px; font-weight: normal; fill: #7f8c8d; alignment-baseline: middle; text-anchor: middle; }
    .zero { fill: #e74c3c; font-weight: bold; }
    .result { fill: #27ae60; font-weight: bold; }
    .op { font-family: 'Courier New', monospace; font-size: 36px; font-weight: bold; fill: #f39c12; alignment-baseline: middle; text-anchor: middle; }
    
    @keyframes pulse {
      0%, 20% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.5; }
      80%, 100% { transform: scale(1); opacity: 1; }
    }
    .anim-pulse { animation: pulse 3s infinite; transform-origin: center; }
  </style>

  <rect width="100%" height="100%" fill="#f9fcfb" rx="20" />
  <text x="400" y="40" class="title" text-anchor="middle">수학에서의 영행렬 (덧셈의 항등원: A + O = A)</text>

  <!-- Matrix A -->
  <g transform="translate(150, 140)">
    <text x="-40" y="0" class="bracket">[</text>
    <text x="-15" y="-20" class="math-text">1</text>
    <text x="15" y="-20" class="math-text">2</text>
    <text x="-15" y="20" class="math-text">3</text>
    <text x="15" y="20" class="math-text">4</text>
    <text x="40" y="0" class="bracket">]</text>
    <text x="0" y="60" class="title" font-size="16" fill="#7f8c8d" text-anchor="middle">행렬 A</text>
  </g>

  <!-- Plus -->
  <text x="280" y="135" class="op">+</text>

  <!-- Matrix O (Zero Matrix) -->
  <g transform="translate(410, 140)">
    <text x="-40" y="0" class="bracket anim-pulse" style="fill:#e74c3c">[</text>
    <text x="-15" y="-20" class="math-text zero anim-pulse">0</text>
    <text x="15" y="-20" class="math-text zero anim-pulse">0</text>
    <text x="-15" y="20" class="math-text zero anim-pulse">0</text>
    <text x="15" y="20" class="math-text zero anim-pulse">0</text>
    <text x="40" y="0" class="bracket anim-pulse" style="fill:#e74c3c">]</text>
    <text x="0" y="60" class="title" font-size="16" fill="#e74c3c" text-anchor="middle">영행렬 (O)</text>
  </g>

  <!-- Equals -->
  <text x="540" y="135" class="op">=</text>

  <!-- Result Matrix A -->
  <g transform="translate(670, 140)">
    <text x="-40" y="0" class="bracket">[</text>
    <text x="-15" y="-20" class="math-text result">1</text>
    <text x="15" y="-20" class="math-text result">2</text>
    <text x="-15" y="20" class="math-text result">3</text>
    <text x="15" y="20" class="math-text result">4</text>
    <text x="40" y="0" class="bracket">]</text>
    <text x="0" y="60" class="title" font-size="16" fill="#27ae60" text-anchor="middle">그대로 행렬 A</text>
  </g>

</svg>
