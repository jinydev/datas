<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .code { font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #e74c3c; background: #fdf2e9; }
    .box { fill: #3498db; stroke: #2980b9; stroke-width: 2; rx: 8; }
    .box-float { fill: #2ecc71; stroke: #27ae60; stroke-width: 2; rx: 8; }
    .num { font-family: 'Courier New', monospace; font-size: 24px; font-weight: bold; fill: white; text-anchor: middle; alignment-baseline: central; }
    .arrow { stroke: #7f8c8d; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrowhead); }
    .op-text { font-family: 'Comic Sans MS', sans-serif; font-size: 20px; font-weight: bold; fill: #8e44ad; }

    @keyframes slide-down {
      0%, 20% { transform: translateY(0); opacity: 1; }
      40%, 60% { transform: translateY(60px); opacity: 1; }
      80%, 100% { transform: translateY(120px); opacity: 0; }
    }
    
    @keyframes fade-in-float {
      0%, 40% { opacity: 0; transform: scale(0.8); }
      50%, 90% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    .slide-anim { animation: slide-down 6s infinite ease-in-out; }
    .fade-anim { animation: fade-in-float 6s infinite ease-in-out; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f9fcfb" rx="20" />
  
  <text x="400" y="40" class="title" text-anchor="middle">안전지대(Integer)에서 계산 후 스칼라 나눗셈 하기!</text>
  <text x="400" y="75" class="code" text-anchor="middle">np.arange(1, 4, 1) / 10.0</text>

  <g transform="translate(150, 120)">
    <!-- Stage 1: Integer Array -->
    <text x="-120" y="25" class="op-text">1. 정수 배열 생성</text>
    <g class="slide-anim">
      <rect x="0" y="0" width="80" height="60" class="box" />
      <text x="40" y="30" class="num">1</text>
      
      <rect x="100" y="0" width="80" height="60" class="box" />
      <text x="140" y="30" class="num">2</text>
      
      <rect x="200" y="0" width="80" height="60" class="box" />
      <text x="240" y="30" class="num">3</text>
    </g>

    <!-- Stage 2: Division Operation -->
    <text x="350" y="50" class="op-text">2. 일괄 스칼라 나눗셈</text>
    <line x1="320" y1="30" x2="340" y2="30" class="arrow" />
    <text x="430" y="85" class="code">/ 10.0</text>

    <!-- Stage 3: Float Array -->
    <g class="fade-anim">
      <text x="-120" y="105" class="op-text" fill="#27ae60">3. 깔끔한 실수 배열 완성!</text>
      <rect x="0" y="80" width="80" height="60" class="box-float" />
      <text x="40" y="110" class="num">0.1</text>
      
      <rect x="100" y="80" width="80" height="60" class="box-float" />
      <text x="140" y="110" class="num">0.2</text>
      
      <rect x="200" y="80" width="80" height="60" class="box-float" />
      <text x="240" y="110" class="num">0.3</text>
    </g>
  </g>

</svg>
