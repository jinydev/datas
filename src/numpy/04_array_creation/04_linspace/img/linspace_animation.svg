<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
    .code { font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; fill: #e74c3c; background: #fdf2e9; }
    .line { stroke: #bdc3c7; stroke-width: 6; stroke-linecap: round; }
    .segment { stroke: #3498db; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 150; stroke-dashoffset: 150; fill: none; }
    .dot { fill: #e74c3c; }
    .text-label { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #555; text-anchor: middle; opacity: 0; }
    
    /* Animations */
    @keyframes draw-seg1 { 0%, 10% { stroke-dashoffset: 150; } 15%, 80% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
    @keyframes draw-seg2 { 0%, 25% { stroke-dashoffset: 150; } 30%, 80% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
    @keyframes draw-seg3 { 0%, 40% { stroke-dashoffset: 150; } 45%, 80% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
    @keyframes draw-seg4 { 0%, 55% { stroke-dashoffset: 150; } 60%, 80% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
    
    @keyframes show-text0 { 0%, 5% { opacity: 0; transform: translateY(-10px); } 10%, 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes show-text1 { 0%, 15% { opacity: 0; transform: translateY(-10px); } 20%, 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes show-text2 { 0%, 30% { opacity: 0; transform: translateY(-10px); } 35%, 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes show-text3 { 0%, 45% { opacity: 0; transform: translateY(-10px); } 50%, 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes show-text4 { 0%, 60% { opacity: 0; transform: translateY(-10px); } 65%, 80% { opacity: 1; transform: translateY(0); } 100% { opacity: 1; transform: translateY(0); } }

    .seg1 { animation: draw-seg1 6s infinite; }
    .seg2 { animation: draw-seg2 6s infinite; }
    .seg3 { animation: draw-seg3 6s infinite; }
    .seg4 { animation: draw-seg4 6s infinite; }
    
    .txt0 { animation: show-text0 6s infinite; }
    .txt1 { animation: show-text1 6s infinite; }
    .txt2 { animation: show-text2 6s infinite; }
    .txt3 { animation: show-text3 6s infinite; }
    .txt4 { animation: show-text4 6s infinite; }

    @keyframes pop-dot {
      0% { transform: scale(0); }
      50% { transform: scale(1.5); }
      100% { transform: scale(1); }
    }
    .pop0 { animation: pop-dot 0.3s forwards; animation-delay: 0.3s; transform-origin: 100px 150px; transform: scale(0); }
  </style>

  <rect width="100%" height="100%" fill="#f9fcfb" rx="20" />
  
  <text x="400" y="40" class="title" text-anchor="middle">구간을 '조각'으로 정확히 쪼개기!</text>
  <text x="400" y="70" class="code" text-anchor="middle">np.linspace(2.0, 3.0, num=5)</text>

  <!-- Base Line -->
  <line x1="100" y1="150" x2="700" y2="150" class="line" />
  
  <!-- Segments -->
  <line x1="100" y1="150" x2="250" y2="150" class="segment seg1" />
  <text x="175" y="140" class="txt1" fill="#3498db" font-size="14" font-weight="bold" font-family="Courier New">+0.25</text>
  
  <line x1="250" y1="150" x2="400" y2="150" class="segment seg2" />
  <text x="325" y="140" class="txt2" fill="#3498db" font-size="14" font-weight="bold" font-family="Courier New">+0.25</text>
  
  <line x1="400" y1="150" x2="550" y2="150" class="segment seg3" />
  <text x="475" y="140" class="txt3" fill="#3498db" font-size="14" font-weight="bold" font-family="Courier New">+0.25</text>
  
  <line x1="550" y1="150" x2="700" y2="150" class="segment seg4" />
  <text x="625" y="140" class="txt4" fill="#3498db" font-size="14" font-weight="bold" font-family="Courier New">+0.25</text>

  <!-- Dots & Labels -->
  <!-- Point 1 (2.0) -->
  <circle cx="100" cy="150" r="8" class="dot txt0" />
  <text x="100" y="190" class="text-label txt0">2.0</text>
  <text x="100" y="210" class="text-label txt0" font-size="12" fill="#7f8c8d">점 1</text>

  <!-- Point 2 (2.25) -->
  <circle cx="250" cy="150" r="8" class="dot txt1" />
  <text x="250" y="190" class="text-label txt1">2.25</text>
  <text x="250" y="210" class="text-label txt1" font-size="12" fill="#7f8c8d">점 2</text>

  <!-- Point 3 (2.5) -->
  <circle cx="400" cy="150" r="8" class="dot txt2" />
  <text x="400" y="190" class="text-label txt2">2.5</text>
  <text x="400" y="210" class="text-label txt2" font-size="12" fill="#7f8c8d">점 3</text>

  <!-- Point 4 (2.75) -->
  <circle cx="550" cy="150" r="8" class="dot txt3" />
  <text x="550" y="190" class="text-label txt3">2.75</text>
  <text x="550" y="210" class="text-label txt3" font-size="12" fill="#7f8c8d">점 4</text>

  <!-- Point 5 (3.0) -->
  <circle cx="700" cy="150" r="8" class="dot txt4" />
  <text x="700" y="190" class="text-label txt4">3.0</text>
  <text x="700" y="210" class="text-label txt4" font-size="12" fill="#7f8c8d">점 5 (끝)</text>

</svg>
