<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 24px; font-weight: bold; fill: #333; }
      .label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #6c757d; }
      .code { font-family: 'Consolas', monospace; font-size: 20px; fill: #d63384; font-weight: bold; }
      .val { font-family: 'Consolas', monospace; font-size: 16px; fill: #155724; }
      .box { rx: 5px; ry: 5px; fill: #e3f2fd; stroke: #0056b3; stroke-width: 2px; }
      .arr-box { fill: #e8f5e9; stroke: #28a745; stroke-width: 2px; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">Step 2: rg.random() - Probabilities</text>
  <text x="425" y="70" class="code" text-anchor="middle">rg.random((4, 3))</text>
  
  <!-- Number dispenser -->
  <g transform="translate(180, 110)">
    <rect x="0" y="0" width="160" height="180" class="box" />
    <text x="80" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#0056b3" text-anchor="middle">0 ~ 1 실수 기계</text>
    
    <text x="80" y="70" class="code" text-anchor="middle" fill="#333">0.948...</text>
    <text x="80" y="105" class="code" text-anchor="middle" fill="#333">0.095...</text>
    <text x="80" y="140" class="code" text-anchor="middle" fill="#333">0.667...</text>

    <!-- Arrow spreading out -->
    <path d="M 180 90 L 260 90" stroke="#0056b3" stroke-width="3" stroke-dasharray="5 3" />
    <polygon points="250,85 260,90 250,95" fill="#0056b3" />
  </g>

  <!-- 4x3 Array -->
  <g transform="translate(450, 110)">
    <rect x="0" y="0" width="240" height="160" class="arr-box" />
    <!-- Col lines -->
    <line x1="80" y1="0" x2="80" y2="160" stroke="#28a745" />
    <line x1="160" y1="0" x2="160" y2="160" stroke="#28a745" />
    <!-- Row lines -->
    <line x1="0" y1="40" x2="240" y2="40" stroke="#28a745" />
    <line x1="0" y1="80" x2="240" y2="80" stroke="#28a745" />
    <line x1="0" y1="120" x2="240" y2="120" stroke="#28a745" />
    
    <!-- Values -->
    <!-- Row 1 -->
    <text x="40" y="25" class="val" text-anchor="middle">0.697</text>
    <text x="120" y="25" class="val" text-anchor="middle">0.326</text>
    <text x="200" y="25" class="val" text-anchor="middle">0.733</text>
    <!-- Row 2 -->
    <text x="40" y="65" class="val" text-anchor="middle">0.220</text>
    <text x="120" y="65" class="val" text-anchor="middle">0.081</text>
    <text x="200" y="65" class="val" text-anchor="middle">0.159</text>
    <!-- Row 3 -->
    <text x="40" y="105" class="val" text-anchor="middle">0.340</text>
    <text x="120" y="105" class="val" text-anchor="middle">0.465</text>
    <text x="200" y="105" class="val" text-anchor="middle">0.266</text>
    <!-- Row 4 -->
    <text x="40" y="145" class="val" text-anchor="middle">0.815</text>
    <text x="120" y="145" class="val" text-anchor="middle">0.193</text>
    <text x="200" y="145" class="val" text-anchor="middle">0.129</text>

    <text x="120" y="190" class="label" fill="#155724" text-anchor="middle">4행 3열 모두 0 ~ 1 사이의 (확률적) 실수</text>
  </g>
</svg>
