<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 24px; font-weight: bold; fill: #333; }
      .label { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #d35400; }
      .code { font-family: 'Consolas', monospace; font-size: 20px; fill: #d35400; font-weight: bold; }
      .val { font-family: 'Consolas', monospace; font-size: 24px; fill: #fff; font-weight: bold; text-anchor: middle;}
      .box { rx: 5px; ry: 5px; fill: #fdf2e9; stroke: #d35400; stroke-width: 2px; }
      .dice { rx: 4px; ry: 4px; fill: #e74c3c; stroke: #c0392b; stroke-width: 2px; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#d35400">Step 3: rg.integers() - Dice Rolls</text>
  <text x="425" y="70" class="code" text-anchor="middle">rg.integers(low=1, high=7, size=(3, 4))</text>
  
  <!-- Number dispenser -->
  <g transform="translate(180, 110)">
    <rect x="0" y="0" width="160" height="150" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2" rx="10" ry="10" />
    <text x="80" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">주사위 통 (1~6)</text>
    
    <rect x="55" y="50" width="50" height="50" class="dice" />
    <circle cx="65" cy="60" r="5" fill="#fff" />
    <circle cx="95" cy="90" r="5" fill="#fff" />
    <circle cx="65" cy="90" r="5" fill="#fff" />
    <circle cx="95" cy="60" r="5" fill="#fff" />
    <circle cx="80" cy="75" r="5" fill="#fff" />

    <text x="80" y="130" class="code" text-anchor="middle" fill="#333" font-size="16">1 &lt;= X &lt; 7</text>

    <!-- Arrow spreading out -->
    <path d="M 180 75 L 260 75" stroke="#d35400" stroke-width="3" stroke-dasharray="5 3" />
    <polygon points="250,70 260,75 250,80" fill="#d35400" />
  </g>

  <!-- 3x4 Array -->
  <g transform="translate(450, 130)">
    <rect x="0" y="0" width="240" height="120" class="box" />
    <!-- Col lines -->
    <line x1="60" y1="0" x2="60" y2="120" stroke="#d35400" />
    <line x1="120" y1="0" x2="120" y2="120" stroke="#d35400" />
    <line x1="180" y1="0" x2="180" y2="120" stroke="#d35400" />
    <!-- Row lines -->
    <line x1="0" y1="40" x2="240" y2="40" stroke="#d35400" />
    <line x1="0" y1="80" x2="240" y2="80" stroke="#d35400" />
    
    <!-- Values as tiny dice blocks -->
    <g transform="translate(10, 5)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">5</text></g>
    <g transform="translate(70, 5)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">6</text></g>
    <g transform="translate(130, 5)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">4</text></g>
    <g transform="translate(190, 5)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">4</text></g>

    <g transform="translate(10, 45)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">2</text></g>
    <g transform="translate(70, 45)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">6</text></g>
    <g transform="translate(130, 45)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">4</text></g>
    <g transform="translate(190, 45)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">5</text></g>

    <g transform="translate(10, 85)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">1</text></g>
    <g transform="translate(70, 85)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">3</text></g>
    <g transform="translate(130, 85)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">5</text></g>
    <g transform="translate(190, 85)"><rect width="40" height="30" class="dice" /><text x="20" y="22" class="val">2</text></g>

    <text x="120" y="150" class="label" text-anchor="middle">3행 4열 (12번) 주사위 던진 결과</text>
  </g>
</svg>
