<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 24px; font-weight: bold; fill: #333; }
      .label { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #6f42c1; }
      .code { font-family: 'Consolas', monospace; font-size: 20px; fill: #6f42c1; font-weight: bold; }
      .box { rx: 5px; ry: 5px; fill: #f8f9fa; stroke: #adb5bd; stroke-width: 2px; }
      .dot { fill: #6f42c1; }
      .curve { fill: rgba(111, 66, 193, 0.2); stroke: #6f42c1; stroke-width: 3px; }
      .axis { stroke: #333; stroke-width: 2px; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#6f42c1">Step 4: rg.standard_normal() - Normal Distribution</text>
  <text x="425" y="70" class="code" text-anchor="middle">rg.standard_normal(10)</text>
  
  <g transform="translate(200, 110)">
    <!-- Chart Background -->
    <rect x="-50" y="0" width="550" height="200" fill="#f8f9fa" />
    
    <!-- Guidelines -->
    <line x1="-50" y1="50" x2="500" y2="50" stroke="#dee2e6" stroke-dasharray="4" />
    <line x1="-50" y1="100" x2="500" y2="100" stroke="#dee2e6" stroke-dasharray="4" />
    <line x1="-50" y1="150" x2="500" y2="150" stroke="#dee2e6" stroke-dasharray="4" />

    <!-- Axes -->
    <line x1="-50" y1="200" x2="500" y2="200" class="axis" /> <!-- x-axis -->
    <line x1="225" y1="0" x2="225" y2="200" class="axis" stroke-dasharray="6 4" /> <!-- Mean (0) -->

    <!-- X-axis Labels -->
    <text x="75" y="220" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">-2</text>
    <text x="150" y="220" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">-1</text>
    <text x="225" y="220" font-family="Arial" font-size="16" font-weight="bold" fill="#6f42c1" text-anchor="middle">평균(0)</text>
    <text x="300" y="220" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">1</text>
    <text x="375" y="220" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">2</text>

    <!-- Normal Bell Curve -->
    <path d="M 0 198 Q 112.5 195 150 150 T 225 30 T 300 150 T 450 198" class="curve" />

    <!-- 10 Data Points (Dots matching the code output) -->
    <!-- [0.30, -1.04, 0.75, 0.94, -1.95, -1.30, 0.13, -0.32, -0.02, -0.85] -->
    <!-- X pos scaling: x = 225 + (val * 75). Y pos jittered -->
    <!-- 0.30 -> x: 247.5 --> <circle cx="247.5" cy="185" r="6" class="dot" />
    <!-- -1.04 -> x: 147 --> <circle cx="147" cy="190" r="6" class="dot" />
    <!-- 0.75 -> x: 281.25 --> <circle cx="281.25" cy="180" r="6" class="dot" />
    <!-- 0.94 -> x: 295.5 --> <circle cx="295.5" cy="190" r="6" class="dot" />
    <!-- -1.95 -> x: 78.75 --> <circle cx="78.75" cy="195" r="6" class="dot" />
    <!-- -1.30 -> x: 127.5 --> <circle cx="127.5" cy="185" r="6" class="dot" />
    <!-- 0.13 -> x: 234.75 --> <circle cx="234.75" cy="170" r="6" class="dot" />
    <!-- -0.32 -> x: 201 --> <circle cx="201" cy="160" r="6" class="dot" />
    <!-- -0.02 -> x: 223.5 --> <circle cx="223.5" cy="195" r="6" class="dot" />
    <!-- -0.85 -> x: 161.25 --> <circle cx="161.25" cy="175" r="6" class="dot" />

    <text x="225" y="250" class="label" text-anchor="middle">대부분의 값이 0(평균) 근처에 몰려 있고, 꼬리로 갈수록 데이터가 희귀함</text>
  </g>
</svg>
