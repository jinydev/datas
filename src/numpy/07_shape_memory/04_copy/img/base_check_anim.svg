<svg width="600" height="240" viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="240" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">.base 속성: 데이터 뿌리(출처) 추적기</text>
    
    <g transform="translate(100, 70)">
        <rect x="150" y="0" width="100" height="50" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
        <text x="200" y="22" font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">org 본체</text>
        <text x="200" y="40" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">.base = None</text>

        <g transform="translate(50, 100)">
            <rect x="0" y="0" width="80" height="40" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3"/>
            <text x="40" y="25" font-family="monospace" font-size="14" font-weight="bold" fill="#1e3a8a" text-anchor="middle">View (v)</text>
            <path d="M 40 0 Q 60 -30 110 -50" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow_blue)"/>
            <text x="70" y="-15" font-family="monospace" font-size="12" font-weight="bold" fill="#2563eb">.base</text>
        </g>

        <g transform="translate(270, 100)">
            <rect x="0" y="0" width="80" height="40" rx="4" fill="#a7f3d0" stroke="#10b981" stroke-width="2"/>
            <text x="40" y="25" font-family="monospace" font-size="14" font-weight="bold" fill="#064e3b" text-anchor="middle">Copy (c)</text>
            <path d="M 40 40 Q 40 70 40 90" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow_green)"/>
            <text x="40" y="75" font-family="monospace" font-size="14" font-weight="bold" fill="#059669" text-anchor="end" dx="-10">.base = None</text>
        </g>
    </g>

    <defs>
      <marker id="arrow_blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
      </marker>
      <marker id="arrow_green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" />
      </marker>
    </defs>
    
    <text x="300" y="230" font-family="sans-serif" font-size="13" font-weight="normal" fill="#475569" text-anchor="middle">.base를 요청하면 View는 자신이 기댄 원본을 가리키고, Copy는 완전히 독립했으므로 None을 반환합니다.</text>
</svg>
