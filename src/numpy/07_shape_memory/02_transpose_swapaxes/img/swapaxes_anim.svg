<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="250" fill="#f8fafc" rx="10"/>
    <text x="300" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">지정 축 맞바꾸기: np.swapaxes(x, 0, 2)</text>
    
    <text x="300" y="45" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">0번 축(깊이)과 2번 축(열)의 데이터를 정밀하게 강제 교환합니다.</text>

    <!-- Source blocks (2,2,2) -->
    <g transform="translate(100, 100)">
       <text x="40" y="-10" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">원본 (2, 2, 2)</text>
       <!-- Block 2 -->
       <g transform="translate(30, -30)" stroke="#64748b" stroke-width="1" fill="#cbd5e1">
           <rect x="0" y="0" width="30" height="25" /> <rect x="30" y="0" width="30" height="25" />
           <rect x="0" y="25" width="30" height="25" /> <rect x="30" y="25" width="30" height="25" />
           <g font-family="monospace" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle" stroke="none">
               <text x="15" y="17" fill="#b91c1c">4</text> <text x="45" y="17">5</text>
               <text x="15" y="42" fill="#b91c1c">6</text> <text x="45" y="42">7</text>
           </g>
       </g>
       <!-- Block 1 -->
       <g stroke="#334155" stroke-width="1.5" fill="#f1f5f9">
           <rect x="0" y="0" width="30" height="25" /> <rect x="30" y="0" width="30" height="25" />
           <rect x="0" y="25" width="30" height="25" /> <rect x="30" y="25" width="30" height="25" />
           <g font-family="monospace" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle" stroke="none">
               <text x="15" y="17">0</text> <text x="45" y="17" fill="#b91c1c">1</text>
               <text x="15" y="42">2</text> <text x="45" y="42" fill="#b91c1c">3</text>
           </g>
       </g>
       <!-- Highlighting the columns that will move -->
       <path d="M45,17 L15,-13" stroke="#b91c1c" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
       <path d="M45,42 L15,12" stroke="#b91c1c" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
    </g>

    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#b91c1c" />
      </marker>
    </defs>

    <!-- Arrow -->
    <g transform="translate(260, 100)">
        <path d="M0,8 L40,8 L40,0 L50,15 L40,30 L40,22 L0,22 Z" fill="#94a3b8"/>
        <text x="25" y="-5" font-family="monospace" font-size="12" font-weight="bold" fill="#2563eb" text-anchor="middle">swap(0, 2)</text>
    </g>

    <!-- Target blocks -->
    <g transform="translate(380, 100)">
       <text x="40" y="-10" font-family="sans-serif" font-size="12" font-weight="bold" fill="#047857" text-anchor="middle">결과 (2, 2, 2)</text>
       <!-- Block 2 -->
       <g transform="translate(30, -30)" stroke="#34d399" stroke-width="1" fill="#a7f3d0">
           <rect x="0" y="0" width="30" height="25" /> <rect x="30" y="0" width="30" height="25" />
           <rect x="0" y="25" width="30" height="25" /> <rect x="30" y="25" width="30" height="25" />
           <g font-family="monospace" font-size="12" font-weight="bold" fill="#064e3b" text-anchor="middle" stroke="none">
               <text x="15" y="17" fill="#b91c1c">1</text> <text x="45" y="17">5</text>
               <text x="15" y="42" fill="#b91c1c">3</text> <text x="45" y="42">7</text>
           </g>
       </g>
       <!-- Block 1 -->
       <g stroke="#059669" stroke-width="1.5" fill="#ecfdf5">
           <rect x="0" y="0" width="30" height="25" /> <rect x="30" y="0" width="30" height="25" />
           <rect x="0" y="25" width="30" height="25" /> <rect x="30" y="25" width="30" height="25" />
           <g font-family="monospace" font-size="12" font-weight="bold" fill="#064e3b" text-anchor="middle" stroke="none">
               <text x="15" y="17">0</text> <text x="45" y="17" fill="#b91c1c">4</text>
               <text x="15" y="42">2</text> <text x="45" y="42" fill="#b91c1c">6</text>
           </g>
       </g>
    </g>

    <text x="300" y="200" font-family="sans-serif" font-size="13" font-weight="normal" fill="#475569" text-anchor="middle">앞면의 오른쪽 열([1, 3])과 뒷면의 왼쪽 열([4, 6])이 서로 위치를 완전히 맞바꿉니다.</text>
</svg>
