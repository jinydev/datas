<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="250" fill="#2d3748" rx="10"/>

  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    행렬 곱셈의 기원: 다항식 대입 연산 (Substitution)
  </text>

  <!-- Equation 1: y = 2a + 3b -->
  <g transform="translate(60, 80)">
    <text x="0" y="0" font-family="monospace" font-size="24" font-weight="bold" fill="#63b3ed">1.  y = 2a + 3b</text>
  </g>

  <!-- Equation 2: z = 4y + 5 -->
  <g transform="translate(60, 140)">
    <text x="0" y="0" font-family="monospace" font-size="24" font-weight="bold" fill="#fc8181">2.  z = 4y + 5</text>
  </g>

  <!-- Animation elements -->
  <!-- 1. y box highlight -->
  <rect x="175" y="115" width="20" height="30" fill="none" stroke="#f6e05e" stroke-width="3" rx="4" opacity="0">
    <animate attributeName="opacity" values="0; 1; 1; 0; 0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.1; 0.2; 0.3; 1"/>
  </rect>

  <!-- 2. The substitution block (2a + 3b) flying down -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.2; 0.25; 0.45; 0.5; 1"/>
    <animateTransform attributeName="transform" type="translate" values="120, 80; 140, 140; 140, 140; 140, 140" dur="8s" repeatCount="indefinite" keyTimes="0; 0.25; 0.35; 0.45; 1"/>
    
    <rect x="-10" y="-25" width="130" height="35" fill="#4a5568" rx="4"/>
    <text x="0" y="0" font-family="monospace" font-size="24" font-weight="bold" fill="#f6e05e">(2a + 3b)</text>
  </g>

  <!-- Expanded Equation 3: z = 4(2a + 3b) + 5 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.5; 0.55; 0.75; 0.8; 1"/>
    <text x="320" y="100" font-family="monospace" font-size="24" font-weight="bold" fill="#e2e8f0">
      z = <tspan fill="#fc8181">4</tspan><tspan fill="#f6e05e">(2a + 3b)</tspan> + 5
    </text>

    <!-- Distribution arrows -->
    <path d="M 370 75 Q 380 60 410 75" fill="none" stroke="#9ae6b4" stroke-width="3" marker-end="url(#arrow)">
      <animate attributeName="stroke-dasharray" values="0 100; 100 0; 100 0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.55; 0.6; 1"/>
    </path>
    <path d="M 370 70 Q 400 45 460 70" fill="none" stroke="#9ae6b4" stroke-width="3" marker-end="url(#arrow)">
      <animate attributeName="stroke-dasharray" values="0 100; 100 0; 100 0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.6; 0.65; 1"/>
    </path>
  </g>

  <!-- Final Equation 4: z = 8a + 12b + 5 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.75; 0.8; 0.95; 1"/>
    <text x="320" y="160" font-family="monospace" font-size="24" font-weight="bold" fill="#68d391">
      z = 8a + 12b + 5
    </text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ae6b4" />
    </marker>
  </defs>
</svg>
