<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="250" fill="#2d3748" rx="10"/>

  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3182ce"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="100%" stop-color="#c53030"/>
    </linearGradient>
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#805ad5"/>
      <stop offset="100%" stop-color="#6b46c1"/>
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    행렬 곱셈의 규격 조건 (Shape Matching)
  </text>

  <!-- Container for the entire animation -->
  <g transform="translate(0, 80)">
    
    <!-- Left Matrix Block (M x K) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="100, 0; 200, 0; 200, 0; 100, 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.2; 0.8; 1"/>
      <animate attributeName="opacity" values="1; 1; 0; 0; 1" dur="6s" repeatCount="indefinite" keyTimes="0; 0.5; 0.55; 0.9; 1"/>
      <!-- Block body -->
      <path d="M 0 0 L 100 0 L 120 40 L 100 80 L 0 80 Z" fill="url(#gradA)"/>
      <text x="50" y="45" font-family="monospace" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">M × K</text>
    </g>

    <!-- Right Matrix Block (K x N) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="380, 0; 290, 0; 290, 0; 380, 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.2; 0.8; 1"/>
      <animate attributeName="opacity" values="1; 1; 0; 0; 1" dur="6s" repeatCount="indefinite" keyTimes="0; 0.5; 0.55; 0.9; 1"/>
      <!-- Block body (inverse puzzle cut) -->
      <path d="M 0 0 L 100 0 L 100 80 L 0 80 L 20 40 Z" fill="url(#gradB)"/>
      <text x="60" y="45" font-family="monospace" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">K × N</text>
    </g>

    <!-- Match Flash Line in the middle -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.25; 0.3; 0.45; 1"/>
      <!-- The joint line -->
      <path d="M 290 0 L 310 40 L 290 80" fill="none" stroke="#48bb78" stroke-width="6" filter="url(#glowGreen)"/>
      <text x="300" y="-15" font-family="Arial" font-size="20" font-weight="bold" fill="#48bb78" text-anchor="middle" filter="url(#glowGreen)">
        K 일치! (Match)
      </text>
    </g>

    <!-- The Merged Matrix (M x N) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.55; 0.6; 0.9; 1"/>
      <!-- A solid rectangular block that forms after merging -->
      <rect x="200" y="0" width="190" height="80" fill="url(#gradC)" rx="4"/>
      <text x="295" y="45" font-family="monospace" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">M × N</text>
      <text x="295" y="-15" font-family="Arial" font-size="18" font-weight="bold" fill="#d6bcfa" text-anchor="middle">
        새로운 행렬의 탄생!
      </text>
    </g>

  </g>

  <!-- Formula at the bottom -->
  <g transform="translate(300, 220)">
    <text x="-90" y="0" font-family="monospace" font-size="20" font-weight="bold" fill="#63b3ed" text-anchor="middle">(M × K)</text>
    <text x="0" y="0" font-family="monospace" font-size="20" font-weight="bold" fill="#a0aec0" text-anchor="middle">×</text>
    <text x="90" y="0" font-family="monospace" font-size="20" font-weight="bold" fill="#fc8181" text-anchor="middle">(K × N)</text>
    <text x="170" y="0" font-family="monospace" font-size="20" font-weight="bold" fill="#a0aec0" text-anchor="middle">=</text>
    <text x="235" y="0" font-family="monospace" font-size="20" font-weight="bold" fill="#d6bcfa" text-anchor="middle">M × N</text>
  </g>
</svg>
