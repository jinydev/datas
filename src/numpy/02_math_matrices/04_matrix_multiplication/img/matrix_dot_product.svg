<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="100%" stop-color="#1a202c"/>
    </linearGradient>
    <linearGradient id="rowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3182ce"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="colGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="100%" stop-color="#c53030"/>
    </linearGradient>
    <linearGradient id="resGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#805ad5"/>
      <stop offset="100%" stop-color="#6b46c1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bgGrad)" rx="10"/>

  <text x="300" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    행렬 곱셈 아키텍처: 행(Row) × 열(Column) = 내적(Dot Product)
  </text>

  <!-- Matrix A (Target Row1: 1, 2) -->
  <g transform="translate(60, 90)">
    <rect x="-10" y="-10" width="80" height="80" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="4"/>
    <text x="30" y="-20" font-family="Arial" font-size="14" font-weight="bold" fill="#a0aec0" text-anchor="middle">행렬 A</text>
    
    <!-- Row 1 Highlight Background -->
    <rect x="-5" y="0" width="70" height="30" fill="url(#rowGrad)" rx="4" opacity="0">
      <animate attributeName="opacity" values="0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.1; 0.9; 1"/>
    </rect>
    
    <!-- Values -->
    <text x="15" y="20" font-family="monospace" font-size="18" fill="#fff" text-anchor="middle">1</text>
    <text x="45" y="20" font-family="monospace" font-size="18" fill="#fff" text-anchor="middle">2</text>
    <text x="15" y="55" font-family="monospace" font-size="18" fill="#a0aec0" text-anchor="middle">3</text>
    <text x="45" y="55" font-family="monospace" font-size="18" fill="#a0aec0" text-anchor="middle">4</text>
  </g>

  <!-- 곱셈 기호 -->
  <text x="170" y="135" font-family="Arial" font-size="24" font-weight="bold" fill="#4a5568" text-anchor="middle">×</text>

  <!-- Matrix B (Target Col1: 5, 7) -->
  <g transform="translate(200, 90)">
    <rect x="-10" y="-10" width="80" height="80" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="4"/>
    <text x="30" y="-20" font-family="Arial" font-size="14" font-weight="bold" fill="#a0aec0" text-anchor="middle">행렬 B</text>

    <!-- Col 1 Highlight Background -->
    <rect x="0" y="-5" width="30" height="70" fill="url(#colGrad)" rx="4" opacity="0">
      <animate attributeName="opacity" values="0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.1; 0.9; 1"/>
    </rect>

    <!-- Values -->
    <text x="15" y="20" font-family="monospace" font-size="18" fill="#fff" text-anchor="middle">5</text>
    <text x="45" y="20" font-family="monospace" font-size="18" fill="#a0aec0" text-anchor="middle">6</text>
    <text x="15" y="55" font-family="monospace" font-size="18" fill="#fff" text-anchor="middle">7</text>
    <text x="45" y="55" font-family="monospace" font-size="18" fill="#a0aec0" text-anchor="middle">8</text>
  </g>

  <!-- 등호 -->
  <text x="310" y="135" font-family="Arial" font-size="24" font-weight="bold" fill="#4a5568" text-anchor="middle">=</text>

  <!-- 중앙 애니메이션 연산 공간 -->
  <g transform="translate(60, 240)">
    <!-- 중앙으로 모이는 모션 (블루 1, 2) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="15, -130; 100, 0; 100, 0; 100, 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.2; 0.8; 1"/>
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.1; 0.2; 0.8; 0.9; 1"/>
      <rect x="-20" y="-20" width="30" height="30" fill="url(#rowGrad)" rx="4"/>
      <text x="-5" y="2" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle">1</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="45, -130; 250, 0; 250, 0; 250, 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.2; 0.8; 1"/>
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.1; 0.2; 0.8; 0.9; 1"/>
      <rect x="-20" y="-20" width="30" height="30" fill="url(#rowGrad)" rx="4"/>
      <text x="-5" y="2" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle">2</text>
    </g>

    <!-- 중앙으로 모이는 모션 (레드 5, 7) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="155, -130; 140, 0; 140, 0; 140, 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.2; 0.8; 1"/>
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.1; 0.2; 0.8; 0.9; 1"/>
      <rect x="-20" y="-20" width="30" height="30" fill="url(#colGrad)" rx="4"/>
      <text x="-5" y="2" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle">5</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="155, -95; 290, 0; 290, 0; 290, 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.2; 0.8; 1"/>
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.1; 0.2; 0.8; 0.9; 1"/>
      <rect x="-20" y="-20" width="30" height="30" fill="url(#colGrad)" rx="4"/>
      <text x="-5" y="2" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle">7</text>
    </g>

    <!-- 곱셈 기호 팝업 -->
    <text x="115" y="5" font-family="Arial" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.25; 0.3; 0.8; 1"/>
      ×
    </text>
    <text x="265" y="5" font-family="Arial" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.25; 0.3; 0.8; 1"/>
      ×
    </text>

    <!-- 덧셈 기호 팝업 -->
    <text x="195" y="5" font-family="Arial" font-size="24" font-weight="bold" fill="#ecc94b" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.3; 0.4; 0.8; 1"/>
      +
    </text>

    <!-- 중간 계산 결과 텍스트 (5 + 14) -->
    <text x="135" y="45" font-family="monospace" font-size="16" font-weight="bold" fill="#a0aec0" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.35; 0.4; 0.8; 1"/>
      5
    </text>
    <text x="195" y="45" font-family="monospace" font-size="16" font-weight="bold" fill="#a0aec0" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.4; 0.45; 0.8; 1"/>
      +
    </text>
    <text x="285" y="45" font-family="monospace" font-size="16" font-weight="bold" fill="#a0aec0" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.45; 0.5; 0.8; 1"/>
      14
    </text>

    <!-- 화살표 아래로 수렴 -->
    <path d="M195,60 L195,80" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrow)" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.55; 0.6; 0.8; 1"/>
    </path>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#a0aec0" />
      </marker>
    </defs>

    <!-- 최종 결과 (19) 발현 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.65; 0.7; 0.8; 1"/>
      <animateTransform attributeName="transform" type="translate" values="195, 100; 195, 100; 195, 100; 285, -135" dur="6s" repeatCount="indefinite" keyTimes="0; 0.65; 0.7; 0.85"/>
      <circle cx="0" cy="0" r="25" fill="url(#resGrad)" filter="url(#glow)"/>
      <text x="0" y="6" font-family="monospace" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">19</text>
    </g>
  </g>

  <!-- Result Matrix C (Target Output) -->
  <g transform="translate(350, 90)">
    <rect x="-10" y="-10" width="80" height="80" fill="#2d3748" stroke="#6b46c1" stroke-width="2" rx="4"/>
    <text x="30" y="-20" font-family="Arial" font-size="14" font-weight="bold" fill="#d6bcfa" text-anchor="middle">결과 행렬 C</text>
    
    <!-- 19 입주 자리 하이라이트 -->
    <rect x="-5" y="0" width="35" height="30" fill="#44337a" rx="4" opacity="0.5"/>

    <!-- Values -->
    <!-- 19 appears at the end of the loop -->
    <text x="15" y="20" font-family="monospace" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 0" dur="6s" repeatCount="indefinite" keyTimes="0; 0.85; 0.95; 1"/>
      19
    </text>
    <text x="45" y="20" font-family="monospace" font-size="18" fill="#4a5568" text-anchor="middle">22</text>
    <text x="15" y="55" font-family="monospace" font-size="18" fill="#4a5568" text-anchor="middle">43</text>
    <text x="45" y="55" font-family="monospace" font-size="18" fill="#4a5568" text-anchor="middle">50</text>
  </g>

</svg>
