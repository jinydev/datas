<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="200" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">1단계: 거대한 대상 테이블 구축</text>
    
    <text x="140" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">배열 x (3x3 행렬)</text>
    <g transform="translate(80, 100)">
        <rect x="0" y="0" width="120" height="80" rx="4" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
        <path d="M 40 0 L 40 80 M 80 0 L 80 80" stroke="#0284c7" stroke-width="2"/>
        <path d="M 0 26.6 L 120 26.6 M 0 53.3 L 120 53.3" stroke="#0284c7" stroke-width="2"/>
        
        <text x="20" y="18" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">1</text>
        <text x="60" y="18" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">2</text>
        <text x="100" y="18" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">3</text>
        
        <text x="20" y="45" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">4</text>
        <text x="60" y="45" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">5</text>
        <text x="100" y="45" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">6</text>

        <text x="20" y="72" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">7</text>
        <text x="60" y="72" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">8</text>
        <text x="100" y="72" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0369a1" text-anchor="middle">9</text>
    </g>
    
    <text x="350" y="140" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">3행 3열의 촘촘한 2차원 공간이 마련되었습니다.</text>
</svg>
