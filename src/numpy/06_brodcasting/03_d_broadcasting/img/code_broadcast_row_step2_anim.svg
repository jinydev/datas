<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="600" height="200" fill="#f8fafc" rx="10"/>
    <text x="300" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#334155" text-anchor="middle">2단계: 침투할 가로선 배열 준비</text>
    
    <text x="140" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">배열 y (길이 3)</text>
    <g transform="translate(80, 100)">
        <rect x="0" y="0" width="120" height="40" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
        <path d="M 40 0 L 40 40 M 80 0 L 80 40" stroke="#ef4444" stroke-width="3"/>
        <text x="20" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">-1</text>
        <text x="60" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">0</text>
        <text x="100" y="26" font-family="sans-serif" font-size="18" font-weight="bold" fill="#b91c1c" text-anchor="middle">1</text>
        
        <path d="M 0 -10 L 120 -10" stroke="#ef4444" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
        <text x="60" y="-15" font-family="sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">가로 폭(3칸) 일치</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
        </marker>
    </defs>
    
    <text x="300" y="120" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">가로 길이가 딱 맞는 1줄짜리 홀로그램 도장입니다.</text>
    <text x="300" y="145" font-family="sans-serif" font-size="14" font-weight="bold" fill="#475569" text-anchor="start">방금 만든 1단계의 넓은 아파트를 수직 침수시킬 것입니다.</text>
</svg>
