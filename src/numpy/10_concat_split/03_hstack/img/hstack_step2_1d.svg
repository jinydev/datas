<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .boxC { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; rx: 4; }
    .boxD { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">1차원 배열(길이가 다른 리스트)은 무조건 옆으로 붙어 길어짐</text>
  
  <g transform="translate(100, 120)">
    <rect x="-40" y="0" width="100" height="30" class="boxC"/>
    <text x="10" y="20" class="text" fill="#4caf50" text-anchor="middle">1D (길이 3)</text>
  </g>
  <g transform="translate(300, 120)">
    <animateTransform attributeName="transform" type="translate" values="300,120; 165,120; 300,120" dur="3s" repeatCount="indefinite"/>
    <rect x="0" y="0" width="160" height="30" class="boxD"/>
    <text x="80" y="20" class="text" fill="#ff9800" text-anchor="middle">1D (길이 5)</text>
  </g>
  
  <line x1="390" y1="135" x2="480" y2="135" class="arrow"/>
  
  <g transform="translate(520, 120)">
    <path d="M -5 -10 L 265 -10 L 265 40 L -5 40 Z" fill="#fff" stroke="#e91e63" stroke-width="2" stroke-dasharray="4"/>
    <rect x="0" y="0" width="100" height="30" class="boxC"/>
    <text x="50" y="20" class="text" fill="#4caf50" text-anchor="middle">길이 3</text>
    <rect x="100" y="0" width="160" height="30" class="boxD"/>
    <text x="180" y="20" class="text" fill="#ff9800" text-anchor="middle">길이 5</text>
  </g>
</svg>
