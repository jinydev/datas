<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .main-title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 22px; font-weight: bold; fill: #0056b3; }
      .code { font-family: 'Consolas', monospace; font-size: 15px; font-weight: bold; fill: #d63384; }
      .box { rx: 4px; ry: 4px; stroke: #ccc; stroke-width: 2px; }
      .fill-a { fill: #fff3cd; stroke: #ffc107; }
      .fill-b { fill: #d4edda; stroke: #28a745; }
      .arrow { fill: none; stroke: #b0b0b0; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="400" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="main-title" text-anchor="middle">1차원 배열(선형 데이터) 결합 완전 요약도</text>

  <!-- Left: Inputs -->
  <g transform="translate(60, 160)">
    <text x="50" y="-40" class="title" text-anchor="middle" fill="#6c757d">원본 1차원 데이터</text>
    <rect x="0" y="-20" width="100" height="30" class="box fill-a" />
    <text x="50" y="0" class="title" text-anchor="middle">배열 a</text>
    
    <rect x="0" y="30" width="100" height="30" class="box fill-b" />
    <text x="50" y="50" class="title" text-anchor="middle">배열 b</text>
    
    <path d="M 120 20 L 170 20" class="arrow" stroke="#b0b0b0" />
  </g>

  <!-- Branch lines -->
  <path d="M 230 180 L 230 80 L 250 80" class="arrow" stroke="#adb5bd" />
  <path d="M 230 180 L 250 180" class="arrow" stroke="#adb5bd" />
  <path d="M 230 180 L 230 280 L 250 280" class="arrow" stroke="#adb5bd" />

  <!-- Method 1: Row-wise 1D -->
  <g transform="translate(280, 50)">
    <rect x="0" y="0" width="500" height="80" rx="10" ry="10" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2" />
    <text x="20" y="30" class="title">1. 직렬 연결 (1차원 유지)</text>
    <text x="20" y="55" class="code">np.hstack(), np.r_[]</text>

    <!-- Result -->
    <rect x="250" y="25" width="100" height="30" class="box fill-a" />
    <!-- divide -->
    <line x1="283" y1="25" x2="283" y2="55" stroke="#ffc107" />
    <line x1="316" y1="25" x2="316" y2="55" stroke="#ffc107" />

    <rect x="350" y="25" width="100" height="30" class="box fill-b" />
    <line x1="383" y1="25" x2="383" y2="55" stroke="#28a745" />
    <line x1="416" y1="25" x2="416" y2="55" stroke="#28a745" />
    
    <text x="465" y="45" class="title" fill="#0056b3">1D 결과</text>
  </g>

  <!-- Method 2: Stack Row-wise 2D -->
  <g transform="translate(280, 140)">
    <rect x="0" y="0" width="500" height="80" rx="10" ry="10" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2" />
    <text x="20" y="30" class="title">2. 아파트 층수 쌓기 (Row)</text>
    <text x="20" y="55" class="code">np.vstack(), np.row_stack()</text>

    <!-- Result -->
    <rect x="250" y="10" width="150" height="30" class="box fill-a" />
    <line x1="300" y1="10" x2="300" y2="40" stroke="#ffc107" />
    <line x1="350" y1="10" x2="350" y2="40" stroke="#ffc107" />

    <rect x="250" y="40" width="150" height="30" class="box fill-b" />
    <line x1="300" y1="40" x2="300" y2="70" stroke="#28a745" />
    <line x1="350" y1="40" x2="350" y2="70" stroke="#28a745" />
    
    <text x="420" y="45" class="title" fill="#0056b3">2D 행렬 (2층)</text>
  </g>

  <!-- Method 3: Stack Col-wise 2D -->
  <g transform="translate(280, 230)">
    <rect x="0" y="0" width="500" height="150" rx="10" ry="10" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2" />
    <text x="20" y="30" class="title">3. 세로 기둥 세우기 (Column)</text>
    <text x="20" y="55" class="code">np.column_stack(), np.c_[]</text>
    <text x="20" y="80" class="code" fill="#6c757d" font-size="13">※ 1D 데이터를 스마트하게 일으켜 세움</text>

    <!-- Result -->
    <rect x="300" y="10" width="40" height="130" class="box fill-a" />
    <line x1="300" y1="53" x2="340" y2="53" stroke="#ffc107" />
    <line x1="300" y1="96" x2="340" y2="96" stroke="#ffc107" />

    <rect x="340" y="10" width="40" height="130" class="box fill-b" />
    <line x1="340" y1="53" x2="380" y2="53" stroke="#28a745" />
    <line x1="340" y1="96" x2="380" y2="96" stroke="#28a745" />
    
    <text x="400" y="80" class="title" fill="#0056b3">2D 행렬 (2기둥)</text>
  </g>

</svg>
