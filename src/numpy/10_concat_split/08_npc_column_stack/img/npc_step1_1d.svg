<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .code-txt { font-family: 'Consolas', monospace; font-size: 20px; font-weight: bold; fill: #d63384; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .arr-1 { fill: #fff3cd; stroke: #ffc107; }
      .arr-2 { fill: #d4edda; stroke: #28a745; }
      .solid-arrow { fill: none; stroke: #0056b3; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  <text x="425" y="30" class="title" text-anchor="middle">np.c_ (Column-wise) 1차원 기둥 세우기 병합 (column_stack 완벽 호환)</text>

  <!-- Left: Inputs -->
  <g transform="translate(100, 100)">
    <!-- Array A -->
    <rect x="0" y="0" width="100" height="30" class="box arr-1" />
    <path d="M 33 0 L 33 30 M 66 0 L 66 30" stroke="#ffc107" stroke-width="2" />
    <text x="50" y="-10" class="title" font-size="14" text-anchor="middle" fill="#dc3545">배열 a (1차원)</text>
    
    <text x="130" y="20" class="title" font-size="24" text-anchor="middle">,</text>

    <!-- Array B -->
    <rect x="160" y="0" width="100" height="30" class="box arr-2" />
    <path d="M 193 0 L 193 30 M 226 0 L 226 30" stroke="#28a745" stroke-width="2" />
    <text x="210" y="-10" class="title" font-size="14" text-anchor="middle" fill="#dc3545">배열 b (1차원)</text>
  </g>

  <!-- np.c_ Command -->
  <rect x="350" y="70" width="160" height="60" rx="10" ry="10" fill="#f8f9fa" stroke="#0056b3" stroke-width="2" stroke-dasharray="8,4" />
  <text x="430" y="107" class="code-txt" text-anchor="middle">np.c_[a, b]</text>

  <path d="M 380 60 L 210 60 L 210 80" class="solid-arrow" />
  <path d="M 480 60 L 580 60 L 580 80" class="solid-arrow" />
  
  <path d="M 510 100 L 570 100 L 570 100" class="solid-arrow" />
  <polygon points="570,95 585,100 570,105" fill="#0056b3" />

  <!-- Right: Result -->
  <g transform="translate(620, 60)">
    <rect x="0" y="0" width="80" height="90" class="box" fill="#e9ecef" />
    
    <!-- col A -->
    <rect x="0" y="0" width="40" height="90" class="box arr-1" />
    <path d="M 0 30 L 40 30 M 0 60 L 40 60" stroke="#ffc107" stroke-width="2" />
    
    <!-- col B -->
    <rect x="40" y="0" width="40" height="90" class="box arr-2" />
    <path d="M 40 30 L 80 30 M 40 60 L 80 60" stroke="#28a745" stroke-width="2" />
    
    <text x="40" y="-10" class="title" font-size="14" text-anchor="middle" fill="#0056b3">2차원 행렬 결과</text>
    <text x="40" y="120" class="title" font-size="14" text-anchor="middle" fill="#333">각 리스트를 세로 기둥으로!</text>
  </g>
</svg>
