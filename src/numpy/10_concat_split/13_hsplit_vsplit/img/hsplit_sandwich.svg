<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .code-txt { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #d63384; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .bg-bread { fill: #fdf2e9; stroke: #d35400; stroke-width: 3px; stroke-dasharray: 6 3; }
      .arr-x { fill: #e9ECEF; stroke: #adb5bd; stroke-width: 2px; }
      .arr-y { fill: #d4edda; stroke: #28a745; stroke-width: 2px; }
      .knife { stroke: #dc3545; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 6 4; }
      .solid-arrow { fill: none; stroke: #28a745; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="30" class="title" text-anchor="middle">np.hsplit() : 샌드위치 반으로 썰기 (수평 방향, Feature X와 Label y 수직선 좌우 분리)</text>

  <!-- Left: Original Data -->
  <g transform="translate(140, 110)">
    <rect x="-20" y="-30" width="280" height="200" class="bg-bread" />
    <text x="120" y="-10" class="title" fill="#d35400" text-anchor="middle">거대한 식빵 한조각 (병합된 전체 훈련 데이터)</text>

    <!-- Matrix Base -->
    <rect x="0" y="20" width="240" height="100" class="box" />
    <!-- Col dividers -->
    <path d="M 40 20 L 40 120 M 80 20 L 80 120 M 120 20 L 120 120 M 160 20 L 160 120 M 200 20 L 200 120" stroke="#ccc" stroke-width="2" />
    <!-- Row dividers -->
    <path d="M 0 45 L 240 45 M 0 70 L 240 70 M 0 95 L 240 95" stroke="#ccc" stroke-width="1" />
    
    <!-- Knife hitting at index 4 (160) -->
    <path d="M 160 -40 L 160 140" class="knife" />
    <polygon points="155,140 165,140 160,150" fill="#dc3545" />
    <text x="160" y="-50" class="code-txt" fill="#dc3545" text-anchor="middle">수직면 단일 칼질 (hsplit)</text>
  </g>

  <path d="M 430 180 L 500 180 M 490 170 L 500 180 L 490 190" class="solid-arrow" />

  <!-- Right: Split Result -->
  <g transform="translate(530, 110)">
    <!-- X Matrix -->
    <rect x="0" y="20" width="160" height="100" class="arr-x" />
    <!-- Col dividers -->
    <path d="M 40 20 L 40 120 M 80 20 L 80 120 M 120 20 L 120 120" stroke="#ced4da" stroke-width="2" />
    <!-- Row dividers -->
    <path d="M 0 45 L 160 45 M 0 70 L 160 70 M 0 95 L 160 95" stroke="#ced4da" stroke-width="1" />
    <text x="80" y="80" class="title" fill="#6c757d" font-size="24" text-anchor="middle">X</text>
    <text x="80" y="145" class="title" fill="#6c757d" text-anchor="middle">입력 특성(Features)</text>

    <!-- y Matrix -->
    <rect x="180" y="20" width="40" height="100" class="arr-y" />
    <!-- Row dividers -->
    <path d="M 180 45 L 220 45 M 180 70 L 220 70 M 180 95 L 220 95" stroke="#c3e6cb" stroke-width="1" />
    <text x="200" y="80" class="title" fill="#155724" font-size="24" text-anchor="middle">Y</text>
    <text x="200" y="145" class="title" fill="#155724" text-anchor="middle">정답(Label)</text>
  </g>
</svg>
