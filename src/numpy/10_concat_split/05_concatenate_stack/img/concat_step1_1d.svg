<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .boxA { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; rx: 4; }
    .boxB { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2; rx: 4; }
    .boxC { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">concatenate((a,b,c)): 1차원 배열은 나란히 이어 붙음</text>
  
  <g transform="translate(100, 100)">
    <rect x="-40" y="0" width="60" height="40" class="boxA"/>
    <text x="-10" y="25" class="text" fill="#2196f3" text-anchor="middle">a</text>
    <rect x="30" y="0" width="60" height="40" class="boxB"/>
    <text x="60" y="25" class="text" fill="#9c27b0" text-anchor="middle">b</text>
    <rect x="100" y="0" width="60" height="40" class="boxC"/>
    <text x="130" y="25" class="text" fill="#4caf50" text-anchor="middle">c</text>
  </g>
  
  <line x1="320" y1="120" x2="420" y2="120" class="arrow"/>
  
  <g transform="translate(500, 100)">
    <path d="M -50 -10 L 150 -10 L 150 50 L -50 50 Z" fill="#fff" stroke="#e91e63" stroke-width="2" stroke-dasharray="4"/>
    <rect x="-40" y="0" width="60" height="40" class="boxA"/>
    <text x="-10" y="25" class="text" fill="#2196f3" text-anchor="middle">a</text>
    <rect x="20" y="0" width="60" height="40" class="boxB"/>
    <text x="50" y="25" class="text" fill="#9c27b0" text-anchor="middle">b</text>
    <rect x="80" y="0" width="60" height="40" class="boxC"/>
    <text x="110" y="25" class="text" fill="#4caf50" text-anchor="middle">c</text>
  </g>
</svg>
