<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .sheet { fill: #fff; stroke: #2196f3; stroke-width: 2; rx: 2; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #e91e63; stroke-width: 4; stroke-dasharray: 5; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e91e63"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">stack(): 차원의 장벽을 돌파! 2차원 종이를 모아 3차원 책으로 만들기</text>

  <g transform="translate(150, 120)">
    <path d="M 0 30 L 60 10 L 120 30 L 60 50 Z" class="sheet" fill="#e3f2fd"/>
    <text x="60" y="35" class="text" fill="#2196f3" text-anchor="middle">Sheet 1</text>
  </g>
  <g transform="translate(150, 170)">
    <path d="M 0 30 L 60 10 L 120 30 L 60 50 Z" class="sheet" fill="#f3e5f5"/>
    <text x="60" y="35" class="text" fill="#9c27b0" text-anchor="middle">Sheet 2</text>
  </g>

  <path d="M 190 220 C 250 250, 350 250, 420 220" class="arrow" fill="none"/>
  
  <g transform="translate(500, 100)">
    <path d="M 0 50 L 80 20 L 160 50 L 80 80 Z" class="sheet" fill="#f3e5f5"/>
    <path d="M 0 45 L 80 15 L 160 45 L 80 75 Z" class="sheet" fill="#fff"/>
    <path d="M 0 40 L 80 10 L 160 40 L 80 70 Z" class="sheet" fill="#fff"/>
    <path d="M 0 35 L 80 5 L 160 35 L 80 65 Z" class="sheet" fill="#e3f2fd"/>
    <text x="80" y="45" class="text" fill="#2c3e50" text-anchor="middle">3D Book</text>
  </g>
</svg>
