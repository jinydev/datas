<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .box { fill: #fff; stroke: #4caf50; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">stack(x, y, z): 지정된 축(axis) 위치에 새로운 차원(차수)을 하나 창조!</text>
  
  <g transform="translate(100, 100)">
    <rect x="-40" y="0" width="60" height="40" class="box" fill="#e8f5e9"/>
    <text x="-10" y="25" class="text" fill="#4caf50" text-anchor="middle">x(2x3)</text>
    
    <rect x="-40" y="50" width="60" height="40" class="box" fill="#e3f2fd"/>
    <text x="-10" y="75" class="text" fill="#2196f3" text-anchor="middle">y(2x3)</text>
    
    <rect x="-40" y="100" width="60" height="40" class="box" fill="#f3e5f5"/>
    <text x="-10" y="125" class="text" fill="#9c27b0" text-anchor="middle">z(2x3)</text>
  </g>
  
  <line x1="200" y1="140" x2="280" y2="140" class="arrow"/>
  
  <g transform="translate(450, 150)">
     <path d="M -50 -50 Q -70 -50 -70 -30 L -70 50 Q -70 70 -50 70 L 50 70 Q 70 70 70 50 L 70 -30 Q 70 -50 50 -50 Z" fill="#fff" stroke="#e91e63" stroke-width="2" stroke-dasharray="4"/>
    
    <!-- 3D effect -->
    <path d="M 0 -20 L 40 -40 L 100 -40 L 60 -20 Z" class="box" fill="#f3e5f5" stroke="#9c27b0"/>
    <path d="M 0 -10 L 40 -30 L 100 -30 L 60 -10 Z" class="box" fill="#e3f2fd" stroke="#2196f3"/>
    <path d="M 0 0 L 40 -20 L 100 -20 L 60 0 Z" class="box" fill="#e8f5e9" stroke="#4caf50"/>
    <rect x="0" y="0" width="60" height="40" class="box" fill="#e8f5e9" stroke="#4caf50"/>
    
    <text x="30" y="25" class="text" fill="#4caf50" text-anchor="middle">x</text>
    <text x="50" y="-5" class="text" fill="#2196f3" text-anchor="middle">y</text>
    <text x="70" y="-25" class="text" fill="#9c27b0" text-anchor="middle">z</text>

    <text x="140" y="10" class="text" fill="#e91e63">결과: (3, 2, 3) 입체형상</text>
  </g>
</svg>
