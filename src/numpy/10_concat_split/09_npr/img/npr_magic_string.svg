<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Times New Roman', serif; font-size: 24px; font-weight: bold; fill: #333; }
      .label { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #333; }
      .code { font-family: 'Consolas', monospace; font-size: 26px; fill: #d63384; font-weight: bold; }
      .desc { font-family: 'Arial', sans-serif; font-size: 14px; fill: #6c757d; }
      .box { rx: 5px; ry: 5px; stroke-width: 2px; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  
  <text x="425" y="40" class="title" text-anchor="middle" fill="#9b59b6">The Dark Magic: np.r_ String Directives</text>

  <!-- Code Block -->
  <rect x="50" y="70" width="750" height="70" fill="#f8f9fa" stroke="#ccc" class="box" />
  
  <text x="70" y="115" class="code" fill="#333">np.r_[</text>
  <text x="180" y="115" class="code" fill="#e74c3c">'0, 3, 1'</text>
  <text x="320" y="115" class="code" fill="#333">, [1, 2, 3], [4, 5, 6] ]</text>

  <!-- Pointers & Explanations -->
  
  <!-- '0': axis=0 -->
  <g transform="translate(195, 140)">
    <line x1="0" y1="0" x2="-30" y2="40" stroke="#e74c3c" stroke-width="2" />
    <circle cx="0" cy="0" r="4" fill="#e74c3c" />
    <rect x="-80" y="40" width="120" height="60" fill="#fdf2e9" stroke="#e74c3c" class="box" />
    <text x="-20" y="65" class="label" fill="#e74c3c" text-anchor="middle">Axis = 0</text>
    <text x="-20" y="85" class="desc" text-anchor="middle">쌓을 축 방향 (결합축)</text>
  </g>

  <!-- '3': min dims=3 -->
  <g transform="translate(230, 140)">
    <line x1="0" y1="0" x2="-10" y2="100" stroke="#0056b3" stroke-width="2" />
    <circle cx="0" cy="0" r="4" fill="#0056b3" />
    <rect x="-80" y="100" width="150" height="60" fill="#e3f2fd" stroke="#0056b3" class="box" />
    <text x="-5" y="125" class="label" fill="#0056b3" text-anchor="middle">Min Dims = 3</text>
    <text x="-5" y="145" class="desc" text-anchor="middle">3차원으로 강제 뻥튀기</text>
  </g>

  <!-- '1': shape extension position -->
  <g transform="translate(270, 140)">
    <line x1="0" y1="0" x2="30" y2="40" stroke="#198754" stroke-width="2" />
    <circle cx="0" cy="0" r="4" fill="#198754" />
    <rect x="-50" y="40" width="200" height="60" fill="#e8f5e9" stroke="#198754" class="box" />
    <text x="50" y="65" class="label" fill="#198754" text-anchor="middle">Original Shape Index = 1</text>
    <text x="50" y="85" class="desc" text-anchor="middle">원래 길이(3)가 배치될 축 인덱스</text>
  </g>

  <!-- How The Shape Transforms -->
  <g transform="translate(480, 160)">
    <rect x="0" y="0" width="330" height="110" fill="#fff3cd" stroke="#ffc107" class="box" />
    <text x="165" y="25" class="label" fill="#d35400" text-anchor="middle">결과 작동 원리: [1, 2, 3] 의 변신</text>
    <text x="15" y="50" class="desc" fill="#333" font-weight="bold">1. 원래 크기: (3, )</text>
    <!-- Axis 1 is length 3, and we inflate to 3D. 
         Remaining axes prepend 1s. So (1, 3) then (1, 3, 1)?
         Wait. The doc says: "부풀린 차원 중에서, 원래 데이터(모양)가 존재해야 할 축의 위치 인덱스"
         So the 3 goes into axis 1. And the rest are 1s to make it 3D.
         Resulting shape for one array: (1, 3, 1) ! -->
    <text x="15" y="72" class="desc" fill="#333" font-weight="bold">2. 인덱스 1번에 길이 3 배치, 나머진 1로 채움</text>
    <text x="15" y="94" class="desc" fill="#333" font-weight="bold">3. 부풀려진 크기: <tspan fill="#e74c3c">(1, 3, 1)</tspan></text>
  </g>

</svg>
