<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 18px; font-weight: bold; }
    .code { font-family: 'Consolas', monospace; font-size: 20px; fill: #d63384; }
    .box { fill: #fff; stroke: #e2e8f0; stroke-width: 2; rx: 8; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .err-msg { fill: #dc3545; font-size: 16px; font-weight: bold; }
    .ok-msg { fill: #198754; font-size: 16px; font-weight: bold; }
  </style>

  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">주의! 1차원 데이터일 때 hstack vs column_stack 결과는 극과 극!</text>

  <!-- hstack Way -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="280" height="120" class="box"/>
    <text x="140" y="35" class="text" fill="#00bcd4" text-anchor="middle">np.hstack((x, y))</text>
    <text x="140" y="70" class="code" text-anchor="middle">[ 1  2  3 10 20 30]</text>
    <text x="140" y="100" class="err-msg" text-anchor="middle">→ 1차원 배열로 옆으로 쭉 길어짐</text>
  </g>

  <!-- colstack Way -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="280" height="120" class="box"/>
    <text x="140" y="35" class="text" fill="#198754" text-anchor="middle">np.column_stack((x, y))</text>
    <text x="140" y="70" class="code" text-anchor="middle">[[ 1 10] [ 2 20] [ 3 30]]</text>
    <text x="140" y="100" class="ok-msg" text-anchor="middle">→ 2차원 배열(열)로 각각 세워짐</text>
  </g>
</svg>
