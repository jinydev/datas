<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .boxX { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; rx: 4; }
    .boxY { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">column_stack: 1차원 배열을 세워서 컬럼(기둥)으로 만듦!</text>
  
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="100" height="30" class="boxX"/>
    <text x="50" y="20" class="text" fill="#2196f3" text-anchor="middle">x [1 2 3]</text>

    <rect x="0" y="50" width="100" height="30" class="boxY"/>
    <text x="50" y="70" class="text" fill="#9c27b0" text-anchor="middle">y [10 20 30]</text>
  </g>

  <g transform="translate(190, 140)">
    <line x1="0" y1="0" x2="40" y2="0" class="arrow"/>
  </g>

  <g transform="translate(270, 70)">
    <rect x="0" y="0" width="30" height="100" class="boxX"/>
    <text x="15" y="30" class="text" fill="#2196f3" text-anchor="middle">1</text>
    <text x="15" y="60" class="text" fill="#2196f3" text-anchor="middle">2</text>
    <text x="15" y="90" class="text" fill="#2196f3" text-anchor="middle">3</text>

    <g transform="translate(60, 0)">
      <animateTransform attributeName="transform" type="translate" values="60,0; 30,0; 60,0" dur="2s" repeatCount="indefinite"/>
      <rect x="0" y="0" width="30" height="100" class="boxY"/>
      <text x="15" y="30" class="text" fill="#9c27b0" text-anchor="middle">10</text>
      <text x="15" y="60" class="text" fill="#9c27b0" text-anchor="middle">20</text>
      <text x="15" y="90" class="text" fill="#9c27b0" text-anchor="middle">30</text>
    </g>
  </g>
  
  <g transform="translate(420, 140)">
    <line x1="0" y1="0" x2="60" y2="0" class="arrow"/>
  </g>

  <g transform="translate(540, 70)">
     <path d="M -10 -10 Q -20 -10 -20 0 L -20 110 Q -20 120 -10 120 L 70 120 Q 80 120 80 110 L 80 0 Q 80 -10 70 -10 Z" fill="#fff" stroke="#e91e63" stroke-width="2" stroke-dasharray="4"/>
    
    <rect x="-10" y="0" width="30" height="100" class="boxX"/>
    <text x="5" y="30" class="text" fill="#2196f3" text-anchor="middle">1</text>
    <text x="5" y="60" class="text" fill="#2196f3" text-anchor="middle">2</text>
    <text x="5" y="90" class="text" fill="#2196f3" text-anchor="middle">3</text>

    <rect x="20" y="0" width="50" height="100" class="boxY"/>
    <text x="45" y="30" class="text" fill="#9c27b0" text-anchor="middle">10</text>
    <text x="45" y="60" class="text" fill="#9c27b0" text-anchor="middle">20</text>
    <text x="45" y="90" class="text" fill="#9c27b0" text-anchor="middle">30</text>

    <text x="30" y="145" class="text" fill="#e91e63" text-anchor="middle">결과: (3x2) 2차원 배열!</text>
  </g>
</svg>
