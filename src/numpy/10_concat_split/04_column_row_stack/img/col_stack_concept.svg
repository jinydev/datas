<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 250" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; fill: #555; }
      .box { rx: 5px; ry: 5px; stroke-width: 2px; }
      .arr-1d { fill: #f8d7da; stroke: #dc3545; }
      .arr-2d { fill: #cff4fc; stroke: #0dcaf0; }
      .cell-text { font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; fill: #333; }
      .grid-line { stroke: #fff; stroke-width: 2px; }
      .arrow { fill: none; stroke: #ffc107; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="250" fill="#fcfcfc" rx="10" ry="10" />

  <!-- 1D Array -->
  <g transform="translate(50, 100)">
    <text x="120" y="-30" class="title" text-anchor="middle">1차원 리스트 (단순 스칼라 배열)</text>
    <text x="120" y="-10" class="label" text-anchor="middle">Shape: (3, ) 납작한 선행태</text>
    <rect x="0" y="10" width="240" height="50" class="box arr-1d" />
    <line x1="80" y1="10" x2="80" y2="60" class="grid-line" />
    <line x1="160" y1="10" x2="160" y2="60" class="grid-line" />
    <text x="40" y="35" class="cell-text">170</text>
    <text x="120" y="35" class="cell-text">180</text>
    <text x="200" y="35" class="cell-text">160</text>
    <!-- Label for feature -->
    <text x="120" y="80" class="label" text-anchor="middle" fill="#dc3545">파편화된 특성(Feature) 데이터</text>
  </g>

  <!-- Arrow -->
  <path d="M 320 135 L 430 135 M 420 125 L 430 135 L 420 145" class="arrow" />
  <text x="375" y="105" class="title" text-anchor="middle" fill="#d63384">column_stack()</text>
  <text x="375" y="125" class="label" text-anchor="middle" fill="#555">차원 승급 (Promotion)</text>

  <!-- 2D Column Vector -->
  <g transform="translate(480, 40)">
    <text x="50" y="-15" class="title" text-anchor="middle">2차원 열 벡터 (Column Vector)</text>
    <text x="50" y="5" class="label" text-anchor="middle">Shape: (3, 1) 기둥형 텐서</text>
    <rect x="10" y="20" width="80" height="150" class="box arr-2d" />
    <line x1="10" y1="70" x2="90" y2="70" class="grid-line" />
    <line x1="10" y1="120" x2="90" y2="120" class="grid-line" />
    <text x="50" y="45" class="cell-text">170</text>
    <text x="50" y="95" class="cell-text">180</text>
    <text x="50" y="145" class="cell-text">160</text>
    <!-- Label for feature -->
    <text x="50" y="190" class="label" text-anchor="middle" fill="#0dcaf0">데이터프레임의 '새로운 열(Column)'</text>
  </g>

  <!-- Plus Table -->
  <g transform="translate(680, 95)">
    <text x="40" y="-20" class="title" text-anchor="middle">결과</text>
    <text x="40" y="0" class="label" text-anchor="middle">표의 우측에 합체!</text>
    <path d="M -15 35 L 0 35 M -5 25 L 0 35 L -5 45" class="arrow" stroke="#999" />
    <rect x="20" y="15" width="30" height="50" fill="#e2e3e5" rx="3" />
    <rect x="55" y="15" width="30" height="50" fill="#e2e3e5" rx="3" />
    <rect x="90" y="15" width="20" height="50" fill="#cff4fc" rx="2" stroke="#0dcaf0" stroke-width="1.5"/>
  </g>
</svg>
