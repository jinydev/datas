<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 250" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 14px; fill: #555; }
      .box { rx: 5px; ry: 5px; stroke-width: 2px; }
      .table-base { fill: #e2e3e5; stroke: #6c757d; }
      .table-new { fill: #cff4fc; stroke: #0dcaf0; }
      .cell-text { font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; fill: #333; }
      .grid-line { stroke: #fff; stroke-width: 2px; }
      .arrow { fill: none; stroke: #ffc107; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="250" fill="#f8f9fa" rx="10" ry="10" />

  <!-- Base 2D array -->
  <g transform="translate(60, 60)">
    <text x="60" y="-15" class="title" text-anchor="middle">기존 2차원 표 (성적표)</text>
    <text x="60" y="-35" class="label" text-anchor="middle">Shape: (3, 2)</text>
    <rect x="0" y="0" width="120" height="150" class="box table-base" />
    <line x1="60" y1="0" x2="60" y2="150" class="grid-line" />
    <line x1="0" y1="50" x2="120" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="120" y2="100" class="grid-line" />
    <text x="30" y="25" class="cell-text">80</text><text x="90" y="25" class="cell-text">90</text>
    <text x="30" y="75" class="cell-text">70</text><text x="90" y="75" class="cell-text">85</text>
    <text x="30" y="125" class="cell-text">95</text><text x="90" y="125" class="cell-text">99</text>
  </g>

  <!-- Plus sign -->
  <text x="210" y="145" class="title" text-anchor="middle" font-size="30">+</text>

  <!-- New 1D array -->
  <g transform="translate(240, 60)">
    <text x="75" y="-15" class="title" text-anchor="middle">1차원 리스트 (출석점수)</text>
    <text x="75" y="-35" class="label" text-anchor="middle">Shape: (3,)</text>
    <rect x="0" y="55" width="150" height="40" class="box table-new" />
    <line x1="50" y1="55" x2="50" y2="95" class="grid-line" />
    <line x1="100" y1="55" x2="100" y2="95" class="grid-line" />
    <text x="25" y="75" class="cell-text">10</text>
    <text x="75" y="75" class="cell-text">8</text>
    <text x="125" y="75" class="cell-text">10</text>
  </g>

  <!-- Arrow -->
  <path d="M 410 135 L 490 135 M 480 125 L 490 135 L 480 145" class="arrow" />
  <text x="450" y="115" class="title" text-anchor="middle" fill="#d63384">column_stack</text>

  <!-- Result Array -->
  <g transform="translate(530, 60)">
    <text x="90" y="-15" class="title" text-anchor="middle">새로운 2차원 표 완성!</text>
    <text x="90" y="-35" class="label" text-anchor="middle">Shape: (3, 3)</text>
    
    <!-- Base part -->
    <rect x="0" y="0" width="120" height="150" class="box table-base" />
    <line x1="60" y1="0" x2="60" y2="150" class="grid-line" />
    <line x1="0" y1="50" x2="180" y2="50" class="grid-line" />
    <line x1="0" y1="100" x2="180" y2="100" class="grid-line" />
    <text x="30" y="25" class="cell-text">80</text><text x="90" y="25" class="cell-text">90</text>
    <text x="30" y="75" class="cell-text">70</text><text x="90" y="75" class="cell-text">85</text>
    <text x="30" y="125" class="cell-text">95</text><text x="90" y="125" class="cell-text">99</text>

    <!-- Appended part -->
    <rect x="120" y="0" width="60" height="150" class="box table-new" />
    <text x="150" y="25" class="cell-text">10</text>
    <text x="150" y="75" class="cell-text">8</text>
    <text x="150" y="125" class="cell-text">10</text>
  </g>
</svg>
