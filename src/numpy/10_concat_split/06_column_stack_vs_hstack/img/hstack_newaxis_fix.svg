<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <style>
    .text { font-family: 'Pretendard', sans-serif; font-size: 16px; font-weight: bold; }
    .boxA { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; rx: 4; }
    .boxC { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; rx: 4; }
    .title { font-size: 24px; font-weight: 800; fill: #2c3e50; text-anchor: middle; }
    .arrow { stroke: #cbd5e1; stroke-width: 4; marker-end: url(#arrowhead); }
    .info { font-size: 14px; fill: #64748b; font-weight: normal; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc" rx="15"/>
  <text x="400" y="40" class="title">해결법 1: hstack을 쓰려면 억지로 기둥(2차원)으로 만들기</text>

  <!-- step 1 -->
  <g transform="translate(80, 100)">
    <rect x="0" y="30" width="80" height="20" class="boxC"/>
    <text x="40" y="45" class="text" fill="#ff9800" text-anchor="middle">c (3, )</text>
  </g>

  <g transform="translate(180, 140)">
    <line x1="0" y1="0" x2="40" y2="0" class="arrow"/>
    <text x="20" y="-10" class="info">np.newaxis</text>
  </g>

  <!-- step 2 -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="20" height="80" class="boxC" stroke-dasharray="2"/>
    <text x="10" y="45" class="text" fill="#ff9800" text-anchor="middle">c</text>
    <text x="10" y="100" class="info">(3, 1)</text>
  </g>
  
  <g transform="translate(320, 140)">
    <line x1="0" y1="0" x2="40" y2="0" class="arrow"/>
    <text x="20" y="-10" class="info">hstack</text>
  </g>

  <!-- step 3 -->
  <g transform="translate(420, 100)">
    <rect x="-80" y="0" width="80" height="80" class="boxA"/>
    <text x="-40" y="45" class="text" fill="#2196f3" text-anchor="middle">a (3x4)</text>
    
    <g transform="translate(20, 0)">
      <animateTransform attributeName="transform" type="translate" values="20,0; 0,0; 20,0" dur="2s" repeatCount="indefinite"/>
      <rect x="0" y="0" width="20" height="80" class="boxC"/>
      <text x="10" y="45" class="text" fill="#ff9800" text-anchor="middle">c</text>
    </g>
  </g>
  
  <g transform="translate(620, 100)">
    <rect x="-80" y="0" width="80" height="80" class="boxA"/>
    <text x="-40" y="45" class="text" fill="#2196f3" text-anchor="middle">a</text>
    <rect x="0" y="0" width="20" height="80" class="boxC"/>
    <text x="10" y="45" class="text" fill="#ff9800" text-anchor="middle">c</text>
    <text x="-30" y="100" class="text" fill="#e91e63">최종 (3x5)</text>
  </g>
</svg>
