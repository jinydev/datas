<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .fill-gray { fill: #e9ecef; }
      .arr-1 { fill: #fff3cd; stroke: #ffc107; }
      .arr-2 { fill: #cce5ff; stroke: #0056b3; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  
  <text x="425" y="30" class="title" text-anchor="middle">vstack / row_stack 의 파이썬 실무 데이터 100% 동일 적층 결합</text>

  <!-- Base 3x4 Matrix (12 boxes) -->
  <g transform="translate(150, 70)">
    <text x="60" y="-10" class="title" font-size="16" text-anchor="middle">배열 a (3x4)</text>
    <rect x="0" y="0" width="120" height="90" class="box fill-gray" />
    <!-- Vertical lines -->
    <line x1="30" y1="0" x2="30" y2="90" stroke="#ccc" />
    <line x1="60" y1="0" x2="60" y2="90" stroke="#ccc" />
    <line x1="90" y1="0" x2="90" y2="90" stroke="#ccc" />
    <!-- Horizontal lines -->
    <line x1="0" y1="30" x2="120" y2="30" stroke="#ccc" />
    <line x1="0" y1="60" x2="120" y2="60" stroke="#ccc" />
    <text x="60" y="50" class="desc" text-anchor="middle" fill="#000">1 ~ 12</text>
  </g>

  <!-- 1D array length 4 -->
  <g transform="translate(150, 200)">
    <text x="-40" y="20" class="title" font-size="16" text-anchor="middle" fill="#dc3545">배열 b (4,)</text>
    <rect x="0" y="0" width="120" height="30" class="box arr-1" />
    <!-- Vertical lines -->
    <line x1="30" y1="0" x2="30" y2="30" stroke="#ffc107" />
    <line x1="60" y1="0" x2="60" y2="30" stroke="#ffc107" />
    <line x1="90" y1="0" x2="90" y2="30" stroke="#ffc107" />
    <text x="60" y="20" class="desc" text-anchor="middle" fill="#000">1 ~ 4</text>
  </g>

  <!-- Combine Result Right -->
  <g transform="translate(500, 70)">
    <path d="M -150 70 L -60 70 M -70 60 L -60 70 L -70 80" stroke="#b0b0b0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="-105" y="60" class="title" font-size="14" text-anchor="middle" fill="#007bff">np.vstack((a,b))</text>
    <text x="-105" y="95" class="title" font-size="14" text-anchor="middle" fill="#007bff">np.row_stack((a,b))</text>

    <text x="60" y="-10" class="title" font-size="16" text-anchor="middle" fill="#28a745">결합 결과 (4x4 Matrix)</text>
    
    <rect x="0" y="0" width="120" height="90" class="box fill-gray" />
    <!-- Vertical lines -->
    <line x1="30" y1="0" x2="30" y2="90" stroke="#ccc" />
    <line x1="60" y1="0" x2="60" y2="90" stroke="#ccc" />
    <line x1="90" y1="0" x2="90" y2="90" stroke="#ccc" />
    <!-- Horizontal lines -->
    <line x1="0" y1="30" x2="120" y2="30" stroke="#ccc" />
    <line x1="0" y1="60" x2="120" y2="60" stroke="#ccc" />
    
    <!-- Bottom combined -->
    <rect x="0" y="90" width="120" height="30" class="box arr-2" stroke-dasharray="4,2"/>
    <line x1="30" y1="90" x2="30" y2="120" stroke="#0056b3" stroke-dasharray="2,2"/>
    <line x1="60" y1="90" x2="60" y2="120" stroke="#0056b3" stroke-dasharray="2,2"/>
    <line x1="90" y1="90" x2="90" y2="120" stroke="#0056b3" stroke-dasharray="2,2"/>
    <text x="60" y="112" class="desc" text-anchor="middle" fill="#0056b3">1 ~ 4 적층</text>
  </g>
</svg>
