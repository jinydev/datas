<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 16px; font-weight: bold; }
      .box { rx: 5px; ry: 5px; fill: #fcfcfc; stroke: #ccc; stroke-width: 2px; }
      .fill-gray { fill: #e9ecef; }
      .ok-box { fill: #e2e3e5; stroke: #adb5bd; stroke-width: 3px; }
      .arr-1 { fill: #fff3cd; stroke: #ffc107; }
      .arr-2 { fill: #d4edda; stroke: #28a745; }
      .check { stroke: #28a745; stroke-width: 8; stroke-linecap: round; fill:none; }
      .arrow { fill: none; stroke: #b0b0b0; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .dash-arrow { fill: none; stroke: #28a745; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 4; }
      .solid-arrow { fill: none; stroke: #28a745; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="850" height="300" fill="#fff" rx="10" ry="10" />
  
  <text x="425" y="30" class="title" text-anchor="middle">vstack과 row_stack의 공통 1D 자동 처리 원리</text>

  <!-- Diagram Background Area -->
  <rect x="50" y="60" width="750" height="210" class="ok-box" fill-opacity="0.1" stroke-dasharray="10,5" />
  
  <text x="425" y="90" class="desc" text-anchor="middle" fill="#0056b3">✨ 둘 다 1D 배열을 2D '행 벡터(Row Vector)' 층으로 자동 승격! ✨</text>

  <g transform="translate(100, 120)">
    <!-- 2D Matrix 1 -->
    <rect x="0" y="0" width="100" height="60" class="box fill-gray" />
    <path d="M 0 30 L 100 30 M 50 0 L 50 60" stroke="#ccc" stroke-width="2" />
    <text x="50" y="85" class="title" font-size="14" text-anchor="middle" fill="#555">2차원 행렬(면)</text>
    
    <text x="140" y="40" class="title" font-size="24" text-anchor="middle">+</text>

    <!-- 1D Array (Flat) -->
    <rect x="170" y="15" width="45" height="30" class="box arr-1" />
    <rect x="215" y="15" width="45" height="30" class="box arr-1" />
    <text x="215" y="85" class="title" font-size="14" text-anchor="middle" fill="#dc3545">1차원 원형(선)</text>
    
    <!-- Promotion Path -->
    <path d="M 240 10 Q 255 -5 275 15" class="dash-arrow" />
    <path d="M 265 5 L 275 15 L 285 5" class="dash-arrow" stroke-dasharray="none" />
    <text x="260" y="0" class="title" font-size="12" text-anchor="middle" fill="#28a745">1xN 승격</text>
    
    <!-- Promoted 2D Row Vector -->
    <rect x="290" y="15" width="80" height="30" class="box arr-2" />
    <path d="M 330 15 L 330 45" stroke="#28a745" stroke-width="2" />
    <text x="330" y="85" class="title" font-size="14" text-anchor="middle" fill="#28a745">2D 행 벡터(판막)</text>

    <!-- Combine result arrow -->
    <path d="M 400 30 L 460 30 M 450 20 L 460 30 L 450 40" class="solid-arrow" />
    <text x="430" y="20" class="title" font-size="12" text-anchor="middle" fill="#28a745">수직 병합</text>
    
    <!-- Result -->
    <g transform="translate(490, -10)">
      <rect x="0" y="0" width="100" height="60" class="box fill-gray" />
      <path d="M 0 30 L 100 30 M 50 0 L 50 60" stroke="#ccc" stroke-width="2" />
      
      <rect x="0" y="60" width="100" height="30" class="box arr-2" stroke-dasharray="4,2" />
      <path d="M 50 60 L 50 90" stroke="#28a745" stroke-width="2" stroke-dasharray="4,2" />
      
      <path d="M 120 40 L 135 60 L 155 25" class="check" />
      <text x="50" y="115" class="title" font-size="14" text-anchor="middle" fill="#28a745">완벽하게 동일한 결과!</text>
    </g>
  </g>
</svg>
