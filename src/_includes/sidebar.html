<aside class="docs-nav-sidebar offcanvas-md offcanvas-start" tabindex="-1" id="sidebarMenu"
    aria-labelledby="sidebarMenuLabel">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title" id="sidebarMenuLabel">Lecture Notes</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"
            data-bs-target="#sidebarMenu"></button>
    </div>
    <div class="offcanvas-body pt-0">
        <div class="list-group list-group-flush w-100" id="sidebarnav">
            <!-- Header -->
            <div class="list-group-item border-0 bg-transparent ps-3 pt-4 pb-2">
                <h5 class="heading mb-0">Lecture Notes</h5>
            </div>

            {% for item in site.data.navigation.main %}
            {% if item.children %}
            <!-- Item with Submenu -->
            <div class="list-group-item border-0 p-0">
                <a class="list-group-item-action d-flex align-items-center justify-content-between p-3 border-bottom"
                    data-bs-toggle="collapse" href="#menu-{{ forloop.index }}" role="button" aria-expanded="false"
                    aria-controls="menu-{{ forloop.index }}">
                    <span class="fw-medium text-dark">{{ item.title }}</span>
                    <i class="bi bi-chevron-right transition-icon"></i>
                </a>
                <div class="collapse" id="menu-{{ forloop.index }}" data-bs-parent="#sidebarnav">
                    <div class="list-group list-group-flush ms-3 border-start">
                        {% for child in item.children %}
                        <a href="{{ site.baseurl }}{{ child.url }}"
                            class="list-group-item list-group-item-action border-0 ps-3 py-2 {% if page.url == child.url %}active{% endif %}">
                            {{ child.title }}
                        </a>
                        {% endfor %}
                    </div>
                </div>
            </div>
            {% else %}
            <!-- Standard Item -->
            <a href="{{ site.baseurl }}{{ item.url }}"
                class="list-group-item list-group-item-action border-bottom p-3 {% if page.url == item.url %}active fw-bold text-primary{% else %}text-dark{% endif %}">
                {{ item.title }}
            </a>
            {% endif %}
            {% endfor %}
        </div>
    </div>
</aside>
