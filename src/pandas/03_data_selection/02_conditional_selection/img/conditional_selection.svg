<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">조건식을 이용한 데이터 필터링 과정 (Boolean Indexing)</text>

  <!-- 원본 DataFrame (전체 학생 집합) -->
  <g transform="translate(60, 80)">
    <rect x="-30" y="0" width="220" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-width="2"/>
    <text x="80" y="-15" font-family="monospace" font-size="14" fill="#607D8B" font-weight="bold" text-anchor="middle">원본 표 (pf)</text>
    
    <!-- 컬럼명 바 -->
    <rect x="30" y="0" width="160" height="30" fill="#ECEFF1" rx="3" stroke="#CFD8DC" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#455A64" font-weight="bold" text-anchor="middle">중간</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#455A64" font-weight="bold" text-anchor="middle">기말</text>
    <text x="140" y="20" font-family="sans-serif" font-size="11" fill="#455A64" font-weight="bold" text-anchor="middle">과제</text>
    <text x="175" y="20" font-family="sans-serif" font-size="11" fill="#455A64" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 바 (사람 이름) -->
    <rect x="-30" y="30" width="60" height="150" fill="#FFF3E0" rx="3" stroke="#FFE0B2" stroke-width="1"/>
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="85" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="115" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="0" y="145" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="0" y="175" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 데이터 영역 -->
    <!-- 통과하는 행: 윤일형(25), 신수빈(22) -->
    <rect x="-30" y="40" width="220" height="25" fill="#E8F5E9" opacity="0.7"/>
    <text x="60" y="55" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">25</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="140" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="175" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">18</text>

    <!-- 강수희 (18) -->
    <text x="60" y="85" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">18</text>
    <text x="100" y="85" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">27</text>
    <text x="140" y="85" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">10</text>
    <text x="175" y="85" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">20</text>

    <!-- 홍소희 (17) -->
    <text x="60" y="115" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">17</text>
    <text x="100" y="115" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">17</text>
    <text x="140" y="115" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">10</text>
    <text x="175" y="115" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">19</text>

    <!-- 유한빈 (12) -->
    <text x="60" y="145" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">12</text>
    <text x="100" y="145" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">22</text>
    <text x="140" y="145" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">9</text>
    <text x="175" y="145" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle">20</text>

    <!-- 신수빈 (22) -->
    <rect x="-30" y="160" width="220" height="25" fill="#E8F5E9" opacity="0.7"/>
    <text x="60" y="175" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">22</text>
    <text x="100" y="175" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">34</text>
    <text x="140" y="175" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="175" y="175" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">16</text>
  </g>

  <!-- 거름망 (조건 필터) -->
  <g transform="translate(300, 150)">
    <rect x="-10" y="-35" width="100" height="40" fill="#E8F5E9" rx="5" stroke="#4CAF50" stroke-width="2"/>
    <text x="40" y="-10" font-family="monospace" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">중간 &gt; 20</text>
    
    <path d="M 90 -15 L 120 -15" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="115,-22 125,-15 115,-8" fill="#4CAF50" />
    <text x="40" y="25" font-family="sans-serif" font-size="12" fill="#388E3C" font-weight="bold" text-anchor="middle">체 필터링!</text>
  </g>

  <!-- 필터링된 결과물 -->
  <g transform="translate(460, 120)">
    <rect x="-30" y="0" width="220" height="90" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    <text x="80" y="-15" font-family="monospace" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">Subset (조건 만족 행)</text>
    
    <!-- 컬럼명 바 -->
    <rect x="30" y="0" width="160" height="30" fill="#E8F5E9" rx="3" stroke="#A5D6A7" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">중간</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">기말</text>
    <text x="140" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">과제</text>
    <text x="175" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 바 (윤일형, 신수빈만 남음) -->
    <rect x="-30" y="30" width="60" height="60" fill="#FFE0B2" rx="3" />
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="80" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 데이터 -->
    <text x="60" y="55" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">25</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="140" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="175" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">18</text>

    <text x="60" y="80" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">22</text>
    <text x="100" y="80" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">34</text>
    <text x="140" y="80" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="175" y="80" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">16</text>
  </g>

</svg>
