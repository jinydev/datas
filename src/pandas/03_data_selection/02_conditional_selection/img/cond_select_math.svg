<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">관계 대수학의 선택(Selection, σ) 연산</text>

  <!-- Left: Original Tuple Set -->
  <text x="140" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">전체 튜플 집합 (R)</text>

  <g transform="translate(60, 85)">
    <rect x="0" y="0" width="160" height="135" fill="#fff" stroke="#90a4ae" stroke-width="2" rx="4"/>
    
    <!-- Rows -->
    <rect x="5" y="5" width="150" height="20" fill="#e3f2fd" rx="2"/>
    <text x="80" y="19" font-family="Courier New, monospace" font-size="12" fill="#1565c0" text-anchor="middle">t1: [ 1, 2, 3 ]</text>
    
    <rect x="5" y="30" width="150" height="20" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2" stroke-dasharray="2,2"/>
    <text x="80" y="44" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#c62828" text-anchor="middle">t2: [ 10, 20, 30 ]</text>
    <circle cx="15" cy="40" r="4" fill="#f44336"/>

    <rect x="5" y="55" width="150" height="20" fill="#e3f2fd" rx="2"/>
    <text x="80" y="69" font-family="Courier New, monospace" font-size="12" fill="#1565c0" text-anchor="middle">t3: [ 4, 5, 6 ]</text>

    <rect x="5" y="80" width="150" height="20" fill="#ffebee" stroke="#f44336" stroke-width="1" rx="2" stroke-dasharray="2,2"/>
    <text x="80" y="94" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#c62828" text-anchor="middle">t4: [ 11, 22, 33 ]</text>
    <circle cx="15" cy="90" r="4" fill="#f44336"/>

    <rect x="5" y="105" width="150" height="20" fill="#e3f2fd" rx="2"/>
    <text x="80" y="119" font-family="Courier New, monospace" font-size="12" fill="#1565c0" text-anchor="middle">t5: [ 7, 8, 9 ]</text>
  </g>

  <!-- Arrow & Math Symbol -->
  <g stroke="#f44336" stroke-width="3" fill="none" marker-end="url(#arrow-red)">
    <path d="M 230 152 L 410 152" />
  </g>
  <rect x="255" y="125" width="120" height="55" fill="#fff" stroke="#f44336" rx="5"/>
  <text x="315" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828" text-anchor="middle">필터 조건</text>
  <text x="315" y="165" font-family="Times New Roman, serif" font-size="18" font-style="italic" fill="#d32f2f" text-anchor="middle">
    σ<tspan baseline-shift="sub" font-size="12" font-family="Arial">P(x)=True</tspan>
  </text>

  <!-- Right: Subset of Tuples -->
  <text x="510" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">조건부 부분집합 (Subset)</text>

  <g transform="translate(430, 85)">
    <rect x="0" y="0" width="160" height="135" fill="#fafafa" stroke="#ffcdd2" stroke-width="2" rx="4" stroke-dasharray="5,5"/>
    
    <!-- Extracted Rows -->
    <rect x="5" y="40" width="150" height="25" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="2" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <text x="80" y="57" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#c62828" text-anchor="middle">t2: [ 10, 20, 30 ]</text>
    <circle cx="15" cy="52" r="5" fill="#f44336"/>

    <rect x="5" y="75" width="150" height="25" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="2" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <text x="80" y="92" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#c62828" text-anchor="middle">t4: [ 11, 22, 33 ]</text>
    <circle cx="15" cy="87" r="5" fill="#f44336"/>
  </g>

  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f44336" />
    </marker>
  </defs>
</svg>
