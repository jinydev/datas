<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 거대한 체(Filter)로 원하는 학생만 걸러내기</text>

  <!-- Funnel / Filter Mechanism -->
  <g transform="translate(250, 70)">
    <path d="M 0 0 L 150 0 L 110 60 L 40 60 Z" fill="#bbdefb" stroke="#1e88e5" stroke-width="3"/>
    <rect x="40" y="60" width="70" height="30" fill="#64b5f6" stroke="#1e88e5" stroke-width="2"/>
    <line x1="40" y1="70" x2="110" y2="70" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="40" y1="80" x2="110" y2="80" stroke="#fff" stroke-width="2" stroke-dasharray="4,4"/>
    
    <text x="75" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">조건(Condition)</text>
    <rect x="15" y="30" width="120" height="20" fill="#fff" rx="10"/>
    <text x="75" y="44" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#1e88e5" text-anchor="middle">키 >= 170</text>
  </g>

  <!-- Left/Top: Input Group (All students) -->
  <g transform="translate(100, 50)">
    <text x="60" y="0" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">전체 학생 명부</text>
    
    <!-- Student 1 (Short) -->
    <rect x="10" y="10" width="100" height="20" fill="#f5f5f5" stroke="#ccc" rx="3"/>
    <text x="60" y="24" font-family="Arial" font-size="12" fill="#999" text-anchor="middle">A군 (165cm)</text>
    
    <!-- Student 2 (Tall) -->
    <rect x="30" y="35" width="100" height="20" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="3"/>
    <text x="80" y="49" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">B군 (175cm)</text>

    <!-- Student 3 (Short) -->
    <rect x="10" y="60" width="100" height="20" fill="#f5f5f5" stroke="#ccc" rx="3"/>
    <text x="60" y="74" font-family="Arial" font-size="12" fill="#999" text-anchor="middle">C군 (160cm)</text>
    
    <!-- Student 4 (Tall) -->
    <rect x="30" y="85" width="100" height="20" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="3"/>
    <text x="80" y="99" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">D군 (182cm)</text>
  </g>

  <!-- Falling Process -->
  <!-- Short students falling outside -->
  <g opacity="0.5">
    <path d="M 270 120 C 250 150, 220 180, 180 200" stroke="#999" stroke-width="2" fill="none" stroke-dasharray="3,3" marker-end="url(#arrow-gray)"/>
    <rect x="130" y="200" width="80" height="20" fill="#fff" stroke="#ccc" rx="3"/>
    <text x="170" y="214" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">False 버려짐</text>
  </g>

  <!-- Tall students passing through -->
  <path d="M 325 100 L 325 150" stroke="#4caf50" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>

  <!-- Bottom: Output Group (Filtered students) -->
  <g transform="translate(250, 170)">
    <rect x="0" y="0" width="150" height="60" fill="#fff" stroke="#4caf50" stroke-width="3" rx="5" filter="drop-shadow(3px 3px 5px rgba(0,0,0,0.2))"/>
    <text x="75" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">통과한 학생 (새로운 DF)</text>
    
    <!-- Filtered Student 2 -->
    <rect x="25" y="10" width="100" height="20" fill="#c8e6c9" rx="3"/>
    <text x="75" y="24" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20" text-anchor="middle">B군 (175cm)</text>

    <!-- Filtered Student 4 -->
    <rect x="25" y="35" width="100" height="20" fill="#c8e6c9" rx="3"/>
    <text x="75" y="49" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20" text-anchor="middle">D군 (182cm)</text>
  </g>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999" />
    </marker>
  </defs>
</svg>
