<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: 논리 조건(condition)을 평가항여 답안지(Series) 생성</text>

  <!-- 단일 추출된 열 (중간고사) -->
  <g transform="translate(100, 80)">
    <rect x="-30" y="0" width="120" height="180" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FFB300" stroke-width="2"/>
    <text x="30" y="-10" font-family="monospace" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">pf['중간']</text>
    
    <rect x="-30" y="0" width="120" height="30" fill="#FFE0B2" rx="3" />
    <text x="30" y="20" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">점수 확인</text>
    
    <text x="30" y="60" font-family="monospace" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">25</text>
    <text x="30" y="90" font-family="monospace" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    <text x="30" y="120" font-family="monospace" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="30" y="150" font-family="monospace" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">12</text>
    <text x="30" y="180" font-family="monospace" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">22</text>
  </g>

  <!-- 논리 연산자 -->
  <g transform="translate(230, 150)">
    <!-- 비교명령 -->
    <text x="70" y="-40" font-family="monospace" font-size="20" fill="#2196F3" font-weight="bold" text-anchor="middle"> &gt; 20</text>
    
    <!-- 화살표 -->
    <path d="M 0 0 L 140 0" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="135,-7 145,0 135,7" fill="#2196F3" />
    
    <rect x="25" y="15" width="90" height="25" fill="#E3F2FD" rx="5" />
    <text x="70" y="32" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">전체 원소 평가</text>
  </g>

  <!-- 결과 답안지 (Boolean Series) -->
  <g transform="translate(420, 80)">
    <rect x="-50" y="0" width="160" height="200" fill="#E3F2FD" rx="5" filter="url(#shadow)" stroke="#1E88E5" stroke-width="3"/>
    <text x="30" y="-10" font-family="monospace" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">Boolean Series</text>
    
    <rect x="-50" y="0" width="160" height="30" fill="#BBDEFB" rx="3" />
    <text x="30" y="20" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">T/F 답안지</text>

    <!-- 인덱스 -->
    <rect x="-50" y="30" width="60" height="170" fill="#FFF3E0" rx="3" />
    <text x="-20" y="60" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="-20" y="90" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="-20" y="120" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="-20" y="150" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="-20" y="180" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- True/False 결과값 -->
    <rect x="25" y="45" width="60" height="20" fill="#4CAF50" rx="3" />
    <text x="55" y="59" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">True</text>
    
    <rect x="25" y="75" width="60" height="20" fill="#FF5252" rx="3" />
    <text x="55" y="89" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="25" y="105" width="60" height="20" fill="#FF5252" rx="3" />
    <text x="55" y="119" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="25" y="135" width="60" height="20" fill="#FF5252" rx="3" />
    <text x="55" y="149" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">False</text>
    
    <rect x="25" y="165" width="60" height="20" fill="#4CAF50" rx="3" />
    <text x="55" y="179" font-family="monospace" font-size="12" fill="#FFF" font-weight="bold" text-anchor="middle">True</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#E3F2FD" rx="10" stroke="#1E88E5" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">데이터프레임의 열(Series)에 논리 연산을 하면 논리(bool) 배열이 떨어집니다.</text>
  </g>

</svg>
