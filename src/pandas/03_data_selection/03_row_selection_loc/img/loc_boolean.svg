<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">4단계: .loc[ ] 안에 조건식 통째로 넣기 (정석)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="350" height="80" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="10" y="30" font-family="monospace" font-size="16" fill="#82AAFF" font-weight="bold">pf</text>
    <text x="35" y="30" font-family="monospace" font-size="16" fill="#FFF" font-weight="bold">.loc[</text>
    <!-- 조건식 (T/F) -->
    <rect x="85" y="10" width="230" height="30" fill="#E8F5E9" rx="3" stroke="#8BC34A" stroke-width="1"/>
    <text x="200" y="30" font-family="monospace" font-size="16" fill="#2E7D32" font-weight="bold" text-anchor="middle">(pf['중간'] &gt; 10) &amp; (pf['과제'] == 10)</text>
    <text x="325" y="30" font-family="monospace" font-size="16" fill="#FFF" font-weight="bold">]</text>

    <text x="175" y="65" font-family="sans-serif" font-size="12" fill="#C3E88D" font-weight="bold" text-anchor="middle">"True" 결과가 나온 행만 통과시키는 필터 거름망</text>
  </g>

  <!-- 필터 거름망 애니메이션 -->
  <g transform="translate(410, 150)">
    <path d="M 0 -10 L 60 -10" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="55,-17 65,-10 55,-3" fill="#4CAF50" />
    <text x="25" y="-20" font-family="sans-serif" font-size="12" fill="#388E3C" font-weight="bold" text-anchor="middle">추출</text>
  </g>

  <!-- 추출된 데이터프레임 -->
  <g transform="translate(490, 80)">
    <rect x="-30" y="0" width="220" height="110" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    
    <rect x="30" y="0" width="160" height="30" fill="#E8F5E9" rx="3" stroke="#8BC34A" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">중간</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">기말</text>
    <text x="140" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">과제</text>
    <text x="175" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 바 (강수희, 홍소희 생존) -->
    <rect x="-30" y="30" width="60" height="80" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="60" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="90" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>

    <!-- 값 -->
    <!-- 강수희 -->
    <text x="60" y="60" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">18</text>
    <text x="100" y="60" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">27</text>
    <text x="140" y="60" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">10</text>
    <text x="175" y="60" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">20</text>

    <!-- 홍소희 -->
    <text x="60" y="90" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">17</text>
    <text x="100" y="90" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">17</text>
    <text x="140" y="90" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">10</text>
    <text x="175" y="90" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">19</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">pf[조건식] 문법과 결과는 일치하지만, 판다스 설계상 .loc 을 붙이는 것이 더 안정적입니다.</text>
  </g>

</svg>
