<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.loc[ ] 돋보기로 데이터프레임의 행(Row) 뽑아내기</text>

  <!-- 원본 DataFrame -->
  <g transform="translate(60, 80)">
    <rect x="-30" y="0" width="220" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="80" y="-15" font-family="monospace" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">원본 표 (pf)</text>
    
    <!-- 컬럼명 바 -->
    <rect x="30" y="0" width="160" height="30" fill="#E8F5E9" rx="3" stroke="#8BC34A" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">중간</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">기말</text>
    <text x="140" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">과제</text>
    <text x="175" y="20" font-family="sans-serif" font-size="11" fill="#1B5E20" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 바 -->
    <rect x="-30" y="30" width="60" height="150" fill="#FFF3E0" rx="3" stroke="#FFCA28" stroke-width="2"/>
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="85" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="115" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="0" y="145" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="0" y="175" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 추출될 행 강조 (홍소희) -->
    <rect x="-30" y="98" width="220" height="30" fill="#FFECB3" rx="3" stroke="#FF9800" stroke-width="3" stroke-dasharray="4,4"/>

    <!-- 데이터 영역 -->
    <text x="60" y="55" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">25</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">35</text>
    <text x="140" y="55" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">8</text>
    <text x="175" y="55" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">18</text>

    <text x="60" y="85" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">18</text>
    <text x="100" y="85" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">27</text>
    <text x="140" y="85" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">10</text>
    <text x="175" y="85" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">20</text>

    <!-- 홍소희 -->
    <text x="60" y="115" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">17</text>
    <text x="100" y="115" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">17</text>
    <text x="140" y="115" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">10</text>
    <text x="175" y="115" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">19</text>

    <text x="60" y="145" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">12</text>
    <text x="100" y="145" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">22</text>
    <text x="140" y="145" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">9</text>
    <text x="175" y="145" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">20</text>

    <text x="60" y="175" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">22</text>
    <text x="100" y="175" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">34</text>
    <text x="140" y="175" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">8</text>
    <text x="175" y="175" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">16</text>
  </g>

  <!-- 추출 애로우 (돋보기) -->
  <g transform="translate(300, 160)">
    <!-- 포크레인 처럼 뽑아내는 화살표 -->
    <path d="M -20 30 Q 50 30 100 0" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="95,5 105,-2 93,-7" fill="#FF5252" transform="rotate(25 100 0)" />
    
    <rect x="-10" y="-30" width="120" height="35" fill="#FFEbee" rx="5" stroke="#F44336" stroke-width="2"/>
    <text x="50" y="-7" font-family="monospace" font-size="16" fill="#D32F2F" font-weight="bold" text-anchor="middle">.loc['홍소희']</text>
  </g>

  <!-- 단일 서랍장 (시리즈, 세로로 변환!) -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="120" height="180" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="3"/>
    <text x="60" y="-10" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">Series 형식</text>
    <text x="60" y="200" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">컬럼이 인덱스로!</text>
    
    <!-- 기존 컬럼이 좌측 인덱스로 들어옴 -->
    <rect x="0" y="0" width="60" height="180" fill="#FFE0B2" rx="3" />
    <text x="30" y="30" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">중간</text>
    <text x="30" y="70" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">기말</text>
    <text x="30" y="110" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">과제</text>
    <text x="30" y="150" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 값 -->
    <text x="90" y="30" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="90" y="70" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="90" y="110" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="90" y="150" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">19</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">컬럼(열) 추출과 마찬가지로 행 한 줄을 뽑으면 Series 로 강등됩니다.</text>
  </g>

</svg>
