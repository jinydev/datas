<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 출석부에서 이름표로 콕 집어 정보 찾기</text>

  <!-- Left: Clipboard (DataFrame) -->
  <g transform="translate(60, 50)">
    <!-- Clipboard -->
    <rect x="0" y="0" width="160" height="180" fill="#cfd8dc" rx="5" filter="drop-shadow(2px 3px 4px rgba(0,0,0,0.2))"/>
    <rect x="60" y="-10" width="40" height="15" fill="#90a4ae" rx="2"/>
    <circle cx="80" cy="-2" r="3" fill="#37474f"/>
    <rect x="10" y="10" width="140" height="160" fill="#fff" rx="2"/>

    <!-- Content -->
    <text x="80" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">출석부</text>
    <line x1="10" y1="40" x2="150" y2="40" stroke="#333" stroke-width="2"/>

    <!-- Rows -->
    <text x="20" y="60" font-family="Arial" font-size="12" fill="#666">강수희</text>
    <line x1="20" y1="65" x2="140" y2="65" stroke="#ccc" stroke-dasharray="2,2"/>

    <!-- Highlighted Row -->
    <rect x="15" y="75" width="130" height="20" fill="#ffecb3" rx="2"/>
    <text x="20" y="90" font-family="Arial" font-size="12" font-weight="bold" fill="#f57f17">윤일형</text>
    <line x1="70" y1="86" x2="140" y2="86" stroke="#f57f17" stroke-width="2"/>

    <text x="20" y="120" font-family="Arial" font-size="12" fill="#666">유한빈</text>
    <line x1="20" y1="125" x2="140" y2="125" stroke="#ccc" stroke-dasharray="2,2"/>
    
    <text x="20" y="150" font-family="Arial" font-size="12" fill="#666">신수빈</text>
    <line x1="20" y1="155" x2="140" y2="155" stroke="#ccc" stroke-dasharray="2,2"/>
  </g>

  <!-- Middle: Action (Teacher calling name) -->
  <g transform="translate(260, 110)">
    <!-- Magnifying Glass -->
    <circle cx="20" cy="20" r="30" fill="rgba(255,193,7,0.2)" stroke="#ffb300" stroke-width="4"/>
    <line x1="40" y1="40" x2="70" y2="70" stroke="#ffb300" stroke-width="8" stroke-linecap="round"/>
    
    <rect x="35" y="-15" width="80" height="25" fill="#ffb300" rx="10"/>
    <text x="75" y="2" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">.loc 검색</text>
  </g>

  <!-- Arrow -->
  <g stroke="#ffb300" stroke-width="3" fill="none" marker-end="url(#arrow-yellow)">
    <path d="M 370 130 C 400 130, 420 130, 450 130" />
  </g>

  <!-- Right: Result (Row pulled out) -->
  <g transform="translate(460, 60)">
    <rect x="0" y="0" width="140" height="140" fill="#fff" stroke="#ffb300" stroke-width="3" rx="5" filter="drop-shadow(3px 3px 5px rgba(0,0,0,0.15))"/>
    
    <!-- Top label -->
    <rect x="0" y="0" width="140" height="35" fill="#ffecb3" rx="3"/>
    <text x="70" y="23" font-family="Arial" font-size="14" font-weight="bold" fill="#f57f17" text-anchor="middle">윤일형 학생 기록</text>
    
    <!-- Vertical Series Data -->
    <text x="20" y="60" font-family="Arial" font-size="12" fill="#666">중간</text>
    <text x="90" y="60" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333">25</text>
    
    <text x="20" y="85" font-family="Arial" font-size="12" fill="#666">기말</text>
    <text x="90" y="85" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333">35</text>
    
    <text x="20" y="110" font-family="Arial" font-size="12" fill="#666">과제</text>
    <text x="90" y="110" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#333">8</text>

    <line x1="60" y1="45" x2="60" y2="120" stroke="#ffcc80" stroke-width="1"/>
  </g>

  <defs>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb300" />
    </marker>
  </defs>
</svg>
