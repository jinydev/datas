<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">3단계: 콜론(:) 슬라이싱 주의점 (마지막 포함!)</text>

  <!-- 파이썬 코드 박스 -->
  <g transform="translate(40, 130)">
    <rect x="0" y="0" width="250" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#E91E63" stroke-width="2"/>
    <text x="125" y="35" font-family="monospace" font-size="16" fill="#F48FB1" font-weight="bold" text-anchor="middle">pf.loc['윤일형':'유한빈']</text>
    
    <!-- 경고 애니메이션 (강조물) -->
    <path d="M 230 40 L 250 80 L 190 80 Z" fill="#FFEB3B" opacity="0.9" />
    <text x="215" y="70" font-family="sans-serif" font-size="20" fill="#E65100" font-weight="bold" text-anchor="middle">!</text>
    
    <text x="125" y="80" font-family="sans-serif" font-size="12" fill="#E91E63" font-weight="bold" text-anchor="middle">파이썬 리스트와 다르게 끝점(유한빈) 포함!</text>
  </g>

  <!-- 원본 인덱스 구조 (추출 화살표) -->
  <g transform="translate(320, 150)">
    <path d="M 0 10 L 80 10" fill="none" stroke="#E91E63" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,3 85,10 75,17" fill="#E91E63" />
  </g>

  <!-- 파생된 데이터프레임 (DataFrame) -->
  <g transform="translate(430, 60)">
    <rect x="-30" y="0" width="220" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#E91E63" stroke-dasharray="4,4"/>
    
    <!-- 컬럼명 -->
    <rect x="30" y="0" width="160" height="30" fill="#FCE4EC" rx="3" stroke="#F48FB1" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">중간</text>
    <text x="100" y="20" font-family="sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">기말</text>
    <text x="140" y="20" font-family="sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">과제</text>
    <text x="175" y="20" font-family="sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 (윤일형 ~ 유한빈) -->
    <rect x="-30" y="30" width="60" height="120" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="85" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="115" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    
    <!-- 강조되는 마지막 인덱스 (생존) -->
    <rect x="-30" y="125" width="220" height="25" fill="#FFEbee"/>
    <text x="0" y="142" font-family="sans-serif" font-size="10" fill="#D32F2F" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="210" y="142" font-family="sans-serif" font-size="10" fill="#D32F2F" font-weight="bold" text-anchor="start">← 방출금지!</text>

    <!-- 값 -->
    <text x="60" y="55" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">25</text>
    <text x="100" y="55" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">35</text>
    <text x="140" y="55" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">8</text>
    <text x="175" y="55" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">18</text>

    <text x="60" y="85" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">18</text>
    <text x="100" y="85" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">27</text>
    <text x="140" y="85" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">10</text>
    <text x="175" y="85" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">20</text>

    <text x="60" y="115" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">17</text>
    <text x="100" y="115" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">17</text>
    <text x="140" y="115" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">10</text>
    <text x="175" y="115" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">19</text>

    <text x="60" y="142" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">12</text>
    <text x="100" y="142" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">22</text>
    <text x="140" y="142" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">9</text>
    <text x="175" y="142" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">20</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#FCE4EC" rx="10" stroke="#E91E63" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#C2185B" font-weight="bold" text-anchor="middle">이름표(Label)로 자를 때는 맨 마지막 사람 이름까지 포함된다는 사실을 명심하세요!</text>
  </g>

</svg>
