<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: .iloc 으로 번호를 지정하여 행(Row) 뽑기</text>

  <!-- 파이썬 명령 박스 1 (단일 행) -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="180" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="35" font-family="monospace" font-size="16" fill="#81C784" font-weight="bold" text-anchor="middle">pf.iloc[1]</text>
  </g>

  <!-- 파이썬 명령 박스 2 (여러 행 리스트) -->
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="180" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="90" y="35" font-family="monospace" font-size="16" fill="#81D4FA" font-weight="bold" text-anchor="middle">pf.iloc[[1, 2]]</text>
  </g>

  <!-- 단일 행 추출 결과 (Series) -->
  <g transform="translate(260, 50)">
    <path d="M -30 50 L 20 50" fill="none" stroke="#4CAF50" stroke-width="3" stroke-dasharray="4,4" />
    <polygon points="15,46 25,50 15,54" fill="#4CAF50" />
    <text x="0" y="40" font-family="sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">Series 붕괴</text>
    
    <rect x="30" y="0" width="100" height="110" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FFB300" stroke-width="2"/>
    <rect x="30" y="0" width="100" height="20" fill="#FFE0B2" rx="3" />
    
    <rect x="30" y="20" width="40" height="90" fill="#FFF3E0" rx="3" />
    <!-- 원래 컬럼명이 인덱스로 돌아감 -->
    <text x="50" y="40" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">중간</text>
    <text x="50" y="60" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">기말</text>
    <text x="50" y="80" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">과제</text>
    <text x="50" y="100" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 값 (idx 1: 강수희) -->
    <text x="100" y="40" font-family="monospace" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    <text x="100" y="60" font-family="monospace" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="100" y="80" font-family="monospace" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="100" y="100" font-family="monospace" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">20</text>

    <!-- 메타데이터 이름 유지 묘사 -->
    <text x="170" y="60" font-family="sans-serif" font-size="10" fill="#D32F2F" font-weight="bold" text-anchor="middle">이름표 무시해도</text>
    <text x="170" y="75" font-family="sans-serif" font-size="10" fill="#D32F2F" font-weight="bold" text-anchor="middle">Name 속성에</text>
    <text x="170" y="90" font-family="sans-serif" font-size="10" fill="#D32F2F" font-weight="bold" text-anchor="middle">'강수희' 남음!</text>
  </g>

  <!-- 다중 행 추출 결과 (DataFrame) -->
  <g transform="translate(440, 150)">
    <path d="M -210 60 L -40 60" fill="none" stroke="#2196F3" stroke-width="3" stroke-dasharray="4,4" />
    <polygon points="-45,56 -35,60 -45,64" fill="#2196F3" />
    <text x="-120" y="50" font-family="sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">DataFrame 반환 (여러 개)</text>

    <rect x="-30" y="0" width="220" height="110" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <rect x="30" y="0" width="160" height="25" fill="#E3F2FD" rx="3" stroke="#90CAF9" stroke-width="1"/>
    
    <text x="50" y="17" font-family="sans-serif" font-size="10" fill="#0D47A1" font-weight="bold" text-anchor="middle">중간</text>
    <text x="90" y="17" font-family="sans-serif" font-size="10" fill="#0D47A1" font-weight="bold" text-anchor="middle">기말</text>
    <text x="130" y="17" font-family="sans-serif" font-size="10" fill="#0D47A1" font-weight="bold" text-anchor="middle">과제</text>
    <text x="165" y="17" font-family="sans-serif" font-size="10" fill="#0D47A1" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 인덱스 (기존 이름표가 다시 표시됨!) -->
    <rect x="-30" y="25" width="60" height="85" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="85" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>

    <text x="-50" y="55" font-family="sans-serif" font-size="10" fill="#999" font-weight="bold" text-anchor="middle">[1]</text>
    <text x="-50" y="85" font-family="sans-serif" font-size="10" fill="#999" font-weight="bold" text-anchor="middle">[2]</text>

    <!-- 값 -->
    <!-- 강수희 -->
    <text x="50" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    <text x="90" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="130" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="165" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">20</text>

    <!-- 홍소희 -->
    <text x="50" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="90" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="130" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="165" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">19</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-270" y="-15" width="540" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#1B5E20" font-weight="bold" text-anchor="middle">인덱스 번호로 조회할 뿐, 내부적으로는 원본의 문자열 이름표를 잃어버리지 않고 되살려냅니다.</text>
  </g>

</svg>
