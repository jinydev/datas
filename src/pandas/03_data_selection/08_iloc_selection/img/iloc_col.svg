<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: 지정된 번호의 열(Column) 추출 및 슬라이싱 주의점</text>

  <!-- 파이썬 명령 박스 (슬라이싱) -->
  <g transform="translate(40, 120)">
    <rect x="0" y="0" width="260" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#E91E63" stroke-width="2"/>
    <text x="130" y="35" font-family="monospace" font-size="18" fill="#F48FB1" font-weight="bold" text-anchor="middle">pf.iloc[:, <tspan fill="#FFEB3B">1:3</tspan>]</text>
    
    <!-- 경고 표시 -->
    <path d="M 235 45 L 255 100 L 215 100 Z" fill="#FFEB3B" opacity="0.9" />
    <text x="235" y="90" font-family="sans-serif" font-size="24" fill="#E65100" font-weight="bold" text-anchor="middle">!</text>
    
    <text x="130" y="90" font-family="sans-serif" font-size="12" fill="#E91E63" font-weight="bold" text-anchor="middle">끝점(3번 인덱스) 제외 주의!!</text>
  </g>

  <!-- 번호 추출 묘사 -->
  <g transform="translate(320, 140)">
    <path d="M 0 10 L 80 10" fill="none" stroke="#E91E63" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,3 85,10 75,17" fill="#E91E63" />
    <text x="40" y="-5" font-family="sans-serif" font-size="12" fill="#C2185B" font-weight="bold" text-anchor="middle">1번 &amp; 2번 추출</text>
    <text x="40" y="30" font-family="sans-serif" font-size="12" fill="#C2185B" font-weight="bold" text-anchor="middle">3번 짤림!</text>
  </g>

  <!-- 파생된 데이터프레임 (DataFrame) -->
  <g transform="translate(430, 80)">
    <rect x="-30" y="0" width="140" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#E91E63" stroke-dasharray="4,4"/>
    
    <!-- 컬럼 인덱스 번호 (가상) -->
    <text x="50" y="-10" font-family="monospace" font-size="12" fill="#999" font-weight="bold" text-anchor="middle">[1]</text>
    <text x="90" y="-10" font-family="monospace" font-size="12" fill="#999" font-weight="bold" text-anchor="middle">[2]</text>

    <!-- 안 보이는 3번 (출석) 희미하게 표시 (잘려나감 묘사) -->
    <text x="130" y="-10" font-family="monospace" font-size="12" fill="#EF9A9A" font-weight="bold" text-anchor="middle">[3]</text>
    <rect x="110" y="0" width="40" height="150" fill="#FFEBEE" opacity="0.5" />
    <text x="130" y="20" font-family="sans-serif" font-size="10" fill="#EF9A9A" text-anchor="middle">출석</text>
    <path d="M 115 50 L 145 140 M 115 140 L 145 50" stroke="#EF9A9A" stroke-width="2" />

    <!-- 컬럼명 -->
    <rect x="30" y="0" width="80" height="30" fill="#FCE4EC" rx="3" stroke="#F48FB1" stroke-width="1"/>
    <text x="50" y="20" font-family="sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">기말</text>
    <text x="90" y="20" font-family="sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">과제</text>

    <!-- 인덱스 -->
    <rect x="-30" y="30" width="60" height="120" fill="#FFF3E0" rx="3" stroke="#FFCA28" />
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="0" y="85" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="0" y="115" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>

    <!-- 값 -->
    <text x="50" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="90" y="55" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    
    <text x="50" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="90" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    
    <text x="50" y="115" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="90" y="115" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">10</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#F57F17" font-weight="bold" text-anchor="middle">이름 기반의 .loc와 결정적으로 다른 점! 파이썬 리스트처럼 마지막 슬라이싱 번호는 버려집니다.</text>
  </g>

</svg>
