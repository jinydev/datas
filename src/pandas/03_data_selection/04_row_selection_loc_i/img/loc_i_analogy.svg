<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 조교에게 순번으로 이름을 물어본 뒤, 선생님이 이름 부르기</text>

  <!-- Left: Assistant (df.index) -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="120" height="160" fill="#bbdefb" stroke="#1e88e5" stroke-width="2" rx="10"/>
    <text x="60" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">조교 (df.index)</text>
    
    <!-- Mini clipboard -->
    <rect x="20" y="40" width="80" height="90" fill="#fff" stroke="#90caf9" rx="3"/>
    <text x="30" y="60" font-family="Courier New, monospace" font-size="10" fill="#999">0: 윤일형</text>
    <rect x="25" y="68" width="70" height="15" fill="#ffecb3" rx="2"/>
    <text x="30" y="80" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#f57f17">1: 강수희</text>
    <text x="30" y="100" font-family="Courier New, monospace" font-size="10" fill="#999">2: 홍소희</text>

    <!-- Speech bubble from Assistant -->
    <path d="M 120 70 L 140 60 L 140 80 Z" fill="#e3f2fd"/>
    <rect x="140" y="50" width="100" height="40" fill="#e3f2fd" rx="5" stroke="#90caf9"/>
    <text x="190" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">"강수희 입니다!"</text>
  </g>

  <!-- Teacher's Query -->
  <g transform="translate(180, 150)">
    <path d="M 10 30 L -10 20 L -10 40 Z" fill="#fff9c4"/>
    <rect x="-110" y="10" width="100" height="40" fill="#fff9c4" rx="5" stroke="#fff176"/>
    <text x="-60" y="28" font-family="Arial" font-size="12" fill="#555" text-anchor="middle">"출석부 1번 자리에</text>
    <text x="-60" y="42" font-family="Arial" font-size="12" fill="#555" text-anchor="middle">있는 애가 누구지?"</text>
  </g>

  <!-- Right: Teacher (.loc) -->
  <g transform="translate(380, 60)">
    <rect x="0" y="0" width="120" height="160" fill="#ffe0b2" stroke="#fb8c00" stroke-width="2" rx="10"/>
    <text x="60" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">선생님 (.loc)</text>
    
    <!-- Big Megaphone -->
    <path d="M 30 70 L 90 50 L 90 90 Z" fill="#ffb74d" stroke="#f57f17"/>
    <rect x="20" y="60" width="10" height="20" fill="#795548" rx="2"/>
    
    <!-- Loud output -->
    <path d="M 100 70 L 130 30 L 130 110 Z" fill="#fff3e0" stroke="#ffcc80"/>
    <rect x="130" y="20" width="110" height="100" fill="#fff3e0" stroke="#ffcc80" stroke-width="2" rx="5"/>
    <text x="185" y="55" font-family="Arial" font-size="16" font-weight="bold" fill="#b71c1c" text-anchor="middle">"강수희!!</text>
    <text x="185" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#d84315" text-anchor="middle">성적표 가져와!"</text>
    <text x="185" y="105" font-family="Courier New, monospace" font-size="12" fill="#795548" text-anchor="middle">(Row 출력)</text>
  </g>

</svg>
