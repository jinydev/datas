<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">열 하나만 뽑더라도 DataFrame 표 모양 유지하기</text>

  <!-- 파이썬 코드 박스 -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="220" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="110" y="35" font-family="monospace" font-size="18" fill="#CE93D8" font-weight="bold" text-anchor="middle">pf[['기말']]</text>
    <path d="M 60 -10 Q 70 -30 90 -10" fill="none" stroke="#FFCA28" stroke-width="2" />
    <path d="M 160 -10 Q 150 -30 130 -10" fill="none" stroke="#FFCA28" stroke-width="2" />
    <text x="110" y="-35" font-family="sans-serif" font-size="12" fill="#FFCA28" font-weight="bold" text-anchor="middle">원소가 한개일 뿐인 리스트</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(280, 150)">
    <path d="M 0 10 L 100 10" fill="none" stroke="#9C27B0" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="95,3 105,10 95,17" fill="#9C27B0" />
    <text x="50" y="-5" font-family="sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold" text-anchor="middle">단일 열 추출</text>
    <text x="50" y="30" font-family="sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold" text-anchor="middle">표의 형태 강제 유지!</text>
  </g>

  <!-- 추출된 단일 열 데이터프레임 -->
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="140" height="200" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#7B1FA2" stroke-width="2"/>
    <text x="70" y="-10" font-family="monospace" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">DataFrame 형식</text>
    
    <!-- 컬럼 헤더 -->
    <rect x="70" y="0" width="70" height="30" fill="#F3E5F5" rx="3" stroke="#BA68C8" stroke-width="1"/>
    <text x="105" y="20" font-family="sans-serif" font-size="12" fill="#4A148C" font-weight="bold" text-anchor="middle">기말</text>
    
    <!-- 인덱스 -->
    <rect x="0" y="30" width="70" height="170" fill="#FFF3E0" rx="3" />
    <text x="35" y="55" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="35" y="85" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="35" y="115" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="35" y="145" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="35" y="175" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 값 -->
    <text x="105" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="105" y="85" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="105" y="115" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="105" y="145" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">22</text>
    <text x="105" y="175" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">34</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 300)">
    <rect x="-240" y="-15" width="480" height="35" fill="#F3E5F5" rx="10" stroke="#8E24AA" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#4A148C" font-weight="bold" text-anchor="middle">머신러닝(Scikit-Learn) 훈련 데이터(X) 로 넣을 때 가장 많이 쓰이는 필살기!</text>
  </g>

</svg>
