<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">열 이름 하나만 부르면 1차원 Series로 강등됨</text>

  <!-- 파이썬 코드 박스 -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="200" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="100" y="35" font-family="monospace" font-size="18" fill="#81C784" font-weight="bold" text-anchor="middle">pf['중간']</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(280, 150)">
    <path d="M 0 10 L 100 10" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="95,3 105,10 95,17" fill="#FF5252" />
    <text x="50" y="-5" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">단일 열 추출</text>
    <text x="50" y="30" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">"신분 강등!"</text>
  </g>

  <!-- 추출된 단일 서랍장 (Series) -->
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="180" height="200" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-dasharray="4,4"/>
    <rect x="0" y="0" width="180" height="30" fill="#FFE0B2" rx="3" />
    <text x="90" y="20" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">Series 형식</text>

    <!-- 인덱스 (이름) -->
    <rect x="10" y="40" width="60" height="150" fill="#FFF3E0" rx="3" />
    <text x="40" y="65" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="40" y="95" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="40" y="125" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="40" y="155" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="40" y="185" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 값 (중간) -->
    <text x="130" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">25</text>
    <text x="130" y="95" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    <text x="130" y="125" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="130" y="155" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">12</text>
    <text x="130" y="185" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">22</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 300)">
    <rect x="-240" y="-15" width="480" height="35" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">하나만 뽑으면 표의 형태가 붕괴되어 1차원 Series로 내려갑니다.</text>
  </g>

</svg>
