<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">DataFrame 특정 기둥(열, Column)만 쏙 뽑아내기</text>

  <!-- 원본 DataFrame (거대한 책상) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="220" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="110" y="-15" font-family="monospace" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">원본 표 (pf)</text>
    
    <!-- 컬럼명 바 -->
    <rect x="40" y="0" width="180" height="30" fill="#E8F5E9" rx="3" stroke="#8BC34A" stroke-width="1"/>
    <text x="60" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">중간</text>
    <text x="105" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">기말</text>
    <text x="150" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">과제</text>
    <text x="195" y="20" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">출석</text>

    <!-- 추출될 기둥 강조 -->
    <rect x="85" y="0" width="40" height="180" fill="#FFECB3" rx="3" stroke="#FF9800" stroke-width="3" stroke-dasharray="4,4"/>

    <!-- 인덱스 바 (사람 이름) -->
    <rect x="0" y="30" width="40" height="150" fill="#FFF3E0" rx="3" />
    <text x="20" y="55" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="20" y="85" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="20" y="115" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="20" y="145" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="20" y="175" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 데이터 영역 (기말 부분만 색상) -->
    <text x="105" y="55" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">35</text>
    <text x="105" y="85" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">27</text>
    <text x="105" y="115" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">17</text>
    <text x="105" y="145" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">22</text>
    <text x="105" y="175" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">34</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(300, 150)">
    <!-- 포크레인 처럼 뽑아내는 화살표 -->
    <path d="M 0 -30 Q 50 -70 100 0 L 100 0" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="95,-7 105,0 95,7" fill="#FF5252" transform="translate(0,0)" />
    <text x="50" y="-60" font-family="monospace" font-size="16" fill="#D32F2F" font-weight="bold" text-anchor="middle">pf['기말']</text>
  </g>

  <!-- 단일 서랍장 (시리즈) -->
  <g transform="translate(450, 90)">
    <rect x="0" y="0" width="120" height="150" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="3"/>
    
    <!-- 인덱스는 그대로 따라옴 -->
    <rect x="0" y="0" width="50" height="150" fill="#FFE0B2" rx="3" />
    <text x="25" y="25" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="25" y="55" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="25" y="85" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="25" y="115" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>
    <text x="25" y="145" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">신수빈</text>

    <!-- 값 -->
    <text x="85" y="25" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="85" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="85" y="85" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="85" y="115" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">22</text>
    <text x="85" y="145" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">34</text>

    <text x="60" y="175" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">서랍장 (Series)</text>
  </g>

</svg>
