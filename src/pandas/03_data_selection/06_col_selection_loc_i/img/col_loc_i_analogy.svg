<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 시간표에서 '2교시 과목명'을 확인 후 점수 요청하기</text>

  <!-- Left: Timetable (df.columns) -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="160" height="150" fill="#fff" stroke="#90caf9" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="160" height="30" fill="#bbdefb" rx="2"/>
    <text x="80" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">과목 시간표 (columns)</text>
    
    <!-- Slots -->
    <text x="30" y="60" font-family="Courier New, monospace" font-size="12" fill="#999">0교시:</text>
    <text x="90" y="60" font-family="Arial" font-size="12" fill="#333">중간</text>
    <line x1="20" y1="70" x2="140" y2="70" stroke="#e0e0e0" stroke-dasharray="2,2"/>

    <!-- Highlighted Slot -->
    <rect x="15" y="80" width="130" height="25" fill="#fff9c4" rx="2"/>
    <text x="30" y="97" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#f57f17">1교시:</text>
    <text x="90" y="97" font-family="Arial" font-size="14" font-weight="bold" fill="#f57f17">기말</text>
    <rect x="15" y="80" width="130" height="25" fill="none" stroke="#fbc02d" stroke-width="2" rx="2"/>

    <text x="30" y="130" font-family="Courier New, monospace" font-size="12" fill="#999">2교시:</text>
    <text x="90" y="130" font-family="Arial" font-size="12" fill="#333">과제</text>
  </g>

  <!-- Middle: Student matching -->
  <g transform="translate(250, 110)">
    <!-- Thinking bubble -->
    <path d="M 0 0 C -20 -30, 20 -60, 50 -60 C 80 -60, 120 -30, 100 0 C 120 30, 80 60, 50 60 C 20 60, -20 30, 0 0 Z" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
    <circle cx="50" cy="80" r="8" fill="#e8f5e9" stroke="#81c784"/>
    <circle cx="60" cy="100" r="4" fill="#e8f5e9" stroke="#81c784"/>

    <text x="50" y="-15" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">"1교시 과목이</text>
    <text x="50" y="5" font-family="Arial" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">'기말' 이구나!"</text>
    <text x="50" y="25" font-family="Courier New, monospace" font-size="10" fill="#4caf50" text-anchor="middle">df.columns[1]</text>
  </g>

  <!-- Arrow -->
  <g stroke="#81c784" stroke-width="4" fill="none" marker-end="url(#arrow-green)">
    <path d="M 370 110 L 410 110" />
  </g>

  <!-- Right: Requesting data -->
  <g transform="translate(430, 70)">
    <!-- Loudspeaker/loc -->
    <rect x="0" y="0" width="150" height="130" fill="#fff" stroke="#ffb74d" stroke-width="3" rx="10" filter="drop-shadow(3px 3px 5px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="150" height="30" fill="#ffe0b2" rx="3"/>
    <text x="75" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">.loc[ : , 과목 ]</text>

    <!-- Content -->
    <text x="75" y="60" font-family="Arial" font-size="14" fill="#555" text-anchor="middle">"선생님,</text>
    <text x="75" y="85" font-family="Arial" font-size="16" font-weight="bold" fill="#d84315" text-anchor="middle">'기말' 성적만</text>
    <text x="75" y="110" font-family="Arial" font-size="14" fill="#555" text-anchor="middle">전부 뽑아주세요!"</text>
  </g>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#81c784" />
    </marker>
  </defs>
</svg>
