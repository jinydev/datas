<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 성적표 위에 구멍 뚫린 판때기 덮기</text>

  <!-- Left: Original Data Sheet -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="160" height="150" fill="#fff" stroke="#ccc" stroke-width="2" rx="2" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    
    <text x="80" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">전교생 성적표</text>
    <line x1="10" y1="30" x2="150" y2="30" stroke="#ccc" stroke-width="2"/>
    
    <!-- Columns -->
    <text x="30" y="45" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">이름</text>
    <text x="70" y="45" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">중간</text>
    <text x="105" y="45" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">기말</text>
    <text x="135" y="45" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">과제</text>

    <!-- Rows -->
    <text x="30" y="70" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">윤일형</text>
    <text x="70" y="70" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">25</text>
    <text x="105" y="70" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">35</text>
    <text x="135" y="70" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">8</text>

    <text x="30" y="100" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">홍소희</text>
    <text x="70" y="100" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">17</text>
    <text x="105" y="100" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">17</text>
    <text x="135" y="100" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">10</text>
    
    <text x="30" y="130" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">신수빈</text>
    <text x="70" y="130" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">22</text>
    <text x="105" y="130" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">34</text>
    <text x="135" y="130" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">8</text>
  </g>

  <!-- Middle: Stencil / Template overlay -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="140" height="150" fill="#37474f" opacity="0.8" rx="2" filter="drop-shadow(4px 4px 5px rgba(0,0,0,0.4))"/>
    
    <text x="70" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">마법의 판때기</text>
    <rect x="50" y="30" width="40" height="15" fill="#1e88e5" rx="5"/>
    <text x="70" y="41" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">:</text>

    <rect x="10" y="55" width="40" height="85" fill="#f8f9fa" rx="2"/> <!-- Name Hole -->
    <text x="30" y="100" font-family="Arial" font-size="12" font-weight="bold" fill="#90a4ae" text-anchor="middle">이름표</text>

    <!-- Specific Target Hole -->
    <rect x="90" y="55" width="40" height="85" fill="none" stroke="#ffeb3b" stroke-width="3" rx="2"/> <!-- Target Hole -->
    <text x="110" y="100" font-family="Arial" font-size="12" font-weight="bold" fill="#ffeb3b" text-anchor="middle">구멍</text>
    <text x="110" y="120" font-family="Arial" font-size="10" font-weight="bold" fill="#ffeb3b" text-anchor="middle">과제</text>

  </g>

  <!-- Arrow -->
  <g stroke="#ff9800" stroke-width="4" fill="none" marker-end="url(#arrow-orange)">
    <path d="M 400 135 L 430 135" />
  </g>

  <!-- Right: Resulting view -->
  <g transform="translate(450, 60)">
    <rect x="0" y="0" width="120" height="150" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="4" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.2))"/>
    
    <text x="60" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">보이는 결과물</text>
    <line x1="10" y1="35" x2="110" y2="35" stroke="#ffcc80" stroke-width="2"/>

    <text x="30" y="50" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">이름</text>
    <text x="80" y="50" font-family="Arial" font-size="10" font-weight="bold" fill="#e65100" text-anchor="middle">과제</text>

    <!-- Content seen through holes -->
    <text x="30" y="75" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">윤일형</text>
    <text x="80" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">8</text>

    <text x="30" y="105" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">홍소희</text>
    <text x="80" y="105" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">10</text>

    <text x="30" y="135" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">신수빈</text>
    <text x="80" y="135" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">8</text>
  </g>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
