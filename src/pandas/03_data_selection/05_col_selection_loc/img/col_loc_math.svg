<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">첫 번째 차원(Axis 0) 전체에 대한 무조건부 투영</text>

  <!-- Left: Original Matrix (DataFrame) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="180" height="130" fill="#fff" stroke="#78909c" stroke-width="2" rx="4"/>
    
    <!-- Row Selector (All) -->
    <rect x="-20" y="30" width="20" height="90" fill="#e1f5fe" stroke="#03a9f4" stroke-width="2" rx="4"/>
    <text x="-10" y="75" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#0288d1" text-anchor="middle">:</text>
    <text x="-10" y="90" font-family="Arial" font-size="10" fill="#0288d1" text-anchor="middle">All</text>
    
    <!-- Columns -->
    <rect x="10" y="10" width="50" height="110" fill="#eceff1" rx="2"/>
    <text x="35" y="25" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">'A'</text>
    
    <!-- Target Column -->
    <rect x="65" y="5" width="50" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" stroke-dasharray="4,4" rx="2"/>
    <text x="90" y="25" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">'B'</text>

    <!-- Target Column -->
    <rect x="120" y="5" width="50" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" stroke-dasharray="4,4" rx="2"/>
    <text x="145" y="25" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">'C'</text>
    
    <!-- Data points -->
    <text x="35" y="50" font-family="Courier New, monospace" font-size="10" fill="#999" text-anchor="middle">x</text>
    <text x="90" y="50" font-family="Courier New, monospace" font-size="10" fill="#e65100" text-anchor="middle">10</text>
    <text x="145" y="50" font-family="Courier New, monospace" font-size="10" fill="#e65100" text-anchor="middle">15</text>

    <text x="35" y="80" font-family="Courier New, monospace" font-size="10" fill="#999" text-anchor="middle">y</text>
    <text x="90" y="80" font-family="Courier New, monospace" font-size="10" fill="#e65100" text-anchor="middle">20</text>
    <text x="145" y="80" font-family="Courier New, monospace" font-size="10" fill="#e65100" text-anchor="middle">25</text>

    <text x="35" y="110" font-family="Courier New, monospace" font-size="10" fill="#999" text-anchor="middle">z</text>
    <text x="90" y="110" font-family="Courier New, monospace" font-size="10" fill="#e65100" text-anchor="middle">30</text>
    <text x="145" y="110" font-family="Courier New, monospace" font-size="10" fill="#e65100" text-anchor="middle">35</text>
  </g>

  <!-- Code & Action -->
  <g transform="translate(270, 110)">
    <rect x="0" y="0" width="130" height="40" fill="#fff" stroke="#ffb74d" stroke-width="2" rx="20"/>
    <text x="65" y="25" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#d84315" text-anchor="middle">.loc[ :, ['B','C'] ]</text>
  </g>
  
  <g stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arrow-orange)">
    <path d="M 405 130 C 425 130, 440 130, 460 130" />
  </g>

  <!-- Right: Extracted Vector/DataFrame -->
  <text x="530" y="60" font-family="Arial" font-size="12" font-weight="bold" fill="#666" text-anchor="middle">추출된 행렬</text>

  <g transform="translate(480, 80)">
    <rect x="0" y="0" width="100" height="130" fill="#fff" stroke="#ffb74d" stroke-width="2" rx="4" filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.1))"/>
    
    <rect x="0" y="0" width="100" height="30" fill="#ffe0b2" rx="2"/>
    <text x="25" y="20" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">'B'</text>
    <text x="75" y="20" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">'C'</text>

    <line x1="50" y1="0" x2="50" y2="130" stroke="#ffcc80" stroke-width="1"/>

    <text x="25" y="50" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">10</text>
    <text x="75" y="50" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">15</text>

    <text x="25" y="80" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">20</text>
    <text x="75" y="80" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">25</text>

    <text x="25" y="110" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">30</text>
    <text x="75" y="110" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">35</text>
  </g>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
