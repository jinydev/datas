<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: 행은 슬라이스, 열은 하나 (Series 반환)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(30, 130)">
    <rect x="0" y="0" width="310" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="155" y="35" font-family="monospace" font-size="16" fill="#81C784" font-weight="bold" text-anchor="middle">pf.loc['윤일형':'유한빈', '기말']</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(350, 150)">
    <path d="M 0 10 L 80 10" fill="none" stroke="#FFA000" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,3 85,10 75,17" fill="#FFA000" />
    <text x="40" y="-10" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">세로타겟 다수</text>
    <text x="40" y="35" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">가로타겟 1개</text>
  </g>

  <!-- 파생된 시리즈 데이터 -->
  <g transform="translate(460, 60)">
    <rect x="0" y="0" width="100" height="180" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FFB300" stroke-width="2"/>
    <text x="50" y="-10" font-family="monospace" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">Series 반환</text>
    
    <rect x="0" y="0" width="100" height="30" fill="#FFE0B2" rx="3" />
    <text x="50" y="20" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">기말</text>

    <!-- 인덱스 -->
    <rect x="0" y="30" width="50" height="150" fill="#FFF3E0" rx="3" />
    <text x="25" y="60" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">윤일형</text>
    <text x="25" y="95" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">강수희</text>
    <text x="25" y="130" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">홍소희</text>
    <text x="25" y="165" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">유한빈</text>

    <!-- 값 -->
    <text x="75" y="60" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">35</text>
    <text x="75" y="95" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">27</text>
    <text x="75" y="130" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">17</text>
    <text x="75" y="165" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold" text-anchor="middle">22</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">행이 여러개여도 열이 하나면 너비가 무너져 Series 로 떨어집니다.</text>
  </g>

</svg>
