<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">2차원 부분집합 교차 투영 (Matrix Sub-setting)</text>

  <!-- Left: Original Matrix with Intersections -->
  <g transform="translate(100, 60)">
    <rect x="0" y="0" width="180" height="150" fill="#fff" stroke="#90a4ae" stroke-width="2" rx="4"/>
    
    <!-- Matrix Grid -->
    <!-- Columns headers -->
    <rect x="50" y="5" width="40" height="20" fill="#eceff1" rx="2"/>
    <text x="70" y="19" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">C1</text>
    
    <rect x="95" y="5" width="40" height="20" fill="#eceff1" rx="2"/>
    <text x="115" y="19" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">C2</text>
    
    <rect x="140" y="5" width="35" height="20" fill="#eceff1" rx="2"/>
    <text x="157" y="19" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">C3</text>

    <!-- Row headers -->
    <rect x="5" y="30" width="40" height="30" fill="#eceff1" rx="2"/>
    <text x="25" y="49" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">R1</text>

    <rect x="5" y="65" width="40" height="30" fill="#eceff1" rx="2"/>
    <text x="25" y="84" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">R2</text>

    <rect x="5" y="100" width="40" height="40" fill="#eceff1" rx="2"/>
    <text x="25" y="124" font-family="Courier New, monospace" font-size="12" fill="#546e7a" text-anchor="middle">R3</text>

    <!-- Data Area -->
    <text x="70" y="50" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">10</text>
    <text x="115" y="50" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">15</text>
    <text x="157" y="50" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">20</text>

    <text x="70" y="85" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">30</text>
    <text x="115" y="85" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">35</text>
    <text x="157" y="85" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">40</text>

    <text x="70" y="125" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">50</text>
    <text x="115" y="125" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">55</text>
    <text x="157" y="125" font-family="Arial" font-size="10" fill="#999" text-anchor="middle">60</text>

    <!-- Highlights -->
    <!-- Row highlight (Axis 0 filter) -->
    <rect x="0" y="65" width="180" height="30" fill="#ffcdd2" opacity="0.6"/>
    <rect x="0" y="65" width="180" height="30" fill="none" stroke="#f44336" stroke-width="2"/>
    
    <!-- Column highlight (Axis 1 filter) -->
    <rect x="95" y="0" width="40" height="150" fill="#bbdefb" opacity="0.6"/>
    <rect x="95" y="0" width="40" height="150" fill="none" stroke="#1e88e5" stroke-width="2"/>

    <!-- Intersection highlight -->
    <rect x="95" y="65" width="40" height="30" fill="#ffe0b2" stroke="#ff9800" stroke-width="3"/>
    <text x="115" y="85" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">35</text>

  </g>

  <!-- Arrow -->
  <g stroke="#ff9800" stroke-width="3" fill="none" marker-end="url(#arrow-orange)">
    <path d="M 300 135 L 350 135" />
  </g>

  <rect x="300" y="90" width="70" height="30" fill="#fff" stroke="#ccc" rx="15"/>
  <text x="335" y="110" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">.loc</text>

  <!-- Right: Extracted Result -->
  <g transform="translate(380, 80)">
    <text x="50" y="10" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">교차점 반환 (Scalar)</text>
    
    <rect x="10" y="30" width="80" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="4" filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.15))"/>
    
    <text x="50" y="60" font-family="Arial" font-size="24" font-weight="bold" fill="#e65100" text-anchor="middle">35</text>
  </g>

  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
