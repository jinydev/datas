<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: 한 칸 조준 (Scalar 단일 값 반환)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="280" height="60" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="140" y="35" font-family="monospace" font-size="16" fill="#81C784" font-weight="bold" text-anchor="middle">pf.loc['윤일형', '출석']</text>
  </g>

  <!-- 추출 애로우 -->
  <g transform="translate(350, 150)">
    <path d="M 0 10 L 80 10" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,3 85,10 75,17" fill="#FF5252" />
    <text x="40" y="-5" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">구조체 완전 붕괴</text>
    <text x="40" y="30" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">기본 자료형 반환</text>
  </g>

  <!-- 파생된 스칼라 데이터 -->
  <g transform="translate(480, 110)">
    <!-- 점수 단일 렌더러 -->
    <rect x="-10" y="0" width="100" height="100" fill="#FFF3E0" rx="10" filter="url(#shadow)" stroke="#FF9800" stroke-width="3"/>
    <text x="40" y="30" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">numpy.int64</text>
    
    <text x="40" y="75" font-family="sans-serif" font-size="36" fill="#FF5252" font-weight="bold" text-anchor="middle">18</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-240" y="-15" width="480" height="35" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">마지막 한 칸까지 좁히면 표 모양이 아닌 숫자, 글자 그 자체가 반환됩니다.</text>
  </g>

</svg>
