<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">파이썬 리스트(List)를 조립하여 Series 만들기</text>

  <!-- 파이썬 코드 영역 -->
  <g transform="translate(100, 60)">
    <rect x="0" y="0" width="500" height="120" fill="#263238" rx="5" filter="url(#shadow)" />
    <rect x="0" y="0" width="500" height="25" fill="#37474F" rx="5" />
    <circle cx="15" cy="12" r="5" fill="#FF5252" />
    <circle cx="30" cy="12" r="5" fill="#FFCA28" />
    <circle cx="45" cy="12" r="5" fill="#8BC34A" />
    
    <text x="15" y="55" font-family="monospace" font-size="14" fill="#82AAFF">prices = </text>
    <text x="85" y="55" font-family="monospace" font-size="14" fill="#FFF">[1500, 3000, 2000, 500]</text>
    
    <text x="15" y="80" font-family="monospace" font-size="14" fill="#C3E88D">fruit_names = </text>
    <text x="125" y="80" font-family="monospace" font-size="14" fill="#FFF">["Apple", "Banana", "Orange", "Kiwi"]</text>
    
    <text x="15" y="105" font-family="monospace" font-size="14" fill="#89DDFF">s = pd.Series(</text>
    <text x="140" y="105" font-family="monospace" font-size="14" fill="#F07178">data=</text>
    <text x="180" y="105" font-family="monospace" font-size="14" fill="#82AAFF">prices</text>
    <text x="230" y="105" font-family="monospace" font-size="14" fill="#FFF">, </text>
    <text x="245" y="105" font-family="monospace" font-size="14" fill="#F07178">index=</text>
    <text x="295" y="105" font-family="monospace" font-size="14" fill="#C3E88D">fruit_names</text>
    <text x="390" y="105" font-family="monospace" font-size="14" fill="#FFF">, </text>
    <text x="405" y="105" font-family="monospace" font-size="14" fill="#F07178">name=</text>
    <text x="450" y="105" font-family="monospace" font-size="14" fill="#C3E88D">"과일..."</text>
    <text x="495" y="105" font-family="monospace" font-size="14" fill="#FFF">)</text>
  </g>

  <!-- 매핑 과정 -->
  <g transform="translate(100, 220)">
    <!-- 왼쪽의 인덱스 리스트 -->
    <rect x="0" y="0" width="100" height="150" fill="#F1F8E9" rx="5" stroke="#9CCC65" stroke-width="2"/>
    <text x="50" y="-10" font-family="sans-serif" font-size="12" fill="#558B2F" font-weight="bold" text-anchor="middle">fruit_names</text>
    <text x="50" y="25" font-family="sans-serif" font-size="12" fill="#558B2F" font-weight="bold" text-anchor="middle">"Apple"</text>
    <text x="50" y="60" font-family="sans-serif" font-size="12" fill="#558B2F" font-weight="bold" text-anchor="middle">"Banana"</text>
    <text x="50" y="95" font-family="sans-serif" font-size="12" fill="#558B2F" font-weight="bold" text-anchor="middle">"Orange"</text>
    <text x="50" y="130" font-family="sans-serif" font-size="12" fill="#558B2F" font-weight="bold" text-anchor="middle">"Kiwi"</text>

    <!-- 화살표들 -->
    <path d="M 120 20 L 160 20 L 160 40 L 200 40" fill="none" stroke="#FFA726" stroke-width="2" />
    <path d="M 120 55 L 160 55 L 160 70 L 200 70" fill="none" stroke="#FFA726" stroke-width="2" />
    <path d="M 120 90 L 160 90 L 160 100 L 200 100" fill="none" stroke="#FFA726" stroke-width="2" />
    <path d="M 120 125 L 160 125 L 160 130 L 200 130" fill="none" stroke="#FFA726" stroke-width="2" />
    
    <path d="M 400 20 L 360 20 L 360 40 L 320 40" fill="none" stroke="#FFA726" stroke-width="2" />
    <path d="M 400 55 L 360 55 L 360 70 L 320 70" fill="none" stroke="#FFA726" stroke-width="2" />
    <path d="M 400 90 L 360 90 L 360 100 L 320 100" fill="none" stroke="#FFA726" stroke-width="2" />
    <path d="M 400 125 L 360 125 L 360 130 L 320 130" fill="none" stroke="#FFA726" stroke-width="2" />
    
    <text x="260" y="-10" font-family="sans-serif" font-size="14" fill="#F57C00" font-weight="bold" text-anchor="middle">자동 매핑 결합!</text>
    <text x="260" y="-30" font-family="sans-serif" font-size="30" fill="#F57C00" font-weight="bold" text-anchor="middle">🔗</text>

    <!-- 오른쪽의 값 리스트 -->
    <rect x="420" y="0" width="100" height="150" fill="#E3F2FD" rx="5" stroke="#64B5F6" stroke-width="2"/>
    <text x="470" y="-10" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">prices</text>
    <text x="470" y="25" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">1500</text>
    <text x="470" y="60" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">3000</text>
    <text x="470" y="95" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">2000</text>
    <text x="470" y="130" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">500</text>
    
    <!-- 결합된 시리즈 (중앙) -->
    <rect x="200" y="10" width="120" height="140" fill="#FFF3E0" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="3"/>
    
    <rect x="200" y="10" width="60" height="140" fill="#FFE0B2" rx="3" />
    <text x="230" y="40" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">Apple</text>
    <text x="230" y="70" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">Banana</text>
    <text x="230" y="100" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">Orange</text>
    <text x="230" y="130" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">Kiwi</text>
    
    <rect x="260" y="10" width="60" height="140" fill="#FFF" rx="3" />
    <text x="290" y="40" font-family="sans-serif" font-size="10" fill="#333" text-anchor="middle">1500</text>
    <text x="290" y="70" font-family="sans-serif" font-size="10" fill="#333" text-anchor="middle">3000</text>
    <text x="290" y="100" font-family="sans-serif" font-size="10" fill="#333" text-anchor="middle">2000</text>
    <text x="290" y="130" font-family="sans-serif" font-size="10" fill="#333" text-anchor="middle">500</text>
  </g>
</svg>
