<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <!-- Background -->
  <rect width="800" height="350" fill="#f8f9fa" rx="10"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">순수 행렬 (Matrix) vs 판다스 데이터프레임 (Pandas DataFrame)</text>
  
  <!-- Left Side: Numpy Matrix -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="300" height="200" fill="#ffffff" stroke="#dee2e6" stroke-width="2" rx="5"/>
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#495057" text-anchor="middle">수학적 이산 행렬 (NumPy)</text>
    
    <!-- Matrix Bracket -->
    <path d="M 60 70 L 50 70 L 50 170 L 60 170" fill="none" stroke="#adb5bd" stroke-width="3"/>
    <path d="M 240 70 L 250 70 L 250 170 L 240 170" fill="none" stroke="#adb5bd" stroke-width="3"/>
    
    <!-- Numbers (Homogeneous) -->
    <text x="100" y="100" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">1.2</text>
    <text x="150" y="100" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">3.4</text>
    <text x="200" y="100" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">5.6</text>
    
    <text x="100" y="130" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">7.8</text>
    <text x="150" y="130" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">9.0</text>
    <text x="200" y="130" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">1.2</text>
    
    <text x="100" y="160" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">3.4</text>
    <text x="150" y="160" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">5.6</text>
    <text x="200" y="160" font-family="Courier New, monospace" font-size="16" fill="#0056b3" text-anchor="middle">7.8</text>
    
    <!-- Explanation -->
    <text x="150" y="230" font-family="Arial, sans-serif" font-size="14" fill="#6c757d" text-anchor="middle">식별자 없음, 단일 자료형(오직 숫자만)</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 370 180 L 410 180" fill="none" stroke="#adb5bd" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="390" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e83e8c" text-anchor="middle">+ 라벨 결합</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#adb5bd" />
    </marker>
  </defs>

  <!-- Right Side: Pandas DataFrame -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="320" height="200" fill="#ffffff" stroke="#dee2e6" stroke-width="2" rx="5"/>
    <text x="160" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#495057" text-anchor="middle">다차원 관계형 테이블 (Pandas)</text>
    
    <!-- Table Header (Columns) -->
    <rect x="70" y="50" width="220" height="30" fill="#e3f2fd"/>
    <text x="105" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d6efd" text-anchor="middle">Name</text>
    <text x="180" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d6efd" text-anchor="middle">Age</text>
    <text x="255" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d6efd" text-anchor="middle">Score</text>
    
    <!-- Table Index (Rows) -->
    <rect x="20" y="80" width="50" height="90" fill="#fff3cd"/>
    <text x="45" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fd7e14" text-anchor="middle">ID_1</text>
    <text x="45" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fd7e14" text-anchor="middle">ID_2</text>
    <text x="45" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fd7e14" text-anchor="middle">ID_3</text>
    
    <!-- Data Cells (Heterogeneous) -->
    <!-- Row 1 -->
    <text x="105" y="100" font-family="Arial, sans-serif" font-size="14" fill="#212529" text-anchor="middle">Alice</text>
    <text x="180" y="100" font-family="Courier New, monospace" font-size="14" fill="#212529" text-anchor="middle">25</text>
    <text x="255" y="100" font-family="Courier New, monospace" font-size="14" fill="#212529" text-anchor="middle">85.5</text>
    
    <!-- Row 2 -->
    <text x="105" y="130" font-family="Arial, sans-serif" font-size="14" fill="#212529" text-anchor="middle">Bob</text>
    <text x="180" y="130" font-family="Courier New, monospace" font-size="14" fill="#212529" text-anchor="middle">30</text>
    <text x="255" y="130" font-family="Courier New, monospace" font-size="14" fill="#212529" text-anchor="middle">92.0</text>
    
    <!-- Row 3 -->
    <text x="105" y="160" font-family="Arial, sans-serif" font-size="14" fill="#212529" text-anchor="middle">Charlie</text>
    <text x="180" y="160" font-family="Courier New, monospace" font-size="14" fill="#212529" text-anchor="middle">35</text>
    <text x="255" y="160" font-family="Courier New, monospace" font-size="14" fill="#212529" text-anchor="middle">78.2</text>
    
    <!-- Grid Lines -->
    <line x1="70" y1="50" x2="70" y2="170" stroke="#dee2e6" stroke-width="1"/>
    <line x1="145" y1="50" x2="145" y2="170" stroke="#dee2e6" stroke-width="1"/>
    <line x1="220" y1="50" x2="220" y2="170" stroke="#dee2e6" stroke-width="1"/>
    <line x1="295" y1="50" x2="295" y2="170" stroke="#dee2e6" stroke-width="1"/>
    <line x1="70" y1="80" x2="295" y2="80" stroke="#dee2e6" stroke-width="1"/>
    <line x1="70" y1="110" x2="295" y2="110" stroke="#dee2e6" stroke-width="1"/>
    <line x1="70" y1="140" x2="295" y2="140" stroke="#dee2e6" stroke-width="1"/>
    <line x1="70" y1="170" x2="295" y2="170" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Explanation -->
    <text x="160" y="230" font-family="Arial, sans-serif" font-size="14" fill="#6c757d" text-anchor="middle">행렬에 컬럼/인덱스 라벨 부여, 이기종 데이터 혼합 가능</text>
  </g>
</svg>
