<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">딕셔너리(Dictionary) 구조로 DataFrame 척척 조립하기</text>

  <!-- 파이썬 딕셔너리 코드 텍스트 -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="300" height="150" fill="#263238" rx="5" filter="url(#shadow)" />
    <rect x="0" y="0" width="300" height="25" fill="#37474F" rx="5" />
    <circle cx="15" cy="12" r="5" fill="#FF5252" />
    <circle cx="30" cy="12" r="5" fill="#FFCA28" />
    <circle cx="45" cy="12" r="5" fill="#8BC34A" />
    
    <text x="15" y="50" font-family="monospace" font-size="12" fill="#82AAFF">raw_data = {</text>
    <text x="30" y="70" font-family="monospace" font-size="12" fill="#C3E88D">"이름"</text>
    <text x="70" y="70" font-family="monospace" font-size="12" fill="#89DDFF">: </text>
    <text x="85" y="70" font-family="monospace" font-size="12" fill="#FFF">["Alice", "Bob", "Charlie"],</text>
    
    <text x="30" y="90" font-family="monospace" font-size="12" fill="#C3E88D">"나이"</text>
    <text x="70" y="90" font-family="monospace" font-size="12" fill="#89DDFF">: </text>
    <text x="85" y="90" font-family="monospace" font-size="12" fill="#FFF">[25, 30, 35],</text>
    
    <text x="30" y="110" font-family="monospace" font-size="12" fill="#C3E88D">"연봉"</text>
    <text x="70" y="110" font-family="monospace" font-size="12" fill="#89DDFF">: </text>
    <text x="85" y="110" font-family="monospace" font-size="12" fill="#FFF">[5000, 4800, 5200]</text>
    
    <text x="15" y="130" font-family="monospace" font-size="12" fill="#82AAFF">}</text>
  </g>

  <!-- 딕셔너리 매핑 애니메이션 -->
  <!-- 키(Key) -> Columns 매핑 -->
  <path d="M 120 150 L 120 180 L 460 180 L 460 110" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="4,4" />
  <text x="210" y="175" font-family="sans-serif" font-size="12" fill="#1976D2" font-weight="bold">Key(=열 이름표)</text>
  
  <!-- 리스트(Value) -> 열 데이터 매핑 -->
  <path d="M 230 150 L 230 200 L 530 200 L 530 110" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,4" />
  <text x="320" y="195" font-family="sans-serif" font-size="12" fill="#388E3C" font-weight="bold">리스트(=세로줄 데이터)</text>

  <!-- 변환기 (pd.DataFrame) -->
  <g transform="translate(355, 120)">
    <path d="M 0 0 L 40 0" fill="none" stroke="#FF9800" stroke-width="4" />
    <polygon points="35,-7 45,0 35,7" fill="#FF9800" />
    <text x="20" y="-15" font-family="sans-serif" font-size="14" fill="#F57C00" font-weight="bold" text-anchor="middle">pd.DataFrame(raw_data)</text>
  </g>

  <!-- 결과 DataFrame -->
  <g transform="translate(420, 80)">
    <rect x="-30" y="0" width="260" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#1976D2" stroke-width="3"/>
    
    <!-- 3. Columns (열 이름표) -->
    <rect x="40" y="0" width="190" height="30" fill="#E3F2FD" rx="5" />
    <text x="70" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">이름</text>
    <text x="135" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">나이</text>
    <text x="195" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">연봉</text>
    
    <!-- 구분 라인 (가로) -->
    <line x1="40" y1="35" x2="230" y2="35" stroke="#90CAF9" stroke-width="2" />
    
    <!-- 2. Index (기본 제공 행 번호 0, 1, 2) -->
    <rect x="-30" y="40" width="60" height="110" fill="#FFF3E0" rx="4" />
    <text x="0" y="45" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">(index)</text>
    <text x="0" y="70" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">0</text>
    <text x="0" y="100" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">1</text>
    <text x="0" y="130" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">2</text>
    
    <!-- 구분 라인 (세로) -->
    <line x1="35" y1="40" x2="35" y2="150" stroke="#FFCC80" stroke-width="2" />

    <!-- 1. Values (순수 값) -->
    <rect x="40" y="40" width="190" height="110" fill="#F1F8E9" rx="4" />
    
    <!-- 값 텍스트 -->
    <text x="70" y="70" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">Alice</text>
    <text x="135" y="70" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">25</text>
    <text x="195" y="70" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">5000</text>
    
    <text x="70" y="100" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">Bob</text>
    <text x="135" y="100" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">30</text>
    <text x="195" y="100" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">4800</text>
    
    <text x="70" y="130" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">Charlie</text>
    <text x="135" y="130" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">35</text>
    <text x="195" y="130" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">5200</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-300" y="-30" width="600" height="50" fill="#FFF3E0" rx="10" stroke="#FF9800" stroke-width="2" />
    <text x="0" y="-5" font-family="sans-serif" font-size="13" fill="#E65100" font-weight="bold" text-anchor="middle">딕셔너리의 키(Key)값이 엑셀의 열 이름표(Columns)로 변신하고,</text>
    <text x="0" y="15" font-family="sans-serif" font-size="13" fill="#E65100" font-weight="bold" text-anchor="middle">리스트(List) 안의 원소들이 엑셀 표의 세로 한 줄을 쭉 채워 넣습니다!</text>
  </g>

</svg>
