<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">데이터 파일 입출력(I/O): 작업대와 창고</text>

  <!-- 파이썬 메모리 (작업대) - 상단/중앙 -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="340" height="120" fill="#E3F2FD" rx="10" filter="url(#shadow)" stroke="#42A5F5" stroke-width="3"/>
    <text x="170" y="25" font-family="sans-serif" font-size="16" fill="#1565C0" font-weight="bold" text-anchor="middle">파이썬 작업대 (RAM / 주 메모리)</text>
    
    <!-- 펼쳐진 데이터프레임 -->
    <rect x="100" y="40" width="140" height="70" fill="#FFFFFF" rx="3" stroke="#90CAF9" stroke-width="2"/>
    <!-- 표 모양 -->
    <path d="M 100 55 L 240 55 M 100 70 L 240 70 M 130 40 L 130 110" fill="none" stroke="#E3F2FD" stroke-width="2" />
    <text x="170" y="80" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">DataFrame (객체)</text>
    
    <text x="32" y="75" font-family="sans-serif" font-size="30" text-anchor="middle">💻</text>
  </g>

  <!-- 하단 창고 (저장소/HDD) -->
  <g transform="translate(100, 260)">
    <rect x="0" y="0" width="500" height="50" fill="#EFEBE9" rx="10" stroke="#BCAAA4" stroke-width="3"/>
    <text x="250" y="30" font-family="sans-serif" font-size="16" fill="#5D4037" font-weight="bold" text-anchor="middle">하드디스크 (창고 / 영구 저장소)</text>
  </g>

  <!-- 파일 포장 박스들 (창고 위) -->
  <g transform="translate(160, 220)">
    <rect x="0" y="0" width="70" height="40" fill="#E8F5E9" rx="3" stroke="#4CAF50" stroke-width="2"/>
    <text x="35" y="25" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">.xlsx</text>
  </g>
  
  <g transform="translate(470, 220)">
    <rect x="0" y="0" width="70" height="40" fill="#FFF3E0" rx="3" stroke="#FF9800" stroke-width="2"/>
    <text x="35" y="25" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">.csv</text>
  </g>

  <!-- 좌측 화살표 (.read) -->
  <g transform="translate(195, 215)">
    <path d="M 0 0 L 20 -35 L 50 -35" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="45,-40 55,-35 45,-30" fill="#4CAF50" />
    <rect x="-10" y="-20" width="80" height="20" fill="#FFFFFF" rx="10" />
    <text x="30" y="-6" font-family="monospace" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">pd.read_...</text>
    <text x="25" y="20" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">박스열기 (Load)</text>
  </g>

  <!-- 우측 화살표 (.to) -->
  <g transform="translate(450, 180)">
    <path d="M -80 0 L -30 0 L 0 35" fill="none" stroke="#FF9800" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="-5,30 5,40 -5,40" fill="#FF9800" />
    <rect x="-70" y="-10" width="80" height="20" fill="#FFFFFF" rx="10" />
    <text x="-30" y="4" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">df.to_...</text>
    <text x="-30" y="30" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">포장하기 (Save)</text>
  </g>

</svg>
