<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 연구원의 작업대(메모리)와 영구 보관용 창고(하드디스크)</text>

  <!-- Left: Workdesk -->
  <g transform="translate(60, 60)">
    <!-- Desk Surface -->
    <path d="M 10 130 L 170 130 L 190 170 L -10 170 Z" fill="#d7ccc8" stroke="#8d6e63" stroke-width="2"/>
    <rect x="-10" y="170" width="200" height="10" fill="#8d6e63"/>
    
    <text x="90" y="20" font-family="Arial" font-size="16" font-weight="bold" fill="#5d4037" text-anchor="middle">작업대 (메모리)</text>
    
    <!-- Open Spreadsheet Paper -->
    <g transform="translate(45, 70) skewX(-15)">
      <rect x="0" y="0" width="90" height="80" fill="#fff" stroke="#ccc" stroke-width="1"/>
      <line x1="30" y1="0" x2="30" y2="80" stroke="#e0e0e0"/>
      <line x1="60" y1="0" x2="60" y2="80" stroke="#e0e0e0"/>
      <line x1="0" y1="20" x2="90" y2="20" stroke="#e0e0e0"/>
      <line x1="0" y1="40" x2="90" y2="40" stroke="#e0e0e0"/>
      <line x1="0" y1="60" x2="90" y2="60" stroke="#e0e0e0"/>
    </g>
    
    <!-- Pencil -->
    <rect x="130" y="90" width="40" height="6" fill="#ffca28" transform="rotate(-30 130 90)"/>
    <path d="M 164 70 L 172 65 L 168 75 Z" fill="#424242"/>

    <text x="90" y="50" font-family="Arial" font-size="12" fill="#757575" text-anchor="middle">"여기서 표를 펼치고 연산!"</text>
  </g>

  <!-- Middle: Arrows -->
  <g transform="translate(250, 110)">
    <!-- Top Arrow: to_csv (Pack into box) -->
    <g stroke="#ff9800" stroke-width="3" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-orange2)">
      <path d="M 0 0 C 40 -30, 100 -30, 140 0" />
    </g>
    <rect x="25" y="-35" width="90" height="20" fill="#fff3e0" rx="10"/>
    <text x="70" y="-21" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">"박스에 포장" (to)</text>

    <!-- Bottom Arrow: read_csv (Unpack box) -->
    <g stroke="#43a047" stroke-width="3" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-green2)">
      <path d="M 140 40 C 100 70, 40 70, 0 40" />
    </g>
    <rect x="25" y="55" width="90" height="20" fill="#e8f5e9" rx="10"/>
    <text x="70" y="69" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20" text-anchor="middle">"박스 뜯기" (read)</text>
  </g>

  <!-- Right: Warehouse -->
  <g transform="translate(410, 60)">
    <!-- Shelves -->
    <rect x="20" y="40" width="140" height="10" fill="#cfd8dc"/>
    <rect x="20" y="90" width="140" height="10" fill="#cfd8dc"/>
    <rect x="20" y="140" width="140" height="10" fill="#cfd8dc"/>
    <rect x="10" y="30" width="10" height="120" fill="#90a4ae"/>
    <rect x="160" y="30" width="10" height="120" fill="#90a4ae"/>

    <text x="90" y="20" font-family="Arial" font-size="16" font-weight="bold" fill="#37474f" text-anchor="middle">창고 (하드디스크)</text>

    <!-- Boxes -->
    <rect x="40" y="65" width="40" height="25" fill="#d7ccc8" stroke="#8d6e63"/>
    <text x="60" y="82" font-family="Arial" font-size="10" font-weight="bold" fill="#5d4037" text-anchor="middle">CSV</text>

    <rect x="100" y="115" width="40" height="25" fill="#a5d6a7" stroke="#43a047"/>
    <text x="120" y="132" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20" text-anchor="middle">Excel</text>

    <text x="90" y="180" font-family="Arial" font-size="12" fill="#757575" text-anchor="middle">"압축 보관 (불 안켜짐)"</text>
  </g>

  <defs>
    <marker id="arrow-orange2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
    <marker id="arrow-green2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#43a047" />
    </marker>
  </defs>
</svg>
