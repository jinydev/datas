<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: 콤마(,) 찌꺼기 제거와 숫자 형변환 (thousands)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="380" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="190" y="30" font-family="monospace" font-size="16" fill="#81D4FA" font-weight="bold" text-anchor="middle">pd.read_csv(..., <tspan fill="#FFEB3B">thousands=','</tspan>)</text>
  </g>

  <!-- 왼쪽: 옵션 누락 시 문자열로 취급되는 데이터 -->
  <g transform="translate(100, 150)">
    <rect x="-30" y="-10" width="160" height="130" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-width="2"/>
    <text x="50" y="-25" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">콤마가 섞인 문자열 (Object)</text>

    <!-- 따옴표 달린 문자열 묘사 -->
    <rect x="10" y="20" width="80" height="30" fill="#ECEFF1" rx="5" />
    <text x="50" y="40" font-family="monospace" font-size="16" fill="#455A64" font-weight="bold" text-anchor="middle">"1<tspan fill="#F44336">,</tspan>592"</text>
    <path d="M 0 35 L -10 35 L -10 95 L 0 95" fill="none" stroke="#607D8B" stroke-width="1" />
    <text x="-40" y="70" font-family="monospace" font-size="12" fill="#D32F2F" text-anchor="middle">Dtype</text>
    <text x="-40" y="85" font-family="monospace" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">object</text>

    <rect x="10" y="60" width="80" height="30" fill="#ECEFF1" rx="5" />
    <text x="50" y="80" font-family="monospace" font-size="16" fill="#455A64" font-weight="bold" text-anchor="middle">"8<tspan fill="#F44336">,</tspan>432"</text>

    <text x="50" y="110" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">df.sum() => 에러!!!</text>
  </g>

  <!-- 중앙: 판다스 thousands 제거 필터 -->
  <g transform="translate(350, 150)">
    <!-- 화살표 -->
    <path d="M -60 50 L -10 50 L 50 30" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="5,5" />
    
    <!-- 핀셋/수술 기호 -->
    <text x="0" y="30" font-family="sans-serif" font-size="30" text-anchor="middle">🛠️</text>
    <text x="0" y="60" font-family="sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">콤마 추출 &amp; 강제 변환</text>

    <!-- 날아가는 콤마 쓰레기 -->
    <path d="M 0 10 Q 0 -30 30 -30" fill="none" stroke="#F44336" stroke-width="2" stroke-dasharray="2,2" />
    <text x="35" y="-25" font-family="sans-serif" font-size="18" fill="#D32F2F" font-weight="bold">,</text>
    
    <!-- 도착 화살표 -->
    <path d="M 50 30 L 70 30 L 100 50" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="90,43 105,50 90,57" fill="#4CAF50" />
  </g>

  <!-- 오른쪽: 형변환 성공한 클린 데이터 -->
  <g transform="translate(500, 150)">
    <rect x="-30" y="-10" width="160" height="130" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="50" y="-25" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">순수 숫자 (Int64 / Float)</text>

    <!-- 숫자데이터 -->
    <rect x="10" y="20" width="80" height="30" fill="#E8F5E9" rx="5" />
    <text x="50" y="40" font-family="monospace" font-size="16" fill="#1B5E20" font-weight="bold" text-anchor="middle">1592</text>
    <path d="M 100 35 L 110 35 L 110 95 L 100 95" fill="none" stroke="#4CAF50" stroke-width="1" />
    <text x="140" y="70" font-family="monospace" font-size="12" fill="#1B5E20" text-anchor="middle">Dtype</text>
    <text x="140" y="85" font-family="monospace" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">int64</text>

    <rect x="10" y="60" width="80" height="30" fill="#E8F5E9" rx="5" />
    <text x="50" y="80" font-family="monospace" font-size="16" fill="#1B5E20" font-weight="bold" text-anchor="middle">8432</text>

    <text x="50" y="110" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">df.sum() => 10024 (성공)</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E3F2FD" rx="10" stroke="#2196F3" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#0D47A1" font-weight="bold" text-anchor="middle">문자열 안의 콤마를 제거하여, 겉멋이 든 글자를 파이썬이 연산 가능한 딱딱한 숫자로 강제 형변환합니다.</text>
  </g>

</svg>
