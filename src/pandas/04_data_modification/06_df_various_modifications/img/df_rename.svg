<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">4단계: .rename() 컬럼 이름표 교체하기</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="580" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="290" y="30" font-family="monospace" font-size="16" fill="#81C784" font-weight="bold" text-anchor="middle">df.rename(columns={<tspan fill="#FFEB3B">'수학'</tspan>: <tspan fill="#4FC3F7">'Math'</tspan>, <tspan fill="#FFEB3B">'과학'</tspan>: <tspan fill="#4FC3F7">'Science'</tspan>})</text>
  </g>

  <!-- 좌측: 교체 전 이름표 -->
  <g transform="translate(140, 150)">
    <!-- 컬럼 헤더 -->
    <rect x="0" y="0" width="80" height="30" fill="#ECEFF1" rx="5" stroke="#B0BEC5" stroke-width="2" />
    <text x="40" y="20" font-family="sans-serif" font-size="14" fill="#78909C" font-weight="bold" text-anchor="middle">수학</text>

    <rect x="90" y="0" width="80" height="30" fill="#ECEFF1" rx="5" stroke="#B0BEC5" stroke-width="2" />
    <text x="130" y="20" font-family="sans-serif" font-size="14" fill="#78909C" font-weight="bold" text-anchor="middle">과학</text>

    <!-- 몸통 (데이터는 중요치 않음) -->
    <rect x="0" y="40" width="80" height="60" fill="#FFF" rx="3" stroke="#ECEFF1" />
    <rect x="90" y="40" width="80" height="60" fill="#FFF" rx="3" stroke="#ECEFF1" />
    
    <text x="40" y="130" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">Before (옛날 이름)</text>

    <!-- 이름표 떼어지는 애니메이션 (테이프 떨어지는 모양) -->
    <path d="M 40 -10 L 40 -30 M 130 -10 L 130 -30" fill="none" stroke="#F44336" stroke-width="2" stroke-dasharray="3,3" />
    <text x="85" y="-35" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">쓰루룩.. (제거됨)</text>
  </g>

  <!-- 중앙: 변환 화살표 (사전 Dictionary) -->
  <g transform="translate(350, 180)">
    <path d="M -30 0 L 30 0" fill="none" stroke="#4CAF50" stroke-width="6" />
    <polygon points="25,-7 35,0 25,7" fill="#4CAF50" />
    <text x="0" y="-15" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">{'옛': '새'}</text>
  </g>

  <!-- 우측: 교체 후 이름표 -->
  <g transform="translate(420, 150)">
    <!-- 새 이름표가 붙는 중인 묘사 (별 반짝) -->
    <path d="M 40 -10 L 40 -30 M 130 -10 L 130 -30" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="3,3" />
    <text x="85" y="-35" font-family="sans-serif" font-size="12" fill="#1976D2" font-weight="bold" text-anchor="middle">착! (새 이름표 부착)</text>

    <!-- 컬럼 헤더 -->
    <rect x="0" y="0" width="80" height="30" fill="#E3F2FD" rx="5" stroke="#2196F3" stroke-width="2" />
    <text x="40" y="20" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">Math</text>

    <rect x="90" y="0" width="80" height="30" fill="#E3F2FD" rx="5" stroke="#2196F3" stroke-width="2" />
    <text x="130" y="20" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">Science</text>

    <!-- 몸통 (데이터 유지됨) -->
    <rect x="0" y="40" width="80" height="60" fill="#FFF" rx="3" stroke="#E3F2FD" />
    <rect x="90" y="40" width="80" height="60" fill="#FFF" rx="3" stroke="#E3F2FD" />

    <text x="85" y="130" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">After (새 이름)</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">내부 데이터는 안전하게 둔 채, 겉에 붙은 컬럼/인덱스의 라벨만 부드럽게 교체합니다.</text>
  </g>

</svg>
