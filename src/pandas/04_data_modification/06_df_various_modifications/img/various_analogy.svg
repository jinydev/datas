<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 350" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="350" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 스프레드시트 청소 공방 (수정, 결측치 확인, 삭제, 라벨 교체)</text>

  <!-- 2x2 Grid Lines -->
  <line x1="325" y1="50" x2="325" y2="330" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="20" y1="190" x2="630" y2="190" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Top-Left: Eraser & Pencil (Overwrite) -->
  <g transform="translate(30, 60)">
    <text x="130" y="15" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">1. 지우개로 덮어쓰기</text>
    
    <!-- Table Cell -->
    <rect x="70" y="40" width="120" height="60" fill="#fff" stroke="#90caf9" stroke-width="2" rx="4"/>
    <text x="100" y="75" font-family="Arial" font-size="18" fill="#ccc" text-decoration="line-through">80</text>
    <text x="140" y="75" font-family="Arial" font-size="22" font-weight="bold" fill="#d32f2f">100</text>

    <!-- Eraser/Pencil Graphic -->
    <rect x="85" y="20" width="30" height="15" fill="#ffcdd2" rx="2" transform="rotate(30 85 20)"/>
    <rect x="110" y="25" width="40" height="15" fill="#ffca28" transform="rotate(30 110 25)"/>
  </g>

  <!-- Top-Right: Magnifying Glass (NaN) -->
  <g transform="translate(350, 60)">
    <text x="130" y="15" font-family="Arial" font-size="14" font-weight="bold" fill="#c62828" text-anchor="middle">2. 구멍난 데이터 스캔 (NaN)</text>
    
    <rect x="80" y="40" width="100" height="70" fill="#fff" stroke="#ef9a9a" stroke-width="2" rx="4"/>
    <!-- Torn hole -->
    <path d="M 120 55 C 130 50, 140 60, 135 70 C 130 80, 115 75, 110 65 C 105 55, 115 50, 120 55" fill="#f5f5f5" stroke="#ffcdd2" stroke-width="1"/>
    
    <!-- Magnifying Glass -->
    <circle cx="125" cy="65" r="25" fill="none" stroke="#e53935" stroke-width="4"/>
    <circle cx="125" cy="65" r="20" fill="#ffebee" opacity="0.5"/>
    <line x1="142" y1="82" x2="160" y2="100" stroke="#b71c1c" stroke-width="6" stroke-linecap="round"/>

    <text x="125" y="69" font-family="Courier New" font-size="12" font-weight="bold" fill="#c62828" text-anchor="middle">NaN</text>
  </g>

  <!-- Bottom-Left: Scissors (Drop) -->
  <g transform="translate(30, 200)">
    <text x="130" y="15" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">3. 불필요한 부분 잘라내기</text>
    
    <!-- Paper / Table -->
    <rect x="60" y="40" width="140" height="70" fill="#fff" stroke="#ffcc80" stroke-width="2" rx="4"/>
    <line x1="130" y1="40" x2="130" y2="110" stroke="#ffb74d" stroke-dasharray="4,4"/>
    
    <rect x="135" y="45" width="60" height="60" fill="#fff3e0" opacity="0.7"/>
    <text x="165" y="75" font-family="Arial" font-size="12" fill="#e65100" text-anchor="middle">휴지통</text>

    <!-- Scissors -->
    <path d="M 115 15 L 130 40 M 145 15 L 130 40" stroke="#333" stroke-width="3"/>
    <circle cx="110" cy="10" r="6" fill="none" stroke="#f57f17" stroke-width="3"/>
    <circle cx="150" cy="10" r="6" fill="none" stroke="#f57f17" stroke-width="3"/>
  </g>

  <!-- Bottom-Right: Replacing Name Tag (Rename) -->
  <g transform="translate(350, 200)">
    <text x="130" y="15" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">4. 이름표 뜯고 새로 붙이기</text>
    
    <!-- Drawer / Table Header -->
    <rect x="80" y="50" width="100" height="40" fill="#e8f5e9" stroke="#81c784" stroke-width="2" rx="4"/>
    
    <!-- Old Tag falling off -->
    <rect x="60" y="20" width="50" height="20" fill="#ccc" transform="rotate(-15 60 20)"/>
    <text x="85" y="34" font-family="Arial" font-size="10" fill="#fff" transform="rotate(-15 60 20)" text-anchor="middle">A</text>
    
    <!-- New Tag -->
    <rect x="90" y="55" width="80" height="30" fill="#a5d6a7" rx="2" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.2))"/>
    <text x="130" y="75" font-family="Arial" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">새 이름표</text>
  </g>

</svg>
