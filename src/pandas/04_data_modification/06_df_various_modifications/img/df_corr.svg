<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">보너스: .corr() 상관계수를 통한 데이터 궁합 파악</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="180" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="90" y="30" font-family="monospace" font-size="16" fill="#CE93D8" font-weight="bold" text-anchor="middle">df.corr()</text>
  </g>

  <!-- 좌측: 변수 2개가 같이 오르락 내리락 하는 양의 상관관계 -->
  <g transform="translate(130, 210)">
    <!-- 좌표축 -->
    <path d="M -30 -60 L -30 60 L 90 60" fill="none" stroke="#B0BEC5" stroke-width="2" />
    
    <!-- 양의 상관관계 점들 -->
    <circle cx="-10" cy="40" r="4" fill="#E91E63" />
    <circle cx="10" cy="20" r="4" fill="#E91E63" />
    <circle cx="30" cy="-10" r="4" fill="#E91E63" />
    <circle cx="50" cy="-30" r="4" fill="#E91E63" />
    <circle cx="70" cy="-50" r="4" fill="#E91E63" />
    
    <!-- 추세선 -->
    <path d="M -20 50 L 80 -60" fill="none" stroke="#F48FB1" stroke-width="3" stroke-dasharray="2,2" />
    
    <text x="30" y="90" font-family="sans-serif" font-size="14" fill="#C2185B" font-weight="bold" text-anchor="middle">"너가 오르면 나도 올라!"</text>
    <rect x="-10" y="105" width="80" height="20" fill="#FCE4EC" rx="10" stroke="#F48FB1" />
    <text x="30" y="119" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">r ≈ 1.0</text>
  </g>

  <!-- 중앙: 완전 무관심선 -->
  <g transform="translate(350, 210)">
    <!-- 좌표축 -->
    <path d="M -30 -60 L -30 60 L 90 60" fill="none" stroke="#B0BEC5" stroke-width="2" />
    
    <!-- 상관없음 무작위 점들 -->
    <circle cx="-10" cy="-30" r="4" fill="#9E9E9E" />
    <circle cx="70" cy="40" r="4" fill="#9E9E9E" />
    <circle cx="20" cy="50" r="4" fill="#9E9E9E" />
    <circle cx="40" cy="-50" r="4" fill="#9E9E9E" />
    <circle cx="80" cy="-10" r="4" fill="#9E9E9E" />
    <circle cx="10" cy="10" r="4" fill="#9E9E9E" />
    <circle cx="50" cy="20" r="4" fill="#9E9E9E" />
    
    <text x="30" y="90" font-family="sans-serif" font-size="14" fill="#757575" font-weight="bold" text-anchor="middle">"... (서로 신경 안씀)"</text>
    <rect x="-10" y="105" width="80" height="20" fill="#F5F5F5" rx="10" stroke="#BDBDBD" />
    <text x="30" y="119" font-family="sans-serif" font-size="12" fill="#616161" font-weight="bold" text-anchor="middle">r ≈ 0.0</text>
  </g>

  <!-- 우측: 변수 2개가 반대로 움직이는 음의 상관관계 -->
  <g transform="translate(570, 210)">
    <!-- 좌표축 -->
    <path d="M -30 -60 L -30 60 L 90 60" fill="none" stroke="#B0BEC5" stroke-width="2" />
    
    <!-- 음의 상관관계 점들 -->
    <circle cx="-10" cy="-50" r="4" fill="#2196F3" />
    <circle cx="10" cy="-30" r="4" fill="#2196F3" />
    <circle cx="30" cy="-10" r="4" fill="#2196F3" />
    <circle cx="50" cy="20" r="4" fill="#2196F3" />
    <circle cx="70" cy="40" r="4" fill="#2196F3" />
    
    <!-- 추세선 -->
    <path d="M -20 -60 L 80 50" fill="none" stroke="#90CAF9" stroke-width="3" stroke-dasharray="2,2" />
    
    <text x="30" y="90" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">"너가 오르면 난 떨어져!"</text>
    <rect x="-10" y="105" width="80" height="20" fill="#E3F2FD" rx="10" stroke="#90CAF9" />
    <text x="30" y="119" font-family="sans-serif" font-size="12" fill="#1976D2" font-weight="bold" text-anchor="middle">r ≈ -1.0</text>
  </g>

</svg>
