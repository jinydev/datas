<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">3단계: .drop() 불필요한 행/열 절단 수술</text>

  <!-- 1. 열(컬럼) 절단 (왼쪽) -->
  <g transform="translate(100, 100)">
    <rect x="-30" y="-30" width="220" height="200" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="80" y="-10" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">A. 열(세로축 선) 자르기 (axis=1)</text>

    <!-- 배경 데이터 -->
    <rect x="0" y="20" width="40" height="90" fill="#E3F2FD" rx="3" />
    <rect x="50" y="20" width="40" height="90" fill="#E3F2FD" rx="3" />
    <rect x="100" y="20" width="40" height="90" fill="#FFCDD2" rx="3" /> <!-- 타겟 열 -->
    
    <!-- 인덱스/컬럼 텍스트 가상 표시 -->
    <rect x="0" y="20" width="40" height="20" fill="#BBDEFB" rx="3" />
    <text x="20" y="34" font-family="sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle">수학</text>
    
    <!-- 잘라낼 '영어' 열 -->
    <rect x="100" y="20" width="40" height="20" fill="#EF9A9A" rx="3" />
    <text x="120" y="34" font-family="sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">영어</text>
    
    <!-- 가위 기호 & 절단선 -->
    <path d="M 85 130 L 115 20 L 125 20 M 115 130 L 115 20" stroke="#F44336" stroke-width="2" stroke-dasharray="3,3" />
    <text x="120" y="145" font-family="sans-serif" font-size="20" text-anchor="middle">✂️</text>
    <text x="155" y="140" font-family="sans-serif" font-size="10" fill="#D32F2F" font-weight="bold" text-anchor="middle">axis=1</text>
    
    <!-- 잘려나가는 애니메이션 묘사 -->
    <path d="M 120 70 L 150 70" fill="none" stroke="#F44336" stroke-width="2" stroke-dasharray="2,2" />
    <polygon points="145,67 155,70 145,73" fill="#F44336" />
    <text x="175" y="74" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">제거!</text>

    <!-- 코드 표시 -->
    <rect x="5" y="150" width="150" height="25" fill="#E3F2FD" rx="3" stroke="#90CAF9" />
    <text x="80" y="167" font-family="monospace" font-size="11" fill="#1565C0" font-weight="bold" text-anchor="middle">drop('영어', axis=1)</text>
  </g>

  <!-- 2. 행(로우) 절단 (오른쪽) -->
  <g transform="translate(420, 100)">
    <rect x="-30" y="-30" width="220" height="200" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="80" y="-10" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">B. 행(가로축 선) 자르기 (axis=0)</text>

    <!-- 배경 데이터 -->
    <rect x="0" y="20" width="140" height="20" fill="#FFCDD2" rx="3" /> <!-- 타겟 행 -->
    <rect x="0" y="50" width="140" height="20" fill="#E8F5E9" rx="3" />
    <rect x="0" y="80" width="140" height="20" fill="#E8F5E9" rx="3" />
    
    <!-- 인덱스/컬럼 텍스트 가상 표시 -->
    <!-- 잘라낼 '홍길동' 행 -->
    <rect x="-15" y="20" width="40" height="20" fill="#EF9A9A" rx="3" />
    <text x="5" y="34" font-family="sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">홍길동</text>

    <rect x="-15" y="50" width="40" height="20" fill="#C8E6C9" rx="3" />
    <text x="5" y="64" font-family="sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">이순신</text>
    
    <!-- 가위 기호 & 절단선 -->
    <path d="M -20 15 L 140 37 M -20 28 L 140 28" stroke="#F44336" stroke-width="2" stroke-dasharray="3,3" />
    <text x="160" y="35" font-family="sans-serif" font-size="20" text-anchor="middle">✂️</text>
    <text x="160" y="55" font-family="sans-serif" font-size="10" fill="#D32F2F" font-weight="bold" text-anchor="middle">axis=0</text>
    
    <!-- 잘려나가는 애니메이션 묘사 -->
    <path d="M 60 -5 L 60 -25" fill="none" stroke="#F44336" stroke-width="2" stroke-dasharray="2,2" />
    <polygon points="57,-20 60,-28 63,-20" fill="#F44336" />
    <text x="60" y="-35" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">제거!</text>

    <!-- 코드 표시 -->
    <rect x="5" y="150" width="150" height="25" fill="#E8F5E9" rx="3" stroke="#A5D6A7" />
    <text x="80" y="167" font-family="monospace" font-size="11" fill="#2E7D32" font-weight="bold" text-anchor="middle">drop('홍길동', axis=0)</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-290" y="-15" width="580" height="35" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#F57F17" font-weight="bold" text-anchor="middle">drop() 사용 시 반드시 axis (축) 방향을 명시해야 합니다. (0은 가로선 절단, 1은 세로선 절단)</text>
  </g>

</svg>
