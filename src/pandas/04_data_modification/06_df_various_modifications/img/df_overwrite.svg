<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: .loc / .iloc 단일 셀(Cell) 덮어쓰기</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="300" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="150" y="30" font-family="monospace" font-size="16" fill="#81C784" font-weight="bold" text-anchor="middle">df.loc[<tspan fill="#FFEB3B">'홍길동'</tspan>, <tspan fill="#4FC3F7">'수학'</tspan>] = <tspan fill="#FF5252">100</tspan></text>
  </g>

  <!-- 왼쪽: 수정 전 표 -->
  <g transform="translate(80, 150)">
    <rect x="-30" y="-10" width="160" height="120" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-width="2"/>
    <text x="50" y="-25" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">수정 전 원본</text>

    <!-- 인덱스와 컬럼 -->
    <rect x="25" y="10" width="80" height="20" fill="#ECEFF1" rx="3" />
    <text x="45" y="24" font-family="sans-serif" font-size="11" fill="#78909C" text-anchor="middle">수학</text>
    <text x="85" y="24" font-family="sans-serif" font-size="11" fill="#78909C" text-anchor="middle">영어</text>

    <rect x="-20" y="35" width="40" height="60" fill="#ECEFF1" rx="3" />
    <text x="0" y="55" font-family="sans-serif" font-size="11" fill="#78909C" text-anchor="middle">홍길동</text>
    <text x="0" y="80" font-family="sans-serif" font-size="11" fill="#78909C" text-anchor="middle">이순신</text>

    <!-- 값들 -->
    <rect x="30" y="40" width="30" height="20" fill="#FFF8E1" rx="3" stroke="#FFCA28" />
    <text x="45" y="55" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">80</text>
    
    <text x="85" y="55" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">90</text>
    <text x="45" y="80" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">70</text>
    <text x="85" y="80" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">85</text>
  </g>

  <!-- 중앙: 주사기/지우개 묘사 -->
  <g transform="translate(300, 190)">
    <!-- 지우고 새 값 투입하는 화살표 -->
    <path d="M -10 10 Q 30 -30 70 10 L 90 10" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="85,3 95,10 85,17" fill="#4CAF50" />
    
    <rect x="10" y="-45" width="40" height="25" fill="#E8F5E9" rx="5" stroke="#4CAF50" />
    <text x="30" y="-28" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">= 100</text>
    
    <text x="30" y="-60" font-family="sans-serif" font-size="10" fill="#1B5E20" font-weight="bold" text-anchor="middle">기존 80 파괴(덮어쓰기)</text>
  </g>

  <!-- 오른쪽: 수정 후 표 -->
  <g transform="translate(480, 150)">
    <rect x="-30" y="-10" width="160" height="120" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="50" y="-25" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">수정 후</text>

    <!-- 인덱스와 컬럼 -->
    <rect x="25" y="10" width="80" height="20" fill="#E8F5E9" rx="3" />
    <text x="45" y="24" font-family="sans-serif" font-size="11" fill="#388E3C" text-anchor="middle">수학</text>
    <text x="85" y="24" font-family="sans-serif" font-size="11" fill="#388E3C" text-anchor="middle">영어</text>

    <rect x="-20" y="35" width="40" height="60" fill="#E8F5E9" rx="3" />
    <text x="0" y="55" font-family="sans-serif" font-size="11" fill="#388E3C" text-anchor="middle">홍길동</text>
    <text x="0" y="80" font-family="sans-serif" font-size="11" fill="#388E3C" text-anchor="middle">이순신</text>

    <!-- 값들 -->
    <!-- 100으로 덮어써진 셀 -->
    <rect x="25" y="35" width="40" height="25" fill="#FFEBEE" rx="3" stroke="#F44336" stroke-width="2" />
    <text x="45" y="52" font-family="monospace" font-size="16" fill="#D32F2F" font-weight="bold" text-anchor="middle">100</text>
    <path d="M 55 25 L 85 -5" stroke="#F44336" stroke-width="2" stroke-dasharray="2,2" />
    <text x="95" y="-10" font-family="sans-serif" font-size="10" fill="#C62828" font-weight="bold">수정됨!!</text>
    
    <text x="85" y="55" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">90</text>
    <text x="45" y="80" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">70</text>
    <text x="85" y="80" font-family="monospace" font-size="14" fill="#546E7A" text-anchor="middle">85</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">좌표를 지정하여 추출하는 대신, = 로 값을 밀어넣으면 해당 위치가 강제로 교체됩니다.</text>
  </g>

</svg>
