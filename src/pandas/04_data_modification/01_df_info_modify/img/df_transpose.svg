<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.T : 모니터 보기에 최적화된 행렬 스윙 (Transpose)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="180" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="2"/>
    <text x="90" y="30" font-family="monospace" font-size="16" fill="#00BCD4" font-weight="bold" text-anchor="middle">df.describe().T</text>
  </g>

  <!-- 왼쪽 (세로로 길쭉한 원본) -->
  <g transform="translate(60, 130)">
    <!-- 가로로 좁고 세로로 엄청 긴 모양 -->
    <rect x="0" y="0" width="120" height="180" fill="#FFFFFF" rx="5" stroke="#BDBDBD" stroke-width="2"/>
    
    <!-- 컬럼명 -->
    <rect x="0" y="0" width="120" height="20" fill="#EEEEEE" rx="3" />
    <text x="40" y="14" font-family="sans-serif" font-size="10" fill="#757575" text-anchor="middle">사과</text>
    <text x="80" y="14" font-family="sans-serif" font-size="10" fill="#757575" text-anchor="middle">배</text>
    <text x="115" y="14" font-family="sans-serif" font-size="10" fill="#757575" text-anchor="middle">...</text>

    <!-- 인덱스명 -->
    <rect x="0" y="20" width="30" height="150" fill="#E0E0E0" rx="3" />
    <text x="15" y="40" font-family="monospace" font-size="10" fill="#616161" text-anchor="middle">c</text>
    <text x="15" y="60" font-family="monospace" font-size="10" fill="#616161" text-anchor="middle">m</text>
    <text x="15" y="80" font-family="monospace" font-size="10" fill="#616161" text-anchor="middle">s</text>
    <text x="15" y="100" font-family="monospace" font-size="10" fill="#616161" text-anchor="middle">min</text>
    <text x="15" y="120" font-family="monospace" font-size="10" fill="#616161" text-anchor="middle">25%</text>
    <text x="15" y="140" font-family="monospace" font-size="10" fill="#616161" text-anchor="middle">50%</text>
    <text x="15" y="160" font-family="monospace" font-size="10" fill="#616161" text-anchor="middle">max</text>
    
    <text x="60" y="-10" font-family="sans-serif" font-size="12" fill="#757575" font-weight="bold" text-anchor="middle">열이 많으면 짤림!</text>

    <!-- 값 예시 생략 -->
    <text x="75" y="100" font-family="sans-serif" font-size="24" fill="#BDBDBD" font-weight="bold" text-anchor="middle">...</text>
  </g>

  <!-- 피벗 스윙 애니메이션 화살표 -->
  <g transform="translate(230, 200)">
    <path d="M 0 0 Q 35 -60 70 0" fill="none" stroke="#00BCD4" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="65,-7 75,0 65,7" fill="#00BCD4" transform="rotate(35 70 0)" />
    <text x="35" y="-40" font-family="sans-serif" font-size="14" fill="#0097A7" font-weight="bold" text-anchor="middle">휙! (뒤집기)</text>
  </g>

  <!-- 오른쪽 (가로로 길쭉해져서 보기 편한 모양) -->
  <g transform="translate(360, 160)">
    <rect x="0" y="0" width="280" height="100" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="2"/>
    
    <!-- 컬럼명이 된 통계 지표들 (가로로 길게) -->
    <rect x="0" y="0" width="280" height="20" fill="#B2EBF2" rx="3" stroke="#80DEEA"/>
    <text x="40" y="14" font-family="monospace" font-size="10" fill="#006064" font-weight="bold" text-anchor="middle">count</text>
    <text x="80" y="14" font-family="monospace" font-size="10" fill="#006064" font-weight="bold" text-anchor="middle">mean</text>
    <text x="120" y="14" font-family="monospace" font-size="10" fill="#006064" font-weight="bold" text-anchor="middle">std</text>
    <text x="160" y="14" font-family="monospace" font-size="10" fill="#006064" font-weight="bold" text-anchor="middle">min</text>
    <text x="195" y="14" font-family="monospace" font-size="10" fill="#006064" font-weight="bold" text-anchor="middle">25%</text>
    <text x="230" y="14" font-family="monospace" font-size="10" fill="#006064" font-weight="bold" text-anchor="middle">50%</text>
    <text x="260" y="14" font-family="monospace" font-size="10" fill="#006064" font-weight="bold" text-anchor="middle">max</text>

    <!-- 인덱스명이 된 기존 컬럼들 -->
    <rect x="0" y="20" width="30" height="80" fill="#E0F7FA" rx="3" />
    <text x="15" y="45" font-family="sans-serif" font-size="11" fill="#00838F" font-weight="bold" text-anchor="middle">사과</text>
    <text x="15" y="75" font-family="sans-serif" font-size="11" fill="#00838F" font-weight="bold" text-anchor="middle">배</text>

    <!-- 값 예시 생략 -->
    <text x="140" y="60" font-family="sans-serif" font-size="24" fill="#B2EBF2" font-weight="bold" text-anchor="middle">...</text>

    <text x="140" y="-10" font-family="sans-serif" font-size="14" fill="#0097A7" font-weight="bold" text-anchor="middle">모니터 너비에 맞게 최적화됨</text>
  </g>

</svg>
