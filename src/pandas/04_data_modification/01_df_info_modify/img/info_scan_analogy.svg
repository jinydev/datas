<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 판다스 병원의 기초 건강검진 리포트</text>

  <!-- Patient (DataFrame) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="120" height="120" fill="#fff" stroke="#90caf9" stroke-width="3" rx="10" filter="drop-shadow(2px 3px 4px rgba(0,0,0,0.15))"/>
    <rect x="20" y="-15" width="80" height="30" fill="#90caf9" rx="15"/>
    <text x="60" y="5" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">환자 (Data)</text>
    
    <!-- CSV Body -->
    <line x1="20" y1="40" x2="100" y2="40" stroke="#ccc" stroke-width="2"/>
    <line x1="20" y1="60" x2="100" y2="60" stroke="#ccc" stroke-width="2"/>
    <line x1="20" y1="80" x2="100" y2="80" stroke="#ccc" stroke-width="2"/>
    <line x1="20" y1="100" x2="100" y2="100" stroke="#ccc" stroke-width="2"/>
  </g>

  <!-- Top Right: X-Ray (.info) -->
  <g transform="translate(300, 50)">
    <rect x="0" y="0" width="280" height="80" fill="#e1f5fe" stroke="#0288d1" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="280" height="25" fill="#81d4fa" rx="3"/>
    
    <!-- Icon -->
    <circle cx="20" cy="12" r="8" fill="#fff"/>
    <text x="20" y="16" font-family="Arial" font-size="12" font-weight="bold" fill="#0288d1" text-anchor="middle">뼈</text>

    <text x="140" y="17" font-family="Arial" font-size="14" font-weight="bold" fill="#01579b" text-anchor="middle">엑스레이 촬영실 (.info)</text>

    <!-- Diagnosis -->
    <text x="20" y="45" font-family="Arial" font-size="12" fill="#333">🩺 "뼈대가 몇 개(Columns) 인가요?"</text>
    <text x="20" y="65" font-family="Arial" font-size="12" fill="#333">🩺 "비어있는(Null) 골절 부위는 없나요?"</text>
  </g>

  <!-- Bottom Right: Vitals (.describe) -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="280" height="80" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="280" height="25" fill="#a5d6a7" rx="3"/>

    <!-- Icon -->
    <path d="M 12 15 L 17 15 L 20 5 L 23 20 L 26 15 L 30 15" stroke="#fff" stroke-width="2" fill="none"/>

    <text x="140" y="17" font-family="Arial" font-size="14" font-weight="bold" fill="#1b5e20" text-anchor="middle">기초 생체신호 측정실 (.describe)</text>

    <!-- Diagnosis -->
    <text x="20" y="45" font-family="Arial" font-size="12" fill="#333">📊 "평균(Mean) 혈압은 얼마인가요?"</text>
    <text x="20" y="65" font-family="Arial" font-size="12" fill="#333">📊 "최고/최저(Max/Min) 심박수는요?"</text>
  </g>

  <!-- Connecting Lines -->
  <g stroke="#90caf9" stroke-width="3" stroke-dasharray="4,4" fill="none">
    <path d="M 180 140 C 240 140, 240 90, 300 90" />
    <path d="M 180 140 C 240 140, 240 190, 300 190" />
  </g>

  <circle cx="180" cy="140" r="5" fill="#1565c0"/>

</svg>
