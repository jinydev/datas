<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: .sort_values() 특정 열(Column)의 수치 기준 정렬</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="350" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="175" y="30" font-family="monospace" font-size="16" fill="#81D4FA" font-weight="bold" text-anchor="middle">df.sort_values(by=<tspan fill="#FFEB3B">'사고(건)'</tspan>)</text>
  </g>

  <!-- 원본 표 (뒤죽박죽) -->
  <g transform="translate(60, 140)">
    <!-- 테이블 배경 -->
    <rect x="-30" y="0" width="200" height="130" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-width="2"/>
    <text x="70" y="-10" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">원본 표 (섞임)</text>
    
    <!-- 인덱스 (희미하게) -->
    <rect x="0" y="30" width="60" height="90" fill="#ECEFF1" rx="3" stroke="#CFD8DC" />
    <text x="30" y="50" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">5월</text>
    <text x="30" y="75" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">1월</text>
    <text x="30" y="100" font-family="sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">3월</text>

    <!-- 타겟 열: '사고(건)' 강조 -->
    <rect x="70" y="10" width="40" height="110" fill="#E3F2FD" rx="3" stroke="#2196F3" stroke-width="2"/>
    <text x="90" y="24" font-family="sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">사고(건)</text>
    
    <text x="90" y="50" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">239</text>
    <text x="90" y="75" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">192</text>
    <text x="90" y="100" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">217</text>

    <!-- 다른 데이터 (희미하게) -->
    <rect x="120" y="35" width="20" height="15" fill="#ECEFF1" rx="2" />
    <rect x="150" y="35" width="20" height="15" fill="#ECEFF1" rx="2" />
    
    <rect x="120" y="60" width="20" height="15" fill="#E8EAF6" rx="2" />
    <rect x="150" y="60" width="20" height="15" fill="#E8EAF6" rx="2" />

    <rect x="120" y="85" width="20" height="15" fill="#F1F8E9" rx="2" />
    <rect x="150" y="85" width="20" height="15" fill="#F1F8E9" rx="2" />
  </g>

  <!-- 재정렬 변환 화살표 과정 -->
  <g transform="translate(290, 180)">
    <!-- 192 (1월) 위로 -->
    <path d="M 0 20 Q 30 -30 70 -30 L 100 -30" fill="none" stroke="#64B5F6" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="90,-35 105,-30 90,-25" fill="#64B5F6" />
    
    <!-- 217 (3월) 중앙 -->
    <path d="M 0 40 Q 30 0 70 0 L 100 0" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="90,-5 105,0 90,5" fill="#2196F3" />
    
    <!-- 239 (5월) 아래로 -->
    <path d="M 0 -10 Q 30 30 70 30 L 100 30" fill="none" stroke="#1976D2" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="90,25 105,30 90,35" fill="#1976D2" />

    <text x="50" y="-45" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">작은 수부터 차례로</text>
  </g>

  <!-- 변환 후 결과표 (예쁘게 정렬됨) -->
  <g transform="translate(450, 140)">
    <rect x="-30" y="0" width="200" height="130" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="70" y="-10" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">정렬 후 DataFrame</text>
    
    <!-- 인덱스 (이끌려옴) -->
    <rect x="0" y="30" width="60" height="90" fill="#ECEFF1" rx="3" stroke="#CFD8DC" />
    <text x="30" y="50" font-family="sans-serif" font-size="12" fill="#78909C" font-weight="bold" text-anchor="middle">1월</text>
    <text x="30" y="75" font-family="sans-serif" font-size="12" fill="#78909C" font-weight="bold" text-anchor="middle">3월</text>
    <text x="30" y="100" font-family="sans-serif" font-size="12" fill="#78909C" font-weight="bold" text-anchor="middle">5월</text>

    <!-- 타겟 열: '사고(건)' 정렬 완료 -->
    <rect x="70" y="10" width="40" height="110" fill="#E3F2FD" rx="3" stroke="#2196F3" stroke-width="2"/>
    <text x="90" y="24" font-family="sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">사고(건)</text>
    
    <text x="90" y="50" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">192</text>
    <text x="90" y="75" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">217</text>
    <text x="90" y="100" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">239</text>

    <!-- 다른 데이터들 (책갈피처럼 따라감) -->
    <rect x="120" y="35" width="20" height="15" fill="#E8EAF6" rx="2" />
    <rect x="150" y="35" width="20" height="15" fill="#E8EAF6" rx="2" />
    
    <rect x="120" y="60" width="20" height="15" fill="#F1F8E9" rx="2" />
    <rect x="150" y="60" width="20" height="15" fill="#F1F8E9" rx="2" />

    <rect x="120" y="85" width="20" height="15" fill="#ECEFF1" rx="2" />
    <rect x="150" y="85" width="20" height="15" fill="#ECEFF1" rx="2" />
    
    <!-- 연결선 하이라이트 (데이터도 같이 묶여 있음 강조) -->
    <rect x="-5" y="27" width="180" height="25" fill="none" stroke="#E8EAF6" stroke-width="2" />
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E3F2FD" rx="10" stroke="#2196F3" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">내부의 실제 특정 열(값)을 기준으로 레코드 전체를 상하로 줄 세웁니다.</text>
  </g>

</svg>
