<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: .sort_index() 인덱스(행 라벨) 오름차순 정렬</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="300" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="150" y="30" font-family="monospace" font-size="18" fill="#81C784" font-weight="bold" text-anchor="middle">df.sort_index()</text>
  </g>

  <!-- 원본 표 (뒤죽박죽) -->
  <g transform="translate(60, 140)">
    <!-- 테이블 배경 -->
    <rect x="-30" y="0" width="200" height="130" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-width="2"/>
    <text x="70" y="-10" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">원본 표 (섞임)</text>
    
    <!-- 인덱스 (포커스) -->
    <rect x="0" y="30" width="60" height="90" fill="#FFF3E0" rx="3" stroke="#FF9800" />
    <text x="30" y="50" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">5월</text>
    <text x="30" y="75" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">1월</text>
    <text x="30" y="100" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">3월</text>

    <!-- 다른 데이터들 -->
    <!-- 5월 데이터 세트 -->
    <rect x="70" y="35" width="25" height="15" fill="#ECEFF1" rx="2" />
    <rect x="105" y="35" width="25" height="15" fill="#ECEFF1" rx="2" />
    <rect x="140" y="35" width="25" height="15" fill="#ECEFF1" rx="2" />
    
    <!-- 1월 데이터 세트 -->
    <rect x="70" y="60" width="25" height="15" fill="#E8EAF6" rx="2" />
    <rect x="105" y="60" width="25" height="15" fill="#E8EAF6" rx="2" />
    <rect x="140" y="60" width="25" height="15" fill="#E8EAF6" rx="2" />

    <!-- 3월 데이터 세트 -->
    <rect x="70" y="85" width="25" height="15" fill="#F1F8E9" rx="2" />
    <rect x="105" y="85" width="25" height="15" fill="#F1F8E9" rx="2" />
    <rect x="140" y="85" width="25" height="15" fill="#F1F8E9" rx="2" />
  </g>

  <!-- 재정렬 변환 화살표 과정 -->
  <g transform="translate(290, 180)">
    <!-- 1월 위로 -->
    <path d="M 0 20 Q 30 -30 70 -30 L 100 -30" fill="none" stroke="#2E7D32" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="90,-35 105,-30 90,-25" fill="#2E7D32" />
    
    <!-- 3월 중앙 -->
    <path d="M 0 40 Q 30 0 70 0 L 100 0" fill="none" stroke="#4CAF50" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="90,-5 105,0 90,5" fill="#4CAF50" />
    
    <!-- 5월 아래로 -->
    <path d="M 0 -10 Q 30 30 70 30 L 100 30" fill="none" stroke="#81C784" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="90,25 105,30 90,35" fill="#81C784" />

    <text x="50" y="-45" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">가나다 오름차순</text>
  </g>

  <!-- 변환 후 결과표 (예쁘게 정렬됨) -->
  <g transform="translate(450, 140)">
    <rect x="-30" y="0" width="200" height="130" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="70" y="-10" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">정렬 후 DataFrame</text>
    
    <!-- 정렬된 인덱스 -->
    <rect x="0" y="30" width="60" height="90" fill="#E8F5E9" rx="3" stroke="#4CAF50" />
    <text x="30" y="50" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">1월</text>
    <text x="30" y="75" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">3월</text>
    <text x="30" y="100" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">5월</text>

    <!-- 다른 데이터들 (책갈피처럼 따라감) -->
    <!-- 1월 데이터 세트 -->
    <rect x="70" y="35" width="25" height="15" fill="#E8EAF6" rx="2" />
    <rect x="105" y="35" width="25" height="15" fill="#E8EAF6" rx="2" />
    <rect x="140" y="35" width="25" height="15" fill="#E8EAF6" rx="2" />

    <!-- 3월 데이터 세트 -->
    <rect x="70" y="60" width="25" height="15" fill="#F1F8E9" rx="2" />
    <rect x="105" y="60" width="25" height="15" fill="#F1F8E9" rx="2" />
    <rect x="140" y="60" width="25" height="15" fill="#F1F8E9" rx="2" />

    <!-- 5월 데이터 세트 -->
    <rect x="70" y="85" width="25" height="15" fill="#ECEFF1" rx="2" />
    <rect x="105" y="85" width="25" height="15" fill="#ECEFF1" rx="2" />
    <rect x="140" y="85" width="25" height="15" fill="#ECEFF1" rx="2" />
    
    <!-- 연결선 하이라이트 (데이터도 같이! 표시) -->
    <rect x="-5" y="27" width="180" height="25" fill="none" stroke="#E8EAF6" stroke-width="2" />
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">좌측 기준이 되는 문자열을 오름차순 정렬할 때 값들도 행 단위로 묶여서 이동합니다.</text>
  </g>

</svg>
