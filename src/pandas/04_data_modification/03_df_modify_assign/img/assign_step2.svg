<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: 조립된 부품(Series)을 원본에 새 열(Column)로 끼워넣기</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="350" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="175" y="30" font-family="monospace" font-size="16" fill="#81C784" font-weight="bold" text-anchor="middle">df2[<tspan fill="#FFEB3B">'재해자수'</tspan>] = casualties</text>
  </g>

  <!-- 좌측 원본 표의 확장 묘사 -->
  <g transform="translate(100, 150)">
    <rect x="-30" y="-10" width="160" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#CFD8DC" stroke-width="2"/>
    <text x="60" y="-25" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">원본 표 영역</text>
    
    <!-- 기존 열 영역 -->
    <rect x="40" y="20" width="80" height="25" fill="#E3F2FD" rx="3" />
    <rect x="40" y="55" width="80" height="15" fill="#BBDEFB" rx="3" />
    <rect x="40" y="80" width="80" height="15" fill="#BBDEFB" rx="3" />
    <rect x="40" y="105" width="80" height="15" fill="#BBDEFB" rx="3" />
    
    <text x="80" y="37" font-family="sans-serif" font-size="12" fill="#1565C0" text-anchor="middle">기존 열들</text>

    <!-- 새 빈칸 개척 스르륵 효과 -->
    <rect x="130" y="-10" width="70" height="150" fill="#F1F8E9" rx="5" stroke="#A5D6A7" stroke-dasharray="4,4" />
    <rect x="140" y="20" width="50" height="25" fill="#C8E6C9" rx="3" stroke="#4CAF50" stroke-width="2"/>
    <text x="165" y="37" font-family="sans-serif" font-size="10" fill="#1B5E20" font-weight="bold" text-anchor="middle">재해자수</text>
    
    <text x="165" y="-25" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">새 방 개설</text>
  </g>

  <!-- 부품 날아오는 화살표 -->
  <path d="M 400 230 L 290 230" fill="none" stroke="#4CAF50" stroke-width="5" stroke-dasharray="6,4" />
  <polygon points="295,223 285,230 295,237" fill="#4CAF50" />
  <text x="345" y="215" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">쏙 들어감!</text>

  <!-- 시리즈 부품 덩어리 대기중 -->
  <g transform="translate(420, 160)">
    <rect x="0" y="0" width="60" height="110" fill="#FFF8E1" rx="5" filter="url(#shadow)" stroke="#FFB300" stroke-width="2"/>
    <text x="30" y="-10" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle"> casualties 데이터 (값)</text>

    <text x="30" y="25" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">392</text>
    <text x="30" y="50" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">334</text>
    <text x="30" y="75" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">442</text>
    <text x="30" y="95" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">426</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">= (할당연산자) 를 쓰면, 인덱스(행) 줄이 딱 맞게 빈 공간에 블록처럼 끼워집니다.</text>
  </g>

</svg>
