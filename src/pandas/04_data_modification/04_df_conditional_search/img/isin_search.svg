<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">2단계: .isin([리스트]) 타겟 명단 한번에 조회</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="350" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="175" y="30" font-family="monospace" font-size="16" fill="#81C784" font-weight="bold" text-anchor="middle">df[ df[<tspan fill="#FFEB3B">'사망'</tspan>].isin([<tspan fill="#FFEB3B">5, 7, 13</tspan>]) ]</text>
  </g>

  <!-- 원본 테이블에서 '사망' 열 검사 과정 -->
  <g transform="translate(60, 130)">
    <!-- 테이블 배경 -->
    <rect x="0" y="0" width="220" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#B0BEC5" stroke-width="2"/>
    <text x="110" y="-10" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">원본 DataFrame</text>
    
    <!-- 인덱스 -->
    <rect x="10" y="30" width="60" height="110" fill="#ECEFF1" rx="3" />
    <text x="40" y="50" font-family="sans-serif" font-size="10" fill="#78909C" text-anchor="middle">1월</text>
    <text x="40" y="75" font-family="sans-serif" font-size="10" fill="#78909C" text-anchor="middle">2월</text>
    <text x="40" y="100" font-family="sans-serif" font-size="10" fill="#78909C" text-anchor="middle">3월</text>
    <text x="40" y="125" font-family="sans-serif" font-size="10" fill="#78909C" text-anchor="middle">5월</text>

    <!-- 다른 데이터 (희미하게) -->
    <rect x="80" y="10" width="40" height="20" fill="#ECEFF1" rx="3" />
    <text x="100" y="24" font-family="sans-serif" font-size="10" fill="#B0BEC5" text-anchor="middle">사고</text>
    <text x="100" y="50" font-family="monospace" font-size="10" fill="#B0BEC5" text-anchor="middle">192</text>
    <text x="100" y="75" font-family="monospace" font-size="10" fill="#B0BEC5" text-anchor="middle">174</text>
    <text x="100" y="100" font-family="monospace" font-size="10" fill="#B0BEC5" text-anchor="middle">217</text>
    <text x="100" y="125" font-family="monospace" font-size="10" fill="#B0BEC5" text-anchor="middle">239</text>

    <!-- 타겟 '사망' 데이터 (강조) -->
    <rect x="130" y="10" width="40" height="20" fill="#FFE0B2" rx="3" stroke="#FF9800" stroke-width="2"/>
    <text x="150" y="24" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">사망</text>
    
    <text x="150" y="50" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">5</text>
    <text x="150" y="75" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">6</text>
    <text x="150" y="100" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">7</text>
    <text x="150" y="125" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">13</text>
  </g>

  <!-- VIP 대조 로직 (마스크 생성) -->
  <g transform="translate(300, 160)">
    <!-- 타겟 리스트 박스 -->
    <rect x="0" y="-10" width="70" height="80" fill="#E8F5E9" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2" />
    <text x="35" y="10" font-family="monospace" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">VIP List</text>
    <text x="35" y="30" font-family="monospace" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">[5]</text>
    <text x="35" y="50" font-family="monospace" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">[7]</text>
    <text x="35" y="70" font-family="monospace" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">[13]</text>

    <!-- 대조 연결선 -->
    <!-- 1월 (5) -->
    <path d="M -15 20 L 0 30" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="3,3" />
    <!-- 2월 (6) -> 실패 -->
    <path d="M -15 45 L 35 150" fill="none" stroke="#F44336" stroke-width="2" stroke-dasharray="3,3" />
    <!-- 3월 (7) -->
    <path d="M -15 70 L 0 50" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="3,3" />
    <!-- 4월 (13) -->
    <path d="M -15 95 L 0 70" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="3,3" />

    <!-- 마스크 결과 (True/False) -->
    <rect x="90" y="-20" width="50" height="110" fill="#FFFFFF" rx="3" stroke="#BDBDBD" />
    <text x="115" y="-5" font-family="sans-serif" font-size="10" fill="#757575" text-anchor="middle">통과?</text>
    
    <text x="115" y="20" font-family="monospace" font-size="12" fill="#4CAF50" font-weight="bold" text-anchor="middle">True</text>
    <text x="115" y="45" font-family="monospace" font-size="12" fill="#F44336" font-weight="bold" text-anchor="middle">False</text>
    <text x="115" y="70" font-family="monospace" font-size="12" fill="#4CAF50" font-weight="bold" text-anchor="middle">True</text>
    <text x="115" y="95" font-family="monospace" font-size="12" fill="#4CAF50" font-weight="bold" text-anchor="middle">True</text>
  </g>

  <!-- 최종 필터링된 결과물 -->
  <g transform="translate(480, 150)">
    <path d="M -20 50 L 10 50" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="8,4" />
    <polygon points="5,43 15,50 5,57" fill="#2196F3" />
    
    <rect x="25" y="0" width="160" height="110" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="105" y="-10" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">결과 (False인 2월 탈락)</text>

    <!-- 인덱스 -->
    <rect x="35" y="20" width="50" height="80" fill="#E3F2FD" rx="3" />
    <text x="60" y="40" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">1월</text>
    <text x="60" y="65" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">3월</text>
    <text x="60" y="90" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">5월</text>

    <!-- 사망데이터 -->
    <rect x="100" y="20" width="40" height="80" fill="#FFF3E0" rx="3" />
    <text x="120" y="40" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">5</text>
    <text x="120" y="65" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">7</text>
    <text x="120" y="90" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">13</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">리스트 안에 있는 숫자에 하나라도 해당하면 행 전체를 무사통과시킵니다.</text>
  </g>

</svg>
