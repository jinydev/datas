<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">3단계: 혼합 다중 검색 (OR 논리 회로 시각화)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="580" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#E91E63" stroke-width="2"/>
    <text x="290" y="30" font-family="monospace" font-size="16" fill="#FFF" font-weight="bold" text-anchor="middle">df[ <tspan fill="#64B5F6">(조건A)</tspan> <tspan fill="#E91E63">|</tspan> <tspan fill="#81C784">(조건B)</tspan> ]</text>
  </g>

  <!-- 조건 A 블록 (사망 7명) -->
  <g transform="translate(100, 140)">
    <rect x="0" y="0" width="140" height="120" fill="#E3F2FD" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="70" y="25" font-family="sans-serif" font-size="12" fill="#0D47A1" font-weight="bold" text-anchor="middle">조건 A: 사망 == 7명</text>
    
    <!-- 마스크 결과 -->
    <rect x="30" y="40" width="80" height="70" fill="#FFFFFF" rx="3" />
    <text x="70" y="55" font-family="monospace" font-size="12" fill="#F44336" text-anchor="middle">1월: False</text>
    <text x="70" y="70" font-family="monospace" font-size="12" fill="#F44336" text-anchor="middle">2월: False</text>
    <text x="70" y="85" font-family="monospace" font-size="12" fill="#1976D2" font-weight="bold" text-anchor="middle">3월: True</text>
    <text x="70" y="100" font-family="monospace" font-size="12" fill="#F44336" text-anchor="middle">5월: False</text>
  </g>

  <!-- 파이프선과 OR 게이트 기호 -->
  <g transform="translate(260, 180)">
    <!-- 파이프 선 A -->
    <path d="M -20 -10 L 40 10" fill="none" stroke="#2196F3" stroke-width="3" />
    <!-- 파이프 선 B -->
    <path d="M -20 50 L 40 30" fill="none" stroke="#4CAF50" stroke-width="3" />

    <!-- 논리합(OR) 게이트 도형 (간략화된 활 모양) -->
    <path d="M 40 -10 Q 50 20 40 50 Q 80 50 100 20 Q 80 -10 40 -10 Z" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" />
    <text x="65" y="25" font-family="sans-serif" font-size="16" fill="#C2185B" font-weight="bold" text-anchor="middle">OR</text>
    
    <!-- 게이트 출력선 -->
    <path d="M 100 20 L 140 20" fill="none" stroke="#E91E63" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="135,13 145,20 135,27" fill="#E91E63" />
  </g>

  <!-- 조건 B 블록 (부상 500 이상) -->
  <g transform="translate(100, 200)">
    <!-- 뒤로 겹쳐서 입체감 줌 (여기선 Y축을 내려서 배치) -->
  </g>
  <g transform="translate(100, 280)"> <!-- 원래 공간 부족해서 재배치 -->
    <!-- 조건 A와 나란히 배치하기 위해 위로 올림 -->
  </g>
  
  <!-- 조건 B 실제 위치 재지정 -->
  <g transform="translate(100, 280)">
    <rect x="0" y="-140" width="140" height="120" fill="#E8F5E9" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2" transform="translate(0, 140)"/>
    <text x="70" y="25" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">조건 B: 부상 > 500명</text>
    
    <rect x="30" y="40" width="80" height="70" fill="#FFFFFF" rx="3" />
    <text x="70" y="55" font-family="monospace" font-size="12" fill="#F44336" text-anchor="middle">1월: False</text>
    <text x="70" y="70" font-family="monospace" font-size="12" fill="#F44336" text-anchor="middle">2월: False</text>
    <text x="70" y="85" font-family="monospace" font-size="12" fill="#F44336" text-anchor="middle">3월: False</text>
    <!-- 조건 B에서 통과한 5월! -->
    <text x="70" y="100" font-family="monospace" font-size="12" fill="#1976D2" font-weight="bold" text-anchor="middle">5월: True</text>
  </g>


  <!-- 최종 마스크 합집합 결과 (OR 처리된 마스크) -->
  <g transform="translate(420, 140)">
    <rect x="-10" y="0" width="220" height="120" fill="#FFF" rx="5" filter="url(#shadow)" stroke="#E91E63" stroke-width="2"/>
    <text x="100" y="25" font-family="sans-serif" font-size="12" fill="#C2185B" font-weight="bold" text-anchor="middle">최종 합집합 도출 (판별)</text>
    
    <!-- 1월, 2월은 둘다 X -->
    <text x="100" y="50" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">1월: F | F  = 거절</text>
    <text x="100" y="65" font-family="sans-serif" font-size="12" fill="#757575" text-anchor="middle">2월: F | F  = 거절</text>
    
    <!-- 3월은 A덕에 통과, 5월은 B덕에 통과! -->
    <rect x="15" y="75" width="170" height="15" fill="#FCE4EC" rx="3" />
    <text x="100" y="87" font-family="sans-serif" font-size="13" fill="#E65100" font-weight="bold" text-anchor="middle">3월: T | F  =>  통과 (조건A 승)</text>
    
    <rect x="15" y="95" width="170" height="15" fill="#FCE4EC" rx="3" />
    <text x="100" y="107" font-family="sans-serif" font-size="13" fill="#E65100" font-weight="bold" text-anchor="middle">5월: F | T  =>  통과 (조건B 승)</text>
  </g>

</svg>
