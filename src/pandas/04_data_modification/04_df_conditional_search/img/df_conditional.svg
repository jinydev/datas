<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.isin() 과 .str.contains() : 고급 검색 스캐너</text>

  <!-- 1. isin() 비유: VIP 명단 대조 -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="260" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="130" y="25" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">A. VIP 명단 검색 (.isin)</text>
    
    <!-- 명단 보드 -->
    <rect x="20" y="40" width="80" height="110" fill="#E8F5E9" rx="3" stroke="#A5D6A7"/>
    <text x="60" y="60" font-family="sans-serif" font-size="12" fill="#1B5E20" font-weight="bold" text-anchor="middle">VIP List</text>
    <text x="60" y="85" font-family="monospace" font-size="16" fill="#D32F2F" font-weight="bold" text-anchor="middle">5</text>
    <text x="60" y="110" font-family="monospace" font-size="16" fill="#D32F2F" font-weight="bold" text-anchor="middle">7</text>
    <text x="60" y="135" font-family="monospace" font-size="16" fill="#D32F2F" font-weight="bold" text-anchor="middle">13</text>

    <!-- 들어오는 손님들 대조 -->
    <path d="M 120 80 L 160 80" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="3,3" />
    <path d="M 120 105 L 160 105" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="3,3" />

    <rect x="170" y="40" width="70" height="25" fill="#C8E6C9" rx="3" />
    <text x="205" y="57" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">손님 5 (통과)</text>
    
    <rect x="170" y="70" width="70" height="25" fill="#FFEBEE" rx="3" />
    <text x="205" y="87" font-family="sans-serif" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">손님 6 (거절)</text>

    <rect x="170" y="100" width="70" height="25" fill="#C8E6C9" rx="3" />
    <text x="205" y="117" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">손님 7 (통과)</text>
  </g>

  <!-- 2. str.contains() 비유: 키워드 스캐너 -->
  <g transform="translate(380, 100)">
    <rect x="0" y="0" width="260" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#2196F3" stroke-width="2"/>
    <text x="130" y="25" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">B. 키워드 스캐닝 (.str.contains)</text>
    
    <!-- 돋보기 스캐너 -->
    <circle cx="60" cy="90" r="30" fill="#E3F2FD" stroke="#1E88E5" stroke-width="3" />
    <path d="M 80 110 L 100 130" fill="none" stroke="#1E88E5" stroke-width="6" stroke-linecap="round" />
    <text x="60" y="95" font-family="sans-serif" font-size="18" fill="#1565C0" font-weight="bold" text-anchor="middle">"3"</text>

    <!-- 문자열 데이터들 -->
    <!-- 통과하는 문자열 -->
    <rect x="110" y="45" width="130" height="30" fill="#FFF3E0" rx="3" />
    <text x="175" y="65" font-family="sans-serif" font-size="14" fill="#E65100" text-anchor="middle">2016년 <tspan font-weight="bold" fill="#D32F2F">3</tspan>월</text>
    
    <!-- 통과 못하는 문자열 -->
    <rect x="110" y="85" width="130" height="30" fill="#ECEFF1" rx="3" />
    <text x="175" y="105" font-family="sans-serif" font-size="14" fill="#90A4AE" text-anchor="middle">2016년 4월</text>

    <!-- 통과하는 문자열 2 -->
    <rect x="110" y="125" width="130" height="30" fill="#FFF3E0" rx="3" />
    <text x="175" y="145" font-family="sans-serif" font-size="14" fill="#E65100" text-anchor="middle"><tspan font-weight="bold" fill="#D32F2F">3</tspan>월 15일</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">수많은 == 연산을 한 방에 해결하거나, 문자열 내부를 정밀 스캔할 수 있습니다.</text>
  </g>

</svg>
