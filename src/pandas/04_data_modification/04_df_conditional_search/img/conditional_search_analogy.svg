<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: VIP 명단 대조와 키워드 스캐너</text>

  <!-- Left: VIP List (.isin) -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#90caf9" stroke-width="2" rx="10" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    
    <text x="110" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">VIP 클럽 입장 체크 (.isin)</text>

    <!-- Clipboard / VIP List -->
    <rect x="15" y="45" width="80" height="90" fill="#fff3e0" stroke="#ffb74d" rx="3"/>
    <line x1="30" y1="40" x2="80" y2="40" stroke="#ccc" stroke-width="4"/>
    <text x="55" y="60" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">VIP 명단</text>
    <text x="55" y="80" font-family="Arial" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">5, 7, 13</text>

    <!-- Bouncer checking -->
    <path d="M 150 70 Q 130 90 100 90" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow-gray)"/>

    <!-- Guests -->
    <circle cx="170" cy="50" r="10" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="170" y="54" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20" text-anchor="middle">7</text>
    <text x="200" y="54" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">통과!</text>

    <circle cx="170" cy="85" r="10" fill="#ffcdd2" stroke="#d32f2f"/>
    <text x="170" y="89" font-family="Arial" font-size="10" font-weight="bold" fill="#b71c1c" text-anchor="middle">6</text>
    <text x="200" y="89" font-family="Arial" font-size="12" font-weight="bold" fill="#c62828">탈락</text>

    <circle cx="170" cy="120" r="10" fill="#c8e6c9" stroke="#388e3c"/>
    <text x="170" y="124" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20" text-anchor="middle">13</text>
    <text x="200" y="124" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">통과!</text>
  </g>

  <!-- Right: Magnifying Glass (.str.contains) -->
  <g transform="translate(350, 60)">
    <rect x="0" y="0" width="220" height="150" fill="#fff" stroke="#ffb74d" stroke-width="2" rx="10" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    
    <text x="110" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">문서 키워드 스캐너 (.contains)</text>

    <!-- Documents -->
    <rect x="30" y="50" width="100" height="80" fill="#f5f5f5" stroke="#ccc" rx="2"/>
    <line x1="40" y1="65" x2="120" y2="65" stroke="#ddd" stroke-width="2"/>
    <line x1="40" y1="75" x2="120" y2="75" stroke="#ddd" stroke-width="2"/>
    <line x1="40" y1="85" x2="120" y2="85" stroke="#ddd" stroke-width="2"/>
    <line x1="40" y1="95" x2="120" y2="95" stroke="#ddd" stroke-width="2"/>
    <line x1="40" y1="105" x2="120" y2="105" stroke="#ddd" stroke-width="2"/>

    <!-- Hidden Keyword -->
    <rect x="80" y="80" width="20" height="10" fill="#ffb74d" opacity="0.4"/>
    <text x="90" y="88" font-family="Arial" font-size="10" font-weight="bold" fill="#d84315" text-anchor="middle">3</text>

    <!-- Magnifying Glass -->
    <circle cx="90" cy="85" r="25" fill="none" stroke="#29b6f6" stroke-width="4"/>
    <circle cx="90" cy="85" r="20" fill="#e1f5fe" opacity="0.3"/>
    <line x1="107" y1="102" x2="130" y2="125" stroke="#1565c0" stroke-width="6" stroke-linecap="round"/>

    <!-- Sparkle/Alert -->
    <path d="M 150 60 L 160 50 L 170 60 L 160 70 Z" fill="#ffca28"/>
    <text x="180" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#f57f17" text-anchor="middle">"찾았다!"</text>
  </g>

  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666" />
    </marker>
  </defs>
</svg>
