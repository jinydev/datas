<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">.sum(axis= ?) : 어느 방향으로 눌러서 짜낼까?</text>

  <!-- 원본 DataFrame 중앙 -->
  <g transform="translate(300, 120)">
    <rect x="-40" y="-30" width="80" height="80" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#455A64" stroke-width="2"/>
    <text x="0" y="-12" font-family="sans-serif" font-size="12" fill="#546E7A" font-weight="bold" text-anchor="middle">원본</text>
    <rect x="-30" y="0" width="20" height="15" fill="#BBDEFB" rx="2" />
    <rect x="-5" y="0" width="20" height="15" fill="#BBDEFB" rx="2" />
    <rect x="20" y="0" width="20" height="15" fill="#BBDEFB" rx="2" />

    <rect x="-30" y="20" width="20" height="15" fill="#BBDEFB" rx="2" />
    <rect x="-5" y="20" width="20" height="15" fill="#BBDEFB" rx="2" />
    <rect x="20" y="20" width="20" height="15" fill="#BBDEFB" rx="2" />
  </g>

  <!-- Axis 0 (위에서 아래로 압축) -->
  <g transform="translate(140, 160)">
    <text x="0" y="-100" font-family="sans-serif" font-size="16" fill="#F44336" font-weight="bold" text-anchor="middle">axis=0 : 세로 방향 압축</text>
    
    <!-- 내려오는 화살표 (압축기) -->
    <path d="M 0 -70 L 0 -10" fill="none" stroke="#EF5350" stroke-width="6" />
    <polygon points="-10,-15 10,-15 0,2" fill="#EF5350" />
    <path d="M -80 5 L 80 5" fill="none" stroke="#D32F2F" stroke-width="4" stroke-dasharray="8,4" />

    <!-- 찌그러진 결과 (Series: 각 열의 합) -->
    <rect x="-50" y="30" width="100" height="25" fill="#FFEBEE" rx="5" filter="url(#shadow)" stroke="#EF5350" stroke-width="2"/>
    <rect x="-40" y="35" width="20" height="15" fill="#FFCDD2" rx="2" />
    <rect x="-10" y="35" width="20" height="15" fill="#FFCDD2" rx="2" />
    <rect x="20" y="35" width="20" height="15" fill="#FFCDD2" rx="2" />
    
    <text x="0" y="75" font-family="sans-serif" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">결과: 각 열(과목)별 합계</text>
    <text x="0" y="95" font-family="sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle">(1차원 Series 반환)</text>
  </g>

  <!-- Axis 1 (왼쪽에서 오른쪽으로 압축) -->
  <g transform="translate(560, 130)">
    <text x="0" y="-50" font-family="sans-serif" font-size="16" fill="#4CAF50" font-weight="bold" text-anchor="middle">axis=1 : 가로 방향 압축</text>
    
    <!-- 쫘악 미는 화살표 (압축기) -->
    <path d="M -70 20 L -10 20" fill="none" stroke="#66BB6A" stroke-width="6" />
    <polygon points="-15,10 -15,30 2,20" fill="#66BB6A" />

    <path d="M 12 -50 L 12 90" fill="none" stroke="#388E3C" stroke-width="4" stroke-dasharray="8,4" />

    <!-- 찌그러진 결과 (Series: 각 행의 합) -->
    <rect x="25" y="-10" width="30" height="60" fill="#E8F5E9" rx="5" filter="url(#shadow)" stroke="#66BB6A" stroke-width="2"/>
    <rect x="30" y="0" width="20" height="15" fill="#C8E6C9" rx="2" />
    <rect x="30" y="20" width="20" height="15" fill="#C8E6C9" rx="2" />

    <text x="40" y="80" font-family="sans-serif" font-size="12" fill="#2E7D32" font-weight="bold" text-anchor="middle">결과: 각 행(월)별 합계</text>
    <text x="40" y="100" font-family="sans-serif" font-size="12" fill="#388E3C" text-anchor="middle">(1차원 Series 반환)</text>
  </g>

  <!-- 연결선 -->
  <path d="M 260 120 L 140 120" fill="none" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="5,5" />
  <path d="M 340 120 L 490 120" fill="none" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="5,5" />

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#ECEFF1" rx="10" stroke="#90A4AE" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#455A64" font-weight="bold" text-anchor="middle">axis=0 이 기본값입니다. 축 방향 연산은 차원을 한 단계 무너뜨립니다(2D->1D).</text>
  </g>

</svg>
