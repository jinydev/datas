<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 엑셀 표를 압축기로 밀어버리기 (가로 합계 vs 세로 합계)</text>

  <!-- Left: axis=0 (Vertical Press) -->
  <g transform="translate(80, 60)">
    <text x="60" y="-10" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#0277bd" text-anchor="middle">axis=0</text>
    <text x="60" y="5" font-family="Arial" font-size="12" fill="#555" text-anchor="middle">(수직 방향 압축)</text>

    <!-- The Press Top -->
    <rect x="0" y="20" width="120" height="15" fill="#cfd8dc" stroke="#90a4ae" rx="2"/>
    <path d="M 50 0 L 70 0 L 70 20 L 50 20 Z" fill="#90a4ae"/>
    <path d="M 50 25 L 60 40 L 70 25 Z" fill="#f44336"/>

    <!-- Data Blocks -->
    <rect x="10" y="50" width="30" height="20" fill="#bbdefb" rx="2"/>
    <rect x="45" y="50" width="30" height="20" fill="#bbdefb" rx="2"/>
    <rect x="80" y="50" width="30" height="20" fill="#bbdefb" rx="2"/>

    <rect x="10" y="75" width="30" height="20" fill="#90caf9" rx="2"/>
    <rect x="45" y="75" width="30" height="20" fill="#90caf9" rx="2"/>
    <rect x="80" y="75" width="30" height="20" fill="#90caf9" rx="2"/>

    <rect x="10" y="100" width="30" height="20" fill="#64b5f6" rx="2"/>
    <rect x="45" y="100" width="30" height="20" fill="#64b5f6" rx="2"/>
    <rect x="80" y="100" width="30" height="20" fill="#64b5f6" rx="2"/>

    <!-- Arrow Down -->
    <g stroke="#f44336" stroke-width="3" stroke-dasharray="3,3" fill="none">
      <path d="M 25 15 L 25 45" />
      <path d="M 60 15 L 60 45" />
      <path d="M 95 15 L 95 45" />
    </g>

    <!-- Result -->
    <rect x="10" y="135" width="30" height="20" fill="#ffb74d" stroke="#f57f17" rx="3"/>
    <rect x="45" y="135" width="30" height="20" fill="#ffb74d" stroke="#f57f17" rx="3"/>
    <rect x="80" y="135" width="30" height="20" fill="#ffb74d" stroke="#f57f17" rx="3"/>
    
    <text x="60" y="170" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">"과목별 총점 1줄"</text>
  </g>

  <!-- Right: axis=1 (Horizontal Press) -->
  <g transform="translate(400, 60)">
    <text x="60" y="-10" font-family="Courier New, monospace" font-size="16" font-weight="bold" fill="#388e3c" text-anchor="middle">axis=1</text>
    <text x="60" y="5" font-family="Arial" font-size="12" fill="#555" text-anchor="middle">(수평 방향 압축)</text>

    <!-- Data Blocks -->
    <rect x="40" y="50" width="30" height="20" fill="#c8e6c9" rx="2"/>
    <rect x="75" y="50" width="30" height="20" fill="#c8e6c9" rx="2"/>
    <rect x="110" y="50" width="30" height="20" fill="#c8e6c9" rx="2"/>

    <rect x="40" y="75" width="30" height="20" fill="#a5d6a7" rx="2"/>
    <rect x="75" y="75" width="30" height="20" fill="#a5d6a7" rx="2"/>
    <rect x="110" y="75" width="30" height="20" fill="#a5d6a7" rx="2"/>

    <rect x="40" y="100" width="30" height="20" fill="#81c784" rx="2"/>
    <rect x="75" y="100" width="30" height="20" fill="#81c784" rx="2"/>
    <rect x="110" y="100" width="30" height="20" fill="#81c784" rx="2"/>

    <!-- The Press Left -->
    <rect x="10" y="40" width="15" height="90" fill="#cfd8dc" stroke="#90a4ae" rx="2"/>
    <path d="M 0 75 L 10 75 L 10 95 L 0 95 Z" fill="#90a4ae"/>
    <path d="M 27 75 L 35 85 L 27 95 Z" fill="#f44336"/>

    <!-- Arrow Right -->
    <g stroke="#f44336" stroke-width="3" stroke-dasharray="3,3" fill="none">
      <path d="M 25 60 L 35 60" />
      <path d="M 25 85 L 35 85" />
      <path d="M 25 110 L 35 110" />
    </g>

    <!-- Result -->
    <rect x="160" y="50" width="25" height="20" fill="#ffb74d" stroke="#f57f17" rx="3"/>
    <rect x="160" y="75" width="25" height="20" fill="#ffb74d" stroke="#f57f17" rx="3"/>
    <rect x="160" y="100" width="25" height="20" fill="#ffb74d" stroke="#f57f17" rx="3"/>
    
    <text x="175" y="140" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">"개인별</text>
    <text x="175" y="155" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">총점 1줄"</text>
  </g>

</svg>
