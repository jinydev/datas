<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1단계: 위에서 아래로 찌그러트리기 (axis=0, 각 열의 합)</text>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="220" height="50" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="110" y="30" font-family="monospace" font-size="18" fill="#81C784" font-weight="bold" text-anchor="middle">df.sum(axis=0)</text>
  </g>

  <!-- 원본 테이블 -->
  <g transform="translate(100, 150)">
    <!-- 컬럼명 -->
    <rect x="0" y="0" width="160" height="25" fill="#E3F2FD" rx="3" />
    <text x="30" y="17" font-family="sans-serif" font-size="11" fill="#0D47A1" text-anchor="middle">사고(건)</text>
    <text x="80" y="17" font-family="sans-serif" font-size="11" fill="#0D47A1" text-anchor="middle">사망(명)</text>
    <text x="130" y="17" font-family="sans-serif" font-size="11" fill="#0D47A1" text-anchor="middle">부상(명)</text>

    <!-- 인덱스명 -->
    <rect x="-60" y="30" width="55" height="75" fill="#FFF3E0" rx="3" />
    <text x="-32" y="47" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">1월</text>
    <text x="-32" y="72" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">2월</text>
    <text x="-32" y="97" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">3월</text>

    <!-- 값 격자 -->
    <text x="30" y="47" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">192</text>
    <text x="80" y="47" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">5</text>
    <text x="130" y="47" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">387</text>

    <text x="30" y="72" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">174</text>
    <text x="80" y="72" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">6</text>
    <text x="130" y="72" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">328</text>

    <text x="30" y="97" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">217</text>
    <text x="80" y="97" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">7</text>
    <text x="130" y="97" font-family="monospace" font-size="12" fill="#333" text-anchor="middle">435</text>

    <!-- 압축기 시각효과 (세로 가이드라인 + 밑줄) -->
    <!-- 사고건 -->
    <rect x="5" y="30" width="50" height="75" fill="#4CAF50" opacity="0.1" />
    <path d="M 30 110 L 30 140" fill="none" stroke="#4CAF50" stroke-width="3" />
    <polygon points="25,135 30,145 35,135" fill="#4CAF50" />
    <!-- 사망 -->
    <rect x="55" y="30" width="50" height="75" fill="#4CAF50" opacity="0.1" />
    <path d="M 80 110 L 80 140" fill="none" stroke="#4CAF50" stroke-width="3" />
    <polygon points="75,135 80,145 85,135" fill="#4CAF50" />
    <!-- 부상 -->
    <rect x="105" y="30" width="50" height="75" fill="#4CAF50" opacity="0.1" />
    <path d="M 130 110 L 130 140" fill="none" stroke="#4CAF50" stroke-width="3" />
    <polygon points="125,135 130,145 135,135" fill="#4CAF50" />
  </g>

  <!-- 압축 후 결과 화면 (우측) -->
  <g transform="translate(420, 130)">
    <rect x="-20" y="-10" width="220" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="-20" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">결과: Series 변환 (세로 통계)</text>
    
    <!-- 컬럼명이 인덱스로 전환됨 -->
    <rect x="0" y="10" width="80" height="110" fill="#E8F5E9" rx="3" />
    <text x="40" y="40" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">사고(건)</text>
    <text x="40" y="75" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">사망(명)</text>
    <text x="40" y="110" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">부상(명)</text>
    
    <!-- 우측 연산 결과 (합계) -->
    <text x="140" y="40" font-family="monospace" font-size="24" fill="#333" font-weight="bold" text-anchor="middle">583</text>
    <text x="140" y="75" font-family="monospace" font-size="24" fill="#333" font-weight="bold" text-anchor="middle">18</text>
    <text x="140" y="110" font-family="monospace" font-size="24" fill="#333" font-weight="bold" text-anchor="middle">1150</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-260" y="-15" width="520" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">수직으로 압축하면 행 인덱스는 소멸하고, 열(Column) 항목만 살아남습니다.</text>
  </g>

</svg>
