<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="350" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">조건식을 통한 불리언 마스크(Boolean Mask) 생성</text>

  <!-- Original Series -->
  <text x="130" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Original Series (series_a)</text>
  <rect x="50" y="90" width="160" height="230" rx="5" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <rect x="55" y="95" width="40" height="220" fill="#bbdefb" rx="3"/>
  <text x="75" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">0</text>
  <text x="75" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">1</text>
  <text x="75" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">2</text>
  <text x="75" y="205" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">3</text>
  <text x="75" y="235" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">4</text>
  <text x="75" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">5</text>
  <text x="75" y="295" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">6</text>

  <text x="130" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="start">3</text>
  <text x="130" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="start">6</text>
  <text x="130" y="175" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">-3</text>
  <text x="130" y="205" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">0</text>
  <text x="130" y="235" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">-4</text>
  <text x="130" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="start">8</text>
  <text x="130" y="295" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="start">-7</text>

  <!-- Condition Vector Operation -->
  <text x="290" y="195" font-family="Courier New, monospace" font-size="24" font-weight="bold" fill="#d32f2f" text-anchor="middle">&gt; 0</text>

  <!-- Output Mask Series -->
  <text x="450" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">Boolean Mask Series</text>
  <rect x="370" y="90" width="160" height="230" rx="5" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <rect x="375" y="95" width="40" height="220" fill="#f8bbd0" rx="3"/>
  <text x="395" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">0</text>
  <text x="395" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">1</text>
  <text x="395" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">2</text>
  <text x="395" y="205" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">3</text>
  <text x="395" y="235" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">4</text>
  <text x="395" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">5</text>
  <text x="395" y="295" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">6</text>

  <text x="450" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="start">True</text>
  <text x="450" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="start">True</text>
  <text x="450" y="175" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">False</text>
  <text x="450" y="205" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">False</text>
  <text x="450" y="235" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">False</text>
  <text x="450" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="start">True</text>
  <text x="450" y="295" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">False</text>

  <!-- Arrows -->
  <g stroke="#e91e63" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 220 110 L 250 110" />
    <path d="M 330 110 L 360 110" />
    <path d="M 220 140 L 250 140" />
    <path d="M 330 140 L 360 140" />
    <path d="M 220 170 L 250 170" />
    <path d="M 330 170 L 360 170" />
    <path d="M 220 200 L 250 200" />
    <path d="M 330 200 L 360 200" />
    <path d="M 220 230 L 250 230" />
    <path d="M 330 230 L 360 230" />
    <path d="M 220 260 L 250 260" />
    <path d="M 330 260 L 360 260" />
    <path d="M 220 290 L 250 290" />
    <path d="M 330 290 L 360 290" />
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e91e63" />
    </marker>
  </defs>
</svg>
