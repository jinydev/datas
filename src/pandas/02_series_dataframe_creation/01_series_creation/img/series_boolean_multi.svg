<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="350" fill="#f8f9fa" rx="10" />
  
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">다중 조건 불리언 인덱싱 (AND 연산)</text>

  <!-- Mask 1: > 0 -->
  <text x="140" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#e91e63" text-anchor="middle">Mask 1: (series_a &gt; 0)</text>
  <rect x="80" y="90" width="120" height="230" rx="5" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <rect x="85" y="95" width="30" height="220" fill="#f8bbd0" rx="3"/>
  <text x="100" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">0</text>
  <text x="100" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">1</text>
  <text x="100" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">2</text>
  <text x="100" y="205" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">3</text>
  <text x="100" y="235" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">4</text>
  <text x="100" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">5</text>
  <text x="100" y="295" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#880e4f" text-anchor="middle">6</text>
  <text x="140" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#d32f2f" text-anchor="middle">True</text>
  <text x="140" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#d32f2f" text-anchor="middle">True</text>
  <text x="140" y="175" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="middle">False</text>
  <text x="140" y="205" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="middle">False</text>
  <text x="140" y="235" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="middle">False</text>
  <text x="140" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#d32f2f" text-anchor="middle">True</text>
  <text x="140" y="295" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="middle">False</text>

  <!-- Mask 2: % 2 == 0 -->
  <text x="360" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#2196f3" text-anchor="middle">Mask 2: (series_a % 2 == 0)</text>
  <rect x="300" y="90" width="120" height="230" rx="5" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <rect x="305" y="95" width="30" height="220" fill="#bbdefb" rx="3"/>
  <text x="320" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">0</text>
  <text x="320" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">1</text>
  <text x="320" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">2</text>
  <text x="320" y="205" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">3</text>
  <text x="320" y="235" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">4</text>
  <text x="320" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">5</text>
  <text x="320" y="295" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">6</text>
  <text x="360" y="115" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="middle">False</text>
  <text x="360" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">True</text>
  <text x="360" y="175" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="middle">False</text>
  <text x="360" y="205" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">True</text>
  <text x="360" y="235" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">True</text>
  <text x="360" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">True</text>
  <text x="360" y="295" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="middle">False</text>

  <!-- & operator -->
  <text x="250" y="195" font-family="Courier New, monospace" font-size="30" font-weight="bold" fill="#9c27b0" text-anchor="middle">&amp;</text>
  
  <g stroke="#9c27b0" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M 440 195 L 480 195" />
  </g>

  <!-- Final Mask Output -->
  <text x="600" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#9c27b0" text-anchor="middle">Final Series (Filtered)</text>
  <rect x="520" y="90" width="160" height="230" rx="5" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2"/>
  <rect x="525" y="95" width="40" height="220" fill="#e1bee7" rx="3"/>
  <text x="545" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">-</text>
  <text x="545" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">1</text>
  <text x="545" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">-</text>
  <text x="545" y="205" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">-</text>
  <text x="545" y="235" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">-</text>
  <text x="545" y="265" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">5</text>
  <text x="545" y="295" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">-</text>

  <!-- Filtered Values -->
  <text x="600" y="115" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">탈락</text>
  <text x="600" y="145" font-family="Courier New, monospace" font-size="18" font-weight="bold" fill="#e65100" text-anchor="start">6</text>
  <text x="600" y="175" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">탈락</text>
  <text x="600" y="205" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">탈락</text>
  <text x="600" y="235" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">탈락</text>
  <text x="600" y="265" font-family="Courier New, monospace" font-size="18" font-weight="bold" fill="#e65100" text-anchor="start">8</text>
  <text x="600" y="295" font-family="Courier New, monospace" font-size="14" fill="#9e9e9e" text-anchor="start">탈락</text>

  <!-- Highlight intersections -->
  <rect x="525" y="130" width="150" height="20" fill="none" stroke="#e65100" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="525" y="250" width="150" height="20" fill="none" stroke="#e65100" stroke-width="2" stroke-dasharray="4,4"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c27b0" />
    </marker>
  </defs>
</svg>
