<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">딕셔너리를 활용한 Series 1대1 매핑 구조</text>

  <!-- 파이썬 딕셔너리 데이터 -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="180" height="200" fill="#263238" rx="5" filter="url(#shadow)" />
    <rect x="0" y="0" width="180" height="25" fill="#37474F" rx="5" />
    <circle cx="15" cy="12" r="5" fill="#FF5252" />
    <circle cx="30" cy="12" r="5" fill="#FFCA28" />
    <circle cx="45" cy="12" r="5" fill="#8BC34A" />
    
    <text x="15" y="45" font-family="monospace" font-size="12" fill="#82AAFF">age_dict = {</text>
    <text x="30" y="70" font-family="monospace" font-size="12" fill="#C3E88D">'철수'</text>
    <text x="70" y="70" font-family="monospace" font-size="12" fill="#89DDFF">: </text>
    <text x="85" y="70" font-family="monospace" font-size="12" fill="#F07178">15</text>
    <text x="100" y="70" font-family="monospace" font-size="12" fill="#FFF">,</text>
    
    <text x="30" y="95" font-family="monospace" font-size="12" fill="#C3E88D">'영희'</text>
    <text x="70" y="95" font-family="monospace" font-size="12" fill="#89DDFF">: </text>
    <text x="85" y="95" font-family="monospace" font-size="12" fill="#F07178">16</text>
    <text x="100" y="95" font-family="monospace" font-size="12" fill="#FFF">,</text>
    
    <text x="30" y="120" font-family="monospace" font-size="12" fill="#C3E88D">'민수'</text>
    <text x="70" y="120" font-family="monospace" font-size="12" fill="#89DDFF">: </text>
    <text x="85" y="120" font-family="monospace" font-size="12" fill="#F07178">14</text>
    <text x="100" y="120" font-family="monospace" font-size="12" fill="#FFF">,</text>

    <text x="30" y="145" font-family="monospace" font-size="12" fill="#C3E88D">'수진'</text>
    <text x="70" y="145" font-family="monospace" font-size="12" fill="#89DDFF">: </text>
    <text x="85" y="145" font-family="monospace" font-size="12" fill="#F07178">15</text>
    
    <text x="15" y="170" font-family="monospace" font-size="12" fill="#82AAFF">}</text>
  </g>

  <!-- 변환 애로우 -->
  <g transform="translate(290, 150)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#FFA000" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#FFA000" />
    <text x="40" y="-15" font-family="sans-serif" font-size="12" fill="#F57C00" font-weight="bold" text-anchor="middle">pd.Series()</text>
  </g>

  <!-- Series 결과 모델 -->
  <g transform="translate(400, 80)">
    <rect x="0" y="0" width="200" height="200" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <rect x="25" y="20" width="70" height="150" fill="#FFF3E0" rx="4" />
    <text x="60" y="15" font-family="sans-serif" font-size="10" fill="#E65100" font-weight="bold" text-anchor="middle">Index</text>
    
    <text x="60" y="45" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">철수</text>
    <text x="60" y="85" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">영희</text>
    <text x="60" y="125" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">민수</text>
    <text x="60" y="165" font-family="sans-serif" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">수진</text>

    <!-- 매핑 선 -->
    <line x1="95" y1="40" x2="115" y2="40" stroke="#B0BEC5" stroke-dasharray="2,2"/>
    <line x1="95" y1="80" x2="115" y2="80" stroke="#B0BEC5" stroke-dasharray="2,2"/>
    <line x1="95" y1="120" x2="115" y2="120" stroke="#B0BEC5" stroke-dasharray="2,2"/>
    <line x1="95" y1="160" x2="115" y2="160" stroke="#B0BEC5" stroke-dasharray="2,2"/>

    <rect x="115" y="20" width="60" height="150" fill="#E8F5E9" rx="4" />
    <text x="145" y="15" font-family="sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">Values</text>
    
    <text x="145" y="45" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">15</text>
    <text x="145" y="85" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">16</text>
    <text x="145" y="125" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">14</text>
    <text x="145" y="165" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">15</text>
    
    <rect x="25" y="180" width="150" height="15" fill="#E0F2F1" />
    <text x="100" y="191" font-family="sans-serif" font-size="10" fill="#00796B" font-weight="bold" text-anchor="middle">Name: 친구 나이</text>
  </g>

</svg>
