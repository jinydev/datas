<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" rx="15" />
  
  <!-- Section 1: Mathematical Mapping -->
  <text x="200" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">수학적 의미: Mapping Function</text>
  
  <!-- Domain (Index) -->
  <rect x="70" y="100" width="100" height="200" rx="10" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="120" y="130" font-family="Arial" font-size="16" font-weight="bold" fill="#1565c0" text-anchor="middle">Domain (Index)</text>
  
  <circle cx="120" cy="170" r="20" fill="#bbdefb" />
  <text x="120" y="175" font-family="Arial" font-size="14" fill="#0d47a1" text-anchor="middle">'a'</text>
  
  <circle cx="120" cy="225" r="20" fill="#bbdefb" />
  <text x="120" y="230" font-family="Arial" font-size="14" fill="#0d47a1" text-anchor="middle">'b'</text>
  
  <circle cx="120" cy="280" r="20" fill="#bbdefb" />
  <text x="120" y="285" font-family="Arial" font-size="14" fill="#0d47a1" text-anchor="middle">'c'</text>

  <!-- Codomain (Values) -->
  <rect x="250" y="100" width="100" height="200" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="300" y="130" font-family="Arial" font-size="16" font-weight="bold" fill="#2e7d32" text-anchor="middle">Codomain (Value)</text>

  <circle cx="300" cy="170" r="20" fill="#c8e6c9" />
  <text x="300" y="175" font-family="Arial" font-size="14" fill="#1b5e20" text-anchor="middle">10.5</text>
  
  <circle cx="300" cy="225" r="20" fill="#c8e6c9" />
  <text x="300" y="230" font-family="Arial" font-size="14" fill="#1b5e20" text-anchor="middle">20.1</text>
  
  <circle cx="300" cy="280" r="20" fill="#c8e6c9" />
  <text x="300" y="285" font-family="Arial" font-size="14" fill="#1b5e20" text-anchor="middle">30.9</text>
  
  <!-- Arrows -->
  <g stroke="#757575" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 145 170 C 190 170, 200 170, 225 170" />
    <path d="M 145 225 C 190 225, 200 225, 225 225" />
    <path d="M 145 280 C 190 280, 200 280, 225 280" />
  </g>
  
  <!-- Function Label -->
  <text x="185" y="160" font-family="Arial" font-size="14" fill="#757575" font-style="italic">f(x)</text>

  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="370" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Section 2: Post-it Metaphor -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">비유: 이름표가 달린 포스트잇</text>

  <!-- Post it 1 -->
  <rect x="520" y="100" width="120" height="50" fill="#fff9c4" stroke="#fbc02d" stroke-width="2" filter="drop-shadow(2px 4px 6px rgba(0,0,0,0.1))"/>
  <rect x="460" y="105" width="70" height="40" fill="#ffcc80" stroke="#ef6c00" stroke-width="2" rx="5"/>
  <text x="495" y="130" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">철수</text>
  <text x="580" y="132" font-family="Arial" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">80점</text>

  <!-- Post it 2 -->
  <rect x="520" y="170" width="120" height="50" fill="#fff9c4" stroke="#fbc02d" stroke-width="2" filter="drop-shadow(2px 4px 6px rgba(0,0,0,0.1))"/>
  <rect x="460" y="175" width="70" height="40" fill="#ce93d8" stroke="#8e24aa" stroke-width="2" rx="5"/>
  <text x="495" y="200" font-family="Arial" font-size="14" font-weight="bold" fill="#4a148c" text-anchor="middle">영희</text>
  <text x="580" y="202" font-family="Arial" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">95점</text>

  <!-- Post it 3 -->
  <rect x="520" y="240" width="120" height="50" fill="#fff9c4" stroke="#fbc02d" stroke-width="2" filter="drop-shadow(2px 4px 6px rgba(0,0,0,0.1))"/>
  <rect x="460" y="245" width="70" height="40" fill="#81d4fa" stroke="#0288d1" stroke-width="2" rx="5"/>
  <text x="495" y="270" font-family="Arial" font-size="14" font-weight="bold" fill="#01579b" text-anchor="middle">민수</text>
  <text x="580" y="272" font-family="Arial" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">100점</text>
  
  <!-- Labels -->
  <text x="495" y="320" font-family="Arial" font-size="16" font-weight="bold" fill="#666" text-anchor="middle">이름표 (Index)</text>
  <text x="580" y="320" font-family="Arial" font-size="16" font-weight="bold" fill="#666" text-anchor="middle">데이터 (Values)</text>

  <!-- Defs for arrow -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#757575" />
    </marker>
  </defs>
</svg>
