<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">딕셔너리로 컬럼 + 직접 인덱스(Index) 지정하기</text>

  <!-- 파이썬 명령 박스(코드) -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="300" height="150" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="25" fill="#37474F" rx="5" />
    <circle cx="15" cy="12" r="5" fill="#FF5252" />
    <circle cx="30" cy="12" r="5" fill="#FFCA28" />
    <circle cx="45" cy="12" r="5" fill="#8BC34A" />

    <text x="15" y="55" font-family="monospace" font-size="14" fill="#82AAFF" font-weight="bold">pd.DataFrame(</text>
    
    <text x="30" y="80" font-family="monospace" font-size="14" fill="#F07178">data</text>
    <text x="65" y="80" font-family="monospace" font-size="14" fill="#89DDFF">= </text>
    <text x="80" y="80" font-family="monospace" font-size="14" fill="#C3E88D">score_dict,</text>
    
    <text x="30" y="105" font-family="monospace" font-size="14" fill="#F07178">index</text>
    <text x="75" y="105" font-family="monospace" font-size="14" fill="#89DDFF">= </text>
    <text x="90" y="105" font-family="monospace" font-size="14" fill="#FFF">['김국진', '신영희', '이길순']</text>
    
    <text x="15" y="130" font-family="monospace" font-size="14" fill="#82AAFF" font-weight="bold">)</text>

    <!-- index 매핑 화살표 -->
    <path d="M 285 100 L 400 100" fill="none" stroke="#FF9800" stroke-width="3" stroke-dasharray="3,3" />
    <polygon points="395,93 405,100 395,107" fill="#FF9800" />
    <text x="350" y="90" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">행(Row)에 덮어쓰기</text>
  </g>

  <!-- 결과 표 -->
  <g transform="translate(450, 70)">
    <rect x="0" y="0" width="160" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 컬럼 헤더 (기존 score_dict의 key들) -->
    <rect x="0" y="0" width="160" height="30" fill="#E8F5E9" rx="3" />
    <text x="50" y="20" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">국어</text>
    <text x="120" y="20" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">수학</text>
    
    <!-- 인덱스: 직접 할당 -->
    <rect x="-50" y="30" width="70" height="150" fill="#FFE0B2" rx="3" />
    <text x="-15" y="65" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">김국진</text>
    <text x="-15" y="105" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">신영희</text>
    <text x="-15" y="145" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">이길순</text>

    <!-- 데이터 영역 -->
    <!-- 국어 점수 -->
    <text x="50" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">82</text>
    <text x="50" y="105" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">76</text>
    <text x="50" y="145" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">67</text>
    
    <!-- 수학 점수 -->
    <text x="120" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">99</text>
    <text x="120" y="105" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">87</text>
    <text x="120" y="145" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">78</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 300)">
    <rect x="-240" y="-20" width="480" height="40" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="5" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">가장 많이 쓰이는 명쾌한 조합! (딕셔너리로 Data/Col + 리스트로 Index)</text>
  </g>

</svg>
