<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">딕셔너리(Dict)를 데이터프레임으로 기본 구조화</text>

  <!-- 원본 파이썬 딕셔너리 -->
  <g transform="translate(60, 80)">
    <rect x="-10" y="-10" width="240" height="150" fill="#E8EAF6" rx="5" filter="url(#shadow)" stroke="#3F51B5" stroke-width="2"/>
    <text x="10" y="20" font-family="monospace" font-size="14" fill="#1A237E" font-weight="bold">data_dict = {</text>
    
    <!-- numbers 컬럼 데이터 -->
    <rect x="25" y="35" width="80" height="25" fill="#C5CAE9" rx="3" />
    <text x="65" y="52" font-family="monospace" font-size="12" fill="#1A237E" font-weight="bold" text-anchor="middle">'numbers'</text>
    <text x="115" y="52" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">:</text>
    <rect x="125" y="35" width="80" height="25" fill="#FFF" rx="3" />
    <text x="165" y="52" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">[1, 2, 3]</text>

    <!-- colors 컬럼 데이터 -->
    <rect x="25" y="75" width="80" height="25" fill="#E1BEE7" rx="3" />
    <text x="65" y="92" font-family="monospace" font-size="12" fill="#4A148C" font-weight="bold" text-anchor="middle">'colors'</text>
    <text x="115" y="92" font-family="monospace" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">:</text>
    <rect x="125" y="75" width="80" height="25" fill="#FFF" rx="3" />
    <text x="165" y="92" font-family="monospace" font-size="12" fill="#333" font-weight="bold" text-anchor="middle">['red',...]</text>

    <text x="10" y="125" font-family="monospace" font-size="14" fill="#1A237E" font-weight="bold">}</text>
  </g>

  <!-- 파이썬 명령 박스 -->
  <g transform="translate(330, 140)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#FFA000" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#FFA000" />
    <text x="40" y="-15" font-family="monospace" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">pd.DataFrame()</text>
  </g>

  <!-- 결과 표 -->
  <g transform="translate(450, 70)">
    <rect x="0" y="0" width="180" height="180" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#3F51B5" stroke-width="3"/>
    
    <!-- 컬럼 헤더 (key 매핑) -->
    <rect x="50" y="0" width="65" height="30" fill="#C5CAE9" rx="3" />
    <text x="82" y="20" font-family="sans-serif" font-size="12" fill="#1A237E" font-weight="bold" text-anchor="middle">numbers</text>
    
    <rect x="115" y="0" width="65" height="30" fill="#E1BEE7" rx="3" />
    <text x="147" y="20" font-family="sans-serif" font-size="12" fill="#4A148C" font-weight="bold" text-anchor="middle">colors</text>
    
    <!-- 인덱스: 자동 할당 0,1,2 -->
    <rect x="-30" y="30" width="80" height="150" fill="#FFF3E0" rx="3" />
    <text x="10" y="65" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">0</text>
    <text x="10" y="105" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">1</text>
    <text x="10" y="145" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">2</text>
    
    <text x="-40" y="170" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">자동 생성</text>
    <path d="M -20 160 L 5 150" fill="none" stroke="#E65100" stroke-width="2" />

    <!-- 데이터 영역 -->
    <!-- numbers 열 -->
    <text x="82" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">1</text>
    <text x="82" y="105" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2</text>
    <text x="82" y="145" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">3</text>
    
    <!-- colors 열 -->
    <text x="147" y="65" font-family="sans-serif" font-size="14" fill="#F44336" font-weight="bold" text-anchor="middle">red</text>
    <text x="147" y="105" font-family="sans-serif" font-size="14" fill="#9E9E9E" font-weight="bold" text-anchor="middle">white</text>
    <text x="147" y="145" font-family="sans-serif" font-size="14" fill="#2196F3" font-weight="bold" text-anchor="middle">blue</text>
  </g>

  <!-- 하단 코멘트 -->
  <g transform="translate(350, 290)">
    <rect x="-200" y="-20" width="400" height="40" fill="#E3F2FD" rx="10" stroke="#2196F3" stroke-width="2" />
    <text x="0" y="5" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">딕셔너리 Key가 열 이름표로, Value(리스트)가 세로 데이터로!</text>
  </g>

</svg>
