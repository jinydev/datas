<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">1차원 리스트를 DataFrame에 집어넣기</text>

  <!-- 원본 리스트 데이터 -->
  <g transform="translate(100, 100)">
    <rect x="-30" y="-30" width="200" height="150" fill="#FFF3E0" rx="5" stroke="#FFB74D" stroke-dasharray="4,4" />
    <text x="70" y="-10" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">[10, 20, 30, 40, 50]</text>
    
    <rect x="10" y="10" width="120" height="100" fill="#FFE0B2" rx="4" />
    <text x="70" y="30" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="70" y="50" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">20</text>
    <text x="70" y="70" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">30</text>
    <text x="70" y="90" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">...</text>
  </g>

  <!-- 변환 애로우 -->
  <g transform="translate(300, 140)">
    <path d="M 0 0 L 80 0" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="5,5" />
    <polygon points="75,-7 85,0 75,7" fill="#2196F3" />
    <text x="40" y="-15" font-family="monospace" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">pd.DataFrame()</text>
  </g>

  <!-- 결과 표 -->
  <g transform="translate(420, 60)">
    <rect x="-30" y="0" width="160" height="200" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#1976D2" stroke-width="3"/>
    
    <!-- 컬럼 0 -->
    <rect x="30" y="0" width="100" height="30" fill="#E3F2FD" rx="3" />
    <text x="80" y="20" font-family="sans-serif" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">0</text>
    <text x="170" y="20" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">&lt;- 자동(열)</text>

    <!-- 인덱스 0~4 -->
    <rect x="-30" y="30" width="60" height="170" fill="#FFF3E0" rx="3" />
    <text x="0" y="55" font-family="sans-serif" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">0</text>
    <text x="0" y="85" font-family="sans-serif" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">1</text>
    <text x="0" y="115" font-family="sans-serif" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">2</text>
    <text x="0" y="145" font-family="sans-serif" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">3</text>
    <text x="0" y="175" font-family="sans-serif" font-size="14" fill="#FF9800" font-weight="bold" text-anchor="middle">4</text>
    <text x="-40" y="220" font-family="sans-serif" font-size="12" fill="#FF9800" font-weight="bold" text-anchor="middle">^ 자동(행)</text>

    <path d="M -40 205 L -10 180" fill="none" stroke="#FF9800" stroke-width="2" />

    <!-- 데이터 -->
    <text x="80" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="80" y="85" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">20</text>
    <text x="80" y="115" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">30</text>
    <text x="80" y="145" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">40</text>
    <text x="80" y="175" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">50</text>
    
  </g>
</svg>
