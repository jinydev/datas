<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">초고속 NumPy 다차원 배열을 DataFrame으로 포장하기</text>

  <!-- 원본 Numpy Array -->
  <g transform="translate(60, 100)">
    <rect x="-20" y="-30" width="220" height="150" fill="#E3F2FD" rx="5" filter="url(#shadow)" stroke="#42A5F5" stroke-dasharray="4,4" />
    <text x="90" y="-10" font-family="monospace" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">np.arange(12).reshape(3,4)</text>
    
    <!-- numpy 데이터 레이아웃 -->
    <rect x="10" y="10" width="160" height="100" fill="#BBDEFB" rx="3" />
    <text x="30" y="30" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">0</text>
    <text x="70" y="30" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">1</text>
    <text x="110" y="30" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">2</text>
    <text x="150" y="30" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">3</text>
    
    <text x="30" y="65" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">4</text>
    <text x="70" y="65" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">5</text>
    <text x="110" y="65" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">6</text>
    <text x="150" y="65" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">7</text>
    
    <text x="30" y="100" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">8</text>
    <text x="70" y="100" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">9</text>
    <text x="110" y="100" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">10</text>
    <text x="150" y="100" font-family="monospace" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">11</text>
  </g>

  <!-- 파이썬 명령 박스(포장기계) -->
  <g transform="translate(320, 140)">
    <path d="M -40 0 L 40 0" fill="none" stroke="#607D8B" stroke-width="4" stroke-dasharray="4,4" />
    <polygon points="35,-7 45,0 35,7" fill="#607D8B" />
    <text x="0" y="-15" font-family="monospace" font-size="12" fill="#455A64" font-weight="bold" text-anchor="middle">pd.DataFrame()</text>
  </g>

  <!-- 결과 표 -->
  <g transform="translate(420, 80)">
    <rect x="-30" y="0" width="230" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 컬럼 헤더 -->
    <rect x="0" y="0" width="200" height="30" fill="#E3F2FD" rx="3" />
    <text x="25" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">Col1</text>
    <text x="75" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">Col2</text>
    <text x="125" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">Col3</text>
    <text x="175" y="20" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">Col4</text>
    
    <!-- 인덱스 헤더 -->
    <rect x="-30" y="30" width="30" height="120" fill="#FFF3E0" rx="3" />
    <text x="-15" y="55" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">0</text>
    <text x="-15" y="90" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">1</text>
    <text x="-15" y="125" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">2</text>

    <!-- 데이터 영역 -->
    <rect x="0" y="30" width="200" height="120" fill="#F1F8E9" rx="3" />
    
    <!-- 행 0 -->
    <text x="25" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">0</text>
    <text x="75" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">1</text>
    <text x="125" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2</text>
    <text x="175" y="55" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">3</text>
    
    <!-- 행 1 -->
    <text x="25" y="90" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">4</text>
    <text x="75" y="90" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">5</text>
    <text x="125" y="90" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">6</text>
    <text x="175" y="90" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">7</text>
    
    <!-- 행 2 -->
    <text x="25" y="125" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">8</text>
    <text x="75" y="125" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">9</text>
    <text x="125" y="125" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="175" y="125" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">11</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 290)">
    <rect x="-250" y="-20" width="500" height="40" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="5" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold" text-anchor="middle">NumPy 배열을 DataFrame 안에 담으면 데이터 분석과 시각화가 훨씬 편해집니다!</text>
  </g>

</svg>
