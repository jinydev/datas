<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">행(Index)과 열(Columns) 모두 지정하여 완벽한 표 만들기</text>

  <!-- 파이썬 주문 명령 -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="280" height="150" fill="#263238" rx="5" filter="url(#shadow)" stroke="#1976D2" stroke-width="2" />
    <rect x="0" y="0" width="280" height="25" fill="#37474F" rx="5" />
    <circle cx="15" cy="12" r="5" fill="#FF5252" />
    <circle cx="30" cy="12" r="5" fill="#FFCA28" />
    <circle cx="45" cy="12" r="5" fill="#8BC34A" />

    <text x="15" y="55" font-family="monospace" font-size="14" fill="#82AAFF" font-weight="bold">df_full = pd.DataFrame(</text>
    
    <text x="30" y="80" font-family="monospace" font-size="14" fill="#F07178">data</text>
    <text x="65" y="80" font-family="monospace" font-size="14" fill="#89DDFF">= </text>
    <text x="80" y="80" font-family="monospace" font-size="14" fill="#C3E88D">data_2d,</text>
    
    <text x="30" y="105" font-family="monospace" font-size="14" fill="#F07178">index</text>
    <text x="75" y="105" font-family="monospace" font-size="14" fill="#89DDFF">= </text>
    <text x="90" y="105" font-family="monospace" font-size="14" fill="#FFF">['1번방', '2번방', '3번방'],</text>
    
    <text x="30" y="130" font-family="monospace" font-size="14" fill="#F07178">columns</text>
    <text x="90" y="130" font-family="monospace" font-size="14" fill="#89DDFF">= </text>
    <text x="105" y="130" font-family="monospace" font-size="14" fill="#FFF">['A타입', 'B타입', 'C타입']</text>

    <!-- index와 columns에서 화살표 연결 -->
    <path d="M 280 100 L 400 100" fill="none" stroke="#FF9800" stroke-width="2" stroke-dasharray="3,3" />
    <path d="M 280 125 L 430 125 L 430 70 C 430 70 450 70 470 70" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="3,3" />
  </g>

  <!-- 결과 표 -->
  <g transform="translate(480, 80)">
    <rect x="0" y="0" width="180" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 컬럼 헤더 -->
    <rect x="0" y="0" width="180" height="30" fill="#E3F2FD" rx="3" />
    <text x="30" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">A타입</text>
    <text x="90" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">B타입</text>
    <text x="150" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">C타입</text>
    
    <!-- 인덱스 헤더 -->
    <rect x="-50" y="30" width="50" height="120" fill="#FFF3E0" rx="3" />
    <text x="-25" y="65" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">1번방</text>
    <text x="-25" y="95" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">2번방</text>
    <text x="-25" y="125" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">3번방</text>

    <!-- 데이터 영역 -->
    <rect x="0" y="30" width="180" height="120" fill="#F1F8E9" rx="3" />
    
    <!-- a열 데이터 -->
    <text x="30" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">1</text>
    <text x="90" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">2</text>
    <text x="150" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">3</text>
    
    <!-- b열 데이터 -->
    <text x="30" y="95" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">10</text>
    <text x="90" y="95" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">20</text>
    <text x="150" y="95" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">30</text>
    
    <!-- c열 데이터 -->
    <text x="30" y="125" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">100</text>
    <text x="90" y="125" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">200</text>
    <text x="150" y="125" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">300</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 270)">
    <rect x="-250" y="-20" width="500" height="40" fill="#FFFDE7" rx="10" stroke="#FBC02D" stroke-width="2" />
    <text x="0" y="5" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">데이터와 이름표들을 정확히 매칭시켜 주면, 어디 내놔도 손색없는 표가 됩니다!</text>
  </g>
</svg>
