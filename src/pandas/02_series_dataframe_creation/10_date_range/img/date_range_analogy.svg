<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 캘린더를 촥촥촥 뽑아주는 날짜 자동 폭격기</text>

  <!-- Left: User Input Options -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="140" height="130" fill="#fff" stroke="#ccc" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="140" height="25" fill="#eceff1" rx="5"/>
    <text x="70" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#455a64" text-anchor="middle">세팅(명령)</text>

    <!-- Options -->
    <rect x="10" y="40" width="120" height="20" fill="#ffebee" rx="3"/>
    <text x="70" y="54" font-family="Courier New, monospace" font-size="12" fill="#c62828" text-anchor="middle">start="2025-01-01"</text>

    <rect x="10" y="70" width="120" height="20" fill="#e8f5e9" rx="3"/>
    <text x="70" y="84" font-family="Courier New, monospace" font-size="12" fill="#2e7d32" text-anchor="middle">periods=5</text>

    <rect x="10" y="100" width="120" height="20" fill="#fff3e0" rx="3"/>
    <text x="70" y="114" font-family="Courier New, monospace" font-size="12" fill="#e65100" text-anchor="middle">freq="1D" (매일)</text>
  </g>

  <!-- Connection to Machine -->
  <g stroke="#9e9e9e" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 180 135 L 220 135" />
  </g>

  <!-- Middle: Magic Machine -->
  <g transform="translate(230, 80)">
    <rect x="0" y="0" width="120" height="110" fill="#3f51b5" rx="10" filter="drop-shadow(3px 3px 5px rgba(0,0,0,0.3))"/>
    <rect x="10" y="10" width="100" height="40" fill="#fff" rx="5"/>
    <text x="60" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#303f9f" text-anchor="middle">date_range()</text>
    <text x="60" y="42" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Generator</text>
    
    <!-- Lights/Buttons -->
    <circle cx="25" cy="80" r="8" fill="#4caf50"/>
    <circle cx="50" cy="80" r="8" fill="#ffeb3b"/>
    <circle cx="75" cy="80" r="8" fill="#f44336"/>

    <!-- Output Slot -->
    <rect x="10" y="100" width="100" height="10" fill="#1a237e" rx="2"/>
  </g>

  <!-- Connection to Output -->
  <g stroke="#9e9e9e" stroke-width="3" fill="none" stroke-dasharray="4,4" marker-end="url(#arrow)">
    <path d="M 350 135 C 380 135, 400 135, 430 135" />
  </g>

  <!-- Right: Stream of Calendar Pages -->
  <text x="510" y="65" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">생성된 달력 시트 뭉치</text>

  <!-- Sheet 5 -->
  <g transform="translate(500, 70) rotate(10)">
    <rect x="0" y="0" width="60" height="60" fill="#fff" stroke="#ccc" stroke-width="2" rx="3" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="60" height="15" fill="#f44336" rx="3"/>
    <text x="30" y="40" font-family="Arial" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">1/5</text>
  </g>

  <!-- Sheet 4 -->
  <g transform="translate(480, 85) rotate(5)">
    <rect x="0" y="0" width="60" height="60" fill="#fff" stroke="#ccc" stroke-width="2" rx="3" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="60" height="15" fill="#f44336" rx="3"/>
    <text x="30" y="40" font-family="Arial" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">1/4</text>
  </g>

  <!-- Sheet 3 -->
  <g transform="translate(460, 100) rotate(0)">
    <rect x="0" y="0" width="60" height="60" fill="#fff" stroke="#ccc" stroke-width="2" rx="3" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="60" height="15" fill="#f44336" rx="3"/>
    <text x="30" y="40" font-family="Arial" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">1/3</text>
  </g>

  <!-- Sheet 2 -->
  <g transform="translate(440, 115) rotate(-5)">
    <rect x="0" y="0" width="60" height="60" fill="#fff" stroke="#ccc" stroke-width="2" rx="3" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="60" height="15" fill="#f44336" rx="3"/>
    <text x="30" y="40" font-family="Arial" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">1/2</text>
  </g>

  <!-- Sheet 1 -->
  <g transform="translate(420, 130) rotate(-10)">
    <rect x="0" y="0" width="60" height="60" fill="#fff" stroke="#ccc" stroke-width="2" rx="3" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="60" height="15" fill="#f44336" rx="3"/>
    <text x="30" y="40" font-family="Arial" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">1/1</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e" />
    </marker>
  </defs>
</svg>
