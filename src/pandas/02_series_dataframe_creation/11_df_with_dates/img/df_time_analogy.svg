<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 날짜가 가장 첫 칸에 박힌 은행의 일일 거래 장부</text>

  <!-- Ledger Book -->
  <g transform="translate(140, 60)">
    <rect x="0" y="0" width="380" height="160" fill="#fff" stroke="#546e7a" stroke-width="3" rx="4" filter="drop-shadow(3px 4px 6px rgba(0,0,0,0.2))"/>
    
    <!-- Binding Ring -->
    <rect x="0" y="0" width="20" height="160" fill="#cfd8dc" rx="2"/>
    <circle cx="10" cy="20" r="4" fill="#fff" stroke="#90a4ae"/>
    <circle cx="10" cy="60" r="4" fill="#fff" stroke="#90a4ae"/>
    <circle cx="10" cy="100" r="4" fill="#fff" stroke="#90a4ae"/>
    <circle cx="10" cy="140" r="4" fill="#fff" stroke="#90a4ae"/>

    <!-- Left Column (Date Index) -->
    <rect x="20" y="0" width="100" height="160" fill="#e3f2fd"/>
    <rect x="20" y="0" width="100" height="30" fill="#1e88e5"/>
    <text x="70" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">날짜 (Index)</text>
    
    <text x="70" y="55" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">3월 2일</text>
    <text x="70" y="85" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">3월 3일</text>
    <text x="70" y="115" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">3월 4일</text>
    <text x="70" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">3월 5일</text>

    <!-- Data Columns -->
    <rect x="120" y="0" width="260" height="30" fill="#eceff1"/>
    <text x="185" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#455a64" text-anchor="middle">A지점 매출</text>
    <text x="315" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#455a64" text-anchor="middle">B지점 매출</text>

    <!-- Lines -->
    <line x1="20" y1="30" x2="380" y2="30" stroke="#90a4ae" stroke-width="2"/>
    <line x1="20" y1="65" x2="380" y2="65" stroke="#eceff1" stroke-width="1"/>
    <line x1="20" y1="95" x2="380" y2="95" stroke="#eceff1" stroke-width="1"/>
    <line x1="20" y1="125" x2="380" y2="125" stroke="#eceff1" stroke-width="1"/>
    
    <line x1="120" y1="0" x2="120" y2="160" stroke="#90a4ae" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="160" stroke="#90a4ae" stroke-width="1"/>

    <!-- Data Values -->
    <text x="185" y="55" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">₩ 1,500,000</text>
    <text x="315" y="55" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">₩ 2,000,000</text>
    
    <text x="185" y="85" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">₩ 1,200,000</text>
    <text x="315" y="85" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">₩ 2,100,000</text>
    
    <text x="185" y="115" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">₩ 1,800,000</text>
    <text x="315" y="115" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">₩ 1,900,000</text>
    
    <text x="185" y="145" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">₩ 2,200,000</text>
    <text x="315" y="145" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">₩ 2,500,000</text>
  </g>

  <!-- Pointer/Highlight -->
  <g stroke="#ff5252" stroke-width="3" fill="none" marker-end="url(#arrow-red)">
    <path d="M 60 130 C 100 130, 100 160, 140 160" />
  </g>
  <text x="80" y="120" font-family="Arial" font-size="12" font-weight="bold" fill="#d32f2f" text-anchor="middle">가장 강력한 축!</text>

  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff5252" />
    </marker>
  </defs>
</svg>
