<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">시계열 매트릭스 (Time Series Matrix)</text>

  <!-- Left: Components -->
  <text x="140" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">입력 벡터 요소들</text>

  <!-- Time Vector (T) -->
  <rect x="50" y="90" width="80" height="110" fill="#fff" stroke="#1e88e5" stroke-width="2" rx="3"/>
  <rect x="50" y="90" width="80" height="25" fill="#bbdefb" rx="3"/>
  <text x="90" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">시간 축 (T)</text>
  
  <text x="90" y="135" font-family="Courier New, monospace" font-size="12" fill="#1e88e5" text-anchor="middle">t<tspan baseline-shift="sub" font-size="8">0</tspan></text>
  <text x="90" y="165" font-family="Courier New, monospace" font-size="12" fill="#1e88e5" text-anchor="middle">t<tspan baseline-shift="sub" font-size="8">1</tspan></text>
  <text x="90" y="195" font-family="Courier New, monospace" font-size="12" fill="#1e88e5" text-anchor="middle">t<tspan baseline-shift="sub" font-size="8">2</tspan></text>

  <!-- Feature Matrix (F) -->
  <rect x="150" y="90" width="100" height="110" fill="#fff" stroke="#ff9800" stroke-width="2" rx="3"/>
  <rect x="150" y="90" width="100" height="25" fill="#ffe0b2" rx="3"/>
  <text x="200" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">관측치 (F)</text>
  
  <text x="175" y="135" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">1.5</text>
  <text x="225" y="135" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">-0.2</text>
  <text x="175" y="165" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">0.8</text>
  <text x="225" y="165" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">1.1</text>
  <text x="175" y="195" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">-0.5</text>
  <text x="225" y="195" font-family="Courier New, monospace" font-size="12" fill="#333" text-anchor="middle">2.3</text>

  <line x1="200" y1="115" x2="200" y2="200" stroke="#eee" stroke-width="1"/>

  <!-- Arrow -->
  <g stroke="#9c27b0" stroke-width="3" fill="none" marker-end="url(#arrow-purple)">
    <path d="M 270 145 C 300 145, 330 145, 360 145" />
  </g>
  <text x="315" y="135" font-family="Arial" font-size="12" font-weight="bold" fill="#7b1fa2" text-anchor="middle">결합</text>

  <!-- Right: Time Series Matrix -->
  <text x="490" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">다차원 시계열 배열 (T × F)</text>
  
  <rect x="390" y="90" width="220" height="130" fill="#f3e5f5" stroke="#ab47bc" stroke-width="2" rx="5"/>
  
  <rect x="470" y="90" width="140" height="30" fill="#e1bee7" rx="2"/>
  <text x="505" y="110" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">A</text>
  <text x="575" y="110" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">B</text>

  <!-- Index (Time Axis) -->
  <rect x="390" y="120" width="80" height="100" fill="#e3f2fd" rx="2"/>
  <text x="430" y="145" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">2025-03-02</text>
  <text x="430" y="175" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">2025-03-03</text>
  <text x="430" y="205" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">2025-03-04</text>

  <!-- Data Grid -->
  <line x1="390" y1="120" x2="610" y2="120" stroke="#ce93d8" stroke-width="1"/>
  <line x1="470" y1="90" x2="470" y2="220" stroke="#ce93d8" stroke-width="1"/>
  <line x1="540" y1="90" x2="540" y2="220" stroke="#ce93d8" stroke-width="1"/>

  <text x="505" y="145" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">1.5</text>
  <text x="575" y="145" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">-0.2</text>
  
  <text x="505" y="175" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">0.8</text>
  <text x="575" y="175" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">1.1</text>
  
  <text x="505" y="205" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">-0.5</text>
  <text x="575" y="205" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">2.3</text>

  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c27b0" />
    </marker>
  </defs>
</svg>
