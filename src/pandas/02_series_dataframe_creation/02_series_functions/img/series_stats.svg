<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">Series 기초 통계 함수들</text>

  <!-- 원본 데이터 그룹 -->
  <g transform="translate(100, 100)">
    <rect x="-30" y="-30" width="300" height="150" fill="#E8EAF6" rx="10" stroke="#5C6BC0" stroke-dasharray="4,4" />
    <text x="120" y="-10" font-family="sans-serif" font-size="14" fill="#3949AB" font-weight="bold" text-anchor="middle">학급 수학 성적 Data</text>
    
    <circle cx="20" cy="40" r="15" fill="#3949AB" />
    <text x="20" y="44" font-family="sans-serif" font-size="12" fill="#FFF" text-anchor="middle">99</text>
    
    <circle cx="70" cy="40" r="15" fill="#5C6BC0" />
    <text x="70" y="44" font-family="sans-serif" font-size="12" fill="#FFF" text-anchor="middle">84</text>
    
    <circle cx="120" cy="40" r="15" fill="#7986CB" />
    <text x="120" y="44" font-family="sans-serif" font-size="12" fill="#FFF" text-anchor="middle">92</text>
    
    <circle cx="170" cy="40" r="15" fill="#9FA8DA" />
    <text x="170" y="44" font-family="sans-serif" font-size="12" fill="#FFF" text-anchor="middle">65</text>
    
    <circle cx="220" cy="40" r="15" fill="#C5CAE9" />
    <text x="220" y="44" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">78</text>
  </g>

  <!-- 통계 함수 박스들 -->
  <g transform="translate(450, 60)">
    
    <rect x="0" y="0" width="180" height="40" fill="#FFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="90" y="16" font-family="monospace" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">max()</text>
    <text x="90" y="32" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">최댓값 (99)</text>
    
    <rect x="0" y="55" width="180" height="40" fill="#FFF" rx="5" filter="url(#shadow)" stroke="#F44336" stroke-width="2"/>
    <text x="90" y="71" font-family="monospace" font-size="14" fill="#C62828" font-weight="bold" text-anchor="middle">min()</text>
    <text x="90" y="87" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">최솟값 (65)</text>
    
    <rect x="0" y="110" width="180" height="40" fill="#FFF" rx="5" filter="url(#shadow)" stroke="#FF9800" stroke-width="2"/>
    <text x="90" y="126" font-family="monospace" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">mean()</text>
    <text x="90" y="142" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">평균값 (83.6)</text>
    
    <rect x="0" y="165" width="180" height="40" fill="#FFF" rx="5" filter="url(#shadow)" stroke="#9C27B0" stroke-width="2"/>
    <text x="90" y="181" font-family="monospace" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">median()</text>
    <text x="90" y="197" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">중앙값 (84.0)</text>
    
    <rect x="0" y="220" width="180" height="40" fill="#FFF" rx="5" filter="url(#shadow)" stroke="#00BCD4" stroke-width="2"/>
    <text x="90" y="236" font-family="monospace" font-size="14" fill="#00838F" font-weight="bold" text-anchor="middle">count()</text>
    <text x="90" y="252" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">개수 (5)</text>

  </g>

  <!-- 연결선들 -->
  <g transform="translate(350, 140)">
    <path d="M 0 0 L 90 -60" fill="none" stroke="#B0BEC5" stroke-width="2" /> <!-- max -->
    <path d="M 0 0 L 90 -5" fill="none" stroke="#B0BEC5" stroke-width="2" /> <!-- min -->
    <path d="M 0 0 L 90 50" fill="none" stroke="#B0BEC5" stroke-width="2" /> <!-- mean -->
    <path d="M 0 0 L 90 105" fill="none" stroke="#B0BEC5" stroke-width="2" /> <!-- median -->
    <path d="M 0 0 L 90 160" fill="none" stroke="#B0BEC5" stroke-width="2" /> <!-- count -->
  </g>

</svg>
