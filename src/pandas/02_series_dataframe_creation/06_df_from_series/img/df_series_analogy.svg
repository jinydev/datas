<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 280" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="280" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 낱장으로 나뒹구는 서류를 바인더(장부)에 끼워 넣기</text>

  <!-- Left: Loose Papers (Series) -->
  <text x="140" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">낱장 서류들 (Series)</text>

  <!-- Paper 1 -->
  <g transform="translate(60, 90) rotate(-10)">
    <rect x="0" y="0" width="60" height="90" fill="#fff" stroke="#ccc" stroke-width="1" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="60" height="15" fill="#bbdefb"/>
    <text x="30" y="12" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1" text-anchor="middle">강의명</text>
    <line x1="10" y1="30" x2="50" y2="30" stroke="#eee" stroke-width="2"/>
    <line x1="10" y1="50" x2="50" y2="50" stroke="#eee" stroke-width="2"/>
    <line x1="10" y1="70" x2="50" y2="70" stroke="#eee" stroke-width="2"/>
  </g>

  <!-- Paper 2 -->
  <g transform="translate(130, 80) rotate(5)">
    <rect x="0" y="0" width="60" height="90" fill="#fff" stroke="#ccc" stroke-width="1" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="60" height="15" fill="#c8e6c9"/>
    <text x="30" y="12" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20" text-anchor="middle">수강료</text>
    <line x1="10" y1="30" x2="50" y2="30" stroke="#eee" stroke-width="2"/>
    <line x1="10" y1="50" x2="50" y2="50" stroke="#eee" stroke-width="2"/>
    <line x1="10" y1="70" x2="50" y2="70" stroke="#eee" stroke-width="2"/>
  </g>

  <!-- Paper 3 -->
  <g transform="translate(200, 100) rotate(-5)">
    <rect x="0" y="0" width="60" height="90" fill="#fff" stroke="#ccc" stroke-width="1" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="60" height="15" fill="#ffccbc"/>
    <text x="30" y="12" font-family="Arial" font-size="10" font-weight="bold" fill="#bf360c" text-anchor="middle">강사명</text>
    <line x1="10" y1="30" x2="50" y2="30" stroke="#eee" stroke-width="2"/>
    <line x1="10" y1="50" x2="50" y2="50" stroke="#eee" stroke-width="2"/>
    <line x1="10" y1="70" x2="50" y2="70" stroke="#eee" stroke-width="2"/>
  </g>

  <!-- Arrow -->
  <g stroke="#9e9e9e" stroke-width="3" fill="none" stroke-dasharray="4,4" marker-end="url(#arrow)">
    <path d="M 280 140 C 320 100, 360 100, 400 140" />
  </g>
  <text x="340" y="110" font-family="Arial" font-size="12" fill="#757575" text-anchor="middle">바인더에 끼워넣기</text>

  <!-- Right: Binder (DataFrame) -->
  <text x="500" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">튼튼한 장부 바인더 (DataFrame)</text>

  <!-- Binder Cover & Rings -->
  <rect x="420" y="90" width="160" height="130" fill="#37474f" rx="5" filter="drop-shadow(3px 5px 5px rgba(0,0,0,0.2))"/>
  <rect x="430" y="100" width="140" height="110" fill="#fff" rx="2"/>
  
  <!-- Rings -->
  <circle cx="435" cy="115" r="4" fill="#eceff1" stroke="#b0bec5" stroke-width="1"/>
  <circle cx="435" cy="155" r="4" fill="#eceff1" stroke="#b0bec5" stroke-width="1"/>
  <circle cx="435" cy="195" r="4" fill="#eceff1" stroke="#b0bec5" stroke-width="1"/>

  <!-- Inserted Papers inside binder -->
  <rect x="450" y="105" width="35" height="100" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="450" y="105" width="35" height="15" fill="#bbdefb"/>
  <text x="467" y="116" font-family="Arial" font-size="8" font-weight="bold" fill="#0d47a1" text-anchor="middle">강의명</text>
  <line x1="455" y1="135" x2="480" y2="135" stroke="#ccc" stroke-width="2"/>
  <line x1="455" y1="160" x2="480" y2="160" stroke="#ccc" stroke-width="2"/>
  <line x1="455" y1="185" x2="480" y2="185" stroke="#ccc" stroke-width="2"/>

  <rect x="485" y="105" width="35" height="100" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="485" y="105" width="35" height="15" fill="#c8e6c9"/>
  <text x="502" y="116" font-family="Arial" font-size="8" font-weight="bold" fill="#1b5e20" text-anchor="middle">수강료</text>
  <line x1="490" y1="135" x2="515" y2="135" stroke="#ccc" stroke-width="2"/>
  <line x1="490" y1="160" x2="515" y2="160" stroke="#ccc" stroke-width="2"/>
  <line x1="490" y1="185" x2="515" y2="185" stroke="#ccc" stroke-width="2"/>

  <rect x="520" y="105" width="35" height="100" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="520" y="105" width="35" height="15" fill="#ffccbc"/>
  <text x="537" y="116" font-family="Arial" font-size="8" font-weight="bold" fill="#bf360c" text-anchor="middle">강사명</text>
  <line x1="525" y1="135" x2="550" y2="135" stroke="#ccc" stroke-width="2"/>
  <line x1="525" y1="160" x2="550" y2="160" stroke="#ccc" stroke-width="2"/>
  <line x1="525" y1="185" x2="550" y2="185" stroke="#ccc" stroke-width="2"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e" />
    </marker>
  </defs>
</svg>
