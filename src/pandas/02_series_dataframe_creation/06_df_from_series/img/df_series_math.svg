<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">열 벡터(Column Vector)의 가로축(axis=1) 병합</text>

  <!-- Left: 1D Column Vectors (Series) -->
  <text x="160" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">독립된 1차원 열 벡터들 (Series)</text>
  
  <!-- Series 1 -->
  <rect x="50" y="90" width="60" height="120" rx="3" fill="#fff" stroke="#ff9800" stroke-width="2"/>
  <rect x="50" y="90" width="60" height="25" fill="#ffe0b2" rx="3"/>
  <text x="80" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">S1</text>
  <text x="80" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">10</text>
  <text x="80" y="165" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">20</text>
  <text x="80" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">30</text>

  <!-- Series 2 -->
  <rect x="130" y="90" width="60" height="120" rx="3" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <rect x="130" y="90" width="60" height="25" fill="#c8e6c9" rx="3"/>
  <text x="160" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">S2</text>
  <text x="160" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">40</text>
  <text x="160" y="165" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">50</text>
  <text x="160" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">60</text>

  <!-- Series 3 -->
  <rect x="210" y="90" width="60" height="120" rx="3" fill="#fff" stroke="#2196f3" stroke-width="2"/>
  <rect x="210" y="90" width="60" height="25" fill="#bbdefb" rx="3"/>
  <text x="240" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">S3</text>
  <text x="240" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">70</text>
  <text x="240" y="165" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">80</text>
  <text x="240" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">90</text>

  <!-- Arrow -->
  <g stroke="#9c27b0" stroke-width="3" fill="none" marker-end="url(#arrow-purple)">
    <path d="M 290 150 L 370 150" />
  </g>
  <text x="330" y="140" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2" text-anchor="middle">합체 (axis=1)</text>

  <!-- Right: 2D Matrix (DataFrame) -->
  <text x="500" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">2차원 행렬 (DataFrame)</text>
  
  <rect x="410" y="90" width="180" height="120" rx="5" fill="#f3e5f5" stroke="#ab47bc" stroke-width="3"/>
  <rect x="410" y="90" width="180" height="25" fill="#e1bee7" rx="5"/>
  
  <text x="440" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">S1</text>
  <text x="500" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">S2</text>
  <text x="560" y="108" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#0d47a1" text-anchor="middle">S3</text>

  <line x1="470" y1="90" x2="470" y2="210" stroke="#ce93d8" stroke-width="2"/>
  <line x1="530" y1="90" x2="530" y2="210" stroke="#ce93d8" stroke-width="2"/>

  <!-- Col 1 -->
  <text x="440" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">10</text>
  <text x="440" y="165" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">20</text>
  <text x="440" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">30</text>
  <!-- Col 2 -->
  <text x="500" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">40</text>
  <text x="500" y="165" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">50</text>
  <text x="500" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">60</text>
  <!-- Col 3 -->
  <text x="560" y="135" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">70</text>
  <text x="560" y="165" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">80</text>
  <text x="560" y="195" font-family="Courier New, monospace" font-size="14" fill="#333" text-anchor="middle">90</text>

  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c27b0" />
    </marker>
  </defs>
</svg>
