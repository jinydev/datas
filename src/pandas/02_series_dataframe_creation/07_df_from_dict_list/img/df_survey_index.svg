<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">행(Index) 이름표를 붙여 완벽한 종합 성적표 완성하기</text>

  <!-- 파이썬 명령 박스(코드) -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="300" height="150" fill="#263238" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <rect x="0" y="0" width="300" height="25" fill="#37474F" rx="5" />
    <circle cx="15" cy="12" r="5" fill="#FF5252" />
    <circle cx="30" cy="12" r="5" fill="#FFCA28" />
    <circle cx="45" cy="12" r="5" fill="#8BC34A" />

    <text x="15" y="55" font-family="monospace" font-size="14" fill="#82AAFF" font-weight="bold">pd.DataFrame(</text>
    
    <text x="30" y="80" font-family="monospace" font-size="14" fill="#F07178">data</text>
    <text x="65" y="80" font-family="monospace" font-size="14" fill="#89DDFF">= </text>
    <text x="80" y="80" font-family="monospace" font-size="14" fill="#C3E88D">survey_data,</text>
    
    <text x="30" y="105" font-family="monospace" font-size="14" fill="#F07178">index</text>
    <text x="75" y="105" font-family="monospace" font-size="14" fill="#89DDFF">= </text>
    <text x="90" y="105" font-family="monospace" font-size="14" fill="#FFF">['김국진', '신영희', '이길순']</text>
    
    <text x="15" y="130" font-family="monospace" font-size="14" fill="#82AAFF" font-weight="bold">)</text>

    <!-- index 매핑 화살표 -->
    <path d="M 285 100 L 400 100" fill="none" stroke="#FF9800" stroke-width="3" stroke-dasharray="3,3" />
    <polygon points="395,93 405,100 395,107" fill="#FF9800" />
    <text x="350" y="90" font-family="sans-serif" font-size="12" fill="#E65100" font-weight="bold" text-anchor="middle">행 이름 덮어쓰기</text>
  </g>

  <!-- 결과 표 -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="220" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- 컬럼 헤더 (모든 Key의 통합) -->
    <rect x="40" y="0" width="180" height="30" fill="#E3F2FD" rx="3" />
    <text x="70" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">국어</text>
    <text x="130" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">수학</text>
    <text x="190" y="20" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">영어</text>
    
    <!-- 인덱스: 이름 지정됨 -->
    <rect x="-30" y="30" width="70" height="120" fill="#FFE0B2" rx="3" />
    <text x="5" y="65" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">김국진</text>
    <text x="5" y="100" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">신영희</text>
    <text x="5" y="135" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">이길순</text>

    <!-- 데이터 영역 -->
    <!-- 학생 0 -->
    <text x="70" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">70.0</text>
    <text x="130" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">89.0</text>
    <text x="190" y="65" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">90</text>
    
    <!-- 학생 1 (수학 결측치) -->
    <text x="70" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">80.0</text>
    <rect x="110" y="85" width="40" height="20" fill="#FFCDD2" rx="3" />
    <text x="130" y="100" font-family="sans-serif" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">NaN</text>
    <text x="190" y="100" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">99</text>
    
    <!-- 학생 2 (국어 결측치) -->
    <rect x="50" y="120" width="40" height="20" fill="#FFCDD2" rx="3" />
    <text x="70" y="135" font-family="sans-serif" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">NaN</text>
    <text x="130" y="135" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">66.0</text>
    <text x="190" y="135" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">78</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 270)">
    <rect x="-240" y="-15" width="480" height="35" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">JSON 파싱 등 실제 웹 데이터 수집 환경에서 마주치는 가장 흔한 시나리오!</text>
  </g>

</svg>
