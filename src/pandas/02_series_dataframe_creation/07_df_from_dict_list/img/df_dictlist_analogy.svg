<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 250" width="100%" height="100%">
  <!-- Background -->
  <rect width="650" height="250" fill="#f8f9fa" rx="10" />
  
  <text x="325" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">비유: 구멍난 설문지 뭉치 취합하여 종합 현황판 만들기</text>

  <!-- Left: Survey Papers (List of Dicts) -->
  <text x="140" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">제출된 설문지 뭉치 (List)</text>

  <!-- Paper 1 -->
  <g transform="translate(40, 90) rotate(-5)">
    <rect x="0" y="0" width="70" height="100" fill="#fff" stroke="#ccc" stroke-width="1" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="70" height="15" fill="#bbdefb"/>
    <text x="35" y="11" font-family="Arial" font-size="10" font-weight="bold" fill="#0d47a1" text-anchor="middle">학생 1</text>
    
    <text x="10" y="35" font-family="Arial" font-size="10" fill="#333">국어: 70</text>
    <text x="10" y="55" font-family="Arial" font-size="10" fill="#333">수학: 89</text>
    <text x="10" y="75" font-family="Arial" font-size="10" fill="#333">영어: 90</text>
    <circle cx="55" cy="71" r="8" fill="none" stroke="#e53935" stroke-width="2"/>
    <text x="55" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#e53935" text-anchor="middle">O</text>
  </g>

  <!-- Paper 2 -->
  <g transform="translate(120, 80) rotate(5)">
    <rect x="0" y="0" width="70" height="100" fill="#fff" stroke="#ccc" stroke-width="1" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="70" height="15" fill="#c8e6c9"/>
    <text x="35" y="11" font-family="Arial" font-size="10" font-weight="bold" fill="#1b5e20" text-anchor="middle">학생 2</text>
    
    <text x="10" y="35" font-family="Arial" font-size="10" fill="#333">국어: 80</text>
    <!-- 수학 누락 -->
    <text x="10" y="55" font-family="Arial" font-size="10" fill="#999" font-style="italic">(수학 안봄)</text>
    <text x="10" y="75" font-family="Arial" font-size="10" fill="#333">영어: 99</text>
  </g>

  <!-- Paper 3 -->
  <g transform="translate(200, 100) rotate(-3)">
    <rect x="0" y="0" width="70" height="100" fill="#fff" stroke="#ccc" stroke-width="1" filter="drop-shadow(2px 2px 3px rgba(0,0,0,0.1))"/>
    <rect x="0" y="0" width="70" height="15" fill="#ffccbc"/>
    <text x="35" y="11" font-family="Arial" font-size="10" font-weight="bold" fill="#bf360c" text-anchor="middle">학생 3</text>
    
    <!-- 국어 누락 -->
    <text x="10" y="35" font-family="Arial" font-size="10" fill="#999" font-style="italic">(국어 안봄)</text>
    <text x="10" y="55" font-family="Arial" font-size="10" fill="#333">수학: 66</text>
    <text x="10" y="75" font-family="Arial" font-size="10" fill="#333">영어: 78</text>
  </g>

  <!-- Arrow -->
  <g stroke="#9e9e9e" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 280 140 C 320 100, 350 100, 390 140" />
  </g>
  <text x="335" y="110" font-family="Arial" font-size="12" font-weight="bold" fill="#757575" text-anchor="middle">취합(Agg)</text>

  <!-- Right: Big Clipboard (DataFrame) -->
  <text x="510" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#666" text-anchor="middle">거대한 종합 현황판 (DataFrame)</text>

  <!-- Clipboard Board -->
  <rect x="400" y="90" width="220" height="130" fill="#e0e0e0" rx="10" filter="drop-shadow(2px 4px 6px rgba(0,0,0,0.2))"/>
  <rect x="470" y="80" width="80" height="15" fill="#b0bec5" rx="5"/>
  <circle cx="510" cy="87" r="3" fill="#37474f"/>
  
  <!-- Paper on Clipboard -->
  <rect x="410" y="100" width="200" height="110" fill="#fff" rx="2"/>

  <!-- Table Headers -->
  <rect x="450" y="100" width="160" height="25" fill="#eceff1"/>
  <text x="480" y="118" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">국어</text>
  <text x="530" y="118" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">수학</text>
  <text x="580" y="118" font-family="Arial" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">영어</text>

  <!-- Table Index -->
  <rect x="410" y="125" width="40" height="85" fill="#fafafa"/>
  <text x="430" y="145" font-family="Arial" font-size="12" font-weight="bold" fill="#666" text-anchor="middle">학생 1</text>
  <text x="430" y="170" font-family="Arial" font-size="12" font-weight="bold" fill="#666" text-anchor="middle">학생 2</text>
  <text x="430" y="195" font-family="Arial" font-size="12" font-weight="bold" fill="#666" text-anchor="middle">학생 3</text>

  <!-- Data Grid -->
  <line x1="410" y1="125" x2="610" y2="125" stroke="#ccc" stroke-width="1"/>
  <line x1="410" y1="150" x2="610" y2="150" stroke="#ccc" stroke-width="1"/>
  <line x1="410" y1="175" x2="610" y2="175" stroke="#ccc" stroke-width="1"/>
  
  <line x1="450" y1="100" x2="450" y2="210" stroke="#ccc" stroke-width="1"/>
  <line x1="505" y1="100" x2="505" y2="210" stroke="#ccc" stroke-width="1"/>
  <line x1="555" y1="100" x2="555" y2="210" stroke="#ccc" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="480" y="145" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">70</text>
  <text x="530" y="145" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">89</text>
  <text x="580" y="145" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">90</text>

  <!-- Row 2 -->
  <text x="480" y="170" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">80</text>
  <rect x="515" y="157" width="30" height="15" fill="#ffebee" rx="2"/>
  <text x="530" y="170" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935" text-anchor="middle">NaN</text>
  <text x="580" y="170" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">99</text>

  <!-- Row 3 -->
  <rect x="465" y="182" width="30" height="15" fill="#ffebee" rx="2"/>
  <text x="480" y="195" font-family="Arial" font-size="10" font-weight="bold" fill="#e53935" text-anchor="middle">NaN</text>
  <text x="530" y="195" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">66</text>
  <text x="580" y="195" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">78</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e" />
    </marker>
  </defs>
</svg>
