<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="320" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">비유: 건물 뼈대(Framework)를 세우는 주문서</text>

  <!-- Blueprint / Order form -->
  <rect x="50" y="80" width="180" height="200" fill="#fff9c4" stroke="#fbc02d" stroke-width="2" rx="5" filter="drop-shadow(2px 4px 6px rgba(0,0,0,0.1))"/>
  <rect x="50" y="80" width="180" height="30" fill="#fbc02d" rx="5"/>
  <text x="140" y="100" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">건축 주문서</text>

  <rect x="60" y="125" width="16" height="16" rx="2" fill="#2196f3"/>
  <text x="85" y="138" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0">data</text>
  <text x="85" y="153" font-family="Arial" font-size="12" fill="#666">(건물 채울 벽돌/가구)</text>

  <rect x="60" y="175" width="16" height="16" rx="2" fill="#ff9800"/>
  <text x="85" y="188" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">index</text>
  <text x="85" y="203" font-family="Arial" font-size="12" fill="#666">(각 층의 이름표)</text>

  <rect x="60" y="225" width="16" height="16" rx="2" fill="#4caf50"/>
  <text x="85" y="238" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32">columns</text>
  <text x="85" y="253" font-family="Arial" font-size="12" fill="#666">(각 방의 용도)</text>

  <!-- Arrow -->
  <g stroke="#9e9e9e" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 245 180 L 295 180" />
  </g>

  <!-- Building -->
  <text x="420" y="75" font-family="Arial" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">완성된 표 (DataFrame 건물)</text>

  <!-- Columns (Roof) -->
  <rect x="360" y="90" width="160" height="30" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="400" y="110" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">거실</text>
  <text x="480" y="110" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">안방</text>
  <path d="M 360 85 L 360 115 L 340 115" stroke="#4caf50" stroke-width="2" fill="none"/>
  <text x="330" y="105" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="end">columns</text>

  <!-- Index (Left side) -->
  <rect x="320" y="130" width="40" height="150" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="340" y="160" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">3층</text>
  <text x="340" y="210" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">2층</text>
  <text x="340" y="260" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">1층</text>
  <path d="M 315 130 L 290 130" stroke="#ff9800" stroke-width="2" fill="none"/>
  <text x="285" y="135" font-family="Arial" font-size="12" font-weight="bold" fill="#e65100" text-anchor="end">index</text>

  <!-- Data (Bricks) -->
  <rect x="360" y="130" width="160" height="150" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <line x1="360" y1="180" x2="520" y2="180" stroke="#90caf9" stroke-width="1"/>
  <line x1="360" y1="230" x2="520" y2="230" stroke="#90caf9" stroke-width="1"/>
  <line x1="440" y1="130" x2="440" y2="280" stroke="#90caf9" stroke-width="1"/>

  <text x="400" y="160" font-family="Arial" font-size="14" fill="#1565c0" text-anchor="middle">🧱</text>
  <text x="480" y="160" font-family="Arial" font-size="14" fill="#1565c0" text-anchor="middle">🧱</text>
  <text x="400" y="210" font-family="Arial" font-size="14" fill="#1565c0" text-anchor="middle">🧱</text>
  <text x="480" y="210" font-family="Arial" font-size="14" fill="#1565c0" text-anchor="middle">🧱</text>
  <text x="400" y="260" font-family="Arial" font-size="14" fill="#1565c0" text-anchor="middle">🧱</text>
  <text x="480" y="260" font-family="Arial" font-size="14" fill="#1565c0" text-anchor="middle">🧱</text>

  <path d="M 525 280 L 550 280" stroke="#2196f3" stroke-width="2" fill="none"/>
  <text x="555" y="285" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="start">data</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e" />
    </marker>
  </defs>
</svg>
