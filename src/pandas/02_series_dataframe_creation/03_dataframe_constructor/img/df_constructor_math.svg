<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="300" fill="#f8f9fa" rx="10" />
  
  <text x="300" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">이기종 행렬(Heterogeneous Matrix) 공간 선언</text>

  <!-- Mathematical Notation -->
  <text x="300" y="80" font-family="Times New Roman, serif" font-size="24" font-style="italic" font-weight="bold" fill="#1565c0" text-anchor="middle">A_m×n</text>

  <!-- Matrix Structure -->
  <rect x="200" y="110" width="200" height="150" fill="#fff" stroke="#333" stroke-width="2"/>
  
  <!-- Grid Lines -->
  <line x1="200" y1="160" x2="400" y2="160" stroke="#ccc" stroke-width="1"/>
  <line x1="200" y1="210" x2="400" y2="210" stroke="#ccc" stroke-width="1"/>
  <line x1="266" y1="110" x2="266" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="333" y1="110" x2="333" y2="260" stroke="#ccc" stroke-width="1"/>

  <!-- Annotations -->
  
  <!-- Columns (n) -->
  <path d="M 200 95 L 400 95" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrow-green)" marker-start="url(#arrow-green-start)"/>
  <text x="300" y="85" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">n 개의 열 (Columns)</text>
  
  <!-- Types per column -->
  <rect x="210" y="125" width="45" height="20" rx="3" fill="#c8e6c9"/>
  <text x="233" y="140" font-family="Courier New, monospace" font-size="12" fill="#1b5e20" text-anchor="middle">int</text>
  
  <rect x="278" y="175" width="45" height="20" rx="3" fill="#ffccbc"/>
  <text x="300" y="190" font-family="Courier New, monospace" font-size="12" fill="#bf360c" text-anchor="middle">str</text>

  <rect x="345" y="225" width="45" height="20" rx="3" fill="#bbdefb"/>
  <text x="368" y="240" font-family="Courier New, monospace" font-size="12" fill="#0d47a1" text-anchor="middle">float</text>

  <!-- Rows (m) -->
  <path d="M 185 110 L 185 260" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrow-orange)" marker-start="url(#arrow-orange-start)"/>
  <text x="175" y="185" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="end" transform="rotate(-90 175 185)">m 개의 행 (Index)</text>

  <text x="300" y="285" font-family="Arial" font-size="14" fill="#757575" text-anchor="middle">※ 이기종 행렬: 열(Column)마다 데이터 타입(dtype)이 다를 수 있음</text>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50" />
    </marker>
    <marker id="arrow-green-start" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#4caf50" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff9800" />
    </marker>
    <marker id="arrow-orange-start" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
