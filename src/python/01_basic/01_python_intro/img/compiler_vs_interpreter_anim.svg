<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <style>
      .code-text { font-family: 'Courier New', monospace; font-size: 14px; fill: #d4d4d4; }
      .box { rx: 5; ry: 5; fill: #1e1e1e; stroke: #3c3c3c; stroke-width: 2; }
      .title { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      
      /* Compiler Animation (Java) */
      @keyframes scanAll {
        0%, 20% { height: 0; opacity: 1; }
        40%, 100% { height: 100px; opacity: 1; }
      }
      @keyframes popOutClass {
        0%, 40% { opacity: 0; transform: scale(0.8); }
        50%, 100% { opacity: 1; transform: scale(1); }
      }
      
      /* Interpreter Animation (Python) */
      @keyframes readLine1 { 0%, 50% {opacity:0} 55%, 100% {opacity:1} }
      @keyframes readLine2 { 0%, 65% {opacity:0} 70%, 100% {opacity:1} }
      @keyframes readLine3 { 0%, 80% {opacity:0} 85%, 100% {opacity:1} }
      
      .scan-block { fill: rgba(0, 150, 255, 0.3); animation: scanAll 5s infinite; }
      .class-file { animation: popOutClass 5s infinite; }
      
      .py-run1 { fill: #f1fa8c; opacity: 0.3; animation: readLine1 5s infinite; }
      .py-run2 { fill: #f1fa8c; opacity: 0.3; animation: readLine2 5s infinite; }
      .py-run3 { fill: #f1fa8c; opacity: 0.3; animation: readLine3 5s infinite; }
    </style>
  </defs>

  <!-- 컴파일러 방식 (Java) -->
  <g transform="translate(50, 30)">
    <text x="100" y="0" class="title" text-anchor="middle">Java (Compiler)</text>
    
    <!-- 소스 코드 영역 -->
    <rect x="0" y="20" width="120" height="120" class="box" />
    <text x="10" y="45" class="code-text">int a = 1;</text>
    <text x="10" y="70" class="code-text">int b = 2;</text>
    <text x="10" y="95" class="code-text">print(a+b);</text>
    
    <!-- 스캐너 애니메이션 -->
    <rect x="0" y="20" width="120" height="0" class="scan-block" />
    
    <!-- 화살표 -->
    <path d="M 130 80 L 170 80" stroke="white" stroke-width="2" marker-end="url(#arrow)" />
    
    <!-- 실행 파일 영역 (.class) -->
    <g class="class-file" transform="translate(180, 20)">
      <rect x="0" y="0" width="100" height="120" rx="5" ry="5" fill="#2d2d2d" stroke="#555" stroke-width="2" />
      <text x="50" y="65" font-family="monospace" font-size="12" fill="#8be9fd" text-anchor="middle">.class File</text>
    </g>
  </g>

  <!-- 구분선 -->
  <line x1="400" y1="20" x2="400" y2="280" stroke="#555" stroke-width="2" stroke-dasharray="5,5" />

  <!-- 인터프리터 방식 (Python) -->
  <g transform="translate(450, 30)">
    <text x="100" y="0" class="title" text-anchor="middle">Python (Interpreter)</text>
    
    <!-- 소스 코드 영역 -->
    <rect x="0" y="20" width="120" height="120" class="box" />
    
    <!-- 라인 하라이트 (애니메이션) -->
    <rect x="5" y="32" width="110" height="18" class="py-run1" />
    <rect x="5" y="57" width="110" height="18" class="py-run2" />
    <rect x="5" y="82" width="110" height="18" class="py-run3" />

    <text x="10" y="45" class="code-text" style="position:relative; z-index: 10;">a = 1</text>
    <text x="10" y="70" class="code-text">b = 2</text>
    <text x="10" y="95" class="code-text">print(a+b)</text>

    <!-- 화살표 -->
    <path d="M 130 50 L 170 80" stroke="white" stroke-width="2" />
    <path d="M 130 80 L 170 80" stroke="white" stroke-width="2" />
    <path d="M 130 110 L 170 80" stroke="white" stroke-width="2" />
    
    <!-- 즉시 실행 결과 영역 -->
    <g transform="translate(180, 20)">
      <rect x="0" y="0" width="100" height="120" rx="5" ry="5" fill="#1e1e1e" stroke="#50fa7b" stroke-width="2" />
      <text x="50" y="65" font-family="monospace" font-size="16" font-weight="bold" fill="#50fa7b" text-anchor="middle">Run!</text>
    </g>
  </g>
</svg>
