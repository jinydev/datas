<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box { fill: #313244; stroke: #45475a; stroke-width: 2; rx: 8; }
      
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 26px; font-weight: bold; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .string-box { fill: #89b4fa; stroke: #b4befe; stroke-width: 2; rx: 5; opacity: 0.9; }
      .string-char { font-family: monospace; font-size: 20px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; }
      
      /* Animation */
      @keyframes popChange {
        0%, 100% { transform: scale(1); filter: none; }
        50% { transform: scale(1.05); filter: drop-shadow(0 0 8px #a6e3a1); }
      }
      .anim-pop { animation: popChange 3s infinite ease-in-out; transform-origin: center; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- METHOD 1: upper() -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="340" height="120" class="box" />
    <text x="170" y="30" class="text-title">1. upper() 대문자 변환</text>
    
    <!-- Input -->
    <text x="20" y="75" class="text-code" fill="#f38ba8">"hello"</text>
    <path d="M 125,65 L 165,65" fill="none" stroke="#bac2de" stroke-width="4" marker-end="url(#arrow)" />
    
    <!-- Output -->
    <g class="anim-pop" style="transform-origin: 250px 70px;">
      <rect x="180" y="45" width="140" height="40" class="string-box" fill="#a6e3a1" />
      <text x="250" y="73" class="string-char" fill="#1e1e2e">"HELLO"</text>
    </g>
    <text x="170" y="110" class="text-desc">모든 소문자를 덩치 큰 대문자로 뻥튀기!</text>
  </g>

  <!-- METHOD 2: replace() -->
  <g transform="translate(420, 40)">
    <rect x="0" y="0" width="340" height="120" class="box" />
    <text x="170" y="30" class="text-title">2. replace("a", "o")</text>
    
    <!-- Input -->
    <text x="20" y="75" class="text-code" fill="#f38ba8">"apple"</text>
    <path d="M 125,65 L 165,65" fill="none" stroke="#bac2de" stroke-width="4" marker-end="url(#arrow)" />
    
    <!-- Output -->
    <g class="anim-pop" style="transform-origin: 250px 70px;">
      <rect x="180" y="45" width="140" height="40" class="string-box" fill="#f9e2af" />
      <text x="250" y="73" class="string-char" fill="#1e1e2e">"opple"</text>
    </g>
    <text x="170" y="110" class="text-desc">원하는 타겟 글자를 새 글자로 쏙 빼서 교체!</text>
  </g>

  <!-- METHOD 3: split() -->
  <g transform="translate(40, 190)">
    <rect x="0" y="0" width="720" height="120" class="box" />
    <text x="360" y="30" class="text-title">3. split(" ") 띄어쓰기 기준 칼빵 내어 리스트로 조각내기</text>
    
    <!-- Input -->
    <text x="60" y="75" class="text-code" fill="#f38ba8">"I love Python"</text>
    <path d="M 285,65 L 345,65" fill="none" stroke="#bac2de" stroke-width="4" marker-end="url(#arrow)" />
    
    <!-- Output (List format) -->
    <g class="anim-pop" style="transform-origin: 520px 70px;">
      <text x="375" y="75" class="text-code" fill="#bac2de">[</text>
      <rect x="390" y="45" width="50" height="40" class="string-box" fill="#cba6f7" />
      <text x="415" y="73" class="string-char">"I"</text>
      
      <text x="445" y="75" class="text-code" fill="#bac2de">,</text>
      
      <rect x="465" y="45" width="85" height="40" class="string-box" fill="#cba6f7" />
      <text x="507" y="73" class="string-char">"love"</text>
      
      <text x="555" y="75" class="text-code" fill="#bac2de">,</text>
      
      <rect x="575" y="45" width="105" height="40" class="string-box" fill="#cba6f7" />
      <text x="627" y="73" class="string-char">"Python"</text>
      <text x="685" y="75" class="text-code" fill="#bac2de">]</text>
    </g>
    <text x="360" y="110" class="text-desc">긴 문장을 단어 단위로 토막토막 썰어서 요리(리스트)에 담아줍니다.</text>
  </g>

  <!-- Arrow marker definition -->
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#bac2de" />
  </marker>
</svg>
