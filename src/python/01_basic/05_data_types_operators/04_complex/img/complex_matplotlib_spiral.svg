<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .axis { stroke: #585b70; stroke-width: 2; stroke-dasharray: 4,4; }
      .grid { stroke: #313244; stroke-width: 1; }
      
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #f38ba8; text-anchor: middle; }
      .subtitle { font-family: sans-serif; font-size: 14px; fill: #bac2de; text-anchor: middle; }
      
      .label-real { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #a6e3a1; }
      .label-imag { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #cba6f7; }
      
      /* Spiral Path */
      .spiral-line { fill: none; stroke: url(#grad1); stroke-width: 3; stroke-linecap: round; }
      
      /* Glowing Dots */
      .dot { fill: #f9e2af; filter: drop-shadow(0 0 5px #f9e2af); }
      
      /* Animation: Drawing the spiral */
      @keyframes drawSpiral {
        from { stroke-dashoffset: 2000; }
        to { stroke-dashoffset: 0; }
      }
      .anim-spiral { stroke-dasharray: 2000; animation: drawSpiral 4s ease-out infinite alternate; }
      
      @keyframes pulse {
        0%, 100% { r: 5; opacity: 1; }
        50% { r: 8; opacity: 0.8; }
      }
      .anim-dot { animation: pulse 2s infinite; }
      
      .code-box { fill: #11111b; rx: 10; stroke: #45475a; }
      .code-text { font-family: monospace; font-size: 14px; fill: #cdd6f4; }
      .code-keyword { fill: #cba6f7; }
      .code-func { fill: #89b4fa; }
      .code-string { fill: #a6e3a1; }
      .code-comment { fill: #6c7086; font-style: italic; }
    </style>
    
    <!-- Marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#585b70" />
    </marker>

    <!-- Gradient for Spiral -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f38ba8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cba6f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="40" class="title">Matplotlib: 복소수 회전과 팽창 (Complex Spiral)</text>
  <text x="400" y="65" class="subtitle">1차원의 숫자가 허수를 만나 2차원 공간을 우아하게 춤추는 궤적 시각화</text>

  <!-- Graphic Section -->
  <g transform="translate(250, 320)">
    <!-- Grid -->
    <circle cx="0" cy="0" r="50" fill="none" class="grid" />
    <circle cx="0" cy="0" r="100" fill="none" class="grid" />
    <circle cx="0" cy="0" r="150" fill="none" class="grid" />
    <circle cx="0" cy="0" r="200" fill="none" class="grid" />

    <!-- Axes -->
    <line x1="-220" y1="0" x2="220" y2="0" class="axis" marker-end="url(#arrow)" />
    <line x1="0" y1="220" x2="0" y2="-220" class="axis" marker-end="url(#arrow)" />
    
    <text x="230" y="5" class="label-real">Real</text>
    <text x="-15" y="-230" class="label-imag">Imag</text>

    <!-- Spiral generated by compounding complex numbers Z = Z * (1.05 + 0.15j) -->
    <!-- Approximated SVG path for artistic representation -->
    <path d="M 30,0 C 30,-20 -5,-35 -20,-30 C -40,-20 -45,15 -35,40 C -15,75 40,80 70,50 C 115,10 110,-70 55,-120 C -20,-180 -130,-140 -170,-50 C -220,50 -160,180 -40,210" class="spiral-line anim-spiral" />
    
    <!-- Data points (Dots along the spiral) -->
    <circle cx="30" cy="0" r="5" class="dot" />
    <circle cx="-10" cy="-30" r="5" class="dot" />
    <circle cx="-35" cy="25" r="5" class="dot" />
    <circle cx="45" cy="55" r="5" class="dot" />
    <circle cx="85" cy="-45" r="5" class="dot" />
    <circle cx="-25" cy="-120" r="5" class="dot anim-dot" style="animation-delay: 0.5s;" />
    <circle cx="-135" cy="-5" r="5" class="dot anim-dot" style="animation-delay: 1.0s;" />
    <circle cx="-35" cy="180" r="5" class="dot anim-dot" style="animation-delay: 1.5s;" />
  </g>

  <!-- Code Snippet Box (Vibe Coding Overlay) -->
  <g transform="translate(500, 100)">
    <rect x="0" y="0" width="280" height="460" class="code-box" />
    
    <!-- Code Window Title -->
    <rect x="0" y="0" width="280" height="30" fill="#313244" rx="10" />
    <circle cx="15" cy="15" r="5" fill="#f38ba8" />
    <circle cx="30" cy="15" r="5" fill="#f9e2af" />
    <circle cx="45" cy="15" r="5" fill="#a6e3a1" />
    <text x="140" y="20" font-family="monospace" font-size="12" fill="#a6adc8" text-anchor="middle">complex_spiral.py</text>
    
    <!-- Code Content -->
    <g transform="translate(15, 55)">
      <text y="0" class="code-comment"># 바이브코딩: 복소수 나선 궤적</text>
      
      <text y="30"><tspan class="code-keyword">import</tspan> matplotlib.pyplot <tspan class="code-keyword">as</tspan> plt</text>
      
      <text y="60" class="code-comment"># 출발점: 현실의 숫자 1</text>
      <text y="80">z = <tspan class="code-func">complex</tspan>(1, 0)</text>
      
      <text y="110" class="code-comment"># 회전 &amp; 팽창을 일으키는 마법 가루</text>
      <text y="130" class="code-comment"># (크기 5% 증가, 각도 미세 회전)</text>
      <text y="150">magic = <tspan class="code-func">complex</tspan>(1.05, 0.15)</text>
      
      <text y="180">X, Y = [], []</text>
      
      <text y="210"><tspan class="code-keyword">for</tspan> _ <tspan class="code-keyword">in</tspan> <tspan class="code-func">range</tspan>(50):</text>
      <text y="230" x="20">X.append(z.real)</text>
      <text y="250" x="20">Y.append(z.imag)</text>
      <text y="270" x="20" class="code-comment"># 허수 공간 곱셈! (회전/팽창)</text>
      <text y="290" x="20">z = z * magic</text>
      
      <text y="330"><tspan class="code-func">plt.plot</tspan>(X, Y, <tspan class="code-string">"o-"</tspan>, color=<tspan class="code-string">"pink"</tspan>)</text>
      <text y="350"><tspan class="code-func">plt.title</tspan>(<tspan class="code-string">"Complex Spiral"</tspan>)</text>
      <text y="370"><tspan class="code-func">plt.show</tspan>()</text>
    </g>
  </g>

</svg>
