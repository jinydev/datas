<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box-float { rx: 10; ry: 10; fill: #313244; stroke: #89dceb; stroke-width: 2; }
      .box-int { rx: 10; ry: 10; fill: #313244; stroke: #f9e2af; stroke-width: 2; }
      
      .title { font-family: sans-serif; font-size: 26px; font-weight: bold; fill: #f38ba8; text-anchor: middle; }
      .subtitle { font-family: sans-serif; font-size: 16px; fill: #bac2de; text-anchor: middle; }
      
      .num-text { font-family: monospace; font-size: 36px; font-weight: bold; text-anchor: middle; }
      .label-text { font-family: sans-serif; font-size: 16px; text-anchor: middle; fill: #a6adc8; }
      .func-text { font-family: monospace; font-size: 20px; font-weight: bold; fill: #cba6f7; text-anchor: middle; }
      
      .arrow { fill: none; stroke: #cba6f7; stroke-width: 4; stroke-dasharray: 6,6; }
      
      /* Animation for conversion path */
      @keyframes floatToInt {
        0% { stroke-dashoffset: 100; stroke: #89dceb; }
        50% { stroke: #cba6f7; }
        100% { stroke-dashoffset: 0; stroke: #f9e2af; }
      }
      .anim-f2i { animation: floatToInt 2s infinite linear; }
      
      @keyframes intToFloat {
        0% { stroke-dashoffset: -100; stroke: #f9e2af; }
        50% { stroke: #cba6f7; }
        100% { stroke-dashoffset: 0; stroke: #89dceb; }
      }
      .anim-i2f { animation: intToFloat 2s infinite linear; }
      
      .cut-line { stroke: #f38ba8; stroke-width: 3; }
    </style>
    <marker id="arrowhead-f2i" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f9e2af" />
    </marker>
    <marker id="arrowhead-i2f" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#89dceb" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="45" class="title">차원을 넘나드는 형변환 (Type Casting)</text>
  <text x="400" y="70" class="subtitle">연속적인 실수 세계(float)와 불연속적인 정수 세계(int)의 데이터 손실과 복원</text>

  <!-- Left Side: Real Numbers (Continuous) -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="220" height="150" class="box-float" />
    <text x="110" y="40" class="label-text" fill="#89dceb" font-weight="bold">실수 (Real Numbers)</text>
    <text x="110" y="65" class="label-text">1차원의 부드러운 연속성</text>
    <text x="110" y="115" class="num-text" fill="#89dceb">3.1415</text>
  </g>

  <!-- Right Side: Integers (Discrete) -->
  <g transform="translate(480, 150)">
    <rect x="0" y="0" width="220" height="150" class="box-int" />
    <text x="110" y="40" class="label-text" fill="#f9e2af" font-weight="bold">정수 (Integers)</text>
    <text x="110" y="65" class="label-text">징검다리처럼 뚝뚝 끊어짐</text>
    <text x="110" y="115" class="num-text" fill="#f9e2af">3</text>
  </g>

  <!-- Float to Int Path -->
  <path d="M 330 180 Q 400 130 470 180" class="arrow anim-f2i" marker-end="url(#arrowhead-f2i)" />
  <text x="400" y="150" class="func-text">int() 함수</text>
  <text x="400" y="170" class="label-text" fill="#f38ba8" font-size="14">데이터 손실 발생! (.1415 삭제)</text>
  <!-- Scissor cut effect -->
  <line x1="160" y1="245" x2="160" y2="280" class="cut-line" />
  <text x="160" y="295" class="label-text" fill="#f38ba8" font-size="14">소수점 아래 절사(Truncate)</text>

  <!-- Int to Float Path -->
  <path d="M 470 270 Q 400 320 330 270" class="arrow anim-i2f" marker-end="url(#arrowhead-i2f)" />
  <text x="400" y="325" class="func-text">float() 함수</text>
  <text x="400" y="345" class="label-text" fill="#a6e3a1" font-size="14">차원의 강제 승격 (.0 부착)</text>

  <!-- Number line visual -->
  <g transform="translate(100, 420)">
    <line x1="0" y1="0" x2="600" y2="0" stroke="#585b70" stroke-width="4" />
    <circle cx="200" cy="0" r="6" fill="#f9e2af" />
    <text x="200" y="-15" class="label-text" fill="#f9e2af">정수: 3</text>
    
    <circle cx="400" cy="0" r="6" fill="#f9e2af" />
    <text x="400" y="-15" class="label-text" fill="#f9e2af">정수: 4</text>
    
    <!-- Float position -->
    <circle cx="228" cy="0" r="8" fill="#89dceb" />
    <text x="228" y="25" class="label-text" fill="#89dceb">실수: 3.1415</text>
    
    <path d="M 228 -10 C 228 -30 200 -30 200 -10" fill="none" stroke="#f38ba8" stroke-width="2" stroke-dasharray="2,2" />
  </g>
</svg>
