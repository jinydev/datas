<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box { rx: 8; ry: 8; fill: #313244; stroke-width: 2; }
      .box-ascii { stroke: #a6e3a1; }
      .box-unicode { stroke: #f9e2af; }
      .box-binary { stroke: #cba6f7; }
      
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #f38ba8; text-anchor: middle; }
      .subtitle { font-family: sans-serif; font-size: 16px; fill: #bac2de; text-anchor: middle; font-style: italic; }
      
      .text-main { font-family: sans-serif; font-size: 40px; font-weight: bold; fill: #f8f8f2; text-anchor: middle; }
      .text-sub { font-family: monospace; font-size: 18px; fill: #89dceb; text-anchor: middle; }
      .text-label { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .arrow { fill: none; stroke: #9399b2; stroke-width: 3; stroke-dasharray: 5,5; marker-end: url(#arrowhead); }

      @keyframes slideRight {
        0% { transform: translateX(-10px); opacity: 0; }
        50% { transform: translateX(5px); opacity: 1; }
        100% { transform: translateX(10px); opacity: 0; }
      }
      .anim-arrow { animation: slideRight 2s infinite linear; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9399b2" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="40" class="title">문자는 글자가 아니라 숫자다! (ASCII &amp; Unicode)</text>
  <text x="400" y="65" class="subtitle">파이썬의 ord()와 chr() 함수로 문자의 껍질을 벗겨봅시다.</text>

  <!-- ASCII Example -->
  <g transform="translate(150, 110)">
    <text x="-40" y="45" class="text-label" fill="#a6e3a1" font-weight="bold">ASCII</text>
    
    <rect x="0" y="0" width="100" height="80" class="box box-ascii" />
    <text x="50" y="45" class="text-main">'A'</text>
    <text x="50" y="70" class="text-label">인간의 문자</text>
    
    <path d="M 110 40 L 170 40" class="arrow anim-arrow" />
    <text x="140" y="30" class="text-sub">ord()</text>
    
    <rect x="180" y="0" width="100" height="80" class="box box-ascii" />
    <text x="230" y="45" class="text-main" fill="#a6e3a1">65</text>
    <text x="230" y="70" class="text-label">10진수 숫자</text>
    
    <path d="M 290 40 L 350 40" class="arrow anim-arrow" style="animation-delay: 0.5s;" />
    <text x="320" y="30" class="text-sub">bin()</text>
    
    <rect x="360" y="0" width="150" height="80" class="box box-binary" />
    <text x="435" y="45" class="text-main" fill="#cba6f7" font-size="28">1000001</text>
    <text x="435" y="70" class="text-label">컴퓨터 (2진수)</text>
  </g>

  <!-- Unicode Example -->
  <g transform="translate(150, 230)">
    <text x="-50" y="45" class="text-label" fill="#f9e2af" font-weight="bold">Unicode</text>
    
    <rect x="0" y="0" width="100" height="80" class="box box-unicode" />
    <text x="50" y="45" class="text-main">'파'</text>
    <text x="50" y="70" class="text-label">한글 (전세계)</text>
    
    <path d="M 110 40 L 170 40" class="arrow anim-arrow" />
    <text x="140" y="30" class="text-sub">ord()</text>
    
    <rect x="180" y="0" width="100" height="80" class="box box-unicode" />
    <text x="230" y="45" class="text-main" fill="#f9e2af">54000</text>
    <text x="230" y="70" class="text-label">고유 번호</text>
    
    <path d="M 290 40 L 350 40" class="arrow anim-arrow" style="animation-delay: 0.5s;" />
    <text x="320" y="30" class="text-sub">hex()</text>
    
    <rect x="360" y="0" width="150" height="80" class="box box-binary" />
    <text x="435" y="45" class="text-main" fill="#cba6f7" font-size="28">0xD2F0</text>
    <text x="435" y="70" class="text-label">16진수 (메모리)</text>
  </g>

</svg>
