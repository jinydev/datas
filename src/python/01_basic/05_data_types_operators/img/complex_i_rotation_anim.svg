<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .axis { stroke: #585b70; stroke-width: 3; }
      
      .title { font-family: sans-serif; font-size: 26px; font-weight: bold; fill: #f38ba8; text-anchor: middle; }
      .subtitle { font-family: sans-serif; font-size: 16px; fill: #bac2de; text-anchor: middle; }
      
      .label-real { font-family: sans-serif; font-size: 18px; font-weight: bold; fill: #a6e3a1; }
      .label-imag { font-family: sans-serif; font-size: 18px; font-weight: bold; fill: #cba6f7; }
      
      /* Points */
      .pt-real { fill: #a6e3a1; }
      .pt-imag { fill: #cba6f7; }
      .pt-center { fill: #f9e2af; }
      
      /* Arc rotation animations */
      .arc-path { fill: none; stroke: #f9e2af; stroke-width: 4; stroke-dasharray: 8,8; opacity: 0.7; }
      
      /* Draw lines from center to dots */
      .vector { fill: none; stroke: #9399b2; stroke-width: 3; }
      
      .math-text { font-family: monospace; font-size: 20px; font-weight: bold; fill: #f8f8f2; }
      .desc-text { font-family: sans-serif; font-size: 14px; fill: #a6adc8; }
      
      /* Glowing effect for the current state */
      @keyframes pulseDot {
        0%, 100% { r: 8; opacity: 0.8; }
        50% { r: 12; opacity: 1; stroke: #fff; stroke-width: 2; }
      }
      .anim-pt { animation: pulseDot 2s infinite; }
    </style>
    
    <!-- Arrowheads -->
    <marker id="arrow-axis" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#585b70" />
    </marker>
    <marker id="arrow-arc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f9e2af" />
    </marker>
    <marker id="arrow-vec" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9399b2" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="45" class="title">허수 i (또는 j)를 곱한다는 것의 진짜 의미</text>
  <text x="400" y="70" class="subtitle">1차원 직선 크기 변화가 아닌, 2차원 복소평면에서의 "90도 회전(Rotation)"</text>

  <!-- Complex Plane Coordinates -->
  <g transform="translate(400, 270)">
    <!-- X Axis (Real) -->
    <line x1="-250" y1="0" x2="250" y2="0" class="axis" marker-end="url(#arrow-axis)" />
    <!-- Y Axis (Imaginary) -->
    <line x1="0" y1="180" x2="0" y2="-180" class="axis" marker-end="url(#arrow-axis)" />
    
    <!-- Origins -->
    <circle cx="0" cy="0" r="6" class="pt-center" />
    
    <!-- Labels -->
    <text x="260" y="5" class="label-real">실수축 (Real)</text>
    <text x="-50" y="-190" class="label-imag">허수축 (Imaginary)</text>
    
    <!-- State 1: 1 (Real) -->
    <line x1="0" y1="0" x2="140" y2="0" class="vector" marker-end="url(#arrow-vec)"/>
    <circle cx="150" cy="0" r="8" class="pt-real anim-pt" style="animation-delay: 0s;" />
    <text x="160" y="25" class="math-text">1</text>
    <text x="160" y="-15" class="math-text" fill="#f9e2af">$i^4=1$</text>
    
    <!-- Path 1 to 2 -->
    <path d="M 150 -15 A 150 150 0 0 0 15 -150" class="arc-path" marker-end="url(#arrow-arc)" />
    <text x="90" y="-90" class="desc-text" fill="#f9e2af">$\times i$ (90° 회전)</text>

    <!-- State 2: 1i (Imaginary) (Python 1j) -->
    <line x1="0" y1="0" x2="0" y2="-140" class="vector" marker-end="url(#arrow-vec)"/>
    <circle cx="0" cy="-150" r="8" class="pt-imag anim-pt" style="animation-delay: 1s;" />
    <text x="-35" y="-160" class="math-text">1j</text>
    <text x="20" y="-160" class="math-text" fill="#f9e2af">$i^1=i$</text>
    
    <!-- Path 2 to 3 -->
    <path d="M -15 -150 A 150 150 0 0 0 -150 -15" class="arc-path" marker-end="url(#arrow-arc)" />
    <text x="-160" y="-90" class="desc-text" fill="#f9e2af">$\times i$ (90° 회전)</text>

    <!-- State 3: -1 (Real) -->
    <line x1="0" y1="0" x2="-140" y2="0" class="vector" marker-end="url(#arrow-vec)"/>
    <circle cx="-150" cy="0" r="8" class="pt-real anim-pt" style="animation-delay: 2s;" />
    <text x="-180" y="25" class="math-text">-1</text>
    <text x="-210" y="-15" class="math-text" fill="#f9e2af">$i^2=-1$</text>
    
    <!-- Path 3 to 4 -->
    <path d="M -150 15 A 150 150 0 0 0 -15 150" class="arc-path" marker-end="url(#arrow-arc)" />
    <text x="-160" y="90" class="desc-text" fill="#f9e2af">$\times i$ (90° 회전)</text>

    <!-- State 4: -1i (Imaginary) (Python -1j) -->
    <line x1="0" y1="0" x2="0" y2="140" class="vector" marker-end="url(#arrow-vec)"/>
    <circle cx="0" cy="150" r="8" class="pt-imag anim-pt" style="animation-delay: 3s;" />
    <text x="-45" y="170" class="math-text">-1j</text>
    <text x="20" y="170" class="math-text" fill="#f9e2af">$i^3=-i$</text>

    <!-- Path 4 to 1 -->
    <path d="M 15 150 A 150 150 0 0 0 150 15" class="arc-path" marker-end="url(#arrow-arc)" />
    <text x="90" y="90" class="desc-text" fill="#f9e2af">$\times i$ (90° 회전)</text>
  </g>
</svg>
