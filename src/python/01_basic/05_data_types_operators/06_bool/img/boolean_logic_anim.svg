<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #f38ba8; text-anchor: middle; }
      .subtitle { font-family: sans-serif; font-size: 14px; fill: #bac2de; text-anchor: middle; }
      
      .box { fill: #313244; stroke: #45475a; stroke-width: 2; rx: 8; }
      
      .label-true { font-family: monospace; font-size: 26px; fill: #a6e3a1; font-weight: bold; text-anchor: middle; }
      .label-false { font-family: monospace; font-size: 26px; fill: #f38ba8; font-weight: bold; text-anchor: middle; }
      
      .text-glow-true { filter: drop-shadow(0 0 8px rgba(166, 227, 161, 0.8)); }
      .text-glow-false { filter: drop-shadow(0 0 8px rgba(243, 139, 168, 0.8)); }
      
      .desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      .math { font-family: monospace; font-size: 18px; fill: #f9e2af; font-weight: bold; text-anchor: middle; }
      
      /* Switch animation */
      @keyframes switchToggle {
        0%, 45% { transform: translateX(0); fill: #f38ba8; }
        50%, 95% { transform: translateX(60px); fill: #a6e3a1; }
        100% { transform: translateX(0); fill: #f38ba8; }
      }
      .anim-switch-knob { animation: switchToggle 4s infinite cubic-bezier(0.68, -0.55, 0.27, 1.55); }
      
      /* Wire glow animation matching the switch */
      @keyframes wireGlow {
        0%, 45% { stroke: #f38ba8; opacity: 0.5; }
        50%, 95% { stroke: #a6e3a1; opacity: 1; }
        100% { stroke: #f38ba8; opacity: 0.5; }
      }
      .anim-wire { stroke-width: 4; fill: none; animation: wireGlow 4s infinite; }
      
      /* Bulb animation */
      @keyframes bulbGlow {
        0%, 45% { fill: #585b70; filter: none; }
        50%, 95% { fill: #f9e2af; filter: drop-shadow(0 0 15px #f9e2af); }
        100% { fill: #585b70; filter: none; }
      }
      .anim-bulb { animation: bulbGlow 4s infinite; }
      
      /* Gate text updates */
      @keyframes textUpdateEng {
        0%, 45% { opacity: 1; content: "False"; }
        50%, 95% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes textUpdateEngTrue {
        0%, 45% { opacity: 0; }
        50%, 95% { opacity: 1; content: "True"; }
        100% { opacity: 0; }
      }
      .anim-text-false { animation: textUpdateEng 4s infinite; }
      .anim-text-true { animation: textUpdateEngTrue 4s infinite; }
      
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="45" class="title">논리형 (Boolean) : 컴퓨터 제어의 궁극적인 스위치</text>
  <text x="400" y="70" class="subtitle">파이썬의 True 와 False 는 하드웨어의 1(전기 ON) 과 0(전기 OFF) 에 직결됩니다</text>

  <!-- Left: False (0) State Representation -->
  <g transform="translate(200, 220)">
    <rect x="-100" y="-80" width="200" height="120" class="box" />
    <text x="0" y="-40" class="label-false text-glow-false">False</text>
    <text x="0" y="0" class="math">숫자값: 0</text>
    <text x="0" y="25" class="desc">전기 차단 (OFF)</text>
    <text x="0" y="70" class="desc" fill="#f38ba8">"조건문(if) 실행 안 됨!"</text>
  </g>

  <!-- Right: True (1) State Representation -->
  <g transform="translate(600, 220)">
    <rect x="-100" y="-80" width="200" height="120" class="box" />
    <text x="0" y="-40" class="label-true text-glow-true">True</text>
    <text x="0" y="0" class="math">숫자값: 1</text>
    <text x="0" y="25" class="desc">전기 통함 (ON)</text>
    <text x="0" y="70" class="desc" fill="#a6e3a1">"조건문(if) 다 통과!"</text>
  </g>

  <!-- Center Mechanism: The Switch -->
  <g transform="translate(400, 160)">
    <!-- Switch base -->
    <rect x="-40" y="-15" width="80" height="30" rx="15" fill="#181825" stroke="#45475a" stroke-width="2" />
    
    <!-- Switch Knob (Animated) -->
    <circle cx="-25" cy="0" r="11" class="anim-switch-knob" />
    
    <!-- Dynamic Text labels above switch -->
    <!-- We simulate text swapping through opacity animation -->
    <text x="0" y="-30" class="label-false anim-text-false text-glow-false" style="font-size: 20px;">0 (False)</text>
    <text x="0" y="-30" class="label-true anim-text-true text-glow-true" style="font-size: 20px;">1 (True)</text>
  </g>

  <!-- Circuit Visuals -->
  <!-- Wire from battery to switch -->
  <path d="M 400,280 L 400,220" class="anim-wire" />
  
  <!-- Wire from switch to bulb -->
  <path d="M 400,120 L 400,100" class="anim-wire" />
  
  <!-- Bulb -->
  <g transform="translate(400, 80)">
    <circle cx="0" cy="0" r="20" class="anim-bulb" stroke="#9399b2" stroke-width="2" />
    <!-- Battery / CPU core at bottom representing the condition evaluation -->
  </g>

  <g transform="translate(400, 310)">
    <rect x="-60" y="-20" width="120" height="40" class="box" />
    <text x="0" y="5" class="math" fill="#cba6f7" style="font-size: 16px;">if (조건문):</text>
    <text x="0" y="45" class="desc">판독기 (CPU)</text>
  </g>
</svg>
