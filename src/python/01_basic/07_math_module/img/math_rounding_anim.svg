<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box { fill: #313244; stroke: #45475a; stroke-width: 2; rx: 8; }
      
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 22px; font-weight: bold; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .floor { fill: #45475a; stroke: #585b70; stroke-width: 2; }
      .ball { fill: #f38ba8; }
      
      @keyframes floatUp {
        0% { transform: translateY(0); }
        50% { transform: translateY(-70px); filter: drop-shadow(0 0 10px #f38ba8); }
        100% { transform: translateY(-70px); filter: drop-shadow(0 0 10px #f38ba8); }
      }
      @keyframes floatDown {
        0% { transform: translateY(0); }
        50% { transform: translateY(70px); filter: drop-shadow(0 0 10px #89b4fa); }
        100% { transform: translateY(70px); filter: drop-shadow(0 0 10px #89b4fa); }
      }
      @keyframes sliceOff {
        0% { transform: translateX(0); opacity: 1; }
        50% { transform: translateX(30px) translateY(30px) rotate(45deg); opacity: 0; }
        100% { transform: translateX(30px) translateY(30px) rotate(45deg); opacity: 0; }
      }

      .anim-up { animation: floatUp 3s cubic-bezier(0.25, 1, 0.5, 1) infinite alternate; }
      .anim-down { animation: floatDown 3s cubic-bezier(0.25, 1, 0.5, 1) infinite alternate; }
      .anim-slice { animation: sliceOff 3s ease-in infinite; transform-origin: center; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="400" y="40" class="text-title">수학의 올림, 내림, 버림 (Rounding Methods)</text>

  <!-- math.ceil() 올림 (Ceiling) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="200" height="260" class="box" />
    <text x="100" y="40" class="text-code" fill="#f38ba8">math.ceil(3.2)</text>
    <text x="100" y="65" class="text-desc">천장으로 끌어올림 (올림)</text>
    
    <!-- Floor 3 & 4 Scale -->
    <rect x="40" y="110" width="120" height="10" class="floor" fill="#585b70" />
    <text x="25" y="120" class="text-desc" font-weight="bold">4</text>
    
    <rect x="40" y="210" width="120" height="10" class="floor" />
    <text x="25" y="220" class="text-desc">3</text>
    
    <!-- Real Value Ball -->
    <circle cx="100" cy="190" r="15" class="ball anim-up" fill="#f38ba8" />
    <text x="140" y="195" class="text-desc" fill="#f38ba8">3.2</text>
    
    <line x1="100" y1="180" x2="100" y2="120" stroke="#f38ba8" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow-red)" />
  </g>

  <!-- math.floor() 내림 (Floor) -->
  <g transform="translate(300, 80)">
    <rect x="0" y="0" width="200" height="260" class="box" />
    <text x="100" y="40" class="text-code" fill="#89b4fa">math.floor(3.7)</text>
    <text x="100" y="65" class="text-desc">바닥으로 끌어내림 (내림)</text>
    
    <!-- Floor 3 & 4 Scale -->
    <rect x="40" y="110" width="120" height="10" class="floor" />
    <text x="25" y="120" class="text-desc">4</text>
    
    <rect x="40" y="210" width="120" height="10" class="floor" fill="#585b70" />
    <text x="25" y="220" class="text-desc" font-weight="bold">3</text>
    
    <!-- Real Value Ball -->
    <circle cx="100" cy="130" r="15" class="ball anim-down" fill="#89b4fa" />
    <text x="140" y="135" class="text-desc" fill="#89b4fa">3.7</text>
    
    <line x1="100" y1="140" x2="100" y2="200" stroke="#89b4fa" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow-blue)" />
  </g>

  <!-- math.trunc() 버림 (Truncate) -->
  <g transform="translate(540, 80)">
    <rect x="0" y="0" width="200" height="260" class="box" />
    <text x="100" y="40" class="text-code" fill="#a6e3a1">math.trunc(3.7)</text>
    <text x="100" y="65" class="text-desc">소수점 이하 무자비하게 절단! (버림)</text>
    
    <!-- Floor 3 Scale -->
    <rect x="40" y="160" width="120" height="10" class="floor" fill="#585b70" />
    
    <!-- Value parts -->
    <text x="85" y="150" font-family="monospace" font-size="36px" font-weight="bold" fill="#bac2de">3</text>
    <text x="125" y="150" font-family="monospace" font-size="36px" font-weight="bold" fill="#f38ba8" class="anim-slice">.7</text>
    
    <!-- Sword/Cut line -->
    <line x1="100" y1="110" x2="110" y2="170" stroke="#f9e2af" stroke-width="4" />
    
    <text x="100" y="230" class="text-desc" fill="#a6e3a1" font-weight="bold">> 3 반환</text>
  </g>

  <!-- Arrow markers -->
  <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#f38ba8" />
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#89b4fa" />
  </marker>
</svg>
