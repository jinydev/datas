<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box { fill: #313244; stroke: #45475a; stroke-width: 2; rx: 8; }
      
      .pipe { fill: none; stroke: #45475a; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; }
      .water { fill: none; stroke: #89b4fa; stroke-width: 7; stroke-linecap: round; stroke-dasharray: 10, 5; }
      
      /* Water flowing animation */
      @keyframes floatWater {
        from { stroke-dashoffset: 30; }
        to { stroke-dashoffset: 0; }
      }
      .anim-water { animation: floatWater 1s linear infinite; }
      
      /* Valve animation: simulating opening/closing */
      @keyframes valveBlink {
        0%, 100% { fill: #f38ba8; } /* Closed */
        50% { fill: #a6e3a1; }    /* Open */
      }
      
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-valve { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; }
      .text-result { font-family: monospace; font-size: 20px; font-weight: bold; text-anchor: middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- AND Operator (Series) -->
  <g transform="translate(50, 40)">
    <rect x="0" y="0" width="320" height="260" class="box" />
    <text x="160" y="40" class="text-title" fill="#cba6f7">AND 연산자 (직렬 밸브)</text>
    <text x="160" y="65" font-family="sans-serif" font-size="14px" fill="#a6adc8" text-anchor="middle">둘 다 열려야(True) 물이 통과함</text>
    
    <!-- Pipe Background -->
    <path d="M 40,160 L 280,160" class="pipe" />
    
    <!-- Flowing Water (Simulating both open) -->
    <path d="M 40,160 L 280,160" class="water anim-water" />
    
    <!-- Valve A (True) -->
    <circle cx="110" cy="160" r="25" fill="#a6e3a1" stroke="#313244" stroke-width="4"/>
    <text x="110" y="165" class="text-valve">True</text>
    
    <!-- Valve B (True) -->
    <circle cx="210" cy="160" r="25" fill="#a6e3a1" stroke="#313244" stroke-width="4"/>
    <text x="210" y="165" class="text-valve">True</text>

    <!-- Result tank -->
    <rect x="250" y="120" width="50" height="80" fill="#89b4fa" rx="5" opacity="0.6"/>
    <text x="275" y="225" class="text-result" fill="#a6e3a1">결과: True</text>
  </g>

  <!-- OR Operator (Parallel) -->
  <g transform="translate(430, 40)">
    <rect x="0" y="0" width="320" height="260" class="box" />
    <text x="160" y="40" class="text-title" fill="#f9e2af">OR 연산자 (병렬 밸브)</text>
    <text x="160" y="65" font-family="sans-serif" font-size="14px" fill="#a6adc8" text-anchor="middle">하나만 열려도(True) 물이 통과함</text>
    
    <!-- Pipe Background -->
    <path d="M 40,160 L 80,160 L 80,110 L 240,110 L 240,160 L 280,160" class="pipe" />
    <path d="M 80,160 L 80,210 L 240,210 L 240,160" class="pipe" />
    
    <!-- Flowing Water (Top valve False, Bottom valve True) -->
    <path d="M 40,160 L 80,160 L 80,210 L 240,210 L 240,160 L 280,160" class="water anim-water" />
    <path d="M 80,160 L 80,110 L 130,110" class="water" /> <!-- Blocked at top valve -->
    
    <!-- Top Valve (False) -->
    <circle cx="160" cy="110" r="25" fill="#f38ba8" stroke="#313244" stroke-width="4"/>
    <text x="160" y="115" class="text-valve">False</text>
    
    <!-- Bottom Valve (True) -->
    <circle cx="160" cy="210" r="25" fill="#a6e3a1" stroke="#313244" stroke-width="4"/>
    <text x="160" y="215" class="text-valve">True</text>

    <!-- Result tank -->
    <rect x="250" y="120" width="50" height="80" fill="#89b4fa" rx="5" opacity="0.6"/>
    <text x="275" y="245" class="text-result" fill="#a6e3a1">결과: True</text>
  </g>

</svg>
