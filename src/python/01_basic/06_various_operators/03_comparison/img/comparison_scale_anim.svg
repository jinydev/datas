<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box { fill: #313244; stroke: #45475a; stroke-width: 2; rx: 8; }
      .text-title { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-math { font-family: monospace; font-size: 24px; font-weight: bold; fill: #f9e2af; text-anchor: middle; }
      .text-bool { font-family: monospace; font-size: 28px; font-weight: bold; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      /* Scale animations */
      @keyframes tipLeft {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-15deg); }
      }
      @keyframes tipRight {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(15deg); }
      }
      @keyframes popTrue {
        0%, 100% { opacity: 0; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 10px #a6e3a1); }
      }
      @keyframes popFalse {
        0%, 100% { opacity: 0; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 10px #f38ba8); }
      }

      .scale-pivot-left { transform-origin: 200px 180px; animation: tipLeft 4s infinite ease-in-out; }
      .scale-pivot-right { transform-origin: 600px 180px; animation: tipRight 4s infinite ease-in-out; }
      
      .true-glow { animation: popTrue 4s infinite ease-in-out; }
      .false-glow { animation: popFalse 4s infinite ease-in-out; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- LEFT PANEL: True Comparison (10 > 5) -->
  <g transform="translate(0,0)">
    <rect x="50" y="20" width="300" height="260" class="box" />
    <text x="200" y="55" class="text-title">10 &gt; 5 평가</text>
    
    <!-- Scale base -->
    <path d="M 190,260 L 210,260 L 200,180 Z" fill="#45475a" />
    <circle cx="200" cy="180" r="6" fill="#f38ba8" />
    
    <!-- Pivoting balance beam -->
    <g class="scale-pivot-left">
      <rect x="100" y="175" width="200" height="10" fill="#bac2de" rx="5" />
      <!-- Left weight (10) -->
      <rect x="100" y="115" width="60" height="60" fill="#89b4fa" rx="5" />
      <text x="130" y="155" class="text-math" fill="#1e1e2e">10</text>
      <!-- Right weight (5) -->
      <rect x="240" y="145" width="60" height="30" fill="#f9e2af" rx="5" />
      <text x="270" y="167" class="text-math" fill="#1e1e2e">5</text>
    </g>

    <!-- Boolean result popping out -->
    <g class="true-glow">
      <rect x="140" y="70" width="120" height="40" fill="#a6e3a1" rx="8" />
      <text x="200" y="98" class="text-bool" fill="#1e1e2e">True</text>
    </g>
    <text x="200" y="135" class="text-desc" fill="#a6e3a1">"10이 5보다 무겁다(크다)!"</text>
  </g>

  <!-- RIGHT PANEL: False Comparison (10 == 5) -->
  <g transform="translate(0,0)">
    <rect x="450" y="20" width="300" height="260" class="box" />
    <text x="600" y="55" class="text-title">10 == 5 평가</text>
    
    <!-- Scale base -->
    <path d="M 590,260 L 610,260 L 600,180 Z" fill="#45475a" />
    <circle cx="600" cy="180" r="6" fill="#f38ba8" />
    
    <!-- Pivoting balance beam (unbalanced, so == fails) -->
    <g class="scale-pivot-left">
      <rect x="500" y="175" width="200" height="10" fill="#bac2de" rx="5" />
      <!-- Left weight (10) -->
      <rect x="500" y="115" width="60" height="60" fill="#89b4fa" rx="5" />
      <text x="530" y="155" class="text-math" fill="#1e1e2e">10</text>
      <!-- Right weight (5) -->
      <rect x="640" y="145" width="60" height="30" fill="#f9e2af" rx="5" />
      <text x="670" y="167" class="text-math" fill="#1e1e2e">5</text>
    </g>

    <!-- Boolean result popping out -->
    <g class="false-glow">
      <rect x="540" y="70" width="120" height="40" fill="#f38ba8" rx="8" />
      <text x="600" y="98" class="text-bool" fill="#1e1e2e">False</text>
    </g>
    <text x="600" y="135" class="text-desc" fill="#f38ba8">"둘의 무게(값)가 같지 않네!"</text>
  </g>

</svg>
