<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <style>
      .box { rx: 5; ry: 5; fill: #1e1e1e; stroke: #555; stroke-width: 2; }
      .obj-box { rx: 20; ry: 20; fill: #282a36; stroke: #ff79c6; stroke-width: 3; }
      .title { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #ffffff; }
      .text-code { font-family: 'Courier New', monospace; font-size: 16px; fill: #8be9fd; font-weight: bold; }
      .text-type { font-family: sans-serif; font-size: 12px; fill: #6272a4; }
      
      @keyframes bindArrow1 {
        0%, 30% { stroke-dashoffset: 100; opacity: 0; }
        40%, 100% { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes bindArrow2 {
        0%, 60% { stroke-dashoffset: 100; opacity: 0; }
        70%, 100% { stroke-dashoffset: 0; opacity: 1; }
      }
      
      .arrow1 { stroke-dasharray: 100; animation: bindArrow1 6s infinite; }
      .arrow2 { stroke-dasharray: 100; animation: bindArrow2 6s infinite; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f1fa8c" />
    </marker>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">Python Variables: Name Binding to Objects</text>

  <!-- 파이썬 코드 실행 순서 -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="200" height="150" class="box" />
    <text x="20" y="30" class="text-code" fill="#f8f8f2">1. a = 100</text>
    <text x="20" y="80" class="text-code" fill="#f8f8f2">2. a = "Hello"</text>
  </g>

  <!-- 네임스페이스 (이름표 영역) -->
  <g transform="translate(350, 130)">
    <rect x="0" y="0" width="80" height="40" rx="20" ry="20" fill="#444" stroke="#f1fa8c" stroke-width="2" />
    <text x="40" y="25" class="text-code" text-anchor="middle">a</text>
  </g>

  <!-- 메모리 공간 (객체 영역) -->
  <!-- 첫 번째 객체 (정수) -->
  <g transform="translate(550, 60)">
    <rect x="0" y="0" width="120" height="60" class="obj-box" />
    <text x="60" y="25" class="text-type" text-anchor="middle">&lt;class 'int'&gt;</text>
    <text x="60" y="45" class="text-code" text-anchor="middle" fill="#50fa7b">100</text>
  </g>
  
  <!-- 두 번째 객체 (문자열) -->
  <g transform="translate(550, 180)">
    <rect x="0" y="0" width="120" height="60" class="obj-box" stroke="#8be9fd" />
    <text x="60" y="25" class="text-type" text-anchor="middle">&lt;class 'str'&gt;</text>
    <text x="60" y="45" class="text-code" text-anchor="middle" fill="#f1fa8c">"Hello"</text>
  </g>

  <!-- 바인딩 화살표 애니메이션 -->
  <!-- 1. a가 100을 가리킴 -->
  <path d="M 430 140 Q 480 90 540 90" fill="transparent" stroke="#f1fa8c" stroke-width="3" marker-end="url(#arrowhead)" class="arrow1" />
  
  <!-- 2. a가 "Hello"로 가리키는 방향을 바꿈 -->
  <path d="M 430 160 Q 480 210 540 210" fill="transparent" stroke="#f1fa8c" stroke-width="3" marker-end="url(#arrowhead)" class="arrow2" />

</svg>
