<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 20px; font-weight: bold; fill: #cdd6f4; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .box-func { fill: #313244; stroke: #cba6f7; stroke-width: 4; rx: 20; }
      .gears { transform-origin: center; transform-box: fill-box; animation: spinGears 4s linear infinite; }
      .gears-reverse { transform-origin: center; transform-box: fill-box; animation: spinGearsReverse 4s linear infinite; }
      
      /* Data Particle Flow */
      @keyframes dataFlow {
        0%, 10% { transform: translate(100px, 180px); opacity: 0; fill: #89b4fa; }
        20% { transform: translate(100px, 180px); opacity: 1; fill: #89b4fa; } /* Input Point */
        40% { transform: translate(320px, 180px); opacity: 1; fill: #89b4fa; } /* Enter Function */
        
        /* Processing inside */
        50% { transform: translate(400px, 180px) scale(1.5); fill: #f9e2af; opacity: 1;}
        60% { transform: translate(400px, 180px) scale(1); fill: #a6e3a1; opacity: 1;}
        
        /* Output */
        70% { transform: translate(480px, 180px); opacity: 1; fill: #a6e3a1; } /* Exit Function */
        90% { transform: translate(700px, 180px); opacity: 1; fill: #a6e3a1; } /* Final Output */
        95%, 100% { transform: translate(750px, 180px); opacity: 0; fill: #a6e3a1; }
      }
      
      @keyframes spinGears { 100% { transform: rotate(360deg); } }
      @keyframes spinGearsReverse { 100% { transform: rotate(-360deg); } }
      
      .particle { animation: dataFlow 5s ease-in-out infinite; }
      
      .arrow { fill: none; stroke: #bac2de; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 8 6; }
    </style>
    
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bac2de" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">수학적 관점: 입력(Input) → 가공(Process) → 출력(Output)</text>

  <!-- Input Side -->
  <text x="150" y="130" class="text-code" fill="#89b4fa">Input (x = 3)</text>
  <text x="150" y="155" class="text-desc" fill="#89b4fa">인자 (Argument)</text>
  <path d="M 120,180 L 280,180" class="arrow" marker-end="url(#arrowhead)" />
  
  <!-- The Function Process Box -->
  <rect x="300" y="100" width="200" height="160" class="box-func" />
  <text x="400" y="80" class="text-code" fill="#cba6f7">Function f(x)</text>
  
  <!-- Gears inside Function -->
  <g class="gears" fill="#585b70" opacity="0.8">
    <circle cx="360" cy="180" r="25" />
    <path d="M360,145 l5,10 h-10 z M360,215 l-5,-10 h10 z M325,180 l10,-5 v10 z M395,180 l-10,5 v-10 z M335,155 l10,5 l-7,7 z M385,205 l-10,-5 l7,-7 z M385,155 l-5,10 l-7,-7 z M335,205 l5,-10 l7,7 z" />
  </g>
  <g class="gears-reverse" fill="#585b70" opacity="0.8">
    <circle cx="440" cy="180" r="30" />
    <path d="M440,140 l5,10 h-10 z M440,220 l-5,-10 h10 z M400,180 l10,-5 v10 z M480,180 l-10,5 v-10 z M412,152 l10,5 l-7,7 z M468,208 l-10,-5 l7,-7 z M468,152 l-5,10 l-7,-7 z M412,208 l5,-10 l7,7 z" />
  </g>
  
  <text x="400" y="240" class="text-code" fill="#f5e0dc">f(x) = 2x + 1</text>
  <text x="400" y="280" class="text-desc" fill="#cba6f7">로직 수행 (Process)</text>

  <!-- Output Side -->
  <path d="M 520,180 L 680,180" class="arrow" marker-end="url(#arrowhead)" />
  <text x="650" y="130" class="text-code" fill="#a6e3a1">Output (y = 7)</text>
  <text x="650" y="155" class="text-desc" fill="#a6e3a1">반환값 (Return)</text>

  <!-- Flowing Data Particle -->
  <circle cx="0" cy="0" r="15" class="particle" />

  <text x="400" y="325" class="text-desc">파이썬의 함수 역시 수학의 함수 원리와 완벽히 동일합니다. 값을 던져주면 내부에서 연산 후 결과를 뱉어냅니다.</text>
</svg>
