<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 20px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      .text-label { font-family: monospace; font-size: 16px; font-weight: bold; fill: #f9e2af; text-anchor: middle; }
      
      .box-str { fill: #f38ba8; rx: 10; stroke: #11111b; stroke-width: 2; }
      .box-int { fill: #89b4fa; rx: 10; stroke: #11111b; stroke-width: 2; }
      .box-machine { fill: #45475a; rx: 15; stroke: #cba6f7; stroke-width: 3; stroke-dasharray: 8 4; }
      
      @keyframes conveyLeft {
        0% { transform: translate(0, 0); opacity: 0; }
        10% { transform: translate(50px, 0); opacity: 1; }
        40% { transform: translate(250px, 0); opacity: 1; }
        45%, 100% { transform: translate(250px, 0); opacity: 0; }
      }
      
      @keyframes processMachine {
        0%, 35% { transform: scale(1); fill: #45475a; }
        40%, 50% { transform: scale(1.1); fill: #cba6f7; }
        55%, 100% { transform: scale(1); fill: #45475a; }
      }
      
      @keyframes conveyRight {
        0%, 50% { transform: translate(500px, 0); opacity: 0; }
        55% { transform: translate(550px, 0); opacity: 1; }
        85% { transform: translate(750px, 0); opacity: 1; }
        90%, 100% { transform: translate(750px, 0); opacity: 0; }
      }

      .obj-in { animation: conveyLeft 6s infinite; }
      .machine { animation: processMachine 6s infinite; transform-origin: 400px 150px;}
      .obj-out { animation: conveyRight 6s infinite; }
      
      .belt { stroke: #6c7086; stroke-width: 4; stroke-dasharray: 10 10; animation: moveBelt 2s linear infinite; }
      @keyframes moveBelt { to { stroke-dashoffset: -20; } }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">내장 함수를 이용한 데이터 형 변환 (Type Casting)</text>

  <!-- Conveyor Belts -->
  <line x1="50" y1="180" x2="300" y2="180" class="belt" />
  <line x1="500" y1="180" x2="750" y2="180" class="belt" />

  <!-- Input Object (String "2026") -->
  <g class="obj-in">
    <rect x="-40" y="110" width="80" height="60" class="box-str" />
    <text x="0" y="145" class="text-code">"2026"</text>
    <text x="0" y="195" class="text-label" fill="#f38ba8">str (문자열)</text>
  </g>

  <!-- Casting Machine int() -->
  <g class="machine">
    <rect x="300" y="90" width="200" height="120" class="box-machine" />
    <text x="400" y="140" class="text-title" fill="#cba6f7" font-size="28">int()</text>
    <text x="400" y="170" class="text-desc" fill="#bac2de">숫자 변환기</text>
  </g>

  <!-- Output Object (Integer 2026) -->
  <g class="obj-out">
    <rect x="-40" y="110" width="80" height="60" class="box-int" />
    <text x="0" y="145" class="text-code">2026</text>
    <text x="0" y="195" class="text-label" fill="#89b4fa">int (정수)</text>
  </g>

  <text x="400" y="270" class="text-desc">input()으로 받은 데이터는 본질적으로 '글자(str)' 취급을 받아 수학적 뺄셈/나눗셈이 불가능합니다.</text>
  <text x="400" y="300" class="text-desc">하지만 파이썬에서 기본 제공하는 int(), float(), str() 같은 내장 형 변환 함수 기계에 집어넣으면,</text>
  <text x="400" y="325" class="text-desc">순식간에 껍데기를 벗고 데이터의 속성(Type)이 완벽하게 탈바꿈되어 나옵니다.</text>

</svg>
