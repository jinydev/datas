<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#313244" />
    </linearGradient>
    <style>
      .title { font-family: 'Consolas', monospace; fill: #cdd6f4; font-size: 20px; font-weight: bold; }
      .num-deg { font-family: 'Consolas', monospace; fill: #f38ba8; font-size: 36px; font-weight: bold; }
      .num-rad { font-family: 'Consolas', monospace; fill: #89b4fa; font-size: 36px; font-weight: bold; }
      .desc { font-family: 'Consolas', monospace; fill: #a6adc8; font-size: 16px; text-anchor: middle; }
      
      .circle { fill: #45475a; stroke: #cdd6f4; stroke-width: 3; }
      
      /* Conveyor Belt / Conversion Path */
      .path-line { stroke: #cdd6f4; stroke-width: 4; stroke-dasharray: 10,10; animation: beltMove 2s linear infinite; fill: none; }
      .machine { fill: #fab387; stroke: #f38ba8; stroke-width: 2; rx: 10; ry: 10; }
      
      /* Moving Boxes */
      .box-deg { animation: moveDeg 4s infinite linear; opacity: 0; }
      .box-rad { animation: moveRad 4s infinite linear; opacity: 0; }
      
      @keyframes beltMove {
        from { stroke-dashoffset: 20; }
        to { stroke-dashoffset: 0; }
      }
      
      @keyframes moveDeg {
        0% { transform: translate(50px, 150px) scale(0); opacity: 0; }
        10% { transform: translate(50px, 150px) scale(1); opacity: 1; }
        40% { transform: translate(350px, 150px) scale(1); opacity: 1; }
        45% { transform: translate(400px, 150px) scale(0.5); opacity: 0; }
        100% { opacity: 0; transform: translate(400px, 150px) scale(0); }
      }
      
      @keyframes moveRad {
        0% { opacity: 0; transform: translate(400px, 150px) scale(0); }
        45% { opacity: 0; transform: translate(400px, 150px) scale(0); }
        50% { opacity: 1; transform: translate(450px, 150px) scale(1); }
        90% { transform: translate(700px, 150px) scale(1); opacity: 1; }
        100% { transform: translate(750px, 150px) scale(0); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="800" height="300" rx="15" fill="url(#bgGrad)" />

  <text x="30" y="40" class="title">math.radians() &amp; math.degrees() 변환기</text>

  <!-- Left: Degree Zone -->
  <text x="180" y="90" class="title" fill="#f38ba8" text-anchor="middle">Degree (360도)</text>
  <text x="180" y="250" class="desc">인간에게 친숙한 0~360 눈금</text>

  <!-- Right: Radian Zone -->
  <text x="620" y="90" class="title" fill="#89b4fa" text-anchor="middle">Radian (라디안)</text>
  <text x="620" y="250" class="desc">파이썬 수학(sin, cos)이 읽는 순수 언어</text>

  <!-- Conveyor Belt -->
  <path d="M 50,150 L 750,150" class="path-line" />

  <!-- Center Machine -->
  <g transform="translate(320, 100)">
    <rect x="0" y="0" width="160" height="100" class="machine" />
    <text x="80" y="40" class="title" fill="#1e1e2e" text-anchor="middle">math.</text>
    <text x="80" y="65" class="title" fill="#1e1e2e" text-anchor="middle">radians()</text>
    <text x="80" y="85" class="desc" fill="#45475a" style="font-size: 12px;">(x * pi / 180)</text>
  </g>

  <!-- Moving Element: Degree in -->
  <g class="box-deg">
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="#1e1e2e" stroke="#f38ba8" stroke-width="2" />
    <text x="0" y="10" class="num-deg" text-anchor="middle">180°</text>
  </g>

  <!-- Moving Element: Radian out -->
  <g class="box-rad">
    <rect x="-50" y="-30" width="100" height="60" rx="8" fill="#1e1e2e" stroke="#89b4fa" stroke-width="2" />
    <text x="0" y="10" class="num-rad" text-anchor="middle">3.14</text>
  </g>

</svg>
