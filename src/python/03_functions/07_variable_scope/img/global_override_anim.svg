<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 그라데이션 및 필터 -->
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#282a36" />
      <stop offset="100%" stop-color="#44475a" />
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="350" rx="15" fill="url(#bgGrad2)" stroke="#ff5555" stroke-width="2"/>

  <!-- 타이틀 -->
  <text x="400" y="35" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#ff5555" text-anchor="middle">The Dangers of 'global' Keyword</text>

  <!-- 바깥 세상 (Global Scope) 텍스트 영역 -->
  <text x="50" y="70" font-family="'Courier New', monospace" font-size="16" fill="#f1fa8c">
    hp = 500  <tspan fill="#6272a4"># 전역 변수 본체 (보스 체력)</tspan>
  </text>
  <text x="50" y="290" font-family="'Courier New', monospace" font-size="16" fill="#f1fa8c">
    print(hp) <tspan fill="#ff5555"># 출력: 430 (바깥에서도 영구적으로 깎여버림!)</tspan>
  </text>
  
  <!-- 전역 변수 (Global Variable) 블록 -->
  <g transform="translate(600, 40)" filter="url(#shadow2)">
    <rect x="-40" y="0" width="80" height="40" rx="8" fill="#ffb86c" stroke="#ff79c6" stroke-width="2"/>
    <text id="globalHpText" x="0" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#282a36" text-anchor="middle">hp: 500</text>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff79c6" text-anchor="middle">👑 Global</text>
    
    <!-- 체력 깎이는 애니메이션 텍스트 교체 (500 -> 430) -->
    <animate href="#globalHpText" attributeName="opacity" values="1; 0; 1" begin="2.3s" dur="0.2s" fill="freeze"/>
  </g>

  <!-- 함수 호출 시퀀스 박스 -->
  <!-- global 선언으로 인해 경계선이 뚫린듯한 붉은 박스 -->
  <rect x="50" y="100" width="700" height="150" fill="#2a2a3c" rx="10" stroke="#ff5555" stroke-width="2" stroke-dasharray="10,10"/>
  <text x="60" y="125" font-family="'Courier New', monospace" font-size="16" fill="#ff79c6">
    def attack():
  </text>
  <text x="100" y="155" font-family="'Courier New', monospace" font-size="16" fill="#ff5555" font-weight="bold">
    global hp  <tspan fill="#6272a4" font-weight="normal"># 감히(?) 바깥세상의 본체와 영혼을 동기화!</tspan>
  </text>
  <text x="100" y="185" font-family="'Courier New', monospace" font-size="16" fill="#f8f8f2">
    hp = hp - 70 <tspan fill="#6272a4"># 이제 이 hp는 아까 본 그 👑Global 입니다.</tspan>
  </text>
  <text x="60" y="235" font-family="'Courier New', monospace" font-size="16" fill="#ff79c6">
    attack() <tspan fill="#6272a4"># 호출!</tspan>
  </text>

  <!-- 빔 공격 / 와이어 연결 애니메이션 -->
  <!-- global 키워드가 바깥 메모리를 향해 쏘는 빨대 또는 무선 해킹 선 -->
  <path id="hackBeam" d="M 600,150 C 650,150 650,90 600,90" fill="none" stroke="#ff5555" stroke-width="4" stroke-dasharray="15,10">
    <animate attributeName="stroke-dashoffset" values="50; 0" dur="0.5s" repeatCount="indefinite"/>
    <!-- 나타났다가 값이 깎이면 사라짐 -->
    <animate attributeName="opacity" values="0; 1; 1; 0; 0" begin="0s" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.6; 0.7; 1"/>
  </path>
  
  <text x="660" y="125" font-family="'Courier New', monospace" font-size="14" fill="#ff5555" text-anchor="start" font-weight="bold">
    <tspan x="670" dy="0">← Direct Override!</tspan>
    <animate attributeName="opacity" values="0; 1; 1; 0; 0" begin="0s" dur="4s" repeatCount="indefinite" keyTimes="0; 0.2; 0.6; 0.7; 1"/>
  </text>

  <!-- 데미지 숫자 이펙트 (-70) -->
  <text x="600" y="80" font-family="'Courier New', monospace" font-size="24" fill="#ff5555" text-anchor="middle" font-weight="bold" opacity="0">
    - 70
    <animate attributeName="opacity" values="0; 1; 0" begin="2.3s" dur="0.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30" begin="2.3s" dur="0.8s" repeatCount="indefinite"/>
  </text>

  <!-- 500 에서 430 으로 텍스트 변경 해킹 -->
  <g transform="translate(600, 40)" opacity="0">
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff5555" text-anchor="middle">hp: 430</text>
    <!-- 해킹 완료되면 430 텍스트가 강하게 자리잡음 -->
    <animate attributeName="opacity" values="0; 0; 1; 1; 0" begin="0s" dur="4s" repeatCount="indefinite" keyTimes="0; 0.6; 0.61; 0.9; 1"/>
  </g>

  <text x="400" y="325" font-family="'Courier New', monospace" font-size="14" fill="#f8f8f2" text-anchor="middle">
    함수 내부에서 뚫어버린 <tspan fill="#ff5555">global 통로</tspan> 때문에, 바깥세상의 원본 데이터가 치명상을 입고 변형됩니다.
  </text>

</svg>
