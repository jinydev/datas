<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 16px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .box-window { fill: #313244; rx: 10; stroke: #cdd6f4; stroke-width: 2; }
      .widget1 { fill: #89b4fa; rx: 5; }
      .widget2 { fill: #a6e3a1; rx: 5; }
      .widget3 { fill: #f9e2af; rx: 5; }
      
      .grid-line { stroke: #45475a; stroke-width: 2; stroke-dasharray: 5; }
      
      @keyframes dropPack { 0%, 50% { transform: translateY(-50px); opacity: 0; } 60%, 100% { transform: translateY(0); opacity: 1; } }
      .anim-pack1 { animation: dropPack 4s infinite; }
      .anim-pack2 { animation: dropPack 4s infinite; animation-delay: 0.5s; }
      .anim-pack3 { animation: dropPack 4s infinite; animation-delay: 1.0s; }
      
      @keyframes popGrid { 0%, 50% { transform: scale(0); opacity: 0; } 60%, 100% { transform: scale(1); opacity: 1; } }
      .anim-grid1 { animation: popGrid 4s infinite; transform-origin: 520px 105px; }
      .anim-grid2 { animation: popGrid 4s infinite; animation-delay: 0.5s; transform-origin: 660px 105px; }
      .anim-grid3 { animation: popGrid 4s infinite; animation-delay: 1.0s; transform-origin: 590px 155px; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 1: 화면 배치(레이아웃)의 양대 산맥</text>

  <!-- Pack Layout -->
  <text x="250" y="70" class="text-title" fill="#89b4fa" font-size="16px">1. .pack() (중앙에 블록 쌓기)</text>
  <rect x="150" y="80" width="200" height="150" class="box-window" />
  <g class="anim-pack1">
    <rect x="180" y="90" width="140" height="30" class="widget1" />
    <text x="250" y="110" class="text-code">위젯 A</text>
  </g>
  <g class="anim-pack2">
    <rect x="180" y="130" width="140" height="30" class="widget2" />
    <text x="250" y="150" class="text-code">위젯 B</text>
  </g>
  <g class="anim-pack3">
    <rect x="180" y="170" width="140" height="30" class="widget3" />
    <text x="250" y="190" class="text-code">위젯 C</text>
  </g>

  <!-- Grid Layout -->
  <text x="590" y="70" class="text-title" fill="#a6e3a1" font-size="16px">2. .grid() (엑셀 표처럼 배치)</text>
  <rect x="490" y="80" width="200" height="150" class="box-window" />
  <!-- Grid Lines -->
  <path d="M 590 80 L 590 230" class="grid-line" />
  <path d="M 490 130 L 690 130" class="grid-line" />
  <path d="M 490 180 L 690 180" class="grid-line" />
  
  <g class="anim-grid1">
    <rect x="495" y="90" width="90" height="30" class="widget1" />
    <text x="540" y="110" class="text-code" font-size="12px">row=0, col=0</text>
  </g>
  <g class="anim-grid2">
    <rect x="595" y="90" width="90" height="30" class="widget2" />
    <text x="640" y="110" class="text-code" font-size="12px">row=0, col=1</text>
  </g>
  <g class="anim-grid3">
    <!-- columnspan=2 -->
    <rect x="495" y="140" width="190" height="30" class="widget3" />
    <text x="590" y="160" class="text-code" font-size="12px">row=1, col=0, span=2</text>
  </g>

</svg>
