<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-label { font-family: monospace; font-size: 24px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .circle-a { fill: #89b4fa; opacity: 0.7; }
      .circle-b { fill: #f38ba8; opacity: 0.7; }
      
      @keyframes pulseUnion { 0%, 20% { fill: #45475a; } 25%, 45% { fill: #a6e3a1; } 50%, 100% { fill: #45475a; } }
      @keyframes pulseIntersect { 0%, 45% { fill: #45475a; } 50%, 70% { fill: #f9e2af; } 75%, 100% { fill: #45475a; } }
      @keyframes pulseDiff { 0%, 70% { fill: #45475a; } 75%, 95% { fill: #cba6f7; } 100% { fill: #45475a; } }
      
      .anim-union { animation: pulseUnion 10s infinite; }
      .anim-intersect { animation: pulseIntersect 10s infinite; }
      .anim-diff { animation: pulseDiff 10s infinite; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 4: 벤 다이어그램 (합집합, 교집합, 차집합)</text>

  <!-- Title Indicator -->
  <text x="400" y="70" class="text-title anim-union" fill="#a6e3a1">A | B (합집합: 전체)</text>
  <text x="400" y="90" class="text-title anim-intersect" fill="#f9e2af">A &amp; B (교집합: 겹치는 부분)</text>
  <text x="400" y="110" class="text-title anim-diff" fill="#cba6f7">A - B (차집합: A만의 고유 영역)</text>

  <!-- Venn Diagram -->
  <!-- Left Circle A -->
  <circle cx="320" cy="200" r="70" class="circle-a anim-union anim-diff" />
  <!-- Right Circle B -->
  <circle cx="480" cy="200" r="70" class="circle-b anim-union" />
  <!-- Overlap (Intersection) -->
  <path d="M 400 137 A 70 70 0 0 0 400 263 A 70 70 0 0 0 400 137 Z" class="anim-union anim-intersect" fill="#45475a" opacity="0.9"/>
  
  <text x="280" y="210" class="text-label">A</text>
  <text x="520" y="210" class="text-label" fill="#11111b">B</text>
  <text x="400" y="210" class="text-title" fill="#1e1e2e" font-size="16px">A &amp; B</text>

</svg>
