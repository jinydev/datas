<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#313244" />
    </linearGradient>
    <style>
      .title { font-family: 'Consolas', monospace; font-size: 22px; font-weight: bold; fill: #bac2de; }
      .code { font-family: 'Consolas', monospace; font-size: 20px; font-weight: bold; fill: #cba6f7; }
      .val { font-family: 'Consolas', monospace; font-size: 24px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; alignment-baseline: middle;}
      .var-name { font-family: 'Consolas', monospace; font-size: 16px; font-weight: bold; fill: #89b4fa; text-anchor: middle;}
      
      .box-item { fill: #f9e2af; stroke: #cdd6f4; stroke-width: 2; rx: 8; }
      .bag { fill: rgba(166, 227, 161, 0.2); stroke: #a6e3a1; stroke-width: 4; stroke-dasharray: 8,4; rx: 20; }
      .arrow { fill: none; stroke: #cdd6f4; stroke-width: 4; marker-end: url(#arrowhead); stroke-dasharray: 5,5;}
      
      .anim-pack1 { animation: packIn 4s infinite ease-in-out; }
      .anim-pack2 { animation: packIn 4s infinite ease-in-out; animation-delay: 0.2s; }
      .anim-pack3 { animation: packIn 4s infinite ease-in-out; animation-delay: 0.4s; }
      
      .anim-unpack1 { animation: unpackOut 4s infinite ease-in-out; animation-delay: 2s; opacity: 0;}
      .anim-unpack2 { animation: unpackOut 4s infinite ease-in-out; animation-delay: 2.2s; opacity: 0;}
      .anim-unpack3 { animation: unpackOut 4s infinite ease-in-out; animation-delay: 2.4s; opacity: 0;}
      
      /* Pack: From spread out to center */
      @keyframes packIn {
        0% { transform: translate(0, 0); opacity: 1; }
        20%, 40% { transform: translate(0, 80px); opacity: 0; } /* move down into bag and disappear */
        41%, 100% { transform: translate(0, 0); opacity: 0; }
      }
      
      /* Unpack: From center bag to spread out */
      @keyframes unpackOut {
        0%, 10% { transform: translate(0, -80px); opacity: 0; } /* start in bag */
        30%, 80% { transform: translate(0, 0); opacity: 1; } /* move out to variable boxes */
        81%, 100% { opacity: 0; }
      }

    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cdd6f4" />
    </marker>
  </defs>

  <rect width="800" height="400" rx="15" fill="url(#bgGrad)" />

  <text x="30" y="40" class="title">마법의 보따리: 튜플 패킹(Packing)과 언패킹(Unpacking)</text>

  <!-- Left: Packing -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" class="code">1. 패킹 (Packing)</text>
    <text x="0" y="25" class="title" fill="#a6adc8" font-size="14px">bag = 10, 20, 30</text>
    
    <g transform="translate(40, 60)">
      <!-- Individual items starting outside -->
      <g class="anim-pack1" transform="translate(0, 0)">
        <rect x="0" y="0" width="60" height="40" class="box-item" />
        <text x="30" y="22" class="val">10</text>
      </g>
      <g class="anim-pack2" transform="translate(80, 0)">
        <rect x="0" y="0" width="60" height="40" class="box-item" />
        <text x="30" y="22" class="val">20</text>
      </g>
      <g class="anim-pack3" transform="translate(160, 0)">
        <rect x="0" y="0" width="60" height="40" class="box-item" />
        <text x="30" y="22" class="val">30</text>
      </g>
      
      <path d="M 110, 60 L 110, 100" class="arrow" />
      
      <!-- The Tuple Bag -->
      <rect x="-10" y="110" width="240" height="70" class="bag" />
      <text x="110" y="145" class="code" fill="#a6e3a1" text-anchor="middle">하나의 튜플 (bag)</text>
    </g>
  </g>

  <!-- Right: Unpacking -->
  <g transform="translate(450, 100)">
    <text x="0" y="0" class="code">2. 언패킹 (Unpacking)</text>
    <text x="0" y="25" class="title" fill="#a6adc8" font-size="14px">a, b, c = bag</text>
    
    <g transform="translate(40, 60)">
      <!-- The Tuple Bag Source -->
      <rect x="-10" y="0" width="240" height="70" class="bag" />
      <text x="110" y="35" class="code" fill="#a6e3a1" text-anchor="middle">보따리 해체 (bag)</text>
      
      <path d="M 110, 80 L 110, 120" class="arrow" />
      
      <!-- Target Variable Boxes -->
      <g transform="translate(0, 140)">
        <text x="30" y="-10" class="var-name">a</text>
        <rect x="0" y="0" width="60" height="40" class="box-item" fill="transparent" stroke="#89b4fa" stroke-dasharray="2,2"/>
        <g class="anim-unpack1">
          <rect x="0" y="0" width="60" height="40" class="box-item" />
          <text x="30" y="22" class="val">10</text>
        </g>
      </g>
      
      <g transform="translate(80, 140)">
        <text x="30" y="-10" class="var-name">b</text>
        <rect x="0" y="0" width="60" height="40" class="box-item" fill="transparent" stroke="#89b4fa" stroke-dasharray="2,2"/>
        <g class="anim-unpack2">
          <rect x="0" y="0" width="60" height="40" class="box-item" />
          <text x="30" y="22" class="val">20</text>
        </g>
      </g>

      <g transform="translate(160, 140)">
        <text x="30" y="-10" class="var-name">c</text>
        <rect x="0" y="0" width="60" height="40" class="box-item" fill="transparent" stroke="#89b4fa" stroke-dasharray="2,2"/>
        <g class="anim-unpack3">
          <rect x="0" y="0" width="60" height="40" class="box-item" />
          <text x="30" y="22" class="val">30</text>
        </g>
      </g>

    </g>
  </g>

</svg>
