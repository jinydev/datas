<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#313244" />
    </linearGradient>
    <style>
      .title { font-family: 'Consolas', monospace; font-size: 20px; font-weight: bold; fill: #bac2de; }
      .code { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #f38ba8; }
      .val { font-family: 'Consolas', monospace; font-size: 24px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; alignment-baseline: middle;}
      .desc { font-family: 'Consolas', monospace; font-size: 14px; font-weight: bold; fill: #a6adc8; }
      
      .box-tuple { fill: rgba(166, 227, 161, 0.3); stroke: #a6e3a1; stroke-width: 5; rx: 15; }
      .box-list { fill: rgba(137, 180, 250, 0.8); stroke: #89b4fa; stroke-width: 2; stroke-dasharray: 6,4; rx: 4; }
      .box-item { fill: #f9e2af; stroke: #1e1e2e; stroke-width: 2; rx: 4; }
      .diamond { fill: none; stroke: #f9e2af; stroke-width: 3; stroke-dasharray: 5,5; }
      
      .anim-attack-fail { animation: attackTuple 3s infinite ease-out; }
      .anim-attack-success { animation: attackList 3s infinite ease-out; }
      
      .anim-shield-pulse { animation: shieldPulse 3s infinite ease-in-out; }
      .anim-list-mutate { animation: listMutate 3s infinite ease-in-out; }

      @keyframes attackTuple {
        0% { transform: translate(-50px, -50px); opacity: 0; }
        20% { transform: translate(50px, 0px); opacity: 1; }
        30% { transform: translate(30px, -30px) rotate(45deg); opacity: 0.5; }
        100% { transform: translate(0px, -60px) rotate(90deg); opacity: 0; }
      }
      
      @keyframes shieldPulse {
        0%, 20% { filter: drop-shadow(0 0 0 transparent); stroke-width: 5;}
        25% { filter: drop-shadow(0 0 15px #a6e3a1); stroke-width: 8;}
        40%, 100% { filter: drop-shadow(0 0 0 transparent); stroke-width: 5;}
      }

      @keyframes attackList {
        0%, 40% { transform: translate(0, -50px); opacity: 0; }
        60% { transform: translate(0, 0); opacity: 1; }
        65%, 100% { transform: translate(0, 0); opacity: 0; }
      }
      
      @keyframes listMutate {
        0%, 55% { fill: #f9e2af; }
        65%, 100% { fill: #f38ba8; transform: scale(1.1) rotate(5deg); }
      }

    </style>
  </defs>

  <rect width="800" height="350" rx="15" fill="url(#bgGrad)" />

  <text x="30" y="40" class="title">치명적 함정: 다이아몬드 금고 안의 말랑한 젤리(List)</text>
  <text x="30" y="70" class="code">trap_tuple = (10, 20, [1, 2])</text>

  <g transform="translate(150, 150)">
    
    <!-- Tuple Container (Diamond Shield) -->
    <g class="anim-shield-pulse">
      <rect x="-30" y="-40" width="370" height="100" class="box-tuple" />
      <polygon points="155,-60 360,10 155,80 -50,10" class="diamond" opacity="0.5" />
      <text x="155" y="-50" class="code" fill="#a6e3a1" text-anchor="middle">튜플 (수정 불가 영역)</text>
    </g>

    <!-- Index 0 & 1: Normal Immutable Items -->
    <rect x="0" y="-20" width="60" height="60" class="box-item" />
    <text x="30" y="15" class="val">10</text>
    <text x="30" y="60" class="desc">Index 0</text>
    
    <rect x="80" y="-20" width="60" height="60" class="box-item" />
    <text x="110" y="15" class="val">20</text>
    <text x="110" y="60" class="desc">Index 1</text>
    
    <!-- Index 2: Mutable List inside Tuple -->
    <g transform="translate(160, -30)">
      <rect x="0" y="0" width="160" height="80" class="box-list" />
      <text x="80" y="90" class="desc" fill="#89b4fa">Index 2 (List: 변경 가능 영역)</text>
      
      <rect x="15" y="15" width="50" height="50" class="box-item" />
      <text x="40" y="45" class="val">1</text>
      
      <!-- Attacked Item -->
      <g transform="translate(80, 15)">
        <g class="anim-list-mutate">
          <rect x="0" y="0" width="50" height="50" class="box-item" />
          <text x="25" y="30" class="val">2</text>
        </g>
      </g>
      
      <!-- Successful Attack on Inner List -->
      <g transform="translate(105, -30)">
        <g class="anim-attack-success">
           <polygon points="-10,-10 10,-10 0,10" fill="#f38ba8" />
           <text x="0" y="-15" class="code" font-size="14px" fill="#f38ba8" text-anchor="middle">trap[2][1]=99</text>
        </g>
      </g>
    </g>
    
    <!-- Failed Attack on Tuple Itself -->
    <g transform="translate(45, -70)">
      <g class="anim-attack-fail">
        <polygon points="-15,-15 15,-15 0,15" fill="#f38ba8" />
        <text x="0" y="-20" class="code" font-size="14px" fill="#f38ba8" text-anchor="middle">trap[0]=99</text>
      </g>
    </g>

  </g>

</svg>
