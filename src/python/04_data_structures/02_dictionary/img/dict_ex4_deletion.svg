<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 16px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .box-key { fill: #f9e2af; rx: 10; stroke: #11111b; stroke-width: 2; }
      .box-val { fill: #89b4fa; rx: 10; stroke: #11111b; stroke-width: 2; }
      
      @keyframes deleteItem { 0%, 40% { transform: scale(1); opacity: 1; } 50%, 100% { transform: scale(0.5); opacity: 0; } }
      .deleted-item { animation: deleteItem 4s infinite; transform-origin: center; }
      
      @keyframes moveOver { 0%, 45% { transform: translateX(0); } 55%, 100% { transform: translateX(-160px); } }
      .shifted-item { animation: moveOver 4s infinite; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 4: 데이터 삭제 (del 키워드)</text>
  <text x="400" y="70" class="text-title" fill="#f38ba8">del profile["level"]</text>

  <!-- Kept Item 1 -->
  <g>
    <rect x="150" y="120" width="70" height="40" class="box-key" />
    <text x="185" y="145" class="text-code">"name"</text>
    <rect x="230" y="120" width="120" height="40" class="box-val" />
    <text x="290" y="145" class="text-code">"Antigravity"</text>
  </g>

  <!-- Deleted Item -->
  <g class="deleted-item">
    <rect x="370" y="120" width="70" height="40" fill="#f38ba8" rx="10" />
    <text x="405" y="145" class="text-code" fill="#11111b">"level"</text>
    <rect x="450" y="120" width="60" height="40" fill="#f38ba8" rx="10" />
    <text x="480" y="145" class="text-code" fill="#11111b">10</text>
    
    <line x1="360" y1="110" x2="520" y2="170" stroke="#11111b" stroke-width="5" />
    <line x1="520" y1="110" x2="360" y2="170" stroke="#11111b" stroke-width="5" />
  </g>

  <!-- Shifted Item -->
  <g class="shifted-item">
    <rect x="530" y="120" width="70" height="40" class="box-key" />
    <text x="565" y="145" class="text-code">"job"</text>
    <rect x="610" y="120" width="90" height="40" class="box-val" />
    <text x="655" y="145" class="text-code">"Wizard"</text>
  </g>
</svg>
