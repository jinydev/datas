<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#313244" />
    </linearGradient>
    <style>
      .title { font-family: 'Consolas', monospace; font-size: 22px; font-weight: bold; fill: #bac2de; }
      .code { font-family: 'Consolas', monospace; font-size: 24px; font-weight: bold; fill: #f38ba8; }
      .label { font-family: 'Consolas', monospace; font-size: 18px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; alignment-baseline: middle;}
      .formula { font-family: 'Consolas', monospace; font-size: 30px; font-weight: bold; fill: #a6e3a1; text-anchor: middle; alignment-baseline: middle;}
      
      .box-domain { fill: #89b4fa; stroke: #cdd6f4; stroke-width: 2; rx: 8; }
      .box-codomain { fill: #f9e2af; stroke: #cdd6f4; stroke-width: 2; rx: 8; }
      .machine { fill: #45475a; stroke: #f38ba8; stroke-width: 4; rx: 15; }
      
      .arrow { fill: none; stroke: #cdd6f4; stroke-width: 4; stroke-dasharray: 10,5; marker-end: url(#arrowhead); }
      
      .anim-drop { animation: dropIn 2s infinite ease-in; opacity: 0; }
      .anim-process { animation: processData 2s infinite ease-in-out; }
      .anim-shoot { animation: shootOut 2s infinite ease-out; opacity: 0; }
      
      @keyframes dropIn {
        0% { transform: translate(-300px, -50px) scale(0.5); opacity: 0; }
        30%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
      }
      
      @keyframes processData {
        0%, 30% { transform: scale(1); filter: drop-shadow(0 0 0 transparent); }
        45% { transform: scale(1.05); filter: drop-shadow(0 0 15px #f38ba8); }
        60%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 transparent); }
      }
      
      @keyframes shootOut {
        0%, 60% { transform: translate(0, 0) scale(0.5); opacity: 0; }
        90%, 100% { transform: translate(300px, 50px) scale(1); opacity: 1; }
      }
      
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cdd6f4" />
    </marker>
  </defs>

  <rect width="800" height="400" rx="15" fill="url(#bgGrad)" />

  <text x="30" y="40" class="title">해시 함수(Hash Function)와 수학적 매핑 f(x) = y</text>

  <!-- Definition of f(x) -->
  <g transform="translate(150, 80)">
    <text x="250" y="0" class="formula">f("Apple") = "사과"</text>
    <text x="250" y="30" class="title" fill="#a6adc8" font-size="16px" text-anchor="middle">x (Key) ───────────▶ y (Value)</text>
  </g>

  <!-- The Machine (Hash Function) -->
  <g transform="translate(250, 160)">
    
    <g class="anim-process">
      <rect x="0" y="0" width="300" height="150" class="machine" />
      <text x="150" y="40" class="title" text-anchor="middle">Hash Function</text>
      <text x="150" y="80" class="title" fill="#f38ba8" font-size="16px" text-anchor="middle">암호화 다지기 기계</text>
      <path d="M 50,110 Q 150,140 250,110" fill="none" stroke="#cba6f7" stroke-width="4" stroke-dasharray="8,4" />
    </g>

    <!-- Key Input (Domain X) -->
    <g class="anim-drop" transform="translate(-150, -0)">
      <rect x="-10" y="0" width="100" height="40" class="box-domain" />
      <text x="40" y="22" class="label">"Apple"</text>
      <text x="40" y="-10" class="title" fill="#89b4fa" font-size="16px" text-anchor="middle">x (Key)</text>
      <path d="M 95,20 L 150,50" class="arrow" stroke="#89b4fa" />
    </g>
    
    <!-- Value Output (Codomain Y) -->
    <g class="anim-shoot" transform="translate(150, 0)">
      <path d="M -10,120 L 100,120" class="arrow" stroke="#f9e2af" />
      <rect x="110" y="100" width="100" height="40" class="box-codomain" />
      <text x="160" y="122" class="label">"사과"</text>
      <text x="160" y="165" class="title" fill="#f9e2af" font-size="16px" text-anchor="middle">y (Value)</text>
    </g>

  </g>

</svg>
