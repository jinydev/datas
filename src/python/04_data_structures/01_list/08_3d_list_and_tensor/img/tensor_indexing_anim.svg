<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#313244" />
    </linearGradient>
    <style>
      .title { font-family: 'Consolas', monospace; font-size: 20px; font-weight: bold; fill: #bac2de; }
      .code { font-family: 'Consolas', monospace; font-size: 24px; font-weight: bold; fill: #f38ba8; }
      .num { font-family: 'Consolas', monospace; font-size: 16px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; alignment-baseline: middle;}
      .coord { font-family: 'Consolas', monospace; font-size: 14px; font-weight: bold; fill: #a6adc8;}
      
      .box-bg { fill: rgba(137, 180, 250, 0.2); stroke: #45475a; stroke-dasharray: 4,4; stroke-width: 2; rx: 4; }
      .box-front { fill: #89b4fa; stroke: #cdd6f4; stroke-width: 2; rx: 4; }
      .box-back { fill: #a6e3a1; stroke: #cdd6f4; stroke-width: 2; rx: 4; }
      
      .target-box { fill: #f9e2af; stroke: #f38ba8; stroke-width: 3; rx: 4; }
      
      .laser-z { animation: scanZ 4s infinite ease-in-out; fill: none; stroke: rgba(243, 139, 168, 0.8); stroke-width: 4; }
      .laser-y { animation: scanY 4s infinite ease-in-out; fill: none; stroke: rgba(166, 227, 161, 0.8); stroke-width: 4; }
      .laser-x { animation: scanX 4s infinite ease-in-out; fill: none; stroke: rgba(137, 180, 250, 0.8); stroke-width: 4; }
      
      .pulse-target { animation: pulse 4s infinite ease-in-out; opacity: 0; }

      /* Animations tuned for 4-second sequence */
      /* Z phase: 0-25% */
      /* Y phase: 25-50% */
      /* X phase: 50-75% */
      /* Target found: 75-100% */
      
      @keyframes scanZ {
        0%, 10% { opacity: 0; transform: translate(0, 0); }
        15% { opacity: 1; transform: translate(50px, -50px); } /* Focus back layer Z=1 */
        30%, 100% { opacity: 0; transform: translate(50px, -50px); }
      }
      
      @keyframes scanY {
        0%, 30% { opacity: 0; }
        35% { opacity: 1; transform: translate(0, 70px); } /* Focus row Y=1 */
        55%, 100% { opacity: 0; transform: translate(0, 70px); }
      }

      @keyframes scanX {
        0%, 55% { opacity: 0; }
        60% { opacity: 1; transform: translate(70px, 0); } /* Focus col X=1 */
        80%, 100% { opacity: 0; transform: translate(70px, 0); }
      }

      @keyframes pulse {
        0%, 75% { opacity: 0; transform: scale(1); filter: drop-shadow(0 0 0px transparent); }
        80% { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 15px #f9e2af); }
        95% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 5px #f9e2af); }
        100% { opacity: 0; transform: scale(1); }
      }
    </style>
  </defs>

  <rect width="800" height="400" rx="15" fill="url(#bgGrad)" />

  <text x="30" y="40" class="title">cube = [ [ [1,2],[3,4] ],  [ [5,6],[7,8] ] ]</text>
  <text x="30" y="80" class="code">target = cube[1][1][1]</text>
  
  <text x="360" y="70" class="coord" fill="#f38ba8">Z = 1 (뒤쪽 깊이)</text>
  <text x="360" y="90" class="coord" fill="#a6e3a1">Y = 1 (아래쪽 행)</text>
  <text x="360" y="110" class="coord" fill="#89b4fa">X = 1 (오른쪽 열)</text>

  <!-- 3D CUBE REPRESENTATION -->
  <!-- We draw it tilted to simulate 3D -->
  <!-- Back Layer Z=1 (values 5,6,7,8) - Offset X+50, Y-50 -->
  <g transform="translate(450, 180)">
    
    <!-- Z-Layer Scanner Plane (Back) -->
    <rect x="0" y="0" width="150" height="150" class="laser-z" fill="rgba(243, 139, 168, 0.2)" />
    
    <!-- Row 0, Col 0 -->
    <g transform="translate(50, -50)">
      <rect x="0" y="0" width="60" height="60" class="box-back" /> <text x="30" y="30" class="num">5</text>
      <rect x="70" y="0" width="60" height="60" class="box-back" /> <text x="100" y="30" class="num">6</text>
      <rect x="0" y="70" width="60" height="60" class="box-back" /> <text x="30" y="100" class="num">7</text>
      
      <!-- Target cell 8 -->
      <g transform="translate(70, 70)">
        <rect x="0" y="0" width="60" height="60" class="box-back" /> 
        <!-- Pulse overlay -->
        <g class="pulse-target">
           <rect x="0" y="0" width="60" height="60" class="target-box" />
           <text x="30" y="30" class="num" fill="#1e1e2e">8</text>
        </g>
        <!-- Static text so it's visible before pulse -->
        <text x="30" y="30" class="num">8</text>
      </g>

      <!-- Y-Row Scanner Line -->
      <line x1="-20" y1="30" x2="160" y2="30" class="laser-y" />
      
      <!-- X-Col Scanner Line -->
      <line x1="30" y1="-20" x2="30" y2="160" class="laser-x" />

    </g>

    <!-- Front Layer Z=0 (values 1,2,3,4) opacity lowered to see back clearly -->
    <g transform="translate(0, 0)" opacity="0.4">
      <rect x="0" y="0" width="60" height="60" class="box-front" /> <text x="30" y="30" class="num">1</text>
      <rect x="70" y="0" width="60" height="60" class="box-front" /> <text x="100" y="30" class="num">2</text>
      <rect x="0" y="70" width="60" height="60" class="box-front" /> <text x="30" y="100" class="num">3</text>
      <rect x="70" y="70" width="60" height="60" class="box-front" /> <text x="100" y="100" class="num">4</text>
    </g>

    <!-- Connecting dashed lines to show depth -->
    <line x1="0" y1="0" x2="50" y2="-50" stroke="#45475a" stroke-dasharray="4,4" />
    <line x1="130" y1="0" x2="180" y2="-50" stroke="#45475a" stroke-dasharray="4,4" />
    <line x1="0" y1="130" x2="50" y2="80" stroke="#45475a" stroke-dasharray="4,4" />
    <line x1="130" y1="130" x2="180" y2="80" stroke="#45475a" stroke-dasharray="4,4" />

  </g>

  <!-- Left Side Step Tracker -->
  <g transform="translate(30, 160)">
    <text x="0" y="0" class="title" fill="#bac2de">Z-Y-X 연속 타겟팅 (3-Depth)</text>
    
    <!-- Z Step -->
    <text x="0" y="40" class="code" fill="#f38ba8">1. [1] (Z: 깊이)</text>
    <text x="20" y="65" class="coord">앞/뒤 판(Plane) 중에 뒤쪽 판넬 선택</text>
    
    <!-- Y Step -->
    <text x="0" y="105" class="code" fill="#a6e3a1">2. [1] (Y: 행/높이)</text>
    <text x="20" y="130" class="coord">선택된 판넬의 1번째 아래 줄(Row) 선택</text>

    <!-- X Step -->
    <text x="0" y="170" class="code" fill="#89b4fa">3. [1] (X: 열/너비)</text>
    <text x="20" y="195" class="coord">해당 줄의 1번째 우측 칸(Col) 최종 추출!</text>
  </g>

</svg>
