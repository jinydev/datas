<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 18px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .box-var { fill: #313244; rx: 10; stroke: #cba6f7; stroke-width: 2; }
      .box-ref { fill: #45475a; rx: 10; stroke: #89b4fa; stroke-width: 2; }
      .box-val { fill: #f38ba8; rx: 8; stroke: #11111b; stroke-width: 2; }
      
      /* Laser Pointer Animation for References */
      @keyframes pulseLaser1 { 0%, 100% { stroke-width: 2; stroke: #f9e2af; opacity: 0.5; } 50% { stroke-width: 5; stroke: #f9e2af; opacity: 1; filter: drop-shadow(0 0 5px #f9e2af); } }
      @keyframes pulseLaser2 { 0%, 100% { stroke-width: 2; stroke: #a6e3a1; opacity: 0.5; } 50% { stroke-width: 5; stroke: #a6e3a1; opacity: 1; filter: drop-shadow(0 0 5px #a6e3a1); } }
      @keyframes pulseLaser3 { 0%, 100% { stroke-width: 2; stroke: #cba6f7; opacity: 0.5; } 50% { stroke-width: 5; stroke: #cba6f7; opacity: 1; filter: drop-shadow(0 0 5px #cba6f7); } }

      .laser1 { animation: pulseLaser1 2s ease-in-out infinite; }
      .laser2 { animation: pulseLaser2 2.5s ease-in-out infinite; }
      .laser3 { animation: pulseLaser3 3s ease-in-out infinite; }
      
      /* Danger Highlight Animation for Shallow Copy Bug */
      @keyframes dangerBlink { 0%, 100% { fill: #313244; } 50% { fill: #eba0ac; } }
      .danger-box { animation: dangerBlink 1s infinite alternate; }
    </style>
    
    <marker id="arrowhead-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f9e2af" /></marker>
    <marker id="arrowhead-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1" /></marker>
    <marker id="arrowhead-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#cba6f7" /></marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">파이썬 리스트 메모리 (참조 배열 Array of References)</text>

  <!-- Variable Area (Left Side) -->
  <rect x="50" y="80" width="150" height="200" class="box-var" />
  <text x="125" y="110" class="text-title" fill="#cba6f7" font-size="16">Variables</text>
  
  <text x="125" y="160" class="text-title" fill="#bac2de">a = [ ... ]</text>
  <text x="125" y="240" class="text-title" fill="#bac2de">b = a</text>
  
  <!-- The Danger Connection (Shallow Copy) -->
  <path d="M 170,230 Q 230,230 250,170" fill="none" class="laser1 danger-box" stroke-dasharray="5 5" marker-end="url(#arrowhead-yellow)"/>

  <!-- List Reference Object Array (Middle) -->
  <rect x="250" y="130" width="260" height="80" class="box-ref" />
  <text x="380" y="120" class="text-title" fill="#89b4fa" font-size="16">List Object (Array of Pointers)</text>
  
  <!-- Indexes -->
  <text x="300" y="150" class="text-title" fill="#a6adc8" font-size="12">[0]</text>
  <text x="380" y="150" class="text-title" fill="#a6adc8" font-size="12">[1]</text>
  <text x="460" y="150" class="text-title" fill="#a6adc8" font-size="12">[2]</text>
  
  <!-- Pointer Dots -->
  <circle cx="300" cy="180" r="5" fill="#f9e2af" />
  <circle cx="380" cy="180" r="5" fill="#a6e3a1" />
  <circle cx="460" cy="180" r="5" fill="#cba6f7" />

  <!-- Laser Pointers to Actual Values in Memory -->
  <path d="M 300,180 Q 300,80 570,80" fill="none" class="laser1" marker-end="url(#arrowhead-yellow)" />
  <path d="M 380,180 Q 450,165 570,165" fill="none" class="laser2" marker-end="url(#arrowhead-green)" />
  <path d="M 460,180 Q 480,250 570,250" fill="none" class="laser3" marker-end="url(#arrowhead-purple)" />

  <!-- Actual Memory Values (Right Side) -->
  <!-- Index 0 changed to 99! -->
  <rect x="580" y="55" width="100" height="50" class="box-var" fill="#eba0ac" />
  <text x="630" y="85" class="text-code" fill="#11111b">99</text>
  
  <rect x="580" y="140" width="100" height="50" class="box-val" />
  <text x="630" y="170" class="text-code">"Apple"</text>
  
  <rect x="580" y="225" width="100" height="50" class="box-val" />
  <text x="630" y="255" class="text-code">3.14</text>

  <text x="400" y="320" class="text-desc" fill="#f38ba8">b = a 를 하는 순간, 두 변수는 하나의 도화지(리스트 객체)를 같이 씁니다.</text>
  <text x="400" y="340" class="text-desc" fill="#f38ba8">b[0] = 99 로 변경하면, 도화지를 같이 보고 있던 a[0]도 똑같이 99로 변하는(Shallow Copy 버그) 치명적 원리입니다.</text>
</svg>
