<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 20px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 16px; font-weight: bold; fill: #11111b; text-anchor: middle; }
      
      .parent-box { fill: #89b4fa; rx: 10; stroke: #cdd6f4; stroke-width: 2; }
      .child-box { fill: #f9e2af; rx: 10; stroke: #cdd6f4; stroke-width: 2; }
      .super-arrow { fill: none; stroke: #a6e3a1; stroke-width: 5; }
      
      @keyframes shootSuper { 0% { stroke-dashoffset: 200; opacity: 1; } 60%, 100% { stroke-dashoffset: 0; opacity: 1; } }
      .anim-super { stroke-dasharray: 200; animation: shootSuper 2s infinite; }
      
      @keyframes pulseParent { 0%, 50%, 100% { transform: scale(1); filter: brightness(1); } 75% { transform: scale(1.05); filter: brightness(1.3); } }
      .anim-parent { animation: pulseParent 2s infinite; transform-origin: 400px 100px; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">예제 2: super() 의 역할 (부모님께 용돈 타오기)</text>

  <!-- Parent Class -->
  <g class="anim-parent">
    <rect x="300" y="70" width="200" height="60" class="parent-box" />
    <text x="400" y="95" class="text-code">class Animal(부모)</text>
    <text x="400" y="115" class="text-code" fill="#ffffff" font-size="12px">__init__(self, name)</text>
  </g>

  <!-- Child Class -->
  <rect x="300" y="170" width="200" height="60" class="child-box" />
  <text x="400" y="195" class="text-code">class Dog(자식)</text>
  <text x="400" y="215" class="text-code" fill="#1e1e2e" font-size="12px">super().__init__(name)</text>

  <!-- Super Arrow -->
  <path d="M 400 170 L 400 135" class="super-arrow anim-super" marker-end="url(#arrow)" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a6e3a1" />
    </marker>
  </defs>

</svg>
