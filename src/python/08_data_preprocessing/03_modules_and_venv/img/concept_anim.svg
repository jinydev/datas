<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2f"/>
      <stop offset="100%" stop-color="#2a2a40"/>
    </linearGradient>

    <!-- Glass Dome Effect -->
    <radialGradient id="glass" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </radialGradient>
    
    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bgGrad)" rx="15" ry="15"/>

  <!-- Title -->
  <text x="300" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Virtual Environments (venv)
  </text>
  <text x="300" y="65" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">
    Prevent Dependency Hell by isolating projects!
  </text>

  <!-- Global Environment (Base / Outside Domes) -->
  <rect x="50" y="90" width="500" height="180" rx="10" fill="none" stroke="#4a4a6a" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="60" y="110" font-family="monospace" font-size="12" fill="#888">Global PC Environment</text>
  <circle cx="90" cy="150" r="15" fill="#555" opacity="0.5"/>
  <circle cx="510" cy="220" r="20" fill="#555" opacity="0.5"/>
  <circle cx="80" cy="240" r="10" fill="#555" opacity="0.5"/>

  <!-- Project A (Left Dome) -->
  <g transform="translate(150, 180)">
    <!-- Shield/Dome -->
    <circle cx="0" cy="0" r="70" fill="url(#glass)" stroke="#00ccff" stroke-width="3" filter="url(#glow)"/>
    
    <!-- Inner Elements -->
    <text x="0" y="-45" font-family="monospace" font-size="14" font-weight="bold" fill="#00ccff" text-anchor="middle">Project A</text>
    
    <g transform="translate(-20, -10)">
      <rect width="40" height="20" rx="3" fill="#00ccff"/>
      <text x="20" y="14" font-family="sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">Pandas v1</text>
      <!-- Subtle Floating Animation -->
      <animateTransform attributeName="transform" type="translate" values="-20,-10; -20,-15; -20,-10" dur="3s" repeatCount="indefinite"/>
    </g>
    
    <g transform="translate(-15, 20)">
      <rect width="30" height="15" rx="3" fill="#00aaee"/>
      <text x="15" y="11" font-family="sans-serif" font-size="8" fill="#000" text-anchor="middle">NumPy</text>
    </g>
  </g>

  <!-- Connection / Shield Bounce -->
  <path d="M 300 180 L 300 230" stroke="#ff4d4d" stroke-width="3" fill="none" stroke-dasharray="4,4"/>
  <text x="300" y="245" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ff4d4d" text-anchor="middle">No Conflicts 🛡️</text>
  <path d="M 285 180 L 315 180" stroke="#ff4d4d" stroke-width="3" fill="none"/>

  <!-- Project B (Right Dome) -->
  <g transform="translate(450, 180)">
    <!-- Shield/Dome -->
    <circle cx="0" cy="0" r="70" fill="url(#glass)" stroke="#00cc66" stroke-width="3" filter="url(#glow)"/>
    
    <!-- Inner Elements -->
    <text x="0" y="-45" font-family="monospace" font-size="14" font-weight="bold" fill="#00cc66" text-anchor="middle">Project B</text>
    
    <g transform="translate(-25, -10)">
      <rect width="50" height="20" rx="3" fill="#00cc66"/>
      <text x="25" y="14" font-family="sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">Pandas v2</text>
      <!-- Subtle Floating Animation -->
      <animateTransform attributeName="transform" type="translate" values="-25,-10; -25,-5; -25,-10" dur="2.5s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(-10, 20)">
      <rect width="30" height="15" rx="3" fill="#00aa55"/>
      <text x="15" y="11" font-family="sans-serif" font-size="8" fill="#000" text-anchor="middle">Scikit</text>
    </g>
  </g>

  <!-- Commands context -->
  <rect x="180" y="100" width="240" height="40" rx="5" fill="#11111a" stroke="#4a4a6a" stroke-width="1"/>
  <text x="300" y="125" font-family="monospace" font-size="14" fill="#ffaa00" text-anchor="middle">
    > python -m venv my_env
  </text>
</svg>
