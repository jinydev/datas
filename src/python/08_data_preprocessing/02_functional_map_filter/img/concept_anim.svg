<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2f"/>
      <stop offset="100%" stop-color="#2a2a40"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#bgGrad)" rx="15" ry="15"/>

  <!-- Title -->
  <text x="300" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">Functional Paradigms: map() &amp; filter()</text>

  <!-- Map Function Area (Top) -->
  <g transform="translate(0, 70)">
    <text x="80" y="20" font-family="monospace" font-size="16" fill="#00ccff" font-weight="bold">map( x*2 , data )</text>
    
    <!-- Input Array -->
    <g transform="translate(50, 40)">
      <rect width="40" height="40" rx="5" fill="#555" filter="url(#shadow)"/>
      <text x="20" y="25" font-family="monospace" fill="#fff" font-size="16" text-anchor="middle">1</text>
      
      <rect x="50" width="40" height="40" rx="5" fill="#555" filter="url(#shadow)"/>
      <text x="70" y="25" font-family="monospace" fill="#fff" font-size="16" text-anchor="middle">2</text>

      <rect x="100" width="40" height="40" rx="5" fill="#555" filter="url(#shadow)"/>
      <text x="120" y="25" font-family="monospace" fill="#fff" font-size="16" text-anchor="middle">3</text>
    </g>

    <!-- Mapping Arrows & Machine -->
    <path d="M 210 60 L 260 60" stroke="#00ccff" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="270" y="35" width="60" height="50" rx="10" fill="#00ccff" filter="url(#shadow)"/>
    <text x="300" y="65" font-family="monospace" font-size="24" font-weight="bold" fill="#000" text-anchor="middle">x2</text>
    <path d="M 340 60 L 390 60" stroke="#00ccff" stroke-width="4" marker-end="url(#arrow)"/>

    <!-- Output Array -->
    <g transform="translate(410, 40)">
      <rect width="40" height="40" rx="5" fill="#00ccff" filter="url(#shadow)"/>
      <text x="20" y="25" font-family="monospace" fill="#000" font-size="16" font-weight="bold" text-anchor="middle">2</text>
      
      <rect x="50" width="40" height="40" rx="5" fill="#00ccff" filter="url(#shadow)"/>
      <text x="70" y="25" font-family="monospace" fill="#000" font-size="16" font-weight="bold" text-anchor="middle">4</text>

      <rect x="100" width="40" height="40" rx="5" fill="#00ccff" filter="url(#shadow)"/>
      <text x="120" y="25" font-family="monospace" fill="#000" font-size="16" font-weight="bold" text-anchor="middle">6</text>
    </g>
    
    <text x="480" y="100" font-family="sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">Transforms ALL elements</text>
  </g>

  <!-- Divider -->
  <line x1="50" y1="180" x2="550" y2="180" stroke="#4a4a6a" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Filter Function Area (Bottom) -->
  <g transform="translate(0, 190)">
    <text x="80" y="20" font-family="monospace" font-size="16" fill="#ff4d4d" font-weight="bold">filter( x>0 , data )</text>
    
    <!-- Input Array -->
    <g transform="translate(50, 40)">
      <rect width="40" height="40" rx="5" fill="#555" filter="url(#shadow)"/>
      <text x="20" y="25" font-family="monospace" fill="#fff" font-size="16" text-anchor="middle">5</text>
      
      <rect x="50" width="40" height="40" rx="5" fill="#ff4d4d" filter="url(#shadow)"/>
      <text x="70" y="25" font-family="monospace" fill="#fff" font-size="16" text-anchor="middle">-2</text>

      <rect x="100" width="40" height="40" rx="5" fill="#555" filter="url(#shadow)"/>
      <text x="120" y="25" font-family="monospace" fill="#fff" font-size="16" text-anchor="middle">10</text>
    </g>

    <!-- Filtering Arrows & Machine -->
    <path d="M 210 60 L 260 60" stroke="#ff4d4d" stroke-width="4" marker-end="url(#arrow_red)"/>
    
    <!-- Sieve/Funnel shape -->
    <path d="M 270 35 L 330 35 L 310 85 L 290 85 Z" fill="#ff4d4d" filter="url(#shadow)"/>
    <text x="300" y="60" font-family="monospace" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">&gt;0?</text>
    
    <!-- Dropped item -->
    <circle cx="300" cy="100" r="8" fill="#555">
      <animate attributeName="cy" values="90; 110" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1; 0" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="315" y="105" font-size="10" fill="#a0a0b0">-2 Dropped</text>

    <path d="M 340 60 L 390 60" stroke="#ff4d4d" stroke-width="4" marker-end="url(#arrow_red)"/>

    <!-- Output Array (Smaller) -->
    <g transform="translate(410, 40)">
      <rect width="40" height="40" rx="5" fill="#00cc66" filter="url(#shadow)"/>
      <text x="20" y="25" font-family="monospace" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">5</text>
      
      <rect x="50" width="40" height="40" rx="5" fill="#00cc66" filter="url(#shadow)"/>
      <text x="70" y="25" font-family="monospace" fill="#fff" font-size="16" font-weight="bold" text-anchor="middle">10</text>
    </g>
    
    <text x="460" y="100" font-family="sans-serif" font-size="12" fill="#a0a0b0" text-anchor="middle">Keeps matching elements</text>
  </g>

  <!-- Arrow Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" fill="#00ccff">
      <polygon points="0 0, 10 3, 0 6"/>
    </marker>
    <marker id="arrow_red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" fill="#ff4d4d">
      <polygon points="0 0, 10 3, 0 6"/>
    </marker>
  </defs>
</svg>
