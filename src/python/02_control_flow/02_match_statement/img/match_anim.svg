<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .box { fill: #313244; stroke: #45475a; stroke-width: 3; rx: 10; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 20px; font-weight: bold; fill: #cdd6f4; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .track { fill: none; stroke: #45475a; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .track-active { fill: none; stroke: #a6e3a1; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 5px #a6e3a1); }
      
      .package-list { fill: #89b4fa; stroke: #b4befe; stroke-width: 2; rx: 5; }
      .package-dict { fill: #f9e2af; stroke: #fab387; stroke-width: 2; rx: 5; }
      .package-str { fill: #f38ba8; stroke: #eba0ac; stroke-width: 2; rx: 5; }
      
      .text-pkg { font-family: monospace; font-size: 16px; font-weight: bold; fill: #1e1e2e; text-anchor: middle; }

      /* Animation for List Package */
      @keyframes moveList {
        0%, 15% { transform: translate(50px, 100px); opacity: 1; }
        30% { transform: translate(300px, 100px); opacity: 1; }
        40% { transform: translate(300px, 200px); opacity: 1; } /* Scanner */
        50% { transform: translate(550px, 200px); opacity: 1; } /* Case List Match! */
        65%, 100% { transform: translate(750px, 200px); opacity: 0; }
      }
      
      /* Animation for Dict Package */
      @keyframes moveDict {
        0%, 35% { transform: translate(50px, 100px); opacity: 0; }
        40%, 45% { transform: translate(50px, 100px); opacity: 1; }
        55% { transform: translate(300px, 100px); opacity: 1; }
        65% { transform: translate(300px, 300px); opacity: 1; } /* Scanner */
        75% { transform: translate(550px, 300px); opacity: 1; } /* Case Dict Match! */
        90%, 100% { transform: translate(750px, 300px); opacity: 0; }
      }

      /* Animation for Str Package (Default) */
      @keyframes moveStr {
        0%, 65% { transform: translate(50px, 100px); opacity: 0; }
        70%, 75% { transform: translate(50px, 100px); opacity: 1; }
        85% { transform: translate(300px, 100px); opacity: 1; }
        95% { transform: translate(300px, 400px); opacity: 1; } /* Scanner */
        100% { transform: translate(550px, 400px); opacity: 1; } /* Case _ Match! */
      }

      /* Scanner highlight */
      @keyframes scan1 { 
        0%, 35%, 55%, 100% { stroke: #45475a; } 
        40%, 50% { stroke: #a6e3a1; filter: drop-shadow(0 0 10px #a6e3a1); } 
      }
      @keyframes scan2 { 
        0%, 60%, 80%, 100% { stroke: #45475a; } 
        65%, 75% { stroke: #f9e2af; filter: drop-shadow(0 0 10px #f9e2af); } 
      }
      @keyframes scan3 { 
        0%, 90%, 100% { stroke: #45475a; } 
        95%, 99% { stroke: #f38ba8; filter: drop-shadow(0 0 10px #f38ba8); } 
      }

      .anim-pkg-list { animation: moveList 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .anim-pkg-dict { animation: moveDict 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .anim-pkg-str { animation: moveStr 12s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      
      .anim-scan1 { animation: scan1 12s ease-in-out infinite; }
      .anim-scan2 { animation: scan2 12s ease-in-out infinite; }
      .anim-scan3 { animation: scan3 12s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">구조적 패턴 매칭 (Structural Pattern Matching) 애니메이션</text>

  <!-- Input Area -->
  <rect x="50" y="80" width="150" height="40" class="box" />
  <text x="125" y="107" class="text-code" fill="#f5e0dc">match data:</text>

  <!-- Tracks -->
  <path d="M 200,100 L 300,100 L 300,400" class="track" />
  
  <path d="M 300,200 L 550,200" class="track" />
  <path d="M 300,300 L 550,300" class="track" />
  <path d="M 300,400 L 550,400" class="track" />

  <!-- Scanning Gates (Cases) -->
  <polygon points="300,180 340,200 300,220 260,200" class="box anim-scan1" />
  <polygon points="300,280 340,300 300,320 260,300" class="box anim-scan2" />
  <polygon points="300,380 340,400 300,420 260,400" class="box anim-scan3" />

  <!-- Case logic Destination -->
  <rect x="450" y="160" width="300" height="80" class="box" fill="#181825" stroke="#a6e3a1" stroke-dasharray="5 5" />
  <text x="600" y="190" class="text-code" fill="#a6e3a1">case [x, y] :</text>
  <text x="600" y="220" class="text-desc" fill="#a6e3a1">리스트이고 길이가 2인가? 언패킹!</text>

  <rect x="450" y="260" width="300" height="80" class="box" fill="#181825" stroke="#f9e2af" stroke-dasharray="5 5" />
  <text x="600" y="290" class="text-code" fill="#f9e2af">case {"id": id} :</text>
  <text x="600" y="320" class="text-desc" fill="#f9e2af">딕셔너리이고 "id" 키가 있는가?</text>

  <rect x="450" y="360" width="300" height="80" class="box" fill="#181825" stroke="#f38ba8" stroke-dasharray="5 5" />
  <text x="600" y="390" class="text-code" fill="#f38ba8">case _ :</text>
  <text x="600" y="420" class="text-desc" fill="#f38ba8">나머지 모든 형태 (Default)</text>

  <!-- Packages (Data passing through) -->
  <!-- 1st Package: List -->
  <g class="anim-pkg-list">
    <rect x="-40" y="-15" width="80" height="30" class="package-list" />
    <text x="0" y="5" class="text-pkg">[10, 20]</text>
  </g>

  <!-- 2nd Package: Dictionary -->
  <g class="anim-pkg-dict">
    <rect x="-50" y="-15" width="100" height="30" class="package-dict" />
    <text x="0" y="5" class="text-pkg">{"id": 5}</text>
  </g>
  
  <!-- 3rd Package: Unknown String -->
  <g class="anim-pkg-str">
    <rect x="-40" y="-15" width="80" height="30" class="package-str" />
    <text x="0" y="5" class="text-pkg">"Hello"</text>
  </g>

</svg>
