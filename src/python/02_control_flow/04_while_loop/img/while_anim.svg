<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&amp;display=swap');
            text { font-family: 'Pretendard', sans-serif; font-weight: 600; }
            
            #dot {
                animation: whileFlow 8s infinite cubic-bezier(0.4, 0, 0.2, 1);
            }

            #conditionDiamond {
                animation: diamondGlow 8s infinite;
            }

            #bodyBlock {
                animation: bodyGlow 8s infinite;
            }
            
            #exitBlock {
                animation: exitGlow 8s infinite;
            }

            /*
               While Flow Timeline
               Loop 1 (True)
               0-10% Entering Condition
               10-20% In condition, moving to Body
               20-30% In body processing
               30-40% Back to Condition

               Loop 2 (True)
               40-50% In condition, moving to Body
               50-60% In body processing
               60-70% Back to Condition

               Loop 3 (False)
               70-80% In condition evaluating False
               80-90% Move to Exit
               90-100% Fade / Reset
            */

            @keyframes whileFlow {
                0% { transform: translate(300px, 10px); opacity: 0; fill: #adb5bd; }
                5% { transform: translate(300px, 10px); opacity: 1; fill: #adb5bd; }
                10%, 15% { transform: translate(300px, 60px); fill: #198754; opacity: 1;} /* Evaluated True */
                20%, 25% { transform: translate(300px, 160px); fill: #198754; opacity: 1;} /* In Body */
                30% { transform: translate(160px, 160px); fill: #0d6efd; opacity: 1;} /* Return Left */
                35%, 38% { transform: translate(160px, 60px); fill: #0d6efd; opacity: 1;} /* Return Up */
                
                40%, 45% { transform: translate(300px, 60px); fill: #198754; opacity: 1;} /* Evaluated True */
                50%, 55% { transform: translate(300px, 160px); fill: #198754; opacity: 1;} /* In Body */
                60% { transform: translate(160px, 160px); fill: #0d6efd; opacity: 1;} /* Return Left */
                65%, 68% { transform: translate(160px, 60px); fill: #0d6efd; opacity: 1;} /* Return Up */
                
                70%, 75% { transform: translate(300px, 60px); fill: #dc3545; opacity: 1;} /* Evaluated False (Condition broken) */
                80%, 90% { transform: translate(450px, 60px); fill: #dc3545; opacity: 1;} /* Exit */
                95%, 100% { transform: translate(450px, 60px); opacity: 0; fill: #dc3545; }
            }

            @keyframes diamondGlow {
                0%, 9% { stroke: #0d6efd; fill: #F0F8FF; }
                10%, 15% { stroke: #198754; fill: #e8f5e9; } /* True */
                16%, 39% { stroke: #0d6efd; fill: #F0F8FF; }
                40%, 45% { stroke: #198754; fill: #e8f5e9; } /* True */
                46%, 69% { stroke: #0d6efd; fill: #F0F8FF; }
                70%, 75% { stroke: #dc3545; fill: #ffebee; } /* False */
                76%, 100% { stroke: #0d6efd; fill: #F0F8FF; }
            }

            @keyframes bodyGlow {
                0%, 19% { stroke: #198754; fill: #fff; transform: scale(1); transform-origin: 300px 160px;}
                20%, 25% { stroke: #198754; fill: #e8f5e9; transform: scale(1.05); transform-origin: 300px 160px;}
                26%, 49% { stroke: #198754; fill: #fff; transform: scale(1); transform-origin: 300px 160px;}
                50%, 55% { stroke: #198754; fill: #e8f5e9; transform: scale(1.05); transform-origin: 300px 160px;}
                56%, 100% { stroke: #198754; fill: #fff; transform: scale(1); transform-origin: 300px 160px;}
            }

            @keyframes exitGlow {
                0%, 78% { stroke: #dc3545; fill: #fff; transform: scale(1); transform-origin: 450px 60px;}
                79%, 95% { stroke: #dc3545; fill: #ffebee; transform: scale(1.05); transform-origin: 450px 60px;}
                96%, 100% { stroke: #dc3545; fill: #fff; transform: scale(1); transform-origin: 450px 60px;}
            }

        </style>
        <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#198754" />
        </marker>
        <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d6efd" />
        </marker>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc3545" />
        </marker>
    </defs>
    
    <!-- Background -->
    <rect x="0" y="0" width="600" height="250" fill="#f8f9fa" rx="16" stroke="#e9ecef" stroke-width="2"/>
    
    <!-- Initial Entry Line -->
    <path d="M 300 20 L 300 40" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- True Path (Down to Body) -->
    <path d="M 300 85 L 300 135" stroke="#198754" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="325" y="115" text-anchor="middle" font-size="13" fill="#198754">조건 참(True)</text>

    <!-- Return Path (Left, Up, Right) -->
    <path d="M 240 160 L 160 160 L 160 60 L 220 60" stroke="#0d6efd" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <text x="140" y="115" text-anchor="middle" font-size="13" fill="#0d6efd" font-weight="normal">다시 조건 평가</text>

    <!-- False Path (Right) Exit -->
    <path d="M 370 60 L 450 60" stroke="#dc3545" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    <text x="410" y="47" text-anchor="middle" font-size="13" fill="#dc3545">거짓(False)</text>
    
    <!-- Loop Body Block -->
    <g id="bodyBlock">
        <rect x="230" y="140" width="140" height="40" rx="8" stroke-width="2"/>
        <text x="300" y="165" text-anchor="middle" font-size="14" fill="#198754">내부 블록 실행(Do)</text>
    </g>

    <!-- Exit Block -->
    <g id="exitBlock">
        <rect x="400" y="40" width="100" height="40" rx="8" stroke-width="2"/>
        <text x="450" y="65" text-anchor="middle" font-size="14" fill="#dc3545">루프 탈출(Exit)</text>
    </g>

    <!-- Condition Diamond -->
    <g>
        <polygon id="conditionDiamond" points="300,35 370,60 300,85 230,60" stroke-width="2"/>
        <text x="300" y="65" text-anchor="middle" font-size="14" fill="#0d6efd">조건식 판별</text>
    </g>

    <!-- The Moving Data Dot -->
    <circle id="dot" cx="0" cy="0" r="10"/>

</svg>
