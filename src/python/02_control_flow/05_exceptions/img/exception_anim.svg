<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&amp;display=swap');
            text { font-family: 'Pretendard', sans-serif; font-weight: 600; }
            
            #dataPath { animation: pathGlow 8s infinite; }
            #errorPath { animation: errGlow 8s infinite; }
            
            #tryBlock { animation: tryGlow 8s infinite; }
            #exceptBlock { animation: exceptGlow 8s infinite; }
            #finallyBlock { animation: finallyGlow 8s infinite; }
            
            #normalDot { animation: successFlow 8s infinite cubic-bezier(0.4, 0, 0.2, 1); }
            #errorDot { animation: errorFlow 8s infinite cubic-bezier(0.4, 0, 0.2, 1); }

            /* Sequence Timeline (8s total)
               0-4s: Success flow
                 0-1s: Move into Try
                 1-2s: Process in Try
                 2-3s: Move directly to Finally (skip Except)
                 3-4s: Process in Finally and Exit
               
               4-8s: Error flow
                 4-5s: Move into Try
                 5-5.5s: Explosion/Error hits in Try
                 5.5-6.5s: Fall into Except net
                 6.5-7.5s: Move to Finally
                 7.5-8s: Process in Finally and Exit
            */

            @keyframes successFlow {
                0% { transform: translate(300px, 10px); opacity: 0; fill: #198754; }
                5% { transform: translate(300px, 10px); opacity: 1; fill: #198754; }
                15%, 25% { transform: translate(300px, 80px); opacity: 1; fill: #198754; } /* In Try */
                35%, 45% { transform: translate(300px, 220px); opacity: 1; fill: #198754; } /* In Finally */
                50% { transform: translate(300px, 260px); opacity: 0; fill: #198754; }
                100% { opacity: 0; }
            }

            @keyframes errorFlow {
                0%, 49% { opacity: 0; }
                50% { transform: translate(300px, 10px); opacity: 0; fill: #dc3545; }
                55% { transform: translate(300px, 10px); opacity: 1; fill: #dc3545; }
                65% { transform: translate(300px, 80px); opacity: 1; fill: #dc3545; } /* In Try */
                70% { transform: translate(300px, 80px); opacity: 1; fill: #dc3545; } /* Crash! */
                75%, 85% { transform: translate(450px, 150px); opacity: 1; fill: #ffc107; } /* Caught in Except */
                90%, 95% { transform: translate(300px, 220px); opacity: 1; fill: #ffc107; } /* Move to Finally */
                100% { transform: translate(300px, 260px); opacity: 0; fill: #ffc107; }
            }

            @keyframes tryGlow {
                0%, 12% { stroke: #0d6efd; fill: #fff; }
                13%, 25% { stroke: #198754; fill: #e8f5e9; } /* Success active */
                26%, 62% { stroke: #0d6efd; fill: #fff; }
                63%, 70% { stroke: #dc3545; fill: #ffebee; } /* Error active */
                71%, 100% { stroke: #0d6efd; fill: #fff; }
            }

            @keyframes exceptGlow {
                0%, 74% { stroke: #ffc107; fill: #fff; transform: scale(1); transform-origin: 450px 150px; }
                75%, 85% { stroke: #ffc107; fill: #fff8e1; transform: scale(1.05); transform-origin: 450px 150px; }
                86%, 100% { stroke: #ffc107; fill: #fff; transform: scale(1); transform-origin: 450px 150px; }
            }

            @keyframes finallyGlow {
                0%, 34% { stroke: #6c757d; fill: #fff; }
                35%, 45% { stroke: #6c757d; fill: #f8f9fa; } /* Success finally */
                46%, 89% { stroke: #6c757d; fill: #fff; }
                90%, 98% { stroke: #6c757d; fill: #f8f9fa; } /* Error finally */
                99%, 100% { stroke: #6c757d; fill: #fff; }
            }

            /* The crash icon (lightning) appears only during error */
            #crashIcon {
                animation: crashFlash 8s infinite;
            }
            @keyframes crashFlash {
                0%, 65% { opacity: 0; transform: scale(0.5); transform-origin: 300px 80px; }
                68% { opacity: 1; transform: scale(1.5); transform-origin: 300px 80px; }
                72%, 100% { opacity: 0; transform: scale(0.5); transform-origin: 300px 80px; }
            }

        </style>
        <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd" />
        </marker>
        <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc3545" />
        </marker>
        <marker id="arrowYellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffc107" />
        </marker>
    </defs>
    
    <!-- Background -->
    <rect x="0" y="0" width="600" height="280" fill="#f8f9fa" rx="16" stroke="#e9ecef" stroke-width="2"/>
    
    <!-- Initial Line -->
    <path d="M 300 20 L 300 60" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- Try block (Center Top) -->
    <g id="tryBlock">
        <rect x="230" y="60" width="140" height="40" rx="8" stroke-width="2"/>
        <text x="300" y="85" text-anchor="middle" font-size="14" fill="#0d6efd">try (위험 구역)</text>
    </g>

    <!-- Normal Flow Line -->
    <path d="M 300 100 L 300 200" stroke="#adb5bd" stroke-dasharray="4,4" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
    
    <!-- Error Path (Diag Right) -->
    <path d="M 340 100 L 450 130" stroke="#dc3545" stroke-dasharray="4,4" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
    <text x="410" y="120" text-anchor="middle" font-size="12" fill="#dc3545">Error 발생 시</text>

    <!-- Except Block (Right Middle) -->
    <g id="exceptBlock">
        <rect x="380" y="130" width="140" height="40" rx="8" stroke-width="2"/>
        <text x="450" y="155" text-anchor="middle" font-size="14" fill="#d39e00">except (안전망)</text>
    </g>

    <!-- Return from Except to Finally -->
    <path d="M 450 170 L 450 220 L 370 220" stroke="#ffc107" stroke-dasharray="4,4" stroke-width="2" fill="none" marker-end="url(#arrowYellow)"/>

    <!-- Finally Block (Center Bottom) -->
    <g id="finallyBlock">
        <rect x="230" y="200" width="140" height="40" rx="8" stroke-width="2"/>
        <text x="300" y="225" text-anchor="middle" font-size="14" fill="#6c757d">finally (무조건 실행)</text>
    </g>

    <!-- Exit Line -->
    <path d="M 300 240 L 300 260" stroke="#adb5bd" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- Dots -->
    <circle id="normalDot" cx="0" cy="0" r="10"/>
    <circle id="errorDot" cx="0" cy="0" r="10"/>

    <!-- Crash Lightning Symbol -->
    <path id="crashIcon" d="M295 70 L305 70 L300 85 L315 80 L295 100 L300 85 Z" fill="#dc3545" stroke="#fff" stroke-width="1"/>

    <!-- Legend -->
    <text x="30" y="30" font-size="12" fill="#198754">● 정상 흐름 (에러 없음)</text>
    <text x="30" y="50" font-size="12" fill="#dc3545">● 비상 흐름 (에러 발생)</text>

</svg>
