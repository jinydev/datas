<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .box-try { fill: #313244; stroke: #89dceb; stroke-width: 3; rx: 10; }
      .box-except { fill: #181825; stroke: #f38ba8; stroke-width: 3; rx: 10; stroke-dasharray: 5 5; }
      .box-else { fill: #313244; stroke: #a6e3a1; stroke-width: 3; rx: 10; }
      .box-finally { fill: #313244; stroke: #f9e2af; stroke-width: 3; rx: 10; }
      
      .arrow { fill: none; stroke: #bac2de; stroke-width: 4; stroke-linecap: round; }
      
      /* Normal Path Animation (Green) */
      @keyframes normalFlow {
        0%, 5% { transform: translate(400px, 50px); opacity: 0; fill: #a6e3a1; }
        15% { transform: translate(400px, 50px); opacity: 1; fill: #a6e3a1; } /* Enter Try */
        25% { transform: translate(400px, 120px); opacity: 1; } /* Middle of Try */
        35% { transform: translate(400px, 160px); opacity: 1; } /* Exit Try */
        45% { transform: translate(650px, 200px); opacity: 1; } /* Move to Else */
        55% { transform: translate(650px, 260px); opacity: 1; } /* Enter Else */
        65% { transform: translate(650px, 320px); opacity: 1; } /* Exit Else */
        75% { transform: translate(400px, 340px); opacity: 1; } /* Move to Finally */
        85% { transform: translate(400px, 400px); opacity: 1; } /* Enter Finally */
        95% { transform: translate(400px, 460px); opacity: 1; fill: #a6e3a1; } /* Exit Finally */
        100% { transform: translate(400px, 480px); opacity: 0; }
      }

      /* Error Path Animation (Red) */
      @keyframes errorFlow {
        0%, 5% { transform: translate(400px, 50px); opacity: 0; fill: #f38ba8; }
        15% { transform: translate(400px, 50px); opacity: 1; fill: #f38ba8; } /* Enter Try */
        25% { transform: translate(400px, 100px); opacity: 1; } /* Tripping point */
        
        /* Lightning Strike / CRASH! */
        30% { transform: translate(400px, 110px) scale(2); fill: #fab387; }
        
        35% { transform: translate(400px, 160px) scale(1); fill: #f38ba8; } /* Bounced */
        45% { transform: translate(150px, 200px); opacity: 1; } /* Move to Except */
        55% { transform: translate(150px, 260px); opacity: 1; } /* Enter Except */
        65% { transform: translate(150px, 320px); opacity: 1; } /* Exit Except */
        75% { transform: translate(400px, 340px); opacity: 1; } /* Move to Finally */
        85% { transform: translate(400px, 400px); opacity: 1; } /* Enter Finally */
        95% { transform: translate(400px, 460px); opacity: 1; } /* Exit Finally */
        100% { transform: translate(400px, 480px); opacity: 0; }
      }
      
      .particle-normal { animation: normalFlow 10s ease-in-out infinite; }
      .particle-error { animation: errorFlow 10s ease-in-out infinite; animation-delay: 5s; }

    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bac2de" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">try-except-else-finally 실행 흐름</text>

  <!-- TRY Block -->
  <rect x="250" y="80" width="300" height="80" class="box-try" />
  <text x="400" y="115" class="text-code" fill="#89dceb">try:</text>
  <text x="400" y="140" class="text-desc">일단 실행 시도</text>

  <!-- EXCEPT Block -->
  <rect x="50" y="220" width="200" height="80" class="box-except" />
  <text x="150" y="255" class="text-code" fill="#f38ba8">except:</text>
  <text x="150" y="280" class="text-desc" fill="#f38ba8">에러 발생 시 복구</text>

  <!-- Path from Try to Except (Error!) -->
  <path d="M 300,160 Q 150,180 150,210" class="arrow" marker-end="url(#arrowhead)" stroke-dasharray="8 4" stroke="#f38ba8" />
  <text x="210" y="180" class="text-desc" fill="#fab387" font-weight="bold">💥 Error!</text>

  <!-- ELSE Block -->
  <rect x="550" y="220" width="200" height="80" class="box-else" />
  <text x="650" y="255" class="text-code" fill="#a6e3a1">else:</text>
  <text x="650" y="280" class="text-desc" fill="#a6e3a1">에러 없을 때만 실행</text>

  <!-- Path from Try to Else (Success!) -->
  <path d="M 500,160 Q 650,180 650,210" class="arrow" marker-end="url(#arrowhead)" stroke="#a6e3a1" />
  <text x="590" y="180" class="text-desc" fill="#a6e3a1" font-weight="bold">✅ Success!</text>

  <!-- FINALLY Block -->
  <rect x="250" y="360" width="300" height="80" class="box-finally" />
  <text x="400" y="395" class="text-code" fill="#f9e2af">finally:</text>
  <text x="400" y="420" class="text-desc" fill="#f9e2af">무조건 마지막에 실행</text>

  <!-- Path from Except to Finally -->
  <path d="M 150,300 Q 150,340 240,380" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Path from Else to Finally -->
  <path d="M 650,300 Q 650,340 560,380" class="arrow" marker-end="url(#arrowhead)" />

  <!-- Particles -->
  <circle cx="0" cy="0" r="12" class="particle-normal" fill="#a6e3a1" />
  <circle cx="0" cy="0" r="12" class="particle-error" fill="#f38ba8" />

  <text x="400" y="475" class="text-desc">초록 공(성공)은 else를, 빨간 공(에러)은 except를 거친 후 둘 다 finally로 빠져나갑니다.</text>
</svg>
