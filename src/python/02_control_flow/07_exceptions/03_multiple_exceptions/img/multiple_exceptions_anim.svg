<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #1e1e2e; rx: 15; }
      .text-title { font-family: monospace; font-size: 24px; font-weight: bold; fill: #bac2de; text-anchor: middle; }
      .text-code { font-family: monospace; font-size: 20px; font-weight: bold; text-anchor: middle; }
      .text-desc { font-family: sans-serif; font-size: 14px; fill: #a6adc8; text-anchor: middle; }
      
      .box-try { fill: #313244; stroke: #89dceb; stroke-width: 3; rx: 10; }
      .box-except1 { fill: #181825; stroke: #f9e2af; stroke-width: 3; rx: 10; }
      .box-except2 { fill: #181825; stroke: #f38ba8; stroke-width: 3; rx: 10; }
      .box-except3 { fill: #181825; stroke: #cba6f7; stroke-width: 3; rx: 10; }
      .box-except4 { fill: #181825; stroke: #94e2d5; stroke-width: 3; rx: 10; }
      
      .arrow { fill: none; stroke: #bac2de; stroke-width: 4; stroke-linecap: round; }
      
      /* Animation for moving blocks into respective except catchers */
      @keyframes dropKey {
        0%, 5% { transform: translate(400px, 80px); opacity: 0; }
        10%, 20% { transform: translate(400px, 80px); opacity: 1; }
        30%, 40% { transform: translate(400px, 140px); opacity: 1; }  /* Try block error */
        50%, 60% { transform: translate(150px, 250px); opacity: 1; }  /* Caught in KeyError */
        70%, 100% { transform: translate(150px, 250px); opacity: 0; }
      }

      @keyframes dropIndex {
        0%, 30% { transform: translate(400px, 80px); opacity: 0; }
        35%, 45% { transform: translate(400px, 80px); opacity: 1; }
        55%, 65% { transform: translate(400px, 140px); opacity: 1; }  /* Try block error */
        75%, 85% { transform: translate(320px, 250px); opacity: 1; }  /* Caught in IndexError */
        95%, 100% { transform: translate(320px, 250px); opacity: 0; }
      }

      @keyframes dropZero {
        0%, 55% { transform: translate(400px, 80px); opacity: 0; }
        60%, 70% { transform: translate(400px, 80px); opacity: 1; }
        80%, 90% { transform: translate(400px, 140px); opacity: 1; }  /* Try block error */
        100% { transform: translate(490px, 250px); opacity: 1; }      /* Caught in ZeroDivisionError */
      }

      @keyframes dropOther {
        0%, 15% { transform: translate(400px, 80px); opacity: 0; }
        20%, 30% { transform: translate(400px, 80px); opacity: 1; }
        40%, 50% { transform: translate(400px, 140px); opacity: 1; }  /* Try block error */
        60%, 80% { transform: translate(660px, 250px); opacity: 1; }  /* Caught in generic Exception */
        90%, 100% { transform: translate(660px, 250px); opacity: 0; }
      }

      .particle-key { animation: dropKey 12s ease-in-out infinite; fill: #f9e2af; }
      .particle-index { animation: dropIndex 12s ease-in-out infinite; fill: #f38ba8; }
      .particle-zero { animation: dropZero 12s ease-in-out infinite; fill: #cba6f7; }
      .particle-other { animation: dropOther 12s ease-in-out infinite; fill: #94e2d5; }

    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bac2de" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <text x="400" y="40" class="text-title">다중 예외 처리 라우팅 (Multiple Exceptions)</text>

  <!-- TRY Block -->
  <rect x="250" y="80" width="300" height="80" class="box-try" />
  <text x="400" y="115" class="text-code" fill="#89dceb">try:</text>
  <text x="400" y="140" class="text-desc">복합적인 로직 실행 중...</text>

  <!-- Router Arrows -->
  <path d="M 400,160 L 150,220" class="arrow" stroke-dasharray="6 3" />
  <path d="M 400,160 L 320,220" class="arrow" stroke-dasharray="6 3" />
  <path d="M 400,160 L 490,220" class="arrow" stroke-dasharray="6 3" />
  <path d="M 400,160 L 660,220" class="arrow" stroke-dasharray="6 3" />

  <!-- EXCEPT 1: KeyError -->
  <rect x="70" y="240" width="160" height="90" class="box-except1" />
  <text x="150" y="270" class="text-code" fill="#f9e2af" font-size="16px">except KeyError:</text>
  <text x="150" y="295" class="text-desc" fill="#f9e2af">없는 키 찾았을 때</text>
  <text x="150" y="315" class="text-desc" fill="#f9e2af">맞춤 회복 시도</text>

  <!-- EXCEPT 2: IndexError -->
  <rect x="240" y="240" width="160" height="90" class="box-except2" />
  <text x="320" y="270" class="text-code" fill="#f38ba8" font-size="16px">except IndexError:</text>
  <text x="320" y="295" class="text-desc" fill="#f38ba8">배열 범위 초과 시</text>
  <text x="320" y="315" class="text-desc" fill="#f38ba8">맞춤 회복 시도</text>

  <!-- EXCEPT 3: ZeroDivisionError -->
  <rect x="410" y="240" width="160" height="90" class="box-except3" />
  <text x="490" y="270" class="text-code" fill="#cba6f7" font-size="15px">ZeroDivisionError:</text>
  <text x="490" y="295" class="text-desc" fill="#cba6f7">0으로 나누었을 때</text>
  <text x="490" y="315" class="text-desc" fill="#cba6f7">맞춤 회복 시도</text>

  <!-- EXCEPT 4: Exception (Catch All) -->
  <rect x="580" y="240" width="160" height="90" class="box-except4" />
  <text x="660" y="270" class="text-code" fill="#94e2d5" font-size="15px">except Exception:</text>
  <text x="660" y="295" class="text-desc" fill="#94e2d5">나머지 기타 등등</text>
  <text x="660" y="315" class="text-desc" fill="#94e2d5">모든 에러를 포괄</text>

  <!-- Particles -->
  <circle cx="0" cy="0" r="10" class="particle-key" />
  <circle cx="0" cy="0" r="10" class="particle-index" />
  <circle cx="0" cy="0" r="10" class="particle-zero" />
  <circle cx="0" cy="0" r="10" class="particle-other" />

  <text x="400" y="400" class="text-desc">마치 우편물을 분류(라우팅)하듯, 발생한 에러 객체의 종류(클래스형)와</text>
  <text x="400" y="425" class="text-desc">일치하는 첫 번째 `except` 블록으로 떨어져 맞춤형 처리가 이루어집니다.</text>
  <text x="400" y="450" class="text-desc" fill="#f38ba8" font-weight="bold">주의! 최상위 부모인 `Exception`은 블랙홀처럼 모든 에러를 흡수하므로 가장 마지막에 두어야 합니다.</text>
</svg>
