<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 데이터 불균형(Class Imbalance) 파악 (Countplot)</text>

  <!-- Countplot construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">와인 품질 점수(Quality) 분포</text>
    
    <!-- Axes -->
    <line x1="50" y1="240" x2="450" y2="240" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="240" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Quality (품질 등급)</text>
    <text x="20" y="145" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,145)">데이터 개수 (병)</text>
    
    <!-- X-axis labels (3 to 8) -->
    <text x="100" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">3</text>
    <text x="160" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">4</text>
    <text x="220" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">5</text>
    <text x="280" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">6</text>
    <text x="340" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">7</text>
    <text x="400" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">8</text>

    <!-- Bars forming a normal distribution curve (Bell curve) -->
    <rect x="85" y="235" width="30" height="5" fill="#fcf3cf"/>   <!-- 3 -->
    <rect x="145" y="210" width="30" height="30" fill="#f8c471"/>  <!-- 4 -->
    <rect x="205" y="70" width="30" height="170" fill="#e67e22"/>  <!-- 5 (Peak 1) -->
    <rect x="265" y="80" width="30" height="160" fill="#d35400"/>  <!-- 6 (Peak 2) -->
    <rect x="325" y="180" width="30" height="60" fill="#a04000"/>  <!-- 7 -->
    <rect x="385" y="230" width="30" height="10" fill="#6e2c00"/>  <!-- 8 -->

    <!-- Normal Distribution Line -->
    <path d="M100,230 Q160,200 220,70 T280,80 T340,180 T400,225" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Annotations -->
    <rect x="270" y="50" width="160" height="40" fill="#eaf2f8" rx="5"/>
    <text x="350" y="65" font-family="Arial" font-size="11" fill="#2980b9" font-weight="bold" text-anchor="middle">대부분 5~6점에 몰려 있음</text>
    <text x="350" y="80" font-family="Arial" font-size="11" fill="#34495e" text-anchor="middle">(종 모양 정규 분포)</text>
    
    <path d="M270,70 L240,80" fill="none" stroke="#2980b9" stroke-width="2"/>

    <rect x="350" y="120" width="130" height="40" fill="#fdedec" rx="5"/>
    <text x="415" y="135" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold" text-anchor="middle">최고급(8점) 데이터 부족!</text>
    <text x="415" y="150" font-family="Arial" font-size="11" fill="#c0392b" text-anchor="middle">(분류 모델 훈련 시 주의)</text>

  </g>
</svg>
