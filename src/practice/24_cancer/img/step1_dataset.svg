<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 유방암 진단(Breast Cancer) 데이터 구조</text>

  <!-- Cell Features Concept -->
  <g transform="translate(100, 90)">
    
    <rect x="0" y="0" width="220" height="240" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="220" height="40" fill="#3498db" rx="10"/>
    <rect x="0" y="20" width="220" height="20" fill="#3498db"/>
    <text x="110" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">세포핵 특성 (Features)</text>

    <!-- Cell Icon (Microscope view) -->
    <circle cx="110" cy="100" r="40" fill="#eaf2f8" stroke="#2980b9" stroke-width="3"/>
    <circle cx="110" cy="100" r="15" fill="#3498db"/>
    <path d="M110,60 L110,40 M150,100 L170,100" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="2,2"/>
    
    <!-- Text features -->
    <text x="110" y="170" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">radius (반지름 크기)</text>
    <text x="110" y="195" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">area (총 면적)</text>
    <text x="110" y="220" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">smoothness (매끄러움)</text>
  </g>

  <!-- Arrow -->
  <path d="M340,190 L440,190 M420,180 L440,190 L420,200" fill="none" stroke="#2c3e50" stroke-width="4"/>
  <text x="390" y="175" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">진단 (분류)</text>

  <!-- Target Variable (Diagnosis) -->
  <g transform="translate(480, 90)">
    
    <rect x="0" y="0" width="220" height="240" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="220" height="40" fill="#e74c3c" rx="10"/>
    <rect x="0" y="20" width="220" height="20" fill="#e74c3c"/>
    <text x="110" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">최종 진단 (Target)</text>

    <!-- Benign (Good) -->
    <circle cx="60" cy="90" r="25" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
    <circle cx="60" cy="90" r="8" fill="#27ae60"/>
    <text x="60" y="140" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">B (Benign)</text>
    <text x="60" y="155" font-family="Arial" font-size="12" fill="#27ae60" text-anchor="middle">양성(정상)</text>

    <!-- Malignant (Bad) -->
    <path d="M160,65 Q180,60 185,80 Q195,95 175,110 Q150,120 145,100 Q130,70 160,65 Z" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
    <circle cx="163" cy="88" r="10" fill="#c0392b"/>
    <text x="160" y="140" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">M (Malignant)</text>
    <text x="160" y="155" font-family="Arial" font-size="12" fill="#c0392b" text-anchor="middle">악성(암)</text>

    <text x="110" y="210" font-family="Courier" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">diagnosis</text>

  </g>

  <rect x="150" y="350" width="500" height="40" fill="#eaf2f8" rx="5"/>
  <text x="400" y="375" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">"세포의 생김새(크기, 굴곡)를 보고 암인지 아닌지 판별한다"</text>

</svg>
