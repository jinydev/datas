<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 데이터 스케일링 (Scaling) - 코끼리와 쥐의 달리기 경주</text>

  <!-- Problem (Unscaled) -->
  <g transform="translate(80, 100)">
    <rect width="260" height="200" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="130" y="30" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">스케일링 전 (Raw Data)</text>
    
    <text x="20" y="70" font-family="Courier" font-size="14" fill="#34495e">area (면적)</text>
    <rect x="20" y="80" width="220" height="30" fill="#3498db" rx="5"/>
    <text x="130" y="100" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">1001.5</text>

    <text x="20" y="140" font-family="Courier" font-size="14" fill="#34495e">smoothness</text>
    <rect x="20" y="150" width="5" height="30" fill="#e67e22" rx="2"/>
    <text x="50" y="170" font-family="Arial" font-size="14" fill="#e67e22" font-weight="bold">0.09</text>

    <text x="130" y="230" font-family="Arial" font-size="11" fill="#7f8c8d" text-anchor="middle">AI 曰: "area가 1만 배 크니까 훨씬 중요한 값인가 봐!"</text>
  </g>

  <!-- Process -->
  <g transform="translate(360, 160)">
    <path d="M0,0 L60,0 M50,-10 L60,0 L50,10" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="30" y="-30" font-family="Courier" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">(x - mean) / std</text>
    <text x="30" y="-10" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">Z-Score 표준화</text>
  </g>

  <!-- Solution (Scaled) -->
  <g transform="translate(440, 100)">
    <rect width="280" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="140" y="30" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">스케일링 후 (Scaled Data)</text>
    
    <!-- Scale Axis -->
    <line x1="140" y1="50" x2="140" y2="190" stroke="#bdc3c7" stroke-dasharray="4,4"/>
    <text x="140" y="210" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">평균 0</text>
    <text x="40" y="210" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">-2</text>
    <text x="240" y="210" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">+2</text>

    <text x="20" y="70" font-family="Courier" font-size="14" fill="#34495e">area (면적)</text>
    <rect x="140" y="80" width="80" height="30" fill="#3498db" rx="5"/>
    <text x="180" y="100" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">+1.2</text>

    <text x="20" y="140" font-family="Courier" font-size="14" fill="#34495e">smoothness</text>
    <rect x="140" y="150" width="60" height="30" fill="#e67e22" rx="5"/>
    <text x="170" y="170" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">+0.9</text>

    <text x="140" y="240" font-family="Arial" font-size="11" fill="#7f8c8d" text-anchor="middle">AI 曰: "아, 둘 다 평균보다 조금 높은 수준이구나!"</text>
  </g>

  <rect x="150" y="355" width="500" height="30" fill="#d5f5e3" rx="5"/>
  <text x="400" y="375" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">"스케일링: 변수들의 숫자가 가진 단위(Unit)를 제거하고 동일한 출발선에 세우는 마법"</text>

</svg>
