<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 다우존스 지수의 100년 역사 시각화 (Lineplot)</text>

  <!-- Lineplot construction -->
  <g transform="translate(100, 70)">
    <rect width="600" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <!-- Axes -->
    <line x1="50" y1="260" x2="550" y2="260" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="260" x2="50" y2="40" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="300" y="295" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Date (연도)</text>
    <text x="20" y="150" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,150)">Price (주가지수)</text>
    
    <text x="50" y="275" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">1914</text>
    <text x="175" y="275" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">1940</text>
    <text x="300" y="275" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">1970</text>
    <text x="425" y="275" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">2000</text>
    <text x="550" y="275" font-family="Arial" font-size="10" fill="#7f8c8d" text-anchor="middle">2020</text>

    <!-- The Stock Line -->
    <!-- Early years (flat) -->
    <path d="M50,250 L100,240 L120,230 L130,245 L150,235 L170,240 L200,220 L220,210 L240,215 L260,200 L280,205" fill="none" stroke="#2980b9" stroke-width="2"/>
    <!-- 80s and 90s (Growth) -->
    <path d="M280,205 L300,190 L310,170 L320,180 L340,150 L360,140 L380,100 L400,120 L420,80" fill="none" stroke="#2980b9" stroke-width="2"/>
    <!-- 2000s and beyond (Explosive with crashes) -->
    <path d="M420,80 L440,60 L450,100 L470,70 L480,120 L500,60 L520,30 L540,60 L550,20" fill="none" stroke="#2980b9" stroke-width="2"/>

    <!-- Events Annotations -->
    <!-- Great Depression -->
    <line x1="130" y1="245" x2="130" y2="180" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="130" y="170" font-family="Arial" font-size="10" fill="#c0392b" text-anchor="middle">대공황 (1929)</text>

    <!-- Dot Com Bubble / 2008 Crash -->
    <line x1="450" y1="100" x2="450" y2="160" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="450" y="170" font-family="Arial" font-size="10" fill="#c0392b" text-anchor="middle">닷컴 버블 붕괴 (2000)</text>

    <line x1="480" y1="120" x2="480" y2="190" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="480" y="200" font-family="Arial" font-size="10" fill="#c0392b" text-anchor="middle">서브프라임 (2008)</text>
    
    <rect x="70" y="60" width="220" height="50" fill="#fcf3cf" rx="5"/>
    <text x="180" y="80" font-family="Arial" font-size="12" fill="#d35400" font-weight="bold" text-anchor="middle">"자본주의의 역사는 끝없는 우상향"</text>
    <text x="180" y="95" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">단기적으로 폭락해도 장기적으로는 상승</text>
  </g>
</svg>
