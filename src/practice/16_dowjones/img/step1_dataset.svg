<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 다우존스 지수(Dow Jones) 데이터의 이해</text>

  <!-- Stock Market Metaphor -->
  <g transform="translate(100, 100)">
    
    <!-- Chart Background -->
    <rect x="0" y="0" width="300" height="200" fill="#2c3e50" rx="10"/>
    
    <!-- Grid -->
    <line x1="0" y1="40" x2="300" y2="40" stroke="#34495e" stroke-width="1"/>
    <line x1="0" y1="80" x2="300" y2="80" stroke="#34495e" stroke-width="1"/>
    <line x1="0" y1="120" x2="300" y2="120" stroke="#34495e" stroke-width="1"/>
    <line x1="0" y1="160" x2="300" y2="160" stroke="#34495e" stroke-width="1"/>

    <!-- Stock Line (Volatile) -->
    <path d="M0,180 L30,160 L60,170 L90,120 L120,130 L150,80 L180,100 L210,40 L240,60 L270,30 L300,50" fill="none" stroke="#2ecc71" stroke-width="3"/>
    
    <!-- Candlesticks -->
    <rect x="25" y="160" width="10" height="20" fill="#e74c3c"/>
    <line x1="30" y1="150" x2="30" y2="190" stroke="#e74c3c" stroke-width="2"/>
    
    <rect x="145" y="80" width="10" height="30" fill="#2ecc71"/>
    <line x1="150" y1="70" x2="150" y2="120" stroke="#2ecc71" stroke-width="2"/>
    
    <rect x="265" y="30" width="10" height="25" fill="#2ecc71"/>
    <line x1="270" y1="20" x2="270" y2="60" stroke="#2ecc71" stroke-width="2"/>

    <!-- Text inside Chart -->
    <text x="150" y="25" font-family="Arial" font-size="14" fill="#ecf0f1" font-weight="bold" text-anchor="middle">Dow Jones Industrial Average</text>
  </g>

  <!-- Arrow -->
  <path d="M430,200 L490,200 M480,190 L490,200 L480,210" fill="none" stroke="#2c3e50" stroke-width="4"/>
  <text x="460" y="185" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">기록</text>

  <!-- Data Structure -->
  <g transform="translate(520, 100)">
    <rect width="220" height="200" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="220" height="40" fill="#2c3e50" rx="10"/>
    <rect x="0" y="20" width="220" height="20" fill="#2c3e50"/>
    
    <text x="110" y="25" font-family="Courier" font-size="16" fill="#f1c40f" font-weight="bold" text-anchor="middle">Data Structure</text>
    
    <text x="20" y="70" font-family="Courier" font-size="14" fill="#3498db" font-weight="bold">Date (날짜)</text>
    <text x="20" y="90" font-family="Arial" font-size="12" fill="#7f8c8d">ex) 1914-12-01</text>
    <text x="20" y="110" font-family="Arial" font-size="12" fill="#7f8c8d">ex) 1915-01-01</text>

    <line x1="10" y1="130" x2="210" y2="130" stroke="#bdc3c7" stroke-dasharray="2,2"/>

    <text x="20" y="160" font-family="Courier" font-size="14" fill="#e74c3c" font-weight="bold">Price (주가)</text>
    <text x="20" y="180" font-family="Arial" font-size="12" fill="#7f8c8d">ex) 54.0</text>
    <text x="20" y="200" font-family="Arial" font-size="12" fill="#7f8c8d">ex) 54.5</text>
  </g>

  <!-- Title Bottom -->
  <text x="400" y="350" font-family="Arial" font-size="16" fill="#8e44ad" font-weight="bold" text-anchor="middle">"100년이 넘는 미국 증시의 역사를 담은 아주 단순하지만 강력한 시계열 데이터"</text>

</svg>
