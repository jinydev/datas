<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 뇌 신경망(Brain Networks) 데이터의 이해</text>

  <!-- Brain Network Metaphor -->
  <g transform="translate(100, 100)">
    <!-- Brain Outline -->
    <path d="M100,20 C180,20 200,80 200,140 C200,200 150,220 100,220 C50,220 0,200 0,140 C0,80 20,20 100,20 Z" fill="#eaf2f8" stroke="#3498db" stroke-width="3" stroke-dasharray="5,5"/>
    
    <!-- Nodes (Brain Regions) -->
    <circle cx="50" cy="80" r="10" fill="#e74c3c" id="n1"/>  <!-- Frontal -->
    <circle cx="150" cy="80" r="10" fill="#f39c12" id="n2"/> <!-- Parietal -->
    <circle cx="100" cy="140" r="10" fill="#2ecc71" id="n3"/> <!-- Temporal -->
    <circle cx="50" cy="180" r="10" fill="#9b59b6" id="n4"/>  <!-- Occipital -->
    <circle cx="150" cy="180" r="10" fill="#3498db" id="n5"/> <!-- Cerebellum -->

    <!-- Connections (Edges) -->
    <line x1="50" y1="80" x2="150" y2="80" stroke="#e74c3c" stroke-width="4"/> <!-- Strong connection -->
    <line x1="50" y1="80" x2="100" y2="140" stroke="#7f8c8d" stroke-width="1"/> <!-- Weak -->
    <line x1="150" y1="80" x2="100" y2="140" stroke="#e67e22" stroke-width="2"/>
    <line x1="100" y1="140" x2="50" y2="180" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="100" y1="140" x2="150" y2="180" stroke="#2ecc71" stroke-width="3"/>
    <line x1="50" y1="180" x2="150" y2="180" stroke="#3498db" stroke-width="5"/> <!-- Very Strong -->

    <text x="100" y="250" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">어떤 뇌 영역들이 함께 활성화될까?</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(380, 80)">
    <rect width="380" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="380" height="40" fill="#9b59b6" rx="10"/>
    <rect x="0" y="20" width="380" height="20" fill="#9b59b6"/>
    <text x="190" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">복잡한 다중 인덱스 (MultiIndex)</text>

    <!-- Context -->
    <rect x="20" y="60" width="340" height="180" fill="#f4ecf7" rx="5"/>
    <text x="30" y="80" font-family="Courier" font-size="12" fill="#2c3e50" font-weight="bold">네트워크(network) 번호와 노드(node) 번호</text>
    
    <!-- Table Mockup -->
    <line x1="20" y1="95" x2="360" y2="95" stroke="#8e44ad"/>
    <text x="30" y="115" font-family="Courier" font-size="11" fill="#8e44ad">network |  1  |  1  |  1  |  2  |  2  |</text>
    <text x="30" y="130" font-family="Courier" font-size="11" fill="#8e44ad">node    |  1  |  2  |  3  |  1  |  2  |</text>
    <line x1="20" y1="140" x2="360" y2="140" stroke="#8e44ad"/>
    
    <text x="30" y="160" font-family="Courier" font-size="11" fill="#34495e">0       | 0.1 | 0.5 | -.2 | 0.9 | 0.1 |</text>
    <text x="30" y="175" font-family="Courier" font-size="11" fill="#34495e">1       | -.3 | 0.8 | 0.4 | -.1 | -.5 |</text>

    <text x="190" y="215" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">컬럼(Column)의 헤더가 2줄 이상으로 겹쳐있는 구조!</text>
  </g>

</svg>
