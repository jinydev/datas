<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 히트맵(Heatmap)을 통한 상관관계 시각화</text>

  <!-- Heatmap Construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <!-- Main Matrix -->
    <g transform="translate(150, 40)">
      <!-- Cells -->
      <rect x="0" y="0" width="50" height="50" fill="#c0392b"/> <!-- 1.0 -->
      <rect x="50" y="0" width="50" height="50" fill="#f1948a"/> <!-- 0.5 -->
      <rect x="100" y="0" width="50" height="50" fill="#ecf0f1"/> <!-- 0.0 -->
      <rect x="150" y="0" width="50" height="50" fill="#5dade2"/> <!-- -0.6 -->
      
      <rect x="0" y="50" width="50" height="50" fill="#f1948a"/>
      <rect x="50" y="50" width="50" height="50" fill="#c0392b"/> <!-- 1.0 -->
      <rect x="100" y="50" width="50" height="50" fill="#e74c3c"/> <!-- 0.8 -->
      <rect x="150" y="50" width="50" height="50" fill="#85c1e9"/> <!-- -0.3 -->

      <rect x="0" y="100" width="50" height="50" fill="#ecf0f1"/>
      <rect x="50" y="100" width="50" height="50" fill="#e74c3c"/>
      <rect x="100" y="100" width="50" height="50" fill="#c0392b"/> <!-- 1.0 -->
      <rect x="150" y="100" width="50" height="50" fill="#2980b9"/> <!-- -0.9 -->

      <rect x="0" y="150" width="50" height="50" fill="#5dade2"/>
      <rect x="50" y="150" width="50" height="50" fill="#85c1e9"/>
      <rect x="100" y="150" width="50" height="50" fill="#2980b9"/>
      <rect x="150" y="150" width="50" height="50" fill="#c0392b"/> <!-- 1.0 -->

      <line x1="0" y1="0" x2="200" y2="200" stroke="#fff" stroke-width="2"/>
    </g>

    <!-- Labels -->
    <text x="175" y="30" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold">Node 1</text>
    <text x="225" y="30" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold">Node 2</text>
    <text x="275" y="30" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold">Node 3</text>
    <text x="325" y="30" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold">Node 4</text>

    <text x="140" y="70" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="end">Node 1</text>
    <text x="140" y="120" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="end">Node 2</text>
    <text x="140" y="170" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="end">Node 3</text>
    <text x="140" y="220" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="end">Node 4</text>

    <!-- Colorbar -->
    <rect x="400" y="40" width="20" height="200" fill="url(#grad2)"/>
    <text x="430" y="50" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">+1 (양의 상관)</text>
    <text x="430" y="140" font-family="Arial" font-size="12" fill="#7f8c8d">0 (관계 없음)</text>
    <text x="430" y="240" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">-1 (음의 상관)</text>

    <defs>
      <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#ecf0f1;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
      </linearGradient>
    </defs>

    <text x="250" y="275" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">붉을수록 함께 흥분하고, 푸를수록 반대로 움직인다!</text>
  </g>
</svg>
