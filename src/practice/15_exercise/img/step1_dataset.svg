<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 심박수(Pulse) 변화를 측정하는 운동 실험 데이터</text>

  <!-- Experiment Design Metaphor -->
  <g transform="translate(100, 80)">
    
    <!-- Independent Variables (Features) -->
    <rect x="0" y="0" width="220" height="280" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="220" height="40" fill="#3498db" rx="10"/>
    <rect x="0" y="20" width="220" height="20" fill="#3498db"/>
    <text x="110" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">실험 조건 (Features)</text>
    
    <!-- Diet -->
    <text x="20" y="70" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold">1. 식단 (diet)</text>
    <rect x="30" y="80" width="80" height="30" fill="#fcf3cf" rx="5"/>
    <text x="70" y="100" font-family="Arial" font-size="12" fill="#d35400" text-anchor="middle">no fat</text>
    <rect x="120" y="80" width="80" height="30" fill="#d5f5e3" rx="5"/>
    <text x="160" y="100" font-family="Arial" font-size="12" fill="#27ae60" text-anchor="middle">low fat</text>
    
    <!-- Kind -->
    <text x="20" y="140" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold">2. 운동 종류 (kind)</text>
    <rect x="30" y="150" width="50" height="30" fill="#eaf2f8" rx="5"/>
    <text x="55" y="170" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">rest</text>
    <rect x="90" y="150" width="50" height="30" fill="#d6eaf8" rx="5"/>
    <text x="115" y="170" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">walk</text>
    <rect x="150" y="150" width="50" height="30" fill="#aed6f1" rx="5"/>
    <text x="175" y="170" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">run</text>

    <!-- Time -->
    <text x="20" y="210" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold">3. 측정 시간 (time)</text>
    <text x="110" y="240" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">1분 / 15분 / 30분</text>
    <text x="110" y="260" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">(동일 인물 반복 측정)</text>
  </g>

  <!-- Arrow -->
  <path d="M340,200 L400,200 M390,190 L400,200 L390,210" fill="none" stroke="#2c3e50" stroke-width="4"/>
  <text x="370" y="185" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">결과</text>

  <!-- Dependent Variable (Target) -->
  <g transform="translate(420, 110)">
    <rect width="280" height="220" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="280" height="40" fill="#e74c3c" rx="10"/>
    <rect x="0" y="20" width="280" height="20" fill="#e74c3c"/>
    <text x="140" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">측정 지표 (Target)</text>

    <!-- Heart pulse icon -->
    <path d="M140,70 A25,25 0 0,0 90,70 A25,25 0 0,0 140,130 A25,25 0 0,0 190,70 A25,25 0 0,0 140,70 Z" fill="#fadbd8"/>
    <path d="M70,100 L100,100 L110,80 L130,130 L150,70 L170,110 L180,100 L210,100" fill="none" stroke="#c0392b" stroke-width="4" stroke-linejoin="round"/>
    
    <text x="140" y="170" font-family="Courier" font-size="24" fill="#c0392b" font-weight="bold" text-anchor="middle">pulse (심박수)</text>
    
    <text x="140" y="200" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">운동 강도와 식단에 따라</text>
    <text x="140" y="220" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">심박수는 어떻게 치솟을까?</text>
  </g>

</svg>
