<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: Pointplot으로 보는 시간에 따른 변화율 추이</text>

  <!-- Pointplot construction -->
  <g transform="translate(150, 80)">
    <rect width="500" height="280" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">운동 종류(kind)별 시간에 따른 심박수 변화</text>
    
    <!-- Axes -->
    <line x1="50" y1="230" x2="450" y2="230" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="230" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="265" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Time (측정 시점)</text>
    <text x="20" y="140" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,140)">Pulse (심박수)</text>
    
    <text x="120" y="245" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">1 min</text>
    <text x="250" y="245" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">15 min</text>
    <text x="380" y="245" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">30 min</text>

    <!-- Rest (Green) -->
    <path d="M120,200 L250,200 L380,195" fill="none" stroke="#27ae60" stroke-width="3"/>
    <circle cx="120" cy="200" r="5" fill="#27ae60"/>
    <circle cx="250" cy="200" r="5" fill="#27ae60"/>
    <circle cx="380" cy="195" r="5" fill="#27ae60"/>
    <!-- Error bars -->
    <line x1="120" y1="190" x2="120" y2="210" stroke="#27ae60" stroke-width="2"/>
    <line x1="250" y1="190" x2="250" y2="210" stroke="#27ae60" stroke-width="2"/>
    <line x1="380" y1="185" x2="380" y2="205" stroke="#27ae60" stroke-width="2"/>
    <text x="400" y="195" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold">rest (미동 없음)</text>

    <!-- Walk (Blue) -->
    <path d="M120,190 L250,170 L380,150" fill="none" stroke="#2980b9" stroke-width="3"/>
    <circle cx="120" cy="190" r="5" fill="#2980b9"/>
    <circle cx="250" cy="170" r="5" fill="#2980b9"/>
    <circle cx="380" cy="150" r="5" fill="#2980b9"/>
    <line x1="380" y1="140" x2="380" y2="160" stroke="#2980b9" stroke-width="2"/>
    <text x="400" y="150" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">walk (서서히 증가)</text>

    <!-- Run (Red) -->
    <path d="M120,180 L250,110 L380,60" fill="none" stroke="#c0392b" stroke-width="3"/>
    <circle cx="120" cy="180" r="5" fill="#c0392b"/>
    <circle cx="250" cy="110" r="5" fill="#c0392b"/>
    <circle cx="380" cy="60" r="5" fill="#c0392b"/>
    <line x1="380" y1="40" x2="380" y2="80" stroke="#c0392b" stroke-width="2"/>
    <text x="400" y="60" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">run (폭발적 증가)</text>
    
    <!-- Insight -->
    <rect x="70" y="50" width="160" height="40" fill="#fdedec" rx="5"/>
    <text x="150" y="75" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">달리기는 시간이 지날수록</text>
    <text x="150" y="90" font-family="Arial" font-size="11" fill="#34495e" text-anchor="middle">심박수가 기하급수적으로 치솟음</text>
  </g>
</svg>
