<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 데이터의 구조 - 피처(Feature)와 타겟(Target)</text>

  <!-- Titanic Metaphor -->
  <g transform="translate(100, 100)">
    <path d="M20,100 L80,100 L110,60 L140,60 L170,100 L230,100 L200,160 L50,160 Z" fill="#34495e"/>
    <rect x="90" y="30" width="20" height="30" fill="#e74c3c"/>
    <rect x="140" y="30" width="20" height="30" fill="#e74c3c"/>
    <path d="M0,140 Q125,180 250,140" fill="none" stroke="#3498db" stroke-width="5"/>
    <text x="125" y="15" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">RMS Titanic (1912)</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(350, 80)">
    <rect width="400" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="400" height="40" fill="#3498db" rx="10"/>
    <rect x="0" y="20" width="400" height="20" fill="#3498db"/>
    <text x="200" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">데이터프레임 구조 (DataFrame)</text>

    <!-- Features -->
    <rect x="20" y="60" width="250" height="180" fill="#ecf0f1" rx="5"/>
    <text x="145" y="80" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">독립 변수 (Features = X)</text>
    <text x="145" y="95" font-family="Arial" font-size="11" fill="#7f8c8d" text-anchor="middle">예측을 위한 단서들</text>
    
    <text x="30" y="130" font-family="Courier" font-size="12" fill="#2c3e50">• pclass: 객실 등급 (1, 2, 3)</text>
    <text x="30" y="155" font-family="Courier" font-size="12" fill="#2c3e50">• sex: 성별 (male, female)</text>
    <text x="30" y="180" font-family="Courier" font-size="12" fill="#2c3e50">• age: 나이 (22.0, 38.0...)</text>
    <text x="30" y="205" font-family="Courier" font-size="12" fill="#2c3e50">• fare: 요금 ($7.25, $71...)</text>

    <!-- Target -->
    <rect x="280" y="60" width="100" height="180" fill="#fcf3cf" rx="5"/>
    <text x="330" y="80" font-family="Arial" font-size="14" fill="#d35400" font-weight="bold" text-anchor="middle">종속 변수</text>
    <text x="330" y="95" font-family="Arial" font-size="11" fill="#7f8c8d" text-anchor="middle">(Target = y)</text>
    
    <text x="330" y="150" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">survived</text>
    <text x="330" y="170" font-family="Arial" font-size="12" fill="#e74c3c" font-weight="bold" text-anchor="middle">0 = 사망</text>
    <text x="330" y="190" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">1 = 생존</text>
  </g>

  <!-- Connector -->
  <path d="M260,180 L320,180" fill="none" stroke="#2c3e50" stroke-width="3" stroke-dasharray="5,5"/>
  <path d="M320,180 L310,170 M320,180 L310,190" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <text x="290" y="170" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">분석</text>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">"어떤 Feature(단서)가 Target(생존)에 가장 큰 영향을 미쳤을까?" 를 찾는 것이 핵심!</text>
</svg>
