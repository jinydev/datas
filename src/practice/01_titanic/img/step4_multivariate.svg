<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: Boxplot을 읽는 법 (사분위수와 이상치 파악)</text>

  <!-- Boxplot Anatomy -->
  <g transform="translate(100, 100)">
    <rect width="250" height="240" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">Boxplot 해부도 (요금 분포)</text>
    
    <!-- The Box -->
    <rect x="100" y="100" width="50" height="80" fill="#f39c12" stroke="#2c3e50" stroke-width="2"/>
    <line x1="100" y1="140" x2="150" y2="140" stroke="#2c3e50" stroke-width="3"/> <!-- Median -->
    
    <!-- Whiskers -->
    <line x1="125" y1="100" x2="125" y2="60" stroke="#2c3e50" stroke-width="2"/>
    <line x1="115" y1="60" x2="135" y2="60" stroke="#2c3e50" stroke-width="2"/>
    
    <line x1="125" y1="180" x2="125" y2="210" stroke="#2c3e50" stroke-width="2"/>
    <line x1="115" y1="210" x2="135" y2="210" stroke="#2c3e50" stroke-width="2"/>

    <!-- Outliers -->
    <circle cx="125" cy="40" r="3" fill="#e74c3c"/>
    <circle cx="125" cy="30" r="3" fill="#e74c3c"/>
    <circle cx="125" cy="15" r="3" fill="#e74c3c"/>

    <!-- Labels -->
    <text x="80" y="145" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="end">중앙값 (Median)</text>
    <text x="80" y="105" font-family="Arial" font-size="12" fill="#34495e" text-anchor="end">상위 25% (Q3)</text>
    <text x="80" y="185" font-family="Arial" font-size="12" fill="#34495e" text-anchor="end">하위 25% (Q1)</text>
    
    <text x="170" y="145" font-family="Arial" font-size="12" fill="#7f8c8d">이 상자 안에</text>
    <text x="170" y="160" font-family="Arial" font-size="12" fill="#7f8c8d">절반(50%)이 존재!</text>
    
    <path d="M150,30 L170,30" stroke="#e74c3c" stroke-width="2"/>
    <text x="175" y="35" font-family="Arial" font-size="12" fill="#e74c3c" font-weight="bold">이상치 (Outliers)</text>
    <text x="175" y="50" font-family="Arial" font-size="10" fill="#7f8c8d">비정상적으로 비싼 표</text>
  </g>

  <!-- Real world app -->
  <g transform="translate(420, 100)">
    <rect width="320" height="240" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="160" y="30" font-family="Arial" font-size="16" fill="#e67e22" font-weight="bold" text-anchor="middle">생존 여부에 따른 객실 요금(Fare) 비교</text>
    
    <line x1="40" y1="200" x2="280" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="40" y1="200" x2="40" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Dead (0) -->
    <rect x="90" y="170" width="30" height="20" fill="#3498db" stroke="#2c3e50"/>
    <line x1="90" y1="180" x2="120" y2="180" stroke="#2c3e50" stroke-width="2"/>
    <line x1="105" y1="170" x2="105" y2="150" stroke="#2c3e50"/>
    <line x1="105" y1="190" x2="105" y2="200" stroke="#2c3e50"/>
    <circle cx="105" cy="140" r="2" fill="#34495e"/>
    <circle cx="105" cy="130" r="2" fill="#34495e"/>
    <text x="105" y="220" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">사망 (0)</text>

    <!-- Survived (1) -->
    <rect x="180" y="130" width="30" height="50" fill="#e74c3c" stroke="#2c3e50"/>
    <line x1="180" y1="150" x2="210" y2="150" stroke="#2c3e50" stroke-width="2"/>
    <line x1="195" y1="130" x2="195" y2="80" stroke="#2c3e50"/>
    <line x1="195" y1="180" x2="195" y2="200" stroke="#2c3e50"/>
    <circle cx="195" cy="60" r="2" fill="#34495e"/>
    <circle cx="195" cy="40" r="2" fill="#34495e"/>
    <text x="195" y="220" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">생존 (1)</text>

    <text x="160" y="25" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle" transform="translate(0, 40)">비싼 티켓(큰 상자)일수록 생존!</text>
  </g>

</svg>
