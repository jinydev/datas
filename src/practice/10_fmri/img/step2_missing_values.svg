<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 반복 측정 데이터(Repeated Measures)의 본질</text>

  <!-- Repeated Measures Concept -->
  <g transform="translate(80, 100)">
    
    <!-- Timepoint 0 -->
    <rect x="0" y="0" width="180" height="150" fill="#fff" stroke="#3498db" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="180" height="30" fill="#3498db" rx="5"/>
    <text x="90" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Timepoint = 0초</text>
    
    <text x="20" y="55" font-family="Courier" font-size="12" fill="#2c3e50">Subject 0: signal = 0.1</text>
    <text x="20" y="75" font-family="Courier" font-size="12" fill="#2c3e50">Subject 1: signal = 0.2</text>
    <text x="20" y="95" font-family="Courier" font-size="12" fill="#2c3e50">Subject 2: signal = 0.0</text>
    <text x="90" y="115" font-family="Courier" font-size="12" fill="#7f8c8d" text-anchor="middle">... (총 14명) ...</text>
    
    <rect x="20" y="125" width="140" height="20" fill="#fcf3cf"/>
    <text x="90" y="140" font-family="Arial" font-size="12" fill="#d35400" font-weight="bold" text-anchor="middle">평균: 0.15 (오차 존재)</text>

    <!-- Arrow -->
    <path d="M190,75 L230,75 L220,65 M230,75 L220,85" fill="none" stroke="#bdc3c7" stroke-width="3"/>

    <!-- Timepoint 5 -->
    <rect x="240" y="0" width="180" height="150" fill="#fff" stroke="#e67e22" stroke-width="2" rx="5"/>
    <rect x="240" y="0" width="180" height="30" fill="#e67e22" rx="5"/>
    <text x="330" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Timepoint = 5초 (자극)</text>
    
    <text x="260" y="55" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold">Subject 0: signal = 2.5</text>
    <text x="260" y="75" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold">Subject 1: signal = 1.9</text>
    <text x="260" y="95" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold">Subject 2: signal = 2.2</text>
    <text x="330" y="115" font-family="Courier" font-size="12" fill="#7f8c8d" text-anchor="middle">... (총 14명) ...</text>

    <rect x="260" y="125" width="140" height="20" fill="#fcf3cf"/>
    <text x="330" y="140" font-family="Arial" font-size="12" fill="#d35400" font-weight="bold" text-anchor="middle">평균: 2.30 (오차 존재)</text>

    <!-- Arrow -->
    <path d="M430,75 L470,75 L460,65 M470,75 L460,85" fill="none" stroke="#bdc3c7" stroke-width="3"/>

    <!-- Timepoint 10 -->
    <rect x="480" y="0" width="180" height="150" fill="#fff" stroke="#2ecc71" stroke-width="2" rx="5"/>
    <rect x="480" y="0" width="180" height="30" fill="#2ecc71" rx="5"/>
    <text x="570" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Timepoint = 10초</text>
    
    <text x="500" y="55" font-family="Courier" font-size="12" fill="#2980b9">Subject 0: signal = -0.5</text>
    <text x="500" y="75" font-family="Courier" font-size="12" fill="#2980b9">Subject 1: signal = -1.2</text>
    <text x="500" y="95" font-family="Courier" font-size="12" fill="#2980b9">Subject 2: signal = -0.8</text>
    <text x="570" y="115" font-family="Courier" font-size="12" fill="#7f8c8d" text-anchor="middle">... (총 14명) ...</text>

    <rect x="500" y="125" width="140" height="20" fill="#fcf3cf"/>
    <text x="570" y="140" font-family="Arial" font-size="12" fill="#d35400" font-weight="bold" text-anchor="middle">평균: -0.90 (오차 존재)</text>

  </g>

  <!-- Takeaway -->
  <g transform="translate(80, 270)">
    <rect width="660" height="80" fill="#f4ecf7" stroke="#8e44ad" stroke-width="2" rx="10"/>
    <text x="330" y="35" font-family="Arial" font-size="16" fill="#8e44ad" font-weight="bold" text-anchor="middle">"동일한 시간(timepoint)에 여러 피험자(subject)의 데이터가 동시에 존재한다!"</text>
    <text x="330" y="60" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">이를 어떻게 하나의 선 그래프로 예쁘게 그릴 수 있을까?</text>
  </g>

</svg>