<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: fMRI (기능적 자기공명영상) 데이터의 이해</text>

  <!-- fMRI Metaphor -->
  <g transform="translate(100, 100)">
    <!-- Machine -->
    <rect x="0" y="20" width="100" height="120" fill="#bdc3c7" rx="20"/>
    <ellipse cx="100" cy="80" rx="30" ry="60" fill="#7f8c8d"/>
    <ellipse cx="100" cy="80" rx="20" ry="40" fill="#2c3e50"/>
    
    <!-- Bed &amp; Subject -->
    <rect x="100" y="90" width="120" height="15" fill="#3498db"/>
    <circle cx="110" cy="80" r="10" fill="#f1c40f"/> <!-- Head -->
    <rect x="120" y="80" width="80" height="10" fill="#f39c12" rx="5"/> <!-- Body -->

    <!-- Signals emitting -->
    <path d="M120,60 Q140,20 160,60 T200,60" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <path d="M120,40 Q150,0 180,40 T220,40" fill="none" stroke="#e74c3c" stroke-width="2"/>

    <text x="110" y="140" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">피험자 (Subject)</text>
  </g>

  <!-- Explanation Box -->
  <g transform="translate(380, 80)">
    <rect width="380" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="380" height="40" fill="#2c3e50" rx="10"/>
    <rect x="0" y="20" width="380" height="20" fill="#2c3e50"/>
    <text x="190" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">데이터의 5가지 핵심 기둥</text>

    <!-- Features -->
    <rect x="20" y="60" width="340" height="180" fill="#eaf2f8" rx="5"/>
    
    <text x="30" y="90" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold">1. subject</text>
    <text x="130" y="90" font-family="Arial" font-size="12" fill="#34495e">: 피험자 ID (s0 ~ s13)</text>
    
    <text x="30" y="115" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold">2. timepoint</text>
    <text x="130" y="115" font-family="Arial" font-size="12" fill="#34495e">: 측정 시간 (0 ~ 18초)</text>
    
    <text x="30" y="140" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold">3. event</text>
    <text x="130" y="140" font-family="Arial" font-size="12" fill="#34495e">: 자극 종류 (stim vs cue)</text>

    <text x="30" y="165" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold">4. region</text>
    <text x="130" y="165" font-family="Arial" font-size="12" fill="#34495e">: 뇌 측정 부위 (parietal vs frontal)</text>

    <text x="30" y="200" font-family="Courier" font-size="16" fill="#e74c3c" font-weight="bold">🎯 signal</text>
    <text x="130" y="200" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold">: 뇌파 신호의 강도 (Target)</text>

  </g>

  <text x="400" y="370" font-family="Arial" font-size="16" fill="#8e44ad" font-weight="bold" text-anchor="middle">"14명의 피험자가 동일한 실험을 시간의 흐름에 따라 여러 번 반복 측정한 데이터"</text>

</svg>