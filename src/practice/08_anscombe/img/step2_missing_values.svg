<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 통계학자들을 속인 거짓된 요약 통계량 (Summary Statistics)</text>

  <!-- Descriptive Stats Comparison -->
  <g transform="translate(100, 80)">
    <rect width="600" height="260" fill="#fff" stroke="#c0392b" stroke-width="3" rx="10"/>
    <rect x="0" y="0" width="600" height="50" fill="#e74c3c" rx="10"/>
    <rect x="0" y="25" width="600" height="25" fill="#e74c3c"/>
    <text x="300" y="32" font-family="Arial" font-size="20" fill="#fff" font-weight="bold" text-anchor="middle">df.groupby('dataset').agg(['mean', 'var']) 의 충격적 결과</text>

    <!-- Table Header -->
    <text x="80" y="90" font-family="Courier" font-size="16" fill="#34495e" font-weight="bold">Dataset</text>
    <text x="200" y="90" font-family="Courier" font-size="16" fill="#34495e" font-weight="bold">x의 평균</text>
    <text x="320" y="90" font-family="Courier" font-size="16" fill="#34495e" font-weight="bold">y의 평균</text>
    <text x="440" y="90" font-family="Courier" font-size="16" fill="#34495e" font-weight="bold">x 분산</text>
    <text x="540" y="90" font-family="Courier" font-size="16" fill="#34495e" font-weight="bold">y 분산</text>
    
    <line x1="20" y1="110" x2="580" y2="110" stroke="#bdc3c7" stroke-width="2"/>

    <!-- Row I -->
    <text x="100" y="140" font-family="Courier" font-size="18" fill="#3498db" font-weight="bold" text-anchor="middle">I</text>
    <text x="230" y="140" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">9.0</text>
    <text x="350" y="140" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">7.50</text>
    <text x="470" y="140" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">11.0</text>
    <text x="570" y="140" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">4.12</text>

    <!-- Row II -->
    <text x="100" y="180" font-family="Courier" font-size="18" fill="#e67e22" font-weight="bold" text-anchor="middle">II</text>
    <text x="230" y="180" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">9.0</text>
    <text x="350" y="180" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">7.50</text>
    <text x="470" y="180" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">11.0</text>
    <text x="570" y="180" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">4.12</text>

    <!-- Row III -->
    <text x="100" y="220" font-family="Courier" font-size="18" fill="#2ecc71" font-weight="bold" text-anchor="middle">III</text>
    <text x="230" y="220" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">9.0</text>
    <text x="350" y="220" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">7.50</text>
    <text x="470" y="220" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">11.0</text>
    <text x="570" y="220" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">4.12</text>

    <!-- Row IV -->
    <text x="100" y="260" font-family="Courier" font-size="18" fill="#9b59b6" font-weight="bold" text-anchor="middle">IV</text>
    <text x="230" y="260" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">9.0</text>
    <text x="350" y="260" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">7.50</text>
    <text x="470" y="260" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">11.0</text>
    <text x="570" y="260" font-family="Courier" font-size="18" fill="#c0392b" font-weight="bold" text-anchor="middle">4.12</text>
    
    <rect x="200" y="115" width="400" height="155" fill="none" stroke="#e74c3c" stroke-width="4" stroke-dasharray="8,4"/>
    <text x="400" y="310" font-family="Arial" font-size="18" fill="#e74c3c" font-weight="bold" text-anchor="middle">소수점 둘째 자리까지 완벽하게 동일한 쌍둥이 통계량!</text>
  </g>

</svg>
