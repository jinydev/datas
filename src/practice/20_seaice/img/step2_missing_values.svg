<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 날짜(Datetime) 데이터 분해 (연도와 월의 분리)</text>

  <!-- The Problem -->
  <g transform="translate(50, 100)">
    <rect width="240" height="200" fill="#fff" stroke="#34495e" stroke-width="2" rx="5"/>
    <text x="120" y="30" font-family="Courier" font-size="16" fill="#e74c3c" font-weight="bold" text-anchor="middle">Date</text>
    
    <text x="120" y="80" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1980-01-01</text>
    <text x="120" y="110" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">2012-09-15</text>
    <text x="120" y="140" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">2019-12-31</text>

    <line x1="20" y1="160" x2="220" y2="160" stroke="#bdc3c7" stroke-dasharray="4,4"/>
    <text x="120" y="180" font-family="Arial" font-size="12" fill="#7f8c8d" font-weight="bold" text-anchor="middle">통째로 쓰면 패턴을 찾기 어려움</text>
  </g>

  <!-- pd.to_datetime Arrow -->
  <g transform="translate(300, 180)">
    <path d="M0,0 L60,0 M50,-10 L60,0 L50,10" fill="none" stroke="#2980b9" stroke-width="4"/>
    <text x="30" y="-30" font-family="Courier" font-size="12" fill="#2980b9" font-weight="bold" text-anchor="middle">pd.to_datetime()</text>
    <text x="30" y="-15" font-family="Courier" font-size="12" fill="#2980b9" font-weight="bold" text-anchor="middle">.dt.year / .dt.month</text>
  </g>

  <!-- Extracted Features -->
  <g transform="translate(380, 100)">
    <rect width="370" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    
    <!-- Year Column -->
    <g transform="translate(40, 0)">
      <text x="50" y="30" font-family="Courier" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">Year</text>
      <text x="50" y="80" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">1980</text>
      <text x="50" y="110" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">2012</text>
      <text x="50" y="140" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">2019</text>
      
      <rect x="0" y="160" width="100" height="30" fill="#eaf2f8" rx="3"/>
      <text x="50" y="178" font-family="Arial" font-size="10" fill="#2980b9" text-anchor="middle">거시적(장기적) 추세 파악</text>
    </g>

    <line x1="165" y1="20" x2="165" y2="150" stroke="#bdc3c7"/>

    <!-- Month Column -->
    <g transform="translate(190, 0)">
      <text x="70" y="30" font-family="Courier" font-size="16" fill="#f39c12" font-weight="bold" text-anchor="middle">Month</text>
      <text x="70" y="80" font-family="Arial" font-size="14" fill="#f39c12" font-weight="bold" text-anchor="middle">1 (겨울)</text>
      <text x="70" y="110" font-family="Arial" font-size="14" fill="#f39c12" font-weight="bold" text-anchor="middle">9 (여름 끝)</text>
      <text x="70" y="140" font-family="Arial" font-size="14" fill="#f39c12" font-weight="bold" text-anchor="middle">12 (겨울)</text>
      
      <rect x="20" y="160" width="100" height="30" fill="#fcf3cf" rx="3"/>
      <text x="70" y="178" font-family="Arial" font-size="10" fill="#d35400" text-anchor="middle">미시적(계절별) 반복 파악</text>
    </g>
  </g>

  <rect x="150" y="330" width="500" height="40" fill="#eaf2f8" rx="5"/>
  <text x="400" y="355" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">시계열 분석의 기본: 날짜를 '연도'와 '월'로 쪼개서 분리하여 분석한다!</text>

</svg>
