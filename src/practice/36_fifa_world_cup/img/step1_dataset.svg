<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8f9fa" rx="15" stroke="#e9ecef" stroke-width="2"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: FIFA 월드컵 역사 데이터 구조</text>
  <g transform="translate(100, 90)">
    <rect x="0" y="0" width="220" height="240" fill="#fff" stroke="#3498db" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="220" height="40" fill="#3498db" rx="10"/>
    <rect x="0" y="20" width="220" height="20" fill="#3498db"/>
    <text x="110" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Features (독립변수)</text>
    <text x="20" y="80" font-family="Courier" font-size="12" fill="#2c3e50">• Year: 개최 연도 (1930 ~ 2022)</text>
    <text x="20" y="110" font-family="Courier" font-size="12" fill="#2c3e50">• Winner: 최종 우승 국가</text>
    <text x="20" y="140" font-family="Courier" font-size="12" fill="#2c3e50">• GoalsScored: 대회 총 골 수</text>
    <text x="20" y="170" font-family="Courier" font-size="12" fill="#2c3e50">• MatchesPlayed: 대회 총 경기 수</text>
  </g>
  <path d="M340,190 L440,190 M420,180 L440,190 L420,200" fill="none" stroke="#2c3e50" stroke-width="4"/>
  <text x="390" y="175" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">분석</text>
  <g transform="translate(480, 90)">
    <rect x="0" y="0" width="220" height="240" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="220" height="40" fill="#e74c3c" rx="10"/>
    <rect x="0" y="20" width="220" height="20" fill="#e74c3c"/>
    <text x="110" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">Target (종속변수)</text>
    <text x="20" y="100" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold">• Attendance</text>
    <text x="20" y="130" font-family="Arial" font-size="12" fill="#7f8c8d">월드컵 누적 관람 관중 수</text>
    <text x="20" y="160" font-family="Arial" font-size="12" fill="#7f8c8d">대회 규모의 척도</text>
  </g>
  <rect x="150" y="350" width="500" height="35" fill="#eaf2f8" rx="5"/>
  <text x="400" y="372" font-family="Arial" font-size="13" fill="#34495e" font-weight="bold" text-anchor="middle">연도별 월드컵 관람객 추이 및 최다 우승국의 통계적 위상 파악</text>
</svg>