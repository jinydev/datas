<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: Groupby (파편화된 영수증을 카테고리별로 병합)</text>

  <!-- Raw Receipts (Scattered) -->
  <g transform="translate(50, 100)">
    <text x="100" y="20" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">수만 건의 개별 영수증</text>
    
    <rect x="20" y="40" width="70" height="90" fill="#fff" stroke="#bdc3c7" stroke-dasharray="2,2" rx="2" transform="rotate(-10 50,80)"/>
    <text x="50" y="70" font-family="Arial" font-size="10" fill="#3498db" text-anchor="middle" transform="rotate(-10 50,80)">가구(의자)</text>
    <text x="50" y="90" font-family="Arial" font-size="10" fill="#e74c3c" text-anchor="middle" transform="rotate(-10 50,80)">P: -$50</text>

    <rect x="80" y="100" width="70" height="90" fill="#fff" stroke="#bdc3c7" stroke-dasharray="2,2" rx="2" transform="rotate(15 110,140)"/>
    <text x="115" y="130" font-family="Arial" font-size="10" fill="#27ae60" text-anchor="middle" transform="rotate(15 110,140)">가구(책상)</text>
    <text x="115" y="150" font-family="Arial" font-size="10" fill="#e74c3c" text-anchor="middle" transform="rotate(15 110,140)">P: -$100</text>
    
    <rect x="130" y="30" width="70" height="90" fill="#fff" stroke="#bdc3c7" stroke-dasharray="2,2" rx="2" transform="rotate(5 160,70)"/>
    <text x="165" y="60" font-family="Arial" font-size="10" fill="#8e44ad" text-anchor="middle" transform="rotate(5 160,70)">전자기기</text>
    <text x="165" y="80" font-family="Arial" font-size="10" fill="#27ae60" text-anchor="middle" transform="rotate(5 160,70)">P: +$200</text>
    
    <rect x="10" y="150" width="70" height="90" fill="#fff" stroke="#bdc3c7" stroke-dasharray="2,2" rx="2" transform="rotate(-5 40,190)"/>
    <text x="45" y="180" font-family="Arial" font-size="10" fill="#8e44ad" text-anchor="middle" transform="rotate(-5 40,190)">전자기기</text>
    <text x="45" y="200" font-family="Arial" font-size="10" fill="#27ae60" text-anchor="middle" transform="rotate(-5 40,190)">P: +$150</text>
    
    <text x="100" y="250" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">"나무만 보여서 숲을 볼 수 없음"</text>
  </g>

  <!-- Groupby Mechanism -->
  <g transform="translate(300, 160)">
    <path d="M0,20 L80,20 M70,10 L80,20 L70,30" fill="none" stroke="#3498db" stroke-width="5"/>
    <text x="40" y="-10" font-family="Courier" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">groupby()</text>
    <text x="40" y="10" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">+ sum()</text>
  </g>

  <!-- Grouped Summary -->
  <g transform="translate(420, 100)">
    <rect width="320" height="200" fill="#fff" stroke="#3498db" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="320" height="40" fill="#3498db" rx="5"/>
    <text x="160" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">카테고리별 요약 통계 (숲을 보다)</text>

    <!-- Table Header -->
    <text x="60" y="70" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">Category</text>
    <text x="170" y="70" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">Total Sales</text>
    <text x="270" y="70" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">Total Profit</text>
    <line x1="10" y1="80" x2="310" y2="80" stroke="#bdc3c7" stroke-width="2"/>

    <!-- Row 1: Furniture -->
    <rect x="10" y="90" width="300" height="30" fill="#fdedec" rx="3"/>
    <text x="60" y="110" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">Furniture</text>
    <text x="170" y="110" font-family="Courier" font-size="14" fill="#2c3e50" text-anchor="middle">$741,999</text>
    <text x="270" y="110" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">-$17,725</text> <!-- Red / Negative -->

    <!-- Row 2: Office Supplies -->
    <text x="60" y="150" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">Office Sup</text>
    <text x="170" y="150" font-family="Courier" font-size="14" fill="#2c3e50" text-anchor="middle">$719,047</text>
    <text x="270" y="150" font-family="Courier" font-size="14" fill="#27ae60" text-anchor="middle">+$122,490</text>

    <!-- Row 3: Technology -->
    <text x="60" y="190" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="middle">Technology</text>
    <text x="170" y="190" font-family="Courier" font-size="14" fill="#2c3e50" text-anchor="middle">$836,154</text>
    <text x="270" y="190" font-family="Courier" font-size="14" fill="#27ae60" font-weight="bold" text-anchor="middle">+$145,454</text>

    <path d="M120,95 L40,60" fill="none" stroke="#c0392b" stroke-width="2"/>
    <text x="10" y="55" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold">적자 부서 발견!</text>

  </g>

</svg>
