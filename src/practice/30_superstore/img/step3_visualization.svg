<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 매출(Sales) vs 이익(Profit) 산점도 (미끼상품 발굴)</text>

  <!-- Scatterplot Concept -->
  <g transform="translate(100, 60)">
    <rect width="600" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="300" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">개별 결제 건의 Sales(X축)와 Profit(Y축) 상관관계</text>
    
    <!-- Axes (Y crosses 0 at the middle) -->
    <line x1="50" y1="260" x2="550" y2="260" stroke="#7f8c8d" stroke-width="2"/> <!-- X axis -->
    <line x1="50" y1="260" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/> <!-- Y axis -->
    
    <!-- The Critical Y=0 Break-even Line -->
    <line x1="50" y1="160" x2="550" y2="160" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="30" y="165" font-family="Courier" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">$0</text>
    
    <text x="300" y="290" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Sales (매출액)</text>
    <text x="20" y="150" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,150)">Profit (순이익)</text>
    
    <!-- Quadrants -->
    <text x="150" y="80" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold" opacity="0.3">안정적 수익 (정상)</text>
    <text x="450" y="80" font-family="Arial" font-size="14" fill="#27ae60" font-weight="bold" opacity="0.3">고수익 효자상품</text>
    <text x="150" y="240" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" opacity="0.3">잡다한 적자</text>
    <text x="450" y="240" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" opacity="0.7">팔수록 손해나는 골칫거리</text>
    <text x="450" y="255" font-family="Arial" font-size="12" fill="#c0392b" opacity="0.7">(미끼 상품, 과도한 할인)</text>

    <!-- Data Points (Scatter) -->
    <!-- Normal profitable sales -->
    <circle cx="100" cy="140" r="3" fill="#3498db" opacity="0.6"/>
    <circle cx="120" cy="120" r="3" fill="#3498db" opacity="0.6"/>
    <circle cx="150" cy="130" r="3" fill="#3498db" opacity="0.6"/>
    <circle cx="180" cy="110" r="3" fill="#3498db" opacity="0.6"/>
    <circle cx="200" cy="100" r="3" fill="#3498db" opacity="0.6"/>
    <circle cx="250" cy="90" r="3" fill="#3498db" opacity="0.6"/>
    <circle cx="300" cy="80" r="3" fill="#3498db" opacity="0.6"/>
    <circle cx="350" cy="60" r="3" fill="#3498db" opacity="0.6"/>
    <circle cx="400" cy="70" r="3" fill="#3498db" opacity="0.6"/>
    
    <!-- Small losses -->
    <circle cx="100" cy="170" r="3" fill="#e67e22" opacity="0.6"/>
    <circle cx="130" cy="180" r="3" fill="#e67e22" opacity="0.6"/>
    <circle cx="150" cy="190" r="3" fill="#e67e22" opacity="0.6"/>

    <!-- High Sales, Negative Profit (Loss Leaders, mostly Furniture) -->
    <!-- Furniture is orange/red -->
    <circle cx="200" cy="200" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="250" cy="210" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="300" cy="220" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="350" cy="230" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="400" cy="250" r="5" fill="#c0392b" opacity="0.9"/> <!-- Giant loss -->
    <circle cx="450" cy="240" r="5" fill="#c0392b" opacity="0.9"/>
    
    <!-- Highlight Arrow -->
    <path d="M250,210 Q350,260 400,250" fill="none" stroke="#2c3e50" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="300" y="250" font-family="Arial" font-size="11" fill="#2c3e50" font-weight="bold" text-anchor="middle">매출이 커질수록 적자 폭이 더 커짐(기이한 현상)</text>

  </g>
</svg>
