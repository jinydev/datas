<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 음(-)의 상관관계 (Negative Correlation)와 군집화</text>

  <!-- Scatterplot + Regression -->
  <g transform="translate(150, 80)">
    <rect width="500" height="280" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">차량 무게(Weight)가 연비(MPG)에 미치는 파괴적 영향</text>
    
    <line x1="50" y1="230" x2="450" y2="230" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="230" x2="50" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="265" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Weight (차량 무게)</text>
    <text x="20" y="145" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,145)">MPG (연비)</text>

    <!-- General Downward Trend Line -->
    <path d="M70,70 L430,200" fill="none" stroke="#e74c3c" stroke-width="4"/>
    <text x="350" y="170" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold">강한 우하향 (음의 상관관계)</text>
    
    <!-- Japan (Light, High MPG) - Green -->
    <circle cx="100" cy="80" r="4" fill="#2ecc71" opacity="0.8"/>
    <circle cx="120" cy="70" r="4" fill="#2ecc71" opacity="0.8"/>
    <circle cx="90" cy="100" r="4" fill="#2ecc71" opacity="0.8"/>
    <circle cx="140" cy="90" r="4" fill="#2ecc71" opacity="0.8"/>
    <circle cx="110" cy="110" r="4" fill="#2ecc71" opacity="0.8"/>
    <text x="110" y="55" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold">가볍고 연비 좋은 일본차</text>

    <!-- Europe (Mid, Mid) - Orange -->
    <circle cx="200" cy="130" r="4" fill="#f39c12" opacity="0.8"/>
    <circle cx="220" cy="120" r="4" fill="#f39c12" opacity="0.8"/>
    <circle cx="240" cy="140" r="4" fill="#f39c12" opacity="0.8"/>
    <circle cx="210" cy="150" r="4" fill="#f39c12" opacity="0.8"/>
    <circle cx="250" cy="110" r="4" fill="#f39c12" opacity="0.8"/>

    <!-- USA (Heavy, Low MPG) - Red -->
    <circle cx="350" cy="180" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="380" cy="190" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="400" cy="170" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="370" cy="200" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="420" cy="180" r="4" fill="#e74c3c" opacity="0.8"/>
    <circle cx="390" cy="210" r="4" fill="#e74c3c" opacity="0.8"/>
    <text x="380" y="230" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">크고 무겁고 기름 많이 먹는 미국차</text>

  </g>
</svg>