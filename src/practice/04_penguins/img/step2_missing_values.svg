<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 소수의 결측치(NaN) 처리 - 행 완전 삭제 (dropna)</text>

  <!-- Problem -->
  <g transform="translate(100, 100)">
    <rect width="200" height="200" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="100" y="30" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">결측치 확인 (isnull)</text>
    
    <text x="20" y="70" font-family="Courier" font-size="12" fill="#2c3e50">Total Rows: 344</text>
    
    <line x1="20" y1="80" x2="180" y2="80" stroke="#bdc3c7"/>

    <text x="20" y="110" font-family="Courier" font-size="12" fill="#e74c3c" font-weight="bold">sex         : 11 (NaN)</text>
    <text x="20" y="130" font-family="Courier" font-size="12" fill="#e74c3c" font-weight="bold">bill_length :  2 (NaN)</text>
    <text x="20" y="150" font-family="Courier" font-size="12" fill="#34495e">island      :  0</text>
    <text x="20" y="170" font-family="Courier" font-size="12" fill="#34495e">species     :  0</text>

    <text x="100" y="220" font-family="Arial" font-size="12" fill="#c0392b" text-anchor="middle">전체 데이터 대비 매우 적은 비율(3%)</text>
  </g>

  <!-- Transformation -->
  <g transform="translate(340, 170)">
    <path d="M0,0 L50,0 L40,-10 M50,0 L40,10" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="25" y="-20" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">df.dropna()</text>
  </g>

  <!-- Solution -->
  <g transform="translate(450, 100)">
    <rect width="250" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="125" y="30" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">전략: 오염된 행 전체 삭제</text>
    
    <!-- Table representation -->
    <rect x="20" y="60" width="210" height="20" fill="#ecf0f1"/>
    <text x="30" y="75" font-family="Courier" font-size="12" fill="#34495e">Row 1: Adelie | Male | 39.1</text>
    
    <!-- Deleted Row -->
    <rect x="20" y="90" width="210" height="20" fill="#fdedec"/>
    <line x1="20" y1="100" x2="230" y2="100" stroke="#c0392b" stroke-width="2"/>
    <text x="30" y="105" font-family="Courier" font-size="12" fill="#c0392b">Row 2: Adelie | NaN  | 39.5</text>
    
    <rect x="20" y="120" width="210" height="20" fill="#ecf0f1"/>
    <text x="30" y="135" font-family="Courier" font-size="12" fill="#34495e">Row 3: Gentoo | Fema | 45.2</text>

    <text x="125" y="170" font-family="Arial" font-size="14" fill="#2c3e50" font-weight="bold" text-anchor="middle">남은 데이터: 333행 (Clean)</text>
    <text x="125" y="190" font-family="Arial" font-size="11" fill="#7f8c8d" text-anchor="middle">"결측치가 적을 땐, 억지로 채우기보단 버린다!"</text>
  </g>

</svg>