<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 롱 폼(Long-form) 데이터 구조의 이해</text>

  <!-- Problem (Messy MultiIndex) -->
  <g transform="translate(100, 100)">
    
    <!-- Table representation -->
    <rect x="0" y="0" width="250" height="200" fill="#fff" stroke="#34495e" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="250" height="40" fill="#34495e" rx="5"/>
    <rect x="0" y="20" width="250" height="20" fill="#34495e"/>
    
    <text x="20" y="25" font-family="Courier" font-size="12" fill="#fff" font-weight="bold">Year | Country | Spending</text>
    <line x1="0" y1="40" x2="250" y2="40" stroke="#2c3e50"/>

    <text x="20" y="65" font-family="Courier" font-size="12" fill="#7f8c8d">1970 | USA     | 326</text>
    <text x="20" y="85" font-family="Courier" font-size="12" fill="#7f8c8d">1970 | Germany | 252</text>
    <text x="20" y="105" font-family="Courier" font-size="12" fill="#7f8c8d">1970 | Japan   | 150</text>
    <line x1="10" y1="115" x2="240" y2="115" stroke="#bdc3c7" stroke-dasharray="2,2"/>
    
    <text x="20" y="135" font-family="Courier" font-size="12" fill="#e74c3c" font-weight="bold">1971 | USA     | 357</text>
    <text x="20" y="155" font-family="Courier" font-size="12" fill="#7f8c8d">1971 | Germany | 298</text>
    <text x="20" y="175" font-family="Courier" font-size="12" fill="#7f8c8d">1971 | Japan   | 163</text>

    <!-- Arrow -->
    <path d="M270,100 L320,100 L310,90 M320,100 L310,110" fill="none" stroke="#2980b9" stroke-width="4"/>
    <text x="295" y="85" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold" text-anchor="middle">hue='Country'</text>

    <!-- Solution (Wide form visualization) -->
    <rect x="350" y="0" width="350" height="200" fill="#eaf2f8" stroke="#2980b9" stroke-width="2" rx="5"/>
    
    <text x="525" y="30" font-family="Arial" font-size="16" fill="#2c3e50" font-weight="bold" text-anchor="middle">Seaborn의 내부 마법 (자동 그룹화)</text>
    
    <line x1="380" y1="160" x2="660" y2="160" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="380" y1="160" x2="380" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="640" y="180" font-family="Courier" font-size="12" fill="#7f8c8d">Year</text>
    <text x="360" y="70" font-family="Courier" font-size="12" fill="#7f8c8d">$$</text>

    <!-- USA Line -->
    <path d="M380,140 L450,100 L550,50 L650,20" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <text x="660" y="25" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">USA</text>

    <!-- Germany Line -->
    <path d="M380,145 L450,110 L550,80 L650,60" fill="none" stroke="#2980b9" stroke-width="3"/>
    <text x="660" y="65" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">Germany</text>

    <!-- Japan Line -->
    <path d="M380,150 L450,130 L550,110 L650,90" fill="none" stroke="#27ae60" stroke-width="3"/>
    <text x="660" y="95" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold">Japan</text>

  </g>
  
  <text x="400" y="350" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">"Long-form 데이터는 사람이 보기엔 불편하지만, 컴퓨터가 그리기엔 최적화된 형태다!"</text>
</svg>
