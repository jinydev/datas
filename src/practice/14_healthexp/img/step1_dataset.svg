<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 국가별 의료비 지출과 기대수명(HealthExp) 데이터</text>

  <!-- Health &amp; Money Metaphor -->
  <g transform="translate(150, 100)">
    
    <!-- Time Concept -->
    <path d="M50,160 L450,160" fill="none" stroke="#7f8c8d" stroke-width="4" stroke-dasharray="8,4"/>
    <text x="50" y="180" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">1970 (과거)</text>
    <text x="450" y="180" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">2020 (현재)</text>
    <polygon points="460,160 445,150 445,170" fill="#7f8c8d"/>

    <!-- Spending (Money) -->
    <g transform="translate(100, 30)">
      <circle cx="50" cy="50" r="40" fill="#f1c40f" stroke="#f39c12" stroke-width="4"/>
      <text x="50" y="65" font-family="Arial" font-size="40" fill="#d35400" font-weight="bold" text-anchor="middle">$</text>
      <text x="50" y="110" font-family="Courier" font-size="14" fill="#d35400" font-weight="bold" text-anchor="middle">Spending_USD</text>
      <text x="50" y="125" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">(의료비 지출)</text>
    </g>

    <!-- vs -->
    <text x="250" y="90" font-family="Arial" font-size="24" fill="#2c3e50" font-weight="bold" text-anchor="middle">VS</text>

    <!-- Life Expectancy (Health) -->
    <g transform="translate(300, 30)">
      <path d="M50,30 A20,20 0 0,0 10,30 A20,20 0 0,0 50,70 A20,20 0 0,0 90,30 A20,20 0 0,0 50,30 Z" fill="#e74c3c"/>
      <path d="M50,70 L50,90 M30,50 L70,50" stroke="#fff" stroke-width="6"/> <!-- Cross -->
      <text x="50" y="110" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">Life_Expectancy</text>
      <text x="50" y="125" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">(기대수명)</text>
    </g>

    <!-- Question -->
    <rect x="70" y="220" width="360" height="40" fill="#eaf2f8" rx="5"/>
    <text x="250" y="245" font-family="Arial" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">"돈을 많이 쓸수록 과연 더 오래 살 수 있을까?"</text>
    
  </g>
</svg>
