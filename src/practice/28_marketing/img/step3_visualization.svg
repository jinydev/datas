<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 통화 시간(Duration)과 가입 성공의 법칙 (Boxplot)</text>

  <!-- Boxplot construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">가입 여부(Deposit)에 따른 통화 시간 분포</text>
    
    <!-- Axes -->
    <line x1="50" y1="260" x2="450" y2="260" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="260" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="290" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Deposit (예금 가입 여부)</text>
    <text x="20" y="155" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,155)">Duration (통화 시간, 초)</text>
    
    <!-- X-axis Labels -->
    <text x="150" y="275" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">No (거절)</text>
    <text x="350" y="275" font-family="Arial" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">Yes (가입)</text>

    <!-- No Box (Very low, short duration) -->
    <rect x="110" y="200" width="80" height="40" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
    <line x1="110" y1="230" x2="190" y2="230" stroke="#c0392b" stroke-width="3"/> <!-- Median -->
    <!-- Whiskers -->
    <line x1="150" y1="200" x2="150" y2="160" stroke="#e74c3c" stroke-width="2"/>
    <line x1="130" y1="160" x2="170" y2="160" stroke="#e74c3c" stroke-width="2"/>
    <line x1="150" y1="240" x2="150" y2="250" stroke="#e74c3c" stroke-width="2"/>
    <line x1="130" y1="250" x2="170" y2="250" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Outliers for No (some talked long but didn't buy) -->
    <circle cx="150" cy="140" r="3" fill="#e74c3c" opacity="0.5"/>
    <circle cx="150" cy="120" r="3" fill="#e74c3c" opacity="0.5"/>

    <!-- Yes Box (Very tall, long duration) -->
    <rect x="310" y="80" width="80" height="120" fill="#eaf2f8" stroke="#3498db" stroke-width="2"/>
    <line x1="310" y1="140" x2="390" y2="140" stroke="#2980b9" stroke-width="3"/> <!-- Median -->
    <!-- Whiskers -->
    <line x1="350" y1="80" x2="350" y2="40" stroke="#3498db" stroke-width="2"/>
    <line x1="330" y1="40" x2="370" y2="40" stroke="#3498db" stroke-width="2"/>
    <line x1="350" y1="200" x2="350" y2="250" stroke="#3498db" stroke-width="2"/>
    <line x1="330" y1="250" x2="370" y2="250" stroke="#3498db" stroke-width="2"/>
    
    <!-- Annotations -->
    <path d="M190,230 L230,230 M280,140 L310,140" fill="none" stroke="#7f8c8d" stroke-dasharray="2,2"/>
    <text x="250" y="180" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">평균 통화 시간의 극단적 차이</text>

    <!-- Chat Bubbles -->
    <path d="M100,170 C80,170 80,130 100,130 C130,130 130,150 110,170" fill="#fff" stroke="#c0392b"/>
    <text x="105" y="145" font-family="Arial" font-size="9" fill="#c0392b">"안 사요. 뚝."</text>

    <path d="M400,90 C430,90 430,50 400,50 C370,50 370,70 390,90" fill="#fff" stroke="#2980b9"/>
    <text x="400" y="65" font-family="Arial" font-size="9" fill="#2980b9">"오, 이자율이요?"</text>

  </g>
</svg>
