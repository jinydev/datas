<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 직업(Job)과 잔고(Balance)의 관계 (Stripplot)</text>

  <!-- Stripplot Concept -->
  <g transform="translate(100, 60)">
    <rect width="600" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="300" y="30" font-family="Arial" font-size="14" fill="#34495e" font-weight="bold" text-anchor="middle">실제 데이터 점(Dot)들을 하나하나 흩뿌려주는 Stripplot</text>
    
    <!-- Axes -->
    <line x1="50" y1="250" x2="550" y2="250" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="250" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Y=0 Line (Debt / Bankruptcy) -->
    <line x1="50" y1="200" x2="550" y2="200" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="30" y="205" font-family="Courier" font-size="12" fill="#c0392b" text-anchor="middle">$0</text>
    <rect x="560" y="190" width="30" height="20" fill="#fdedec" rx="3"/>
    <text x="575" y="204" font-family="Arial" font-size="10" fill="#c0392b" text-anchor="middle">빚</text>

    <text x="300" y="290" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Job (직업군)</text>
    <text x="20" y="150" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,150)">Balance (통장 잔고)</text>

    <!-- Categories -->
    <text x="130" y="270" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">management</text>
    <text x="260" y="270" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">blue-collar</text>
    <text x="390" y="270" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">student</text>
    <text x="490" y="270" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">retired</text>

    <!-- Data Points (Stripplot effect: Jittered horizontally, exact vertically) -->
    
    <!-- Management (Rich, high spread) -->
    <g fill="#3498db" opacity="0.6">
      <circle cx="120" cy="80" r="4"/>
      <circle cx="140" cy="60" r="4"/> <!-- Ultra rich -->
      <circle cx="110" cy="100" r="4"/>
      <circle cx="130" cy="110" r="4"/>
      <circle cx="125" cy="130" r="4"/>
      <circle cx="140" cy="150" r="4"/>
      <circle cx="120" cy="160" r="4"/>
      <circle cx="130" cy="170" r="4"/>
      <circle cx="115" cy="190" r="4"/>
      <circle cx="135" cy="180" r="4"/>
      <!-- Debt -->
      <circle cx="120" cy="210" r="4"/>
    </g>

    <!-- Blue-collar (Concentrated near 0) -->
    <g fill="#27ae60" opacity="0.6">
      <circle cx="260" cy="140" r="4"/>
      <circle cx="250" cy="160" r="4"/>
      <circle cx="270" cy="170" r="4"/>
      <circle cx="240" cy="180" r="4"/>
      <circle cx="260" cy="190" r="4"/>
      <circle cx="280" cy="185" r="4"/>
      <circle cx="250" cy="195" r="4"/>
      <circle cx="270" cy="190" r="4"/>
      <!-- Debt -->
      <circle cx="250" cy="210" r="4"/>
      <circle cx="270" cy="220" r="4"/>
      <circle cx="260" cy="215" r="4"/>
    </g>

    <!-- Student (Low balance, tight) -->
    <g fill="#9b59b6" opacity="0.6">
      <circle cx="380" cy="170" r="4"/>
      <circle cx="400" cy="180" r="4"/>
      <circle cx="390" cy="175" r="4"/>
      <circle cx="385" cy="190" r="4"/>
      <circle cx="395" cy="185" r="4"/>
      <!-- Zero debt usually -->
    </g>

    <!-- Retired (Moderate to high wealth) -->
    <g fill="#e67e22" opacity="0.6">
      <circle cx="480" cy="90" r="4"/>
      <circle cx="500" cy="110" r="4"/>
      <circle cx="490" cy="100" r="4"/>
      <circle cx="485" cy="130" r="4"/>
      <circle cx="495" cy="140" r="4"/>
      <circle cx="480" cy="160" r="4"/>
      <circle cx="500" cy="170" r="4"/>
    </g>

    <!-- Highlight -->
    <path d="M220,110 Q280,40 370,110" fill="none" stroke="#2c3e50" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="300" y="80" font-family="Arial" font-size="11" fill="#34495e" font-weight="bold" text-anchor="middle">Boxplot은 이 점들을 상자(Box)로 가려버림</text>

  </g>
</svg>
