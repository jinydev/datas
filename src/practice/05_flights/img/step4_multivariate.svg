<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 다차원 온도계 차트 (Heatmap)</text>

  <!-- Heatmap Concept -->
  <g transform="translate(150, 80)">
    <rect width="500" height="280" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#3498db" font-weight="bold" text-anchor="middle">색상 농도로 읽는 입체적 수요 지도</text>
    
    <line x1="50" y1="230" x2="450" y2="230" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="50" y1="230" x2="50" y2="60" stroke="#7f8c8d" stroke-width="1"/>
    
    <text x="250" y="265" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Year (연도: 과거 ➡ 미래)</text>
    <text x="20" y="145" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,145)">Month (월별)</text>

    <!-- Heatmap Grid -->
    <g transform="translate(60, 60)">
      <!-- Row 1: Jan -->
      <rect x="0" y="0" width="40" height="30" fill="#eaf2f8"/>
      <rect x="40" y="0" width="40" height="30" fill="#d4e6f1"/>
      <rect x="80" y="0" width="40" height="30" fill="#a9cce3"/>
      <rect x="120" y="0" width="40" height="30" fill="#7fb3d5"/>
      <rect x="160" y="0" width="40" height="30" fill="#5499c7"/>
      <rect x="200" y="0" width="40" height="30" fill="#2980b9"/>
      <text x="-10" y="20" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="end">Jan</text>
      
      <!-- Row 2: Jul (Summer Peak) -->
      <rect x="0" y="60" width="40" height="30" fill="#7fb3d5"/>
      <rect x="40" y="60" width="40" height="30" fill="#5499c7"/>
      <rect x="80" y="60" width="40" height="30" fill="#2980b9"/>
      <rect x="120" y="60" width="40" height="30" fill="#2471a3"/>
      <rect x="160" y="60" width="40" height="30" fill="#1f618d"/>
      <rect x="200" y="60" width="40" height="30" fill="#154360"/>
      <text x="-10" y="80" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="end">Jul</text>

      <!-- Row 3: Nov (Winter Low) -->
      <rect x="0" y="120" width="40" height="30" fill="#ebf5fb"/>
      <rect x="40" y="120" width="40" height="30" fill="#eaf2f8"/>
      <rect x="80" y="120" width="40" height="30" fill="#d4e6f1"/>
      <rect x="120" y="120" width="40" height="30" fill="#a9cce3"/>
      <rect x="160" y="120" width="40" height="30" fill="#7fb3d5"/>
      <rect x="200" y="120" width="40" height="30" fill="#5499c7"/>
      <text x="-10" y="140" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="end">Nov</text>
      
      <!-- Grid lines -->
      <line x1="0" y1="0" x2="240" y2="0" stroke="#fff" stroke-width="2"/>
      <line x1="0" y1="30" x2="240" y2="30" stroke="#fff" stroke-width="2"/>
      <line x1="0" y1="60" x2="240" y2="60" stroke="#fff" stroke-width="2"/>
      <line x1="0" y1="90" x2="240" y2="90" stroke="#fff" stroke-width="2"/>
      <line x1="0" y1="120" x2="240" y2="120" stroke="#fff" stroke-width="2"/>
      <line x1="0" y1="150" x2="240" y2="150" stroke="#fff" stroke-width="2"/>
    </g>

    <!-- Annotations -->
    <text x="370" y="80" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold">우측으로 갈수록 짙어짐</text>
    <text x="370" y="95" font-family="Arial" font-size="10" fill="#7f8c8d">(연도별 추세 반영)</text>

    <text x="370" y="130" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">여름 줄무늬가 유독 짙음</text>
    <text x="370" y="145" font-family="Arial" font-size="10" fill="#7f8c8d">(여름 휴가철 계절성 반영)</text>

    <!-- Colorbar -->
    <rect x="360" y="210" width="100" height="10" fill="url(#grad1)"/>
    <text x="360" y="235" font-family="Arial" font-size="10" fill="#7f8c8d">적음(밝음)</text>
    <text x="440" y="235" font-family="Arial" font-size="10" fill="#7f8c8d">많음(어두움)</text>

    <defs>
      <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#ebf5fb;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#154360;stop-opacity:1" />
      </linearGradient>
    </defs>

  </g>
</svg>