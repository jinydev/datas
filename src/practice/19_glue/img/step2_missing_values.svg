<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: Pivot()을 활용한 데이터 2차원 재배치</text>

  <!-- Long Form -->
  <g transform="translate(50, 100)">
    <rect width="260" height="200" fill="#fff" stroke="#34495e" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="260" height="30" fill="#34495e" rx="5"/>
    <rect x="0" y="15" width="260" height="15" fill="#34495e"/>
    
    <text x="130" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">현재 데이터 (Long-form)</text>
    
    <text x="20" y="55" font-family="Courier" font-size="12" fill="#2980b9" font-weight="bold">Model | Task | Score</text>
    <line x1="10" y1="65" x2="250" y2="65" stroke="#bdc3c7"/>
    
    <!-- Rows -->
    <text x="20" y="90" font-family="Courier" font-size="12" fill="#34495e">BERT  | <tspan fill="#e67e22" font-weight="bold">SST-2</tspan>| 92.7</text>
    <text x="20" y="115" font-family="Courier" font-size="12" fill="#34495e">BERT  | <tspan fill="#27ae60" font-weight="bold">MNLI </tspan>| 84.4</text>
    <text x="20" y="140" font-family="Courier" font-size="12" fill="#34495e">ERNIE | <tspan fill="#e67e22" font-weight="bold">SST-2</tspan>| 94.5</text>
    <text x="20" y="165" font-family="Courier" font-size="12" fill="#34495e">ERNIE | <tspan fill="#27ae60" font-weight="bold">MNLI </tspan>| 88.3</text>
    
    <text x="130" y="240" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">행(Row)으로 쭉 늘어져 있어 한눈에 안 들어옴</text>
  </g>

  <!-- Transformation Arrow -->
  <g transform="translate(340, 180)">
    <path d="M0,0 L60,0 M50,-10 L60,0 L50,10" fill="none" stroke="#2980b9" stroke-width="4"/>
    <text x="30" y="-15" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="middle">df.pivot()</text>
  </g>

  <!-- Wide Form (Pivot Table) -->
  <g transform="translate(430, 100)">
    <rect width="320" height="150" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <rect x="0" y="0" width="320" height="30" fill="#27ae60" rx="5"/>
    <rect x="0" y="15" width="320" height="15" fill="#27ae60"/>
    
    <text x="160" y="20" font-family="Arial" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">피벗 테이블 (Wide-form)</text>
    
    <text x="20" y="55" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold">Model \ Task | <tspan fill="#e67e22">SST-2</tspan> | <tspan fill="#27ae60">MNLI</tspan></text>
    <line x1="10" y1="65" x2="310" y2="65" stroke="#bdc3c7"/>
    
    <!-- Rows -->
    <text x="20" y="90" font-family="Courier" font-size="12" fill="#34495e">BERT         |  92.7  | 84.4</text>
    <text x="20" y="115" font-family="Courier" font-size="12" fill="#34495e">ERNIE        |  94.5  | 88.3</text>
    
    <!-- Arrow mapping -->
    <path d="M-80,60 Q-40,110 50,110" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,4"/>
    
    <text x="160" y="190" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">모델별/과제별 점수가 격자(Grid) 형태로 완성됨!</text>
    <text x="160" y="210" font-family="Arial" font-size="12" fill="#27ae60" font-weight="bold" text-anchor="middle">-> 이 형태가 되어야 Heatmap을 그릴 수 있다.</text>
  </g>

</svg>
