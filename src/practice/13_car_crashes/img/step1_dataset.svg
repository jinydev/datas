<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 1: 미국 주별 교통사고(Car Crashes) 데이터의 구조</text>

  <!-- Crash Metaphor -->
  <g transform="translate(100, 100)">
    <!-- Car 1 (Speeding/Alcohol) -->
    <path d="M40,140 Q20,140 20,120 L20,90 Q20,70 40,70 L80,70 L110,40 L180,40 L210,70 L240,70 Q250,70 250,80 L230,140 Z" fill="#e74c3c"/>
    <circle cx="70" cy="140" r="20" fill="#34495e"/>
    <circle cx="200" cy="140" r="20" fill="#34495e"/>
    <!-- Damage effect -->
    <path d="M230,70 L260,60 L240,90 L270,100 L240,120 L260,140" fill="none" stroke="#f1c40f" stroke-width="3"/>
    
    <!-- Alcohol bottle -->
    <path d="M120,60 L120,40 L130,40 L130,60 L140,70 L140,90 L110,90 L110,70 Z" fill="#2ecc71" opacity="0.8"/>
    <text x="125" y="110" font-family="Arial" font-size="10" fill="#fff" font-weight="bold" text-anchor="middle">음주</text>

    <!-- Speed lines -->
    <line x1="0" y1="100" x2="30" y2="100" stroke="#7f8c8d" stroke-width="3"/>
    <line x1="-10" y1="120" x2="20" y2="120" stroke="#7f8c8d" stroke-width="3"/>
    <line x1="-20" y1="80" x2="10" y2="80" stroke="#7f8c8d" stroke-width="3"/>
    <text x="0" y="70" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">과속 (Speeding)</text>

    <text x="140" y="190" font-family="Arial" font-size="16" fill="#c0392b" font-weight="bold" text-anchor="middle">10억 마일당 교통사고 사망자 수 (Total)</text>
  </g>

  <!-- Money/Insurance Metaphor -->
  <g transform="translate(480, 80)">
    <rect width="280" height="260" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="10"/>
    <rect x="0" y="0" width="280" height="40" fill="#2980b9" rx="10"/>
    <rect x="0" y="20" width="280" height="20" fill="#2980b9"/>
    <text x="140" y="25" font-family="Arial" font-size="16" fill="#fff" font-weight="bold" text-anchor="middle">데이터셋 주요 Features</text>
    
    <!-- Text list -->
    <rect x="20" y="60" width="240" height="180" fill="#eaf2f8" rx="5"/>
    
    <text x="30" y="90" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold">• total</text>
    <text x="120" y="90" font-family="Arial" font-size="12" fill="#34495e">: 전체 사망자 수 (Target)</text>

    <text x="30" y="120" font-family="Courier" font-size="14" fill="#2c3e50" font-weight="bold">• speeding</text>
    <text x="120" y="120" font-family="Arial" font-size="12" fill="#34495e">: 과속 비율</text>

    <text x="30" y="150" font-family="Courier" font-size="14" fill="#27ae60" font-weight="bold">• alcohol</text>
    <text x="120" y="150" font-family="Arial" font-size="12" fill="#34495e">: 음주운전 비율</text>
    
    <text x="30" y="180" font-family="Courier" font-size="14" fill="#8e44ad" font-weight="bold">• ins_premium</text>
    <text x="140" y="180" font-family="Arial" font-size="12" fill="#34495e">: 자동차 보험료</text>

    <text x="30" y="210" font-family="Courier" font-size="14" fill="#3498db" font-weight="bold">• abbrev</text>
    <text x="120" y="210" font-family="Arial" font-size="12" fill="#34495e">: 주 이름 (NY, CA 등)</text>
  </g>

</svg>