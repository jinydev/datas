<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 회귀선(Regression Line)으로 인과관계 증명하기</text>

  <!-- lmplot construction -->
  <g transform="translate(150, 70)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">음주운전(Alcohol)과 총 사망자 수(Total)의 상관관계</text>
    
    <!-- Axes -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="250" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="285" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Alcohol (음주운전 비율)</text>
    <text x="20" y="150" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,150)">Total (사망자 수)</text>

    <!-- Regression Line and Confidence Interval -->
    <path d="M50,220 L450,80" fill="none" stroke="#c0392b" stroke-width="4"/>
    <path d="M50,200 L450,50 L450,110 L50,240 Z" fill="#e74c3c" opacity="0.2"/>

    <!-- Scatter points (States) -->
    <!-- Low alc, low crash -->
    <circle cx="80" cy="210" r="5" fill="#2c3e50" opacity="0.7"/><text x="80" y="195" font-family="Courier" font-size="10" fill="#7f8c8d">DC</text>
    <circle cx="120" cy="190" r="5" fill="#2c3e50" opacity="0.7"/><text x="120" y="175" font-family="Courier" font-size="10" fill="#7f8c8d">MA</text>
    <circle cx="150" cy="200" r="5" fill="#2c3e50" opacity="0.7"/>
    
    <!-- Mid alc, mid crash -->
    <circle cx="200" cy="170" r="5" fill="#2c3e50" opacity="0.7"/><text x="200" y="155" font-family="Courier" font-size="10" fill="#7f8c8d">CA</text>
    <circle cx="250" cy="150" r="5" fill="#2c3e50" opacity="0.7"/><text x="250" y="135" font-family="Courier" font-size="10" fill="#7f8c8d">TX</text>
    <circle cx="280" cy="160" r="5" fill="#2c3e50" opacity="0.7"/>

    <!-- High alc, high crash -->
    <circle cx="350" cy="110" r="5" fill="#2c3e50" opacity="0.7"/>
    <circle cx="400" cy="80" r="5" fill="#2c3e50" opacity="0.7"/><text x="400" y="65" font-family="Courier" font-size="10" fill="#c0392b" font-weight="bold">ND</text>
    <circle cx="420" cy="100" r="5" fill="#2c3e50" opacity="0.7"/><text x="420" y="85" font-family="Courier" font-size="10" fill="#c0392b" font-weight="bold">SC</text>

    <!-- Callout Box -->
    <rect x="280" y="180" width="180" height="60" fill="#fdedec" stroke="#c0392b" rx="5"/>
    <text x="370" y="200" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">음주운전 비율이 높아질수록</text>
    <text x="370" y="215" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">사망자 수가 정직하게 폭증하는</text>
    <text x="370" y="230" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">강력한 양(+)의 상관관계</text>

  </g>
</svg>