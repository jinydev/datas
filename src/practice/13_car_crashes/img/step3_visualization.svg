<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 다변수 탐색의 끝판왕, 페어플롯 (Pairplot)</text>

  <!-- Pairplot matrix construction -->
  <g transform="translate(200, 70)">
    <rect width="400" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="200" y="25" font-family="Arial" font-size="16" fill="#8e44ad" font-weight="bold" text-anchor="middle">여러 변수 간의 짝(Pair)을 한 번에 스캔하기</text>

    <!-- Grid lines -->
    <line x1="50" y1="40" x2="350" y2="40" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="50" y1="120" x2="350" y2="120" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="50" y1="200" x2="350" y2="200" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="50" y1="280" x2="350" y2="280" stroke="#bdc3c7" stroke-width="1"/>

    <line x1="50" y1="40" x2="50" y2="280" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="150" y1="40" x2="150" y2="280" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="250" y1="40" x2="250" y2="280" stroke="#bdc3c7" stroke-width="1"/>
    <line x1="350" y1="40" x2="350" y2="280" stroke="#bdc3c7" stroke-width="1"/>

    <!-- Labels -->
    <text x="100" y="295" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">total</text>
    <text x="200" y="295" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">alcohol</text>
    <text x="300" y="295" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">premium</text>

    <text x="40" y="85" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="end">total</text>
    <text x="40" y="165" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="end">alcohol</text>
    <text x="40" y="245" font-family="Arial" font-size="12" fill="#34495e" font-weight="bold" text-anchor="end">premium</text>

    <!-- Diagonal (Histograms) -->
    <path d="M60,120 Q80,50 100,50 Q120,50 140,120 Z" fill="#3498db" opacity="0.7"/> <!-- Total hist -->
    <path d="M160,200 Q180,130 200,130 Q220,130 240,200 Z" fill="#e74c3c" opacity="0.7"/> <!-- Alc hist -->
    <path d="M260,280 Q280,210 300,210 Q320,210 340,280 Z" fill="#f1c40f" opacity="0.7"/> <!-- Prem hist -->

    <!-- Scatter total vs alcohol (Strong correlation) -->
    <rect x="150" y="40" width="100" height="80" fill="#fdedec"/> <!-- Highlight background -->
    <path d="M160,110 L240,50" fill="none" stroke="#c0392b" stroke-width="2"/>
    <circle cx="170" cy="100" r="2" fill="#2c3e50"/><circle cx="190" cy="80" r="2" fill="#2c3e50"/><circle cx="210" cy="70" r="2" fill="#2c3e50"/><circle cx="230" cy="55" r="2" fill="#2c3e50"/>

    <!-- Scatter total vs premium (No correlation) -->
    <rect x="250" y="40" width="100" height="80" fill="#eaf2f8"/> 
    <circle cx="270" cy="70" r="2" fill="#2c3e50"/><circle cx="290" cy="90" r="2" fill="#2c3e50"/><circle cx="310" cy="60" r="2" fill="#2c3e50"/><circle cx="330" cy="80" r="2" fill="#2c3e50"/>

  </g>

  <path d="M600,100 L640,120 L600,140" fill="none" stroke="#c0392b" stroke-width="3"/>
  <text x="650" y="115" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">"음주와 사고는</text>
  <text x="650" y="130" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold">완벽하게 비례한다!"</text>

  <path d="M600,220 L640,240 L600,260" fill="none" stroke="#2980b9" stroke-width="3"/>
  <text x="650" y="235" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">"보험료와 사고율은</text>
  <text x="650" y="250" font-family="Arial" font-size="12" fill="#2980b9" font-weight="bold">별 관계가 없네?"</text>

</svg>