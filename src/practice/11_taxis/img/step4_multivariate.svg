<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 결제 수단(Payment)에 숨겨진 팁(Tip)의 진실</text>

  <!-- Boxplot comparison -->
  <g transform="translate(150, 80)">
    <rect width="500" height="280" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">현금 결제 고객은 정말로 팁(Tip)을 단 한 푼도 주지 않을까?</text>
    
    <line x1="50" y1="230" x2="450" y2="230" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="230" x2="50" y2="60" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="265" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">결제 수단 (payment)</text>
    <text x="20" y="145" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,145)">Tip (달러)</text>
    
    <text x="35" y="235" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="end">0</text>
    <text x="35" y="180" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="end">2.5</text>
    <text x="35" y="130" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="end">5.0</text>
    <text x="35" y="80" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="end">10.0</text>

    <!-- Credit Card Boxplot -->
    <rect x="120" y="150" width="60" height="40" fill="#2980b9" opacity="0.8" stroke="#1f618d"/>
    <line x1="120" y1="170" x2="180" y2="170" stroke="#1f618d" stroke-width="3"/> <!-- Median -->
    <line x1="150" y1="150" x2="150" y2="100" stroke="#1f618d" stroke-width="2"/> <!-- Top whisker -->
    <line x1="150" y1="190" x2="150" y2="230" stroke="#1f618d" stroke-width="2"/> <!-- Bot whisker -->
    <circle cx="150" cy="80" r="3" fill="#2980b9"/> <!-- Outliers -->
    <circle cx="150" cy="60" r="3" fill="#2980b9"/>
    
    <text x="150" y="215" font-family="Arial" font-size="14" fill="#1f618d" font-weight="bold" text-anchor="middle">Credit Card</text>

    <!-- Cash Boxplot (0 Tip) -->
    <line x1="280" y1="228" x2="340" y2="228" stroke="#e74c3c" stroke-width="4"/> <!-- Box collapsed to 0 -->
    <text x="310" y="215" font-family="Arial" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">Cash (현금)</text>

    <!-- Context/Insight -->
    <path d="M180,100 Q250,50 300,100" fill="none" stroke="#2c3e50" stroke-width="2" stroke-dasharray="4,4"/>
    <polygon points="300,100 295,90 310,95" fill="#2c3e50"/>
    
    <rect x="250" y="110" width="220" height="60" fill="#fcf3cf" rx="5"/>
    <text x="360" y="130" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">현금 결제는 팁이 기록되지 않음!</text>
    <text x="360" y="150" font-family="Arial" font-size="11" fill="#34495e" text-anchor="middle">(기사가 현금 팁을 신고하지 않는 시스템)</text>
    
  </g>
</svg>
