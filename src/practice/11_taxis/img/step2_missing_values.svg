<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 시계열 데이터(Datetime) 변환과 특성 추출</text>

  <!-- Problem (String format) -->
  <g transform="translate(50, 100)">
    <rect width="260" height="200" fill="#fff" stroke="#95a5a6" stroke-width="2" rx="5"/>
    <text x="130" y="30" font-family="Arial" font-size="16" fill="#7f8c8d" font-weight="bold" text-anchor="middle">단순한 문자열 (String)</text>
    
    <rect x="20" y="60" width="220" height="40" fill="#fdedec"/>
    <text x="130" y="85" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="middle">"2019-02-28 23:29:03"</text>
    
    <text x="130" y="140" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">컴퓨터 입장에서는</text>
    <text x="130" y="160" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">그냥 "hello"와 똑같은 글자일 뿐,</text>
    <text x="130" y="180" font-family="Arial" font-size="12" fill="#34495e" text-anchor="middle">시간이라는 개념이 없다.</text>
  </g>

  <!-- Transformation -->
  <g transform="translate(320, 170)">
    <path d="M0,0 L70,0 L60,-10 M70,0 L60,10" fill="none" stroke="#2c3e50" stroke-width="4"/>
    <text x="35" y="-20" font-family="Courier" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">pd.to_datetime()</text>
  </g>

  <!-- Solution (Datetime object) -->
  <g transform="translate(400, 100)">
    <rect width="360" height="200" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="180" y="30" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">파워풀한 시간 객체 (Datetime)</text>
    
    <rect x="20" y="50" width="320" height="130" fill="#eafaf1" rx="5"/>
    <text x="180" y="70" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">시간의 의미를 깨닫고 요소를 자유롭게 추출!</text>
    
    <!-- Extracted features -->
    <path d="M120,95 L180,95 L180,105" fill="none" stroke="#27ae60" stroke-width="2"/>
    <text x="110" y="100" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="end">.dt.hour</text>
    <text x="210" y="100" font-family="Courier" font-size="14" fill="#c0392b" font-weight="bold" text-anchor="start">=> 23 (밤 11시 탑승!)</text>

    <path d="M120,125 L180,125 L180,135" fill="none" stroke="#27ae60" stroke-width="2"/>
    <text x="110" y="130" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="end">.dt.month</text>
    <text x="210" y="130" font-family="Courier" font-size="14" fill="#2980b9" font-weight="bold" text-anchor="start">=> 2 (2월)</text>

    <path d="M120,155 L180,155 L180,165" fill="none" stroke="#27ae60" stroke-width="2"/>
    <text x="110" y="160" font-family="Courier" font-size="14" fill="#34495e" font-weight="bold" text-anchor="end">.dt.dayofweek</text>
    <text x="210" y="160" font-family="Courier" font-size="14" fill="#8e44ad" font-weight="bold" text-anchor="start">=> 3 (목요일)</text>

  </g>
</svg>
