<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 3: 분류 모델을 위한 타겟 데이터 균형 확인</text>

  <!-- Balanced vs Imbalanced Scale Concept -->
  
  <!-- Balanced Scale (Ideal) -->
  <g transform="translate(150, 100)">
    <rect width="200" height="220" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="100" y="30" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">데이터 균형 (Good)</text>
    
    <!-- Balance Scale -->
    <path d="M100,160 L100,100" fill="none" stroke="#7f8c8d" stroke-width="4"/>
    <polygon points="100,80 90,100 110,100" fill="#7f8c8d"/>
    <path d="M50,100 L150,100" fill="none" stroke="#34495e" stroke-width="6"/>
    <path d="M50,100 L50,120 M150,100 L150,120" fill="none" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Weight 1 (Normal) -->
    <rect x="35" y="120" width="30" height="30" fill="#3498db" rx="3"/>
    <text x="50" y="140" font-family="Courier" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">138</text>
    <text x="50" y="165" font-family="Arial" font-size="12" fill="#2980b9" text-anchor="middle">0:정상</text>
    
    <!-- Weight 2 (Disease) -->
    <rect x="135" y="120" width="30" height="30" fill="#e74c3c" rx="3"/>
    <text x="150" y="140" font-family="Courier" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">165</text>
    <text x="150" y="165" font-family="Arial" font-size="12" fill="#c0392b" text-anchor="middle">1:발병</text>
    
    <path d="M60,200 L140,200" fill="none" stroke="#bdc3c7" stroke-width="4"/>
    <text x="100" y="190" font-family="Arial" font-size="11" fill="#27ae60" font-weight="bold" text-anchor="middle">"AI가 50:50으로 공평하게 학습함"</text>
  </g>

  <!-- Imbalanced Scale (Bad) -->
  <g transform="translate(450, 100)">
    <rect width="200" height="220" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="100" y="30" font-family="Arial" font-size="16" fill="#e74c3c" font-weight="bold" text-anchor="middle">불균형 (Bad / Imbalance)</text>
    
    <!-- Tilted Balance Scale -->
    <path d="M100,160 L100,100" fill="none" stroke="#7f8c8d" stroke-width="4"/>
    <polygon points="100,80 90,100 110,100" fill="#7f8c8d"/>
    <path d="M50,120 L150,80" fill="none" stroke="#34495e" stroke-width="6"/> <!-- Tilted line -->
    <path d="M50,120 L50,140 M150,80 L150,100" fill="none" stroke="#7f8c8d" stroke-width="2"/>
    
    <!-- Heavy Weight (Normal) -->
    <rect x="35" y="140" width="30" height="50" fill="#3498db" rx="3"/>
    <text x="50" y="170" font-family="Courier" font-size="12" fill="#fff" font-weight="bold" text-anchor="middle">990</text>
    <text x="50" y="205" font-family="Arial" font-size="12" fill="#2980b9" text-anchor="middle">0:정상</text>
    
    <!-- Light Weight (Disease) -->
    <rect x="135" y="100" width="30" height="15" fill="#e74c3c" rx="3"/>
    <text x="150" y="112" font-family="Courier" font-size="10" fill="#fff" font-weight="bold" text-anchor="middle">10</text>
    <text x="150" y="130" font-family="Arial" font-size="12" fill="#c0392b" text-anchor="middle">1:발병</text>
    
    <text x="100" y="235" font-family="Arial" font-size="11" fill="#c0392b" font-weight="bold" text-anchor="middle">"AI가 무조건 0으로 찍는 꼼수를 부림"</text>
  </g>

</svg>
