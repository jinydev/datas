<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 2: 연속형 변수 범주화 / Binning (pd.cut)</text>

  <!-- Continuous Data Concept -->
  <g transform="translate(60, 120)">
    <rect width="200" height="150" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="5"/>
    <text x="100" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">연속형 수치 (age)</text>
    
    <circle cx="50" cy="70" r="15" fill="#3498db" opacity="0.6"/>
    <text x="50" y="75" font-family="Courier" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">42</text>
    
    <circle cx="100" cy="90" r="15" fill="#3498db" opacity="0.6"/>
    <text x="100" y="95" font-family="Courier" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">55</text>
    
    <circle cx="150" cy="60" r="15" fill="#3498db" opacity="0.6"/>
    <text x="150" y="65" font-family="Courier" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">38</text>
    
    <circle cx="70" cy="110" r="15" fill="#3498db" opacity="0.6"/>
    <text x="70" y="115" font-family="Courier" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">63</text>
    
    <circle cx="130" cy="120" r="15" fill="#3498db" opacity="0.6"/>
    <text x="130" y="125" font-family="Courier" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">49</text>
    
    <text x="100" y="170" font-family="Arial" font-size="12" fill="#7f8c8d" text-anchor="middle">너무 잘게 쪼개져 있어 묶기 힘듦</text>
  </g>

  <!-- pd.cut Magic -->
  <g transform="translate(300, 170)">
    <path d="M0,20 L60,20 M50,10 L60,20 L50,30" fill="none" stroke="#2980b9" stroke-width="4"/>
    <text x="30" y="-10" font-family="Courier" font-size="16" fill="#2980b9" font-weight="bold" text-anchor="middle">pd.cut()</text>
    <rect x="-10" y="0" width="80" height="20" fill="#fcf3cf" rx="3"/>
    <text x="30" y="14" font-family="Arial" font-size="11" fill="#d35400" text-anchor="middle">bins (기준점)</text>
  </g>

  <!-- Binned Categories (Buckets) -->
  <g transform="translate(410, 100)">
    <rect width="320" height="180" fill="#fff" stroke="#27ae60" stroke-width="2" rx="5"/>
    <text x="160" y="30" font-family="Arial" font-size="16" fill="#27ae60" font-weight="bold" text-anchor="middle">범주형 그룹화 (age_group)</text>
    
    <!-- Bucket 1: 30s -->
    <path d="M40,60 L20,130 L60,130 Z" fill="none" stroke="#bdc3c7" stroke-width="2"/>
    <rect x="25" y="60" width="30" height="70" fill="#eaf2f8" stroke="#2980b9" stroke-width="2" rx="3"/>
    <circle cx="40" cy="110" r="12" fill="#3498db"/>
    <text x="40" y="114" font-family="Courier" font-size="10" fill="#fff" text-anchor="middle">38</text>
    <text x="40" y="150" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">30s</text>

    <!-- Bucket 2: 40s -->
    <rect x="95" y="60" width="30" height="70" fill="#eaf2f8" stroke="#2980b9" stroke-width="2" rx="3"/>
    <circle cx="110" cy="110" r="12" fill="#3498db"/>
    <text x="110" y="114" font-family="Courier" font-size="10" fill="#fff" text-anchor="middle">42</text>
    <circle cx="110" cy="80" r="12" fill="#3498db"/>
    <text x="110" y="84" font-family="Courier" font-size="10" fill="#fff" text-anchor="middle">49</text>
    <text x="110" y="150" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">40s</text>

    <!-- Bucket 3: 50s -->
    <rect x="165" y="60" width="30" height="70" fill="#eaf2f8" stroke="#2980b9" stroke-width="2" rx="3"/>
    <circle cx="180" cy="110" r="12" fill="#3498db"/>
    <text x="180" y="114" font-family="Courier" font-size="10" fill="#fff" text-anchor="middle">55</text>
    <text x="180" y="150" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">50s</text>

    <!-- Bucket 4: 60s -->
    <rect x="235" y="60" width="30" height="70" fill="#eaf2f8" stroke="#2980b9" stroke-width="2" rx="3"/>
    <circle cx="250" cy="110" r="12" fill="#3498db"/>
    <text x="250" y="114" font-family="Courier" font-size="10" fill="#fff" text-anchor="middle">63</text>
    <text x="250" y="150" font-family="Arial" font-size="12" fill="#2c3e50" font-weight="bold" text-anchor="middle">60s</text>

    <text x="160" y="200" font-family="Arial" font-size="12" fill="#27ae60" text-anchor="middle">통계(평균 등)를 구하거나 시각화하기 최적의 상태!</text>
  </g>

</svg>
