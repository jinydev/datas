<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">Step 4: 다중 그룹 박스플롯 (연령대별 최대 심박수 비교)</text>

  <!-- Multi-Group Boxplot Concept -->
  <g transform="translate(150, 60)">
    <rect width="500" height="300" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <text x="250" y="30" font-family="Arial" font-size="16" fill="#34495e" font-weight="bold" text-anchor="middle">연령대(age_group)별 최대 심박수(thalach)</text>
    
    <!-- Axes -->
    <line x1="50" y1="260" x2="450" y2="260" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="260" x2="50" y2="50" stroke="#7f8c8d" stroke-width="2"/>
    
    <text x="250" y="290" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">Age Group (연령대)</text>
    <text x="20" y="155" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle" transform="rotate(-90 20,155)">Thalach (최대 심박수)</text>
    
    <!-- X-axis Groups -->
    <text x="120" y="275" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">40s</text>
    <text x="250" y="275" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">50s</text>
    <text x="380" y="275" font-family="Courier" font-size="12" fill="#34495e" font-weight="bold" text-anchor="middle">60s</text>

    <!-- 40s Group -->
    <!-- Blue (Normal) -->
    <rect x="90" y="160" width="20" height="60" fill="#3498db" stroke="#2980b9"/>
    <line x1="90" y1="190" x2="110" y2="190" stroke="#2c3e50" stroke-width="2"/>
    <line x1="100" y1="160" x2="100" y2="130" stroke="#2980b9" stroke-width="2"/>
    <line x1="100" y1="220" x2="100" y2="240" stroke="#2980b9" stroke-width="2"/>
    <!-- Red (Disease) -->
    <rect x="115" y="80" width="20" height="50" fill="#e74c3c" stroke="#c0392b"/>
    <line x1="115" y1="100" x2="135" y2="100" stroke="#2c3e50" stroke-width="2"/>
    <line x1="125" y1="80" x2="125" y2="60" stroke="#c0392b" stroke-width="2"/>
    <line x1="125" y1="130" x2="125" y2="150" stroke="#c0392b" stroke-width="2"/>

    <!-- 50s Group (Slightly lower overall due to aging) -->
    <!-- Blue (Normal) -->
    <rect x="220" y="180" width="20" height="50" fill="#3498db" stroke="#2980b9"/>
    <line x1="220" y1="205" x2="240" y2="205" stroke="#2c3e50" stroke-width="2"/>
    <line x1="230" y1="180" x2="230" y2="150" stroke="#2980b9" stroke-width="2"/>
    <line x1="230" y1="230" x2="230" y2="250" stroke="#2980b9" stroke-width="2"/>
    <!-- Red (Disease) -->
    <rect x="245" y="100" width="20" height="40" fill="#e74c3c" stroke="#c0392b"/>
    <line x1="245" y1="120" x2="265" y2="120" stroke="#2c3e50" stroke-width="2"/>
    <line x1="255" y1="100" x2="255" y2="80" stroke="#c0392b" stroke-width="2"/>
    <line x1="255" y1="140" x2="255" y2="160" stroke="#c0392b" stroke-width="2"/>

    <!-- 60s Group (Lowest overall) -->
    <!-- Blue (Normal) -->
    <rect x="350" y="200" width="20" height="40" fill="#3498db" stroke="#2980b9"/>
    <line x1="350" y1="220" x2="370" y2="220" stroke="#2c3e50" stroke-width="2"/>
    <line x1="360" y1="200" x2="360" y2="170" stroke="#2980b9" stroke-width="2"/>
    <line x1="360" y1="240" x2="360" y2="250" stroke="#2980b9" stroke-width="2"/>
    <!-- Red (Disease) -->
    <rect x="375" y="120" width="20" height="50" fill="#e74c3c" stroke="#c0392b"/>
    <line x1="375" y1="145" x2="395" y2="145" stroke="#2c3e50" stroke-width="2"/>
    <line x1="385" y1="120" x2="385" y2="100" stroke="#c0392b" stroke-width="2"/>
    <line x1="385" y1="170" x2="385" y2="190" stroke="#c0392b" stroke-width="2"/>

    <!-- Annotations / Highlight -->
    <path d="M150,110 L220,110" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="250" y="70" font-family="Arial" font-size="12" fill="#c0392b" font-weight="bold" text-anchor="middle">모든 연령대에서 환자의 최대 심박수가 눈에 띄게 높다!</text>
    <path d="M250,75 L255,100" fill="none" stroke="#c0392b" stroke-width="2"/>

    <!-- Legend -->
    <rect x="370" y="40" width="110" height="50" fill="#f8f9fa" stroke="#bdc3c7" rx="5"/>
    <rect x="380" y="50" width="10" height="10" fill="#3498db"/>
    <text x="400" y="59" font-family="Arial" font-size="11" fill="#2980b9">0: 정상(Normal)</text>
    <rect x="380" y="70" width="10" height="10" fill="#e74c3c"/>
    <text x="400" y="79" font-family="Arial" font-size="11" fill="#c0392b">1: 심장병 발병</text>

  </g>
</svg>
