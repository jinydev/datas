<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicon icon-->
    <link rel="shortcut icon" type="image/x-icon" href="{{ site.baseurl }}/assets/images/favicon/favicon.ico" />

    <!-- Libs CSS -->
    <link href="{{ site.baseurl }}/assets/fonts/feather/feather.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.min.css" rel="stylesheet" />

    <!-- Theme CSS -->
    <link href="{{ site.baseurl }}/assets/css/geeks-QcmHcVVb.css" rel="stylesheet" />
    <link href="{{ site.baseurl }}/assets/css/custom.css" rel="stylesheet" />

    <title>{{ page.title }} | {{ site.title }}</title>
</head>

<body class="bg-white">
    <!-- Main wrapper -->
    <div class="docs-main-wrapper">
        {% include header.html %}

        <!-- left sidebar -->
        {% include sidebar.html %}

        <!-- Wrapper -->
        <main class="docs-wrapper">
            <section class="container-fluid">
                <div class="row">
                    <!-- Main Content -->
                    <div class="col-xl-9 col-lg-9 col-md-12 col-sm-12 col-12">
                        <div class="docs-content">
                            {{ content }}
                        </div>
                    </div>

                    <!-- Right Sidebar (Table of Contents) -->
                    <div class="col-xl-3 col-lg-3 d-none d-lg-block">
                        <div class="sidebar-nav-fixed position-fixed" style="top: 3.5rem; right: 1rem; width: 14%;">
                            <span class="px-4 mb-2 d-block text-uppercase ls-md fw-semibold fs-6">Contents</span>
                            <ul class="list-unstyled" id="toc">
                                <!-- TOC items generated by JS -->
                            </ul>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <!-- Libs JS -->
    <script src="{{ site.baseurl }}/assets/js/vendors/darkMode.js"></script>

    <!-- Theme JS -->
    <script src="{{ site.baseurl }}/assets/js/geeks-DYfUURBV.js"></script>

    <!-- TOC & ScrollSpy Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const content = document.querySelector('.docs-content');
            const toc = document.getElementById('toc');
            if (!content || !toc) return;

            const headers = content.querySelectorAll('h2, h3');
            if (headers.length === 0) return;

            headers.forEach((header, index) => {
                if (!header.id) {
                    header.id = 'header-' + index;
                }

                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = '#' + header.id;
                link.textContent = header.textContent;
                link.classList.add('nav-link', 'd-block', 'py-1', 'ps-4'); // Bootstrap/Geeks styles

                if (header.tagName === 'H3') {
                    link.classList.add('ps-5', 'fs-6'); // Indent H3
                } else {
                    link.classList.add('fw-bold'); // Bold H2
                }

                li.appendChild(link);
                toc.appendChild(li);
            });
        });
    </script>

    <!-- MathJax for Latex -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Mermaid for Diagrams -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

        mermaid.initialize({
            startOnLoad: false
        });

        document.addEventListener('DOMContentLoaded', function () {
            // Find all code blocks with language-mermaid
            const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');

            mermaidBlocks.forEach((block, index) => {
                const pre = block.parentElement;
                const content = block.textContent;

                // Create a div for mermaid to render into
                const div = document.createElement('div');
                div.classList.add('mermaid');
                div.textContent = content;
                div.id = 'mermaid-' + index;

                // Replace pre with div
                pre.replaceWith(div);
            });

            // Run mermaid
            mermaid.run({
                querySelector: '.mermaid'
            });
        });
    </script>
</body>

</html>
