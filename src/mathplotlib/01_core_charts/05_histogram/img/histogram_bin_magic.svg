<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">히스토그램의 심장: Bins (양동이) 쪼개기 마법</text>

  <!-- 원본 데이터 (수많은 점들) -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="220" height="250" fill="#FFFDE7" rx="10" filter="url(#shadow)" stroke="#FBC02D" stroke-width="2"/>
    <text x="110" y="30" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">원본 데이터 (수백명의 나이)</text>
    
    <!-- 무작위 나이 공들 -->
    <circle cx="50" cy="80" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="50" y="84" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">12</text>
    
    <circle cx="85" cy="110" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="85" y="114" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">15</text>

    <circle cx="160" cy="70" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="160" y="74" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">38</text>

    <circle cx="40" cy="140" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="40" y="144" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">22</text>

    <circle cx="130" cy="130" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="130" y="134" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">28</text>

    <circle cx="90" cy="160" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="90" y="164" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">25</text>

    <circle cx="170" cy="180" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="170" y="184" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">55</text>

    <circle cx="60" cy="200" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="60" y="204" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">29</text>

    <circle cx="120" cy="210" r="12" fill="#FFE082" stroke="#FFCA28" stroke-width="2"/>
    <text x="120" y="214" font-family="sans-serif" font-size="11" fill="#E65100" font-weight="bold" text-anchor="middle">41</text>
  </g>

  <!-- 마법 화살표 (bins 지정) -->
  <text x="320" y="180" font-family="monospace" font-size="16" fill="#009688" font-weight="bold" text-anchor="middle">bins=3 (3개의 통)</text>
  <path d="M 290 195 L 350 195" fill="none" stroke="#009688" stroke-width="4" stroke-dasharray="5,5" />
  <polygon points="340,188 355,195 340,202" fill="#009688" />

  <!-- 우측: 양동이에 담긴 데이터 (히스토그램) -->
  <g transform="translate(370, 70)">
    <rect x="0" y="0" width="280" height="250" fill="#E0F2F1" rx="10" filter="url(#shadow)" stroke="#009688" stroke-width="3"/>
    
    <path d="M 20 60 L 20 200 L 260 200" fill="none" stroke="#607D8B" stroke-width="2" />
    
    <!-- 빈 1: (0~20대) = 12, 15 -->
    <!-- 통 그림 -->
    <rect x="40" y="130" width="60" height="70" fill="#4DB6AC" opacity="0.9" stroke="#E0F2F1" stroke-width="2" />
    <text x="70" y="220" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">0 ~ 20세</text>
    <text x="70" y="120" font-family="sans-serif" font-size="14" fill="#00695C" font-weight="bold" text-anchor="middle">2명</text>
    <circle cx="60" cy="180" r="8" fill="#FFE082" />
    <circle cx="80" cy="160" r="8" fill="#FFE082" />

    <!-- 빈 2: (20~40대) = 22, 28, 25, 29, 38 -->
    <rect x="100" y="70" width="60" height="130" fill="#4DB6AC" opacity="0.9" stroke="#E0F2F1" stroke-width="2" />
    <text x="130" y="220" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">20 ~ 40세</text>
    <text x="130" y="60" font-family="sans-serif" font-size="14" fill="#00695C" font-weight="bold" text-anchor="middle">5명</text>
    <circle cx="120" cy="180" r="8" fill="#FFE082" />
    <circle cx="140" cy="160" r="8" fill="#FFE082" />
    <circle cx="125" cy="140" r="8" fill="#FFE082" />
    <circle cx="135" cy="115" r="8" fill="#FFE082" />
    <circle cx="115" cy="95" r="8" fill="#FFE082" />

    <!-- 빈 3: (40~60대) = 41, 55 -->
    <rect x="160" y="130" width="60" height="70" fill="#4DB6AC" opacity="0.9" stroke="#E0F2F1" stroke-width="2" />
    <text x="190" y="220" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">40 ~ 60세</text>
    <text x="190" y="120" font-family="sans-serif" font-size="14" fill="#00695C" font-weight="bold" text-anchor="middle">2명</text>
    <circle cx="180" cy="180" r="8" fill="#FFE082" />
    <circle cx="200" cy="160" r="8" fill="#FFE082" />
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 350)">
    <rect x="-310" y="-15" width="620" height="35" fill="#E8F5E9" rx="8" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#1B5E20" font-weight="bold" text-anchor="middle">흩어진 수치형(숫자) 데이터를 일정한 구간 칸막이(Bins)로 나누어 카운트하는 것이 히스토그램입니다!</text>
  </g>

</svg>
