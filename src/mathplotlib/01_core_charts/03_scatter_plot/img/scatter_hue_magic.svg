<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .text-bold { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 22px; font-weight: bold; fill: #fff; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">산점도 (Scatter Plot) 의 'Hue(색상)' 마법</text>

  <!-- Base Plot -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="220" height="200" fill="#f8f9fa" stroke="#ccc" stroke-width="2" rx="5" ry="5"/>
    <text x="110" y="20" class="title" fill="#6c757d" text-anchor="middle" font-size="16">1. 일반 산점도 (X, Y 2차원)</text>
    
    <line x1="30" y1="180" x2="190" y2="180" stroke="#333" stroke-width="1" />
    <line x1="30" y1="40" x2="30" y2="180" stroke="#333" stroke-width="1" />
    
    <!-- Gray dots -->
    <circle cx="50" cy="150" r="5" fill="#6c757d" />
    <circle cx="80" cy="130" r="5" fill="#6c757d" />
    <circle cx="110" cy="110" r="5" fill="#6c757d" />
    <circle cx="70" cy="80" r="5" fill="#6c757d" />
    <circle cx="150" cy="70" r="5" fill="#6c757d" />
    <circle cx="170" cy="140" r="5" fill="#6c757d" />
    
    <text x="110" y="195" class="title" font-size="12" fill="#333" text-anchor="middle">배기량 (X축)</text>
    <text x="10" y="110" class="title" font-size="12" fill="#333" text-anchor="middle" transform="rotate(-90, 10, 110)">연비 (Y축)</text>
  </g>

  <!-- Arrow -->
  <path d="M 330 200 L 400 200" fill="none" stroke="#28a745" stroke-width="4" stroke-dasharray="5,5" />
  <polygon points="390,195 400,200 390,205" fill="#28a745" />
  <text x="365" y="190" class="title" fill="#28a745" font-size="16" text-anchor="middle">hue='구동방식'</text>
  <text x="365" y="220" class="title" fill="#28a745" font-size="12" text-anchor="middle">3차원 투영기 투입</text>

  <!-- Hue Plot -->
  <g transform="translate(430, 100)">
    <rect x="0" y="0" width="300" height="200" fill="#fdf2e9" stroke="#e67e22" stroke-width="3" rx="5" ry="5"/>
    <text x="150" y="20" class="title" fill="#e67e22" text-anchor="middle" font-size="16">2. Hue 투영 산점도 (X, Y, 색상 3차원)</text>
    
    <line x1="30" y1="180" x2="270" y2="180" stroke="#333" stroke-width="2" />
    <line x1="30" y1="40" x2="30" y2="180" stroke="#333" stroke-width="2" />
    
    <!-- Colored dots (Front=blue, 4WD=green, Rear=red) -->
    <!-- Front wheel (Good mileage, small displacement) -->
    <circle cx="50" cy="150" r="6" fill="#0d6efd" />
    <circle cx="80" cy="130" r="6" fill="#0d6efd" />
    <!-- Rear wheel (Okay mileage, large displ) -->
    <circle cx="150" cy="70" r="6" fill="#dc3545" />
    <circle cx="170" cy="140" r="6" fill="#dc3545" />
    <!-- 4WD (Bad mileage, Med displ) -->
    <circle cx="110" cy="110" r="6" fill="#198754" />
    <circle cx="70" cy="80" r="6" fill="#198754" />
    
    <!-- Legend -->
    <rect x="220" y="40" width="70" height="70" fill="#fff" stroke="#adb5bd" />
    <circle cx="235" cy="55" r="4" fill="#0d6efd" />
    <text x="250" y="60" class="title" font-size="12" fill="#333">전륜(f)</text>
    <circle cx="235" cy="75" r="4" fill="#198754" />
    <text x="250" y="80" class="title" font-size="12" fill="#333">사륜(4)</text>
    <circle cx="235" cy="95" r="4" fill="#dc3545" />
    <text x="250" y="100" class="title" font-size="12" fill="#333">후륜(r)</text>
    
    <text x="150" y="195" class="title" font-size="12" fill="#333" text-anchor="middle">배기량 (X축)</text>
    <text x="10" y="110" class="title" font-size="12" fill="#333" text-anchor="middle" transform="rotate(-90, 10, 110)">연비 (Y축)</text>
  </g>
</svg>
