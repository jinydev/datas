<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#0ea5e9" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">⚔️ 전투 중 마나(MP) 고갈 추이</text>

    <!-- Graph Area -->
    <g transform="translate(80, 60)">
        <!-- Axes -->
        <path d="M 0 0 L 0 180 L 440 180" stroke="#64748b" stroke-width="2" fill="none" />
        
        <g stroke="#cbd5e1" stroke-dasharray="4,4" stroke-width="1">
            <line x1="0" y1="36" x2="440" y2="36" />  <!-- 80 -->
            <line x1="0" y1="72" x2="440" y2="72" />  <!-- 60 -->
            <line x1="0" y1="108" x2="440" y2="108" /> <!-- 40 -->
            <line x1="0" y1="144" x2="440" y2="144" /> <!-- 20 -->
        </g>
        
        <!-- Y Labels -->
        <text x="-10" y="5" fill="#64748b" font-size="12" text-anchor="end">100</text>
        <text x="-10" y="95" fill="#64748b" font-size="12" text-anchor="end">50</text>
        <text x="-10" y="185" fill="#64748b" font-size="12" text-anchor="end">0</text>
        
        <text x="-40" y="90" fill="#0f172a" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90, -40, 90)">남은 마나 (MP)</text>

        <!-- X Labels -->
        <text x="0" y="200" fill="#64748b" font-size="12" text-anchor="middle">0</text>
        <text x="88" y="200" fill="#64748b" font-size="12" text-anchor="middle">1</text>
        <text x="176" y="200" fill="#64748b" font-size="12" text-anchor="middle">2</text>
        <text x="264" y="200" fill="#64748b" font-size="12" text-anchor="middle">3</text>
        <text x="352" y="200" fill="#64748b" font-size="12" text-anchor="middle">4</text>
        <text x="440" y="200" fill="#64748b" font-size="12" text-anchor="middle">5</text>

        <text x="220" y="230" fill="#0f172a" font-size="14" font-weight="bold" text-anchor="middle">시간 (초)</text>

        <!-- MP depletion: 100, 80, 60, 40, 20, 0 -->
        <!-- Y mapping: 180 - (val / 100 * 180) -->
        <path d="M 0 0 L 88 36 L 176 72 L 264 108 L 352 144 L 440 180" fill="none" stroke="#0ea5e9" stroke-width="4" />
    </g>

    <rect x="360" y="250" width="220" height="35" rx="5" fill="#e0f2fe" />
    <text x="470" y="272" fill="#0369a1" font-size="12" font-weight="bold" text-anchor="middle">💡 X축 타이머와 Y축 값의 명시적 매핑</text>
</svg>
