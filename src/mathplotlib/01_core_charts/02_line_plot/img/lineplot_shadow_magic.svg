<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .box { rx: 10px; ry: 10px; fill: #fcfcfc; stroke: #ccc; stroke-width: 3px; }
      .text-desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 15px; fill: #333; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">Seaborn Lineplot의 마법: 평균선(Mean)과 신뢰구간(CI) 그림자</text>

  <!-- Problem: Too many lines -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="300" height="220" class="box" fill="#f8f9fa" />
    <text x="150" y="30" class="title" fill="#dc3545" text-anchor="middle">1. 원시 데이터 (거미줄 현상)</text>
    
    <line x1="30" y1="180" x2="270" y2="180" stroke="#333" stroke-width="2" />
    <line x1="30" y1="50" x2="30" y2="180" stroke="#333" stroke-width="2" />
    
    <!-- 3 different patients -->
    <path d="M 50 150 L 100 100 L 150 140 L 200 80 L 250 120" fill="none" stroke="#6c757d" stroke-width="1" />
    <path d="M 50 140 L 100 120 L 150 110 L 200 60 L 250 130" fill="none" stroke="#adb5bd" stroke-width="1" />
    <path d="M 50 160 L 100 80 L 150 160 L 200 100 L 250 110" fill="none" stroke="#495057" stroke-width="1" />
    
    <!-- Time points -->
    <circle cx="100" cy="100" r="3" fill="#333" />
    <circle cx="100" cy="120" r="3" fill="#333" />
    <circle cx="100" cy="80" r="3" fill="#333" />

    <text x="100" y="200" class="text-desc" font-weight="bold" fill="#dc3545" text-anchor="middle">같은 시간(X)에</text>
    <text x="100" y="215" class="text-desc" font-weight="bold" fill="#dc3545" text-anchor="middle">값이 여러개 존재!</text>
  </g>

  <!-- Arrow -->
  <path d="M 400 200 L 450 200" fill="none" stroke="#0056b3" stroke-width="4" stroke-linecap="round" />
  <polygon points="445,195 455,200 445,205" fill="#0056b3" />
  <text x="425" y="190" class="title" fill="#0056b3" font-size="14" text-anchor="middle">자동 통계 요약</text>

  <!-- Solution: Lineplot -->
  <g transform="translate(470, 90)">
    <rect x="0" y="0" width="300" height="220" class="box" fill="#e3f2fd" stroke="#0056b3" />
    <text x="150" y="30" class="title" fill="#0056b3" text-anchor="middle">2. Seaborn Lineplot 마법</text>
    
    <line x1="30" y1="180" x2="270" y2="180" stroke="#333" stroke-width="2" />
    <line x1="30" y1="50" x2="30" y2="180" stroke="#333" stroke-width="2" />
    
    <!-- Shadow (Confidence Interval) -->
    <!-- Max: 160, 80, 160, 60, 130 -->
    <!-- Min: 140, 120, 110, 100, 110 -->
    <path d="M 50 140 L 100 80 L 150 110 L 200 60 L 250 110 L 250 130 L 200 100 L 150 160 L 100 120 L 50 160 Z" fill="#0d6efd" fill-opacity="0.2" />
    
    <!-- Mean Line -->
    <!-- Means: 150, 100, 136, 80, 120 -->
    <path d="M 50 150 L 100 100 L 150 136 L 200 80 L 250 120" fill="none" stroke="#0d6efd" stroke-width="3" />
    
    <circle cx="100" cy="100" r="4" fill="#0d6efd" />
    <!-- Annotations -->
    <path d="M 120 100 L 200 160" fill="none" stroke="#6c757d" stroke-dasharray="2,2" />
    <text x="210" y="165" class="text-desc" font-size="14" fill="#6c757d" font-weight="bold">평균(Mean) 굵은 선</text>

    <path d="M 100 80 L 130 50" fill="none" stroke="#6c757d" stroke-dasharray="2,2" />
    <text x="170" y="50" class="text-desc" font-size="14" fill="#6c757d" font-weight="bold">신뢰구간(CI) 그림자</text>
  </g>
</svg>
