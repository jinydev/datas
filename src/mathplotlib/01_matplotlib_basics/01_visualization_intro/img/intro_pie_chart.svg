<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#f59e0b" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">📊 스마트폰 시장 점유율 (Pie Chart)</text>

    <!-- Pie Chart Center: 240, 150 -->
    <g transform="translate(240, 160)">
        
        <!-- Slice 1: iPhone (45%) -->
        <path d="M 0 0 L 0 -100 A 100 100 0 0 1 95 31 Z" fill="#3b82f6" stroke="white" stroke-width="2"/>
        <text x="45" y="-35" fill="white" font-weight="bold" font-size="14" text-anchor="middle">45.0%</text>

        <!-- Slice 2: Galaxy (50%) -->
        <path d="M 0 0 L 95 31 A 100 100 0 0 1 0 100 A 100 100 0 0 1 -100 0 Z" fill="#10b981" stroke="white" stroke-width="2"/>
        <text x="-30" y="55" fill="white" font-weight="bold" font-size="14" text-anchor="middle">50.0%</text>
        
        <!-- Slice 3: Others (5%) -->
        <path d="M 0 0 L -100 0 A 100 100 0 0 1 0 -100 Z" fill="#94a3b8" stroke="white" stroke-width="2"/>
        <text x="-40" y="-40" fill="white" font-weight="bold" font-size="14" text-anchor="middle">5.0%</text>
    </g>

    <!-- Legend -->
    <g transform="translate(420, 100)">
        <rect x="0" y="0" width="100" height="90" fill="white" stroke="#cbd5e1" rx="5" />
        
        <rect x="15" y="15" width="15" height="15" fill="#3b82f6" />
        <text x="40" y="27" fill="#475569" font-size="13">아이폰</text>
        
        <rect x="15" y="40" width="15" height="15" fill="#10b981" />
        <text x="40" y="52" fill="#475569" font-size="13">갤럭시</text>

        <rect x="15" y="65" width="15" height="15" fill="#94a3b8" />
        <text x="40" y="77" fill="#475569" font-size="13">기타</text>
    </g>

    <rect x="375" y="250" width="205" height="35" rx="5" fill="#fef3c7" />
    <text x="477" y="272" fill="#b45309" font-size="12" font-weight="bold" text-anchor="middle">💡 전체 파이 조각 중 차지하는 비율 점유율</text>
</svg>
