<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#a855f7" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">📊 수학 점수 밀집 분포 (Histogram)</text>

    <g transform="translate(60, 60)">
        <path d="M 0 0 L 0 180 L 480 180" stroke="#64748b" stroke-width="2" fill="none" />
        
        <g stroke="#cbd5e1" stroke-dasharray="2,2" stroke-width="1">
            <line x1="0" y1="45" x2="480" y2="45" />   <!-- count: 3 -->
            <line x1="0" y1="90" x2="480" y2="90" />   <!-- count: 2 -->
            <line x1="0" y1="135" x2="480" y2="135" /> <!-- count: 1 -->
        </g>
        
        <text x="-10" y="49" fill="#64748b" font-size="12" text-anchor="end">3명</text>
        <text x="-10" y="94" fill="#64748b" font-size="12" text-anchor="end">2명</text>
        <text x="-10" y="139" fill="#64748b" font-size="12" text-anchor="end">1명</text>

        <!-- math_scores = [35, 60, 65, 65, 70, 75, 80, 85, 85, 90, 95] -->
        <!-- Bins: 5 bins from 35 to 95. Bin width: (95-35)/5 = 12 points. -->
        <!-- Just simulate generic contiguous bars representing frequency bins -->
        
        <!-- Bin 1 -->
        <rect x="40" y="135" width="80" height="45" fill="#d8b4fe" stroke="#6b21a8" stroke-width="2" />
        <text x="80" y="125" fill="#6b21a8" font-size="12" font-weight="bold" text-anchor="middle">1</text>
        
        <!-- Bin 2 -->
        <rect x="120" y="90" width="80" height="90" fill="#c084fc" stroke="#6b21a8" stroke-width="2" />
        <text x="160" y="80" fill="#6b21a8" font-size="12" font-weight="bold" text-anchor="middle">2</text>
        
        <!-- Bin 3 (Mode, say 4) -->
        <rect x="200" y="0" width="80" height="180" fill="#a855f7" stroke="#6b21a8" stroke-width="2" />
        <text x="240" y="-10" fill="#6b21a8" font-size="12" font-weight="bold" text-anchor="middle">4</text>
        
        <!-- Bin 4 -->
        <rect x="280" y="45" width="80" height="135" fill="#9333ea" stroke="#6b21a8" stroke-width="2" />
        <text x="320" y="35" fill="#6b21a8" font-size="12" font-weight="bold" text-anchor="middle">3</text>
        
        <!-- Bin 5 -->
        <rect x="360" y="135" width="80" height="45" fill="#7e22ce" stroke="#6b21a8" stroke-width="2" />
        <text x="400" y="125" fill="#6b21a8" font-size="12" font-weight="bold" text-anchor="middle">1</text>
        
        <text x="80" y="200" fill="#64748b" font-size="11" text-anchor="middle">~45점</text>
        <text x="160" y="200" fill="#64748b" font-size="11" text-anchor="middle">~60점</text>
        <text x="240" y="200" fill="#64748b" font-size="11" text-anchor="middle">~75점</text>
        <text x="320" y="200" fill="#64748b" font-size="11" text-anchor="middle">~85점</text>
        <text x="400" y="200" fill="#64748b" font-size="11" text-anchor="middle">~100점</text>
    </g>

    <rect x="350" y="250" width="230" height="35" rx="5" fill="#f3e8ff" />
    <text x="465" y="272" fill="#7e22ce" font-size="12" font-weight="bold" text-anchor="middle">💡 구간(Bin)별 점수 빈도(Frequency) 분포</text>
</svg>
