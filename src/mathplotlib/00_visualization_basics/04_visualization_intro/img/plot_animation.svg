<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 250 220" width="100%" height="auto">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 2; fill: none; }
      .grid { stroke: #e0e0e0; stroke-width: 1; fill: none; stroke-dasharray: 4 4; }
      .point { fill: #ff6b6b; r: 0; animation: pop 4s infinite; }
      .line { stroke: #4ecdc4; stroke-width: 3; fill: none; stroke-dasharray: 300; stroke-dashoffset: 300; animation: draw 4s infinite; }
      .text { font-family: 'Comic Sans MS', 'Malgun Gothic', sans-serif; font-size: 12px; fill: #555; }
      
      @keyframes pop {
        0%, 10% { r: 0; }
        15%, 85% { r: 5; }
        90%, 100% { r: 0; }
      }
      @keyframes draw {
        0%, 25% { stroke-dashoffset: 300; }
        45%, 85% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 300; }
      }
      
      .p1 { animation-delay: 0.1s; }
      .p2 { animation-delay: 0.6s; }
      .p3 { animation-delay: 1.1s; }
      .p4 { animation-delay: 1.6s; }
    </style>
  </defs>

  <!-- Background grid -->
  <path class="grid" d="M 0 50 h 200 M 0 100 h 200 M 0 150 h 200 M 50 0 v 200 M 100 0 v 200 M 150 0 v 200" />
  
  <!-- Axes -->
  <line class="axis" x1="0" y1="200" x2="200" y2="200" />
  <line class="axis" x1="0" y1="0" x2="0" y2="200" />
  
  <!-- Axis Labels -->
  <text class="text" x="-15" y="215">0</text>
  <text class="text" x="45" y="215">1</text>
  <text class="text" x="95" y="215">2</text>
  <text class="text" x="145" y="215">3</text>
  <text class="text" x="195" y="215">4</text>
  
  <text class="text" x="-15" y="155">1</text>
  <text class="text" x="-15" y="105">4</text>
  <text class="text" x="-20" y="55">9</text>
  <text class="text" x="-25" y="5">16</text>
  
  <!-- Line connecting points (y = x^2, scaled) -->
  <path class="line" d="M 50 150 L 100 100 L 150 50 L 200 0" />
  
  <!-- Points -->
  <circle class="point p1" cx="50" cy="150" />
  <circle class="point p2" cx="100" cy="100" />
  <circle class="point p3" cx="150" cy="50" />
  <circle class="point p4" cx="200" cy="0" />
  
  <!-- Step Labels -->
  <text class="text" x="60" y="145" style="fill:#ff6b6b; font-weight:bold;">1. 점 배치!</text>
  <text class="text" x="110" y="90" style="fill:#4ecdc4; font-weight:bold;">2. 선 연결!</text>

  <!-- Title -->
  <text x="100" y="-10" text-anchor="middle" font-family="'Malgun Gothic', sans-serif" font-size="14" font-weight="bold" fill="#333">데이터가 선이 되는 마법 🎨</text>

</svg>
