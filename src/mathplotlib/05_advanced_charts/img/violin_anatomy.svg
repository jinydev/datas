<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .text-desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 15px; fill: #333; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">바이올린 플롯(Violin Plot) 해부도: Box Plot + 밀도(KDE)</text>

  <!-- Box Plot -->
  <g transform="translate(150, 100)">
    <line x1="100" y1="20" x2="100" y2="200" stroke="#333" stroke-width="2" />
    <line x1="80" y1="20" x2="120" y2="20" stroke="#333" stroke-width="2" />
    <line x1="80" y1="200" x2="120" y2="200" stroke="#333" stroke-width="2" />
    
    <!-- Box -->
    <rect x="70" y="80" width="60" height="80" fill="#e3f2fd" stroke="#0056b3" stroke-width="2" />
    <!-- Median -->
    <line x1="70" y1="120" x2="130" y2="120" stroke="#0056b3" stroke-width="4" />
    
    <text x="100" y="240" class="title" fill="#0d6efd" text-anchor="middle">Box Plot</text>
    <text x="100" y="260" class="text-desc" fill="#6c757d" text-anchor="middle" font-size="12">요약 정보는 확실하지만</text>
    <text x="100" y="275" class="text-desc" fill="#6c757d" text-anchor="middle" font-size="12">구간별 데이터 밀도는 모름!</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(375, 160)">
    <text x="0" y="-10" class="title" font-size="30" fill="#28a745">+</text>
    <path d="M 40 -15 L 80 -15" fill="none" stroke="#28a745" stroke-width="4" stroke-dasharray="4,2" />
    <polygon points="75,-20 85,-15 75,-10" fill="#28a745" />
  </g>

  <!-- Violin Plot -->
  <g transform="translate(550, 100)">
    <!-- Violin Background (Mirror KDE) -->
    <path d="M 100 20 C 130 50, 150 100, 160 120 C 150 160, 120 180, 100 200 C 80 180, 50 160, 40 120 C 50 100, 70 50, 100 20 Z" fill="#e8f5e9" stroke="#198754" stroke-width="2" />
    
    <!-- Miniature boxplot inside -->
    <line x1="100" y1="50" x2="100" y2="180" stroke="#333" stroke-width="2" />
    <rect x="95" y="80" width="10" height="80" fill="#333" />
    <!-- White dot for median -->
    <circle cx="100" cy="120" r="3" fill="#fff" />
    
    <text x="100" y="240" class="title" fill="#198754" text-anchor="middle">Violin Plot</text>
    <text x="100" y="260" class="text-desc" fill="#28a745" text-anchor="middle" font-size="13" font-weight="bold">"중간(120 부근)에 사람이 가장 많이 몰려있군!"</text>
    
    <!-- Annotations -->
    <!-- Left side pointing to curve -->
    <path d="M 40 120 L 0 90" fill="none" stroke="#dc3545" stroke-width="1" />
    <text x="-20" y="80" class="text-desc" fill="#dc3545" font-size="12">KDE 데이터 분포 곡선</text>
    
    <!-- Inner box pointing -->
    <path d="M 100 100 L 160 80" fill="none" stroke="#6c757d" stroke-width="1" />
    <text x="170" y="75" class="text-desc" fill="#6c757d" font-size="12">축소된 상자그림</text>
  </g>
</svg>
