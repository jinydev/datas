<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
    <linearGradient id="coolwarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#313695" />
      <stop offset="50%" stop-color="#FFFFE0" />
      <stop offset="100%" stop-color="#A50026" />
    </linearGradient>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">상관관계(Correlation)와 Heatmap 색상의 비밀</text>

  <!-- 3개의 산점도 패널 -->
  
  <!-- 1. 양의 상관관계 (+1) -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="180" height="200" fill="#FFEBEE" rx="10" filter="url(#shadow)" stroke="#D32F2F" stroke-width="2"/>
    <text x="90" y="25" font-family="sans-serif" font-size="14" fill="#B71C1C" font-weight="bold" text-anchor="middle">+1 (양적 관계)</text>
    <text x="90" y="45" font-family="sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle">"니가 오르면 나도 오른다!"</text>
    
    <path d="M 30 60 L 30 160 L 150 160" fill="none" stroke="#90A4AE" stroke-width="2" />
    
    <!-- 우상향 점들 -->
    <circle cx="50" cy="140" r="5" fill="#D32F2F" />
    <circle cx="70" cy="120" r="5" fill="#D32F2F" />
    <circle cx="90" cy="100" r="5" fill="#D32F2F" />
    <circle cx="110" cy="80" r="5" fill="#D32F2F" />
    <circle cx="130" cy="60" r="5" fill="#D32F2F" />
    <path d="M 40 150 L 140 50" fill="none" stroke="#B71C1C" stroke-width="2" stroke-dasharray="4,4" />

    <text x="90" y="180" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">예: 키와 몸무게</text>
  </g>

  <!-- 2. 무 상관관계 (0) -->
  <g transform="translate(260, 70)">
    <rect x="0" y="0" width="180" height="200" fill="#FFFDE7" rx="10" filter="url(#shadow)" stroke="#FBC02D" stroke-width="2"/>
    <text x="90" y="25" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">0 (무관함)</text>
    <text x="90" y="45" font-family="sans-serif" font-size="11" fill="#FBC02D" text-anchor="middle">"너랑 나는 아무 상관없어"</text>
    
    <path d="M 30 60 L 30 160 L 150 160" fill="none" stroke="#90A4AE" stroke-width="2" />
    
    <!-- 흩어진 점들 -->
    <circle cx="60" cy="90" r="5" fill="#FBC02D" />
    <circle cx="110" cy="60" r="5" fill="#FBC02D" />
    <circle cx="80" cy="140" r="5" fill="#FBC02D" />
    <circle cx="130" cy="120" r="5" fill="#FBC02D" />
    <circle cx="50" cy="130" r="5" fill="#FBC02D" />
    <circle cx="140" cy="80" r="5" fill="#FBC02D" />
    <circle cx="90" cy="100" r="5" fill="#FBC02D" />

    <text x="90" y="180" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">예: 발사이즈와 수학 점수</text>
  </g>

  <!-- 3. 음의 상관관계 (-1) -->
  <g transform="translate(470, 70)">
    <rect x="0" y="0" width="180" height="200" fill="#E3F2FD" rx="10" filter="url(#shadow)" stroke="#1976D2" stroke-width="2"/>
    <text x="90" y="25" font-family="sans-serif" font-size="14" fill="#0D47A1" font-weight="bold" text-anchor="middle">-1 (음적 관계)</text>
    <text x="90" y="45" font-family="sans-serif" font-size="11" fill="#1976D2" text-anchor="middle">"니가 오르면 나는 내린다!"</text>
    
    <path d="M 30 60 L 30 160 L 150 160" fill="none" stroke="#90A4AE" stroke-width="2" />
    
    <!-- 우하향 점들 -->
    <circle cx="50" cy="60" r="5" fill="#1976D2" />
    <circle cx="70" cy="80" r="5" fill="#1976D2" />
    <circle cx="90" cy="100" r="5" fill="#1976D2" />
    <circle cx="110" cy="120" r="5" fill="#1976D2" />
    <circle cx="130" cy="140" r="5" fill="#1976D2" />
    <path d="M 40 50 L 140 150" fill="none" stroke="#0D47A1" stroke-width="2" stroke-dasharray="4,4" />

    <text x="90" y="180" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">예: 시속과 목적지 도달시간</text>
  </g>

  <!-- 하단: Heatmap Color Bar -->
  <g transform="translate(100, 290)">
    <!-- 그라데이션 바 -->
    <rect x="0" y="0" width="500" height="20" fill="url(#coolwarm)" stroke="#333" stroke-width="1" />
    
    <!-- 눈금자 -->
    <path d="M 0 20 L 0 30" fill="none" stroke="#333" stroke-width="2" />
    <text x="0" y="45" font-family="monospace" font-size="14" fill="#1976D2" font-weight="bold" text-anchor="middle">-1.0</text>
    <text x="0" y="60" font-family="sans-serif" font-size="12" fill="#1976D2" text-anchor="middle">진한 파란색</text>

    <path d="M 250 20 L 250 30" fill="none" stroke="#333" stroke-width="2" />
    <text x="250" y="45" font-family="monospace" font-size="14" fill="#FBC02D" font-weight="bold" text-anchor="middle">0.0</text>
    <text x="250" y="60" font-family="sans-serif" font-size="12" fill="#FBC02D" text-anchor="middle">크림색/흰색</text>

    <path d="M 500 20 L 500 30" fill="none" stroke="#333" stroke-width="2" />
    <text x="500" y="45" font-family="monospace" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">+1.0</text>
    <text x="500" y="60" font-family="sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle">진한 빨간색</text>
  </g>

</svg>
