<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="100%" height="auto">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; font-weight: bold; fill: #333; }
      .box { rx: 5px; ry: 5px; stroke-width: 3px; }
      .code { font-family: 'Consolas', monospace; font-size: 16px; font-weight: bold; }
    </style>
  </defs>

  <rect width="850" height="350" fill="#fff" rx="10" ry="10" />
  <text x="425" y="40" class="title" text-anchor="middle" fill="#0056b3">Matplotlib의 2단계 계층 구조: Figure와 Axes</text>

  <!-- Figure (전체 도화지) -->
  <g transform="translate(150, 70)">
    <rect x="0" y="0" width="550" height="250" class="box" fill="#f1f3f5" stroke="#495057" stroke-dasharray="10 5" />
    <text x="30" y="35" class="title" fill="#343a40" font-size="24">Figure (도화지)</text>
    <text x="30" y="55" class="code" fill="#868e96">fig = plt.figure(figsize=(10, 5))</text>

    <!-- Axes 1 (액자 1) -->
    <rect x="30" y="80" width="220" height="140" class="box" fill="#e3f2fd" stroke="#0d6efd" />
    <text x="140" y="110" class="title" fill="#0d6efd" text-anchor="middle">Axes 1 (첫번째 차트)</text>
    <text x="140" y="140" class="code" fill="#0d6efd" text-anchor="middle">ax1 = fig.add_subplot(1, 2, 1)</text>
    
    <!-- axes inner plot -->
    <path d="M 50 190 L 80 150 L 120 180 L 160 130 L 210 160" fill="none" stroke="#dc3545" stroke-width="3" />
    <circle cx="50" cy="190" r="4" fill="#dc3545" />
    <circle cx="210" cy="160" r="4" fill="#dc3545" />

    <!-- Axes 2 (액자 2) -->
    <rect x="300" y="80" width="220" height="140" class="box" fill="#e8f5e9" stroke="#198754" />
    <text x="410" y="110" class="title" fill="#198754" text-anchor="middle">Axes 2 (두번째 차트)</text>
    <text x="410" y="140" class="code" fill="#198754" text-anchor="middle">ax2 = fig.add_subplot(1, 2, 2)</text>
    
    <!-- axes inner plot -->
    <rect x="330" y="150" width="30" height="50" fill="#198754" />
    <rect x="370" y="130" width="30" height="70" fill="#198754" />
    <rect x="410" y="160" width="30" height="40" fill="#198754" />
    <rect x="450" y="120" width="30" height="80" fill="#198754" />
    <line x1="320" y1="200" x2="490" y2="200" stroke="#333" stroke-width="2" />
  </g>
</svg>
