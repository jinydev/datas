<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#64748b" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">🎨 GridSpec 출력 결과: 비대칭 테트리스 대시보드</text>

    <!-- 도화지 영역 -->
    <g transform="translate(60, 60)">
        
        <!-- ax1: gs[0, :] -->
        <g transform="translate(0, 0)">
            <rect width="480" height="100" fill="white" stroke="#94a3b8" stroke-width="1.5" />
            <text x="240" y="-10" fill="#1e293b" font-weight="bold" font-size="14" text-anchor="middle">ax1: gs[0, :]</text>
            
            <g transform="translate(30, 20)">
                <path d="M 0 60 L 0 0 L 420 0" stroke="none" fill="none" />
                <path d="M 0 60 L 210 30 L 420 0" stroke="#ef4444" stroke-width="3" fill="none" />
                <circle cx="0" cy="60" r="5" fill="#ef4444" />
                <circle cx="210" cy="30" r="5" fill="#ef4444" />
                <circle cx="420" cy="0" r="5" fill="#ef4444" />
            </g>
        </g>

        <!-- ax2: gs[1:, :2] -->
        <g transform="translate(0, 150)">
            <rect width="310" height="220" fill="white" stroke="#94a3b8" stroke-width="1.5" />
            <text x="155" y="-10" fill="#1e293b" font-weight="bold" font-size="14" text-anchor="middle">ax2: gs[1:, :2]</text>

            <g transform="translate(30, 30)">
                <circle cx="0" cy="30" r="15" fill="#22c55e" />
                <circle cx="125" cy="80" r="15" fill="#22c55e" />
                <circle cx="250" cy="130" r="15" fill="#22c55e" />
            </g>
        </g>

        <!-- ax3: gs[1:, 2] -->
        <g transform="translate(340, 150)">
            <rect width="140" height="220" fill="white" stroke="#94a3b8" stroke-width="1.5" />
            <text x="70" y="-10" fill="#1e293b" font-weight="bold" font-size="14" text-anchor="middle">ax3: gs[1:, 2]</text>

            <g transform="translate(20, 20)">
                <rect x="20" y="90" width="30" height="90" fill="#f97316" />
                <rect x="65" y="0" width="30" height="180" fill="#f97316" />
                
                <text x="35" y="200" fill="#1e293b" font-weight="bold" font-size="12" text-anchor="middle">A</text>
                <text x="80" y="200" fill="#1e293b" font-weight="bold" font-size="12" text-anchor="middle">B</text>
            </g>
        </g>
    </g>

    <!-- Info Box -->
    <rect x="150" y="400" width="300" height="35" rx="5" fill="#f1f5f9" />
    <text x="300" y="422" fill="#475569" font-size="12" font-weight="bold" text-anchor="middle">💡 행(Row)과 열(Col) 슬라이싱으로 완벽히 병합된 구역</text>
</svg>
