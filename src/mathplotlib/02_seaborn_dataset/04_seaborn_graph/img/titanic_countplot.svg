<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#3b82f6" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">📊 타이타닉호 객실 등급별 탑승객 수 (Countplot)</text>

    <g transform="translate(100, 60)">
        <path d="M 0 0 L 0 200 L 400 200" stroke="#64748b" stroke-width="2" fill="none" />
        
        <g stroke="#cbd5e1" stroke-dasharray="4,4" stroke-width="1">
            <line x1="0" y1="50" x2="400" y2="50" />   <!-- 400 -->
            <line x1="0" y1="100" x2="400" y2="100" /> <!-- 266 -->
            <line x1="0" y1="150" x2="400" y2="150" /> <!-- 133 -->
        </g>
        
        <text x="-10" y="5" fill="#64748b" font-size="12" text-anchor="end">500</text>
        <text x="-10" y="55" fill="#64748b" font-size="12" text-anchor="end">400</text>
        <text x="-10" y="105" fill="#64748b" font-size="12" text-anchor="end">200</text>
        <text x="-10" y="200" fill="#64748b" font-size="12" text-anchor="end">0</text>
        <text x="-40" y="100" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90, -40, 100)">탑승객 수 (count)</text>

        <!-- Values: 1: ~216, 2: ~184, 3: ~491 -->
        <!-- Map to Y (max 500 = 200px height) => height = val * 0.4 -->
        
        <!-- Class 1: 216 * 0.4 = 86.4 -->
        <rect x="50" y="113" width="60" height="87" fill="#60a5fa" rx="3" />
        <text x="80" y="105" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">216</text>
        <text x="80" y="220" fill="#1e293b" font-size="12" font-weight="bold" text-anchor="middle">1 등급</text>

        <!-- Class 2: 184 * 0.4 = 73.6 -->
        <rect x="170" y="126" width="60" height="74" fill="#60a5fa" rx="3" />
        <text x="200" y="118" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">184</text>
        <text x="200" y="220" fill="#1e293b" font-size="12" font-weight="bold" text-anchor="middle">2 등급</text>

        <!-- Class 3: 491 * 0.4 = 196.4 -->
        <rect x="290" y="3" width="60" height="197" fill="#60a5fa" rx="3" />
        <text x="320" y="-5" fill="#1d4ed8" font-size="12" font-weight="bold" text-anchor="middle">491</text>
        <text x="320" y="220" fill="#1e293b" font-size="12" font-weight="bold" text-anchor="middle">3 등급</text>
        
        <text x="200" y="245" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">객실 등급 (pclass)</text>
    </g>
</svg>
