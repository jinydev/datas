<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#ea580c" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">📈 타이타닉호 탑승객 연령 밀도 분포 (Histplot + KDE)</text>

    <g transform="translate(100, 60)">
        <path d="M 0 0 L 0 200 L 400 200" stroke="#64748b" stroke-width="2" fill="none" />
        
        <g stroke="#cbd5e1" stroke-dasharray="4,4" stroke-width="1">
            <line x1="0" y1="50" x2="400" y2="50" />
            <line x1="0" y1="100" x2="400" y2="100" />
            <line x1="0" y1="150" x2="400" y2="150" />
        </g>
        
        <text x="-10" y="5" fill="#64748b" font-size="12" text-anchor="end">100</text>
        <text x="-10" y="105" fill="#64748b" font-size="12" text-anchor="end">50</text>
        <text x="-10" y="200" fill="#64748b" font-size="12" text-anchor="end">0</text>
        <text x="-40" y="100" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90, -40, 100)">빈도 (count)</text>

        <!-- Simulated Hist Bins (0 to 80, 20 bins = 4 width each bin) -->
        <g fill="#fdba74" stroke="#ea580c" stroke-width="1" fill-opacity="0.7">
            <!-- 20 px wide bars -->
            <rect x="0" y="170" width="20" height="30" /> <!-- 0-4 -->
            <rect x="20" y="180" width="20" height="20" /> <!-- 4-8 -->
            <rect x="40" y="185" width="20" height="15" /> <!-- 8-12 -->
            <rect x="60" y="170" width="20" height="30" /> <!-- 12-16 -->
            <rect x="80" y="120" width="20" height="80" /> <!-- 16-20 -->
            
            <rect x="100" y="60" width="20" height="140" /> <!-- 20-24 -->
            <rect x="120" y="80" width="20" height="120" /> <!-- 24-28 -->
            <rect x="140" y="70" width="20" height="130" /> <!-- 28-32 -->
            <rect x="160" y="100" width="20" height="100" /> <!-- 32-36 -->
            <rect x="180" y="110" width="20" height="90" /> <!-- 36-40 -->

            <rect x="200" y="140" width="20" height="60" /> <!-- 40-44 -->
            <rect x="220" y="150" width="20" height="50" /> <!-- 44-48 -->
            <rect x="240" y="160" width="20" height="40" /> <!-- 48-52 -->
            <rect x="260" y="170" width="20" height="30" /> <!-- 52-56 -->
            <rect x="280" y="175" width="20" height="25" /> <!-- 56-60 -->

            <rect x="300" y="180" width="20" height="20" /> <!-- 60-64 -->
            <rect x="320" y="190" width="20" height="10" /> <!-- 64-68 -->
            <rect x="340" y="195" width="20" height="5" /> <!-- 68-72 -->
            <rect x="360" y="198" width="20" height="2" /> <!-- 72-76 -->
            <rect x="380" y="199" width="20" height="1" /> <!-- 76-80 -->
        </g>
        
        <!-- KDE Line -->
        <path d="M 0 170 Q 20 200 40 185 T 80 120 T 110 60 T 160 100 T 260 170 T 350 200 L 400 200" fill="none" stroke="#dc2626" stroke-width="3" />

        <text x="0" y="220" fill="#1e293b" font-size="12" text-anchor="middle">0</text>
        <text x="100" y="220" fill="#1e293b" font-size="12" text-anchor="middle">20</text>
        <text x="200" y="220" fill="#1e293b" font-size="12" text-anchor="middle">40</text>
        <text x="300" y="220" fill="#1e293b" font-size="12" text-anchor="middle">60</text>
        <text x="400" y="220" fill="#1e293b" font-size="12" text-anchor="middle">80</text>

        <text x="200" y="250" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">연령 (Age)</text>

        <!-- Arrow indicating KDE -->
        <path d="M 170 30 L 140 60" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)" />
        <rect x="175" y="15" width="120" height="30" fill="#fef2f2" stroke="#dc2626" rx="5" />
        <text x="235" y="34" fill="#b91c1c" font-size="11" font-weight="bold" text-anchor="middle">KDE (밀도 추정 곡선)</text>
    </g>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
        </marker>
    </defs>
</svg>
