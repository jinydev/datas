<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">시각화를 결정하는 2가지 데이터 타입 분별법</text>

  <!-- 범주형 변수 박스 -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="260" height="200" fill="#FFF3E0" rx="10" filter="url(#shadow)" stroke="#FF9800" stroke-width="3"/>
    
    <text x="130" y="35" font-family="sans-serif" font-size="18" fill="#E65100" font-weight="bold" text-anchor="middle">1. 범주형 변수 (Categorical)</text>
    <path d="M 40 45 L 220 45" fill="none" stroke="#FFB74D" stroke-width="2" />

    <text x="130" y="70" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">"종류나 그룹으로 똑 떨어지는 값"</text>
    <text x="130" y="90" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">평균을 낼 수 없고, 빈도수(Count)가 중요</text>

    <!-- 예시 박스들 -->
    <rect x="30" y="110" width="80" height="30" fill="#FFE0B2" rx="15" />
    <text x="70" y="130" font-family="sans-serif" font-size="13" fill="#E65100" font-weight="bold" text-anchor="middle">성별 (sex)</text>

    <rect x="150" y="110" width="80" height="30" fill="#FFE0B2" rx="15" />
    <text x="190" y="130" font-family="sans-serif" font-size="13" fill="#E65100" font-weight="bold" text-anchor="middle">혈액형</text>

    <rect x="90" y="150" width="80" height="30" fill="#FFE0B2" rx="15" />
    <text x="130" y="170" font-family="sans-serif" font-size="13" fill="#E65100" font-weight="bold" text-anchor="middle">생존(0/1)</text>
  </g>

  <!-- VS 마크 -->
  <text x="350" y="170" font-family="sans-serif" font-size="30" fill="#90A4AE" font-weight="bold" text-anchor="middle">VS</text>

  <!-- 수치형 변수 박스 -->
  <g transform="translate(380, 70)">
    <rect x="0" y="0" width="260" height="200" fill="#E3F2FD" rx="10" filter="url(#shadow)" stroke="#2196F3" stroke-width="3"/>
    
    <text x="130" y="35" font-family="sans-serif" font-size="18" fill="#1565C0" font-weight="bold" text-anchor="middle">2. 수치형 변수 (Numerical)</text>
    <path d="M 40 45 L 220 45" fill="none" stroke="#64B5F6" stroke-width="2" />

    <text x="130" y="70" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">"측정 가능하며 연속적인 값 (숫자)"</text>
    <text x="130" y="90" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">산술 연산(평균, 합계 등)이 의미를 가짐</text>

    <!-- 예시 박스들 -->
    <rect x="30" y="110" width="80" height="30" fill="#BBDEFB" rx="5" />
    <text x="70" y="130" font-family="sans-serif" font-size="13" fill="#1565C0" font-weight="bold" text-anchor="middle">나이 (age)</text>

    <rect x="150" y="110" width="80" height="30" fill="#BBDEFB" rx="5" />
    <text x="190" y="130" font-family="sans-serif" font-size="13" fill="#1565C0" font-weight="bold" text-anchor="middle">요금(fare)</text>

    <rect x="90" y="150" width="80" height="30" fill="#BBDEFB" rx="5" />
    <text x="130" y="170" font-family="sans-serif" font-size="13" fill="#1565C0" font-weight="bold" text-anchor="middle">키 / 몸무게</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-290" y="-15" width="580" height="30" fill="#F1F8E9" rx="8" stroke="#8BC34A" stroke-width="2" />
    <text x="0" y="5" font-family="sans-serif" font-size="13" fill="#33691E" font-weight="bold" text-anchor="middle">seaborn 마법사에게 그래프를 주문할 때, 이 두 변수의 조합에 따라 그려지는 그래프가 달라집니다!</text>
  </g>

</svg>
