<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">왕초보를 위한 Seaborn 첫 그래프 기초 (빈도와 분포)</text>

  <!-- 범주형 변수를 입력받는 Countplot -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="260" height="250" fill="#FFF8E1" rx="10" filter="url(#shadow)" stroke="#FFB300" stroke-width="3"/>
    
    <text x="130" y="30" font-family="monospace" font-size="18" fill="#F57F17" font-weight="bold" text-anchor="middle">sns.countplot()</text>
    <text x="130" y="55" font-family="sans-serif" font-size="13" fill="#333" text-anchor="middle">👉 입력: 범주형 변수 (ex: 승객 등급)</text>

    <!-- 막대그래프 묘사 -->
    <path d="M 40 80 L 40 210 L 220 210" fill="none" stroke="#78909C" stroke-width="2" />
    
    <!-- 막대들 -->
    <rect x="60" y="100" width="30" height="110" fill="#FFCA28" opacity="0.9" />
    <text x="75" y="225" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">1등급</text>
    <text x="75" y="95" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">216명</text>
    
    <rect x="120" y="150" width="30" height="60" fill="#FFCA28" opacity="0.9" />
    <text x="135" y="225" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">2등급</text>
    <text x="135" y="145" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">184명</text>

    <rect x="180" y="80" width="30" height="130" fill="#FFCA28" opacity="0.9" />
    <text x="195" y="225" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">3등급</text>
    <text x="195" y="75" font-family="sans-serif" font-size="12" fill="#F57F17" font-weight="bold" text-anchor="middle">491명</text>

    <text x="130" y="245" font-family="sans-serif" font-size="11" fill="#757575" text-anchor="middle">특징: 종류별 사람 수가 그냥 막대 기둥으로 솟아오름</text>
  </g>

  <!-- VS 화살표 -->
  <!-- <text x="350" y="195" font-family="sans-serif" font-size="24" fill="#90A4AE" font-weight="bold" text-anchor="middle">VS</text> -->

  <!-- 수치형 변수를 입력받는 Histplot -->
  <g transform="translate(380, 70)">
    <rect x="0" y="0" width="260" height="250" fill="#E1F5FE" rx="10" filter="url(#shadow)" stroke="#03A9F4" stroke-width="3"/>
    
    <text x="130" y="30" font-family="monospace" font-size="18" fill="#0277BD" font-weight="bold" text-anchor="middle">sns.histplot()</text>
    <text x="130" y="55" font-family="sans-serif" font-size="13" fill="#333" text-anchor="middle">👉 입력: 수치형 변수 (ex: 승객 나이)</text>

    <!-- 히스토그램 묘사 -->
    <path d="M 40 80 L 40 210 L 220 210" fill="none" stroke="#78909C" stroke-width="2" />
    
    <!-- 연속된 히스토그램 박스들 (다닥다닥 붙어있음) -->
    <rect x="45" y="180" width="20" height="30" fill="#29B6F6" opacity="0.8" stroke="#FFFFFF" stroke-width="1" />
    <rect x="65" y="150" width="20" height="60" fill="#29B6F6" opacity="0.8" stroke="#FFFFFF" stroke-width="1" />
    <rect x="85" y="100" width="20" height="110" fill="#29B6F6" opacity="0.8" stroke="#FFFFFF" stroke-width="1" />
    <rect x="105" y="120" width="20" height="90" fill="#29B6F6" opacity="0.8" stroke="#FFFFFF" stroke-width="1" />
    <rect x="125" y="120" width="20" height="90" fill="#29B6F6" opacity="0.8" stroke="#FFFFFF" stroke-width="1" />
    <rect x="145" y="170" width="20" height="40" fill="#29B6F6" opacity="0.8" stroke="#FFFFFF" stroke-width="1" />
    <rect x="165" y="185" width="20" height="25" fill="#29B6F6" opacity="0.8" stroke="#FFFFFF" stroke-width="1" />

    <!-- X축 수치 범위 라벨 -->
    <text x="45" y="225" font-family="sans-serif" font-size="10" fill="#555" text-anchor="middle">0세</text>
    <text x="105" y="225" font-family="sans-serif" font-size="10" fill="#555" text-anchor="middle">30세(피크)</text>
    <text x="165" y="225" font-family="sans-serif" font-size="10" fill="#555" text-anchor="middle">60세</text>

    <!-- KDE 선 추가 (추세선) -->
    <path d="M 45 185 Q 85 80 105 110 T 165 180 T 200 205" fill="none" stroke="#D32F2F" stroke-width="3" />

    <text x="130" y="245" font-family="sans-serif" font-size="11" fill="#757575" text-anchor="middle">특징: 구간별로 묶어 '분포산' 모양을 보여줌 (KDE 옵션)</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 350)">
    <rect x="-330" y="-15" width="660" height="35" fill="#E8F5E9" rx="8" stroke="#4CAF50" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#1B5E20" font-weight="bold" text-anchor="middle">초보자들의 가장 흔한 실수! 범주형(글자, 등급)에는 카운트플롯을, 연속된 수치형(나이, 요금)에는 히스토그램을 쓰세요!</text>
  </g>

</svg>
