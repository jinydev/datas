<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 8px; border: 1px solid #e2e8f0;">
    <rect width="600" height="40" fill="#14b8a6" />
    <text x="300" y="26" fill="white" font-weight="bold" font-size="16" text-anchor="middle">✨ 자극(stim) vs 비자극(cue) 환자 그룹 다차원 그래프</text>

    <!-- Grid lines -->
    <g transform="translate(80, 70)" stroke="#e2e8f0" stroke-dasharray="4,4" stroke-width="1">
        <line x1="0" y1="0" x2="400" y2="0" />
        <line x1="0" y1="50" x2="400" y2="50" />
        <line x1="0" y1="100" x2="400" y2="100" />
        <line x1="0" y1="150" x2="400" y2="150" />
        <line x1="0" y1="200" x2="400" y2="200" />
        <line x1="0" y1="250" x2="400" y2="250" />
    </g>

    <!-- axes -->
    <g transform="translate(80, 70)">
        <path d="M 0 0 L 0 250 L 400 250" stroke="#475569" stroke-width="2" fill="none" />
        
        <text x="-10" y="5" fill="#64748b" font-size="12" text-anchor="end">0.5</text>
        <text x="-10" y="130" fill="#64748b" font-size="12" text-anchor="end">0.0</text>
        <text x="-10" y="255" fill="#64748b" font-size="12" text-anchor="end">-0.5</text>
        
        <text x="0" y="275" fill="#64748b" font-size="12" text-anchor="middle">0</text>
        <text x="100" y="275" fill="#64748b" font-size="12" text-anchor="middle">5</text>
        <text x="200" y="275" fill="#64748b" font-size="12" text-anchor="middle">10</text>
        <text x="300" y="275" fill="#64748b" font-size="12" text-anchor="middle">15</text>
        <text x="400" y="275" fill="#64748b" font-size="12" text-anchor="middle">20</text>

        <!-- Stim Group (Blue, solid) -->
        <path d="
            M 0 120 
            Q 50 140 100 20 
            T 150 -10
            T 200 190
            T 300 110
            T 400 125
            L 400 140
            Q 300 120 230 220
            T 100 50
            T 0 130 Z" 
            fill="#93c5fd" fill-opacity="0.3" />
        <path d="M 0 125 Q 50 145 120 20 T 230 200 T 300 125 T 400 130" fill="none" stroke="#2563eb" stroke-width="3" />

        <!-- Cue Group (Orange, dashed) -->
        <path d="
            M 0 125
            Q 50 120 100 100
            T 150 70
            T 200 130
            T 300 125
            T 400 125
            L 400 135
            Q 300 140 180 150
            T 100 120
            T 0 135 Z" 
            fill="#fdba74" fill-opacity="0.3" />
        <path d="M 0 130 Q 50 125 100 110 T 170 120 T 300 130 T 400 130" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="10,5" />

        <text x="-40" y="125" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90, -40, 125)">뇌파 신호 (signal)</text>
        <text x="200" y="310" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">시간 (timepoint)</text>
    </g>

    <!-- Legend Panel -->
    <g transform="translate(480, 70)">
        <rect x="0" y="0" width="100" height="70" fill="white" stroke="#cbd5e1" rx="5" />
        <text x="10" y="15" fill="#475569" font-size="10" font-weight="bold">event</text>
        
        <line x1="10" y1="30" x2="35" y2="30" stroke="#2563eb" stroke-width="3" />
        <text x="45" y="34" fill="#475569" font-size="12">stim</text>

        <line x1="10" y1="50" x2="35" y2="50" stroke="#ea580c" stroke-width="3" stroke-dasharray="6,4" />
        <text x="45" y="54" fill="#475569" font-size="12">cue</text>
    </g>

    <rect x="150" y="350" width="300" height="30" rx="5" fill="#f0fdf4" />
    <text x="300" y="369" fill="#166534" font-size="11" font-weight="bold" text-anchor="middle">💡 hue와 style 지정으로 선의 색상과 점선 여부가 자동 분배</text>
</svg>
