<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">Seaborn 막대그래프의 핵심: sns.barplot() 평점과 오차 막대</text>

  <!-- 데이터 십자가 변환 일러스트 -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="220" height="250" fill="#FFFDE7" rx="10" filter="url(#shadow)" stroke="#FBC02D" stroke-width="2"/>
    <text x="110" y="30" font-family="sans-serif" font-size="14" fill="#F57F17" font-weight="bold" text-anchor="middle">원본 데이터 (타이타닉 요금)</text>
    <text x="110" y="45" font-family="sans-serif" font-size="11" fill="#757575" text-anchor="middle">각 사람들의 요금(fare)</text>

    <!-- 1등급 데이터 -->
    <rect x="20" y="60" width="80" height="25" fill="#C5CAE9" rx="3" />
    <text x="60" y="77" font-family="monospace" font-size="12" fill="#1A237E" text-anchor="middle">1등급: $80</text>
    
    <rect x="20" y="90" width="80" height="25" fill="#C5CAE9" rx="3" />
    <text x="60" y="107" font-family="monospace" font-size="12" fill="#1A237E" text-anchor="middle">1등급: $120</text>

    <rect x="20" y="120" width="80" height="25" fill="#C5CAE9" rx="3" />
    <text x="60" y="137" font-family="monospace" font-size="12" fill="#1A237E" text-anchor="middle">1등급: $100</text>
    <text x="60" y="157" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">...</text>

    <!-- 3등급 데이터 -->
    <rect x="120" y="140" width="80" height="25" fill="#FFCCBC" rx="3" />
    <text x="160" y="157" font-family="monospace" font-size="12" fill="#BF360C" text-anchor="middle">3등급: $8</text>
    
    <rect x="120" y="170" width="80" height="25" fill="#FFCCBC" rx="3" />
    <text x="160" y="187" font-family="monospace" font-size="12" fill="#BF360C" text-anchor="middle">3등급: $15</text>

    <rect x="120" y="200" width="80" height="25" fill="#FFCCBC" rx="3" />
    <text x="160" y="217" font-family="monospace" font-size="12" fill="#BF360C" text-anchor="middle">3등급: $10</text>
    <text x="160" y="235" font-family="sans-serif" font-size="14" fill="#333" text-anchor="middle">...</text>
  </g>

  <!-- 마법 화살표 -->
  <text x="320" y="180" font-family="monospace" font-size="18" fill="#5E35B1" font-weight="bold" text-anchor="middle">barplot</text>
  <path d="M 290 195 L 350 195" fill="none" stroke="#5E35B1" stroke-width="4" stroke-dasharray="5,5" />
  <polygon points="340,188 355,195 340,202" fill="#5E35B1" />

  <!-- Seaborn 막대 그래표 -->
  <g transform="translate(370, 70)">
    <rect x="0" y="0" width="280" height="250" fill="#F3E5F5" rx="10" filter="url(#shadow)" stroke="#AB47BC" stroke-width="3"/>
    <text x="140" y="30" font-family="sans-serif" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">자동으로 평균 계산 + 오차막대 출력</text>
    
    <path d="M 40 50 L 40 200 L 250 200" fill="none" stroke="#90A4AE" stroke-width="2" />
    <text x="25" y="60" font-family="sans-serif" font-size="12" fill="#555" text-anchor="end">$100</text>
    <text x="25" y="195" font-family="sans-serif" font-size="12" fill="#555" text-anchor="end">$0</text>

    <!-- 1등급 막대 (평균 $100) -->
    <rect x="70" y="60" width="50" height="140" fill="#5C6BC0" opacity="0.9" />
    <!-- 에러 바 (검은 수직 선) -->
    <path d="M 95 40 L 95 80" fill="none" stroke="#333" stroke-width="2" />
    <text x="95" y="220" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">1등급</text>

    <!-- 3등급 막대 (평균 $11) -->
    <rect x="160" y="180" width="50" height="20" fill="#FF7043" opacity="0.9" />
    <!-- 에러 바 (검은 수직 선) -->
    <path d="M 185 170 L 185 190" fill="none" stroke="#333" stroke-width="2" />
    <text x="185" y="220" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">3등급</text>

    <!-- 설명선 -->
    <path d="M 95 30 L 140 10 L 200 10" fill="none" stroke="#333" stroke-width="1" />
    <text x="205" y="15" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">오차 막대 (Error Bar)</text>
    
    <path d="M 110 130 L 150 130" fill="none" stroke="#333" stroke-width="1" />
    <text x="210" y="135" font-family="sans-serif" font-size="12" fill="#1A237E" font-weight="bold">막대 높이 = 평균 요금</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 350)">
    <rect x="-310" y="-15" width="620" height="35" fill="#F3E5F5" rx="8" stroke="#8E24AA" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#4A148C" font-weight="bold" text-anchor="middle">막대그래프 꼭대기에 솟은 침(Error Bar)은 "1등급은 요금 편차가 심하고 범위가 넓다"는 뜻입니다!</text>
  </g>

</svg>
