<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="400" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">파이 차트(Pie Chart)의 치명적 단점: "인간의 뇌는 각도 비교에 취약하다!"</text>

  <!-- 왼쪽: 파이 차트 -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="280" height="250" fill="#FFF3E0" rx="10" filter="url(#shadow)" stroke="#FF9800" stroke-width="2"/>
    <text x="140" y="30" font-family="sans-serif" font-size="14" fill="#E65100" font-weight="bold" text-anchor="middle">파이 차트 (Pie Chart)</text>
    
    <!-- 원본 파이 조각들 (A=31%, B=33%, C=36%) - 육안으로 구분이 매우 힘듦 -->
    <g transform="translate(140, 140)">
      <!-- A 파트 (31%, 회색) -->
      <path d="M 0 0 L 0 -80 A 80 80 0 0 1 76 -25 Z" fill="#BDBDBD" stroke="#FFFFFF" stroke-width="2"/>
      <!-- B 파트 (33%, 오렌지) -->
      <path d="M 0 0 L 76 -25 A 80 80 0 0 1 -40 69 Z" fill="#FFB74D" stroke="#FFFFFF" stroke-width="2"/>
      <!-- C 파트 (36%, 보라) -->
      <path d="M 0 0 L -40 69 A 80 80 0 0 1 0 -80 Z" fill="#9575CD" stroke="#FFFFFF" stroke-width="2"/>
    </g>

    <!-- 설명 라벨들 -->
    <text x="175" y="85" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold">A</text>
    <text x="160" y="200" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold">B</text>
    <text x="80" y="140" font-family="sans-serif" font-size="16" fill="#333" font-weight="bold">C</text>

    <text x="140" y="240" font-family="sans-serif" font-size="12" fill="#D84315" font-weight="bold" text-anchor="middle">"A, B, C 중에 누가 제일 크지? 엇비슷해보여.."</text>
  </g>


  <!-- 오른쪽: 막대그래프 변환 -->
  <g transform="translate(360, 70)">
    <rect x="0" y="0" width="280" height="250" fill="#E3F2FD" rx="10" filter="url(#shadow)" stroke="#2196F3" stroke-width="3"/>
    <text x="140" y="30" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">막대 그래프 (Bar Chart)로 변환 시</text>
    
    <path d="M 40 60 L 40 210 L 250 210" fill="none" stroke="#90A4AE" stroke-width="2" />
    
    <!-- 막대 A(31), B(33), C(36) -->
    
    <rect x="60" y="110" width="40" height="100" fill="#BDBDBD" />
    <text x="80" y="225" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">A</text>
    <text x="80" y="100" font-family="monospace" font-size="12" fill="#757575" text-anchor="middle">31%</text>

    <rect x="130" y="90" width="40" height="120" fill="#FFB74D" />
    <text x="150" y="225" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">B</text>
    <text x="150" y="80" font-family="monospace" font-size="12" fill="#E65100" text-anchor="middle">33%</text>

    <rect x="200" y="60" width="40" height="150" fill="#9575CD" />
    <text x="220" y="225" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">C</text>
    <text x="220" y="50" font-family="monospace" font-size="12" fill="#5E35B1" text-anchor="middle">36%</text>

    <!-- 보조 비교선 -->
    <path d="M 60 110 L 240 110" fill="none" stroke="#F44336" stroke-width="1.5" stroke-dasharray="4,4" />

    <text x="140" y="243" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">"C > B > A 순서라는 게 1초 만에 보임!"</text>
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 345)">
    <rect x="-330" y="-15" width="660" height="35" fill="#FFEBEE" rx="8" stroke="#E53935" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#C62828" font-weight="bold" text-anchor="middle">현대 데이터 시각화의 원칙: 항목이 4개 이상이거나 차이가 미세할 때는 '파이 차트를 버리고 막대그래프를 써라!'</text>
  </g>

</svg>
