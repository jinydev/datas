<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="background-color: #f8fafc; font-family: 'Inter', sans-serif; border-radius: 12px; border: 1px solid #e2e8f0;">
    <!-- Title -->
    <rect x="0" y="0" width="800" height="60" fill="#1e293b" />
    <text x="400" y="38" fill="white" font-size="22" font-weight="bold" text-anchor="middle">🎨 결과 도식화: 엔진 배기량(displ)과 연비(cty)의 군집 산점도</text>

    <!-- Graph Area -->
    <g transform="translate(120, 90)">
        <!-- Axes -->
        <path d="M 0 0 L 0 280 L 550 280" stroke="#475569" stroke-width="3" fill="none" />
        
        <!-- Y Grid lines -->
        <g stroke="#cbd5e1" stroke-dasharray="5,5" stroke-width="1">
            <line x1="0" y1="70" x2="550" y2="70" />
            <line x1="0" y1="140" x2="550" y2="140" />
            <line x1="0" y1="210" x2="550" y2="210" />
        </g>

        <!-- Y Axis Labels -->
        <text x="-15" y="10" fill="#475569" font-size="14" text-anchor="end">35 (High)</text>
        <text x="-15" y="145" fill="#475569" font-size="14" text-anchor="end">20 (Mid)</text>
        <text x="-15" y="280" fill="#475569" font-size="14" text-anchor="end">10 (Low)</text>
        
        <!-- X Axis Labels -->
        <text x="0" y="305" fill="#475569" font-size="14" text-anchor="middle">1.5</text>
        <text x="275" y="305" fill="#475569" font-size="14" text-anchor="middle">4.0</text>
        <text x="550" y="305" fill="#475569" font-size="14" text-anchor="middle">7.0</text>

        <!-- Axis Titles -->
        <text x="275" y="335" fill="#1e293b" font-size="16" font-weight="bold" text-anchor="middle">배기량 (displ)</text>
        <text x="-75" y="140" fill="#1e293b" font-size="16" font-weight="bold" text-anchor="middle" transform="rotate(-90, -75, 140)">도심 연비 (cty)</text>

        <!-- Scatter Points (Simulated Data) -->
        <!-- f: 전륜 (Blue) - Light weight, high MPG -->
        <g fill="#3b82f6" fill-opacity="0.8">
            <circle cx="50" cy="50" r="7" />
            <circle cx="60" cy="80" r="7" />
            <circle cx="80" cy="40" r="7" />
            <circle cx="70" cy="90" r="7" />
            <circle cx="120" cy="110" r="7" />
            <circle cx="140" cy="95" r="7" />
            <circle cx="150" cy="130" r="7" />
            <circle cx="180" cy="120" r="7" />
        </g>
        
        <!-- 4: 사륜 (Green) - Medium weight, ok MPG -->
        <g fill="#10b981" fill-opacity="0.8">
            <circle cx="200" cy="160" r="7" />
            <circle cx="220" cy="180" r="7" />
            <circle cx="250" cy="150" r="7" />
            <circle cx="300" cy="190" r="7" />
            <circle cx="320" cy="220" r="7" />
            <circle cx="350" cy="185" r="7" />
            <circle cx="380" cy="240" r="7" />
            <circle cx="420" cy="250" r="7" />
        </g>

        <!-- r: 후륜 (Red) - Heavy, sports car, big engine -->
        <g fill="#ef4444" fill-opacity="0.8">
            <circle cx="380" cy="140" r="7" />
            <circle cx="450" cy="210" r="7" />
            <circle cx="480" cy="240" r="7" />
            <circle cx="510" cy="255" r="7" />
            <circle cx="530" cy="265" r="7" />
            <circle cx="540" cy="275" r="7" />
        </g>

        <!-- Trend Arrow -->
        <path d="M 50 20 Q 250 150 530 290" fill="none" stroke="#f59e0b" stroke-width="4" stroke-dasharray="10,5" stroke-linecap="round" />
    </g>

    <!-- Legend Panel -->
    <g transform="translate(680, 100)">
        <rect x="0" y="0" width="105" height="120" fill="white" stroke="#cbd5e1" rx="8" />
        <text x="10" y="25" fill="#1e293b" font-weight="bold" font-size="14">drv (구동)</text>
        
        <circle cx="20" cy="50" r="6" fill="#3b82f6" />
        <text x="35" y="55" font-size="14" fill="#475569">f (전륜)</text>

        <circle cx="20" cy="75" r="6" fill="#10b981" />
        <text x="35" y="80" font-size="14" fill="#475569">4 (사륜)</text>

        <circle cx="20" cy="100" r="6" fill="#ef4444" />
        <text x="35" y="105" font-size="14" fill="#475569">r (후륜)</text>
    </g>

    <!-- Explanation Box -->
    <rect x="100" y="420" width="600" height="40" rx="8" fill="#e0e7ff" />
    <text x="400" y="445" fill="#3730a3" font-size="16" font-weight="bold" text-anchor="middle">💡 우하향 배기량-연비 패턴과 구동 방식에 따른 군집 분리 증명</text>
</svg>
