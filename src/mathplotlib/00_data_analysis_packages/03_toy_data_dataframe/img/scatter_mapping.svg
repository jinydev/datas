<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="700" height="350" fill="#FAFAFA" rx="10" />

  <text x="350" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">토이 데이터(DataFrame)를 좌표 공간에 매핑하기</text>

  <!-- 파이썬 코드 박스 -->
  <g transform="translate(190, 60)">
    <rect x="0" y="0" width="320" height="40" fill="#263238" rx="5" filter="url(#shadow)" stroke="#42A5F5" stroke-width="2"/>
    <text x="160" y="25" font-family="monospace" font-size="14" fill="#E3F2FD" font-weight="bold" text-anchor="middle">sns.scatterplot(x=<tspan fill="#FF5252">speed</tspan>, y=<tspan fill="#2196F3">dist</tspan>)</text>
  </g>

  <!-- 왼쪽: Pandas DataFrame (cars) -->
  <g transform="translate(60, 130)">
    <rect x="-20" y="-10" width="180" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#4CAF50" stroke-width="2"/>
    <text x="70" y="-25" font-family="sans-serif" font-size="14" fill="#2E7D32" font-weight="bold" text-anchor="middle">자동차 제동거리 (cars)</text>

    <!-- 인덱스 -->
    <rect x="-10" y="30" width="20" height="90" fill="#E8F5E9" rx="3" />
    
    <!-- X열: speed -->
    <rect x="15" y="10" width="55" height="20" fill="#FFEBEE" rx="3" stroke="#FF5252" />
    <text x="42" y="24" font-family="sans-serif" font-size="12" fill="#D32F2F" font-weight="bold" text-anchor="middle">speed</text>

    <text x="42" y="45" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">4</text>
    <text x="42" y="65" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">10</text>
    <text x="42" y="85" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">15</text>
    <text x="42" y="105" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">24</text>

    <!-- Y열: dist -->
    <rect x="75" y="10" width="55" height="20" fill="#E3F2FD" rx="3" stroke="#2196F3" />
    <text x="102" y="24" font-family="sans-serif" font-size="12" fill="#1565C0" font-weight="bold" text-anchor="middle">dist</text>

    <text x="102" y="45" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">2</text>
    <text x="102" y="65" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">18</text>
    <text x="102" y="85" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">26</text>
    <text x="102" y="105" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">93</text>
  </g>

  <!-- 데이터 매핑 화살표 -->
  <!-- X축으로 가는 화살표 (빨강) -->
  <path d="M 120 280 L 400 280 L 400 250" fill="none" stroke="#FF5252" stroke-width="4" stroke-dasharray="8,4" />
  <polygon points="393,255 400,245 407,255" fill="#FF5252" />
  <text x="210" y="270" font-family="sans-serif" font-size="14" fill="#D32F2F" font-weight="bold" text-anchor="middle">수평선(가로) 축으로 매핑</text>

  <!-- Y축으로 가는 화살표 (파랑) -->
  <path d="M 230 180 L 330 180 L 330 120 L 380 120" fill="none" stroke="#2196F3" stroke-width="4" stroke-dasharray="8,4" />
  <polygon points="375,113 385,120 375,127" fill="#2196F3" />
  <text x="300" y="150" font-family="sans-serif" font-size="14" fill="#1565C0" font-weight="bold" text-anchor="middle">수직선(세로) 축으로 매핑</text>

  <!-- 오른쪽: 2D 좌표평면 (Scatter Plot) -->
  <g transform="translate(420, 100)">
    <rect x="-30" y="0" width="220" height="150" fill="#FFFFFF" rx="5" filter="url(#shadow)" stroke="#CE93D8" stroke-width="2"/>
    <text x="80" y="-15" font-family="sans-serif" font-size="14" fill="#6A1B9A" font-weight="bold" text-anchor="middle">2D 산점도 (Scatter Plot)</text>

    <!-- X, Y 축 -->
    <path d="M 10 10 L 10 110 L 170 110" fill="none" stroke="#607D8B" stroke-width="3" />
    
    <!-- Y축 라벨 -->
    <text x="-10" y="60" font-family="sans-serif" font-size="12" fill="#2196F3" font-weight="bold" text-anchor="middle" transform="rotate(-90 -10 60)">제동거리 (dist)</text>
    
    <!-- X축 라벨 -->
    <text x="90" y="135" font-family="sans-serif" font-size="12" fill="#FF5252" font-weight="bold" text-anchor="middle">속도 (speed)</text>

    <!-- 좌표 점들 묘사 (우상향 곡선) -->
    <circle cx="25" cy="100" r="4" fill="#9C27B0" opacity="0.8"/>
    <circle cx="50" cy="85" r="4" fill="#9C27B0" opacity="0.8"/>
    <circle cx="60" cy="90" r="4" fill="#9C27B0" opacity="0.8"/>
    <circle cx="80" cy="70" r="4" fill="#9C27B0" opacity="0.8"/>
    <circle cx="100" cy="50" r="4" fill="#9C27B0" opacity="0.8"/>
    <circle cx="120" cy="60" r="4" fill="#9C27B0" opacity="0.8"/>
    <circle cx="140" cy="25" r="4" fill="#9C27B0" opacity="0.8"/>

    <!-- 하나의 점 강조 (10, 18) -->
    <circle cx="50" cy="85" r="6" fill="none" stroke="#FF9800" stroke-width="2" />
    <path d="M 50 85 L 50 110" fill="none" stroke="#FF5252" stroke-width="1" stroke-dasharray="2,2" />
    <path d="M 10 85 L 50 85" fill="none" stroke="#2196F3" stroke-width="1" stroke-dasharray="2,2" />
  </g>

  <!-- 하단 부연 설명 -->
  <g transform="translate(350, 310)">
    <rect x="-290" y="-15" width="580" height="35" fill="#F3E5F5" rx="10" stroke="#9C27B0" stroke-width="2" />
    <text x="0" y="7" font-family="sans-serif" font-size="13" fill="#6A1B9A" font-weight="bold" text-anchor="middle">데이터프레임의 'A열'을 가로로, 'B열'을 세로 축으로 지목하면 교차하는 허공의 점을 찍어줍니다.</text>
  </g>

</svg>
